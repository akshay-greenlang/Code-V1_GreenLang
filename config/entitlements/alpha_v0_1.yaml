# GreenLang Factors v0.1 Alpha — entitlement records
#
# Phase 1 source-level entitlement ledger. v0.1 alpha is public-only:
# all 6 alpha sources are `community_open`, so no entitlement records
# are required for the alpha launch. The two named partners
# (IN-EXPORT-01 and EU-MFG-01) get a SOURCE_ACCESS row each, so that
# when a v0.5 commercial source enters their tenant view a single
# DDL change here promotes them to entitled access without code
# changes.
#
# Loaded by `greenlang.factors.rights.entitlements.load_alpha_entitlements`.
# Schema mirrors `EntitlementRecord` in that module.
#
# A real production deployment will move this to a database table
# (greenlang/factors/rights/entitlements_db.py — v0.5+); this file
# IS the source of truth for alpha.

entitlements:
  # IN-EXPORT-01 — India textile exporter (alpha partner)
  # Allow-listed alpha sources (read access, no expiry within alpha
  # window). Community-open sources are accessible without any
  # entitlement; these rows future-proof for the commercial
  # `iea_emission_factors` source when it ships at v0.5.
  - tenant_id: IN-EXPORT-01
    source_urn: urn:gl:source:india-cea-co2-baseline
    pack_urn: null
