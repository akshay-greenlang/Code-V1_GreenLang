site_name: GreenLang Documentation
site_url: https://docs.greenlang.ai
site_description: Official documentation for GreenLang - The secure, policy-driven pipeline orchestration platform
site_author: GreenLang Team
repo_url: https://github.com/greenlang/greenlang
repo_name: greenlang/greenlang
copyright: Copyright &copy; 2025 GreenLang

# Theme configuration
theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

