# =============================================================================
# PACK-043 Scope 3 Complete - Financial Institution Preset
# =============================================================================
# Bank, insurer, or asset manager where Category 15 (Investments / financed
# emissions) dominates Scope 3 at 70-95% of total. PCAF (Partnership for Carbon
# Accounting Financials) methodology across six asset classes. Investment
# portfolio decarbonisation tracking, TCFD scenario analysis with climate
# value-at-risk, and SBTi Financial Sector guidance alignment.
#
# Typical use cases:
#   - Universal banks and investment banks
#   - Asset managers and wealth managers
#   - Insurance companies (general and life)
#   - Pension funds and sovereign wealth funds
#   - Development finance institutions
#   - Private equity and venture capital
#   - Mortgage lenders and building societies
#
# Typical Scope 3 emission profile:
#   Cat 1 (Purchased Services):    5-15%  (IT, consulting, outsourcing)
#   Cat 2 (Capital Goods):          1-3%  (IT infrastructure, ATMs)
#   Cat 3 (Fuel & Energy):          0.5-2% (WTT, T&D losses)
#   Cat 6 (Business Travel):        2-8%  (client meetings, roadshows)
#   Cat 7 (Employee Commuting):     1-3%  (office staff)
#   Cat 8 (Upstream Leases):        0-3%  (leased office space)
#   Cat 13 (Downstream Leases):     0-5%  (owned property leased out)
#   Cat 15 (Investments):          70-95% (financed emissions via PCAF)
#
#   Total Scope 3 typically: 100-700x Scope 1+2
#   Key: PCAF across 6 asset classes, portfolio decarbonisation, TCFD scenarios
# =============================================================================

# --- Organisation Details ---
company_name: ""
sector_focus: "FINANCIAL_SERVICES"
country: "GB"
reporting_year: 2026
number_of_entities: 10
years_of_scope3_reporting: 3

# --- Maturity ---
maturity:
  target_level: "LEVEL_4_ADVANCED"
  current_level: "LEVEL_3_INTERMEDIATE"
  upgrade_strategy: "MATERIALITY_FIRST"
  timeline_months: 18
  roi_threshold_pct: 10.0
  milestone_tracking: true
  auto_upgrade_enabled: false

# --- LCA ---
lca:
  enabled: false
  database: "ECOINVENT"
  database_version: "3.10"
  product_types: []
  lifecycle_stages: []
  cutoff_threshold_pct: 1.0
  epd_integration: false

# --- Consolidation ---
consolidation:
  approach: "OPERATIONAL_CONTROL"
  total_entities: 10
  jv_equity_threshold_pct: 20.0
  jv_inclusion_method: "proportional"
  franchise_inclusion: false
  inter_company_elimination: true
  entity_level_reporting: true

# --- Scenarios ---
scenarios:
  enabled: true
  scenario_types:
    - "MACC"
    - "WHAT_IF"
    - "PARIS_ALIGNMENT"
  macc_max_interventions: 30
  macc_currency: "USD"
  what_if_max_scenarios: 10
  paris_target_celsius: 1.5
  paris_pathway_source: "ngfs_orderly"
  time_horizon_years: 15
  discount_rate_pct: 4.0

# --- SBTi ---
sbti:
  enabled: true
  base_year: 2022
  near_term_target_year: 2030
  long_term_target_year: 2050
  target_type: "ABSOLUTE_CONTRACTION"
  near_term_reduction_pct: 42.0
  long_term_reduction_pct: 90.0
  coverage_pct: 67.0
  flag_enabled: false
  supplier_engagement_target_pct: 30.0
  intensity_metric: "tCO2e/MEUR_aum"

# --- Supplier Programme ---
supplier_programme:
  enabled: true
  top_supplier_pct: 80.0
  top_supplier_count: 30
  target_reduction_pct: 20.0
  timeline_years: 5
  incentive_model: "preferred_status"
  cdp_supply_chain: true
  sbti_cascade_enabled: true
  quarterly_reviews: true
  data_quality_improvement_target: 1.0

# --- Climate Risk ---
climate_risk:
  enabled: true
  risk_types:
    - "TRANSITION"
    - "PHYSICAL"
    - "OPPORTUNITY"
  carbon_price_usd_per_tonne: 75.0
  carbon_price_escalation_pct: 7.0
  time_horizons_years:
    - 5
    - 10
    - 30
  scenarios:
    - "ngfs_orderly"
    - "ngfs_disorderly"
    - "ngfs_hot_house"
    - "iea_nze_2050"
    - "iea_aps"
  physical_risk_regions: []
  stranded_asset_analysis: true
  value_at_risk_enabled: true

# --- Base Year ---
base_year:
  base_year: 2022
  significance_threshold_pct: 5.0
  recalc_triggers_enabled: true
  recalc_triggers:
    - "structural_change"
    - "methodology_change"
    - "error_correction"
    - "boundary_change"
    - "portfolio_rebalancing"
  rolling_base_year: false
  documentation_required: true

# --- Sector ---
sector:
  sector_focus: "FINANCIAL_SERVICES"
  pcaf_asset_classes:
    - "LISTED_EQUITY"
    - "CORPORATE_BONDS"
    - "UNLISTED_EQUITY"
    - "PROJECT_FINANCE"
    - "COMMERCIAL_RE"
    - "MORTGAGES"
  pcaf_data_quality_target: 2.5

# --- Assurance ---
assurance:
  target_level: "REASONABLE"
  isae_3410_compliant: true
  evidence_requirements:
    - "methodology_documentation"
    - "emission_factor_sources"
    - "data_quality_assessment"
    - "uncertainty_analysis"
    - "provenance_hashes"
    - "assumption_registry"
    - "double_counting_log"
    - "calculation_audit_trail"
    - "pcaf_data_quality_scores"
    - "portfolio_attribution_detail"
  verifier_portal_enabled: true
  materiality_threshold_pct: 5.0
  min_dqr_for_reasonable: 2.5
  continuous_monitoring: true

# --- Integration ---
integration:
  pack042_required: true
  pack042_pack_id: "PACK-042-scope-3-starter"
  pack041_enabled: true
  pack041_pack_id: "PACK-041-scope-1-2-complete"
  lca_database_bridge: false
  sbti_api_enabled: true
  tcfd_issb_bridge: true
  supplier_portal_enabled: true
  cdp_supply_chain: true
  pcaf_database_bridge: true

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "XLSX"
    - "PDF"
  enterprise_dashboard: true
  dashboard_refresh_minutes: 30
  investor_grade: true
  board_summary: true
  scenario_reporting: true
  benchmark_comparison: true
  multi_entity_rollup: true
  verifier_data_room: true
  output_language: "en"
  watermark_draft: true

# --- Security ---
security:
  rbac_roles:
    - "scope3_director"
    - "scope3_manager"
    - "sustainability_officer"
    - "portfolio_manager"
    - "risk_analyst"
    - "pcaf_specialist"
    - "verifier"
    - "viewer"
  supplier_data_isolation: true
  entity_level_access: true
  audit_logging: true
  audit_retention_years: 10
  pii_redaction: true
  encryption_at_rest: true
  data_classification: "RESTRICTED"

# --- Performance ---
performance:
  parallel_entities: 10
  parallel_categories: 5
  batch_size: 5000
  cache_ttl_seconds: 7200
  lca_query_timeout_seconds: 300
  scenario_computation_timeout_seconds: 3600
  max_suppliers: 5000
  max_line_items: 1000000
  memory_ceiling_mb: 16384
  monte_carlo_iterations: 10000
