# =============================================================================
# PACK-043 Scope 3 Complete - Enterprise Manufacturing Preset
# =============================================================================
# Large manufacturer with complex multi-tier supply chain, circular economy
# initiatives, LCA integration for product-level emission factors, and SBTi
# Sectoral Decarbonisation Approach (SDA) pathway alignment. Designed for
# organisations at Maturity Level 3-4 upgrading from PACK-042 to enterprise.
#
# Typical use cases:
#   - Automotive OEMs and Tier 1 suppliers
#   - Chemical and pharmaceutical multinationals
#   - Heavy industry (steel, cement, glass)
#   - Electronics and semiconductor manufacturers
#   - Industrial machinery and equipment groups
#   - Aerospace and defence manufacturers
#
# Typical Scope 3 emission profile:
#   Cat 1 (Purchased Goods):     40-70% (raw materials, components, chemicals)
#   Cat 2 (Capital Goods):        2-8%  (machinery, production lines)
#   Cat 3 (Fuel & Energy):        3-8%  (WTT, T&D losses)
#   Cat 4 (Upstream Transport):    5-15% (inbound logistics, multi-modal)
#   Cat 5 (Waste):                 1-3%  (manufacturing waste, hazardous)
#   Cat 6 (Business Travel):      0.5-2% (sales, procurement, engineering)
#   Cat 7 (Employee Commuting):   1-3%  (factory + office workforce)
#   Cat 9 (Downstream Transport): 2-8%  (outbound logistics)
#   Cat 11 (Product Use):         0-30% (energy-using products)
#   Cat 12 (End-of-Life):         1-5%  (product disposal, recycling)
#
#   Total Scope 3 typically: 3-10x Scope 1+2
#   Key: LCA for top product groups, SBTi SDA, circular economy tracking
# =============================================================================

# --- Organisation Details ---
company_name: ""
sector_focus: "MANUFACTURING"
country: "DE"
reporting_year: 2026
number_of_entities: 5
years_of_scope3_reporting: 2

# --- Maturity ---
maturity:
  target_level: "LEVEL_4_ADVANCED"
  current_level: "LEVEL_2_STARTER"
  upgrade_strategy: "ROI_OPTIMIZED"
  timeline_months: 24
  roi_threshold_pct: 15.0
  milestone_tracking: true
  auto_upgrade_enabled: false

# --- LCA ---
lca:
  enabled: true
  database: "ECOINVENT"
  database_version: "3.10"
  secondary_database: "GABI"
  product_types:
    - "raw_materials"
    - "components"
    - "packaging"
    - "fuels"
    - "chemicals"
    - "metals"
    - "polymers"
  lifecycle_stages:
    - "RAW_MATERIAL"
    - "MANUFACTURING"
    - "DISTRIBUTION"
    - "USE_PHASE"
    - "END_OF_LIFE"
  sensitivity_params:
    emission_factor_variation_pct: 20.0
    transport_distance_variation_pct: 15.0
    energy_mix_variation_pct: 10.0
    allocation_method_variation_pct: 25.0
  cutoff_threshold_pct: 1.0
  epd_integration: true

# --- Consolidation ---
consolidation:
  approach: "OPERATIONAL_CONTROL"
  total_entities: 5
  jv_equity_threshold_pct: 20.0
  jv_inclusion_method: "proportional"
  franchise_inclusion: false
  inter_company_elimination: true
  entity_level_reporting: true

# --- Scenarios ---
scenarios:
  enabled: true
  scenario_types:
    - "MACC"
    - "WHAT_IF"
    - "TECHNOLOGY_PATHWAY"
    - "SUPPLIER_PROGRAMME"
    - "PARIS_ALIGNMENT"
  macc_max_interventions: 50
  macc_currency: "EUR"
  what_if_max_scenarios: 10
  paris_target_celsius: 1.5
  paris_pathway_source: "iea_nze_2050"
  time_horizon_years: 10
  discount_rate_pct: 5.0

# --- SBTi ---
sbti:
  enabled: true
  base_year: 2022
  near_term_target_year: 2030
  long_term_target_year: 2050
  target_type: "SDA"
  near_term_reduction_pct: 42.0
  long_term_reduction_pct: 90.0
  coverage_pct: 75.0
  flag_enabled: false
  supplier_engagement_target_pct: 50.0

# --- Supplier Programme ---
supplier_programme:
  enabled: true
  top_supplier_pct: 80.0
  top_supplier_count: 100
  target_reduction_pct: 25.0
  timeline_years: 5
  incentive_model: "preferred_status"
  cdp_supply_chain: true
  sbti_cascade_enabled: true
  quarterly_reviews: true
  data_quality_improvement_target: 1.0

# --- Climate Risk ---
climate_risk:
  enabled: true
  risk_types:
    - "TRANSITION"
    - "PHYSICAL"
    - "OPPORTUNITY"
  carbon_price_usd_per_tonne: 100.0
  carbon_price_escalation_pct: 5.0
  time_horizons_years:
    - 5
    - 10
    - 30
  scenarios:
    - "iea_nze_2050"
    - "iea_aps"
    - "iea_steps"
  stranded_asset_analysis: false
  value_at_risk_enabled: true

# --- Base Year ---
base_year:
  base_year: 2022
  significance_threshold_pct: 5.0
  recalc_triggers_enabled: true
  recalc_triggers:
    - "structural_change"
    - "methodology_change"
    - "error_correction"
    - "boundary_change"
    - "outsourcing_insourcing"
  rolling_base_year: false
  documentation_required: true

# --- Sector ---
sector:
  sector_focus: "MANUFACTURING"
  manufacturing_circular_economy: true
  manufacturing_epd_integration: true

# --- Assurance ---
assurance:
  target_level: "LIMITED"
  isae_3410_compliant: true
  evidence_requirements:
    - "methodology_documentation"
    - "emission_factor_sources"
    - "data_quality_assessment"
    - "uncertainty_analysis"
    - "provenance_hashes"
    - "assumption_registry"
    - "double_counting_log"
    - "calculation_audit_trail"
  verifier_portal_enabled: false
  materiality_threshold_pct: 5.0
  min_dqr_for_reasonable: 2.5

# --- Integration ---
integration:
  pack042_required: true
  pack042_pack_id: "PACK-042-scope-3-starter"
  pack041_enabled: true
  pack041_pack_id: "PACK-041-scope-1-2-complete"
  lca_database_bridge: true
  sbti_api_enabled: false
  tcfd_issb_bridge: true
  supplier_portal_enabled: true
  cdp_supply_chain: true

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "XLSX"
    - "PDF"
  enterprise_dashboard: true
  dashboard_refresh_minutes: 60
  investor_grade: true
  board_summary: true
  scenario_reporting: true
  benchmark_comparison: true
  multi_entity_rollup: true
  output_language: "en"
  watermark_draft: true

# --- Security ---
security:
  rbac_roles:
    - "scope3_director"
    - "scope3_manager"
    - "sustainability_officer"
    - "procurement_director"
    - "supply_chain_analyst"
    - "lca_specialist"
    - "verifier"
    - "viewer"
  supplier_data_isolation: true
  entity_level_access: true
  audit_logging: true
  audit_retention_years: 10
  pii_redaction: true
  encryption_at_rest: true
  data_classification: "CONFIDENTIAL"

# --- Performance ---
performance:
  parallel_entities: 5
  parallel_categories: 8
  batch_size: 5000
  cache_ttl_seconds: 7200
  lca_query_timeout_seconds: 600
  scenario_computation_timeout_seconds: 1800
  max_suppliers: 10000
  max_line_items: 2000000
  memory_ceiling_mb: 16384
  monte_carlo_iterations: 10000
