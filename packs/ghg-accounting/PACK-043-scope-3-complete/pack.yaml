# -----------------------------------------------------------------------------
# Compliance Framework Mappings
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "GHG_PROTOCOL_SCOPE3"
      name: "GHG Protocol Scope 3 Standard"
      coverage: "All 15 categories with enterprise consolidation and LCA factors"
    - id: "GHG_PROTOCOL_SCOPE3_TECHNICAL"
      name: "GHG Protocol Scope 3 Technical Guidance"
      coverage: "Full per-category methodology with LCA and supplier-specific tiers"
    - id: "ISO_14064"
      name: "ISO 14064-1:2018"
      coverage: "Categories 3-6 with multi-entity boundary"
    - id: "ESRS_E1"
      name: "ESRS E1 Climate Change"
      coverage: "E1-6 Scope 3, E1-9 scenario analysis, E1 transition plan"
    - id: "CDP"
      name: "CDP Climate Change"
      coverage: "C6.5, C6.7, C6.10, CDP Supply Chain module"
    - id: "SBTI"
      name: "Science Based Targets initiative"
      coverage: "Near-term, long-term, FLAG, SDA, supplier engagement cascade"
    - id: "TCFD_ISSB"
      name: "TCFD / ISSB IFRS S2"
      coverage: "Governance, strategy, risk management, metrics and targets, scenario analysis"
    - id: "SEC"
      name: "US SEC Climate Disclosure"
      coverage: "Scope 3 safe harbour with enterprise methodology documentation"
    - id: "SB_253"
      name: "California SB 253"
      coverage: "Scope 3 annual reporting from 2027 with assurance"
    - id: "PCAF"
      name: "PCAF Global GHG Accounting Standard"
      coverage: "Cat 15: 6 asset classes, attribution, data quality, portfolio decarbonisation"
    - id: "ISAE_3410"
      name: "ISAE 3410 Assurance"
      coverage: "Limited and reasonable assurance evidence, verifier data room"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"
    - "scikit-learn>=1.3"
    - "brightway2>=2.4"
    - "lxml>=4.9"
    - "reportlab>=4.0"
    - "weasyprint>=60.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 200
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
    min_connections: 50
    recommended_connections: 100

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_pack042_installed
    - verify_pack041_installed
    - verify_lca_database_available
    - verify_mrv_agents_available
    - verify_eeio_database
    - verify_classification_tables

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
      - "V326-V335"   # PACK-041 Scope 1-2 Complete
      - "V336-V345"   # PACK-042 Scope 3 Starter
    new:
      - "V346__pack043_scope3_complete_001"
      - "V347__pack043_scope3_complete_002"
      - "V348__pack043_scope3_complete_003"
      - "V349__pack043_scope3_complete_004"
      - "V350__pack043_scope3_complete_005"
      - "V351__pack043_scope3_complete_006"
      - "V352__pack043_scope3_complete_007"
      - "V353__pack043_scope3_complete_008"
      - "V354__pack043_scope3_complete_009"
      - "V355__pack043_scope3_complete_010"

  post_install:
    - seed_lca_process_index
    - seed_sbti_sector_pathways
    - seed_sbti_flag_commodities
    - seed_climate_scenario_data
    - seed_pcaf_asset_class_data
    - seed_carbon_price_trajectories
    - seed_maturity_scoring_rubric
    - validate_preset_configs

