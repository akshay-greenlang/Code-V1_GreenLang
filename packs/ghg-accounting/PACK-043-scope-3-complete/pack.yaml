# -----------------------------------------------------------------------------
# Prerequisites
# -----------------------------------------------------------------------------
prerequisites:
  required:
    - id: "PACK-042-scope-3-starter"
      name: "Scope 3 Starter Pack"
      version: ">=1.0.0"
      reason: >-
        PACK-043 extends PACK-042 and inherits all 10 Scope 3 engines,
        8 workflows, 10 templates, and 12 integrations. PACK-042 provides
        the base Scope 3 screening, classification, category calculation,
        double-counting prevention, hotspot analysis, supplier engagement,
        data quality assessment, uncertainty analysis, compliance mapping,
        and reporting capabilities that PACK-043 builds upon.

  recommended:
    - id: "PACK-041-scope-1-2-complete"
      name: "Scope 1-2 Complete Pack"
      version: ">=1.0.0"
      reason: >-
        Provides Scope 1/2 data for Category 3 (FERA) calculations,
        Scope 1+2 totals for ratio analysis and SBTi coverage, and
        organisational boundary definition for consolidation.

# -----------------------------------------------------------------------------
# Components - Engines, Workflows, Templates, Integrations, Presets
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Enterprise calculation and processing engines (10 engines)
  # ===========================================================================
  engines:
    - id: maturity_progression
      name: "Maturity Progression Engine"
      description: >-
        Manages Scope 3 maturity level progression from Level 1 (Screening)
        through Level 5 (Verified). Assesses current maturity across five
        dimensions: methodology tier distribution, data quality ratings,
        category coverage, supplier engagement penetration, and assurance
        readiness. Generates maturity roadmap with milestone tracking,
        budget allocation per category, and ROI-optimised tier upgrade
        sequencing. Tracks year-on-year maturity progression and identifies
        bottlenecks in the upgrade path.
        Zero-hallucination: maturity scoring from defined rubric, arithmetic
        milestone calculations, no LLM.
      class: "MaturityProgressionEngine"
      file: "engines/maturity_progression_engine.py"
      required: true

    - id: lca_integration
      name: "LCA Integration Engine"
      description: >-
        Integrates lifecycle assessment databases for product-level emission
        factors. Connects to ecoinvent 3.10, GaBi, ELCD, and custom LCA
        databases. Resolves product-level emission factors for Categories
        1, 2, 10, 11, and 12 by mapping purchased product types to LCA
        process records. Supports cradle-to-gate, cradle-to-grave, and
        cradle-to-cradle system boundaries. Applies allocation methods
        (physical, economic, system expansion). Integrates Environmental
        Product Declarations (EPDs) when available. Runs sensitivity
        analysis on key LCA parameters (emission factor variation,
        transport distance, energy mix, allocation method).
        Zero-hallucination: LCA factors from published databases with
        process ID citation, sensitivity from deterministic variation, no LLM.
      class: "LCAIntegrationEngine"
      file: "engines/lca_integration_engine.py"
      required: true

    - id: sbti_pathway
      name: "SBTi Pathway Alignment Engine"
      description: >-
        Tracks progress against SBTi Scope 3 targets using three methods:
        absolute contraction (total emissions reduction from base year),
        Sectoral Decarbonisation Approach (sector-specific intensity
        pathway), and economic intensity (tCO2e per unit of economic
        output). Calculates annual reduction rate, cumulative progress,
        coverage percentage, and budget remaining to target. Implements
        SBTi FLAG guidance for food, land, and agriculture sectors with
        commodity-specific pathways (beef, dairy, palm oil, soy, timber).
        Tracks supplier engagement cascade: percentage of suppliers (by
        emissions) with own SBTi targets.
        Zero-hallucination: pathway arithmetic from SBTi reference tables,
        no LLM.
      class: "SBTiPathwayEngine"
      file: "engines/sbti_pathway_engine.py"
      required: true

    - id: scenario_analysis
      name: "Scenario Analysis Engine"
      description: >-
        Provides five scenario analysis capabilities: (1) MACC - Marginal
        Abatement Cost Curve ranking interventions by cost-effectiveness
        (EUR/tCO2e abated), with NPV calculation and cumulative reduction
        curves. (2) What-if - user-defined scenarios modelling the impact
        of specific changes (supplier switching, mode shift, energy
        transition). (3) Technology pathway - models technology adoption
        curves and their Scope 3 impact over time. (4) Supplier programme
        - models the Scope 3 reduction from supplier engagement at various
        penetration rates. (5) Paris alignment - assesses whether the
        current Scope 3 trajectory aligns with 1.5C or 2C pathways
        using IEA NZE 2050, IEA APS, IEA STEPS, NGFS orderly, and NGFS
        disorderly scenarios.
        Zero-hallucination: scenario arithmetic from published pathways,
        MACC from deterministic cost/benefit, no LLM.
      class: "ScenarioAnalysisEngine"
      file: "engines/scenario_analysis_engine.py"
      required: true

    - id: multi_entity_consolidation
      name: "Multi-Entity Consolidation Engine"
      description: >-
        Consolidates Scope 3 emissions across multiple legal entities
        in a corporate group. Implements three GHG Protocol approaches:
        equity share (allocate based on ownership percentage), operational
        control (100% if operationally controlled), and financial control
        (100% if financially controlled). Handles joint ventures with
        proportional equity share allocation above a configurable threshold
        (default 20%). Supports franchise inclusion with configurable
        ownership/control thresholds. Performs inter-company emission
        elimination to prevent double-counting of internal supply chain
        emissions. Generates entity-level, business-unit-level, and
        group-level reports. Manages currency conversion across entities.
        Zero-hallucination: consolidation arithmetic from ownership
        percentages, no LLM.
      class: "MultiEntityConsolidationEngine"
      file: "engines/multi_entity_consolidation_engine.py"
      required: true

    - id: supplier_programme
      name: "Supplier Programme Management Engine"
      description: >-
        Extends PACK-042 supplier engagement with structured programme
        management. Enrolls top suppliers (by Scope 3 contribution),
        sets supplier-level emission reduction targets, manages incentive
        models (preferred status, contract extension, volume increase,
        co-investment, penalty), tracks supplier SBTi target adoption
        per cascade methodology, integrates with CDP Supply Chain module,
        monitors quarterly progress against targets, generates supplier
        scorecards with emission reduction, data quality improvement,
        and engagement metrics. Calculates group-level Scope 3 reduction
        from supplier programme activities.
        Zero-hallucination: programme tracking from database records,
        reduction arithmetic, no LLM.
      class: "SupplierProgrammeEngine"
      file: "engines/supplier_programme_engine.py"
      required: true

    - id: climate_risk
      name: "Climate Risk Quantification Engine"
      description: >-
        Quantifies Scope 3 climate risk per TCFD/ISSB across three
        dimensions: (1) Transition risk - carbon price impact on supply
        chain costs, policy risk (CBAM, ETS), technology disruption,
        market shift. (2) Physical risk - acute (extreme weather events
        disrupting supply chain) and chronic (sea level rise, water stress
        affecting sourcing regions). (3) Opportunity - supply chain
        decarbonisation creating competitive advantage, green product
        demand. Calculates climate value-at-risk (VaR) for Scope 3
        exposure. Models carbon price escalation scenarios. Supports
        stranded asset analysis for investment portfolios (PCAF).
        Zero-hallucination: risk modelling from deterministic carbon
        price and scenario parameters, no LLM.
      class: "ClimateRiskEngine"
      file: "engines/climate_risk_engine.py"
      required: true

    - id: base_year_recalculation
      name: "Base-Year Recalculation Engine"
      description: >-
        Implements GHG Protocol base-year recalculation policy for Scope 3.
        Detects significance triggers: structural change (M&A, divestiture),
        methodology change (tier upgrade, new emission factors), error
        correction, boundary change, outsourcing/insourcing, JV equity
        change. Calculates impact magnitude against significance threshold
        (default 5%). Performs automated base-year recalculation when
        threshold exceeded. Supports rolling base year (n-year average)
        as alternative to fixed base year. Documents all recalculation
        decisions with rationale for audit trail.
        Zero-hallucination: recalculation from historical data replay,
        threshold arithmetic, no LLM.
      class: "BaseYearRecalculationEngine"
      file: "engines/base_year_recalculation_engine.py"
      required: true

    - id: assurance_readiness
      name: "Assurance Readiness Engine"
      description: >-
        Prepares Scope 3 inventory for external assurance per ISAE 3410.
        Generates verifier evidence packages: methodology documentation,
        emission factor sources with citations, data quality assessment
        with DQR scores, uncertainty analysis with confidence intervals,
        SHA-256 provenance hashes for all outputs, assumption registry
        with justifications, double-counting prevention log, and full
        calculation audit trail. Assesses readiness for limited vs
        reasonable assurance based on data quality, methodology maturity,
        and evidence completeness. Manages verifier data room access.
        Supports continuous monitoring between annual assurance cycles.
        Zero-hallucination: readiness scoring from defined criteria,
        evidence assembly from audit trail, no LLM.
      class: "AssuranceReadinessEngine"
      file: "engines/assurance_readiness_engine.py"
      required: true

    - id: enterprise_dashboard
      name: "Enterprise Dashboard Engine"
      description: >-
        Generates investor-grade enterprise dashboard data for real-time
        Scope 3 monitoring. Dashboard sections: executive KPIs (total
        Scope 3, YoY change, SBTi progress, maturity level), category
        breakdown (15-category heatmap with trend), scenario dashboard
        (MACC curves, pathway alignment), supplier programme (engagement
        coverage, reduction progress, SBTi cascade), multi-entity rollup
        (entity-level contribution, consolidation view), climate risk
        (carbon price exposure, VaR), data quality (DQR matrix, trend),
        and assurance status (readiness score, evidence completeness).
        Supports configurable refresh interval and role-based views.
        Zero-hallucination: dashboard from aggregated calculation data,
        no LLM in data content.
      class: "EnterpriseDashboardEngine"
      file: "engines/enterprise_dashboard_engine.py"
      required: true

  # ===========================================================================
  # Workflows - Enterprise orchestration sequences (8 workflows)
  # ===========================================================================
  workflows:
    - id: maturity_assessment
      name: "Maturity Assessment Workflow"
      description: >-
        5-phase maturity assessment: Phase 1 - Current State Analysis
        (assess methodology tiers, data quality, category coverage,
        supplier engagement, assurance status) -> Phase 2 - Gap Analysis
        (compare current vs target maturity across five dimensions) ->
        Phase 3 - Roadmap Generation (create upgrade plan with milestones,
        budget allocation, and ROI ranking) -> Phase 4 - Budget Planning
        (allocate maturity improvement budget across categories and
        capabilities) -> Phase 5 - Milestone Setting (define quarterly
        checkpoints for maturity progression tracking).
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 5

    - id: lca_product_assessment
      name: "LCA Product Assessment Workflow"
      description: >-
        6-phase LCA integration workflow: Phase 1 - Product Mapping
        (map purchased product types to LCA process records in ecoinvent/
        GaBi/ELCD) -> Phase 2 - System Boundary Definition (define
        lifecycle stages per product group: C2G, C2Gr, C2C) -> Phase 3 -
        Factor Retrieval (query LCA database for process-level emission
        factors with provenance) -> Phase 4 - Sensitivity Analysis (run
        parameter variation on key LCA inputs) -> Phase 5 - EPD
        Integration (merge available EPDs for product-level factors) ->
        Phase 6 - Factor Validation (cross-reference LCA factors against
        EEIO estimates for reasonableness check).
      schedule: "annual"
      estimated_duration_minutes: 360
      phases: 6

    - id: sbti_target_tracking
      name: "SBTi Target Tracking Workflow"
      description: >-
        5-phase SBTi workflow: Phase 1 - Baseline Confirmation (confirm
        base year emissions, methodology, and SBTi target parameters) ->
        Phase 2 - Annual Inventory Update (calculate current year Scope 3
        via PACK-042 pipeline) -> Phase 3 - Progress Calculation (calculate
        annual reduction rate, cumulative progress, coverage percentage,
        budget to target) -> Phase 4 - FLAG Assessment (if enabled, assess
        FLAG commodity progress against FLAG-specific pathway) -> Phase 5 -
        SBTi Reporting Package (generate SBTi annual disclosure with
        progress against near-term and long-term targets).
      schedule: "annual"
      estimated_duration_minutes: 180
      phases: 5

    - id: scenario_modelling
      name: "Scenario Modelling Workflow"
      description: >-
        5-phase scenario analysis workflow: Phase 1 - Intervention
        Inventory (catalogue available emission reduction interventions
        with cost and abatement potential) -> Phase 2 - MACC Construction
        (rank interventions by cost-effectiveness, build marginal
        abatement cost curve) -> Phase 3 - What-If Scenarios (model
        user-defined scenarios for supply chain changes) -> Phase 4 -
        Paris Alignment Check (assess trajectory against 1.5C and 2C
        pathways using IEA/NGFS scenarios) -> Phase 5 - Reporting
        (generate scenario analysis reports with charts and tables).
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 5

    - id: multi_entity_consolidation
      name: "Multi-Entity Consolidation Workflow"
      description: >-
        6-phase consolidation workflow: Phase 1 - Entity Inventory
        (catalogue all entities, ownership percentages, control status)
        -> Phase 2 - Boundary Definition (apply equity share, operational
        control, or financial control approach) -> Phase 3 - Entity
        Data Collection (collect entity-level Scope 3 data from PACK-042
        instances per entity) -> Phase 4 - JV and Franchise Processing
        (apply proportional allocation for JVs, threshold-based inclusion
        for franchises) -> Phase 5 - Inter-Company Elimination (identify
        and eliminate inter-company Scope 3 emissions) -> Phase 6 -
        Group Consolidation (aggregate to business unit and group level,
        generate consolidated reports).
      schedule: "annual"
      estimated_duration_minutes: 480
      phases: 6

    - id: supplier_programme_management
      name: "Supplier Programme Management Workflow"
      description: >-
        6-phase supplier programme workflow: Phase 1 - Supplier
        Prioritisation (rank suppliers by Scope 3 contribution, select
        programme participants) -> Phase 2 - Target Setting (set
        supplier-level emission reduction targets per programme timeline)
        -> Phase 3 - Incentive Assignment (assign incentive model per
        supplier: preferred status, contract extension, volume increase)
        -> Phase 4 - Quarterly Review (assess supplier progress against
        targets, update engagement status) -> Phase 5 - SBTi Cascade
        Tracking (monitor supplier SBTi target adoption rate) -> Phase 6 -
        Programme Reporting (generate supplier programme scorecard with
        aggregate reduction, coverage improvement, and ROI).
      schedule: "quarterly"
      estimated_duration_minutes: 180
      phases: 6

    - id: climate_risk_assessment
      name: "Climate Risk Assessment Workflow"
      description: >-
        5-phase TCFD/ISSB workflow: Phase 1 - Risk Identification
        (identify transition, physical, and opportunity risks per Scope 3
        category and supply chain region) -> Phase 2 - Carbon Price
        Modelling (model carbon price impact on supply chain costs using
        configured scenarios) -> Phase 3 - Scenario Analysis (run IEA
        and NGFS scenarios for Scope 3 trajectory) -> Phase 4 - VaR
        Calculation (calculate climate value-at-risk for total Scope 3
        exposure) -> Phase 5 - TCFD/ISSB Reporting (generate climate
        risk disclosure for TCFD/ISSB, including scenario analysis
        tables and risk matrices).
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 5

    - id: full_enterprise_pipeline
      name: "Full Enterprise Pipeline Workflow"
      description: >-
        16-phase end-to-end enterprise Scope 3 pipeline: Phase 1 -
        Health Check -> Phase 2 - Configuration Loading -> Phase 3 -
        Maturity Assessment -> Phase 4 - Entity Data Collection ->
        Phase 5 - PACK-042 Pipeline Execution (all 12 phases) ->
        Phase 6 - LCA Integration -> Phase 7 - Multi-Entity
        Consolidation -> Phase 8 - SBTi Progress Calculation ->
        Phase 9 - Scenario Analysis -> Phase 10 - Climate Risk
        Assessment -> Phase 11 - Supplier Programme Review ->
        Phase 12 - Base-Year Recalculation Check -> Phase 13 -
        Assurance Readiness Assessment -> Phase 14 - Enterprise
        Dashboard Generation -> Phase 15 - Multi-Framework Compliance
        Mapping -> Phase 16 - Report Package Assembly.
      schedule: "annual"
      estimated_duration_minutes: 2400
      phases: 16

  # ===========================================================================
  # Templates - Enterprise report and output templates (10 templates)
  # ===========================================================================
  templates:
    - id: maturity_roadmap
      display_name: "Maturity Progression Roadmap"
      description: >-
        Visual roadmap showing current maturity level, target level,
        upgrade milestones, budget allocation per capability, ROI
        ranking, and timeline. Includes dimension-level scoring
        (methodology, data quality, coverage, engagement, assurance).
      format: "html"
      template_file: "templates/maturity_roadmap.jinja2"
      enabled: true

    - id: lca_product_report
      display_name: "LCA Product Assessment Report"
      description: >-
        Product-level LCA results showing emission factors per product
        group, lifecycle stage breakdown, sensitivity analysis results,
        EPD integration status, and comparison to EEIO estimates.
      format: "html"
      template_file: "templates/lca_product_report.jinja2"
      enabled: true

    - id: sbti_progress_report
      display_name: "SBTi Progress Report"
      description: >-
        SBTi target tracking report showing base year emissions, current
        year emissions, annual reduction rate, cumulative progress vs
        target pathway, coverage percentage, FLAG pathway progress (if
        applicable), and supplier engagement cascade metrics.
      format: "html"
      template_file: "templates/sbti_progress_report.jinja2"
      enabled: true

    - id: scenario_analysis_report
      display_name: "Scenario Analysis Report"
      description: >-
        MACC curves, what-if scenario comparison table, technology
        pathway adoption curves, supplier programme impact modelling,
        and Paris alignment trajectory chart with 1.5C and 2C pathways.
      format: "html"
      template_file: "templates/scenario_analysis_report.jinja2"
      enabled: true

    - id: multi_entity_consolidation_report
      display_name: "Multi-Entity Consolidation Report"
      description: >-
        Group-level consolidated Scope 3 report with entity-level
        breakdown, JV allocation detail, franchise inclusion log,
        inter-company elimination summary, and business unit rollups.
      format: "html"
      template_file: "templates/multi_entity_consolidation_report.jinja2"
      enabled: true

    - id: supplier_programme_scorecard
      display_name: "Supplier Programme Scorecard"
      description: >-
        Programme-level scorecard showing aggregate emission reduction
        from engaged suppliers, SBTi cascade adoption rate, data quality
        improvement, incentive model effectiveness, and ROI per supplier
        cohort.
      format: "html"
      template_file: "templates/supplier_programme_scorecard.jinja2"
      enabled: true

    - id: climate_risk_report
      display_name: "Climate Risk Report (TCFD/ISSB)"
      description: >-
        TCFD/ISSB climate risk disclosure with transition risk matrix,
        carbon price impact analysis, physical risk exposure by supply
        chain region, opportunity identification, climate VaR, and
        scenario analysis tables (IEA NZE, APS, STEPS, NGFS).
      format: "html"
      template_file: "templates/climate_risk_report.jinja2"
      enabled: true

    - id: assurance_evidence_package
      display_name: "Assurance Evidence Package"
      description: >-
        ISAE 3410 evidence package for verifier review: methodology
        documentation, emission factor source registry, data quality
        matrix, uncertainty analysis, provenance hash registry,
        assumption log, double-counting prevention log, and full
        calculation audit trail with SHA-256 verification.
      format: "html"
      template_file: "templates/assurance_evidence_package.jinja2"
      enabled: true

    - id: investor_disclosure
      display_name: "Investor-Grade Disclosure Package"
      description: >-
        Comprehensive investor disclosure combining executive summary,
        Scope 3 inventory (all 15 categories), SBTi progress, scenario
        analysis, climate risk assessment, supplier programme results,
        and assurance status. Designed for inclusion in annual reports,
        sustainability reports, and investor presentations.
      format: "pdf"
      template_file: "templates/investor_disclosure.jinja2"
      enabled: true

    - id: base_year_recalculation_log
      display_name: "Base-Year Recalculation Log"
      description: >-
        Detailed log of all base-year recalculation triggers assessed,
        significance calculations, recalculation decisions (recalculate
        or not), recalculated values, and rationale documentation for
        each decision. Serves as audit evidence per GHG Protocol.
      format: "html"
      template_file: "templates/base_year_recalculation_log.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (12 integrations)
  # ===========================================================================
  integrations:
    - id: enterprise_orchestrator
      name: "Enterprise Pipeline Orchestrator"
      description: >-
        16-phase master pipeline orchestrating the full enterprise Scope 3
        workflow. Inherits PACK-042 12-phase pipeline and extends with
        maturity assessment, LCA integration, multi-entity consolidation,
        SBTi tracking, scenario analysis, climate risk, supplier programme,
        base-year recalculation, and assurance readiness phases. Implements
        DAG-based dependency resolution with parallel entity processing.
      required: true

    - id: pack042_bridge
      name: "PACK-042 Scope 3 Starter Bridge"
      description: >-
        Inherits all PACK-042 capabilities: 10 engines (spend screening,
        spend classification, category calculation, double-counting,
        hotspot, supplier engagement, data quality, uncertainty, compliance,
        reporting), 8 workflows, 10 templates, and 12 integrations. Routes
        core Scope 3 calculations through PACK-042 pipeline and receives
        category-level results for enterprise processing.
      required: true

    - id: pack041_bridge
      name: "PACK-041 Scope 1-2 Data Bridge"
      description: >-
        Inherits PACK-042 scope12_bridge and extends with multi-entity
        Scope 1/2 data aggregation for SBTi coverage ratios and TCFD
        scenario analysis.
      required: true

    - id: lca_database_bridge
      name: "LCA Database Bridge"
      description: >-
        Connects to LCA databases: ecoinvent 3.10 (via ecoquery API),
        GaBi (via ts:navigator), ELCD (via ILCD format), and custom
        databases (via GreenLang LCA adapter). Retrieves process-level
        emission factors with full provenance (process ID, system model,
        geography, temporal validity). Caches frequently accessed factors.
      required: true

    - id: sbti_api_bridge
      name: "SBTi API Bridge"
      description: >-
        Optional integration with SBTi API for target validation,
        sector pathway data retrieval, and FLAG commodity pathway
        reference tables. Supports SBTi target submission workflow.
      required: false

    - id: tcfd_issb_bridge
      name: "TCFD/ISSB Scenario Bridge"
      description: >-
        Connects to climate scenario data sources: IEA World Energy
        Outlook (NZE 2050, APS, STEPS), NGFS climate scenarios (orderly,
        disorderly, hot house), and custom scenarios. Retrieves sector-
        specific decarbonisation pathways and carbon price trajectories.
      required: true

    - id: cdp_supply_chain_bridge
      name: "CDP Supply Chain Bridge"
      description: >-
        Integrates with CDP Supply Chain programme for supplier-specific
        emission data collection. Retrieves supplier CDP Climate Change
        responses, maps to Scope 3 categories, and tracks supplier
        SBTi target adoption.
      required: false

    - id: pcaf_database_bridge
      name: "PCAF Database Bridge"
      description: >-
        Connects to PCAF emission factor database and tools for Category
        15 financed emissions across six asset classes. Retrieves
        investee-level emissions data, calculates attribution factors,
        and produces PCAF data quality scores.
      required: false

    - id: cloud_carbon_bridge
      name: "Cloud Carbon Footprint Bridge"
      description: >-
        Integrates with cloud provider carbon APIs (AWS Customer Carbon
        Footprint Tool, Microsoft Sustainability Calculator, Google
        Cloud Carbon Footprint) for technology sector Cat 1 and Cat 11
        cloud infrastructure emissions.
      required: false

    - id: verifier_data_room
      name: "Verifier Data Room Bridge"
      description: >-
        Manages secure verifier access to assurance evidence packages.
        Provides role-based read-only access to calculation audit trails,
        provenance hashes, methodology documentation, and supporting
        evidence. Tracks verifier access and queries for audit.
      required: false

    - id: health_check
      name: "Enterprise Health Check"
      description: >-
        Extended health check covering PACK-042 health check (18 checks)
        plus enterprise components: LCA database connectivity, SBTi API
        status, TCFD scenario data availability, PCAF database status,
        multi-entity configuration, consolidation boundary validation,
        assurance readiness score, and maturity level assessment.
      required: true

    - id: setup_wizard
      name: "Enterprise Setup Wizard"
      description: >-
        14-step guided configuration: PACK-042 Base Config -> Maturity
        Assessment -> LCA Database Selection -> SBTi Target Parameters ->
        Scenario Analysis Setup -> Multi-Entity Boundary -> JV/Franchise
        Thresholds -> Supplier Programme Design -> Climate Risk Parameters
        -> Base-Year Policy -> PCAF Asset Classes (if financial) ->
        Assurance Target -> Reporting Configuration -> Preset Customisation.
      required: false

  # ===========================================================================
  # Presets - Sector-specific enterprise configurations (8 presets)
  # ===========================================================================
  presets:
    - id: enterprise_manufacturing
      name: "Enterprise Manufacturing Preset"
      description: >-
        Large manufacturer with complex multi-tier supply chain, circular
        economy initiatives, LCA integration for product-level emission
        factors, EPD support, and SBTi SDA pathway alignment. Multi-entity
        with 5+ production facilities.
      sector_focus: "MANUFACTURING"
      file: "config/presets/enterprise_manufacturing.yaml"

    - id: financial_institution
      name: "Financial Institution Preset"
      description: >-
        Bank or insurer with PCAF Category 15 financed emissions across
        six asset classes, investment portfolio decarbonisation tracking,
        TCFD scenario analysis with climate VaR, stranded asset analysis,
        and SBTi Financial Sector guidance.
      sector_focus: "FINANCIAL_SERVICES"
      file: "config/presets/financial_institution.yaml"

    - id: retail_chain
      name: "Retail Chain Preset"
      description: >-
        Retail chain with last-mile delivery modelling, packaging lifecycle
        analysis, product returns emissions, CDP Supply Chain integration
        for 200+ suppliers, and SBTi supplier engagement cascade.
      sector_focus: "RETAIL"
      file: "config/presets/retail_chain.yaml"

    - id: technology_enterprise
      name: "Technology Enterprise Preset"
      description: >-
        Technology company with cloud infrastructure carbon footprint (AWS,
        Azure, GCP), SaaS product use-phase modelling, hardware lifecycle
        LCA, and economic intensity SBTi targets.
      sector_focus: "TECHNOLOGY"
      file: "config/presets/technology_enterprise.yaml"

    - id: energy_company
      name: "Energy Company Preset"
      description: >-
        Energy sector with Cat 3 (upstream fuel) and Cat 11 (sold energy
        use) dominant. Paris alignment with IEA NZE pathway, transition
        risk with carbon price escalation, stranded asset analysis, and
        SBTi SDA for energy sector.
      sector_focus: "ENERGY"
      file: "config/presets/energy_company.yaml"

    - id: food_beverage
      name: "Food & Beverage Preset"
      description: >-
        Food and beverage with agricultural supply chain, SBTi FLAG
        pathway for seven commodity groups, deforestation-free supply
        chain tracking, land use change emissions, and mass-based
        allocation for agricultural commodities.
      sector_focus: "FOOD_BEVERAGE"
      file: "config/presets/food_beverage.yaml"

    - id: multi_entity_group
      name: "Multi-Entity Group Preset"
      description: >-
        Corporate group with 50+ entities, joint ventures with proportional
        equity share, franchise inclusion, inter-company emission
        elimination, multi-currency consolidation, and entity-level
        reporting.
      sector_focus: "MULTI_ENTITY"
      file: "config/presets/multi_entity_group.yaml"

    - id: advanced_reporter
      name: "Advanced Reporter Preset"
      description: >-
        Generic advanced reporter with 2+ years of Scope 3 experience,
        upgrading from PACK-042. Balanced enterprise configuration with
        LCA, SBTi, scenarios, and assurance. Sector-neutral starting point.
      sector_focus: "GENERAL"
      file: "config/presets/advanced_reporter.yaml"

