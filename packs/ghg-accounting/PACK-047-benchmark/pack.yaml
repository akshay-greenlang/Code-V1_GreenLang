        description: "Multi-dimensional peer group construction with GICS/NACE/ISIC cross-mapping"
      - name: "ScopeNormalisationEngine"
        file: "engines/scope_normalisation_engine.py"
        description: "Scope boundary, GWP version, currency, and period harmonisation"
      - name: "ExternalDatasetEngine"
        file: "engines/external_dataset_engine.py"
        description: "CDP, TPI, GRESB, CRREM, ISS ESG data ingestion and caching"
      - name: "PathwayAlignmentEngine"
        file: "engines/pathway_alignment_engine.py"
        description: "Multi-pathway alignment (IEA, IPCC, SBTi, OECM, TPI, CRREM)"
      - name: "ImpliedTemperatureRiseEngine"
        file: "engines/implied_temperature_rise_engine.py"
        description: "Budget-based, sector-relative, and rate-of-reduction ITR"
      - name: "TrajectoryBenchmarkingEngine"
        file: "engines/trajectory_benchmarking_engine.py"
        description: "Multi-year CARR, convergence, acceleration trajectory analysis"
      - name: "PortfolioBenchmarkingEngine"
