  min_platform_version: "1.0.0"

description:
  short: "Multi-entity corporate GHG consolidation with equity share, operational control, financial control approaches, inter-company elimination, M&A handling, and multi-framework regulatory reporting"
  long: |
    PACK-050 provides the complete multi-entity corporate GHG consolidation
    lifecycle per GHG Protocol Corporate Standard Chapter 3. It enables
    registration of subsidiaries, joint ventures, associates, divisions,
    branches, SPVs, franchises, and partnerships in a hierarchical entity
    registry with multi-tier ownership chain tracking. The pack implements
    all three GHG Protocol consolidation approaches (equity share,
    operational control, financial control) with automatic boundary
    determination based on ownership structure and control relationships.
    Inter-company emission eliminations prevent double-counting of energy
    transfers, waste transfers, product transfers, and service transfers
    between group entities. M&A event handling covers acquisitions,
    divestitures, mergers, demergers, JV formations, and JV dissolutions
    with pro-rata apportionment by calendar days, reporting months, or
    financial quarters. Adjustment and restatement processing supports
    methodology changes, error corrections, scope reclassifications,
    timing adjustments, and late submissions with full audit trail.
    Group reporting generates consolidated GHG inventories with entity
    breakdowns, ownership waterfall, elimination logs, M&A impact
    analysis, scope breakdowns, trend analysis, and regulatory-specific
    outputs for CSRD/ESRS E1, CDP, GRI 305, TCFD, SEC Climate, SBTi,
    IFRS S2, UK SECR, and NGER.

regulatory_basis:
  - framework: "GHG Protocol Corporate Standard"
    description: "Chapter 3: Setting Organisational Boundaries - equity share, operational control, financial control consolidation approaches"
  - framework: "ISO 14064-1:2018"
    description: "Clause 5: Organisational boundaries; Clause 6: Reporting boundaries for consolidated inventories"
  - framework: "EU CSRD / ESRS E1"
    description: "Consolidated GHG reporting across value chain for EU-regulated entities"
  - framework: "US SEC Climate Rules"
    description: "Registrant-level consolidated GHG disclosure including Scope 1/2 with assurance requirements"
  - framework: "IFRS S2"
    description: "Climate-related financial disclosures at consolidated reporting entity level"
  - framework: "GRI 305"
    description: "Consolidated organisational GHG emissions reporting (305-1, 305-2, 305-3)"
  - framework: "CDP"
    description: "Corporate climate questionnaire - consolidated emissions (C6/C7)"
  - framework: "SBTi"
    description: "Science Based Targets - consolidated base year inventory and boundary requirements"
  - framework: "PCAF Global Standard"
    description: "Data quality scoring for financial institution portfolio consolidation"

