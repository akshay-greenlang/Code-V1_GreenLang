# PACK-050 Preset: JV Partnership
# JV-heavy corporate structure with equity share focus, partner
# reconciliation, proportional allocation, and JV governance tracking.
# Typical users: Oil & gas JVs, mining consortia, infrastructure PPPs.

entity_registry:
  max_entities: 500
  entity_types_enabled:
    - SUBSIDIARY
    - JOINT_VENTURE
    - ASSOCIATE
    - PARTNERSHIP
  lifecycle_tracking: true
  hierarchy_depth_limit: 5
  require_legal_entity_id: true
  require_country_code: true
  custom_attributes_enabled: true
  auto_classify_ownership: true

ownership:
  multi_tier_enabled: true
  max_chain_depth: 5
  effective_equity_method: MULTIPLICATIVE
  circular_ownership_detection: true
  minority_interest_threshold_pct: 10.0
  associate_threshold_pct: 20.0
  require_evidence_for_control: true
  track_ownership_changes: true

boundary:
  consolidation_approach: EQUITY_SHARE
  materiality_threshold: ONE_PCT
  materiality_threshold_pct: 0.01
  de_minimis_threshold_pct: 0.005
  annual_boundary_lock: true
  track_boundary_changes: true
  require_boundary_approval: true
  dual_approach_enabled: true
  secondary_approach: OPERATIONAL_CONTROL

equity_share:
  default_equity_pct: 50.0
  round_equity_to_dp: 4
  include_associates: true
  include_minority_interests: true
  waterfall_reconciliation: true
  proportional_scope3: true

control_approach:
  control_test_method: COMBINED
  franchise_inclusion: false
  leased_asset_treatment: CASE_BY_CASE
  spv_consolidation: false
  jv_control_override: true
  document_control_basis: true

elimination:
  elimination_enabled: true
  elimination_types:
    - ENERGY_TRANSFER
    - WASTE_TRANSFER
    - PRODUCT_TRANSFER
    - SERVICE_TRANSFER
  require_matching_entries: true
  tolerance_pct: 3.0
  auto_detect_transfers: true
  elimination_log_enabled: true
  net_to_zero_validation: true

mna:
  mna_tracking_enabled: true
  pro_rata_method: CALENDAR_DAYS
  auto_base_year_recalculation: true
  base_year_materiality_trigger_pct: 3.0
  require_mna_approval: true
  track_mna_history: true
  event_types_enabled:
    - ACQUISITION
    - DIVESTITURE
    - JV_FORMATION
    - JV_DISSOLUTION
  lookback_years: 7

adjustment:
  require_justification: true
  require_approval: true
  materiality_threshold_pct: 0.5
  restatement_window_years: 5
  late_submission_grace_days: 45
  track_adjustment_history: true

reporting:
  reporting_frameworks:
    - CSRD_ESRS_E1
    - CDP
    - GRI_305
    - SBTI
  default_format: HTML
  include_entity_breakdown: true
  include_scope_breakdown: true
  include_trend_analysis: true
  trend_years: 5
  include_elimination_log: true
  include_mna_impact: true

audit:
  audit_trail_enabled: true
  reconciliation_checks_enabled: true
  variance_threshold_pct: 3.0
  require_sign_off: true
  sign_off_levels: 2
  evidence_retention_years: 10
  assurance_ready: true
  data_quality_scoring: true
