  regulation:
    primary:
      name: "GHG Protocol Corporate Standard"
      reference: "GHG Protocol Corporate Accounting and Reporting Standard (Revised Edition, 2015)"
      effective_date: "2015-01-01"
      description: >-
        The GHG Protocol Corporate Standard is the most widely used greenhouse
        gas accounting standard globally. It provides the framework for Scope 1
        and Scope 2 emission quantification, organisational boundary setting,
        base year management, and reporting requirements. This pack implements
        Chapters 3-8 of the Corporate Standard and the Scope 2 Guidance
        supplement, ensuring complete compliance with dual-reporting
        requirements, quality criteria for contractual instruments, and
        inventory quality management principles.

    secondary:
      - name: "GHG Protocol Scope 2 Guidance"
        reference: "GHG Protocol Scope 2 Guidance (2015)"
        effective_date: "2015-01-01"
      - name: "ISO 14064-1:2018"
        reference: "ISO 14064-1:2018"
        effective_date: "2018-12-01"
      - name: "EU CSRD / ESRS E1"
        reference: "Delegated Regulation (EU) 2023/2772, ESRS E1"
        effective_date: "2024-01-01"
      - name: "CDP Climate Change Questionnaire"
        reference: "CDP Climate Change 2026"
        effective_date: "2026-01-01"
      - name: "SBTi Corporate Net-Zero Standard"
        reference: "SBTi v1.1"
        effective_date: "2023-01-01"
      - name: "US SEC Climate Disclosure Rules"
        reference: "SEC Regulation S-K Item 1505"
        effective_date: "2024-03-06"
      - name: "California SB 253"
        reference: "SB 253 Climate Corporate Data Accountability Act"
        effective_date: "2026-01-01"
      - name: "IPCC 2006 Guidelines for National GHG Inventories"
        reference: "IPCC 2006 (2019 Refinement)"
        effective_date: "2006-01-01"

  compliance_references:
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol Corporate Accounting and Reporting Standard (Revised Edition)"
      effective_date: "2015-01-01"
      description: >-
        This pack fully implements the GHG Protocol Corporate Standard for
        Scope 1 and Scope 2 emissions. It covers organisational boundary
        setting (equity share, operational control, financial control),
        operational boundary definition across all seven gases, quantification
        using IPCC tiered methodology, base year management with structural
        and methodological recalculation triggers, and reporting per the
        standard's disclosure requirements. The inventory output directly
        populates GHG Protocol reporting templates.

    - id: "GHG_PROTOCOL_SCOPE2"
      name: "GHG Protocol Scope 2 Guidance"
      regulation: "GHG Protocol Scope 2 Guidance (2015)"
      effective_date: "2015-01-01"
      description: >-
        Implements the Scope 2 Guidance in full, including mandatory dual
        reporting of both location-based and market-based Scope 2 figures.
        Supports contractual instrument hierarchy (energy attribute
        certificates, direct contracts, supplier-specific factors, residual
        mix factors). Validates instrument quality criteria: contractual
        relationship, unique claim, vintage match, geographic match, and
        certificate tracking system registration.

    - id: "ISO_14064"
      name: "ISO 14064-1:2018"
      regulation: "ISO 14064-1:2018"
      effective_date: "2018-12-01"
      description: >-
        Maps inventory output to ISO 14064-1:2018 structure including
        Clause 5.2 (organisational boundaries), Clause 5.3 (reporting
        boundaries), Clause 6 (quantification of GHG emissions and
        removals by source category). The uncertainty analysis module
        supports ISO 14064-1 Clause 6.3 requirements for uncertainty
        assessment at the individual source and total inventory level.

    - id: "ESRS_E1"
      name: "EU CSRD / ESRS E1 Climate Change"
      regulation: "Delegated Regulation (EU) 2023/2772, ESRS E1"
      effective_date: "2024-01-01"
      description: >-
        Maps inventory data to ESRS E1 disclosure requirements: E1-6
        (gross Scope 1 GHG emissions), E1-7 (gross Scope 2 GHG emissions
        with location-based and market-based figures), and supporting
        datapoints for consolidation approach, emission factor sources,
        GWP values used, gases included, percentage from regulated ETS,
        and biogenic CO2 breakdown. Supports ESRS 1 Appendix C materiality
        assessment for climate change topic.

    - id: "CDP"
      name: "CDP Climate Change Questionnaire"
      regulation: "CDP Climate Change 2026"
      effective_date: "2026-01-01"
      description: >-
        Maps inventory to CDP Climate Change questionnaire sections:
        C6.1 (Scope 1 total), C6.2 (Scope 1 by country), C6.3 (Scope 1
        by GHG type), C6.4 (Scope 1 by activity), C6.5 (methodology and
        emission factors), C7.1 (Scope 2 location-based), C7.2 (Scope 2
        market-based), C7.3-C7.5 (Scope 2 by country, activity, and
        contractual instruments). Supports C5 emissions methodology
        disclosure and C10 verification status.

    - id: "SBTI"
      name: "Science Based Targets initiative"
      regulation: "SBTi Corporate Net-Zero Standard v1.1"
      effective_date: "2023-01-01"
      description: >-
        Provides the Scope 1+2 emissions baseline and annual tracking
        required for SBTi near-term target setting and progress monitoring.
        Supports absolute contraction approach and physical intensity
        targets. Calculates year-on-year reduction rate and cumulative
        reduction against the SBTi-required 4.2% per annum linear
        reduction pathway for 1.5C alignment.

    - id: "SEC"
      name: "US SEC Climate Disclosure Rules"
      regulation: "SEC Regulation S-K Item 1505"
      effective_date: "2024-03-06"
      description: >-
        Maps Scope 1 and Scope 2 emissions to SEC climate disclosure
        requirements under Regulation S-K Item 1505. Supports the
        materiality-based disclosure threshold, disaggregation by gas
        type, and exclusion of de minimis sources below the 5%
        significance threshold. Provides attestation-ready data with
        full calculation methodology documentation.

    - id: "SB_253"
      name: "California SB 253"
      regulation: "SB 253 Climate Corporate Data Accountability Act"
      effective_date: "2026-01-01"
      description: >-
        Supports California SB 253 annual reporting requirements for
        entities with total revenues exceeding USD 1 billion. Provides
        Scope 1 and Scope 2 emissions quantified per GHG Protocol
        Corporate Standard with third-party assurance-ready data
        packages including methodology notes, emission factor sources,
        and calculation audit trails.

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines (10 GHG inventory engines)
  # ===========================================================================
  engines:
    - id: inventory_consolidation
      name: "Inventory Consolidation Engine"
      description: >-
        Consolidates emissions from all 13 MRV agents into a unified GHG
        inventory. Implements three consolidation approaches: equity share
        (proportional allocation by ownership percentage for each
        subsidiary, JV, and associate), operational control (100% of
        emissions from operations where the reporting entity has authority
        to introduce and implement operating policies), and financial
        control (100% of emissions from entities where the reporting entity
        directs financial and operating policies). Handles multi-entity
        consolidation with elimination of intra-group transfers. Produces
        consolidated Scope 1 totals by category and gas, and consolidated
        Scope 2 totals by method (location-based and market-based).
        Applies significance thresholds for source exclusion with
        documented rationale per GHG Protocol Chapter 7 completeness
        requirements. Calculates percentage of total emissions covered
        by each methodology tier.
        Zero-hallucination: arithmetic aggregation and proportional
        allocation, no LLM in any consolidation calculation.
      class: "InventoryConsolidationEngine"
      file: "engines/inventory_consolidation_engine.py"
      required: true

    - id: emission_factor_management
      name: "Emission Factor Management Engine"
      description: >-
        Manages the emission factor hierarchy for all Scope 1 and Scope 2
        sources. Implements a multi-source hierarchy: facility-specific
        measured data (Tier 3), supplier-provided factors (Tier 2), and
        published national/international databases (Tier 1). Supports
        emission factor sources: IPCC 2006/2019 Refinement, DEFRA/DESNZ
        UK Government GHG Conversion Factors, US EPA Emission Factors Hub,
        UBA (German Federal Environment Agency), ADEME (French Agency for
        Ecological Transition), ISPRA (Italian Institute for Environmental
        Protection), IEA Emission Factors, and custom supplier-specific
        factors. Tracks factor vintage (publication year), geographic scope,
        and applicability conditions. Applies unit conversion automatically
        (kgCO2e/kWh, kgCO2e/litre, kgCO2e/tonne, kgCO2e/m3). Generates
        emission factor provenance reports showing source, vintage, and
        geographic match for each factor used.
        Zero-hallucination: factor values from published databases with
        full citation, no LLM in factor selection or application.
      class: "EmissionFactorManagementEngine"
      file: "engines/emission_factor_management_engine.py"
      required: true

    - id: gwp_conversion
      name: "GWP Conversion Engine"
      description: >-
        Converts individual GHG masses to CO2-equivalent using Global
        Warming Potential (GWP) values from IPCC Assessment Reports.
        Supports three GWP source configurations: AR4 (IPCC 2007, 100-year
        GWP used by Kyoto Protocol and some national inventories), AR5
        (IPCC 2014, 100-year GWP used by GHG Protocol and Paris Agreement
        reporting), and AR6 (IPCC 2021, 100-year GWP, latest values).
        Covers all seven Kyoto basket gases: CO2 (GWP=1), CH4 (AR5=28,
        AR6=27.9), N2O (AR5=265, AR6=273), plus full HFC, PFC, SF6, and
        NF3 species. Handles gas blends and refrigerant mixtures (e.g.,
        R-410A = 50% R-32 + 50% R-125). Produces GWP conversion audit
        trail showing input mass per gas, GWP value applied, source AR,
        and resulting CO2e.
        Zero-hallucination: GWP values from published IPCC tables with
        table and page references, no LLM.
      class: "GWPConversionEngine"
      file: "engines/gwp_conversion_engine.py"
      required: true

    - id: boundary_assessment
      name: "Boundary Assessment Engine"
      description: >-
        Assesses organisational and operational boundaries for the GHG
        inventory. Organisational boundary: maps legal entity structure,
        identifies subsidiaries, joint ventures, and associates, assigns
        consolidation approach per entity. Operational boundary: identifies
        all Scope 1 emission sources (stationary combustion, mobile
        combustion, process, fugitive, refrigerant, land use, waste
        treatment, agricultural) and Scope 2 sources (purchased
        electricity, steam/heat, cooling) across all facilities and
        operations. Conducts source completeness assessment: maps each
        source against the seven gases, identifies sources below
        significance threshold (default 1% of total), and documents
        exclusion rationale. Generates boundary documentation suitable
        for verification (ISO 14064-3) and assurance engagements.
        Zero-hallucination: boundary mapping from organisational data,
        threshold arithmetic from summed emissions, no LLM.
      class: "BoundaryAssessmentEngine"
      file: "engines/boundary_assessment_engine.py"
      required: true

    - id: uncertainty_analysis
      name: "Uncertainty Analysis Engine"
      description: >-
        Quantifies uncertainty in the GHG inventory at source, scope, and
        total inventory level. Implements Monte Carlo simulation with
        configurable iteration count (default 10,000). Assigns probability
        distributions to activity data uncertainty (metered = narrow
        normal, estimated = wider normal, spend-based = lognormal) and
        emission factor uncertainty (IPCC default ranges by source
        category). Propagates uncertainty through the calculation chain
        using error propagation rules (IPCC 2006 Vol. 1 Ch. 3) or full
        Monte Carlo simulation. Produces 95% confidence intervals for
        Scope 1 total, Scope 2 location-based, Scope 2 market-based, and
        combined Scope 1+2. Generates uncertainty contribution analysis
        showing which sources contribute most to total inventory
        uncertainty. Supports sensitivity analysis varying emission factors
        and activity data independently.
        Zero-hallucination: Monte Carlo from numpy random distributions,
        propagation from IPCC formulas, no LLM.
      class: "UncertaintyAnalysisEngine"
      file: "engines/uncertainty_analysis_engine.py"
      required: true

    - id: base_year_management
      name: "Base Year Management Engine"
      description: >-
        Manages base year inventory and recalculation triggers per GHG
        Protocol Chapter 5. Stores the original base year inventory with
        full source-level detail. Monitors recalculation triggers:
        structural changes (acquisitions, divestitures, mergers exceeding
        the significance threshold), methodology changes (emission factor
        updates, calculation methodology improvements), discovery of
        significant errors (exceeding the recalculation threshold,
        typically 5% of base year total). Performs base year recalculation
        by applying current methodology to historical activity data.
        Maintains recalculation log with trigger description, date, and
        impact on base year figures. Generates base year recalculation
        report with before/after comparison and explanation of changes.
        Zero-hallucination: threshold comparisons and recalculation from
        stored activity data, no LLM.
      class: "BaseYearManagementEngine"
      file: "engines/base_year_management_engine.py"
      required: true

    - id: trend_analysis
      name: "Trend Analysis Engine"
      description: >-
        Analyses emission trends across reporting years from the base year
        to the current period. Calculates absolute emissions trend (total
        tCO2e by scope and category, year-on-year change, CAGR).
        Calculates intensity metrics: emissions per revenue (tCO2e/MEUR),
        per employee (tCO2e/FTE), per floor area (tCO2e/m2), per unit
        produced (tCO2e/unit), and custom denominators. Decomposes changes
        using the Kaya identity and LMDI decomposition into activity
        effect, structure effect, and intensity effect. Generates trend
        charts and tables for multi-year reporting. Calculates linear
        reduction rate and compares to SBTi required trajectory (4.2% p.a.
        for 1.5C). Projects future emissions under business-as-usual and
        target scenarios.
        Zero-hallucination: trend calculations from time-series arithmetic,
        LMDI from published decomposition methodology, no LLM.
      class: "TrendAnalysisEngine"
      file: "engines/trend_analysis_engine.py"
      required: true

    - id: compliance_mapping
      name: "Compliance Mapping Engine"
      description: >-
        Maps the consolidated inventory to seven regulatory frameworks
        simultaneously from a single dataset. Generates framework-specific
        output structures: GHG Protocol disclosure template (Scope 1 by
        category and gas, Scope 2 location and market), ISO 14064-1
        quantification report (Categories 1-2 per Clause 5.2/5.3),
        ESRS E1-6 and E1-7 disclosure datapoints, CDP C6/C7 response
        data, SBTi progress tracking against near-term targets, SEC
        Item 1505 emission figures with materiality assessment, and
        SB 253 annual report data. Handles framework-specific requirements:
        ESRS biogenic CO2 separate disclosure, CDP country-level
        disaggregation, SEC de minimis threshold, SBTi target pathway
        comparison.
        Zero-hallucination: mapping rules from framework documentation,
        no LLM in data mapping or aggregation.
      class: "ComplianceMappingEngine"
      file: "engines/compliance_mapping_engine.py"
      required: true

    - id: inventory_qaqc
      name: "Inventory QA/QC Engine"
      description: >-
        Implements GHG Protocol Chapter 7 quality management procedures.
        Performs automated QA/QC checks: completeness check (all identified
        sources have quantified emissions), consistency check (year-on-year
        change within expected range, no unexplained jumps exceeding 20%),
        accuracy check (emission factors from approved sources, correct
        unit conversion, GWP values match configured AR), transparency
        check (all assumptions documented, all emission factors cited,
        all exclusions justified). Generates QA/QC checklist with
        pass/fail/warning status per check. Flags data quality issues
        requiring resolution before inventory sign-off. Supports multi-
        level review workflow (preparer, reviewer, approver).
        Zero-hallucination: rule-based checks from GHG Protocol quality
        criteria, no LLM.
      class: "InventoryQAQCEngine"
      file: "engines/inventory_qaqc_engine.py"
      required: true

    - id: inventory_reporting
      name: "Inventory Reporting Engine"
      description: >-
        Generates comprehensive GHG inventory reports in multiple formats.
        Executive summary: total Scope 1 and Scope 2 emissions, year-on-
        year change, intensity metrics, key sources, and reduction
        highlights. Detailed inventory: source-level breakdown by facility,
        category, gas, and methodology tier with emission factor citations.
        Compliance reports: framework-specific output for each configured
        framework (GHG Protocol, ISO 14064, ESRS E1, CDP, SBTi, SEC,
        SB 253). Verification package: data and methodology documentation
        suitable for third-party assurance per ISO 14064-3 or ISAE 3410.
        Supports output formats: HTML, PDF-ready HTML, JSON, CSV, and
        structured XBRL-ready data for ESRS digital reporting.
        Zero-hallucination: report content from calculated inventory data,
        narrative templates with placeholders, no LLM in data content.
      class: "InventoryReportingEngine"
      file: "engines/inventory_reporting_engine.py"
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 GHG inventory workflows)
  # ===========================================================================
  workflows:
    - id: annual_inventory
      name: "Annual Inventory Workflow"
      description: >-
        6-phase workflow for complete annual GHG inventory: Phase 1 -
        Boundary Review (confirm organisational boundary, update entity
        list, review operational boundary for new/changed sources) ->
        Phase 2 - Data Collection (collect activity data for all Scope 1
        and Scope 2 sources across all facilities, validate data quality)
        -> Phase 3 - Emission Calculation (run all 13 MRV agents with
        configured methodology tier and emission factors) -> Phase 4 -
        Consolidation (aggregate by entity, facility, scope, category,
        and gas; apply consolidation approach) -> Phase 5 - QA/QC
        (automated checks, reviewer sign-off, issue resolution) ->
        Phase 6 - Reporting (generate executive summary, detailed
        inventory, compliance reports, verification package).
      schedule: "annual"
      estimated_duration_minutes: 480
      phases: 6

    - id: quarterly_update
      name: "Quarterly Update Workflow"
      description: >-
        4-phase workflow for quarterly emissions tracking: Phase 1 -
        Data Collection (collect quarterly activity data for material
        sources, estimate missing data from prior periods) -> Phase 2 -
        Calculation (run MRV agents for updated sources, annualise for
        trend comparison) -> Phase 3 - Consolidation (update year-to-date
        totals, compare to prior year quarter) -> Phase 4 - Dashboard
        (update tracking dashboard with quarterly figures, variance
        analysis, year-end projection).
      schedule: "quarterly"
      estimated_duration_minutes: 120
      phases: 4

    - id: base_year_recalculation
      name: "Base Year Recalculation Workflow"
      description: >-
        4-phase workflow for base year recalculation: Phase 1 - Trigger
        Assessment (identify recalculation trigger: acquisition, divestiture,
        methodology change, or error discovery; assess significance against
        threshold) -> Phase 2 - Historical Data Retrieval (retrieve base
        year activity data, apply current emission factors and methodology)
        -> Phase 3 - Recalculation (recalculate base year inventory with
        updated methodology, compare to original) -> Phase 4 -
        Documentation (generate recalculation report with trigger
        description, methodology change explanation, before/after
        comparison, and impact on trend analysis).
      schedule: "on_demand"
      estimated_duration_minutes: 240
      phases: 4

    - id: verification_preparation
      name: "Verification Preparation Workflow"
      description: >-
        5-phase workflow for third-party verification preparation: Phase 1 -
        Data Compilation (compile all activity data with source
        documentation: invoices, meter readings, fuel records) -> Phase 2 -
        Methodology Documentation (document calculation methodology per
        source, emission factor sources and vintage, GWP values, and
        assumptions) -> Phase 3 - QA/QC Completion (run full QA/QC check
        suite, resolve all critical and major issues) -> Phase 4 -
        Verification Package Assembly (assemble verification pack per
        ISO 14064-3 or ISAE 3410: management assertion, inventory report,
        supporting evidence, uncertainty assessment) -> Phase 5 -
        Readiness Review (internal review of verification package
        completeness, mock verification walkthrough).
      schedule: "annual"
      estimated_duration_minutes: 360
      phases: 5

    - id: scope2_instrument_review
      name: "Scope 2 Instrument Review Workflow"
      description: >-
        3-phase workflow for reviewing Scope 2 contractual instruments:
        Phase 1 - Instrument Inventory (catalogue all contractual
        instruments: PPAs, RECs, GOs, green tariffs, supplier contracts
        with emission data) -> Phase 2 - Quality Assessment (validate
        each instrument against GHG Protocol Scope 2 Guidance quality
        criteria: unique claim, vintage match, geographic scope, tracking
        system registration) -> Phase 3 - Allocation (allocate instruments
        to consumption, calculate market-based Scope 2, reconcile with
        location-based figure, document delta explanation).
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 3

    - id: emission_factor_update
      name: "Emission Factor Update Workflow"
      description: >-
        3-phase workflow for annual emission factor updates: Phase 1 -
        Factor Check (compare current factors against latest published
        versions: DEFRA annual update, IEA annual release, national
        registry updates) -> Phase 2 - Impact Assessment (calculate
        impact of factor changes on inventory: total change in tCO2e,
        percentage change by scope and category, assessment of whether
        change constitutes a methodology change triggering base year
        recalculation) -> Phase 3 - Factor Update (apply updated factors,
        document changes, update factor provenance records).
      schedule: "annual"
      estimated_duration_minutes: 60
      phases: 3

    - id: source_significance
      name: "Source Significance Assessment Workflow"
      description: >-
        3-phase workflow for assessing source significance: Phase 1 -
        Source Enumeration (list all identified Scope 1 and Scope 2
        sources by facility and category) -> Phase 2 - Significance
        Screening (estimate emissions for each source using Tier 1
        approach, calculate percentage of estimated total, compare to
        significance threshold) -> Phase 3 - Methodology Assignment
        (assign methodology tier based on significance: material sources
        above threshold use Tier 2/3, immaterial sources below threshold
        may use Tier 1, document exclusion rationale for sources below
        de minimis threshold).
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 3

    - id: full_inventory_pipeline
      name: "Full Inventory Pipeline Workflow"
      description: >-
        10-phase end-to-end inventory pipeline: Phase 1 - Health Check
        (verify all agents, databases, and emission factors available) ->
        Phase 2 - Configuration Loading (load pack config, preset, and
        overrides) -> Phase 3 - Boundary Assessment (organisational and
        operational boundaries, source significance) -> Phase 4 - Data
        Acquisition (activity data collection and quality validation) ->
        Phase 5 - Scope 1 Calculation (run 8 Scope 1 MRV agents) ->
        Phase 6 - Scope 2 Calculation (run 5 Scope 2 MRV agents) ->
        Phase 7 - GWP Conversion and Consolidation (apply GWP, aggregate
        by entity/scope/category/gas) -> Phase 8 - Uncertainty Analysis
        (Monte Carlo simulation, confidence intervals) -> Phase 9 -
        QA/QC (automated checks, completeness, consistency) -> Phase 10 -
        Reporting (executive summary, detailed inventory, compliance
        mapping, verification package).
      schedule: "annual"
      estimated_duration_minutes: 600
      phases: 10

  # ===========================================================================
  # Templates - Pre-built report and output templates (10 GHG inventory templates)
  # ===========================================================================
  templates:
    - id: executive_summary
      display_name: "GHG Inventory Executive Summary"
      description: >-
        C-suite executive summary with total Scope 1 and Scope 2
        emissions (location-based and market-based), year-on-year change
        (absolute and percentage), key intensity metrics, top five
        emission sources by magnitude, reduction highlights, and SBTi
        progress tracker. One-page format with charts and KPI cards.
      format: "html"
      template_file: "templates/executive_summary.jinja2"
      enabled: true

    - id: detailed_inventory
      display_name: "Detailed GHG Inventory Report"
      description: >-
        Comprehensive inventory report with source-level emissions by
        facility, category, gas, and methodology tier. Includes emission
        factor citations, activity data sources, calculation methodology
        description per source, assumptions register, and data quality
        indicators. Suitable for internal technical review and verifier
        examination.
      format: "html"
      template_file: "templates/detailed_inventory.jinja2"
      enabled: true

    - id: scope1_breakdown
      display_name: "Scope 1 Breakdown Report"
      description: >-
        Detailed Scope 1 report with emissions by category (stationary
        combustion, mobile combustion, process, fugitive, refrigerant,
        land use, waste treatment, agricultural), by gas (CO2, CH4, N2O,
        HFCs, PFCs, SF6, NF3), by facility, and by methodology tier.
        Includes pie and bar chart visualisations and category
        contribution analysis.
      format: "html"
      template_file: "templates/scope1_breakdown.jinja2"
      enabled: true

    - id: scope2_dual_report
      display_name: "Scope 2 Dual Reporting Report"
      description: >-
        Scope 2 report presenting both location-based and market-based
        figures with reconciliation. Shows electricity consumption by
        facility, grid emission factors used (location-based), contractual
        instruments applied (market-based), instrument quality assessment,
        and location-vs-market delta analysis with explanation.
      format: "html"
      template_file: "templates/scope2_dual_report.jinja2"
      enabled: true

    - id: compliance_esrs_e1
      display_name: "ESRS E1 Climate Disclosure Report"
      description: >-
        ESRS E1-compliant disclosure report with datapoints E1-6 (gross
        Scope 1), E1-7 (gross Scope 2 location and market), biogenic CO2
        breakdown, ETS-covered percentage, consolidation approach, gases
        included, GWP source, emission factor sources, and base year
        information. Structured for direct inclusion in the CSRD
        sustainability statement.
      format: "html"
      template_file: "templates/compliance_esrs_e1.jinja2"
      enabled: true

    - id: compliance_cdp
      display_name: "CDP Climate Response Report"
      description: >-
        CDP Climate Change questionnaire response data for sections C5
        (emissions methodology), C6 (Scope 1 emissions), and C7 (Scope 2
        emissions). Provides structured data for C6.1 total, C6.2 by
        country, C6.3 by gas, C6.4 by activity, C7.1 location-based,
        C7.2 market-based, C7.3-C7.5 breakdowns. Ready for direct
        entry into the CDP online response system.
      format: "html"
      template_file: "templates/compliance_cdp.jinja2"
      enabled: true

    - id: uncertainty_report
      display_name: "Uncertainty Analysis Report"
      description: >-
        Uncertainty analysis report showing 95% confidence intervals for
        Scope 1, Scope 2 (location and market), and total inventory.
        Includes Monte Carlo distribution histograms, source-level
        uncertainty contribution analysis, sensitivity tornado diagrams,
        and uncertainty reduction recommendations prioritised by impact.
      format: "html"
      template_file: "templates/uncertainty_report.jinja2"
      enabled: true

    - id: trend_analysis_report
      display_name: "Trend Analysis Report"
      description: >-
        Multi-year trend analysis showing absolute emissions by scope
        and category, intensity metrics (per revenue, employee, m2, unit),
        CAGR, year-on-year change decomposition (activity, structure,
        intensity effects), SBTi pathway comparison, and business-as-
        usual projection.
      format: "html"
      template_file: "templates/trend_analysis.jinja2"
      enabled: true

    - id: verification_package
      display_name: "Verification Package"
      description: >-
        Comprehensive verification package for third-party assurance per
        ISO 14064-3 or ISAE 3410. Includes management assertion letter,
        inventory report, methodology documentation, emission factor
        register with provenance, activity data evidence register,
        assumptions register, QA/QC checklist, and uncertainty assessment.
      format: "html"
      template_file: "templates/verification_package.jinja2"
      enabled: true

    - id: base_year_report
      display_name: "Base Year Report"
      description: >-
        Base year inventory report with full source-level detail,
        recalculation history (trigger, date, impact, before/after),
        and comparison of current methodology applied to base year data.
        Includes base year policy documentation and recalculation
        threshold configuration.
      format: "html"
      template_file: "templates/base_year_report.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (12 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        10-phase master pipeline: Health Check -> Configuration Loading ->
        Boundary Assessment -> Data Acquisition -> Scope 1 Calculation
        (8 agents in dependency order) -> Scope 2 Calculation (5 agents
        with dual reporting) -> GWP Conversion and Consolidation ->
        Uncertainty Analysis -> QA/QC -> Reporting and Compliance Mapping.
        Implements DAG-based dependency resolution across the 13 MRV
        agents, parallel execution where possible (e.g., stationary and
        mobile combustion in parallel), and error recovery with partial
        result preservation.
      required: true

    - id: mrv_scope1_bridge
      name: "MRV Scope 1 Bridge"
      description: >-
        Routes activity data to all 8 Scope 1 MRV agents and collects
        emission results. Manages agent execution order: stationary
        combustion and mobile combustion run in parallel, followed by
        process emissions, fugitive emissions, and refrigerants in
        parallel, then land use, waste treatment, and agricultural in
        parallel. Normalises output format across all agents for
        consolidation.
      required: true

    - id: mrv_scope2_bridge
      name: "MRV Scope 2 Bridge"
      description: >-
        Routes electricity, steam, heat, and cooling consumption data
        to Scope 2 MRV agents. Runs location-based and market-based
        agents in parallel, followed by steam/heat and cooling in
        parallel, and finally dual reporting reconciliation. Manages
        contractual instrument allocation across facilities.
      required: true

    - id: data_intake_bridge
      name: "Data Intake Bridge"
      description: >-
        Connects to AGENT-DATA agents for activity data intake. Routes
        fuel invoices through DATA-001 (PDF extraction), meter data
        through DATA-002 (Excel/CSV normalization), ERP financial data
        through DATA-003, API-sourced emission factors through DATA-004.
        Applies data quality profiling via DATA-010 and outlier detection
        via DATA-013 on all incoming activity data.
      required: true

    - id: erp_finance_bridge
      name: "ERP/Finance Bridge"
      description: >-
        Connects to ERP and financial systems for automated activity data
        retrieval: fuel purchase records, utility invoices, fleet fuel
        cards, refrigerant purchase and disposal records, production
        output data for intensity metrics. Supports SAP, Oracle,
        Microsoft Dynamics, and generic REST/ODBC connectors.
      required: false

    - id: emission_factor_bridge
      name: "Emission Factor Database Bridge"
      description: >-
        Connects to emission factor databases for automated factor
        retrieval and updates. Integrates with DEFRA/DESNZ annual
        publication, US EPA eGRID, IEA annual factors, and national
        registry APIs. Maintains local factor cache with vintage tracking
        and update notifications.
      required: true

    - id: grid_factor_bridge
      name: "Grid Emission Factor Bridge"
      description: >-
        Retrieves grid-average and marginal emission factors for Scope 2
        location-based calculations. Supports country-level, regional,
        and sub-national grid factors. Sources: IEA, eGRID (US), AIB
        residual mix (EU), DEFRA (UK), UBA (DE), and custom utility-
        specific factors.
      required: true

    - id: instrument_registry_bridge
      name: "Instrument Registry Bridge"
      description: >-
        Connects to contractual instrument registries for Scope 2 market-
        based accounting. Integrates with Guarantee of Origin (GO)
        registries (AIB Hub, national issuing bodies), REC tracking
        systems (M-RETS, NEPOOL-GIS, WREGIS, Green-e), and PPA contract
        management systems. Validates instrument quality criteria per
        GHG Protocol Scope 2 Guidance.
      required: false

    - id: weather_data_bridge
      name: "Weather Data Bridge"
      description: >-
        Retrieves weather data for heating and cooling degree day
        calculations supporting weather-normalised trend analysis.
        Integrates with NOAA, Meteostat, and national weather services.
        Calculates HDD and CDD at configurable base temperatures for
        energy normalisation.
      required: false

    - id: health_check
      name: "Health Check"
      description: >-
        15-category system verification: all 13 MRV agents operational,
        emission factor database current, GWP tables loaded, database
        connectivity, agent dependency status, preset validation,
        template integrity, instrument registry connectivity, grid
        factor currency, and deployment readiness.
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        8-step guided configuration: Company Profile (name, sector, size)
        -> Organisational Boundary (consolidation approach, entity list)
        -> Operational Boundary (Scope 1 sources, Scope 2 sources) ->
        Emission Factor Configuration (preferred sources, GWP selection)
        -> Scope 2 Instruments (PPAs, RECs, GOs) -> Base Year Setup
        (year, recalculation threshold) -> Reporting Configuration
        (frequency, frameworks, formats) -> Preset Selection and
        Customisation.
      required: false

    - id: alert_bridge
      name: "Alert Bridge"
      description: >-
        Multi-channel notification: data quality alerts (missing activity
        data, outlier detection), emission factor update notifications,
        base year recalculation triggers, QA/QC check failures, deadline
        reminders (reporting period close, verification preparation),
        and SBTi trajectory deviation warnings.
      required: false

  # ===========================================================================
  # Presets - Sector-specific configurations (8 presets)
  # ===========================================================================
  presets:
    - id: corporate_office
      name: "Corporate Office Preset"
      description: >-
        Configuration for office-based organisations where Scope 2
        (purchased electricity) typically dominates the inventory. Scope 1
        limited to heating (natural gas boilers) and small refrigerant
        charges in building HVAC. Intensity metrics focused on per
        employee and per m2. Suitable for financial services, technology,
        consulting, and professional services firms.
      sector_type: "OFFICE"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/corporate_office.yaml"

    - id: manufacturing
      name: "Manufacturing Preset"
      description: >-
        Configuration for industrial manufacturing with significant
        Scope 1 from stationary combustion (process heat, steam
        generation), process emissions, and potentially fugitive
        emissions. All Scope 1 categories enabled with higher
        methodology tiers for material sources. Intensity metrics
        focused on per unit produced and per revenue.
      sector_type: "MANUFACTURING"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/manufacturing.yaml"

    - id: energy_utility
      name: "Energy Utility Preset"
      description: >-
        Configuration for power generation and energy distribution
        utilities with large-scale stationary combustion, process
        emissions (e.g., CO2 from desulphurisation), and SF6 from
        electrical switchgear. Typically the largest absolute Scope 1
        emitters. ETS-covered emissions percentage tracked for ESRS.
      sector_type: "ENERGY_UTILITY"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/energy_utility.yaml"

    - id: transport_logistics
      name: "Transport & Logistics Preset"
      description: >-
        Configuration for fleet operators and logistics companies where
        mobile combustion dominates Scope 1. Covers road freight, rail,
        marine, and aviation fuel. Intensity metrics focused on per
        tonne-km, per vehicle-km, and per consignment. Well-to-tank
        factors included for complete lifecycle view.
      sector_type: "TRANSPORT_LOGISTICS"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/transport_logistics.yaml"

    - id: food_agriculture
      name: "Food & Agriculture Preset"
      description: >-
        Configuration for agricultural operations and food processing
        with agricultural emissions (livestock, manure, rice cultivation,
        fertiliser application), land use emissions, and process emissions
        from food production. CH4 and N2O are significant gases alongside
        CO2. All Scope 1 categories enabled including agricultural.
      sector_type: "FOOD_AGRICULTURE"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/food_agriculture.yaml"

    - id: real_estate
      name: "Real Estate Preset"
      description: >-
        Configuration for property portfolios and REIT companies with
        multiple buildings. Scope 2 dominant from tenant electricity
        (operational control determines boundary). Scope 1 from central
        heating plant and refrigerants in HVAC. Consolidation approach
        is typically operational or financial control. Intensity per m2
        GLA (gross leasable area) is the primary metric.
      sector_type: "REAL_ESTATE"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/real_estate.yaml"

    - id: healthcare
      name: "Healthcare Preset"
      description: >-
        Configuration for hospital and healthcare systems with 24/7
        operation. Significant Scope 1 from large central heating
        plant, backup generators, medical gas (N2O anaesthetic),
        refrigerants in extensive HVAC and refrigeration (laboratories,
        pharmacies). Scope 2 from high electricity consumption for
        medical equipment, lighting, HVAC, and data systems.
      sector_type: "HEALTHCARE"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - uncertainty_analysis
        - base_year_management
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/healthcare.yaml"

    - id: sme_simplified
      name: "SME Simplified Preset"
      description: >-
        Simplified configuration for small and medium enterprises with
        limited data availability. Scope 1 limited to heating and
        company vehicles. Scope 2 from electricity only. Tier 1
        methodology throughout. Simplified uncertainty analysis.
        Compliance mapping limited to GHG Protocol and optionally
        SB 253. Annual reporting only with executive summary focus.
      sector_type: "SME"
      enabled_engines:
        - inventory_consolidation
        - emission_factor_management
        - gwp_conversion
        - boundary_assessment
        - trend_analysis
        - compliance_mapping
        - inventory_qaqc
        - inventory_reporting
      file: "config/presets/sme_simplified.yaml"

