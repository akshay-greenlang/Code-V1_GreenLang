# =============================================================================
# PACK-041: Scope 1-2 Complete Pack
# GreenLang GHG Accounting Pack for Complete Scope 1 & Scope 2 GHG Inventory
# =============================================================================
# This pack delivers a production-ready, verification-grade GHG inventory for
# Scope 1 (direct) and Scope 2 (indirect energy) emissions. It orchestrates
# all 13 MRV agents -- 8 Scope 1 agents covering stationary combustion,
# mobile combustion, process emissions, fugitive emissions, refrigerant and
# F-gas losses, land use emissions, waste treatment emissions, and
# agricultural emissions; plus 5 Scope 2 agents covering location-based
# electricity, market-based electricity, steam and heat purchase, cooling
# purchase, and dual-reporting reconciliation.
#
# The pack follows a zero-hallucination approach: all emission calculations
# use deterministic formulas from GHG Protocol, IPCC 2006/2019, and national
# inventory methodologies. No LLM is used in any calculation path. GWP values
# are configurable across AR4, AR5, and AR6. Emission factors are sourced
# from IPCC, DEFRA, EPA, UBA, ADEME, ISPRA, IEA, and supplier-specific
# databases with full provenance tracking.
#
# The inventory output maps directly to seven regulatory frameworks:
#   1. GHG Protocol Corporate Standard (Chapters 4-8)
#   2. ISO 14064-1:2018 (Clauses 5.2, 5.3, 6)
#   3. EU CSRD / ESRS E1 (E1-6 gross Scope 1, E1-7 gross Scope 2)
#   4. CDP Climate Change Questionnaire (C6.1-C6.5, C7.1-C7.9)
#   5. SBTi Corporate Net-Zero Standard (Scope 1+2 near-term targets)
#   6. US SEC Climate Disclosure Rules (Regulation S-K Item 1505)
#   7. California SB 253 (Scope 1+2 annual reporting from 2026)
#
# Key Capabilities:
#   - Organisational boundary setting (equity share, operational control,
#     financial control) with consolidation across subsidiaries
#   - Source completeness assessment with significance thresholds
#   - Multi-tier methodology support (Tier 1 spend-based through Tier 3
#     facility-specific measurement) per IPCC 2006 Guidelines
#   - Emission factor management with multi-source hierarchy and vintage
#     tracking (IPCC, DEFRA, EPA, UBA, ADEME, ISPRA, IEA, supplier)
#   - GWP conversion with AR4 (IPCC 2007), AR5 (IPCC 2014), AR6 (IPCC 2021)
#   - Seven-gas coverage: CO2, CH4, N2O, HFCs, PFCs, SF6, NF3
#   - Scope 2 dual reporting per GHG Protocol Scope 2 Guidance (2015)
#   - Instrument-based allocation for contractual instruments (PPAs, RECs,
#     Guarantees of Origin, green tariffs)
#   - Base year management with recalculation triggers and threshold rules
#   - Trend analysis with absolute and intensity metrics (per revenue,
#     per employee, per m2, per unit produced)
#   - Monte Carlo uncertainty quantification at source, scope, and total
#     inventory level
#   - Full audit trail with SHA-256 provenance hashing on every calculation
#   - Multi-framework compliance mapping from a single inventory dataset
#
# Consolidation Approaches:
#   EQUITY_SHARE: Proportional consolidation by ownership percentage
#   OPERATIONAL_CONTROL: 100% of emissions from operations under control
#   FINANCIAL_CONTROL: 100% of emissions from entities financially controlled
#
# Sector Presets:
#   corporate_office - Office-based organisations (Scope 2 dominant)
#   manufacturing - Industrial manufacturing (Scope 1 dominant, process)
#   energy_utility - Power generation and distribution utilities
#   transport_logistics - Fleet and logistics operators (mobile combustion)
#   food_agriculture - Agricultural operations and food processing
#   real_estate - Property portfolios and REIT companies
#   healthcare - Hospital and healthcare systems
#   sme_simplified - Simplified inventory for small-medium enterprises
#
# Version History:
#   1.0.0 - Initial release (2026-03-24)
# =============================================================================

