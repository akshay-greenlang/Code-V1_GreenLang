    max_facilities: 1000
    target_duration_per_facility_minutes: 2
    stationary_combustion_per_source_ms: 50
    mobile_combustion_per_vehicle_ms: 30
    process_emission_per_source_ms: 100
    fugitive_per_component_ms: 20
    refrigerant_per_system_ms: 50
  scope2_calculation:
    max_facilities: 1000
    target_duration_per_facility_minutes: 1
    location_based_per_meter_ms: 30
    market_based_per_contract_ms: 50
    dual_reporting_reconciliation_ms: 100
  consolidation:
    max_entities: 500
    consolidation_per_entity_ms: 100
    total_consolidation_target_seconds: 60
  uncertainty_analysis:
    monte_carlo_10k_iterations_seconds: 30
    sensitivity_per_parameter_ms: 200
    target_duration_minutes: 5
  compliance_mapping:
    framework_mapping_per_framework_ms: 500
    total_mapping_target_seconds: 10
  reporting:
    executive_summary_generation_ms: 2000
    detailed_inventory_generation_ms: 5000
    verification_package_generation_ms: 10000
  cache_hit_ratio_target: 0.85
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with entity-level and facility-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
  required_roles:
    - ghg_manager
    - sustainability_officer
    - facility_manager
    - data_analyst
    - verifier
    - viewer
    - admin
  audit_events:
    - "inventory.boundary.updated"
    - "inventory.data.imported"
    - "inventory.scope1.calculated"
    - "inventory.scope2.calculated"
    - "inventory.consolidated"
    - "inventory.uncertainty.analysed"
    - "inventory.qaqc.completed"
    - "inventory.report.generated"
    - "inventory.base_year.recalculated"
    - "inventory.emission_factor.updated"
    - "inventory.instrument.allocated"
    - "inventory.config.modified"
    - "inventory.preset.loaded"
    - "inventory.verified"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_stationary_combustion.json"
    - "tests/fixtures/sample_mobile_fleet.json"
    - "tests/fixtures/sample_refrigerant_log.json"
    - "tests/fixtures/sample_electricity_consumption.json"
    - "tests/fixtures/sample_contractual_instruments.json"
    - "tests/fixtures/sample_entity_hierarchy.json"

# -----------------------------------------------------------------------------
# Compliance Framework Mappings
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      coverage: "Chapters 3-8: boundary, quantification, base year, reporting"
    - id: "GHG_PROTOCOL_SCOPE2"
      name: "GHG Protocol Scope 2 Guidance"
      coverage: "Dual reporting, instrument quality, residual mix"
    - id: "ISO_14064"
      name: "ISO 14064-1:2018"
      coverage: "Clauses 5.2, 5.3, 6: boundaries, quantification, reporting"
    - id: "ESRS_E1"
      name: "ESRS E1 Climate Change"
      coverage: "E1-6 Scope 1, E1-7 Scope 2, biogenic CO2, ETS percentage"
    - id: "CDP"
      name: "CDP Climate Change"
      coverage: "C5 methodology, C6 Scope 1, C7 Scope 2, C10 verification"
    - id: "SBTI"
      name: "Science Based Targets initiative"
      coverage: "Scope 1+2 baseline, annual tracking, 4.2% p.a. pathway"
    - id: "SEC"
      name: "US SEC Climate Disclosure"
      coverage: "Regulation S-K Item 1505, materiality threshold, attestation"
    - id: "SB_253"
      name: "California SB 253"
      coverage: "Annual Scope 1+2 reporting per GHG Protocol"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
    min_connections: 15
    recommended_connections: 40

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_emission_factor_database
    - verify_gwp_tables
    - verify_grid_factor_database
    - verify_mrv_agents_available

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
    new:
      - "V326__pack041_scope12_001"
      - "V327__pack041_scope12_002"
      - "V328__pack041_scope12_003"
      - "V329__pack041_scope12_004"
      - "V330__pack041_scope12_005"
      - "V331__pack041_scope12_006"
      - "V332__pack041_scope12_007"
      - "V333__pack041_scope12_008"
      - "V334__pack041_scope12_009"
      - "V335__pack041_scope12_010"

  post_install:
    - seed_emission_factors
    - seed_gwp_tables
    - seed_grid_factors
    - seed_residual_mix_factors
    - seed_gas_species_registry
    - validate_preset_configs

