    5 Scope 2) into a unified pipeline producing consolidated emissions,
    multi-framework compliance reports, and full audit trails. Covers all
    seven GHG Protocol gases (CO2, CH4, N2O, HFCs, PFCs, SF6, NF3) across
    stationary combustion, mobile combustion, process emissions, fugitive
    emissions, refrigerant losses, land use, waste treatment, agricultural
    emissions, location-based and market-based electricity, steam and heat,
