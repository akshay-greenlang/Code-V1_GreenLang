# =============================================================================
# PACK-041 Scope 1-2 Complete - SME Simplified Preset
# =============================================================================
# Simplified configuration for small and medium enterprises with limited
# data availability and resource constraints. Scope 1 limited to natural
# gas heating and company vehicles. Scope 2 from electricity only. Tier 1
# methodology throughout using published default emission factors.
# Simplified uncertainty analysis. Reporting focused on executive summary
# and GHG Protocol compliance with optional SB 253 support.
#
# Typical use cases:
#   - Small offices (under 50 employees)
#   - Independent retailers and shops
#   - Small workshops and light manufacturing
#   - Professional services firms
#   - Startups and technology scale-ups
#   - Small hospitality businesses
#
# Typical emission profile:
#   Scope 1: 25-50% of total (gas heating, company cars)
#   Scope 2: 50-75% of total (purchased electricity)
#   Key gases: CO2 (>98%)
#   Typical intensity: 0.5-2.0 tCO2e per FTE
# =============================================================================

# --- Organisation Details ---
company_name: ""
facility_name: ""
sector_type: "SME"
country: "DE"
reporting_year: 2026

# --- Boundary ---
boundary:
  consolidation_approach: "OPERATIONAL_CONTROL"
  significance_threshold_pct: 5.0
  de_minimis_threshold_pct: 2.0
  include_biogenic_co2: false
  include_ets_breakdown: false

# --- Source Completeness ---
source_completeness:
  require_all_scope1_categories: false
  require_dual_reporting: true
  minimum_source_coverage_pct: 90.0
  document_exclusions: true

# --- Scope 1 ---
scope1:
  stationary_combustion_enabled: true
  stationary_combustion_tier: "TIER_1"
  mobile_combustion_enabled: true
  mobile_combustion_tier: "TIER_1"
  process_emissions_enabled: false
  process_emissions_tier: "TIER_1"
  fugitive_emissions_enabled: false
  fugitive_emissions_tier: "TIER_1"
  refrigerant_fgas_enabled: false
  refrigerant_fgas_tier: "TIER_1"
  land_use_enabled: false
  land_use_tier: "TIER_1"
  waste_treatment_enabled: false
  waste_treatment_tier: "TIER_1"
  agricultural_enabled: false
  agricultural_tier: "TIER_1"

# --- Scope 2 ---
scope2:
  dual_reporting: true
  location_based_enabled: true
  market_based_enabled: true
  steam_heat_enabled: false
  cooling_enabled: false
  instrument_allocation: false
  grid_ef_source: "IEA"
  residual_mix_enabled: true
  validate_instrument_quality: false

# --- Emission Factors ---
emission_factors:
  preferred_sources:
    - "DEFRA"
    - "IEA"
    - "IPCC"
  gwp_source: "AR5"
  allow_supplier_factors: false
  allow_facility_factors: false
  factor_vintage_max_years: 5
  auto_update_factors: true

# --- Uncertainty ---
uncertainty:
  enabled: false
  monte_carlo_iterations: 5000
  confidence_level: 0.95
  include_activity_data_uncertainty: true
  include_emission_factor_uncertainty: true
  sensitivity_analysis: false
  contribution_analysis: false

# --- Base Year ---
base_year:
  year: 2024
  recalculation_threshold_pct: 10.0
  auto_detect_triggers: false
  rolling_base_year: false
  fixed_base_year: true

# --- Trend Analysis ---
trend_analysis:
  enabled: true
  intensity_metrics:
    - "tCO2e/FTE"
    - "tCO2e/MEUR_revenue"
  lmdi_decomposition: false
  sbti_pathway_comparison: false
  projection_years: 3

# --- Compliance ---
compliance:
  frameworks:
    - "GHG_PROTOCOL"
  esrs_biogenic_co2: false
  esrs_ets_percentage: false
  cdp_country_disaggregation: false
  cdp_gas_disaggregation: false
  sec_materiality_threshold: false
  sbti_target_tracking: false
  sb253_reporting: false

# --- Reporting ---
reporting:
  frequency: "ANNUAL"
  formats:
    - "HTML"
  executive_summary: true
  detailed_inventory: false
  verification_package: false
  output_language: "en"
  include_methodology_notes: true
  include_emission_factor_register: false

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: false
  assumption_tracking: true
  data_lineage_enabled: false
  retention_years: 3
  emission_factor_citation: true
