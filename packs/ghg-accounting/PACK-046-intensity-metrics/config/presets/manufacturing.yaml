# =============================================================================
# PACK-046 Intensity Metrics - Manufacturing Preset
# =============================================================================
# Industrial manufacturing facilities where physical output (tonnes or units)
# is the primary intensity denominator. SBTi SDA pathways (e.g., steel,
# cement, aluminium) provide science-based targets. LMDI decomposition
# separates production volume, product mix, and efficiency effects.
#
# Typical use cases:
#   - Automotive and automotive component manufacturing
#   - Chemical and pharmaceutical manufacturing
#   - Metal fabrication and steel processing
#   - Cement, glass, and ceramics production
#   - Electronics and semiconductor manufacturing
#
# Typical emission profile:
#   Scope 1: 50-80% of total (process heat, process emissions)
#   Scope 2: 20-50% of total (electricity for motors, processes)
#   Key intensity metric: tCO2e / tonne output
#   Typical range: 0.1-10 tCO2e / tonne (highly sector-dependent)
# =============================================================================

# --- Metadata ---
metadata:
  preset_name: "manufacturing"
  description: "Manufacturing with physical output intensity and SBTi SDA pathway alignment"
  sector: "MANUFACTURING"
  pack_id: "PACK-046"
  version: "1.0.0"

# --- Denominator Management ---
denominator:
  selected_denominators:
    - "tonnes_output"
    - "units_produced"
    - "revenue_meur"
    - "mwh_consumed"
  primary_denominator: "tonnes_output"
  validation_rules:
    require_non_zero: true
    require_positive: true
    max_year_over_year_change_pct: 30.0
    require_same_period: true
  unit_preferences:
    currency: "EUR"
    mass: "tonne"

# --- Intensity Calculation ---
intensity_calculation:
  scope_inclusion: "SCOPE_1_2_LOCATION"
  decimal_places: 4
  weighted_average_method: "ACTIVITY_WEIGHTED"
  null_handling: "EXCLUDE"
  exclude_negative_denominators: true
  include_biogenic: false
  separate_location_market: true

# --- LMDI Decomposition ---
decomposition:
  method: "LMDI_I_ADDITIVE"
  include_activity_effect: true
  include_structure_effect: true
  include_intensity_effect: true
  multi_level: true
  decomposition_levels:
    - "product_line"
    - "facility"
    - "process"
  zero_handling: "SMALL_VALUE"

# --- Benchmarking ---
benchmark:
  sources:
    - "CDP"
    - "TPI"
  peer_group_criteria:
    same_sector: true
    same_region: false
    revenue_range_pct: 50.0
    min_peers: 5
  update_frequency: "ANNUAL"
  percentile_thresholds:
    - 10
    - 25
    - 50
    - 75
    - 90

# --- SBTi SDA Target ---
target:
  pathway: "WELL_BELOW_2C"
  base_year: 2020
  target_years:
    - 2025
    - 2030
    - 2035
    - 2040
    - 2050
  sector: "steel"
  convergence_approach: "SDA"
  annual_progress_tracking: true
  include_scope_3_target: false

# --- Trend Analysis ---
trend:
  rolling_window: 5
  projection_years: 10
  regression_model: "OLS"
  significance_level: 0.05
  min_data_points: 3
  detect_structural_breaks: true

# --- Scenario Analysis ---
scenario:
  scenario_types:
    - "EFFICIENCY"
    - "GROWTH"
    - "METHODOLOGY"
  monte_carlo_iterations: 10000
  confidence_levels:
    - 0.90
    - 0.95
  growth_rate_assumptions:
    production_annual_pct: 3.0
    revenue_annual_pct: 4.0
  efficiency_improvement_pct: 3.0

# --- Uncertainty ---
uncertainty:
  propagation_method: "MONTE_CARLO"
  confidence_interval: 0.95
  monte_carlo_iterations: 10000
  include_denominator_uncertainty: true

# --- Disclosure Mapping ---
disclosure:
  frameworks:
    - "ESRS_E1"
    - "CDP"
    - "SBTI"
    - "GRI"
    - "ISO_14064"
  mandatory_only: false
  xbrl_taxonomy: "ESRS_2024"
  include_methodology_notes: true
  include_data_quality_notes: true

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "CSV"
  sections:
    - "executive_summary"
    - "intensity_results"
    - "trend_analysis"
    - "decomposition"
    - "benchmarking"
    - "target_progress"
    - "uncertainty"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true

# --- Integration ---
integration:
  pack041_enabled: true
  pack042_enabled: true
  pack043_enabled: false
  pack044_enabled: true
  pack045_enabled: true
  erp_connector_enabled: true
  benchmark_api_enabled: false

# --- Audit ---
audit:
  sha256_provenance: true
  track_all_changes: true
  evidence_retention_years: 10
  log_calculation_inputs: true
