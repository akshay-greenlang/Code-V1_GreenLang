# =============================================================================
# PACK-046 Intensity Metrics - Food & Agriculture Preset
# =============================================================================
# Food and agricultural operations where emissions per tonne of product
# (or per hectare) is the primary intensity metric. SBTi FLAG (Forest,
# Land, and Agriculture) pathway provides the science-based target curve.
# Decomposition separates commodity mix, yield improvements, and land
# use change effects across farm types and regions.
#
# Typical use cases:
#   - Crop farming and arable operations
#   - Dairy and livestock farming
#   - Food processing and manufacturing
#   - Agricultural commodity traders
#   - Integrated food and beverage companies
#
# Typical emission profile:
#   Scope 1: 40-70% of total (fertiliser, enteric fermentation, machinery)
#   Scope 2: 5-15% of total (irrigation, processing electricity)
#   Scope 3: 20-50% of total (upstream inputs, land use change)
#   Key intensity metric: tCO2e / tonne product
#   Typical range: 0.3-5.0 tCO2e / tonne (commodity-dependent)
# =============================================================================

# --- Metadata ---
metadata:
  preset_name: "food_agriculture"
  description: "Food and agriculture with tCO2e/tonne product, SBTi FLAG pathway"
  sector: "FOOD_AGRICULTURE"
  pack_id: "PACK-046"
  version: "1.0.0"

# --- Denominator Management ---
denominator:
  selected_denominators:
    - "tonnes_output"
    - "hectare_crop"
    - "tonnes_protein"
    - "revenue_meur"
  primary_denominator: "tonnes_output"
  validation_rules:
    require_non_zero: true
    require_positive: true
    max_year_over_year_change_pct: 40.0
    require_same_period: true
  unit_preferences:
    currency: "EUR"
    mass: "tonne"
    area: "ha"

# --- Intensity Calculation ---
intensity_calculation:
  scope_inclusion: "SCOPE_1_2_3"
  scope_3_categories:
    - 1
    - 3
    - 4
    - 5
  decimal_places: 4
  weighted_average_method: "ACTIVITY_WEIGHTED"
  null_handling: "EXCLUDE"
  exclude_negative_denominators: true
  include_biogenic: true
  separate_location_market: true

# --- LMDI Decomposition ---
decomposition:
  method: "LMDI_I_ADDITIVE"
  include_activity_effect: true
  include_structure_effect: true
  include_intensity_effect: true
  multi_level: true
  decomposition_levels:
    - "commodity"
    - "farm_type"
    - "region"
  zero_handling: "SMALL_VALUE"

# --- Benchmarking ---
benchmark:
  sources:
    - "CDP"
  peer_group_criteria:
    same_sector: true
    same_region: false
    revenue_range_pct: 75.0
    min_peers: 5
  update_frequency: "ANNUAL"
  percentile_thresholds:
    - 10
    - 25
    - 50
    - 75
    - 90

# --- SBTi SDA Target ---
target:
  pathway: "ONE_POINT_FIVE_C"
  base_year: 2020
  target_years:
    - 2025
    - 2030
    - 2035
    - 2040
    - 2050
  sector: "flag_agriculture"
  convergence_approach: "SDA"
  annual_progress_tracking: true
  include_scope_3_target: true

# --- Trend Analysis ---
trend:
  rolling_window: 5
  projection_years: 10
  regression_model: "OLS"
  significance_level: 0.05
  min_data_points: 3
  detect_structural_breaks: true
  seasonal_adjustment: true

# --- Scenario Analysis ---
scenario:
  scenario_types:
    - "EFFICIENCY"
    - "GROWTH"
    - "STRUCTURAL"
  monte_carlo_iterations: 10000
  confidence_levels:
    - 0.90
    - 0.95
  growth_rate_assumptions:
    production_annual_pct: 2.0
    revenue_annual_pct: 3.0
  efficiency_improvement_pct: 1.5

# --- Uncertainty ---
uncertainty:
  propagation_method: "MONTE_CARLO"
  confidence_interval: 0.95
  monte_carlo_iterations: 10000
  include_denominator_uncertainty: true

# --- Disclosure Mapping ---
disclosure:
  frameworks:
    - "ESRS_E1"
    - "CDP"
    - "SBTI"
    - "GRI"
  mandatory_only: false
  xbrl_taxonomy: "ESRS_2024"
  include_methodology_notes: true
  include_data_quality_notes: true

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "CSV"
  sections:
    - "executive_summary"
    - "intensity_results"
    - "trend_analysis"
    - "decomposition"
    - "benchmarking"
    - "target_progress"
    - "uncertainty"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true

# --- Integration ---
integration:
  pack041_enabled: true
  pack042_enabled: true
  pack043_enabled: false
  pack044_enabled: true
  pack045_enabled: true
  erp_connector_enabled: false
  benchmark_api_enabled: false

# --- Audit ---
audit:
  sha256_provenance: true
  track_all_changes: true
  evidence_retention_years: 7
  log_calculation_inputs: true
