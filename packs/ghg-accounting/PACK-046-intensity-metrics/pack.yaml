# =============================================================================
# Compliance Framework Mapping
# =============================================================================
compliance:
  frameworks:
    - name: "ESRS E1 (Climate Change)"
      reference: "Delegated Regulation 2023/2772"
      disclosures:
        - code: "E1-6"
          name: "Gross Scopes 1, 2, 3 and Total GHG emissions"
          field: "GHG intensity per net revenue (tCO2e/MEUR)"
          mandatory: true
        - code: "E1-6"
          name: "Sector-specific physical intensity"
          field: "Sector-dependent (kgCO2e/m2, gCO2/kWh, etc.)"
          mandatory: true
          condition: "where applicable per sector ESRS"

    - name: "CDP Climate Change"
      reference: "CDP 2026 Questionnaire"
      disclosures:
        - code: "C6.10"
          name: "Scope 1+2 emissions intensity"
          field: "Figure, metric denominator, metric numerator, % change, direction, reason"
          mandatory: true
        - code: "Sector modules"
          name: "Sector-specific physical intensity"
          field: "Sector-dependent"
          mandatory: true
          condition: "sector questionnaire respondents"

    - name: "SEC Climate Disclosure"
      reference: "Final Rule 33-11275 (2024)"
      disclosures:
        - code: "Item 1504"
          name: "GHG intensity metrics"
          field: "As used internally by the registrant"
          mandatory: false
          condition: "if the registrant uses GHG intensity metrics"

    - name: "SBTi Sectoral Decarbonisation Approach"
      reference: "SBTi Corporate Manual (2023)"
      disclosures:
        - code: "SDA"
          name: "Sector intensity pathway"
          field: "Sector-specific physical intensity with convergence targets"
          mandatory: true
          condition: "for intensity targets using SDA"

    - name: "ISO 14064-1:2018"
      reference: "ISO (2018)"
      disclosures:
        - code: "Clause 9.3"
          name: "GHG intensity ratios"
          field: "Organisation-chosen intensity denominators"
          mandatory: false
          condition: "recommended"

    - name: "TCFD Recommendations"
      reference: "FSB/TCFD (2017)"
      disclosures:
        - code: "Metrics"
          name: "Normalised metrics per industry"
          field: "Industry-specific intensity measures"
          mandatory: false
          condition: "recommended"

    - name: "GRI 305-4"
      reference: "GRI Standards (2016, updated 2023)"
      disclosures:
        - code: "305-4"
          name: "GHG emissions intensity"
          field: "Intensity ratio, gases included, scopes"
          mandatory: false
          condition: "if material"

    - name: "IFRS S2"
      reference: "ISSB (2023)"
      disclosures:
        - code: "Climate"
          name: "Intensity metrics"
