# =============================================================================
# PACK-046: Intensity Metrics Pack
# GreenLang GHG Accounting Pack for Comprehensive Intensity Analytics
# =============================================================================
# This pack delivers a production-ready, verification-grade intensity metrics
# system covering the full lifecycle of GHG intensity analysis as required by
# ESRS E1-6, SBTi Sectoral Decarbonisation Approach (SDA), CDP Climate Change,
# SEC Climate Disclosure Rules, ISO 14064-1:2018, TCFD, GRI 305-4, and IFRS S2.
#
# The pack orchestrates ten specialised engines -- denominator registry,
# intensity calculation, LMDI decomposition, peer benchmarking, SBTi SDA
# target pathway, trend analysis, scenario modelling, uncertainty quantification,
# multi-framework disclosure mapping, and reporting.
#
# The pack follows a zero-hallucination approach: all intensity calculations,
# decomposition analyses, benchmarking comparisons, and target pathway
# computations use deterministic formulas from established methodologies
# (Ang 2004/2015 LMDI, SBTi SDA convergence, IPCC uncertainty propagation).
# No LLM is used in any calculation path. Denominators, emission factors,
# and benchmark data are from authoritative sources with full provenance.
#
# The pack complements and extends the GreenLang GHG accounting suite:
#   - PACK-041 (Scope 1-2 Complete) provides Scope 1+2 emission calculations
#   - PACK-042 (Scope 3 Starter) provides upstream Scope 3 calculations
#   - PACK-043 (Scope 3 Complete) provides full value chain calculations
#   - PACK-044 (Inventory Management) provides governance and workflows
#   - PACK-045 (Base Year Management) provides base year lifecycle
#   - PACK-046 (this pack) provides intensity metrics and analytics
#
# Intensity metrics normalise absolute emissions by business activity
# denominators (revenue, FTE, m2, tonnes produced, MWh generated, etc.)
# enabling meaningful comparison across time periods, peer organisations,
# and science-based decarbonisation pathways. Without rigorous intensity
# analysis, organisations cannot distinguish genuine efficiency gains from
# cosmetic effects of growth or structural change.
#
# The intensity output maps directly to eight regulatory frameworks:
#   1. ESRS E1-6 (mandatory GHG intensity per net revenue + sector physical)
#   2. SBTi SDA (Sectoral Decarbonisation Approach intensity pathways)
#   3. CDP Climate Change C6.10 (revenue intensity) + sector modules
#   4. SEC Climate Disclosure Rules Item 1504 (intensity if used internally)
#   5. ISO 14064-1:2018 Clause 9.3 (GHG intensity ratios)
#   6. TCFD Recommendations (normalised metrics per industry)
#   7. GRI 305-4 (GHG emissions intensity)
#   8. IFRS S2 (intensity metrics where material)
#
# Key Capabilities:
#   - Denominator registry with 25+ standard denominators across 12 sectors
#     with framework alignment scoring and systematic selection guidance
#   - Core intensity calculation for any scope/denominator/period combination
#     using Decimal arithmetic with configurable scope inclusion rules
#   - LMDI decomposition (Ang 2004, 2015) separating emissions changes into
#     activity effect, structure effect, and intensity effect with exact
#     closure (no residual) and zero-value handling
#   - Peer benchmarking against CDP, TPI, GRESB, CRREM with normalisation
#     for scope, denominator, period, currency, and climate differences
#   - SBTi SDA target pathway calculation with sector convergence formulae
#     for all covered sectors (power, steel, cement, aluminium, buildings,
#     transport, paper, food) with both 1.5C and WB2C pathways
#   - Multi-year trend analysis with CARR, Mann-Kendall significance test,
#     Sen's slope, and regression-based projections with confidence bands
#   - What-if scenario modelling with Monte Carlo simulation (configurable
#     iterations) for probabilistic intensity projections
#   - Uncertainty quantification propagating errors from both numerator
#     (emissions) and denominator (activity data) per IPCC Tier 1/2
#   - Multi-framework disclosure mapping with completeness checking for
#     ESRS E1-6, CDP, SEC, SBTi, ISO, TCFD, GRI, IFRS S2
#   - Comprehensive reporting with executive dashboard, detailed analysis,
#     decomposition waterfall, benchmark spider, target pathway, scenario
#     fan charts, and KPI scorecards in MD/HTML/PDF/JSON/CSV/XBRL
#
# Decomposition Methodology (LMDI-I Additive, Ang 2004):
#   Total change:  dE = E_t - E_0
#   Activity:      dE_act = SUM_i[L(E_i_t, E_i_0) * ln(D_t / D_0)]
#   Structure:     dE_str = SUM_i[L(E_i_t, E_i_0) * ln(S_i_t / S_i_0)]
#   Intensity:     dE_int = SUM_i[L(E_i_t, E_i_0) * ln(I_i_t / I_i_0)]
#   Closure:       dE = dE_act + dE_str + dE_int (exact, no residual)
#   L(a,b):        Logarithmic mean = (a - b) / (ln(a) - ln(b))
#
# SBTi SDA Convergence Formula:
#   I_target(y) = I_sector_2050 + (I_company_base - I_sector_2050)
#                 * (2050 - y) / (2050 - base_year)
#
# Uncertainty Propagation (IPCC Tier 1):
#   U_intensity = sqrt(U_emissions^2 + U_denominator^2)
#   90% CI: I * (1 +/- 1.645 * U / 100)
#   95% CI: I * (1 +/- 1.960 * U / 100)
#
# Standard Denominators (25+):
#   Financial: Revenue (MEUR), AUM, Lending Portfolio, Insurance Premiums
#   Headcount: FTE
#   Area: GLA (m2), Floor Area, Cooled Space
#   Physical: Production (t), Steel (t), Cement (t clinker), Aluminium (t),
#     Paper (t), Food (t), Vehicle-km, Tonne-km, Passenger-km, Bed-days,
#     Units, Customers, Data throughput (TB), Meals, Room-nights
#   Energy: Electricity generated (MWh)
#   Agriculture: Hectares
#
# Sector Coverage:
#   Multi-sector conglomerate, Manufacturing, Real Estate (CRREM, GRESB),
#   Power Generation (SBTi SDA), Transport & Logistics (GLEC),
#   Financial Services (PCAF), Food & Agriculture (SBTi FLAG),
#   Healthcare, Education, Data Centre, Retail, SME
# =============================================================================

