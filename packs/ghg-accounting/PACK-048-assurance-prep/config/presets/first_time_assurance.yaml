# =============================================================================
# PACK-048 GHG Assurance Prep - First-Time Assurance Preset
# =============================================================================
# First-time assurance engagement preparation with extended readiness
# assessment, comprehensive gap remediation planning, verifier onboarding
# support, and increased cost/timeline allowances. Designed for companies
# undergoing external GHG verification for the first time.
#
# Typical use cases:
#   - Companies newly subject to CSRD assurance requirements
#   - Companies transitioning from voluntary to mandatory assurance
#   - Organisations with immature GHG reporting processes
#   - Companies seeking assurance ahead of regulatory requirements
#   - First-year reporting under any assurance mandate
#
# Typical engagement profile:
#   Assurance level: Limited (ISAE 3410)
#   Scopes: Scope 1 + Scope 2 (Scope 3 optional)
#   Duration: 14-20 weeks (extended for first time)
#   Typical cost: 50,000 - 120,000 EUR (first-time premium)
# =============================================================================

# --- Assurance Engagement ---
assurance_standard: "ISAE_3410"
assurance_level: "LIMITED"
company_size: "LARGE"
scopes_in_scope:
  - "SCOPE_1"
  - "SCOPE_2"

# --- Evidence Consolidation ---
evidence:
  minimum_quality: "ADEQUATE"
  require_provenance_hash: true
  retention_years: 7
  auto_extract_from_packs: true
  evidence_format: "STRUCTURED"
  max_evidence_size_mb: 500

# --- Readiness Assessment ---
readiness:
  standard: "ISAE_3410"
  target_level: "LIMITED"
  minimum_readiness_score_pct: 60.0
  include_gap_remediation: true
  auto_score_from_evidence: true
  remediation_priority_threshold: 40.0

# --- Calculation Provenance ---
provenance:
  verify_all_calculations: true
  replay_tolerance_pct: 0.01
  include_input_hashes: true
  include_intermediate_hashes: false
  generate_certificate: true

# --- Control Testing ---
controls:
  minimum_effectiveness: "PARTIALLY_EFFECTIVE"
  target_maturity: "LEVEL_2_REPEATABLE"
  test_sample_size: 20
  include_it_general_controls: true
  walkthroughs_required: true
  remediation_timeline_days: 120

# --- Verifier Collaboration ---
verifier:
  max_query_response_days: 7
  query_escalation_days: 5
  finding_response_days: 14
  enable_collaboration_portal: true
  auto_evidence_sharing: true
  track_verifier_hours: true

# --- Materiality Assessment ---
materiality:
  overall_materiality_pct: 5.0
  performance_materiality_pct: 65.0
  clearly_trivial_pct: 5.0
  scope_specific_enabled: false
  revision_frequency: "ANNUAL"

# --- Sampling Plan ---
sampling:
  primary_method: "MUS"
  confidence_level_pct: 90.0
  tolerable_misstatement_pct: 7.0
  expected_misstatement_pct: 2.0
  minimum_sample_size: 20
  stratification_enabled: true
  stratification_criteria:
    - "scope"
    - "facility"

# --- Regulatory Requirements ---
regulatory:
  jurisdictions:
    - "EU_CSRD"
  company_size: "LARGE"
  include_upcoming_requirements: true
  track_effective_dates: true
  deadline_warning_days: 120

# --- Cost & Timeline ---
cost_timeline:
  company_size: "LARGE"
  assurance_level: "LIMITED"
  include_scope_3: false
  multi_jurisdiction: false
  first_time_engagement: true
  complex_operations: false
  target_completion_weeks: 16
  currency: "EUR"

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "PDF"
  sections:
    - "executive_summary"
    - "readiness_assessment"
    - "evidence_summary"
    - "control_testing"
    - "materiality_sampling"
    - "provenance_verification"
    - "regulatory_compliance"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true
  include_appendices: true

# --- Alerts ---
alerts:
  alert_types:
    - "READINESS_GAP"
    - "CONTROL_FAILURE"
    - "EVIDENCE_MISSING"
    - "QUERY_OVERDUE"
    - "DEADLINE_APPROACHING"
  channels:
    - "EMAIL"
  query_overdue_days: 5
  evidence_gap_alert: true
  daily_digest: false
