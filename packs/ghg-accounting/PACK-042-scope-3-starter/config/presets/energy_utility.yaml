# =============================================================================
# PACK-042 Scope 3 Starter - Energy & Utility Preset
# =============================================================================
# Energy and utility sector where Category 3 (Fuel- & Energy-Related
# Activities, i.e., upstream fuel production) and Category 11 (Use of Sold
# Products, i.e., downstream combustion of sold energy/fuel by customers)
# are the dominant Scope 3 categories. For fuel sellers, Cat 11 is often
# the single largest emissions category across all scopes.
#
# Typical use cases:
#   - Oil and gas producers (upstream and downstream)
#   - Natural gas distributors
#   - Coal mining companies
#   - Electricity generators (fossil fuel)
#   - Renewable energy companies (lower Cat 11)
#   - Energy retailers and traders
#   - District heating operators
#
# Typical Scope 3 emission profile:
#   Cat 1 (Purchased Goods):      10-30% (equipment, chemicals, services)
#   Cat 2 (Capital Goods):         2-5%  (turbines, pipelines, infrastructure)
#   Cat 3 (Fuel & Energy):        10-30% (upstream fuel production, T&D losses)
#   Cat 4 (Upstream Transport):     2-8%  (fuel logistics)
#   Cat 5 (Waste):                  0.5-2% (ash, sludge, process waste)
#   Cat 6 (Business Travel):       0.2-1% (site visits)
#   Cat 7 (Employee Commuting):    0.5-1% (plant and office staff)
#   Cat 9 (Downstream Transport):   1-5%  (product delivery)
#   Cat 11 (Use of Sold Products): 20-70% (combustion of sold fuel/energy)
#   Cat 12 (End-of-Life):          0.5-2% (ash disposal, decommissioning)
#
#   Total Scope 3 typically: 0.5-3x Scope 1+2 (highly dependent on business model)
#   Key engagement: Top 20 fuel, equipment, and chemical suppliers
# =============================================================================

# --- Organisation Details ---
company_name: ""
sector_type: "ENERGY"
country: "DE"
reporting_year: 2026

# --- Screening ---
screening:
  eeio_model: "EXIOBASE_3"
  currency: "EUR"
  base_year: 2024
  revenue_threshold_eur: 0
  inflation_adjustment: true
  include_second_order: false

# --- Spend Classification ---
spend_classification:
  code_system: "NAICS"
  secondary_code_system: "ISIC"
  confidence_threshold: 0.80
  manual_review_threshold: 0.60
  currency: "EUR"
  inflation_year: 2024

# --- Categories ---
categories:
  cat_1:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "spend_data"
      - "supplier_data"
      - "equipment_epds"
    materiality_threshold_pct: 1.0
    notes: "Equipment, chemicals, maintenance services, construction"
  cat_2:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "capex_records"
      - "asset_register"
      - "project_data"
    materiality_threshold_pct: 1.0
    notes: "Turbines, generators, pipelines, grid infrastructure"
  cat_3:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "scope1_fuel_data"
      - "scope2_electricity_data"
      - "wtt_factors"
      - "upstream_fuel_lca"
    materiality_threshold_pct: 0.5
    notes: "Upstream fuel production and extraction; major category for energy sector"
  cat_4:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "freight_invoices"
      - "pipeline_data"
      - "tanker_data"
    materiality_threshold_pct: 1.0
    notes: "Fuel and material transport to facilities"
  cat_5:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "waste_manifests"
      - "ash_disposal_records"
    materiality_threshold_pct: 2.0
    notes: "Ash, sludge, process waste, decommissioning waste"
  cat_6:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "travel_management_system"
      - "expense_reports"
    materiality_threshold_pct: 2.0
    notes: "Site inspections, regulatory meetings"
  cat_7:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "hr_records"
      - "national_averages"
    materiality_threshold_pct: 2.0
    notes: "Plant and office staff commuting"
  cat_8:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "lease_contracts"
    materiality_threshold_pct: 3.0
  cat_9:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "distribution_data"
      - "pipeline_throughput"
      - "tanker_data"
    materiality_threshold_pct: 1.0
    notes: "Fuel distribution to customers, pipeline losses"
  cat_10:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "customer_processing_data"
    materiality_threshold_pct: 5.0
  cat_11:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "sales_volume_data"
      - "fuel_composition"
      - "energy_product_mix"
      - "customer_combustion_factors"
    materiality_threshold_pct: 0.5
    notes: "Combustion of sold fuels and use of sold electricity; often dominant category"
  cat_12:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "product_composition"
      - "decommissioning_profiles"
    materiality_threshold_pct: 2.0
    notes: "Ash disposal, infrastructure decommissioning"
  cat_13:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "tenant_data"
    materiality_threshold_pct: 5.0
  cat_14:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "franchise_reports"
    materiality_threshold_pct: 5.0
  cat_15:
    enabled: false
    tier: "SPEND_BASED"
    data_sources:
      - "portfolio_data"
    materiality_threshold_pct: 5.0
    notes: "Enable for energy companies with significant equity investments"

# --- Double Counting ---
double_counting:
  rules_enabled:
    - "cat1_vs_cat4_transport"
    - "cat1_vs_cat2_capex"
    - "cat3_vs_scope12"
    - "cat4_vs_cat9_transport"
  allocation_method: "ENERGY"
  conservative_mode: true
  document_exclusions: true
  scope12_reference_enabled: true

# --- Hotspot ---
hotspot:
  pareto_threshold_pct: 80.0
  min_categories: 3
  benchmark_source: "ghg_protocol_sector_guidance"
  top_n_suppliers: 20
  include_product_group_analysis: true
  trend_comparison_years: 3

# --- Supplier Engagement ---
supplier_engagement:
  top_percent: 80.0
  top_n_suppliers: 20
  reminder_frequency_days: 30
  quality_target: "LEVEL_2"
  deadline_days: 90
  escalation_after_days: 60
  use_cdp_supply_chain: false
  questionnaire_template: "ghg_protocol_scope3_supplier"

# --- Data Quality ---
data_quality:
  min_dqr: 1.0
  target_dqr: 2.5
  quality_weights:
    technological_representativeness: 0.30
    temporal_representativeness: 0.20
    geographical_representativeness: 0.20
    completeness: 0.15
    reliability: 0.15
  improvement_plan_required: true
  track_dqr_trend: true

# --- Uncertainty ---
uncertainty:
  method: "MONTE_CARLO"
  monte_carlo_iterations: 10000
  confidence_level: 0.95
  default_spend_uncertainty_pct: 50.0
  default_average_data_uncertainty_pct: 25.0
  default_supplier_uncertainty_pct: 10.0

# --- Compliance ---
compliance:
  target_frameworks:
    - "GHG_PROTOCOL"
    - "ESRS_E1"
    - "CDP"
    - "SBTI"
    - "ISO_14064"
  esrs_phase_in_year: 2025
  sbti_target_year: 2030
  sec_safe_harbour: true
  sb253_scope3_from: 2027
  pcaf_enabled: false
  cdp_supply_chain_module: false

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "CSV"
  frequency: "ANNUAL"
  include_provenance: true
  include_appendices: true
  include_data_quality_matrix: true
  include_supplier_engagement_status: true
  include_hotspot_analysis: true
  include_double_counting_log: true
  output_language: "en"
  watermark_draft: true

# --- Integration ---
integration:
  pack041_enabled: true
  pack041_pack_id: "PACK-041-scope-1-2-complete"
  lca_database: "ecoinvent_3.10"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  emission_factor_citation: true
  supplier_data_versioning: true
