# =============================================================================
# PACK-042 Scope 3 Starter - Transport & Logistics Preset
# =============================================================================
# Transport and logistics sector where subcontracted transport services
# (Category 4, Category 9) dominate Scope 3 emissions alongside vehicle
# manufacturing (Category 11 for OEMs) and fuel supply chain (Category 3).
# For asset-light 3PL and freight brokers, most emissions sit in Scope 3
# rather than Scope 1 from owned fleet.
#
# Typical use cases:
#   - Third-party logistics (3PL) providers
#   - Freight forwarders and brokers
#   - Shipping lines and container operators
#   - Airline operators (chartered and subcontracted)
#   - Parcel and express delivery networks
#   - Rail freight operators
#   - Intermodal transport operators
#
# Typical Scope 3 emission profile:
#   Cat 1 (Purchased Goods):       10-25% (vehicles, parts, tyres, services)
#   Cat 2 (Capital Goods):          3-8%  (fleet investment, infrastructure)
#   Cat 3 (Fuel & Energy):          5-15% (WTT fuel production)
#   Cat 4 (Upstream Transport):    10-35% (subcontracted haulage, intermodal)
#   Cat 5 (Waste):                  0.5-2% (vehicle maintenance waste)
#   Cat 6 (Business Travel):        0.5-2% (driver training, client visits)
#   Cat 7 (Employee Commuting):     1-3%  (depot and office staff)
#   Cat 9 (Downstream Transport):  10-30% (client-contracted outbound)
#   Cat 11 (Product Use):           0-20% (for vehicle/vessel manufacturers)
#   Cat 12 (End-of-Life):           0.5-3% (vehicle scrapping)
#
#   Total Scope 3 typically: 2-5x Scope 1+2
#   Key engagement: Top 30 subcontractors, fuel suppliers, vehicle OEMs
# =============================================================================

# --- Organisation Details ---
company_name: ""
sector_type: "TRANSPORT"
country: "DE"
reporting_year: 2026

# --- Screening ---
screening:
  eeio_model: "EXIOBASE_3"
  currency: "EUR"
  base_year: 2024
  revenue_threshold_eur: 0
  inflation_adjustment: true
  include_second_order: false

# --- Spend Classification ---
spend_classification:
  code_system: "NAICS"
  secondary_code_system: "ISIC"
  confidence_threshold: 0.80
  manual_review_threshold: 0.60
  currency: "EUR"
  inflation_year: 2024

# --- Categories ---
categories:
  cat_1:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "spend_data"
      - "supplier_data"
      - "fleet_maintenance_records"
    materiality_threshold_pct: 1.0
    notes: "Vehicle parts, tyres, maintenance services, IT, office supplies"
  cat_2:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "capex_records"
      - "fleet_register"
      - "vehicle_oem_data"
    materiality_threshold_pct: 1.0
    notes: "Fleet vehicles, trailers, depot infrastructure, IT"
  cat_3:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "scope1_fuel_data"
      - "scope2_electricity_data"
      - "wtt_factors"
    materiality_threshold_pct: 0.5
    notes: "Well-to-tank for diesel, LNG, HVO, electricity (EV charging)"
  cat_4:
    enabled: true
    tier: "HYBRID"
    data_sources:
      - "subcontractor_invoices"
      - "freight_booking_data"
      - "ecotransit_data"
      - "glec_framework_data"
    materiality_threshold_pct: 0.5
    notes: "Subcontracted haulage, intermodal legs; often dominant for asset-light operators"
  cat_5:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "waste_manifests"
      - "workshop_waste_data"
    materiality_threshold_pct: 2.0
    notes: "Vehicle maintenance waste, tyres, batteries, office waste"
  cat_6:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "travel_management_system"
      - "expense_reports"
    materiality_threshold_pct: 2.0
    notes: "Client visits, driver training, industry events"
  cat_7:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "hr_records"
      - "national_averages"
    materiality_threshold_pct: 2.0
    notes: "Depot, warehouse, and office staff commuting (drivers excluded as Scope 1)"
  cat_8:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "lease_contracts"
    materiality_threshold_pct: 3.0
    notes: "Enable if leased depots or vehicles not under operational control"
  cat_9:
    enabled: true
    tier: "HYBRID"
    data_sources:
      - "client_contract_data"
      - "subcontractor_data"
      - "glec_framework_data"
    materiality_threshold_pct: 0.5
    notes: "Client-contracted outbound transport, last-mile delivery subcontractors"
  cat_10:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "customer_processing_data"
    materiality_threshold_pct: 5.0
  cat_11:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "product_specs"
      - "vehicle_usage_profiles"
    materiality_threshold_pct: 2.0
    notes: "Relevant for vehicle/vessel manufacturers; use phase fuel consumption"
  cat_12:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "vehicle_composition"
      - "scrapping_profiles"
    materiality_threshold_pct: 2.0
    notes: "Vehicle end-of-life, tyre disposal, battery recycling"
  cat_13:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "tenant_data"
    materiality_threshold_pct: 5.0
  cat_14:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "franchise_reports"
    materiality_threshold_pct: 5.0
  cat_15:
    enabled: false
    tier: "SPEND_BASED"
    data_sources:
      - "portfolio_data"
    materiality_threshold_pct: 5.0

# --- Double Counting ---
double_counting:
  rules_enabled:
    - "cat1_vs_cat4_transport"
    - "cat1_vs_cat2_capex"
    - "cat3_vs_scope12"
    - "cat4_vs_cat9_transport"
  allocation_method: "PHYSICAL"
  conservative_mode: true
  document_exclusions: true
  scope12_reference_enabled: true

# --- Hotspot ---
hotspot:
  pareto_threshold_pct: 80.0
  min_categories: 3
  benchmark_source: "glec_framework"
  top_n_suppliers: 30
  include_product_group_analysis: false
  trend_comparison_years: 3

# --- Supplier Engagement ---
supplier_engagement:
  top_percent: 80.0
  top_n_suppliers: 30
  reminder_frequency_days: 30
  quality_target: "LEVEL_2"
  deadline_days: 60
  escalation_after_days: 45
  use_cdp_supply_chain: false
  questionnaire_template: "glec_carrier_questionnaire"

# --- Data Quality ---
data_quality:
  min_dqr: 1.0
  target_dqr: 2.5
  quality_weights:
    technological_representativeness: 0.25
    temporal_representativeness: 0.25
    geographical_representativeness: 0.20
    completeness: 0.15
    reliability: 0.15
  improvement_plan_required: true
  track_dqr_trend: true

# --- Uncertainty ---
uncertainty:
  method: "QUALITATIVE"
  monte_carlo_iterations: 5000
  confidence_level: 0.95
  default_spend_uncertainty_pct: 50.0
  default_average_data_uncertainty_pct: 30.0
  default_supplier_uncertainty_pct: 10.0

# --- Compliance ---
compliance:
  target_frameworks:
    - "GHG_PROTOCOL"
    - "ESRS_E1"
    - "CDP"
  esrs_phase_in_year: 2025
  sec_safe_harbour: true
  sb253_scope3_from: 2027
  pcaf_enabled: false
  cdp_supply_chain_module: false

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
  frequency: "ANNUAL"
  include_provenance: true
  include_appendices: true
  include_data_quality_matrix: true
  include_supplier_engagement_status: true
  include_hotspot_analysis: true
  include_double_counting_log: true
  output_language: "en"
  watermark_draft: true

# --- Integration ---
integration:
  pack041_enabled: true
  pack041_pack_id: "PACK-041-scope-1-2-complete"
  lca_database: "ecoinvent_3.10"
  logistics_platform: "ecotransit"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  emission_factor_citation: true
  supplier_data_versioning: true
