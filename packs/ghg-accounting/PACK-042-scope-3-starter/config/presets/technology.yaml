# =============================================================================
# PACK-042 Scope 3 Starter - Technology & Services Preset
# =============================================================================
# Technology and services sector where purchased goods (hardware, cloud
# services) and product energy use (Cat 11) are material categories.
# Business travel (Cat 6) is significant for consulting and services firms.
# Scope 3 commonly 5-20x Scope 1+2.
#
# Typical use cases:
#   - Software companies (SaaS, enterprise)
#   - Hardware and device manufacturers
#   - IT consulting and professional services
#   - Cloud and data centre operators
#   - Telecommunications companies
#   - Media and entertainment platforms
#   - Semiconductor and chip designers
#
# Typical Scope 3 emission profile:
#   Cat 1 (Purchased Goods):     30-60% (hardware, cloud, services)
#   Cat 2 (Capital Goods):        3-10% (servers, infrastructure)
#   Cat 3 (Fuel & Energy):        2-5%  (WTT, T&D losses for data centres)
#   Cat 4 (Upstream Transport):    1-5%  (hardware logistics)
#   Cat 5 (Waste):                 0.5-2% (e-waste, office waste)
#   Cat 6 (Business Travel):      3-10% (client visits, conferences)
#   Cat 7 (Employee Commuting):   2-5%  (remote/hybrid adjustment)
#   Cat 8 (Upstream Leases):      0-5%  (co-located data centres)
#   Cat 11 (Product Use):         5-30% (device energy, software infrastructure)
#   Cat 12 (End-of-Life):         0.5-3% (electronic waste)
#
#   Total Scope 3 typically: 5-20x Scope 1+2
#   Key supplier engagement: Top 30 IT, cloud, and hardware suppliers
# =============================================================================

# --- Organisation Details ---
company_name: ""
sector_type: "TECHNOLOGY"
country: "US"
reporting_year: 2026

# --- Screening ---
screening:
  eeio_model: "USEEIO_2"
  currency: "USD"
  base_year: 2024
  revenue_threshold_eur: 0
  inflation_adjustment: true
  include_second_order: false

# --- Spend Classification ---
spend_classification:
  code_system: "NAICS"
  secondary_code_system: "UNSPSC"
  confidence_threshold: 0.80
  manual_review_threshold: 0.60
  currency: "USD"
  inflation_year: 2024

# --- Categories ---
categories:
  cat_1:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "spend_data"
      - "supplier_data"
      - "cloud_provider_reports"
      - "hardware_vendor_epds"
    materiality_threshold_pct: 0.5
    notes: "Cloud services, hardware, software licenses, professional services"
  cat_2:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "capex_records"
      - "asset_register"
      - "vendor_epds"
    materiality_threshold_pct: 1.0
    notes: "Servers, networking equipment, office build-outs"
  cat_3:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "scope1_fuel_data"
      - "scope2_electricity_data"
    materiality_threshold_pct: 1.0
    notes: "Data centre and office electricity WTT and T&D"
  cat_4:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "freight_invoices"
      - "logistics_provider_data"
    materiality_threshold_pct: 2.0
    notes: "Hardware and equipment logistics"
  cat_5:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "waste_manifests"
      - "ewaste_contractor_reports"
    materiality_threshold_pct: 2.0
    notes: "Electronic waste, office waste, data centre decommissioning"
  cat_6:
    enabled: true
    tier: "SPEND_BASED"
    data_sources:
      - "travel_management_system"
      - "expense_reports"
      - "travel_agency_data"
    materiality_threshold_pct: 0.5
    notes: "Client visits, conferences, training; often significant for services firms"
  cat_7:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "employee_surveys"
      - "hr_records"
      - "remote_work_estimates"
    materiality_threshold_pct: 1.0
    notes: "Adjust for remote/hybrid work patterns; include home office emissions"
  cat_8:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "lease_contracts"
      - "colocation_provider_data"
    materiality_threshold_pct: 2.0
    notes: "Co-located data centre space, leased office space"
  cat_9:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "distribution_data"
    materiality_threshold_pct: 3.0
    notes: "Enable for hardware manufacturers with physical distribution"
  cat_10:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "customer_processing_data"
    materiality_threshold_pct: 5.0
  cat_11:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "product_specs"
      - "energy_ratings"
      - "usage_profiles"
      - "device_power_consumption"
    materiality_threshold_pct: 1.0
    notes: "Device energy consumption, SaaS infrastructure energy; often largest downstream category"
  cat_12:
    enabled: true
    tier: "AVERAGE_DATA"
    data_sources:
      - "product_composition"
      - "ewaste_profiles"
    materiality_threshold_pct: 2.0
    notes: "Electronic waste disposal and recycling"
  cat_13:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "tenant_data"
    materiality_threshold_pct: 5.0
  cat_14:
    enabled: false
    tier: "AVERAGE_DATA"
    data_sources:
      - "franchise_reports"
    materiality_threshold_pct: 5.0
  cat_15:
    enabled: false
    tier: "SPEND_BASED"
    data_sources:
      - "portfolio_data"
    materiality_threshold_pct: 5.0
    notes: "Enable for tech companies with significant venture/equity investments"

# --- Double Counting ---
double_counting:
  rules_enabled:
    - "cat1_vs_cat4_transport"
    - "cat1_vs_cat2_capex"
    - "cat3_vs_scope12"
    - "cat8_vs_scope12_leases"
  allocation_method: "ECONOMIC"
  conservative_mode: true
  document_exclusions: true
  scope12_reference_enabled: true

# --- Hotspot ---
hotspot:
  pareto_threshold_pct: 80.0
  min_categories: 3
  benchmark_source: "ghg_protocol_sector_guidance"
  top_n_suppliers: 30
  include_product_group_analysis: true
  trend_comparison_years: 3

# --- Supplier Engagement ---
supplier_engagement:
  top_percent: 80.0
  top_n_suppliers: 30
  reminder_frequency_days: 30
  quality_target: "LEVEL_2"
  deadline_days: 90
  escalation_after_days: 60
  use_cdp_supply_chain: true
  questionnaire_template: "ghg_protocol_scope3_supplier"

# --- Data Quality ---
data_quality:
  min_dqr: 1.0
  target_dqr: 3.0
  quality_weights:
    technological_representativeness: 0.30
    temporal_representativeness: 0.20
    geographical_representativeness: 0.20
    completeness: 0.15
    reliability: 0.15
  improvement_plan_required: true
  track_dqr_trend: true

# --- Uncertainty ---
uncertainty:
  method: "QUALITATIVE"
  monte_carlo_iterations: 5000
  confidence_level: 0.95
  default_spend_uncertainty_pct: 50.0
  default_average_data_uncertainty_pct: 30.0
  default_supplier_uncertainty_pct: 10.0

# --- Compliance ---
compliance:
  target_frameworks:
    - "GHG_PROTOCOL"
    - "CDP"
    - "SBTI"
    - "SEC"
  esrs_phase_in_year: 2025
  sbti_target_year: 2030
  sbti_reduction_target_pct: 30.0
  sec_safe_harbour: true
  sb253_scope3_from: 2027
  pcaf_enabled: false
  cdp_supply_chain_module: true

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
  frequency: "ANNUAL"
  include_provenance: true
  include_appendices: true
  include_data_quality_matrix: true
  include_supplier_engagement_status: true
  include_hotspot_analysis: true
  include_double_counting_log: true
  output_language: "en"
  watermark_draft: true

# --- Integration ---
integration:
  pack041_enabled: true
  pack041_pack_id: "PACK-041-scope-1-2-complete"
  lca_database: "ecoinvent_3.10"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  emission_factor_citation: true
  supplier_data_versioning: true
