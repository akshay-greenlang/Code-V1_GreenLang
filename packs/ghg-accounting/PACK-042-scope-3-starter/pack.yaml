# -----------------------------------------------------------------------------
# Compliance Framework Mappings
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "GHG_PROTOCOL_SCOPE3"
      name: "GHG Protocol Scope 3 Standard"
      coverage: "All 15 categories, methodology tiers, data quality, reporting"
    - id: "GHG_PROTOCOL_SCOPE3_TECHNICAL"
      name: "GHG Protocol Scope 3 Technical Guidance"
      coverage: "Calculation methods per category, data sources, emission factors"
    - id: "ISO_14064"
      name: "ISO 14064-1:2018"
      coverage: "Categories 3-6: transportation, products, use, other indirect"
    - id: "ESRS_E1"
      name: "ESRS E1 Climate Change"
      coverage: "E1-6 para 51: Scope 3 total, upstream/downstream, category detail"
    - id: "CDP"
      name: "CDP Climate Change"
      coverage: "C6.5 Scope 3 by category, C6.7 methodology, C6.10 verification"
    - id: "SBTI"
      name: "Science Based Targets initiative"
      coverage: "Scope 3 near-term 67% coverage, reduction tracking, supplier targets"
    - id: "SEC"
      name: "US SEC Climate Disclosure"
      coverage: "Scope 3 safe harbour, methodology documentation, material categories"
    - id: "SB_253"
      name: "California SB 253"
      coverage: "Scope 3 annual reporting from 2027 per GHG Protocol"
    - id: "PCAF"
      name: "PCAF Global GHG Accounting Standard"
      coverage: "Category 15: 6 asset classes, attribution, data quality scoring"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"
    - "scikit-learn>=1.3"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_eeio_database
    - verify_lca_database
    - verify_classification_tables
    - verify_mrv_agents_available
    - verify_pack041_installed

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
      - "V326-V335"   # PACK-041 Scope 1-2 Complete
    new:
      - "V336__pack042_scope3_001"
      - "V337__pack042_scope3_002"
      - "V338__pack042_scope3_003"
      - "V339__pack042_scope3_004"
      - "V340__pack042_scope3_005"
      - "V341__pack042_scope3_006"
      - "V342__pack042_scope3_007"
      - "V343__pack042_scope3_008"
      - "V344__pack042_scope3_009"
      - "V345__pack042_scope3_010"

  post_install:
    - seed_eeio_factors_exiobase3
    - seed_eeio_factors_useeio2
    - seed_naics_classification
    - seed_isic_classification
    - seed_unspsc_classification
    - seed_lca_emission_factors
    - seed_pcaf_asset_class_data
    - validate_preset_configs

