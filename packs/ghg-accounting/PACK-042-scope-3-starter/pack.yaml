metadata:
  name: PACK-042-scope-3-starter
  version: "1.0.0"
  display_name: "Scope 3 Starter Pack"
  description: >-
    GreenLang deployment pack providing a structured, methodology-driven
    approach to Scope 3 value chain emissions quantification across all 15
    GHG Protocol Scope 3 categories. Guides organisations from spend-based
    screening through to supplier-specific primary data collection with
    hotspot identification, double-counting prevention, supplier engagement
    tracking, and multi-framework compliance mapping. Supports four
    methodology tiers (spend-based, average-data, supplier-specific, hybrid),
    three EEIO models (EXIOBASE 3, USEEIO 2, GTAP), five classification
    systems (NAICS, ISIC, UNSPSC, HS, GL account), and five data quality
    indicators per GHG Protocol Scope 3 guidance. Maps output to GHG
    Protocol, ISO 14064-1, ESRS E1, CDP, SBTi, SEC, SB 253, and PCAF.
    Includes Monte Carlo uncertainty analysis, Pareto-based hotspot
    identification, supplier engagement programme management, and sector-
    specific presets for manufacturing, retail, technology, financial
    services, food and agriculture, energy, transport, and SME organisations.
