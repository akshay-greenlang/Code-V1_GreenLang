# =============================================================================
# PACK-042: Scope 3 Starter Pack
# GreenLang GHG Accounting Pack for Scope 3 Value Chain Emissions
# =============================================================================
# This pack delivers a structured, methodology-driven approach to Scope 3
# value chain emissions quantification. It guides organisations from initial
# spend-based screening through to supplier-specific primary data collection
# across all 15 GHG Protocol Scope 3 categories.
#
# The pack follows a zero-hallucination approach: all emission calculations
# use deterministic formulas from GHG Protocol Scope 3 Standard, EEIO models
# (EXIOBASE 3, USEEIO 2, GTAP), and published LCA databases. No LLM is used
# in any calculation path. Spend classification may use LLM-assisted mapping
# with confidence thresholds, but all numeric calculations are deterministic.
#
# Core capabilities:
#   - Spend-based screening using EEIO models (EXIOBASE 3, USEEIO 2, GTAP)
#   - Automated spend classification (NAICS, ISIC, UNSPSC, HS, GL account)
#   - 15-category coverage with per-category methodology tier selection
#   - Four methodology tiers: spend-based, average-data, supplier-specific, hybrid
#   - Double-counting prevention across categories and with Scope 1/2
#   - Hotspot identification with Pareto analysis (80/20 rule)
#   - Supplier engagement programme with data request tracking
#   - Data quality assessment per GHG Protocol 5 DQIs
#   - Uncertainty quantification (Monte Carlo, analytical, qualitative)
#   - Multi-framework compliance mapping (GHG Protocol, ESRS E1, CDP,
#     SBTi, SEC, SB 253, ISO 14064, PCAF)
#   - PCAF methodology for Category 15 financed emissions
#   - Full audit trail with SHA-256 provenance hashing
#   - Sector-specific presets for 8 industry sectors
#
# Scope 3 Categories (15):
#   Upstream (Cat 1-8):
#     1. Purchased Goods & Services
#     2. Capital Goods
#     3. Fuel- & Energy-Related Activities (not in Scope 1/2)
#     4. Upstream Transportation & Distribution
#     5. Waste Generated in Operations
#     6. Business Travel
#     7. Employee Commuting
#     8. Upstream Leased Assets
#   Downstream (Cat 9-15):
#     9.  Downstream Transportation & Distribution
#     10. Processing of Sold Products
#     11. Use of Sold Products
#     12. End-of-Life Treatment of Sold Products
#     13. Downstream Leased Assets
#     14. Franchises
#     15. Investments
#
# Regulatory Frameworks:
#   1. GHG Protocol Corporate Value Chain (Scope 3) Standard (2011)
#   2. GHG Protocol Technical Guidance for Calculating Scope 3 (2013)
#   3. ISO 14064-1:2018 (Categories 3-6 indirect emissions)
#   4. EU CSRD / ESRS E1 (E1-6 para 51, Scope 3 phase-in)
#   5. CDP Climate Change Questionnaire (C6.5, C6.7 Scope 3)
#   6. SBTi Corporate Net-Zero Standard v1.1 (Scope 3 near-term)
#   7. US SEC Climate Disclosure Rules (Scope 3 safe harbour)
#   8. California SB 253 (Scope 3 from 2027)
#   9. PCAF Global GHG Accounting Standard (Category 15)
#
# Sector Presets:
#   manufacturing        - Upstream supply chain dominant (Cat 1, Cat 4)
#   retail               - Purchased goods for resale (Cat 1, Cat 4, Cat 9)
#   technology           - Hardware, cloud, travel (Cat 1, Cat 6, Cat 11)
#   financial_services   - Financed emissions via PCAF (Cat 15 dominant)
#   food_agriculture     - Agricultural supply chain (Cat 1, Cat 10, Cat 12)
#   energy_utility       - Upstream fuel, sold energy (Cat 3, Cat 11)
#   transport_logistics  - Subcontracted transport (Cat 4, Cat 9, Cat 11)
#   sme_simplified       - Top 5 categories only for SMEs
#
# Version History:
#   1.0.0 - Initial release (2026-03-24)
# =============================================================================

