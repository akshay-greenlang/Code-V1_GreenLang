# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  screening:
    max_spend_line_items: 500000
    classification_per_item_ms: 10
    eeio_calculation_per_item_ms: 5
    total_screening_target_minutes: 30
  category_calculation:
    max_categories: 15
    target_duration_per_category_minutes: 5
    parallel_categories: 5
    spend_based_per_item_ms: 5
    average_data_per_record_ms: 20
    supplier_specific_per_record_ms: 50
  supplier_engagement:
    max_suppliers: 5000
    engagement_status_update_ms: 50
    questionnaire_processing_ms: 200
  hotspot_analysis:
    pareto_calculation_per_category_ms: 100
    supplier_ranking_per_supplier_ms: 10
    total_hotspot_target_seconds: 30
  data_quality:
    dqr_assessment_per_category_ms: 200
    total_dq_assessment_target_seconds: 10
  uncertainty_analysis:
    monte_carlo_5k_iterations_seconds: 15
    qualitative_assessment_per_category_ms: 50
    total_uncertainty_target_minutes: 5
  compliance_mapping:
    framework_mapping_per_framework_ms: 500
    total_mapping_target_seconds: 10
  reporting:
    executive_summary_generation_ms: 2000
    category_breakdown_generation_ms: 5000
    hotspot_report_generation_ms: 3000
  cache_hit_ratio_target: 0.85
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with supplier-level and category-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  supplier_data_isolation: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
  required_roles:
    - scope3_manager
    - sustainability_officer
    - procurement_manager
    - supply_chain_analyst
    - data_analyst
    - supplier_contact
    - verifier
    - viewer
    - admin
  audit_events:
    - "scope3.config.modified"
    - "scope3.screening.completed"
    - "scope3.spend.classified"
    - "scope3.category.calculated"
    - "scope3.double_counting.resolved"
    - "scope3.hotspot.identified"
    - "scope3.supplier.engaged"
    - "scope3.supplier.data_received"
    - "scope3.data_quality.assessed"
    - "scope3.uncertainty.analysed"
    - "scope3.compliance.mapped"
    - "scope3.report.generated"
    - "scope3.pcaf.calculated"
    - "scope3.preset.loaded"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
