# =============================================================================
# PACK-044 GHG Inventory Management - Real Estate Preset
# =============================================================================
# Real estate investment trusts (REITs), property developers, and facility
# management companies operating multi-site building portfolios. Per-square-
# metre benchmarking, CRREM pathway alignment, and GRESB reporting support.
# Handles landlord/tenant splits and whole-building vs. base-building scopes.
#
# Typical use cases:
#   - Real estate investment trusts (REITs)
#   - Commercial property portfolio managers
#   - Residential property developers
#   - Facility management companies
#   - Shopping centre and retail park operators
#   - Mixed-use development portfolios
#
# Typical inventory profile:
#   - 50-500+ buildings across multiple cities/countries
#   - Scope 1: gas heating, backup generators (landlord-controlled)
#   - Scope 2: common area electricity, central cooling/heating
#   - Landlord/tenant operational boundary complexity
#   - Typical intensity: 30-150 kgCO2e per m2 per year
# =============================================================================

# --- Organisation Details ---
company_name: ""
facility_name: ""
sector_type: "REAL_ESTATE"
country: "GB"
reporting_year: 2026

# --- Inventory Period ---
inventory_period:
  period_type: "CALENDAR_YEAR"
  fiscal_year_end_month: 12
  lock_after_days: 30
  auto_create_next_period: true

# --- Data Collection ---
data_collection:
  frequency: "QUARTERLY"
  collection_window_days: 21
  reminder_before_days: 7
  escalation_after_days: 14
  auto_send_reminders: true
  require_evidence_upload: true
  allow_estimation: true
  estimation_requires_justification: true
  utility_bill_import: true
  bms_integration_enabled: true
  tenant_data_collection: true

# --- Quality Management ---
quality_management:
  qaqc_enabled: true
  automated_checks:
    - "COMPLETENESS"
    - "RANGE_CHECK"
    - "YEAR_ON_YEAR_VARIANCE"
    - "UNIT_CONSISTENCY"
    - "AREA_NORMALISATION"
    - "OCCUPANCY_CORRELATION"
    - "DEGREE_DAY_NORMALISATION"
    - "LIKE_FOR_LIKE_COMPARISON"
    - "OUTLIER_DETECTION"
  variance_threshold_pct: 15.0
  data_quality_score_target: 80.0
  require_improvement_plan: true
  improvement_plan_review_frequency: "ANNUAL"

# --- Benchmarking ---
benchmarking:
  enabled: true
  primary_metric: "kgCO2e/m2"
  secondary_metrics:
    - "kgCO2e/occupant"
    - "kWh/m2"
    - "MJ/m2"
  building_type_segmentation: true
  climate_zone_normalisation: true
  crrem_pathway_enabled: true
  gresb_alignment: true
  energy_star_score_tracking: false

# --- Landlord/Tenant Split ---
operational_boundary:
  whole_building_approach: true
  landlord_scope_1: true
  landlord_scope_2: true
  tenant_scope_1: false
  tenant_scope_2: true
  common_area_allocation: "FLOOR_AREA_RATIO"
  vacancy_adjustment: true

# --- Review and Approval ---
review_approval:
  review_levels: 2
  level_1_role: "PROPERTY_MANAGER"
  level_2_role: "HEAD_OF_SUSTAINABILITY"
  require_comments: false
  auto_approve_below_threshold: true
  auto_approve_threshold_tco2e: 5.0
  sign_off_required: true
  parallel_review_allowed: true

# --- Change Management ---
change_management:
  require_change_request: true
  auto_approve_minor_changes: true
  minor_change_threshold_pct: 2.0
  impact_assessment_required: true
  require_recalculation_on_change: true

# --- Versioning ---
versioning:
  enabled: true
  max_versions_per_period: 5
  snapshot_on_approval: true
  track_field_changes: true
  retain_all_versions: true

# --- Consolidation ---
consolidation:
  approach: "OPERATIONAL_CONTROL"
  multi_entity: true
  require_subsidiary_sign_off: true
  inter_company_elimination: false
  portfolio_aggregation: true
  building_type_disaggregation: true
  region_disaggregation: true

# --- Gap Analysis ---
gap_analysis:
  enabled: true
  assess_frequency: "ANNUAL"
  maturity_model: "GHG_PROTOCOL_5_LEVEL"
  generate_improvement_roadmap: true
  benchmark_against_peers: true
  sector_benchmark_source: "GRESB"

# --- Documentation ---
documentation:
  methodology_doc_required: true
  assumption_register: true
  evidence_retention_years: 7
  link_to_source_documents: true
  auto_generate_methodology: true
  floor_area_register: true
  tenant_engagement_records: true

# --- Reporting ---
reporting:
  frequency: "ANNUAL"
  formats:
    - "HTML"
    - "PDF"
    - "JSON"
  executive_summary: true
  detailed_inventory: true
  verification_package: true
  output_language: "en"
  include_methodology_notes: true
  include_per_m2_benchmarks: true
  include_crrem_alignment: true
  gresb_export_enabled: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
