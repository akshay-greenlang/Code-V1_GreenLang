# =============================================================================
# PACK-044 GHG Inventory Management - Healthcare Preset
# =============================================================================
# Hospitals, health systems, and clinical facilities operating 24/7 with
# significant energy consumption for HVAC, sterilisation, and medical
# equipment. Tracks medical gas emissions (anaesthetic gases, N2O),
# per-bed and per-patient-day intensity metrics, and NHS/HCWH benchmarks.
#
# Typical use cases:
#   - Acute care hospitals and medical centres
#   - Health system corporate entities (multi-hospital)
#   - Outpatient clinics and ambulatory care
#   - Pharmaceutical and biotech laboratories
#   - Long-term care and rehabilitation facilities
#   - Dental and veterinary hospital networks
#
# Typical inventory profile:
#   - 1-50 hospital sites plus satellite clinics
#   - Scope 1: natural gas (heating, steam), backup generators, medical gases
#   - Scope 2: 24/7 electricity (HVAC, lighting, medical equipment)
#   - Medical gas N2O and anaesthetic agents (desflurane, sevoflurane)
#   - Typical intensity: 15-50 kgCO2e per patient-day
# =============================================================================

# --- Organisation Details ---
company_name: ""
facility_name: ""
sector_type: "HEALTHCARE"
country: "GB"
reporting_year: 2026

# --- Inventory Period ---
inventory_period:
  period_type: "CALENDAR_YEAR"
  fiscal_year_end_month: 3
  lock_after_days: 21
  auto_create_next_period: true

# --- Data Collection ---
data_collection:
  frequency: "MONTHLY"
  collection_window_days: 14
  reminder_before_days: 5
  escalation_after_days: 10
  auto_send_reminders: true
  require_evidence_upload: true
  allow_estimation: true
  estimation_requires_justification: true
  utility_bill_import: true
  bms_integration_enabled: true
  medical_gas_tracking: true

# --- Quality Management ---
quality_management:
  qaqc_enabled: true
  automated_checks:
    - "COMPLETENESS"
    - "RANGE_CHECK"
    - "YEAR_ON_YEAR_VARIANCE"
    - "MONTH_ON_MONTH_VARIANCE"
    - "UNIT_CONSISTENCY"
    - "BED_OCCUPANCY_CORRELATION"
    - "DEGREE_DAY_NORMALISATION"
    - "MEDICAL_GAS_RECONCILIATION"
    - "OUTLIER_DETECTION"
  variance_threshold_pct: 12.0
  data_quality_score_target: 82.0
  require_improvement_plan: true
  improvement_plan_review_frequency: "SEMI_ANNUAL"

# --- Medical Gas Configuration ---
medical_gas:
  track_anaesthetic_gases: true
  gases_tracked:
    - "NITROUS_OXIDE"
    - "DESFLURANE"
    - "SEVOFLURANE"
    - "ISOFLURANE"
  n2o_gwp: 265
  desflurane_gwp: 2540
  sevoflurane_gwp: 130
  cylinder_inventory_tracking: true
  waste_gas_capture_enabled: false

# --- Per-Bed Benchmarking ---
benchmarking:
  enabled: true
  primary_metric: "kgCO2e/bed_day"
  secondary_metrics:
    - "kgCO2e/patient_day"
    - "kgCO2e/m2"
    - "kWh/bed_day"
    - "MJ/m2"
  facility_type_segmentation: true
  climate_zone_normalisation: true
  nhs_benchmark_enabled: true
  hcwh_benchmark_enabled: true

# --- Review and Approval ---
review_approval:
  review_levels: 2
  level_1_role: "FACILITIES_MANAGER"
  level_2_role: "CHIEF_SUSTAINABILITY_OFFICER"
  require_comments: true
  auto_approve_below_threshold: false
  sign_off_required: true
  parallel_review_allowed: true

# --- Change Management ---
change_management:
  require_change_request: true
  auto_approve_minor_changes: true
  minor_change_threshold_pct: 2.0
  impact_assessment_required: true
  require_recalculation_on_change: true

# --- Versioning ---
versioning:
  enabled: true
  max_versions_per_period: 6
  snapshot_on_approval: true
  track_field_changes: true
  retain_all_versions: true

# --- Consolidation ---
consolidation:
  approach: "OPERATIONAL_CONTROL"
  multi_entity: true
  require_subsidiary_sign_off: true
  inter_company_elimination: false
  hospital_type_disaggregation: true
  region_disaggregation: true

# --- Gap Analysis ---
gap_analysis:
  enabled: true
  assess_frequency: "ANNUAL"
  maturity_model: "GHG_PROTOCOL_5_LEVEL"
  generate_improvement_roadmap: true
  benchmark_against_peers: true
  sector_benchmark_source: "NHS_SUSTAINABLE_DEVELOPMENT_UNIT"

# --- Documentation ---
documentation:
  methodology_doc_required: true
  assumption_register: true
  evidence_retention_years: 7
  link_to_source_documents: true
  auto_generate_methodology: true
  medical_gas_methodology: true
  clinical_activity_records: true

# --- Reporting ---
reporting:
  frequency: "ANNUAL"
  formats:
    - "HTML"
    - "PDF"
    - "JSON"
  executive_summary: true
  detailed_inventory: true
  verification_package: true
  output_language: "en"
  include_methodology_notes: true
  include_per_bed_benchmarks: true
  include_medical_gas_breakdown: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
