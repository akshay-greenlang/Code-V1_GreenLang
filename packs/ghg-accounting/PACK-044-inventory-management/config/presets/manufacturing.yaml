# =============================================================================
# PACK-044 GHG Inventory Management - Manufacturing Preset
# =============================================================================
# Manufacturing organisations with complex Scope 1 profiles including
# stationary combustion, process emissions, and fugitive sources. Monthly
# data collection with three levels of review to handle high volumes of
# activity data from production lines, boilers, and process equipment.
#
# Typical use cases:
#   - Automotive and heavy manufacturing plants
#   - Chemicals and petrochemicals production
#   - Steel, aluminium, and metals processing
#   - Electronics and semiconductor fabrication
#   - Plastics, packaging, and consumer goods production
#
# Typical inventory profile:
#   - 5-50 facilities across multiple countries
#   - Scope 1: fuel combustion, process emissions, fugitive losses
#   - Scope 2: large electricity loads for motors, compressed air, HVAC
#   - High data volume, monthly collection essential
#   - Typical intensity: 0.1-2.0 tCO2e per tonne of product
# =============================================================================

# --- Organisation Details ---
company_name: ""
facility_name: ""
sector_type: "MANUFACTURING"
country: "DE"
reporting_year: 2026

# --- Inventory Period ---
inventory_period:
  period_type: "CALENDAR_YEAR"
  fiscal_year_end_month: 12
  lock_after_days: 21
  auto_create_next_period: true

# --- Data Collection ---
data_collection:
  frequency: "MONTHLY"
  collection_window_days: 15
  reminder_before_days: 5
  escalation_after_days: 10
  auto_send_reminders: true
  require_evidence_upload: true
  allow_estimation: true
  estimation_requires_justification: true
  meter_integration_enabled: true
  erp_import_enabled: true

# --- Quality Management ---
quality_management:
  qaqc_enabled: true
  automated_checks:
    - "COMPLETENESS"
    - "RANGE_CHECK"
    - "YEAR_ON_YEAR_VARIANCE"
    - "MONTH_ON_MONTH_VARIANCE"
    - "UNIT_CONSISTENCY"
    - "MASS_BALANCE"
    - "PRODUCTION_CORRELATION"
    - "OUTLIER_DETECTION"
  variance_threshold_pct: 10.0
  data_quality_score_target: 85.0
  require_improvement_plan: true
  improvement_plan_review_frequency: "QUARTERLY"

# --- Review and Approval ---
review_approval:
  review_levels: 3
  level_1_role: "PLANT_ENGINEER"
  level_2_role: "SITE_EHS_MANAGER"
  level_3_role: "GROUP_SUSTAINABILITY_DIRECTOR"
  require_comments: true
  auto_approve_below_threshold: false
  sign_off_required: true
  parallel_review_allowed: false

# --- Change Management ---
change_management:
  require_change_request: true
  auto_approve_minor_changes: false
  minor_change_threshold_pct: 1.0
  impact_assessment_required: true
  require_recalculation_on_change: true

# --- Versioning ---
versioning:
  enabled: true
  max_versions_per_period: 10
  snapshot_on_approval: true
  track_field_changes: true
  retain_all_versions: true
  diff_report_enabled: true

# --- Consolidation ---
consolidation:
  approach: "OPERATIONAL_CONTROL"
  multi_entity: true
  require_subsidiary_sign_off: true
  inter_company_elimination: true
  currency_conversion_enabled: true
  production_normalisation_enabled: true

# --- Gap Analysis ---
gap_analysis:
  enabled: true
  assess_frequency: "SEMI_ANNUAL"
  maturity_model: "GHG_PROTOCOL_5_LEVEL"
  generate_improvement_roadmap: true
  benchmark_against_peers: true
  sector_benchmark_source: "CDP_MANUFACTURING"

# --- Documentation ---
documentation:
  methodology_doc_required: true
  assumption_register: true
  evidence_retention_years: 10
  link_to_source_documents: true
  auto_generate_methodology: true
  process_flow_diagrams: true
  mass_balance_documentation: true

# --- Reporting ---
reporting:
  frequency: "ANNUAL"
  formats:
    - "HTML"
    - "PDF"
    - "JSON"
    - "XBRL"
  executive_summary: true
  detailed_inventory: true
  verification_package: true
  output_language: "en"
  include_methodology_notes: true
  include_production_intensity: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
