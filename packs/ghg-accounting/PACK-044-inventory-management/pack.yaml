      path: "greenlang/agents/mrv/steam_heat_purchase/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-012
      name: "Cooling Purchase Agent"
      description: "Calculates Scope 2 emissions from purchased cooling and chilled water"
      path: "greenlang/agents/mrv/cooling_purchase/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-013
      name: "Dual Reporting Reconciliation Agent"
      description: "Reconciles location-based and market-based Scope 2 with delta analysis"
      path: "greenlang/agents/mrv/dual_reporting_reconciliation/"
      required: true
      version: "1.0.0"

  scope_3:
    - id: AGENT-MRV-014
      name: "Category 1 Purchased Goods Agent"
      description: "Scope 3 Category 1 purchased goods and services emissions"
      path: "greenlang/agents/mrv/scope3_cat1_purchased_goods/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-030
      name: "Audit Trail & Lineage Agent"
      description: "Cross-cutting audit trail and data lineage tracking"
      path: "greenlang/agents/mrv/audit_trail_lineage/"
      required: true
      version: "1.0.0"

