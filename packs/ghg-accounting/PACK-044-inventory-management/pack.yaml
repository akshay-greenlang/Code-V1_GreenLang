# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  data_collection:
    max_sources_per_facility: 200
    max_facilities: 1000
    collection_status_query_ms: 50
    progress_dashboard_generation_ms: 500
    reminder_batch_size: 1000
    reminder_dispatch_per_batch_ms: 200
  quality_management:
    completeness_check_per_source_ms: 10
    consistency_check_per_source_ms: 20
    accuracy_check_per_source_ms: 30
    transparency_check_per_source_ms: 15
    full_qaqc_suite_per_facility_ms: 500
    issue_register_generation_ms: 200
  change_management:
    impact_assessment_per_change_ms: 100
    significance_evaluation_ms: 50
    change_log_generation_ms: 500
  review_approval:
    workflow_stage_transition_ms: 50
    approval_audit_trail_generation_ms: 300
  versioning:
    snapshot_creation_per_facility_ms: 100
    version_comparison_per_source_ms: 10
    integrity_hash_generation_ms: 200
    max_snapshot_size_mb: 500
  consolidation:
    max_entities: 500
    consolidation_per_entity_ms: 100
    total_consolidation_target_seconds: 60
  gap_analysis:
    coverage_scan_per_facility_ms: 200
    remediation_plan_generation_ms: 1000
  documentation:
    methodology_doc_generation_ms: 2000
    verification_package_generation_ms: 10000
    inventory_manual_generation_ms: 5000
  benchmarking:
    sector_comparison_per_metric_ms: 100
    scorecard_generation_ms: 1000
  cache_hit_ratio_target: 0.85
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with entity-level, facility-level, and workflow-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
  required_roles:
    - ghg_manager
    - sustainability_officer
    - facility_manager
    - data_analyst
    - data_owner
    - reviewer
    - approver
    - verifier
    - viewer
    - admin
  audit_events:
    - "inventory.period.created"
    - "inventory.period.state_changed"
    - "inventory.data.collected"
    - "inventory.data.validated"
    - "inventory.qaqc.executed"
    - "inventory.qaqc.issue_resolved"
    - "inventory.change.recorded"
    - "inventory.change.approved"
    - "inventory.review.submitted"
    - "inventory.review.completed"
    - "inventory.approval.granted"
    - "inventory.approval.rejected"
    - "inventory.version.created"
    - "inventory.version.compared"
    - "inventory.consolidated"
    - "inventory.gap.identified"
    - "inventory.gap.remediated"
    - "inventory.document.generated"
    - "inventory.benchmark.completed"
    - "inventory.config.modified"
    - "inventory.preset.loaded"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_inventory_period.json"
    - "tests/fixtures/sample_data_collection_status.json"
    - "tests/fixtures/sample_qaqc_checklist.json"
    - "tests/fixtures/sample_change_record.json"
    - "tests/fixtures/sample_review_workflow.json"
    - "tests/fixtures/sample_inventory_version.json"
    - "tests/fixtures/sample_entity_hierarchy.json"
    - "tests/fixtures/sample_gap_analysis.json"
    - "tests/fixtures/sample_benchmark_data.json"

# -----------------------------------------------------------------------------
# Compliance Framework Mappings
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      coverage: "Chapter 7: inventory quality management, QA/QC, documentation, improvement"
    - id: "ISO_14064_1"
      name: "ISO 14064-1:2018"
      coverage: "Clauses 7-9: quality management, reporting, improvement"
    - id: "ISO_14064_3"
      name: "ISO 14064-3:2019"
      coverage: "Verification preparation, evidence compilation, management assertion"
    - id: "ESRS_E1"
      name: "ESRS E1 Climate Change"
      coverage: "Data quality for E1-6, E1-7; methodology documentation; assurance readiness"
    - id: "CDP"
      name: "CDP Climate Change"
      coverage: "C5 methodology, C10 verification status, response quality management"
    - id: "SBTI"
      name: "Science Based Targets initiative"
      coverage: "Inventory quality for target setting, annual tracking, recalculation triggers"
    - id: "SEC"
      name: "US SEC Climate Disclosure"
      coverage: "Attestation-ready data, internal controls, methodology documentation"
    - id: "SB_253"
      name: "California SB 253"
      coverage: "Third-party assurance readiness, data quality, annual reporting cycle"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
    min_connections: 15
    recommended_connections: 40

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_mrv_agents_available
    - verify_data_agents_available
    - verify_foundation_agents_available
    - verify_document_store_accessible

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
      - "V326-V335"   # PACK-041 Scope 1-2 Complete
      - "V336-V345"   # PACK-042 Scope 3 Starter
      - "V346-V355"   # PACK-043 Scope 3 Complete
    new:
      - "V356__pack044_inventory_mgmt_001"
      - "V357__pack044_inventory_mgmt_002"
      - "V358__pack044_inventory_mgmt_003"
      - "V359__pack044_inventory_mgmt_004"
      - "V360__pack044_inventory_mgmt_005"
      - "V361__pack044_inventory_mgmt_006"
      - "V362__pack044_inventory_mgmt_007"
      - "V363__pack044_inventory_mgmt_008"
      - "V364__pack044_inventory_mgmt_009"
      - "V365__pack044_inventory_mgmt_010"

  post_install:
    - seed_period_templates
    - seed_qaqc_check_rules
    - seed_review_workflow_templates
    - seed_documentation_templates
    - seed_benchmark_sector_data
    - validate_preset_configs

