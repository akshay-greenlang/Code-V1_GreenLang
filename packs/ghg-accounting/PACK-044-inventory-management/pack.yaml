    - id: "V360__pack044_inventory_mgmt_005"
      description: "Review and approval workflow tables, stages, comments, and audit trail"
    - id: "V361__pack044_inventory_mgmt_006"
      description: "Inventory versioning tables, snapshots, version metadata, and integrity hashes"
    - id: "V362__pack044_inventory_mgmt_007"
      description: "Consolidation management tables, entity hierarchy, and ownership tracking"
    - id: "V363__pack044_inventory_mgmt_008"
      description: "Gap analysis tables, gap records, remediation plans, and coverage metrics"
    - id: "V364__pack044_inventory_mgmt_009"
      description: "Documentation tables, document registry, templates, and generation history"
    - id: "V365__pack044_inventory_mgmt_010"
