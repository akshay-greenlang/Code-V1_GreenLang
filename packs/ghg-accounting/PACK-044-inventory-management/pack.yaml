    - id: AGENT-MRV-003
      name: "Process Emissions Agent"
      description: "Emissions from chemical and physical transformation processes"
      path: "greenlang/agents/mrv/process_emissions/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-004
      name: "Fugitive Emissions Agent"
      description: "Emissions from intentional and unintentional releases (leaks, venting)"
