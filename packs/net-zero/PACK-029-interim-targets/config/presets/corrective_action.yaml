# =============================================================================
# PACK-029 Interim Targets Pack - Corrective Action Preset
# =============================================================================
# Configuration focused on proactive corrective action planning with MACC
# integration from PACK-028, initiative optimization, advanced forecasting,
# and escalation workflows. Designed for organizations that want to detect
# and respond to interim target deviations before they become critical.
#
# Typical use cases:
#   - Organizations that have missed or are at risk of missing interim targets
#   - Companies needing to accelerate reduction initiatives
#   - Enterprises with complex multi-initiative reduction programs
#   - Organizations wanting to optimize initiative sequencing and cost
#   - Companies under regulatory or investor pressure on climate targets
#
# Key characteristics:
#   - AMBER trigger for early intervention (not waiting for RED)
#   - Full MACC integration with PACK-028 for cost-effective lever identification
#   - Advanced ARIMA forecasting with 5-year horizon
#   - Scenario remodeling when gaps detected
#   - Structured action plan templates with responsibilities
#   - Cost-benefit analysis for each proposed action
#   - Implementation timeline with milestones
#   - Escalation after 2 consecutive off-track periods
#   - Up to 25 corrective actions per review cycle
#
# Corrective action workflow:
#   1. Detect: Variance exceeds tolerance (AMBER or RED)
#   2. Quantify: Calculate tCO2e gap to annual and cumulative budget
#   3. Diagnose: Root cause analysis via LMDI decomposition
#   4. Forecast: Project gap forward using ARIMA to assess severity
#   5. Identify: Pull MACC levers from PACK-028 ranked by cost-effectiveness
#   6. Optimize: Re-sequence existing initiatives to maximize near-term impact
#   7. Plan: Generate action plan with responsibilities and timeline
#   8. Execute: Implement actions with quarterly progress checkpoints
#   9. Verify: Confirm emission reduction achieved
#   10. Escalate: If gap persists after 2 periods, escalate to C-suite
# =============================================================================

# --- Organization ---
organization_name: ""
organization_id: null

# --- Temporal Settings ---
baseline_year: 2019
current_year: 2024
reporting_year: 2024

# --- Long-Term Target ---
long_term_target_year: 2050
long_term_reduction_pct: 90.0
net_zero_year: 2050
sbti_pathway: "1.5C"

# --- 5-Year Interim Target ---
interim_target_5yr:
  enabled: true
  target_year: 2030
  min_reduction_pct: 42.0
  scope_1_2_reduction_pct: 42.0
  scope_3_reduction_pct: 25.0
  label: "SBTi 1.5C near-term target (2030)"

# --- 10-Year Interim Target ---
interim_target_10yr:
  enabled: true
  target_year: 2035
  min_reduction_pct: 65.0
  scope_1_2_reduction_pct: 65.0
  scope_3_reduction_pct: 50.0
  label: "Mid-term milestone (2035)"

# --- Custom Milestones (annual checkpoints for corrective tracking) ---
custom_milestones:
  - enabled: true
    target_year: 2026
    min_reduction_pct: 15.0
    label: "Annual checkpoint 2026"
  - enabled: true
    target_year: 2028
    min_reduction_pct: 28.0
    label: "Annual checkpoint 2028"

# --- Pathway ---
pathway_type: "linear"
annual_reduction_rate: 4.2
s_curve_inflection_year: null
milestone_years: null
milestone_reductions_pct: null

# --- Scope Coverage ---
scope:
  scope_1_included: true
  scope_2_included: true
  scope_2_method: "market_based"
  scope_3_included: true
  scope_3_lag_years: 5
  scope_3_categories: [1, 2, 3, 4, 5, 6, 7, 11, 12]
  scope_3_significant_threshold_pct: 40.0
  scope_3_coverage_pct: 67.0
  scope_1_coverage_pct: 95.0
  scope_2_coverage_pct: 95.0

# --- Progress Monitoring ---
monitoring:
  monitoring_frequency: "quarterly"
  variance_tolerance_pct: 8.0
  performance_scoring_enabled: true
  amber_threshold_multiplier: 1.0
  red_threshold_multiplier: 2.0
  trend_detection_enabled: true
  trend_window_periods: 4
  cumulative_tracking_enabled: true
  year_on_year_comparison: true
  normalized_tracking: true

# --- Variance Analysis ---
variance:
  variance_method: "lmdi"
  decomposition_levels:
    - "scope"
    - "category"
    - "initiative"
    - "facility"
  root_cause_classification: true
  root_cause_taxonomy: "extended"
  materiality_threshold_pct: 1.5
  historical_comparison_years: 3
  waterfall_visualization: true
  attribution_confidence_enabled: true

# --- Trend Extrapolation (FOCUS AREA) ---
extrapolation:
  extrapolation_method: "arima"
  forecast_horizon_years: 5
  confidence_interval: 0.95
  backtesting_enabled: true
  backtesting_holdout_years: 2
  ensemble_enabled: true
  scenario_adjustment_enabled: true
  min_data_points: 8
  outlier_detection: true
  outlier_z_score_threshold: 2.0

# --- Corrective Actions (FOCUS AREA) ---
corrective_action:
  corrective_action_trigger: "amber"
  gap_quantification_enabled: true
  initiative_optimization: true
  macc_integration: true
  macc_carbon_price_usd: 100.0
  scenario_remodeling: true
  action_plan_template: true
  escalation_enabled: true
  escalation_threshold_periods: 2
  max_corrective_actions: 25
  cost_benefit_analysis: true
  implementation_timeline: true

# --- Carbon Budget ---
carbon_budget:
  carbon_budget_enabled: true
  budget_allocation_method: "front_loaded"
  budget_overshoot_allowed: false
  overshoot_compensation_years: 2
  cumulative_budget_tracking: true
  budget_reserve_pct: 8.0
  quarterly_budget_splits: true
  scope_level_budgets: true
  facility_level_budgets: true
  budget_unit: "tCO2e"

# --- SBTi Validation ---
sbti_validation:
  sbti_validation_enabled: true
  sbti_criteria_count: 21
  sbti_minimum_ambition_check: true
  sbti_boundary_check: true
  sbti_timeframe_check: true
  sbti_recalculation_trigger_pct: 5.0
  sbti_submission_date: null
  sbti_commitment_type: "near_term_and_net_zero"
  auto_fix_suggestions: true

# --- Reporting ---
reporting:
  reporting_frameworks:
    - "sbti"
    - "cdp"
    - "tcfd"
  reporting_frequency: "quarterly"
  public_disclosure_enabled: true
  assurance_level: "limited"
  sha256_provenance: true
  calculation_trace: true
  assumption_register: true
  data_lineage_enabled: true
  retention_years: 7
  executive_summary_enabled: true
  benchmark_comparison: true

# --- Alerting ---
alerting:
  email_alerts_enabled: true
  slack_alerts_enabled: true
  webhook_alerts_enabled: false
  alert_recipients: []
  slack_channel: null
  webhook_url: null
  alert_escalation_enabled: true
  escalation_recipients: []
  alert_on_green: false
  alert_on_amber: true
  alert_on_red: true
  digest_frequency: "daily"

# --- Performance ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 1800
  max_concurrent_calcs: 8
  timeout_seconds: 600
  batch_size: 1000
  memory_limit_mb: 8192

# --- Pack Metadata ---
pack_version: "1.0.0"
