      sbti_alignment: "Current policies"

# Convergence models
convergence_models:
  - id: linear
    name: "Linear Convergence"
    formula: "Intensity(t) = Intensity(base) - (t - base_year) * reduction_rate"
    best_for: "Buildings, some transport modes"
  - id: exponential
    name: "Exponential Convergence"
    formula: "Intensity(t) = Intensity(base) * exp(-k * (t - base_year))"
    best_for: "Power generation, road transport"
  - id: s_curve
    name: "S-Curve Convergence"
    formula: "Intensity(t) = I(2050) + (I(base) - I(2050)) / (1 + exp(k*(t-t_inflection)))"
    best_for: "Steel, cement, aviation (technology-driven)"
  - id: stepped
    name: "Stepped Convergence"
    formula: "Intensity(t) = Intensity(step_n) for t in [step_n_start, step_n_end]"
    best_for: "Shipping (IMO), sectors with policy milestones"

