# =============================================================================
# PACK-021: Net Zero Starter Pack
# GreenLang Net Zero Planning and Decarbonization Pack
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for organizations beginning their net-zero journey.
# It covers GHG baseline calculation across all three scopes, science-based
# target setting aligned with SBTi Net-Zero Standard v1.2, decarbonization
# pathway modeling, marginal abatement cost curve (MACC) analysis, gap-to-target
# tracking, carbon credit and offset portfolio management, and multi-framework
# reporting (CDP, TCFD, SBTi, ESRS E1).
#
# The pack implements zero-hallucination calculation engines: all emissions
# calculations use deterministic formulas with IPCC AR6 emission factors,
# GHG Protocol methodologies, and SBTi pathway models. LLMs are used only
# for classification, entity resolution, and narrative generation.
#
# Key Capabilities:
#   - Full Scope 1/2/3 GHG inventory baseline (GHG Protocol Corporate Standard)
#   - SBTi-aligned target setting (1.5C, well-below 2C, net-zero by 2050)
#   - Decarbonization pathway modeling (ACA, SDA, FLAG pathways)
#   - Marginal abatement cost curve (MACC) analysis for reduction actions
#   - Gap-to-target analysis with year-by-year trajectory
#   - Carbon credit and offset portfolio management (VCMI, Oxford Principles)
#   - Residual emissions estimation for long-term net-zero planning
#   - Net-zero scorecard with maturity assessment
#   - Sector benchmarking against SBTi-validated peers
#   - Multi-framework reporting: CDP Climate, TCFD, SBTi, ESRS E1
#
# Regulatory and Framework References:
#   - SBTi Net-Zero Standard v1.2 (2024)
#   - GHG Protocol Corporate Accounting and Reporting Standard (revised)
#   - GHG Protocol Scope 3 Standard (Corporate Value Chain)
#   - IPCC AR6 WG3 (Mitigation of Climate Change, 2022)
#   - Paris Agreement Article 4 (nationally determined contributions)
#   - ISO 14064-1:2018 (GHG quantification and reporting)
#   - ISO 14068-1:2023 (Carbon neutrality)
#   - VCMI Claims Code of Practice (2023)
#   - Oxford Principles for Net Zero Aligned Carbon Offsetting (2024)
#   - CDP Climate Change Questionnaire (2025)
#   - TCFD Recommendations (2017, updated 2021)
#   - ESRS E1 Climate Change (Delegated Regulation (EU) 2023/2772)
#
# Target Organizations:
#   - Mid-market and enterprise companies starting net-zero planning
#   - Organizations seeking SBTi target validation
#   - Companies preparing CDP Climate or TCFD disclosures
#   - Sustainability teams needing actionable decarbonization roadmaps
#
# Version History:
#   1.0.0 - Initial release (2026-03-18)
# =============================================================================

