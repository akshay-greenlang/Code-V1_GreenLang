# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 84
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    decarb_agents: 21
    offset_agents: 3
  bridged_apps: 4
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  baseline_calculation:
    max_facilities: 500
    max_emission_sources: 5000
    target_duration_minutes: 30
    per_facility_calc_ms: 200
  target_setting:
    target_duration_minutes: 5
    pathway_calc_ms: 500
  decarbonization_pathway:
    max_reduction_actions: 200
    macc_calc_per_action_ms: 100
    target_duration_minutes: 10
  scope3:
    max_suppliers: 10000
    max_spend_line_items: 100000
    target_duration_minutes: 45
  reporting:
    report_generation_minutes: 5
    cdp_mapping_minutes: 3
  cache_hit_ratio_target: 0.70
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and business-unit access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - net_zero_manager
    - sustainability_analyst
    - finance_reviewer
    - executive_viewer
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_sbti_pathway_data
    - verify_ipcc_gwp_values

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
      - "V082-V088"
      - "V089-V128"
    new:
      - "V083-PACK021-001"  # Net-zero baseline and inventory tables
      - "V083-PACK021-002"  # Target setting and pathway tables
      - "V083-PACK021-003"  # Reduction action and MACC tables
      - "V083-PACK021-004"  # Gap analysis and progress tracking tables
      - "V083-PACK021-005"  # Carbon credit and offset portfolio tables
      - "V083-PACK021-006"  # Scorecard, benchmark, and reporting tables

  post_install:
    - seed_ipcc_ar6_gwp_values
    - seed_emission_factor_databases
    - seed_sbti_pathway_models
    - seed_grid_emission_factors
    - seed_sector_benchmark_data
    - seed_credit_registry_metadata
    - seed_default_presets
    - run_health_checks
