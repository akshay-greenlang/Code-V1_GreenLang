metadata:
  name: PACK-021-net-zero-starter
  version: "1.0.0"
  display_name: "Net Zero Starter Pack"
  description: >-
    Comprehensive GreenLang deployment pack for organizations beginning their
    net-zero journey. Includes 8 engines for GHG baseline calculation, SBTi
    target setting, decarbonization pathway modeling, MACC analysis, gap-to-target
    tracking, carbon credit portfolio management, residual emissions estimation,
    and net-zero scorecard with benchmarking. Bundles all 30 MRV agents for
    Scope 1/2/3 emissions, 20 data intake/quality agents, 10 foundation agents,
    21 decarbonization agents, 3 offset/credit agents, and bridges to GL-GHG-APP,
    GL-SBTi-APP, GL-CDP-APP, and GL-TCFD-APP. Supports manufacturing, services,
    retail, energy, technology, and agriculture sectors with tailored presets
    and multi-framework reporting (CDP, TCFD, SBTi, ESRS E1).
