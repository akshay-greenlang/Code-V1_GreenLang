        GPC methodology, transport/buildings/waste sector focus,
        city-scale pathway alignment with C40 Deadline 2020 benchmarks,
        municipal governance integration, all 10 engines enabled.
      actor_type: "CITY"
      enabled_engines:
        - pledge_commitment
        - starting_line
        - interim_target
        - action_plan
        - progress_tracking
        - sector_pathway
        - partnership_scoring
        - campaign_reporting
        - credibility_assessment
        - race_readiness
      file: "config/presets/city_municipality.yaml"

    - id: region_state
      name: "Region/State Preset"
      description: >-
        Region/State/Province Race to Zero configuration. Under2
