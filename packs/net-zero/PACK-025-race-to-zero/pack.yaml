      file: "config/presets/region_state.yaml"

    - id: sme_business
      name: "SME Business Preset"
      description: >-
        SME (<250 employees) Race to Zero configuration. Simplified
        6-engine flow (pledge, starting_line, interim_target,
        action_plan, progress_tracking, race_readiness), SME Climate
        Hub primary partner pathway, spend-based Scope 3 estimation,
        streamlined reporting, abbreviated HLEG assessment, ACA
