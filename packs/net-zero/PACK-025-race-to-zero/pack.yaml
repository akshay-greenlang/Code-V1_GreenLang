# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 63
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    race_to_zero_engines: 10
  bridged_apps: 4
  bridged_packs: 3
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  pledge_commitment:
    target_duration_minutes: 3
    eligibility_criteria: 8
    quality_levels: 4
    max_partner_initiatives_assessed: 40
  starting_line:
    target_duration_minutes: 10
    pillars: 4
    sub_criteria: 20
    evidence_mapping_per_criterion: true
  interim_target:
    target_duration_minutes: 5
    pathway_sources: 6
    scope_coverage_validation: true
    fair_share_assessment: true
  action_plan:
    target_duration_minutes: 10
    max_decarbonization_actions: 100
    macc_curve_resolution: 50
    milestone_tracking: true
  progress_tracking:
    target_duration_minutes: 5
    max_historical_years: 10
    trajectory_statuses: 4
    multi_scope_variance: true
  sector_pathway:
    target_duration_minutes: 5
    pathway_sources: 7
    sectors_covered: 25
    intensity_and_absolute_benchmarks: true
  partnership_scoring:
    target_duration_minutes: 3
    max_partner_initiatives: 40
    engagement_quality_dimensions: 5
  campaign_reporting:
    target_duration_minutes: 10
    partner_format_outputs: 5
    multi_channel_submission: true
  credibility_assessment:
    hleg_recommendations: 10
    sub_criteria: 45
    target_duration_minutes: 10
    rating_levels: 6
  race_readiness:
    target_duration_minutes: 3
    readiness_dimensions: 8
    score_range: "0-100"
    rag_levels: 3
    readiness_levels: 4
  full_race_to_zero_workflow:
    target_duration_minutes: 180
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with organization-level and pledge-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - race_to_zero_admin
    - sustainability_manager
    - climate_analyst
    - pledge_coordinator
    - partnership_manager
    - external_auditor
    - viewer

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 60

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_ipcc_ar6_gwp_values
    - verify_pathway_benchmark_data
    - verify_hleg_criteria_definitions
    - verify_starting_line_criteria_data
    - verify_partner_initiative_registry
    - verify_sector_pathway_sources

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
      - "V082-V088"
    new:
      - "V148__pack025_race_to_zero_001"  # Schema + organization profiles + pledge commitments + partner memberships
      - "V149__pack025_race_to_zero_002"  # Starting line assessments + starting line gaps
      - "V150__pack025_race_to_zero_003"  # Interim targets + action plans + abatement actions
      - "V151__pack025_race_to_zero_004"  # Annual reports (trajectory, verification, multi-channel)
      - "V152__pack025_race_to_zero_005"  # Sector pathways (IEA, IPCC, TPI, MPP, ACT, CRREM)
      - "V153__pack025_race_to_zero_006"  # Partnership collaborations (7 types, 5 engagement levels)
      - "V154__pack025_race_to_zero_007"  # Credibility assessments (HLEG 10 recommendations)
      - "V155__pack025_race_to_zero_008"  # Campaign submissions + readiness scores
      - "V156__pack025_race_to_zero_009"  # Audit trail + workflow executions
      - "V157__pack025_race_to_zero_010"  # Views (pledge summary, progress timeline, partner overview) + RLS

  post_install:
    - seed_race_to_zero_campaign_criteria
    - seed_starting_line_sub_criteria
    - seed_hleg_recommendations_and_sub_criteria
    - seed_partner_initiative_registry
    - seed_sector_pathway_benchmarks
    - seed_emission_factor_databases
    - seed_ipcc_ar6_pathway_data
    - seed_iea_nze_milestones
    - seed_actor_type_configurations
    - seed_default_presets
    - run_health_checks
