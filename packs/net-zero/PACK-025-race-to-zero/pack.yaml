    - id: financial_institution
      name: "Financial Institution Preset"
      description: >-
        Bank/Insurance/Asset Manager Race to Zero configuration.
        GFANZ primary partner pathway, PCAF financed emissions
        methodology, portfolio temperature scoring, Scope 3 Category
        15 (investments) focus, financed emissions pathway with
        sector-level portfolio targets, GFANZ transition plan format,
