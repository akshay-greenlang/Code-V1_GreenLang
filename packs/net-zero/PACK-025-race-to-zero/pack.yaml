        immediate action to halve global emissions by 2030 and achieve net
        zero by 2050 at the latest. Mobilizes 11,000+ entities (corporates,
        financial institutions, cities, regions, universities, healthcare)
        representing ~25% of global CO2 emissions and ~50% of GDP. Operates
        through 40+ partner initiatives (SBTi, CDP, C40, ICLEI, GFANZ, etc.)
        with Starting Line Criteria (Pledge, Plan, Proceed, Publish) defining
        minimum participation requirements per the June 2022 Interpretation
        Guide.
