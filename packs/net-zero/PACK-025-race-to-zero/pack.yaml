  compliance_references:
    - id: "R2Z_CAMPAIGN"
      name: "Race to Zero Campaign"
      regulation: "UNFCCC Race to Zero Campaign (2020, updated 2022)"
      effective_date: "2020-06-05"
      description: >-
        UN-backed global campaign for non-state actor climate action.
        Requires participants to pledge net zero by 2050, set interim
        2030 targets covering all scopes, publish a climate action plan
        within 12 months, take immediate action, and report progress
        annually through partner initiative channels. Starting Line
        Criteria (4 pillars, 20 sub-criteria) define minimum compliance.

    - id: "R2Z_INTERPRETATION"
      name: "Race to Zero Interpretation Guide"
      regulation: "UNFCCC Race to Zero Interpretation Guide (June 2022)"
      effective_date: "2022-06-15"
      description: >-
        Detailed guidance document defining the four Starting Line Criteria
        (Pledge, Plan, Proceed, Publish) with 20 sub-criteria, minimum
        ambition levels for interim and long-term targets, scope coverage
        requirements, and evidence standards for compliance demonstration.

    - id: "HLEG_INTEGRITY"
      name: "HLEG Integrity Matters"
      regulation: "UN Secretary-General HLEG - Integrity Matters (November 2022)"
      effective_date: "2022-11-08"
      description: >-
        High-Level Expert Group report on credible net-zero commitments
        of non-state entities. Establishes 10 recommendations with 45+
        sub-criteria: net-zero pledge quality, interim target ambition,
        voluntary credit use, lobbying alignment, just transition,
        financial commitment, reporting transparency, scope of pledge,
        internal governance, and fossil fuel phase-out.

    - id: "PARIS_AGREEMENT"
      name: "Paris Agreement"
      regulation: "UNFCCC Paris Agreement (2015)"
      effective_date: "2016-11-04"
      description: >-
        International climate agreement aiming to limit global temperature
        rise to well below 2C, preferably 1.5C, compared to pre-industrial
        levels. Provides the overarching framework for Race to Zero's
        net-zero-by-2050 commitment and the 1.5C pathway alignment
        requirement for interim targets.

    - id: "IPCC_AR6"
      name: "IPCC Sixth Assessment Report"
      regulation: "IPCC AR6 WG1 (2021) and WG3 (2022)"
      effective_date: "2021-08-09"
      description: >-
        Provides scientific basis for GWP-100 values, global carbon
        budgets, and sector-specific decarbonization pathways. AR6 WG3
        establishes the 43% emission reduction by 2030 benchmark for
        1.5C alignment that underpins Race to Zero interim target
        requirements.

    - id: "SBTI_NET_ZERO"
      name: "SBTi Corporate Net-Zero Standard"
      regulation: "SBTi Corporate Net-Zero Standard V1.3 (2024)"
      effective_date: "2024-01-01"
      description: >-
        Science Based Targets initiative standard for corporate net-zero
        targets. Defines near-term (5-10 year), long-term, and net-zero
        target validation criteria. Key Race to Zero partner initiative
        for corporate participants. SDA and ACA pathway methodologies
        with 4.2%/yr minimum reduction rate for 1.5C alignment.

    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol Corporate Accounting and Reporting Standard"
      effective_date: "2004-03-01"
      description: >-
        The foundational standard for corporate GHG accounting. Defines
        organizational and operational boundaries, Scope 1/2/3 categories,
        emission factor selection, and reporting requirements. Required
        for Race to Zero emission inventory and target baseline.

    - id: "GHG_SCOPE3"
      name: "GHG Protocol Scope 3 Standard"
      regulation: "GHG Protocol Corporate Value Chain (Scope 3) Standard"
      effective_date: "2011-10-01"
      description: >-
        Defines 15 categories of Scope 3 emissions across the corporate
        value chain. Critical for Race to Zero scope coverage requirements
        that mandate inclusion of material Scope 3 categories.

    - id: "GFANZ"
      name: "GFANZ Guidance"
      regulation: "Glasgow Financial Alliance for Net Zero Guidance (2022)"
      effective_date: "2022-11-01"
      description: >-
        Financial institution transition plan framework covering PCAF
        financed emissions, portfolio targets, and sector pathway
        alignment for banks, insurers, and asset managers participating
        in Race to Zero through the GFANZ partnership.

    - id: "IEA_NZE"
      name: "IEA Net Zero by 2050"
      regulation: "IEA Net Zero by 2050 Roadmap (2021, updated 2023)"
      effective_date: "2021-05-18"
      description: >-
        International Energy Agency roadmap with sector-specific
        milestones and benchmarks for achieving global net-zero emissions
        by 2050. Provides key sector pathway reference data for the
        sector pathway alignment engine.

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Race to Zero lifecycle calculation engines (10 engines)
  # ===========================================================================
  engines:
    - id: pledge_commitment
      name: "Pledge Commitment Engine"
      description: >-
        Validates pledge eligibility, commitment quality, and actor-type
        requirements for Race to Zero participation. Assesses 8 eligibility
        criteria: net-zero commitment by 2050, partner initiative membership,
        interim 2030 target, action plan commitment, annual reporting
        commitment, scope coverage, governance endorsement, and public
        disclosure. Generates pledge quality rating (Strong/Adequate/Weak/
        Ineligible) with criterion-level pass/fail/partial assessment and
        partner alignment crosswalk. Zero-hallucination: all eligibility
        criteria from Race to Zero Interpretation Guide; quality scoring
        rubric deterministic with SHA-256 provenance hashing.
      module: "engines.pledge_commitment_engine"
      required: true

    - id: starting_line
      name: "Starting Line Engine"
      description: >-
        Assesses compliance with the four Starting Line Criteria (Pledge,
        Plan, Proceed, Publish) per the June 2022 Interpretation Guide.
        Evaluates 20 sub-criteria: Pledge (SL-P1 to SL-P5: net-zero target,
        interim target, science-based methodology, fair share, scope
        coverage), Plan (SL-A1 to SL-A5: action plan published, quantified
        actions, timeline/milestones, resource allocation, sector alignment),
        Proceed (SL-R1 to SL-R5: immediate action, emission reductions,
        investment commitment, governance integration, no contradictory
        action), Publish (SL-D1 to SL-D5: annual reporting, emissions
        disclosure, target progress, plan updates, transparency). Produces
        per-pillar and overall compliance score with gap identification and
        remediation guidance. Zero-hallucination: criteria from published
        Interpretation Guide; all assessments deterministic.
      module: "engines.starting_line_engine"
      required: true

    - id: interim_target
      name: "Interim Target Engine"
      description: >-
        Validates 2030 interim targets against 1.5C pathway requirements.
        Confirms approximately 50% absolute emission reduction by 2030
        from a recent baseline (IPCC AR6: 43% by 2030). Validates scope
        coverage (Scope 1+2+3 for corporates; community-wide for cities),
        checks science-based methodology alignment (SBTi SDA/ACA with
        minimum 4.2%/yr reduction rate), assesses "fair share" contribution
        to global effort, and validates target boundary and ambition level.
        Supports cross-validation against SBTi, IEA NZE, and IPCC AR6
        benchmarks. Zero-hallucination: pathway benchmarks from published
        scientific literature; all validation logic deterministic.
      module: "engines.interim_target_engine"
      required: true

    - id: action_plan
      name: "Action Plan Engine"
      description: >-
        Generates and validates climate action plans per Race to Zero
        requirements. Produces quantified action plans with specific
        decarbonization levers, timelines (12-month publication deadline),
        milestones, resource allocation, abatement impact (tCO2e), and
        cost estimates (EUR/tCO2e MACC). Validates plan completeness
        against HLEG and Interpretation Guide criteria. Covers energy
        efficiency, renewable procurement, fuel switching, process
        optimization, supply chain engagement, transport electrification,
        and sector-specific actions. Zero-hallucination: MACC coefficients
        from published sector studies; abatement potentials from technology
        databases; all calculations deterministic.
      module: "engines.action_plan_engine"
      required: true

    - id: progress_tracking
      name: "Progress Tracking Engine"
      description: >-
        Tracks annual progress against interim and long-term targets.
        Calculates year-over-year emission changes (absolute and intensity),
        assesses trajectory alignment with 2030 and 2050 targets, identifies
        on-track/off-track status (ON_TRACK, SLIGHTLY_OFF, SIGNIFICANTLY_OFF,
        REVERSED), generates variance analysis with root cause identification,
        triggers corrective action recommendations, and produces annual
        progress disclosures for partner initiative reporting channels.
        Supports multi-year trend analysis with cumulative reduction tracking.
        Zero-hallucination: all progress arithmetic deterministic with
        published benchmark comparison.
      module: "engines.progress_tracking_engine"
      required: true

    - id: sector_pathway
      name: "Sector Pathway Engine"
      description: >-
        Maps entity-level decarbonization plans to sector-specific pathways
        from 25+ sectors. Sources pathway data from IEA NZE (2021/2023),
        IPCC AR6 WG3 (2022), TPI (2024), MPP (2022 - steel, cement,
        shipping, aviation, trucking, chemicals, aluminium), ACT (2023),
        and CRREM (2023 - real estate). Calculates gap-to-benchmark for
        the entity's sector, identifies sector-specific milestones (coal
        phase-out dates, EV penetration targets, renewable energy share,
        process emission reduction targets), and assesses pathway
        credibility. Supports SDA and ACA pathway types with intensity
        and absolute benchmarking. Zero-hallucination: all pathway data
        from published sources; gap calculations deterministic.
      module: "engines.sector_pathway_engine"
      required: true

    - id: partnership_scoring
      name: "Partnership Scoring Engine"
      description: >-
        Assesses collaboration quality and partner initiative alignment
        across Race to Zero's 40+ partner network. Maps partner initiative
        requirements to Race to Zero Starting Line Criteria, scores entity
        participation across multiple partnerships, identifies reporting
        synergies and duplications, evaluates engagement quality (active
        vs. passive membership), tracks partner-specific compliance
        deadlines, and generates engagement recommendations. Covers
        7 primary partners: SBTi, CDP, C40, ICLEI, GFANZ, SME Climate
        Hub, Under2 Coalition, plus We Mean Business Coalition and The
        Climate Pledge. Zero-hallucination: partner requirements from
        published documentation; scoring rubric deterministic.
      module: "engines.partnership_scoring_engine"
      required: true

    - id: campaign_reporting
      name: "Campaign Reporting Engine"
      description: >-
        Generates Race to Zero annual disclosure reports aligned to campaign
        and partner requirements. Produces structured reports covering
        emissions inventory, target progress, action plan implementation,
        partnership engagement, and forward-looking commitments. Maps
        outputs to partner-specific reporting formats: CDP Climate Change
        for corporates, GFANZ transition plans for financial institutions,
        C40 reporting for cities, ICLEI GreenClimateCities for local
        governments, and custom formats for other partner initiatives.
        Supports multi-channel submission with consistency validation.
        Zero-hallucination: report structure from campaign requirements;
        data aggregation deterministic.
      module: "engines.campaign_reporting_engine"
      required: true

    - id: credibility_assessment
      name: "Credibility Assessment Engine"
      description: >-
        Evaluates pledge credibility against the HLEG "Integrity Matters"
        10 recommendations with 45+ sub-criteria. Covers: R1 net-zero
        pledge quality (specificity, boundary, ambition), R2 interim
        target ambition (1.5C alignment, scope coverage, methodology),
        R3 voluntary credit use (reduction-first, offset quality, no
        greenwashing), R4 lobbying alignment (trade association review,
        policy advocacy consistency), R5 just transition (social impact
        assessment, stakeholder engagement), R6 financial commitment
        (CapEx alignment, green investment share), R7 reporting
        transparency (annual disclosure, methodology documentation),
        R8 scope of pledge (full value chain, no cherry-picking), R9
        internal governance (board oversight, incentive alignment), R10
        fossil fuel phase-out (no new capacity, divestment timeline).
        Generates overall credibility rating (A-F) with per-recommendation
        scores. Zero-hallucination: HLEG criteria from published report;
        scoring rubric deterministic.
      module: "engines.credibility_assessment_engine"
      required: true

    - id: race_readiness
      name: "Race Readiness Engine"
      description: >-
        Overall readiness scoring for Race to Zero campaign participation.
        Aggregates results from all other engines into a composite
        readiness score across 8 dimensions: pledge strength, Starting
        Line compliance, target ambition, action plan quality, progress
        trajectory, sector alignment, partnership engagement, and HLEG
        credibility. Produces a 0-100 composite score with configurable
        dimension weights (default equal weighting), RAG status (Red/
        Amber/Green), readiness level (Not Ready/Partially Ready/Ready/
        Exemplary), and prioritized improvement actions ranked by impact.
        Supports actor-type-specific weighting for different participant
        categories. Zero-hallucination: all aggregation arithmetic
        deterministic; weights from configurable parameters.
      module: "engines.race_readiness_engine"
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 workflows)
  # ===========================================================================
  workflows:
    - id: pledge_onboarding_workflow
      name: "Pledge Onboarding Workflow"
      description: >-
        5-phase guided onboarding for new Race to Zero participants:
        EligibilityCheck (validate actor type, entity profile, and basic
        eligibility against 8 criteria) -> PledgeFormulation (draft
        pledge statement with net-zero commitment, scope, and timeline)
        -> PartnerSelection (match to optimal partner initiative based
        on actor type, sector, and geography) -> PledgeSubmission
        (prepare and submit pledge package to campaign secretariat) ->
        ConfirmationTracking (track submission status and confirmation
        from partner initiative). Orchestrates pledge commitment engine
        with partner scoring engine.
      schedule: "on_demand"
      estimated_duration_minutes: 45
      phases: 5

    - id: starting_line_assessment_workflow
      name: "Starting Line Assessment Workflow"
      description: >-
        4-phase full Starting Line Criteria assessment: CriteriaMapping
        (map organizational activities to all 20 sub-criteria across
        4 pillars) -> EvidenceCollection (identify and gather evidence
        documents for each sub-criterion) -> ComplianceCheck (assess
        compliance status for each criterion: pass/fail/partial) ->
        GapReport (generate gap analysis with remediation actions and
        priority ranking). Orchestrates starting line engine with
        action plan engine.
      schedule: "on_demand"
      estimated_duration_minutes: 60
      phases: 4

    - id: action_planning_workflow
      name: "Action Planning Workflow"
      description: >-
        5-phase end-to-end climate action plan development:
        EmissionsProfile (quantify current emissions by scope and
        category using MRV agents) -> LeverIdentification (identify
        available decarbonization levers by sector and actor type) ->
        ActionPrioritization (rank actions by MACC cost-effectiveness,
        abatement potential, and implementation readiness) ->
        PlanDrafting (generate quantified action plan with milestones,
        costs, and resource requirements) -> PlanValidation (validate
        plan completeness against HLEG and Interpretation Guide
        criteria). Orchestrates action plan engine with MRV bridge
        and sector pathway engine.
      schedule: "on_demand"
      estimated_duration_minutes: 90
      phases: 5

    - id: annual_reporting_workflow
      name: "Annual Reporting Workflow"
      description: >-
        5-phase annual progress reporting cycle: DataCollection (gather
        current year emissions data from all sources via DATA agents)
        -> ProgressCalculation (calculate year-over-year changes and
        trajectory alignment) -> VarianceAnalysis (identify variances
        from target trajectory with root cause analysis) ->
        ReportGeneration (generate annual disclosure report with
        metrics, charts, and narrative) -> PartnerSubmission (format
        and submit reports to partner-specific channels: CDP, GFANZ,
        C40, ICLEI). Orchestrates progress tracking engine with
        campaign reporting engine and partner bridges.
      schedule: "annual"
      estimated_duration_minutes: 60
      phases: 5

    - id: sector_pathway_workflow
      name: "Sector Pathway Workflow"
      description: >-
        4-phase sector pathway alignment assessment: SectorClassification
        (classify entity into primary and secondary sectors using NACE/
        NAICS/GICS codes) -> BenchmarkMapping (map sector to published
        pathways from IEA, IPCC, TPI, MPP, ACT, CRREM) ->
        GapAnalysis (calculate gap-to-benchmark for current and
        projected emissions intensity) -> RoadmapAlignment (generate
        sector-aligned roadmap with milestone dates and actions).
        Orchestrates sector pathway engine.
      schedule: "on_demand"
      estimated_duration_minutes: 30
      phases: 4

    - id: partnership_engagement_workflow
      name: "Partnership Engagement Workflow"
      description: >-
        4-phase partner initiative optimization: PartnerInventory
        (catalog current and potential partner memberships with
        requirements) -> RequirementCrosswalk (map partner requirements
        to Race to Zero Starting Line Criteria for synergy analysis) ->
        SynergyAnalysis (identify reporting overlaps, duplications, and
        gaps across partnerships) -> EngagementPlan (generate optimized
        engagement plan with timeline and resource allocation).
        Orchestrates partnership scoring engine.
      schedule: "on_demand"
      estimated_duration_minutes: 30
      phases: 4

    - id: credibility_review_workflow
      name: "Credibility Review Workflow"
      description: >-
        5-phase HLEG credibility assessment: HLEGMapping (map
        organization activities to all 10 HLEG recommendations) ->
        EvidenceGathering (collect evidence for each recommendation
        and sub-criterion) -> RecommendationAssess (score each
        recommendation with per-sub-criterion assessment) ->
        GapIdentification (identify credibility gaps with severity
        ranking) -> RemediationPlan (generate remediation action plan
        with timeline and resource requirements). Orchestrates
        credibility assessment engine.
      schedule: "annual"
      estimated_duration_minutes: 60
      phases: 5

    - id: full_race_to_zero_workflow
      name: "Full Race to Zero Workflow"
      description: >-
        8-phase end-to-end Race to Zero lifecycle assessment: Pledge
        (validate pledge eligibility and quality) -> StartingLine
        (assess all 20 Starting Line sub-criteria) -> Targets
        (validate interim and long-term targets against 1.5C pathway)
        -> ActionPlan (generate and validate climate action plan) ->
        SectorAlign (map to sector pathways and assess gap-to-benchmark)
        -> Partners (score partnership engagement and identify synergies)
        -> Credibility (assess HLEG credibility across 10 recommendations)
        -> Readiness (calculate composite readiness score with RAG
        status and improvement priorities). Orchestrates all 10 engines
        in dependency order with conditional sector and partner phases.
      schedule: "annual"
      estimated_duration_minutes: 180
      phases: 8

  # ===========================================================================
  # Templates - Pre-built report and output templates (10 templates)
  # ===========================================================================
  templates:
    - id: pledge_commitment_letter
      display_name: "Pledge Commitment Letter"
      description: >-
        Formal Race to Zero pledge commitment letter for submission to
        campaign secretariat and partner initiative. Includes net-zero
        commitment statement, interim 2030 target, scope coverage
        declaration, partner initiative designation, governance
        endorsement, and public disclosure commitment. Formats: MD,
        HTML, PDF, JSON.
      format: "pdf"
      template_file: "templates/pledge_commitment_letter.py"
      enabled: true

    - id: starting_line_checklist
      display_name: "Starting Line Checklist"
      description: >-
        Starting Line Criteria compliance checklist with 20 sub-criteria
        evidence mapping. Shows per-pillar status (Pledge, Plan, Proceed,
        Publish) with criterion-level pass/fail/partial, evidence
        references, gap descriptions, and remediation actions. Includes
        overall compliance score and 12-month compliance timeline.
        Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/starting_line_checklist.py"
      enabled: true

    - id: action_plan_document
      display_name: "Action Plan Document"
      description: >-
        Complete climate action plan document meeting Race to Zero
        Interpretation Guide publication requirements. Includes
        emissions baseline, MACC curve visualization, prioritized
        action list with tCO2e abatement and EUR/tCO2e cost, timeline
        with milestones, resource allocation matrix, sector pathway
        alignment, and governance commitments. Formats: MD, HTML,
        PDF, JSON.
      format: "pdf"
      template_file: "templates/action_plan_document.py"
      enabled: true

    - id: annual_progress_report
      display_name: "Annual Progress Report"
      description: >-
        Annual progress disclosure report with emissions trajectory
        and target tracking. Shows year-over-year emission changes
        (absolute and intensity), trajectory alignment status (on/off
        track), cumulative reduction progress, scope-level breakdown,
        action plan implementation status, and forward-looking
        projections. Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/annual_progress_report.py"
      enabled: true

    - id: sector_pathway_roadmap
      display_name: "Sector Pathway Roadmap"
      description: >-
        Sector-specific decarbonization roadmap with benchmark alignment
        visualization. Shows entity position relative to IEA/IPCC/TPI/
        MPP/ACT/CRREM pathway benchmarks, gap-to-benchmark analysis,
        sector-specific milestone dates, and recommended actions for
        pathway alignment. Includes intensity trend charts and
        peer comparison. Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/sector_pathway_roadmap.py"
      enabled: true

    - id: partnership_framework
      display_name: "Partnership Framework"
      description: >-
        Partnership engagement framework with requirement crosswalk
        and synergy analysis. Shows partner initiative inventory,
        requirement mapping to Race to Zero criteria, reporting
        overlap analysis, engagement quality scores, compliance
        deadline calendar, and optimized engagement plan.
        Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/partnership_framework.py"
      enabled: true

    - id: credibility_assessment_report
      display_name: "Credibility Assessment Report"
      description: >-
        HLEG credibility assessment report with 10-recommendation
        scoring matrix. Shows per-recommendation scores with sub-
        criterion detail, overall credibility rating (A-F), gap
        identification with severity ranking, remediation actions
        with timeline, and benchmarking against peer organizations
        in the same sector. Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/credibility_assessment_report.py"
      enabled: true

    - id: campaign_submission_package
      display_name: "Campaign Submission Package"
      description: >-
        Complete Race to Zero campaign submission package for partner
        initiative. Consolidates pledge letter, Starting Line evidence,
        action plan, progress reports, and credibility assessment into
        a single submission-ready package. Includes partner-specific
        formatting for CDP, GFANZ, C40, ICLEI, or custom channels.
        Formats: MD, HTML, PDF, JSON.
      format: "pdf"
      template_file: "templates/campaign_submission_package.py"
      enabled: true

    - id: disclosure_dashboard
      display_name: "Disclosure Dashboard"
      description: >-
        Real-time disclosure dashboard showing campaign compliance
        status across all dimensions. Visualizes Starting Line
        compliance, target progress, action plan implementation,
        partnership engagement, HLEG credibility, and overall
        readiness score with RAG status. Includes trend charts,
        deadline alerts, and peer benchmarking. Formats: MD, HTML, JSON.
      format: "html"
      template_file: "templates/disclosure_dashboard.py"
      enabled: true

    - id: race_to_zero_certificate
      display_name: "Race to Zero Certificate"
      description: >-
        Race to Zero readiness certificate with composite score and
        dimension breakdown. Shows 8-dimension readiness scores,
        overall composite score (0-100), readiness level (Not Ready/
        Partially Ready/Ready/Exemplary), RAG status, improvement
        priorities, and SHA-256 provenance hash for audit verification.
        Formats: MD, HTML, PDF, JSON.
      format: "pdf"
      template_file: "templates/race_to_zero_certificate.py"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (12 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        10-phase DAG pipeline with dependency management, retry logic,
        and SHA-256 provenance at each checkpoint. Phases: HealthCheck
        -> Configuration -> PledgeCommitment -> StartingLine ->
        InterimTarget -> ActionPlan -> ProgressTracking -> SectorPathway
        -> PartnershipScoring -> CampaignReporting -> CredibilityAssessment
        -> RaceReadiness. Supports parallel execution of independent
        phases (e.g., sector pathway and partnership scoring can run
        concurrently) and conditional skipping based on actor-type
        configuration (e.g., skip GFANZ bridge for non-financial
        institutions).
      module: "integrations.pack_orchestrator"
      required: true

    - id: mrv_bridge
      name: "MRV Agent Bridge"
      description: >-
        Routes data from all 30 AGENT-MRV agents for complete Scope
        1/2/3 emissions calculation. Maps MRV outputs to progress
        tracking engine format for baseline and current year emissions.
        Supports all 8 Scope 1 agents, 5 Scope 2 agents, 15 Scope 3
        category agents, and 2 cross-cutting agents. Provides emission
        data for trajectory alignment and variance analysis.
      module: "integrations.mrv_bridge"
      required: true

    - id: ghg_app_bridge
      name: "GL-GHG-APP Bridge"
      description: >-
        Connects to GL-GHG-APP v1.0 for GHG inventory calculation
        infrastructure. Reuses the full MRV agent pipeline with
        zero-hallucination guarantees for emissions quantification.
        Provides bidirectional data flow for inventory import, emission
        factor access, and base year data retrieval.
      module: "integrations.ghg_app_bridge"
      required: true

    - id: sbti_app_bridge
      name: "GL-SBTi-APP Bridge"
      description: >-
        Connects to GL-SBTi-APP v1.0 Beta for science-based target
        validation and alignment checking. Imports SBTi validated
        targets, near-term/long-term/net-zero target status, SDA/ACA
        pathway analysis results, and progress tracking data. Enables
        cross-validation of Race to Zero interim targets against SBTi
        criteria for enhanced credibility.
      module: "integrations.sbti_app_bridge"
      required: false

    - id: decarb_bridge
      name: "DECARB Agent Bridge"
      description: >-
        Connects to 21 DECARB-X agents for reduction planning and
        action identification. Provides sector-specific decarbonization
        levers, abatement potentials (tCO2e), MACC cost curves
        (EUR/tCO2e), technology readiness assessments, and
        implementation timelines for action plan generation.
      module: "integrations.decarb_bridge"
      required: false

    - id: taxonomy_bridge
      name: "EU Taxonomy Bridge"
      description: >-
        Connects to GL-Taxonomy-APP for EU Taxonomy alignment
        validation. Checks climate CapEx alignment with Taxonomy
        technical screening criteria, identifies Taxonomy-aligned
        investment opportunities, and supports HLEG R6 financial
        commitment assessment by mapping CapEx to green activities.
      module: "integrations.taxonomy_bridge"
      required: false

    - id: data_bridge
      name: "Data Agent Bridge"
      description: >-
        Connects to all 20 AGENT-DATA agents for data intake, quality
        management, and cross-source reconciliation. Provides energy
        data extraction (PDF/Excel/ERP), supplier survey processing,
        data quality profiling, duplicate detection, outlier flagging,
        and time series gap filling for complete emissions data coverage
        across all partner reporting channels.
      module: "integrations.data_bridge"
      required: true

    - id: unfccc_bridge
      name: "UNFCCC Campaign Bridge"
      description: >-
        Connects to UNFCCC Race to Zero campaign data feeds for partner
        criteria updates, participant registry lookup, campaign
        announcement monitoring, and Starting Line Criteria version
        tracking. Provides real-time campaign intelligence for
        compliance monitoring and deadline management.
      module: "integrations.unfccc_bridge"
      required: false

    - id: cdp_bridge
      name: "CDP Bridge"
      description: >-
        Connects to GL-CDP-APP for CDP Climate Change questionnaire
        alignment. Maps Race to Zero annual progress data to CDP
        disclosure format for corporate participants using CDP as
        their primary reporting channel. Supports CDP scoring
        optimization and response pre-population.
      module: "integrations.cdp_bridge"
      required: false

    - id: gfanz_bridge
      name: "GFANZ Bridge"
      description: >-
        Connects to GFANZ transition plan framework for financial
        institution participants. Maps Race to Zero data to GFANZ
        recommended disclosure format including PCAF financed
        emissions, portfolio temperature scoring, and sector-level
        transition targets for financial institution reporting.
      module: "integrations.gfanz_bridge"
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        8-step guided Race to Zero configuration wizard: ActorType
        (select from 8 actor types) -> OrganizationProfile (name,
        sector, size, geography) -> PartnerSelection (match partner
        initiatives) -> ScopeConfiguration (Scope 1/2/3 boundaries)
        -> TargetBaseline (base year, target year, pathway) ->
        SectorPathway (select sector benchmark source) ->
        ReportingChannels (configure partner reporting outputs) ->
        ValidationPreview (run configuration validation and identify
        quick wins).
      module: "integrations.setup_wizard"
      required: false

    - id: health_check
      name: "Health Check"
      description: >-
        22-category system verification covering all 10 engines,
        partner bridge connectivity (SBTi, CDP, C40, ICLEI, GFANZ),
        MRV agent availability (30 agents), DATA agent availability
        (20 agents), FOUND agent availability (10 agents), database
        connectivity, migration status (V148-V157), preset
        configuration validity, emission factor currency, pathway
        benchmark data availability, and cross-framework template
        integrity.
      module: "integrations.health_check"
      required: false

  # ===========================================================================
  # Presets - Actor-type and sector-specific configurations (8 presets)
  # ===========================================================================
  presets:
    - id: corporate_commitment
      name: "Corporate Commitment Preset"
      description: >-
        Large Corporate (>1000 employees) Race to Zero configuration.
        Full Scope 1+2+3 coverage, SBTi primary partner initiative,
        CDP reporting channel, full HLEG 10-recommendation assessment,
        25+ sector pathways available, all 10 engines enabled, SDA
        or ACA pathway with 4.2%/yr minimum reduction rate, 1.5C
        alignment validation, 10-year planning horizon, annual
        reporting cycle.
      actor_type: "CORPORATE"
      enabled_engines:
        - pledge_commitment
        - starting_line
        - interim_target
        - action_plan
        - progress_tracking
        - sector_pathway
        - partnership_scoring
        - campaign_reporting
        - credibility_assessment
        - race_readiness
