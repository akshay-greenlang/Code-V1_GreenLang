# =============================================================================
# PACK-025 Race to Zero Pack - SME Business Preset
# =============================================================================
# Simplified configuration for small and medium enterprises (<250 employees)
# joining Race to Zero through the SME Climate Hub or similar SME-focused
# partner initiatives. Uses a streamlined 6-engine flow (pledge, starting
# line, interim target, action plan, progress tracking, race readiness)
# for faster implementation with minimal resource requirements. Spend-based
# Scope 3 as default with reduced category coverage. ACA pathway only.
# Streamlined HLEG assessment (abbreviated mode). Simplified Starting Line
# with evidence checklist rather than full documentation review. Quick
# readiness assessment to reduce onboarding time to under 10 hours.
#
# Target: 42% reduction by 2030 (simplified calculation)
# Scope: S1+2 mandatory, S3 optional
# Action plan: 6-month simplified template
# Partnership: Moderate (industry associations)
# Verification: Biennial
#
# Typical use cases:
#   - SMEs with 10-250 employees starting Race to Zero journey
#   - Startups and scale-ups with climate commitments
#   - Small businesses in supply chains of R2Z corporates
#   - Companies with limited sustainability team resources (0-2 FTE)
#   - Organizations joining through SME Climate Hub
#   - B Corp certified businesses seeking R2Z alignment
# =============================================================================

# --- Identity ---
organization_name: ""
actor_type: "SME"
sector: "OTHER"
size: "SMALL"
region: "GLOBAL"
country: ""
employee_count_range: "<250"

# --- Temporal ---
reporting_year: 2025
base_year: 2023
pack_version: "1.0.0"
campaign_join_date: ""

# --- Race to Zero Campaign ---
campaign:
  campaign_name: "Race to Zero"
  campaign_version: "2022"
  interpretation_guide_version: "June 2022"
  hleg_report_version: "November 2022"
  net_zero_target_year: 2050
  interim_target_year: 2030
  starting_line_deadline_months: 12
  annual_reporting_required: true
  public_disclosure_required: true

# --- Partner Initiative (SME Climate Hub) ---
partner:
  primary_partner: "SME Climate Hub"
  secondary_partners:
    - "SBTi_SME"
    - "We Mean Business Coalition"
  reporting_channel: "SME_CLIMATE_HUB"
  partner_requirements_mapped: true
  cross_partner_synergy: false
  partner_compliance_tracking: true
  engagement_level: "MODERATE"
  industry_association_participation: true

# --- Pledge Configuration (SME-simplified) ---
pledge:
  net_zero_by_2050: true
  interim_2030_target: true
  action_plan_commitment: true
  annual_reporting_commitment: true
  scope_coverage_full: false
  governance_endorsement: true
  public_disclosure: true
  no_contradictory_actions: true
  ceo_commitment_letter: true

# --- Starting Line Criteria (Simplified) ---
starting_line:
  enabled: true
  assessment_mode: "SIMPLIFIED"
  pillars:
    pledge:
      sl_p1_net_zero_target: true
      sl_p2_interim_target: true
      sl_p3_science_based: true
      sl_p4_fair_share: false
      sl_p5_scope_coverage: true
    plan:
      sl_a1_action_plan_published: true
      sl_a2_quantified_actions: true
      sl_a3_timeline_milestones: true
      sl_a4_resource_allocation: false
      sl_a5_sector_alignment: false
    proceed:
      sl_r1_immediate_action: true
      sl_r2_emission_reductions: true
      sl_r3_investment_commitment: false
      sl_r4_governance_integration: true
      sl_r5_no_contradictory_action: true
    publish:
      sl_d1_annual_reporting: true
      sl_d2_emissions_disclosure: true
      sl_d3_target_progress: true
      sl_d4_plan_updates: false
      sl_d5_transparency: true
  evidence_collection_automated: true
  gap_remediation_guidance: true
  compliance_deadline_tracking: true
  threshold_scores:
    pledge_minimum_pct: 60.0
    plan_minimum_pct: 50.0
    proceed_minimum_pct: 50.0
    publish_minimum_pct: 60.0
    overall_minimum_pct: 55.0

# --- Interim Target Validation (SME-simplified) ---
interim_target:
  minimum_reduction_pct: 42.0
  preferred_reduction_pct: 50.0
  baseline_year_minimum: 2019
  baseline_year_preferred: 2023
  methodology: "SBTi_SME"
  simplified_calculation: true
  annual_reduction_rate_min_pct: 4.2
  scope1_coverage_pct: 95.0
  scope2_coverage_pct: 95.0
  scope3_coverage_pct: 0.0
  scope3_mandatory: false
  scope3_optional: true
  fair_share_assessment: false
  pathway_sources:
    - "IPCC_AR6_WG3"
    - "SBTi_SME_1_5C"

# --- Long-Term Target ---
long_term_target:
  net_zero_year: 2050
  residual_emissions_max_pct: 10.0
  neutralization_required: true
  neutralization_method: "CARBON_REMOVAL"
  scope1_reduction_pct: 90.0
  scope2_reduction_pct: 95.0

# --- Action Plan (6-month Simplified Template) ---
action_plan:
  publication_deadline_months: 6
  plan_type: "SME_ACTION_PLAN"
  template_mode: "SIMPLIFIED"
  quantified_actions_required: true
  minimum_actions: 5
  maximum_actions: 25
  include_macc_analysis: false
  include_timeline: true
  include_milestones: true
  include_resource_allocation: false
  include_sector_alignment: false
  action_categories:
    - "ENERGY_EFFICIENCY"
    - "RENEWABLE_PROCUREMENT"
    - "SUPPLY_CHAIN_ENGAGEMENT"
    - "FLEET_ELECTRIFICATION"
    - "BEHAVIORAL_CHANGE"
    - "GREEN_PROCUREMENT"
    - "WASTE_REDUCTION"
  planning_horizon_years: 5
  scenario_count: 2
  carbon_price_eur_per_tco2e: 50.0
  discount_rate_pct: 8.0
  milestones:
    - year: 2025
      description: "Baseline measurement complete, plan published"
    - year: 2027
      description: "Quick wins implemented, 20% reduction"
    - year: 2030
      description: "42% reduction target achieved"
    - year: 2040
      description: "75% reduction, technology upgrades complete"
    - year: 2050
      description: "Net-zero achieved"

# --- Scope Configuration (Simplified Scope 3, spend-based) ---
scope:
  include_scope1: true
  include_scope2: true
  include_scope3: true
  scope1_mandatory: true
  scope2_mandatory: true
  scope3_mandatory: false
  scope2_methods:
    - "location_based"
    - "market_based"
  scope3_categories: [1, 3, 5, 6, 7]
  scope3_materiality_threshold_pct: 5.0
  scope3_method: "SPEND_BASED"
  scope3_category_methods:
    default: "spend_based"
  pcaf_enabled: false
  pcaf_asset_classes: []

# --- Sector Pathway (Simplified) ---
sector_pathway:
  enabled: false
  auto_classify: true
  pathway_sources:
    - "IEA_NZE_2050"
  benchmark_comparison: false
  milestone_mapping: false
  gap_to_benchmark_analysis: false
  sectors_covered: 5
  pathway_selection: "AUTO"

# --- HLEG Credibility Assessment (Abbreviated) ---
hleg:
  enabled: true
  assessment_mode: "ABBREVIATED"
  recommendations_assessed: 7
  sub_criteria_count: 20
  recommendations:
    r1_net_zero_pledge_quality: true
    r2_interim_target_ambition: true
    r3_voluntary_credit_use: false
    r4_lobbying_alignment: true
    r5_just_transition: false
    r6_financial_commitment: true
    r7_reporting_transparency: true
    r8_scope_of_pledge: true
    r9_internal_governance: true
    r10_fossil_fuel_phaseout: false
  credibility_rating_scale:
    - "STRONG"
    - "ADEQUATE"
    - "WEAK"
    - "INSUFFICIENT"
  minimum_credibility_target: "ADEQUATE"
  science_based_validation: false
  governance_maturity_review: false
  fossil_fuel_exposure_check: false

# --- Credibility Assessment Weights ---
credibility_weights:
  pledge_quality: 0.20
  target_ambition: 0.20
  action_plan_robustness: 0.15
  progress_trajectory: 0.15
  governance_maturity: 0.10
  transparency_reporting: 0.10
  sector_alignment: 0.05
  partnership_engagement: 0.05
  total: 1.00
  minimum_composite_score: 0.50
  passing_threshold: "ADEQUATE"

# --- Partnership Engagement (Moderate - industry associations) ---
partnership:
  enabled: true
  engagement_level: "MODERATE"
  max_partners: 3
  partner_discovery: true
  collaboration_agreements: false
  joint_target_setting: false
  performance_tracking: true
  impact_reporting: false
  synergy_analysis: false
  industry_association_participation: true
  partner_initiatives:
    - "SME Climate Hub"
    - "SBTi SME Target"
    - "We Mean Business Coalition"

# --- Verification ---
verification:
  enabled: true
  frequency: "BIENNIAL"
  verification_level: "SELF_DECLARATION"
  third_party_required: false
  accepted_standards:
    - "SME_CLIMATE_HUB_SELF_ASSESSMENT"
    - "ISO_14064_3"
  verification_scope:
    - "emissions_inventory"
    - "target_progress"
  historical_data_review: false
  site_visits_required: false
  verification_report_public: false
  self_declaration_template: true

# --- Offset Strategy ---
offset_strategy:
  enabled: true
  max_offset_pct: 10.0
  offset_scope: "RESIDUAL_ONLY"
  eligible_offset_types:
    - "CARBON_REMOVAL"
    - "NATURE_BASED_SOLUTIONS"
  excluded_offset_types:
    - "AVOIDED_DEFORESTATION"
    - "REDD_UNCERTIFIED"
  quality_standards:
    - "VERRA_VCS"
    - "GOLD_STANDARD"
  permanence_minimum_years: 40
  additionality_required: true
  co_benefits_preferred: true
  vintage_maximum_years: 5
  retirement_tracking: true
  double_counting_prevention: true

# --- Annual Reporting (Simplified) ---
reporting:
  enabled: true
  frequency: "ANNUAL"
  channels:
    - "SME_CLIMATE_HUB"
    - "R2Z_CAMPAIGN"
  formats:
    - "PDF"
    - "JSON"
  include_emissions_inventory: true
  include_target_progress: true
  include_action_implementation: true
  include_partnership_engagement: false
  include_credibility_update: false
  include_forward_commitments: true
  include_offset_usage: true
  verification_required: false
  verification_level: "NONE"
  language: "en"
  review_workflow_enabled: false
  watermark_draft: true
  reporting_format_preferences:
    primary: "PDF"
    machine_readable: "JSON"

# --- Progress Tracking ---
progress:
  enabled: true
  trajectory_assessment: true
  variance_analysis: false
  yoy_comparison: true
  corrective_action_triggers: true
  on_track_threshold_pct: 10.0
  alert_threshold_pct: 20.0
  kpi_set:
    - "absolute_emissions_trajectory"
    - "emission_intensity_revenue"
    - "yoy_reduction_rate"
    - "renewable_electricity_pct"
    - "scope3_coverage_pct"
  target_years: [2025, 2030, 2040, 2050]

# --- Race Readiness ---
readiness:
  enabled: true
  dimensions:
    - "pledge_strength"
    - "starting_line_compliance"
    - "target_ambition"
    - "action_plan_quality"
    - "progress_trajectory"
    - "sector_alignment"
    - "partnership_engagement"
    - "hleg_credibility"
  composite_scoring: true
  rag_status: true
  prioritized_improvements: true
  readiness_levels:
    - "CAMPAIGN_READY"
    - "MOSTLY_READY"
    - "PARTIALLY_READY"
    - "SIGNIFICANT_GAPS"
    - "NOT_READY"
  minimum_readiness_target: "PARTIALLY_READY"
  quick_assessment_mode: true

# --- Performance (Minimal resources) ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 1800
  max_concurrent_calcs: 2
  timeout_seconds: 120
  batch_size: 500
  memory_limit_mb: 2048

# --- Audit Trail (Simplified) ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: false
  retention_years: 5
  external_audit_export: false
