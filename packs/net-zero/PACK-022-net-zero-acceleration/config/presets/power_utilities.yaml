# =============================================================================
# PACK-022 Net Zero Acceleration Pack - Power & Utilities Preset
# =============================================================================
# Configuration for power generation and utility organizations with SDA pathway
# mandatory. Grid decarbonization focus with coal phase-out modeling, renewable
# capacity expansion, and battery storage integration. Very long 20-year
# planning horizon reflecting capital-intensive generation asset lifecycles.
# Scope 3 Category 3 (fuel/energy upstream) and Category 11 (downstream
# combustion) are critical. Multi-entity enabled for utility holding structures.
#
# Typical use cases:
#   - Electric utilities (thermal generation)
#   - Integrated energy companies
#   - Renewable energy developers
#   - District heating / combined heat and power providers
#   - Grid operators with generation assets
# =============================================================================

# --- Identity ---
organization_name: ""
sector: "POWER_UTILITIES"
region: "EU"
country: "DE"

# --- Temporal ---
reporting_year: 2025
base_year: 2021
pack_version: "1.0.0"

# --- Scenario Modeling ---
scenario:
  scenario_types:
    - "BAU"
    - "MODERATE"
    - "AMBITIOUS"
    - "CUSTOM"
  monte_carlo_runs: 1000
  random_seed: 42
  confidence_interval_pct: 95.0
  sensitivity_top_n: 15
  uncertainty_emission_factor_pct: 8.0
  uncertainty_activity_data_pct: 5.0
  uncertainty_cost_pct: 30.0
  parallel_scenarios: true
  max_custom_scenarios: 5

# --- Pathway (SDA mandatory for power) ---
pathway:
  methodology: "SDA"
  sda_enabled: true
  sda_sectors:
    - "POWER"
  sda_base_year: 2021
  sda_target_year: 2050
  ambition_level: "CELSIUS_1_5"
  near_term_target_year: 2030
  long_term_target_year: 2050
  coverage_scope1_pct: 95.0
  coverage_scope2_pct: 95.0
  coverage_scope3_pct: 67.0
  flag_pathway_enabled: false
  iea_benchmark_source: "IEA_NZE_2023"
  sbti_submission_planned: true

# --- Supplier Engagement ---
supplier:
  enabled: true
  max_suppliers: 3000
  tier_thresholds:
    collaborate: 5.0
    require: 15.0
    engage: 40.0
    inform: 100.0
  top_supplier_count: 80
  data_collection_frequency: "annual"
  sbti_target_tracking: true
  cdp_supply_chain_enabled: true
  engagement_scoring_dimensions:
    - "data_quality"
    - "target_ambition"
    - "reduction_progress"
    - "responsiveness"
    - "innovation"
  batch_size: 2000

# --- Scope 3 ---
scope3:
  categories: [1, 2, 3, 4, 5, 6, 7, 9, 11, 12, 15]
  activity_based_categories: [3, 11, 15]
  supplier_specific_categories: [3]
  spend_based_categories: [1, 2, 4, 5, 6, 7, 9, 12]
  materiality_threshold_pct: 0.5
  target_dqis_score: 2
  pcaf_enabled: false
  pcaf_asset_classes: []

# --- Climate Finance ---
finance:
  enabled: true
  discount_rate_pct: 8.0
  carbon_price_eur_per_tco2e: 100.0
  carbon_price_escalation_pct: 6.0
  reporting_currency: "EUR"
  planning_horizon_years: 20
  green_bond_screening: true
  taxonomy_alignment: true
  finance_instruments:
    - "CAPEX_ALLOCATION"
    - "OPEX_ALLOCATION"
    - "GREEN_BOND"
    - "SUSTAINABILITY_LINKED_BOND"
    - "INTERNAL_CARBON_PRICE"
  wacc_pct: 9.0

# --- Temperature Scoring ---
temperature:
  enabled: true
  aggregation_methods:
    - "WATS"
    - "TETS"
    - "MOTS"
  default_score_celsius: 3.2
  include_scope3_in_score: true
  portfolio_scoring: false
  portfolio_weighting: "revenue"
  time_frames:
    - "short"
    - "mid"
    - "long"

# --- Variance Decomposition ---
decomposition:
  enabled: true
  method: "LMDI"
  decomposition_effects:
    - "structural"
    - "activity"
    - "intensity"
  forecast_periods: 4
  forecast_confidence_pct: 90.0
  alert_threshold_pct: 8.0
  top_drivers_count: 15
  historical_periods: 16

# --- Multi-Entity ---
multi_entity:
  enabled: true
  max_entities: 50
  consolidation_method: "OPERATIONAL_CONTROL"
  intercompany_elimination: true
  reporting_hierarchies:
    - "geographic"
    - "generation_type"
    - "legal_entity"
  ownership_threshold_pct: 20.0

# --- VCMI ---
vcmi:
  enabled: true
  target_tier: "GOLD"
  credit_quality_min_score: 80
  max_nature_based_pct: 35.0
  shift_to_removals_by_year: 2035
  preferred_registries:
    - "verra"
    - "gold_standard"
    - "american_carbon_registry"
  track_co_benefits: true
  evidence_auto_collection: true

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "REASONABLE"
  progression_year: 2027
  workpaper_format: "ISAE_3410"
  methodology_documentation: true
  calculation_trace: true
  data_lineage_maps: true
  control_evidence: true
  sha256_provenance: true
  assumption_register: true
  retention_years: 15
