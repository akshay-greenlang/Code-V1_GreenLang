# =============================================================================
# PACK-022 Net Zero Acceleration Pack - Heavy Industry Preset
# =============================================================================
# Configuration for heavy industry organizations (cement, steel, aluminium,
# chemicals) with SDA pathway mandatory. Very high Scope 1 emissions from
# process reactions, high-temperature heat, and fugitive sources. CCS and
# green hydrogen pathways enabled. Long 15-year planning horizon reflecting
# capital-intensive asset replacement cycles. Supplier engagement focused
# on upstream raw materials and energy inputs.
#
# Typical use cases:
#   - Cement manufacturers (clinker production)
#   - Steel producers (blast furnace / electric arc furnace)
#   - Aluminium smelters
#   - Chemical producers (ammonia, ethylene, methanol)
#   - Glass and ceramics manufacturers
# =============================================================================

# --- Identity ---
organization_name: ""
sector: "HEAVY_INDUSTRY"
region: "EU"
country: "DE"

# --- Temporal ---
reporting_year: 2025
base_year: 2021
pack_version: "1.0.0"

# --- Scenario Modeling ---
scenario:
  scenario_types:
    - "BAU"
    - "MODERATE"
    - "AMBITIOUS"
  monte_carlo_runs: 1000
  random_seed: 42
  confidence_interval_pct: 95.0
  sensitivity_top_n: 10
  uncertainty_emission_factor_pct: 10.0
  uncertainty_activity_data_pct: 8.0
  uncertainty_cost_pct: 25.0
  parallel_scenarios: true
  max_custom_scenarios: 5

# --- Pathway (SDA mandatory for heavy industry) ---
pathway:
  methodology: "SDA"
  sda_enabled: true
  sda_sectors:
    - "CEMENT"
    - "STEEL"
    - "ALUMINIUM"
    - "CHEMICALS"
  sda_base_year: 2021
  sda_target_year: 2050
  ambition_level: "CELSIUS_1_5"
  near_term_target_year: 2030
  long_term_target_year: 2050
  coverage_scope1_pct: 95.0
  coverage_scope2_pct: 95.0
  coverage_scope3_pct: 67.0
  flag_pathway_enabled: false
  iea_benchmark_source: "IEA_NZE_2023"
  sbti_submission_planned: true

# --- Supplier Engagement ---
supplier:
  enabled: true
  max_suppliers: 5000
  tier_thresholds:
    collaborate: 3.0
    require: 12.0
    engage: 35.0
    inform: 100.0
  top_supplier_count: 100
  data_collection_frequency: "annual"
  sbti_target_tracking: true
  cdp_supply_chain_enabled: true
  engagement_scoring_dimensions:
    - "data_quality"
    - "target_ambition"
    - "reduction_progress"
    - "responsiveness"
    - "innovation"
  batch_size: 2000

# --- Scope 3 (Activity-based for critical categories) ---
scope3:
  categories: [1, 2, 3, 4, 5, 6, 7, 9, 11, 12]
  activity_based_categories: [1, 3, 4, 5, 11]
  supplier_specific_categories: [1]
  spend_based_categories: [2, 6, 7, 9, 12]
  materiality_threshold_pct: 0.5
  target_dqis_score: 2
  pcaf_enabled: false
  pcaf_asset_classes: []

# --- Climate Finance ---
finance:
  enabled: true
  discount_rate_pct: 10.0
  carbon_price_eur_per_tco2e: 120.0
  carbon_price_escalation_pct: 7.0
  reporting_currency: "EUR"
  planning_horizon_years: 15
  green_bond_screening: true
  taxonomy_alignment: true
  finance_instruments:
    - "CAPEX_ALLOCATION"
    - "OPEX_ALLOCATION"
    - "GREEN_BOND"
    - "INTERNAL_CARBON_PRICE"
  wacc_pct: 12.0

# --- Temperature Scoring ---
temperature:
  enabled: true
  aggregation_methods:
    - "WATS"
    - "TETS"
    - "MOTS"
  default_score_celsius: 3.2
  include_scope3_in_score: true
  portfolio_scoring: false
  portfolio_weighting: "revenue"
  time_frames:
    - "short"
    - "mid"
    - "long"

# --- Variance Decomposition ---
decomposition:
  enabled: true
  method: "LMDI"
  decomposition_effects:
    - "structural"
    - "activity"
    - "intensity"
  forecast_periods: 4
  forecast_confidence_pct: 90.0
  alert_threshold_pct: 8.0
  top_drivers_count: 10
  historical_periods: 12

# --- Multi-Entity ---
multi_entity:
  enabled: true
  max_entities: 50
  consolidation_method: "OPERATIONAL_CONTROL"
  intercompany_elimination: true
  reporting_hierarchies:
    - "geographic"
    - "divisional"
    - "legal_entity"
  ownership_threshold_pct: 20.0

# --- VCMI ---
vcmi:
  enabled: true
  target_tier: "GOLD"
  credit_quality_min_score: 75
  max_nature_based_pct: 40.0
  shift_to_removals_by_year: 2035
  preferred_registries:
    - "verra"
    - "gold_standard"
    - "american_carbon_registry"
  track_co_benefits: true
  evidence_auto_collection: true

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "REASONABLE"
  progression_year: 2028
  workpaper_format: "ISAE_3410"
  methodology_documentation: true
  calculation_trace: true
  data_lineage_maps: true
  control_evidence: true
  sha256_provenance: true
  assumption_register: true
  retention_years: 10
