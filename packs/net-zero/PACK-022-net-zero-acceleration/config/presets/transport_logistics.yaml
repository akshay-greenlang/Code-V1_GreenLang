# =============================================================================
# PACK-022 Net Zero Acceleration Pack - Transport & Logistics Preset
# =============================================================================
# Configuration for transport, logistics, aviation, and shipping organizations.
# SDA pathway for transport sector. Fleet electrification, modal shift,
# sustainable aviation fuel (SAF), and alternative marine fuels as primary
# levers. High Scope 1 from mobile combustion. Scope 3 Category 4 (upstream
# transport) and Category 9 (downstream transport) are critical. Long
# 15-year planning horizon for fleet replacement cycles.
#
# Typical use cases:
#   - Freight and logistics companies
#   - Passenger transport operators
#   - Airlines
#   - Shipping and maritime companies
#   - Courier and parcel delivery services
# =============================================================================

# --- Identity ---
organization_name: ""
sector: "TRANSPORT"
region: "EU"
country: "DE"

# --- Temporal ---
reporting_year: 2025
base_year: 2021
pack_version: "1.0.0"

# --- Scenario Modeling ---
scenario:
  scenario_types:
    - "BAU"
    - "MODERATE"
    - "AMBITIOUS"
  monte_carlo_runs: 1000
  random_seed: 42
  confidence_interval_pct: 95.0
  sensitivity_top_n: 10
  uncertainty_emission_factor_pct: 12.0
  uncertainty_activity_data_pct: 10.0
  uncertainty_cost_pct: 25.0
  parallel_scenarios: true
  max_custom_scenarios: 5

# --- Pathway (SDA for transport) ---
pathway:
  methodology: "SDA"
  sda_enabled: true
  sda_sectors:
    - "TRANSPORT_ROAD"
    - "TRANSPORT_RAIL"
    - "AVIATION"
    - "SHIPPING"
  sda_base_year: 2021
  sda_target_year: 2050
  ambition_level: "CELSIUS_1_5"
  near_term_target_year: 2030
  long_term_target_year: 2050
  coverage_scope1_pct: 95.0
  coverage_scope2_pct: 95.0
  coverage_scope3_pct: 67.0
  flag_pathway_enabled: false
  iea_benchmark_source: "IEA_NZE_2023"
  sbti_submission_planned: true

# --- Supplier Engagement ---
supplier:
  enabled: true
  max_suppliers: 8000
  tier_thresholds:
    collaborate: 5.0
    require: 15.0
    engage: 40.0
    inform: 100.0
  top_supplier_count: 100
  data_collection_frequency: "annual"
  sbti_target_tracking: true
  cdp_supply_chain_enabled: true
  engagement_scoring_dimensions:
    - "data_quality"
    - "target_ambition"
    - "reduction_progress"
    - "responsiveness"
    - "innovation"
  batch_size: 2000

# --- Scope 3 ---
scope3:
  categories: [1, 2, 3, 4, 5, 6, 7, 9, 11, 12]
  activity_based_categories: [1, 3, 4, 9]
  supplier_specific_categories: [3]
  spend_based_categories: [2, 5, 6, 7, 11, 12]
  materiality_threshold_pct: 1.0
  target_dqis_score: 2
  pcaf_enabled: false
  pcaf_asset_classes: []

# --- Climate Finance ---
finance:
  enabled: true
  discount_rate_pct: 9.0
  carbon_price_eur_per_tco2e: 95.0
  carbon_price_escalation_pct: 6.0
  reporting_currency: "EUR"
  planning_horizon_years: 15
  green_bond_screening: true
  taxonomy_alignment: true
  finance_instruments:
    - "CAPEX_ALLOCATION"
    - "OPEX_ALLOCATION"
    - "GREEN_BOND"
    - "INTERNAL_CARBON_PRICE"
  wacc_pct: 11.0

# --- Temperature Scoring ---
temperature:
  enabled: true
  aggregation_methods:
    - "WATS"
    - "TETS"
    - "MOTS"
  default_score_celsius: 3.2
  include_scope3_in_score: true
  portfolio_scoring: false
  portfolio_weighting: "revenue"
  time_frames:
    - "short"
    - "mid"
    - "long"

# --- Variance Decomposition ---
decomposition:
  enabled: true
  method: "LMDI"
  decomposition_effects:
    - "structural"
    - "activity"
    - "intensity"
  forecast_periods: 4
  forecast_confidence_pct: 90.0
  alert_threshold_pct: 10.0
  top_drivers_count: 10
  historical_periods: 12

# --- Multi-Entity ---
multi_entity:
  enabled: false
  max_entities: 30
  consolidation_method: "OPERATIONAL_CONTROL"
  intercompany_elimination: true
  reporting_hierarchies:
    - "geographic"
    - "fleet_type"
    - "legal_entity"
  ownership_threshold_pct: 20.0

# --- VCMI ---
vcmi:
  enabled: true
  target_tier: "GOLD"
  credit_quality_min_score: 70
  max_nature_based_pct: 45.0
  shift_to_removals_by_year: 2040
  preferred_registries:
    - "gold_standard"
    - "verra"
  track_co_benefits: true
  evidence_auto_collection: true

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "REASONABLE"
  progression_year: 2028
  workpaper_format: "ISAE_3000"
  methodology_documentation: true
  calculation_trace: true
  data_lineage_maps: true
  control_evidence: true
  sha256_provenance: true
  assumption_register: true
  retention_years: 10
