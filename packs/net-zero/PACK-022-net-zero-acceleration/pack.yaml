  regulation:
    primary:
      name: "SBTi Net-Zero Standard"
      reference: "SBTi Net-Zero Standard v1.2 (2024)"
      effective_date: "2024-01-01"
      description: >-
        The SBTi Net-Zero Standard defines a science-based pathway for companies
        to achieve net-zero greenhouse gas emissions by no later than 2050.
        It requires near-term targets (5-10 years) covering at least 95% of
        Scope 1 and 2 emissions and 67% of Scope 3 emissions, and long-term
        targets reducing emissions by at least 90% before 2050. Residual
        emissions must be neutralized through permanent carbon removals.
    secondary:
      - name: "SBTi Temperature Rating Methodology"
        reference: "SBTi Temperature Rating v2.0 (2024)"
        effective_date: "2024-01-01"
      - name: "SBTi Sectoral Decarbonization Approach"
        reference: "SBTi SDA (2015, updated 2024)"
        effective_date: "2015-01-01"
      - name: "GHG Protocol Corporate Accounting and Reporting Standard"
        reference: "GHG Protocol (revised 2004, updated 2015)"
        effective_date: "2004-03-01"
      - name: "GHG Protocol Scope 3 Standard"
        reference: "GHG Protocol Corporate Value Chain (Scope 3) Standard"
        effective_date: "2011-10-01"
      - name: "IPCC Sixth Assessment Report (WG3)"
        reference: "IPCC AR6 WG3, Mitigation of Climate Change (2022)"
        effective_date: "2022-04-04"
      - name: "Paris Agreement"
        reference: "UNFCCC Paris Agreement, Article 4"
        effective_date: "2016-11-04"
      - name: "ISO 14064-1:2018"
        reference: "ISO 14064-1:2018 (GHG quantification and reporting)"
        effective_date: "2018-12-01"
      - name: "ISO 14068-1:2023"
        reference: "ISO 14068-1:2023 (Carbon neutrality)"
        effective_date: "2023-11-01"
      - name: "VCMI Claims Code of Practice"
        reference: "VCMI Claims Code v1.0 (2023)"
        effective_date: "2023-06-28"
      - name: "Oxford Principles for Net Zero Aligned Carbon Offsetting"
        reference: "Oxford Principles (revised 2024)"
        effective_date: "2024-01-01"
      - name: "ESRS E1 Climate Change"
        reference: "Delegated Regulation (EU) 2023/2772"
        effective_date: "2024-01-01"
      - name: "EU Taxonomy Climate Delegated Act"
        reference: "Regulation (EU) 2021/2139"
        effective_date: "2022-01-01"
      - name: "PCAF Global Standard"
        reference: "PCAF Global GHG Accounting and Reporting Standard (2022)"
        effective_date: "2022-12-01"
      - name: "IEA Net Zero Roadmap"
        reference: "IEA Net Zero by 2050 (2023 update)"
        effective_date: "2023-09-01"
      - name: "TPI Global Climate Transition Centre"
        reference: "TPI Carbon Performance Assessment (2024)"
        effective_date: "2024-01-01"
      - name: "CRREM Carbon Risk Real Estate Monitor"
        reference: "CRREM v2.0 (2024)"
        effective_date: "2024-01-01"

  compliance_references:
    - id: "SBTI_NZ"
      name: "SBTi Net-Zero Standard"
      regulation: "SBTi Net-Zero Standard v1.2 (2024)"
      effective_date: "2024-01-01"
      description: >-
        Defines science-based net-zero targets requiring near-term emission
        reductions (5-10 years) aligned with 1.5C pathways, long-term
        reductions of at least 90% by 2050, and neutralization of residual
        emissions through permanent carbon dioxide removals.

    - id: "SBTI_TEMP"
      name: "SBTi Temperature Rating"
      regulation: "SBTi Temperature Rating Methodology v2.0 (2024)"
      effective_date: "2024-01-01"
      description: >-
        Methodology for translating corporate emissions targets into implied
        temperature rise scores. Supports WATS (weighted average temperature
        score), TETS, MOTS, EOTS, ECOTS, and AOTS aggregation methods.

    - id: "SBTI_SDA"
      name: "SBTi Sectoral Decarbonization Approach"
      regulation: "SBTi SDA (2015, updated 2024)"
      effective_date: "2015-01-01"
      description: >-
        Sector-specific intensity convergence pathways for homogeneous sectors
        including power, cement, steel, aluminium, pulp/paper, transport,
        buildings, chemicals, aviation, shipping, agriculture, and food/beverage.

    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol Corporate Accounting and Reporting Standard"
      effective_date: "2004-03-01"
      description: >-
        The foundational standard for corporate GHG accounting. Defines
        organizational and operational boundaries, Scope 1/2/3 categories,
        emission factor selection, and reporting requirements.

    - id: "GHG_SCOPE3"
      name: "GHG Protocol Scope 3 Standard"
      regulation: "GHG Protocol Corporate Value Chain (Scope 3) Standard"
      effective_date: "2011-10-01"
      description: >-
        Defines 15 categories of Scope 3 emissions across the corporate
        value chain. Specifies calculation approaches (supplier-specific,
        hybrid, average-data, spend-based) and data quality scoring.

    - id: "IPCC_AR6"
      name: "IPCC Sixth Assessment Report"
      regulation: "IPCC AR6 WG3: Mitigation of Climate Change (2022)"
      effective_date: "2022-04-04"
      description: >-
        Provides the scientific basis for 1.5C and well-below 2C pathways.
        Defines global carbon budgets, sector-specific decarbonization
        pathways, and GWP values used in emissions calculations.

    - id: "PARIS"
      name: "Paris Agreement"
      regulation: "UNFCCC Paris Agreement, Article 4"
      effective_date: "2016-11-04"
      description: >-
        International treaty committing parties to limit global warming
        to well below 2C and pursue efforts toward 1.5C above pre-industrial
        levels.

    - id: "ISO_14064"
      name: "ISO 14064-1:2018"
      regulation: "ISO 14064-1:2018"
      effective_date: "2018-12-01"
      description: >-
        International standard for GHG quantification and reporting at
        the organization level.

    - id: "ISO_14068"
      name: "ISO 14068-1:2023"
      regulation: "ISO 14068-1:2023"
      effective_date: "2023-11-01"
      description: >-
        International standard for carbon neutrality. Defines requirements
        for demonstrating carbon neutrality including quantification,
        reduction, and offsetting.

    - id: "VCMI"
      name: "VCMI Claims Code of Practice"
      regulation: "VCMI Claims Code v1.0 (2023)"
      effective_date: "2023-06-28"
      description: >-
        Provides a rulebook for companies making voluntary carbon credit
        claims. Defines Silver, Gold, and Platinum claim tiers based on
        emission reduction progress and credit quality.

    - id: "OXFORD"
      name: "Oxford Principles for Net Zero Aligned Carbon Offsetting"
      regulation: "Oxford Principles (revised 2024)"
      effective_date: "2024-01-01"
      description: >-
        Principles for shifting offset portfolios toward carbon removal
        over time.

    - id: "EU_TAXONOMY"
      name: "EU Taxonomy Climate Delegated Act"
      regulation: "Regulation (EU) 2021/2139"
      effective_date: "2022-01-01"
      description: >-
        Technical screening criteria for determining whether an economic
        activity substantially contributes to climate change mitigation or
        adaptation under the EU Taxonomy.

    - id: "PCAF"
      name: "PCAF Global Standard"
      regulation: "PCAF Global GHG Accounting Standard (2022)"
      effective_date: "2022-12-01"
      description: >-
        Global standard for measuring and disclosing financed emissions
        across six asset classes (listed equity, corporate bonds, business
        loans, project finance, commercial real estate, mortgages).

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Advanced calculation and processing engines (10 engines)
  # ===========================================================================
  engines:
    - id: scenario_modeling
      name: "Scenario Modeling Engine"
      description: >-
        Multi-scenario Monte Carlo pathway analysis with uncertainty
        quantification. Models aggressive, moderate, conservative, and custom
        decarbonization scenarios with 1000+ simulation runs per scenario.
        Generates probability distributions for target achievement,
        investment requirements, and emission trajectories. Supports
        tornado sensitivity analysis to identify key decision variables.
        Produces scenario comparison matrices with NPV-adjusted cost per
        tCO2e abated. Zero-hallucination: all pathway coefficients from
        SBTi and IEA published data; Monte Carlo sampling uses
        deterministic seed for reproducibility; all arithmetic is native
        Python with SHA-256 provenance hashing.
      module: "engines.scenario_modeling_engine"
      required: true

    - id: sda_pathway
      name: "SDA Pathway Engine"
      description: >-
        SBTi Sectoral Decarbonization Approach implementation for 12 sectors:
        power generation, cement, steel, aluminium, pulp and paper, transport
        (road, rail), buildings (residential, commercial), chemicals, aviation,
        shipping, agriculture, and food/beverage. Calculates sector-specific
        emission intensity convergence pathways using IEA sector benchmarks
        and IPCC carbon budgets. Supports both absolute and intensity-based
        convergence. Generates sector pathway curves with annual milestones
        and validates targets against SBTi sector tools. Zero-hallucination:
        all sector benchmarks from SBTi published pathway data and IEA Net
        Zero Roadmap; convergence formulas are deterministic with provenance.
      module: "engines.sda_pathway_engine"
      required: true

    - id: supplier_engagement
      name: "Supplier Engagement Engine"
      description: >-
        Four-tier supplier engagement cascade for Scope 3 reduction at scale.
        Tier 1 Inform: awareness communications and training.
        Tier 2 Engage: data collection and target sharing.
        Tier 3 Require: contractual emission reduction commitments.
        Tier 4 Collaborate: joint decarbonization projects and innovation.
        Supports automatic supplier tiering by emissions materiality,
        engagement maturity scoring, progress tracking dashboards, and
        data collection automation. Handles up to 50,000 suppliers with
        batch processing. Zero-hallucination: supplier scoring from
        deterministic rubrics; emission allocation by procurement share;
        all aggregations verifiable.
      module: "engines.supplier_engagement_engine"
      required: true

    - id: scope3_activity
      name: "Scope 3 Activity Engine"
      description: >-
        Activity-based Scope 3 calculations replacing spend-based estimates
        with precise emission factors for top categories. Supports
        supplier-specific emission factors (DQIS score 1), hybrid method
        with activity data plus emission factors (DQIS 2), average-data
        method with physical quantities (DQIS 3), and spend-based as
        fallback (DQIS 4-5). Calculates data quality improvement scores
        (DQIS) per GHG Protocol Technical Guidance. Handles all 15 Scope 3
        categories with category-specific calculation logic. Zero-hallucination:
        emission factors from published databases (DEFRA, EPA, ecoinvent,
        EXIOBASE); all calculations deterministic.
      module: "engines.scope3_activity_engine"
      required: true

    - id: climate_finance
      name: "Climate Finance Engine"
      description: >-
        Climate transition finance integration engine. Maps decarbonization
        actions to CapEx and OpEx allocations with multi-year investment
        scheduling. Screens actions for green bond eligibility per ICMA
        Green Bond Principles. Calculates EU Taxonomy climate mitigation
        alignment for climate CapEx and OpEx. Models internal carbon price
        impact on action prioritization and ROI. Generates CFO-ready
        investment cases with IRR, NPV, payback, and WACC-adjusted hurdle
        rate comparisons. Zero-hallucination: all financial calculations
        use standard DCF formulas; Taxonomy screening uses published
        technical criteria; no LLM in any financial calculation.
      module: "engines.climate_finance_engine"
      required: true

    - id: temperature_scoring
      name: "Temperature Scoring Engine"
      description: >-
        SBTi Temperature Rating v2.0 implementation. Calculates implied
        temperature rise scores for corporate targets using six aggregation
        methods: WATS (Weighted Average Temperature Score), TETS (Total
        Emissions Temperature Score), MOTS (Market Owned Temperature Score),
        EOTS (Enterprise Owned Temperature Score), ECOTS (Enterprise Value
        plus Cash Temperature Score), and AOTS (Revenue Owned Temperature
        Score). Supports linear and logarithmic regression for target-to-
        temperature mapping. Calculates portfolio-level temperature scores
        for investment portfolios and supply chains. Zero-hallucination:
        regression coefficients from SBTi published methodology; temperature
        mapping tables from peer-reviewed literature; all scoring deterministic.
      module: "engines.temperature_scoring_engine"
      required: true

    - id: variance_decomposition
      name: "Variance Decomposition Engine"
      description: >-
        Emissions variance decomposition into structural, activity, and
        intensity effects using logarithmic mean Divisia index (LMDI)
        method. Decomposes year-over-year emission changes into: structural
        effect (changes in activity mix), activity effect (changes in
        output volume), and intensity effect (changes in emission intensity).
        Generates driver attribution charts identifying top contributors
        to variance. Produces rolling 4-quarter forecasts with confidence
        intervals. Triggers early warning alerts when off-track metrics
        exceed configurable thresholds. Zero-hallucination: LMDI
        decomposition uses published mathematical formulation; all
        forecasts based on statistical models with stated assumptions.
      module: "engines.variance_decomposition_engine"
      required: true

    - id: multi_entity
      name: "Multi-Entity Engine"
      description: >-
        Multi-entity emissions consolidation for corporate groups with
        up to 50 subsidiaries. Supports three consolidation methods:
        equity share (proportional to ownership), financial control
        (100% if control), and operational control (100% if operating
        authority). Handles intercompany elimination adjustments for
        internal transactions (e.g., captive power plants, shared
        services). Generates consolidated GHG inventory with entity-level
        drill-down. Supports multiple reporting hierarchies (geographic,
        divisional, legal entity). Zero-hallucination: consolidation
        arithmetic follows GHG Protocol rules; elimination adjustments
        are deterministic; all entity contributions traced.
      module: "engines.multi_entity_engine"
      required: false

    - id: vcmi_validation
      name: "VCMI Validation Engine"
      description: >-
        VCMI Claims Code Silver/Gold/Platinum validation engine. Evaluates
        15 criteria across four pillars: Foundation (SBTi target, public
        commitment), Credibility (reduction progress, Scope 3 coverage),
        Credit Quality (registry, methodology, additionality, permanence),
        and Transparency (disclosure, third-party verification). Scores
        each criterion on a 0-100 scale with evidence requirements.
        Generates claim tier recommendation with gap analysis for tier
        upgrade. Tracks credit retirement evidence and portfolio quality
        per Oxford Principles. Zero-hallucination: all scoring rubrics
        from VCMI published criteria; tier thresholds deterministic.
      module: "engines.vcmi_validation_engine"
      required: false

    - id: assurance_workpaper
      name: "Assurance Workpaper Engine"
      description: >-
        Audit workpaper generation engine for limited and reasonable
        assurance on climate disclosures. Generates methodology
        documentation covering every calculation step with formula
        references. Produces calculation trace files linking outputs to
        source data with SHA-256 provenance chains. Creates data lineage
        maps showing the flow from source system through transformation
        to reported value. Generates control evidence summaries documenting
        review and approval workflows. Supports ISAE 3000 and ISAE 3410
        assurance engagement formats. Zero-hallucination: all workpapers
        generated from deterministic templates populated with auditable
        calculation traces; no LLM-generated content in assurance documents.
      module: "engines.assurance_workpaper_engine"
      required: false

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 workflows)
  # ===========================================================================
  workflows:
    - id: scenario_analysis
      name: "Scenario Analysis Workflow"
      description: >-
        5-phase workflow: Setup (define scenarios, uncertainty ranges,
        Monte Carlo parameters) -> Model Run (execute 1000 simulations per
        scenario with parallel processing) -> Sensitivity (tornado analysis
        identifying top 10 decision variables) -> Compare (scenario
        comparison matrix with probability-weighted outcomes) -> Recommend
        (optimal scenario selection with risk-return tradeoff analysis).
        Triggers PACK-021 baseline and target engines as prerequisites.
      schedule: "quarterly"
      estimated_duration_minutes: 120
      phases: 5

    - id: sda_target_setting
      name: "SDA Target Setting Workflow"
      description: >-
        4-phase workflow: Sector Classification (map organization to SBTi
        SDA sectors using NACE/GICS codes) -> Benchmark Calculation
        (retrieve sector-specific convergence pathway from SBTi and IEA
        benchmarks) -> Target Setting (calculate sector-aligned intensity
        targets with base year normalization) -> Validation (cross-check
        against SBTi target-setting tool and generate submission package).
        Requires PACK-021 baseline engine output.
      schedule: "once"
      estimated_duration_minutes: 30
      phases: 4

    - id: supplier_program
      name: "Supplier Engagement Program Workflow"
      description: >-
        5-phase workflow: Assess (profile all suppliers by Scope 3
        materiality, collecting emission data and SBTi target status) ->
        Tier (assign suppliers to engagement tiers 1-4 based on emission
        share and responsiveness) -> Design (create tier-specific
        engagement programs with targets, timelines, and resources) ->
        Execute (deploy engagement campaigns with automated data collection
        and progress monitoring) -> Report (generate supplier engagement
        dashboard with emission reduction attribution).
      schedule: "annual"
      estimated_duration_minutes: 60
      phases: 5

    - id: transition_finance
      name: "Transition Finance Planning Workflow"
      description: >-
        4-phase workflow: CapEx Mapping (allocate decarbonization actions
        to multi-year CapEx and OpEx budgets) -> Taxonomy Alignment (screen
        climate CapEx against EU Taxonomy technical screening criteria) ->
        Bond Screening (evaluate green bond eligibility per ICMA GBP for
        qualifying expenditure) -> Investment Case (generate CFO-ready
        investment case with IRR, NPV, payback, and carbon abatement
        cost for each action).
      schedule: "annual"
      estimated_duration_minutes: 45
      phases: 4

    - id: advanced_progress
      name: "Advanced Progress Analytics Workflow"
      description: >-
        5-phase workflow: Data Ingest (collect current-period emission data
        from MRV agents) -> Decompose (LMDI variance decomposition into
        structural, activity, and intensity effects) -> Attribute (identify
        top 10 drivers of emission change with root cause annotation) ->
        Forecast (rolling 4-quarter forward projection with confidence
        intervals) -> Alert Generation (generate early warnings for
        off-track metrics with corrective action recommendations).
      schedule: "quarterly"
      estimated_duration_minutes: 30
      phases: 5

    - id: temperature_alignment
      name: "Temperature Alignment Workflow"
      description: >-
        4-phase workflow: Target Collection (gather approved SBTi targets
        with timeframes, base years, and coverage) -> Score Calculation
        (calculate implied temperature rise using SBTi regression model) ->
        Portfolio Aggregation (aggregate scores using WATS, TETS, or MOTS
        methods across entities or portfolio companies) -> Report (generate
        temperature alignment report with sector comparison and trajectory
        visualization).
      schedule: "annual"
      estimated_duration_minutes: 15
      phases: 4

    - id: vcmi_certification
      name: "VCMI Certification Workflow"
      description: >-
        4-phase workflow: Evidence Collection (gather SBTi target
        confirmation, reduction progress data, credit portfolio details,
        and disclosure records) -> Criteria Check (evaluate all 15 VCMI
        criteria across foundation, credibility, credit quality, and
        transparency pillars) -> Claim Validation (determine eligible
        claim tier: Silver, Gold, or Platinum with gap analysis) ->
        Certification Report (generate VCMI-ready certification package
        with evidence documentation).
      schedule: "annual"
      estimated_duration_minutes: 20
      phases: 4

    - id: full_acceleration
      name: "Full Acceleration Assessment Workflow"
      description: >-
        8-phase end-to-end workflow: Scenario Analysis (multi-scenario
        Monte Carlo) -> SDA Pathway (sector-specific targets) -> Supplier
        Engagement (tiered program design) -> Transition Finance (CapEx/OpEx
        planning) -> Advanced Progress (variance decomposition) ->
        Temperature Scoring (implied temperature rating) -> VCMI Validation
        (claims code compliance) -> Strategy Assembly (executive
        acceleration strategy document with prioritized actions, investment
        requirements, and governance recommendations). Orchestrates all
        pack engines in dependency order.
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 8

  # ===========================================================================
  # Templates - Pre-built report and output templates (10 templates)
  # ===========================================================================
  templates:
    - id: scenario_comparison_report
      display_name: "Scenario Comparison Report"
      description: >-
        Multi-scenario comparison report with tornado sensitivity charts,
        probability distributions for target achievement, investment
        requirement ranges, and decision matrix. Includes Monte Carlo
        confidence intervals and optimal scenario recommendation with
        risk-adjusted return analysis.
      format: "pdf"
      template_file: "templates/scenario_comparison_report.jinja2"
      enabled: true

    - id: sda_pathway_report
      display_name: "SDA Pathway Report"
      description: >-
        Sector-specific decarbonization pathway report with intensity
        convergence curves, annual milestone targets, sector benchmark
        comparison, and SBTi validation checklist. Includes IEA sector
        pathway overlay and peer company positioning.
      format: "pdf"
      template_file: "templates/sda_pathway_report.jinja2"
      enabled: true

    - id: supplier_engagement_report
      display_name: "Supplier Engagement Report"
      description: >-
        Supplier engagement program dashboard with tier distribution,
        engagement maturity heatmap, emission reduction attribution by
        supplier, progress tracking by tier, and data quality improvement
        metrics. Includes supplier-level scorecards and aggregated
        Scope 3 impact assessment.
      format: "html"
      template_file: "templates/supplier_engagement_report.jinja2"
      enabled: true

    - id: transition_finance_report
      display_name: "Transition Finance Report"
      description: >-
        Climate CapEx/OpEx allocation report with multi-year investment
        schedule, EU Taxonomy alignment ratios, green bond eligible
        expenditure summary, IRR/NPV analysis per action, and internal
        carbon pricing impact assessment. CFO-ready format with executive
        summary.
      format: "pdf"
      template_file: "templates/transition_finance_report.jinja2"
      enabled: true

    - id: variance_analysis_report
      display_name: "Variance Analysis Report"
      description: >-
        Emissions variance decomposition report with structural, activity,
        and intensity effect waterfall charts. Year-over-year and
        cumulative driver attribution. Rolling 4-quarter forecast with
        confidence intervals. Off-track metric alerts with corrective
        action recommendations.
      format: "pdf"
      template_file: "templates/variance_analysis_report.jinja2"
      enabled: true

    - id: temperature_alignment_report
      display_name: "Temperature Alignment Report"
      description: >-
        SBTi Temperature Rating report showing implied temperature scores
        by scope, timeframe, and aggregation method (WATS/TETS/MOTS).
        Portfolio-level temperature alignment with sector comparison.
        Trajectory visualization showing temperature pathway under
        current targets vs. required 1.5C alignment.
      format: "pdf"
      template_file: "templates/temperature_alignment_report.jinja2"
      enabled: true

    - id: vcmi_claims_report
      display_name: "VCMI Claims Report"
      description: >-
        VCMI Claims Code validation report with 15-criteria scorecard,
        pillar-level assessment (foundation, credibility, credit quality,
        transparency), claim tier recommendation (Silver/Gold/Platinum),
        gap analysis for tier upgrade, and evidence documentation index.
      format: "pdf"
      template_file: "templates/vcmi_claims_report.jinja2"
      enabled: true

    - id: multi_entity_report
      display_name: "Multi-Entity Consolidation Report"
      description: >-
        Multi-entity consolidated emissions report with entity-level
        breakdown, consolidation method documentation, intercompany
        elimination adjustments, reporting hierarchy visualization, and
        entity contribution waterfall. Supports equity share, financial
        control, and operational control presentations.
      format: "pdf"
      template_file: "templates/multi_entity_report.jinja2"
      enabled: true

    - id: assurance_package_report
      display_name: "Assurance Package Report"
      description: >-
        Audit workpaper package for external assurance engagements.
        Includes methodology documentation, calculation trace files
        with SHA-256 provenance chains, data lineage maps, control
        evidence summaries, assumption registers, and materiality
        assessments. Formatted for ISAE 3000/3410 engagements.
      format: "pdf"
      template_file: "templates/assurance_package_report.jinja2"
      enabled: true

    - id: acceleration_strategy_report
      display_name: "Acceleration Strategy Report"
      description: >-
        Executive acceleration strategy document synthesizing all pack
        engine outputs. Includes scenario recommendation, sector pathway
        alignment, supplier program impact, transition finance summary,
        progress analytics, temperature alignment, VCMI readiness, and
        prioritized action plan with governance recommendations. Board-ready
        format with data-driven narratives.
      format: "pdf"
      template_file: "templates/acceleration_strategy_report.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (12 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        10-phase DAG pipeline with conditional phase execution, retry logic,
        and SHA-256 provenance at each checkpoint. Phases: Health Check ->
        Configuration -> PACK-021 Bridge -> Scenario Modeling -> SDA Pathway ->
        Supplier Engagement -> Climate Finance -> Progress Analytics ->
        Temperature Scoring -> Strategy Assembly. Supports parallel execution
        of independent phases with dependency management.
      module: "integrations.pack_orchestrator"
      required: true

    - id: pack021_bridge
      name: "PACK-021 Bridge"
      description: >-
        Connects to PACK-021 Net Zero Starter Pack for baseline, target
        setting, MACC analysis, gap analysis, offset portfolio, net-zero
        scorecard, and sector benchmarking capabilities. Provides seamless
        access to all 8 PACK-021 engines and their outputs. Handles
        configuration inheritance and version compatibility.
      module: "integrations.pack021_bridge"
      required: true

    - id: mrv_bridge
      name: "MRV Agent Bridge"
      description: >-
        Routes data from all 30 AGENT-MRV agents for complete Scope 1/2/3
        emissions calculation. Maps MRV outputs to acceleration pack format
        for variance decomposition and multi-entity consolidation. Enhanced
        with activity-based Scope 3 routing for supplier-specific emission
        factors.
      module: "integrations.mrv_bridge"
      required: true

    - id: ghg_app_bridge
      name: "GL-GHG-APP Bridge"
      description: >-
        Connects to GL-GHG-APP v1.0 for GHG inventory calculation
        infrastructure. Reuses the full MRV agent pipeline with
        zero-hallucination guarantees.
      module: "integrations.ghg_app_bridge"
      required: true

    - id: sbti_app_bridge
      name: "GL-SBTi-APP Bridge"
      description: >-
        Connects to GL-SBTi-APP v1.0 for science-based target setting,
        SDA pathway data, and temperature rating infrastructure. Enhanced
        with SDA sector pathway access and temperature score regression
        coefficients.
      module: "integrations.sbti_app_bridge"
      required: true

    - id: decarb_bridge
      name: "Decarbonization Agent Bridge"
      description: >-
        Connects to all 21 DECARB-X agents for reduction action modeling.
        Enhanced with scenario-aware action evaluation for Monte Carlo
        pathway analysis. Routes action costs and abatement potentials
        to climate finance engine.
      module: "integrations.decarb_bridge"
      required: true

    - id: taxonomy_bridge
      name: "EU Taxonomy Bridge"
      description: >-
        Connects to GL-Taxonomy-APP v1.0 for EU Taxonomy climate mitigation
        alignment. Screens climate CapEx against technical screening criteria
        and Do No Significant Harm tests. Provides Taxonomy-aligned CapEx
        and OpEx ratios for transition finance reporting.
      module: "integrations.taxonomy_bridge"
      required: false

    - id: data_bridge
      name: "Data Agent Bridge"
      description: >-
        Connects to all 20 AGENT-DATA agents for supplier data intake,
        quality management, and cross-source reconciliation. Enhanced
        with supplier questionnaire automation for tier 2-4 engagement
        and activity data collection at scale.
      module: "integrations.data_bridge"
      required: true

    - id: reporting_bridge
      name: "Reporting Framework Bridge"
      description: >-
        Cross-framework reporting bridge connecting to GL-CDP-APP,
        GL-TCFD-APP, and ESRS E1 disclosure generation. Maps acceleration
        pack outputs to CDP C4 (targets), TCFD metrics and targets, and
        ESRS E1-1 (transition plan) disclosure requirements.
      module: "integrations.reporting_bridge"
      required: false

    - id: offset_bridge
      name: "Offset Agent Bridge"
      description: >-
        Connects to AGENT-OFFSET-001/002/003 for carbon credit quality
        scoring, registry integration, and retirement tracking. Enhanced
        with VCMI claims evidence collection and Oxford Principles
        portfolio composition tracking.
      module: "integrations.offset_bridge"
      required: false

    - id: health_check
      name: "Health Check"
      description: >-
        22-category system verification covering all 10 engines, PACK-021
        availability, agent dependencies (30 MRV + 20 DATA + 10 FOUND +
        21 DECARB + 3 OFFSET), database connectivity, emission factor
        freshness, SDA pathway data currency, temperature rating
        coefficient availability, VCMI criteria templates, and Taxonomy
        screening criteria version.
      module: "integrations.health_check"
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        8-step guided configuration wizard: Organization Profile (sector,
        size, region, multi-entity structure) -> PACK-021 Link (import
        baseline and targets) -> Scenario Definition (BAU, moderate,
        ambitious, custom) -> SDA Sector Mapping (NACE/GICS to SBTi
        sector) -> Supplier Tiering (emission threshold configuration) ->
        Finance Parameters (discount rate, carbon price, budget) ->
        Temperature Scoring (aggregation method selection) -> Assurance
        Level (limited vs. reasonable assurance configuration).
      module: "integrations.setup_wizard"
      required: false

  # ===========================================================================
  # Presets - Sector-specific configurations (8 presets)
  # ===========================================================================
  presets:
    - id: heavy_industry
      name: "Heavy Industry Preset"
      description: >-
        Configuration for heavy industry (cement, steel, aluminium, chemicals)
        with SDA pathway mandatory. Very high Scope 1 from process emissions
        and combustion. CCS pathway enabled. Long 15-year planning horizon.
        Supplier engagement focused on upstream raw materials. Temperature
        scoring aligned with TPI sector benchmarks.
      sector: "HEAVY_INDUSTRY"
      enabled_engines:
        - scenario_modeling
        - sda_pathway
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - multi_entity
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/heavy_industry.yaml"

    - id: power_utilities
      name: "Power & Utilities Preset"
      description: >-
        Configuration for power generation and utilities with SDA pathway
        mandatory. Grid decarbonization focus with coal phase-out modeling,
        renewable capacity expansion, and storage integration. Long 20-year
        planning horizon reflecting asset lifecycles. PCAF financed emissions
        for utility holding structures.
      sector: "POWER_UTILITIES"
      enabled_engines:
        - scenario_modeling
        - sda_pathway
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - multi_entity
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/power_utilities.yaml"

    - id: manufacturing
      name: "Manufacturing Preset"
      description: >-
        Configuration for general manufacturing with mixed SDA/ACA pathway.
        Energy efficiency and fuel switching as primary levers. Process
        optimization enabled. Activity-based Scope 3 for categories 1, 3,
        4, 5. Supplier engagement for top 200 suppliers.
      sector: "MANUFACTURING"
      enabled_engines:
        - scenario_modeling
        - sda_pathway
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/manufacturing.yaml"

    - id: transport_logistics
      name: "Transport & Logistics Preset"
      description: >-
        Configuration for transport, logistics, aviation, and shipping.
        SDA pathway for transport sector. Fleet electrification, modal
        shift, sustainable aviation fuel (SAF), and alternative marine
        fuels as primary levers. High Scope 1 from mobile combustion.
        Scope 3 Category 9 downstream transport dominant.
      sector: "TRANSPORT"
      enabled_engines:
        - scenario_modeling
        - sda_pathway
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/transport_logistics.yaml"

    - id: financial_services
      name: "Financial Services Preset"
      description: >-
        Configuration for banks, insurance, and asset managers. PCAF
        financed emissions methodology for Scope 3 Category 15 (investments).
        Portfolio temperature scoring using WATS aggregation. Very low
        direct emissions, dominant financed/insured emissions. Green bond
        screening and Taxonomy alignment for lending portfolios.
      sector: "FINANCIAL_SERVICES"
      enabled_engines:
        - scenario_modeling
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - multi_entity
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/financial_services.yaml"

    - id: real_estate
      name: "Real Estate Preset"
      description: >-
        Configuration for real estate investment, development, and
        management. CRREM carbon risk pathway alignment for building
        portfolios. Scope 3 Category 13 (downstream leased assets)
        dominant. Building energy performance certificates and retrofit
        program management. Multi-entity for property portfolios.
      sector: "REAL_ESTATE"
      enabled_engines:
        - scenario_modeling
        - sda_pathway
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - multi_entity
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/real_estate.yaml"

    - id: consumer_goods
      name: "Consumer Goods Preset"
      description: >-
        Configuration for FMCG, retail, and consumer goods with supply
        chain focus. Scope 3 Category 1 (purchased goods) represents
        60-80% of total footprint. Supplier engagement critical with
        emphasis on packaging, logistics, and raw material sourcing.
        ACA pathway. Product carbon footprint integration.
      sector: "CONSUMER_GOODS"
      enabled_engines:
        - scenario_modeling
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/consumer_goods.yaml"

    - id: technology
      name: "Technology Preset"
      description: >-
        Configuration for technology, software, and data center companies.
        ACA pathway. Data center PUE optimization, cloud efficiency,
        RE100 procurement as primary levers. Scope 3 Category 1 (purchased
        hardware and cloud), Category 2 (capital goods), and Category 11
        (product use-phase energy) dominant. Low direct emissions.
      sector: "TECHNOLOGY"
      enabled_engines:
        - scenario_modeling
        - supplier_engagement
        - scope3_activity
        - climate_finance
        - temperature_scoring
        - variance_decomposition
        - vcmi_validation
        - assurance_workpaper
      file: "config/presets/technology.yaml"

