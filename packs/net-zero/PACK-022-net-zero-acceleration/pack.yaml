# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 89
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    decarb_agents: 21
    offset_agents: 3
  bridged_apps: 5
  bridged_packs: 1
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  scenario_modeling:
    monte_carlo_runs: 1000
    max_scenarios: 10
    target_duration_minutes: 15
    per_scenario_minutes: 3
  sda_pathway:
    supported_sectors: 12
    target_duration_minutes: 2
    per_sector_calc_ms: 500
  supplier_engagement:
    max_suppliers: 50000
    scoring_per_1000_minutes: 10
    batch_size: 2000
  scope3_activity:
    max_line_items: 200000
    target_duration_minutes: 60
    per_category_minutes: 4
  climate_finance:
    max_actions: 500
    taxonomy_screening_ms: 200
    target_duration_minutes: 15
  temperature_scoring:
    max_targets: 200
    portfolio_aggregation_ms: 500
    target_duration_minutes: 5
  variance_decomposition:
    max_periods: 40
    decomposition_per_period_ms: 100
    target_duration_minutes: 5
  multi_entity:
    max_entities: 50
    consolidation_minutes: 30
    per_entity_calc_ms: 300
  vcmi_validation:
    criteria_count: 15
    target_duration_minutes: 10
  assurance_workpaper:
    workpaper_generation_minutes: 20
    lineage_map_ms: 1000
  baseline_calculation:
    max_facilities: 2000
    max_emission_sources: 10000
    target_duration_minutes: 45
  full_acceleration:
    target_duration_minutes: 240
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level, entity-level, and supplier access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - net_zero_director
    - climate_strategy_lead
    - sustainability_analyst
    - supply_chain_manager
    - finance_reviewer
    - executive_viewer
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 30
    recommended_connections: 80

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_sbti_pathway_data
    - verify_sbti_sda_sector_data
    - verify_sbti_temperature_coefficients
    - verify_ipcc_gwp_values
    - verify_taxonomy_screening_criteria
    - verify_vcmi_criteria_templates
    - verify_pack021_availability

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
      - "V082-V088"
      - "V089-V128"
    pack021_migrations:
      - "V083-PACK021-001"
      - "V083-PACK021-002"
      - "V083-PACK021-003"
      - "V083-PACK021-004"
      - "V083-PACK021-005"
      - "V083-PACK021-006"
    new:
      - "V083-PACK022-001"  # Scenario model definitions and Monte Carlo results
      - "V083-PACK022-002"  # SDA sector-specific decarbonization pathways
      - "V083-PACK022-003"  # Supplier engagement program tracking
      - "V083-PACK022-004"  # Climate CapEx/OpEx allocation records
      - "V083-PACK022-005"  # Temperature rating results
      - "V083-PACK022-006"  # Variance decomposition records
      - "V083-PACK022-007"  # Multi-entity consolidation records
      - "V083-PACK022-008"  # VCMI claims validation records

  post_install:
    - seed_ipcc_ar6_gwp_values
    - seed_emission_factor_databases
    - seed_sbti_pathway_models
    - seed_sbti_sda_sector_benchmarks
    - seed_sbti_temperature_coefficients
    - seed_grid_emission_factors
    - seed_sector_benchmark_data
    - seed_credit_registry_metadata
    - seed_taxonomy_screening_criteria
    - seed_vcmi_criteria_templates
    - seed_default_presets
    - run_health_checks
