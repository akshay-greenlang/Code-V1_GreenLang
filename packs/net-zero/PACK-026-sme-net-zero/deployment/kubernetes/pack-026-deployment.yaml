---
apiVersion: v1
kind: Namespace
metadata:
  name: greenlang-packs
  labels:
    app.kubernetes.io/name: greenlang
    app.kubernetes.io/component: packs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pack-026-config
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
    app.kubernetes.io/version: "1.0.0"
data:
  PACK_ID: "PACK-026"
  PACK_NAME: "SME Net Zero Pack"
  PACK_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"

  # Performance settings
  MAX_WORKERS: "4"
  REQUEST_TIMEOUT_SECONDS: "300"

  # Data quality tiers
  BRONZE_ACCURACY_PCT: "40"
  SILVER_ACCURACY_PCT: "15"
  GOLD_ACCURACY_PCT: "5"

  # Grant database
  GRANT_DATABASE_SYNC_INTERVAL_HOURS: "168"  # Weekly

  # OAuth settings
  OAUTH_TOKEN_REFRESH_MARGIN_SECONDS: "300"  # 5 minutes before expiry
---
apiVersion: v1
kind: Secret
metadata:
  name: pack-026-secrets
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
type: Opaque
stringData:
  # OAuth Credentials (Base64 encoded in production)
  XERO_CLIENT_ID: ""
  XERO_CLIENT_SECRET: ""
  QB_CLIENT_ID: ""
  QB_CLIENT_SECRET: ""
  SAGE_CLIENT_ID: ""
  SAGE_CLIENT_SECRET: ""

  # Token encryption key
  TOKEN_ENCRYPTION_KEY: ""

  # Database connection (uses main GreenLang DB)
  DATABASE_URL: "postgresql://greenlang:${DB_PASSWORD}@postgres:5432/greenlang"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: pack
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pack-026-sme-net-zero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pack-026-sme-net-zero
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: pack
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: greenlang-pack-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

      containers:
        - name: pack-026-api
          image: greenlang/pack-026-sme-net-zero:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pack-026-secrets
                  key: DATABASE_URL

          envFrom:
            - configMapRef:
                name: pack-026-config
            - secretRef:
                name: pack-026-secrets

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - pack-026-sme-net-zero
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: pack-026-sme-net-zero
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - api.greenlang.io
      secretName: greenlang-tls
  rules:
    - host: api.greenlang.io
      http:
        paths:
          - path: /packs/sme-net-zero
            pathType: Prefix
            backend:
              service:
                name: pack-026-sme-net-zero
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pack-026-sme-net-zero
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pack-026-sme-net-zero
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pack-026-sme-net-zero
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: pack-026-sme-net-zero
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pack-026-sme-net-zero
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: greenlang-pack-sa
  namespace: greenlang-packs
  labels:
    app.kubernetes.io/name: greenlang
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: greenlang-pack-role
  namespace: greenlang-packs
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: greenlang-pack-rolebinding
  namespace: greenlang-packs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: greenlang-pack-role
subjects:
  - kind: ServiceAccount
    name: greenlang-pack-sa
    namespace: greenlang-packs
