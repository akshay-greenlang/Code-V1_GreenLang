# PACK-027: Enterprise Net Zero Pack - Kubernetes Deployment
# Production-ready Kubernetes manifests for enterprise deployment

---
apiVersion: v1
kind: Namespace
metadata:
  name: greenlang-enterprise
  labels:
    app: greenlang
    pack: pack-027
    tier: enterprise

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pack027-config
  namespace: greenlang-enterprise
data:
  LOG_LEVEL: "INFO"
  PACK_PRESET: "manufacturing"
  MAX_WORKERS: "8"
  CORS_ORIGINS: "*"

---
apiVersion: v1
kind: Secret
metadata:
  name: pack027-secrets
  namespace: greenlang-enterprise
type: Opaque
stringData:
  DATABASE_URL: "postgresql://greenlang:CHANGE_ME@postgresql:5432/greenlang"
  REDIS_URL: "redis://redis:6379/0"
  VAULT_TOKEN: "CHANGE_ME"
  SAP_API_KEY: "CHANGE_ME"
  ORACLE_API_KEY: "CHANGE_ME"
  WORKDAY_API_KEY: "CHANGE_ME"
  CDP_API_KEY: "CHANGE_ME"
  SBTI_API_KEY: "CHANGE_ME"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pack027-enterprise
  namespace: greenlang-enterprise
  labels:
    app: pack027
    tier: enterprise
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pack027
  template:
    metadata:
      labels:
        app: pack027
        tier: enterprise
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pack027-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: pack027
        image: greenlang/pack-027-enterprise:1.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: pack027-config
              key: LOG_LEVEL
        - name: PACK_PRESET
          valueFrom:
            configMapKeyRef:
              name: pack027-config
              key: PACK_PRESET
        - name: MAX_WORKERS
          valueFrom:
            configMapKeyRef:
              name: pack027-config
              key: MAX_WORKERS
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: pack027-config
              key: CORS_ORIGINS
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: REDIS_URL
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: VAULT_TOKEN
        - name: SAP_API_KEY
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: SAP_API_KEY
        - name: ORACLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: ORACLE_API_KEY
        - name: WORKDAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: pack027-secrets
              key: WORKDAY_API_KEY

        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pack027
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: pack027-service
  namespace: greenlang-enterprise
  labels:
    app: pack027
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: pack027

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pack027-sa
  namespace: greenlang-enterprise

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pack027-hpa
  namespace: greenlang-enterprise
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pack027-enterprise
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pack027-ingress
  namespace: greenlang-enterprise
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - pack027.greenlang.io
    secretName: pack027-tls
  rules:
  - host: pack027.greenlang.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pack027-service
            port:
              number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pack027-pdb
  namespace: greenlang-enterprise
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: pack027

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pack027-quota
  namespace: greenlang-enterprise
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    persistentvolumeclaims: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: pack027-limits
  namespace: greenlang-enterprise
spec:
  limits:
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
    type: Container
