# =============================================================================
# PACK-024 Carbon Neutral Pack - SME Neutrality Preset
# =============================================================================
# Simplified carbon neutrality for small and medium enterprises covering
# Scope 1 + Scope 2 only, with optional simplified Scope 3 screening.
# Designed for organizations with fewer than 250 employees and limited
# GHG accounting resources. Aligned with PAS 2060:2014 and ISO 14068-1:2023
# with pragmatic simplifications for SME applicability.
#
# Typical use cases:
#   - SMEs with < 250 employees seeking carbon-neutral certification
#   - Small companies with limited GHG accounting resources
#   - Start-ups making early climate commitments
#   - Professional services firms (low direct emissions)
#   - Local businesses seeking community credibility
# =============================================================================

# --- Identity ---
organization_name: ""
neutrality_type: "SME"
boundary_scope: "SCOPE_1_AND_2"
region: "EU"
country: ""

# --- Temporal ---
reporting_year: 2025
base_year: 2024
pack_version: "1.0.0"
neutrality_commitment_year: 2024
target_neutrality_year: 2025

# --- Scope Configuration ---
scope_boundaries:
  scope1:
    included: true
    coverage_pct: 100.0
    consolidation: "operational_control"
    sources:
      - "stationary_combustion"
      - "mobile_combustion"
      - "refrigerant_leakage"
  scope2:
    included: true
    coverage_pct: 100.0
    methods:
      - "location_based"
      - "market_based"
    preferred_method: "market_based"
    sources:
      - "purchased_electricity"
      - "purchased_heating"
  scope3:
    included: false
    coverage_pct: 0.0
    categories: []
    materiality_threshold_pct: 5.0
    de_minimis_pct: 10.0

# --- Engines Configuration ---
engines:
  footprint_quantification:
    enabled: true
    consolidation_approach: "operational_control"
    include_biogenic_co2: false
    uncertainty_assessment: false
    data_quality_scoring: true
    gwp_source: "IPCC_AR6"
    gwp_timeframe: 100
    materiality_threshold_pct: 3.0
  carbon_management_plan:
    enabled: true
    planning_horizon_years: 3
    reduction_first_strategy: true
    min_reduction_before_offset_pct: 30.0
    internal_carbon_price_eur: 50.0
    max_offset_reliance_pct: 70.0
    annual_reduction_target_pct: 3.0
  credit_quality:
    enabled: true
    min_quality_score: 55
    icvcm_ccp_compliance: false
    preferred_standards:
      - "gold_standard"
      - "verra_vcs"
    min_additionality_score: 6
    min_permanence_score: 5
    require_sdg_contribution: false
  portfolio_optimization:
    enabled: true
    max_nature_based_pct: 60.0
    max_avoidance_pct: 70.0
    min_removal_pct: 10.0
    diversification_min_types: 2
    vintage_max_age_years: 7
    geographic_diversification: false
    budget_constraint_enabled: true
  registry_retirement:
    enabled: true
    auto_retirement: false
    retirement_timing: "within_reporting_period"
    supported_registries:
      - "gold_standard"
      - "verra"
    serial_number_tracking: true
    double_counting_prevention: true
  neutralization_balance:
    enabled: true
    balance_method: "annual"
    allow_forward_credits: false
    buffer_pool_pct: 5.0
    shortfall_action: "alert_and_purchase"
    surplus_carryover: false
    verification_frequency: "annual"
  claims_substantiation:
    enabled: true
    claim_type: "carbon_neutral"
    standard: "PAS_2060"
    pas2060_compliance: true
    vcmi_claims_code: false
    public_disclosure_required: true
    third_party_verification: false
    claim_period: "annual"
  verification_package:
    enabled: true
    assurance_level: "limited"
    standard: "ISAE_3410"
    third_party_verifier: false
    evidence_completeness_target_pct: 85.0
    documentation_format: "PDF"
  annual_cycle:
    enabled: true
    cycle_start_month: 1
    cycle_end_month: 12
    milestone_frequency: "semi_annual"
    progress_reporting: true
    recertification_reminder_days: 60
    continuous_improvement_tracking: true
  permanence_risk:
    enabled: true
    risk_assessment_frequency: "annual"
    buffer_contribution_pct: 10.0
    reversal_monitoring: false
    replacement_trigger_threshold_pct: 15.0
    insurance_coverage_required: false

# --- Supplier Engagement ---
supplier:
  enabled: false
  max_suppliers: 100
  top_supplier_count: 20
  data_collection_frequency: "annual"

# --- Climate Finance ---
finance:
  enabled: true
  discount_rate_pct: 6.0
  carbon_price_eur_per_tco2e: 50.0
  carbon_price_escalation_pct: 4.0
  reporting_currency: "EUR"
  planning_horizon_years: 5
  credit_budget_annual_eur: 25000.0
  credit_price_range:
    min_eur: 8.0
    max_eur: 50.0
    avg_eur: 20.0

# --- Data Quality ---
data_quality:
  target_dqis_score: 3.0
  acceptable_data_sources:
    - "primary_measured"
    - "default_factors"
    - "secondary_calculated"
    - "industry_averages"
  emission_factor_source: "DEFRA_2024"
  grid_factor_update_frequency: "annual"

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "LIMITED"
  workpaper_format: "ISAE_3410"
  methodology_documentation: true
  calculation_trace: true
  sha256_provenance: true
  retention_years: 7

# --- Multi-Entity ---
multi_entity:
  enabled: false
  max_entities: 5
  consolidation_method: "OPERATIONAL_CONTROL"

# --- Reporting ---
reporting:
  formats:
    - "PDF"
    - "HTML"
  include_iso14068_mapping: true
  include_pas2060_mapping: true
  include_ghg_protocol_mapping: true
  language: "en"
  watermark_draft: true

# --- Performance ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 1800
  max_concurrent_calcs: 2
  timeout_seconds: 180
  batch_size: 500
  memory_limit_mb: 2048
