# =============================================================================
# PACK-024: Carbon Neutral Pack
# GreenLang Comprehensive Carbon Neutrality Management Pack
# =============================================================================
# This pack provides a complete, standalone carbon neutrality management
# solution covering the full journey from GHG footprint quantification through
# carbon credit procurement and retirement to verified neutrality claims.
# It implements 10 engines for footprint quantification (ISO 14064-1:2018),
# carbon management planning with reduction-first strategy, 12-dimension
# ICVCM Core Carbon Principles credit quality scoring, portfolio optimization
# with Markowitz-inspired risk/return allocation, registry retirement tracking
# across 6 registries (Verra, Gold Standard, ACR, CAR, Puro.earth, Isometric),
# neutralization balance calculation per ISO 14068-1:2023 and PAS 2060:2014,
# claims substantiation with VCMI Claims Code compliance, ISAE 3410
# verification package assembly, annual cycle management with milestone
# tracking, and permanence risk assessment for nature-based and technology-
# based carbon credits.
#
# The pack implements zero-hallucination calculation engines: all emissions
# calculations, credit quality scoring, portfolio optimization, balance
# calculations, and risk assessments use deterministic formulas with published
# coefficients and lookup tables. LLMs are used only for classification,
# entity resolution, and narrative generation.
#
# Key Capabilities:
#   - ISO 14064-1:2018 aligned GHG footprint quantification (Scope 1/2/3)
#   - Carbon management plan with reduction-first strategy and MACC curves
#   - 12-dimension ICVCM CCP credit quality scoring (weights sum to 1.0)
#   - Carbon credit portfolio optimization (avoidance/removal, nature/tech)
#   - Registry retirement tracking across Verra, Gold Standard, ACR, CAR,
#     Puro.earth, and Isometric with serial number verification
#   - Neutralization balance per ISO 14068-1:2023 and PAS 2060:2014
#   - Claims substantiation with VCMI Claims Code of Practice compliance
#   - ISAE 3410 verification package assembly with evidence management
#   - Annual cycle management with configurable milestone frequency
#   - Permanence risk assessment with buffer pool contribution calculations
#   - 8 neutrality types: Corporate, SME, Event, Product, Building, Service,
#     Project, Portfolio
#
# Regulatory and Framework References:
#   - ISO 14068-1:2023 (Carbon neutrality)
#   - PAS 2060:2014 (Demonstrating carbon neutrality)
#   - ISO 14064-1:2018 (Organization-level GHG quantification)
#   - ISO 14064-2:2019 (Project-level GHG)
#   - ISO 14067:2018 (Product carbon footprint)
#   - GHG Protocol Corporate Standard (revised)
#   - GHG Protocol Scope 2 Guidance
#   - GHG Protocol Scope 3 Standard
#   - ICVCM Core Carbon Principles (2023)
#   - VCMI Claims Code of Practice (2023)
#   - IPCC AR6 WG1/WG3 (2021/2022)
#   - ISAE 3410 (Assurance on GHG statements)
#   - CRREM Carbon Risk Real Estate Monitor
#   - PCAF Global Standard (2022)
#   - Oxford Principles for Net Zero Aligned Carbon Offsetting
#   - Taskforce on Scaling Voluntary Carbon Markets (TSVCM)
#
# Target Organizations:
#   - Sustainability managers pursuing carbon neutrality certifications
#   - Companies seeking ISO 14068-1 or PAS 2060 compliance
#   - SMEs with simplified carbon neutrality requirements
#   - Event organizers offsetting conference/event carbon footprints
#   - Product managers seeking carbon neutral product labeling
#   - Real estate managers pursuing carbon neutral building certifications
#   - Service companies offsetting operational and digital emissions
#   - Project developers achieving carbon neutral construction
#   - Multi-entity portfolio managers consolidating group neutrality
#   - Auditors and verifiers assessing neutrality claims
#
# Version History:
#   1.0.0 - Initial release (2026-03-18)
# =============================================================================

