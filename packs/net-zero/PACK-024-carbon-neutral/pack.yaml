# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 63
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    carbon_neutral_engines: 10
  bridged_apps: 3
  bridged_packs: 3
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  footprint_quantification:
    target_duration_minutes: 10
    max_facilities: 500
    max_scope3_categories: 15
  carbon_management_plan:
    target_duration_minutes: 5
    max_reduction_actions: 100
    macc_curve_resolution: 50
  credit_quality:
    icvcm_dimensions: 12
    target_duration_minutes: 3
    per_credit_assessment_seconds: 30
    max_credits_batch: 200
  portfolio_optimization:
    target_duration_minutes: 5
    max_credits_in_portfolio: 500
    monte_carlo_iterations: 1000
  registry_retirement:
    target_duration_minutes: 2
    supported_registries: 6
    max_retirements_batch: 100
  neutralization_balance:
    target_duration_minutes: 2
    balance_methods: 6
    multi_period_max_years: 10
  claims_substantiation:
    target_duration_minutes: 3
    claim_types: 7
    vcmi_tier_assessment_minutes: 2
  verification_package:
    target_duration_minutes: 10
    max_evidence_documents: 500
    sha256_hash_verification: true
  annual_cycle:
    target_duration_minutes: 5
    max_milestones_per_year: 12
    max_historical_years: 10
  permanence_risk:
    target_duration_minutes: 3
    risk_categories: 3
    max_credits_assessed: 500
  full_neutrality_workflow:
    target_duration_minutes: 120
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and credit-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - carbon_neutral_admin
    - sustainability_manager
    - climate_analyst
    - credit_portfolio_manager
    - external_auditor
    - viewer

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 60

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_ipcc_ar6_gwp_values
    - verify_icvcm_ccp_dimensions
    - verify_vcmi_claims_criteria
    - verify_registry_api_connectivity
    - verify_credit_project_type_data
    - verify_permanence_risk_parameters

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
      - "V082-V088"
    new:
      - "V084-PACK024-001"  # Footprint quantification and scope breakdown
      - "V084-PACK024-002"  # Carbon management plan and reduction trajectory
      - "V084-PACK024-003"  # Credit quality assessments and ICVCM CCP scores
      - "V084-PACK024-004"  # Portfolio optimization and credit allocation
      - "V084-PACK024-005"  # Registry retirement records and serial numbers
      - "V084-PACK024-006"  # Neutralization balance and surplus/deficit
      - "V084-PACK024-007"  # Claims substantiation and disclosure records
      - "V084-PACK024-008"  # Verification package and evidence index
      - "V084-PACK024-009"  # Annual cycle milestones and renewal tracking
      - "V084-PACK024-010"  # Permanence risk scores and buffer pool records

  post_install:
    - seed_ipcc_ar6_gwp_values
    - seed_emission_factor_databases
    - seed_icvcm_ccp_dimension_definitions
    - seed_credit_quality_rating_rubrics
    - seed_credit_project_types
    - seed_supported_registry_configurations
    - seed_vcmi_claims_code_criteria
    - seed_permanence_risk_parameters
    - seed_grid_emission_factors
    - seed_default_presets
    - run_health_checks
