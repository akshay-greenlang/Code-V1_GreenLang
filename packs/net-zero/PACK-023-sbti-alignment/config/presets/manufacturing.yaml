# =============================================================================
# PACK-023 SBTi Alignment Pack - Manufacturing Preset
# =============================================================================
# Configuration for general manufacturing with ACA or SDA pathway flexibility.
# Mixed Scope 1/2/3 profile with energy efficiency as primary lever. ACA
# pathway at 4.2%/yr for 1.5C or SDA for homogeneous sub-sectors (pulp/paper,
# chemicals). Scope 3 Cat 1 and Cat 4 typically material. Multi-entity support
# for divisional structures. Equipment manufacturers, food processors, textiles,
# pharmaceuticals, and other general manufacturing.
#
# Typical use cases:
#   - Consumer goods manufacturing
#   - Equipment and machinery manufacturers
#   - Food and beverage processing
#   - Textile and apparel production
#   - Pharmaceutical manufacturing
#   - Packaging and materials
# =============================================================================

# --- Identity ---
organization_name: ""
sector: "MANUFACTURING"
sector_code: "NACE_C10_C32"
gics_sector: "2010_2020_3010"
region: "EU"
country: ""

# --- Temporal ---
reporting_year: 2025
base_year: 2021
pack_version: "1.0.0"

# --- SBTi Engines Configuration ---
engines:
  target_setting:
    enabled: true
    ambition_level: "CELSIUS_1_5"
    scope_priorities:
      scope1: 0.95
      scope2: 0.95
      scope3: 0.67
  criteria_validation:
    enabled: true
    near_term_criteria: ["C1", "C2", "C3", "C4", "C5", "C6", "C7", "C8", "C9", "C10", "C11", "C12", "C13", "C14", "C15", "C16", "C17", "C18", "C19", "C20", "C21", "C22", "C23", "C24", "C25", "C26", "C27", "C28"]
    net_zero_criteria: ["NZ-C1", "NZ-C2", "NZ-C3", "NZ-C4", "NZ-C5", "NZ-C6", "NZ-C7", "NZ-C8", "NZ-C9", "NZ-C10", "NZ-C11", "NZ-C12", "NZ-C13", "NZ-C14"]
  scope3_screening:
    enabled: true
    materiality_trigger_pct: 40.0
    coverage_near_term_pct: 67.0
    coverage_long_term_pct: 90.0
    categories: [1, 2, 3, 4, 5, 6, 7, 9, 11, 12]
  sda_sector:
    enabled: true
    sda_applicable: false
    sda_sectors:
      - "PULP_PAPER"
      - "CHEMICALS"
    convergence_method: "SBTi_SDA_Tool_V3.0"
  flag_assessment:
    enabled: false
    flag_applicable: false
  temperature_rating:
    enabled: true
    aggregation_methods:
      - "WATS"
      - "TETS"
      - "MOTS"
    default_score_celsius: 3.2
    include_scope3: true
  progress_tracking:
    enabled: true
    review_cycle_years: 5
    recalculation_trigger_threshold_pct: 5.0
  recalculation:
    enabled: true
    trigger_types:
      - "acquisition"
      - "divestiture"
      - "merger"
      - "methodology_change"
      - "structural_change"
      - "organic_growth"
  fi_portfolio:
    enabled: false
    fi_applicable: false
  submission_readiness:
    enabled: true
    readiness_dimensions: 5

# --- Pathway Configuration (ACA Default, SDA Optional) ---
pathway:
  methodology: "ACA"
  sda_enabled: false
  sda_sectors: []
  sda_base_year: 2021
  sda_target_year: 2050
  ambition_level: "CELSIUS_1_5"
  near_term_target_year: 2030
  long_term_target_year: 2050
  coverage_scope1_pct: 95.0
  coverage_scope2_pct: 95.0
  coverage_scope3_pct: 67.0
  flag_pathway_enabled: false
  aca_annual_reduction_rate_pct: 4.2
  iea_benchmark_source: "IEA_NZE_2023"
  sbti_submission_planned: true

# --- Scope 3 Configuration ---
scope3:
  categories: [1, 2, 3, 4, 5, 6, 7, 9, 11, 12]
  activity_based_categories: [1, 4, 11]
  supplier_specific_categories: [1]
  spend_based_categories: [2, 3, 5, 6, 7, 9, 12]
  materiality_threshold_pct: 0.5
  target_dqis_score: 2
  pcaf_enabled: false
  pcaf_asset_classes: []

# --- Supplier Engagement ---
supplier:
  enabled: true
  max_suppliers: 4000
  tier_thresholds:
    collaborate: 4.0
    require: 10.0
    engage: 30.0
    inform: 100.0
  top_supplier_count: 75
  data_collection_frequency: "annual"
  sbti_target_tracking: true
  cdp_supply_chain_enabled: true
  engagement_scoring_dimensions:
    - "data_quality"
    - "target_ambition"
    - "reduction_progress"
    - "responsiveness"
    - "innovation"
  batch_size: 2000

# --- Climate Finance ---
finance:
  enabled: true
  discount_rate_pct: 9.0
  carbon_price_eur_per_tco2e: 110.0
  carbon_price_escalation_pct: 6.5
  reporting_currency: "EUR"
  planning_horizon_years: 12
  green_bond_screening: true
  taxonomy_alignment: true
  finance_instruments:
    - "CAPEX_ALLOCATION"
    - "OPEX_ALLOCATION"
    - "GREEN_BOND"
    - "SUSTAINABILITY_LINKED_BOND"
    - "INTERNAL_CARBON_PRICE"
  wacc_pct: 10.5

# --- Temperature Scoring ---
temperature:
  enabled: true
  aggregation_methods:
    - "WATS"
    - "TETS"
    - "MOTS"
  default_score_celsius: 3.2
  include_scope3_in_score: true
  portfolio_scoring: false
  portfolio_weighting: "revenue"
  time_frames:
    - "short"
    - "mid"
    - "long"

# --- Decomposition & Variance ---
decomposition:
  enabled: true
  method: "LMDI"
  decomposition_effects:
    - "structural"
    - "activity"
    - "intensity"
  forecast_periods: 4
  forecast_confidence_pct: 90.0
  alert_threshold_pct: 8.0
  top_drivers_count: 12
  historical_periods: 12

# --- Multi-Entity ---
multi_entity:
  enabled: true
  max_entities: 50
  consolidation_method: "OPERATIONAL_CONTROL"
  intercompany_elimination: true
  reporting_hierarchies:
    - "geographic"
    - "divisional"
    - "product_line"
    - "legal_entity"
  ownership_threshold_pct: 20.0

# --- VCMI & Carbon Removal ---
vcmi:
  enabled: true
  target_tier: "GOLD"
  credit_quality_min_score: 75
  max_nature_based_pct: 40.0
  shift_to_removals_by_year: 2035
  preferred_registries:
    - "verra"
    - "gold_standard"
    - "american_carbon_registry"
  track_co_benefits: true
  evidence_auto_collection: true

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "REASONABLE"
  progression_year: 2027
  workpaper_format: "ISAE_3410"
  methodology_documentation: true
  calculation_trace: true
  data_lineage_maps: true
  control_evidence: true
  sha256_provenance: true
  assumption_register: true
  retention_years: 10

# --- Data Quality Targets ---
data_quality:
  target_dqis_score: 2.0
  acceptable_data_sources:
    - "primary_measured"
    - "default_factors"
    - "secondary_calculated"
  emission_factor_source: "IEA_NZE_2023"
  activity_data_collection_frequency: "monthly"

# --- Sector-Specific Parameters ---
sector_parameters:
  energy_efficiency_improvement_target_pct_annual: 2.5
  renewable_electricity_procurement_enabled: true
  steam_heat_efficiency_programs: true
  refrigerant_management_low_gwp_transition: true
  waste_reduction_circular_economy_focus: true
  supplier_carbon_intensity_benchmarking: true
  equipment_replacement_efficiency_requirement: true
  process_heating_fuel_switching_assessment: true
  sub_sector_sda_qualification_assessment: false
