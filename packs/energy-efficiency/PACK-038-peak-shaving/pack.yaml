# =============================================================================
# PACK-038: Peak Shaving Pack
# GreenLang Energy Efficiency Pack for Peak Demand Management
# =============================================================================
# This pack provides a comprehensive peak demand management solution
# covering load profile analysis, peak identification and attribution,
# demand charge decomposition, BESS sizing optimization, load shifting,
# coincident peak (CP) management, ratchet demand analysis, power factor
# correction, financial modeling, and M&V verification.
#
# Peak demand charges constitute 30-70% of commercial/industrial
# electricity bills. This pack enables facilities to analyze, predict,
# and reduce peak demand through battery storage, load shifting, CP
# management, and power factor correction -- delivering 10-40% demand
# charge reduction with rigorous financial justification.
#
# Key Capabilities:
#   - Load profile analysis (15-min interval data, duration curves,
#     day-type clustering, seasonal decomposition, anomaly detection)
#   - Peak identification (billing peaks, weather-correlated peaks,
#     equipment startup peaks, Monte Carlo simulation)
#   - Demand charge decomposition (flat/tiered/TOU/CP/ratchet/PF
#     penalty, marginal value of peak reduction)
#   - BESS sizing optimization (8,760-hour dispatch simulation,
#     calendar + cycle degradation, technology comparison, LCOS)
#   - Load shifting (pre-cooling/heating, production scheduling,
#     EV charging deferral, thermal storage dispatch)
#   - Coincident peak management (PJM 5CP, ERCOT 4CP, ISO-NE ICL,
#     NYISO ICAP, prediction and automated response)
#   - Ratchet demand analysis (12-month rolling, spike prevention,
#     financial impact, decay projection)
#   - Power factor correction (capacitor bank sizing, harmonic
#     analysis, PF penalty avoidance, infrastructure recovery)
#   - Financial modeling (NPV, IRR, LCOS, ITC, SGIP, MACRS,
#     revenue stacking, Monte Carlo risk analysis)
#   - M&V verification (IPMVP compliant, pre/post comparison,
#     weather-normalized savings, performance documentation)
#
# Regulatory References:
#   - FERC Order 2222 (DER aggregation in wholesale markets)
#   - IRS Section 48/48E (Investment Tax Credit for storage)
#   - California SGIP (Self-Generation Incentive Program)
#   - IEEE 1547-2018 (DER interconnection standard)
#   - NFPA 855 (Stationary energy storage installation)
#   - UL 9540/9540A (Energy storage safety)
#   - IEC 62933 (Electrical energy storage systems)
#   - ASHRAE 90.1 (Energy standard, demand management)
#   - ISO 50001:2018 (Energy management systems)
#   - IPMVP Core Concepts 2022 (M&V methodology)
#   - EU Energy Efficiency Directive (EU) 2023/1791
#   - GHG Protocol Scope 2 Guidance
#
# Facility Types Supported:
#   - Commercial offices (HVAC cooling peaks, plug loads, EV)
#   - Manufacturing (motor loads, production scheduling, compressed air)
#   - Retail/grocery (refrigeration, HVAC, food safety constraints)
#   - Warehouses/cold storage (thermal mass ride-through, HACCP)
#   - Healthcare (non-clinical loads only, safety-first approach)
#   - Data centers (cooling optimization, IT loads excluded)
#   - University campuses (multi-building, seasonal scheduling)
#   - Mixed-use portfolios (aggregate peak management, VPP)
#
# Version History:
#   1.0.0 - Initial release (2026-03-23)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-038-peak-shaving
  version: "1.0.0"
  display_name: "Peak Shaving Pack"
  description: >-
    GreenLang deployment pack for comprehensive peak demand management
    including load profile analysis with 15-minute interval data processing,
    peak identification and attribution, demand charge decomposition across
    flat/tiered/TOU/CP/ratchet/PF structures, BESS sizing optimization
    with 8,760-hour dispatch simulation and degradation modeling, load
    shifting optimization with constraint satisfaction, coincident peak
    management for PJM/ERCOT/ISO-NE/NYISO, ratchet demand analysis with
    prevention strategies, power factor correction and harmonic analysis,
    financial modeling with ITC/SGIP/MACRS incentive capture and revenue
    stacking, and IPMVP-compliant M&V verification.
  category: energy-efficiency
  tier: professional
  author: GreenLang Platform Team
  license: proprietary
  min_greenlang_version: "1.0.0"
  pack_id: "PACK-038"
  status: production_ready
