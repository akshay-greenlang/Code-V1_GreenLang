# =============================================================================
# PACK-038 Peak Shaving - Retail / Grocery Preset
# =============================================================================
# Retail stores and grocery facilities with refrigeration thermal mass
# management, anti-sweat heater scheduling, HVAC pre-cooling, and lighting
# reduction. Typical peak demand 200-800 kW. Peak drivers: refrigeration
# (45%), HVAC (30%), lighting (20%), cooking (5%). Target peak reduction:
# 10-20%. Food safety constraints are binding -- display case temperatures
# must not exceed +2C rise. Anti-sweat heaters are a significant shiftable
# load during peak windows.
#
# Typical use cases:
#   - Supermarkets and hypermarkets
#   - Convenience stores with walk-in coolers
#   - Speciality food retailers with display cases
#   - Wholesale clubs and warehouse retail
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "RETAIL_GROCERY"
country: "US"
reporting_year: 2026
operating_hours_per_year: 5000

# --- Interval Data ---
interval_data:
  interval_length: "15_MIN"
  minimum_data_coverage_pct: 90
  peak_window_start_hour: 12
  peak_window_end_hour: 18
  lookback_months: 12
  outlier_threshold_sigma: 3.0
  weather_normalization: true

# --- Peak Target ---
peak_target:
  target_reduction_pct: 15
  trigger_threshold_pct: 85
  summer_enhanced: true
  summer_extra_reduction_pct: 5
  min_sustained_minutes: 15

# --- Demand Charge ---
demand_charge:
  tariff_type: "DEMAND_CHARGE"
  on_peak_demand_charge_eur_per_kw: 14.00
  off_peak_demand_charge_eur_per_kw: 5.00
  on_peak_start_hour: 12
  on_peak_end_hour: 20
  critical_peak_pricing_enabled: false
  incentive_program: "PEAK_REDUCTION"

# --- BESS ---
bess:
  enabled: true
  capacity_kwh: 200
  max_discharge_kw: 100
  max_charge_kw: 50
  chemistry: "LFP"
  min_soc_pct: 10
  max_soc_pct: 95
  round_trip_efficiency: 0.92
  cycles_per_day_limit: 2
  degradation_tracking: true
  warranty_cycles: 6000
  reserve_for_backup_pct: 0

# --- Load Shift ---
load_shift:
  pre_cooling_enabled: true
  pre_cooling_duration_minutes: 60
  pre_cooling_setpoint_offset_c: -2.0
  coast_duration_minutes: 90
  max_temperature_rise_c: 2.0
  ev_charging_deferral: true
  production_batch_scheduling: false
  compressed_air_management: false
  thermal_mass_ride_through: true

# --- Coincident Peak ---
cp:
  enabled: false
  methodology: "PJM_5CP"
  cp_season_start_month: 6
  cp_season_end_month: 9
  target_reduction_during_cp_pct: 15
  max_cp_events_per_season: 10

# --- Ratchet ---
ratchet:
  enabled: true
  ratchet_type: "ANNUAL"
  ratchet_percentage: 75
  ratchet_lookback_months: 12

# --- Power Factor ---
power_factor:
  enabled: true
  current_power_factor: 0.88
  target_power_factor: 0.95
  utility_penalty_threshold: 0.90
  correction_type: "CAPACITOR_BANK"
  kva_demand_billing: false

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.12
  demand_charge_eur_per_kw: 14.00
  ratchet_demand_charge_eur_per_kw: 11.00
  bess_capex_eur_per_kwh: 350
  bess_annual_opex_pct: 2.0
  discount_rate: 0.08
  analysis_period_years: 10
  energy_price_escalation_pct: 3.0
  demand_charge_escalation_pct: 2.0
  include_incentives: true

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  marginal_emission_factor_kgco2_per_kwh: 0.65
  carbon_price_eur_per_tco2: 85.0
  sbti_alignment_tracking: false
  peak_hour_premium_factor: 1.3

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
  executive_summary: true
  peak_event_log: true
  bess_performance_report: true
  ratchet_exposure_report: true

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
  warning_threshold_pct: 80
  critical_threshold_pct: 90
  escalation_minutes: 10
  suppression_window_minutes: 30

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 5
