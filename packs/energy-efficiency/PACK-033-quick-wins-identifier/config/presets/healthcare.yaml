# =============================================================================
# PACK-033 Quick Wins Identifier - Healthcare Preset
# =============================================================================
# Hospital and clinic environment with focus on HVAC optimization,
# lighting in non-clinical areas, water heating, and BMS scheduling.
# EUI benchmark: 300-700 kWh/m2/yr. Key opportunities: LED in corridors
# and car parks, HVAC setback in unoccupied areas, BMS optimization,
# hot water temperature reduction, chiller sequencing.
#
# Typical use cases:
#   - Acute hospitals and teaching hospitals
#   - Private clinics and day surgery centres
#   - Residential care homes and nursing facilities
#   - Community health centres
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "HEALTHCARE"
country: "DE"
reporting_year: 2026
operating_hours_per_year: 8760

# --- Scan ---
scan:
  depth: "STANDARD"
  categories:
    - "HVAC"
    - "LIGHTING"
    - "WATER_HEATING"
    - "CONTROLS_SCHEDULING"
    - "BUILDING_ENVELOPE"
    - "PLUG_LOADS"
    - "BEHAVIORAL"
  max_measures_per_category: 8
  include_no_cost_measures: true
  include_low_cost_measures: true
  include_medium_cost_measures: true
  max_payback_years: 3.0
  minimum_annual_savings_eur: 500.0
  utility_bill_months: 24
  walkthrough_checklist: true

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.26
  gas_rate_eur_per_kwh: 0.09
  discount_rate: 0.06
  analysis_period_years: 15
  energy_price_escalation_pct: 3.5

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  gas_emission_factor_kgco2_per_kwh: 0.20
  carbon_price_eur_per_tco2: 85.0

# --- Prioritization ---
prioritization:
  profile: "BALANCED"
  weight_financial_savings: 0.25
  weight_payback_period: 0.20
  weight_carbon_reduction: 0.25
  weight_implementation_ease: 0.20
  weight_co_benefits: 0.10
  top_n_recommendations: 10

# --- Behavioural ---
behavioral:
  enabled: true
  awareness_campaign: true
  switch_off_programme: true
  thermostat_discipline: false
  energy_champion_network: true
  estimated_savings_pct: 3.0

# --- Rebate ---
rebate:
  enabled: true
  country: "DE"
  include_federal_programmes: true
  include_eu_programmes: true
  include_utility_rebates: true

# --- Reporting ---
reporting:
  frequency: "QUARTERLY"
  formats:
    - "MARKDOWN"
    - "HTML"
  executive_summary: true
  detailed_measure_cards: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 7
