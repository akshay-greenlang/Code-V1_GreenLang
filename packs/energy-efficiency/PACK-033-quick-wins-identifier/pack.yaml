  regulation:
    primary:
      name: "EU Energy Efficiency Directive (EED)"
      reference: "Directive (EU) 2023/1791"
      effective_date: "2023-10-10"
      description: >-
        The recast EED mandates energy audits for large enterprises and
        requires identification of cost-effective energy savings measures.
        Quick wins identified by this pack directly support EED Article 8
        compliance by demonstrating proactive energy efficiency improvement.
        The directive's energy efficiency first principle prioritises
        demand-side measures -- exactly the type of measures this pack
        identifies and tracks.
    secondary:
      - name: "ISO 50001:2018 Energy Management Systems"
        reference: "ISO 50001:2018"
        effective_date: "2018-08-21"
      - name: "ASHRAE Guideline 14 - Measurement of Energy Savings"
        reference: "ASHRAE 14-2014"
        effective_date: "2014-01-01"
      - name: "IPMVP Core Concepts"
        reference: "IPMVP 2022"
        effective_date: "2022-01-01"
      - name: "GHG Protocol Corporate Standard"
        reference: "GHG Protocol (revised 2015)"
        effective_date: "2015-01-01"
      - name: "SBTi Corporate Net-Zero Standard"
        reference: "SBTi v1.1"
        effective_date: "2023-01-01"
      - name: "EN 16247-1:2022 Energy Audits - General Requirements"
        reference: "EN 16247-1:2022"
        effective_date: "2022-07-01"

  compliance_references:
    - id: "EED"
      name: "EU Energy Efficiency Directive (recast)"
      regulation: "Directive (EU) 2023/1791"
      effective_date: "2023-10-10"
      description: >-
        Quick wins identification supports EED Article 8 compliance by
        demonstrating proactive energy efficiency assessment and measure
        implementation. The EED requires enterprises to identify and
        implement cost-effective energy efficiency measures. This pack
        automates the identification, financial analysis, and tracking
        of such measures across all facility types.

    - id: "ISO_50001"
      name: "ISO 50001:2018 Energy Management Systems"
      regulation: "ISO 50001:2018"
      effective_date: "2018-08-21"
      description: >-
        ISO 50001 requires continual improvement of energy performance.
        Quick wins serve as early wins in the Plan-Do-Check-Act cycle,
        providing measurable EnPI improvement evidence for management
        review and certification audits. The action plan tracking and
        savings verification features directly support ISO 50001 Clause
        6.2 (objectives and action plans) and Clause 9.1 (monitoring,
        measurement, analysis, and evaluation).

    - id: "ASHRAE_14"
      name: "ASHRAE Guideline 14 - Measurement of Energy Savings"
      regulation: "ASHRAE 14-2014"
      effective_date: "2014-01-01"
      description: >-
        ASHRAE Guideline 14 provides methodology for measuring energy
        savings from efficiency measures. This pack uses ASHRAE 14
        methods for pre/post comparison, weather normalisation, and
        uncertainty quantification when verifying savings from
        implemented quick wins.

    - id: "IPMVP"
      name: "International Performance Measurement and Verification Protocol"
      regulation: "IPMVP Core Concepts 2022"
      effective_date: "2022-01-01"
      description: >-
        IPMVP provides the framework for savings verification. Quick
        wins typically use Option A (retrofit isolation with key
        parameter measurement) for equipment-level measures or Option C
        (whole facility) for multiple interactive measures. The pack
        automates M&V plan creation and savings calculations per IPMVP.

    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol (revised 2015)"
      effective_date: "2015-01-01"
      description: >-
        The GHG Protocol provides the accounting framework for
        quantifying carbon reductions from energy efficiency measures.
        This pack calculates tCO2e savings for each quick win using
        Scope 1 (direct combustion) and Scope 2 (purchased electricity)
        emission factors, supporting both location-based and market-
        based accounting methods.

    - id: "SBTi"
      name: "Science Based Targets initiative"
      regulation: "SBTi Corporate Net-Zero Standard v1.1"
      effective_date: "2023-01-01"
      description: >-
        SBTi requires companies to set science-based emission reduction
        targets. Energy efficiency quick wins are a primary lever for
        achieving near-term targets (5-10 year horizon). This pack
        tracks carbon savings against SBTi reduction pathways and
        calculates the contribution of quick wins to overall target
        achievement.

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines (8 quick wins engines)
  # ===========================================================================
  engines:
    - id: facility_scanner
      name: "Facility Energy Scanner Engine"
      description: >-
        Performs systematic facility energy scanning at three depth levels.
        QUICK scan (30-60 min): utility bill analysis for 12-36 months,
        energy use intensity (EUI) benchmarking against CIBSE TM46, ENERGY
        STAR, or DIN V 18599 targets, identification of top consumption
        categories from billing data, and generation of pre-populated
        walkthrough checklist. STANDARD scan (2-4 hrs): area-by-area
        walkthrough with spot measurements (lux levels, temperature,
        airflow), equipment inventory for major consumers, operating hours
        assessment, and occupancy pattern analysis. COMPREHENSIVE scan
        (1-2 days): short-term data logging (power, temperature, flow),
        sub-meter analysis where available, thermal imaging survey, and
        detailed equipment nameplate data collection. All scan levels
        generate a prioritised opportunity register for further analysis
        by the quick wins identification engine.
        Zero-hallucination: EUI calculations from metered data, benchmarks
        from published standards, no LLM in any calculation path.
      class: "FacilityScannerEngine"
      file: "engines/facility_scanner.py"
      required: true

    - id: quick_wins_identifier
      name: "Quick Wins Identification Engine"
      description: >-
        Identifies applicable quick win measures from a library of 200+
        pre-defined measures across 12 action categories: LIGHTING (LED
        retrofit, occupancy sensors, daylight dimming, task lighting,
        delamping, cleaning), HVAC (setpoint adjustment, scheduling,
        economiser enabling, filter maintenance, destratification, VSD),
        PLUG_LOADS (timer strips, power management, vending machine
        controls, copier sleep mode), CONTROLS_SCHEDULING (BMS
        optimisation, time clock review, holiday scheduling, night
        setback), MOTORS_DRIVES (belt tensioning, alignment, VSD,
        right-sizing), COMPRESSED_AIR (leak repair, pressure reduction,
        blow-off optimisation, idle shutdown), REFRIGERATION (night
        curtains, anti-sweat controls, condenser cleaning, door seals),
        WATER_HEATING (temperature reduction, insulation, timer control,
        flow restrictors), BUILDING_ENVELOPE (draught proofing, door
        closers, dock seals, pipe insulation), BEHAVIORAL (switch-off
        campaigns, thermostat discipline, awareness signage), IT_EQUIPMENT
        (server decommissioning, virtualisation, power management),
        PROCESS_OPTIMIZATION (idle shutdown, batch scheduling, setpoint
        review). Each measure includes estimated savings formula,
        typical implementation cost range, and complexity rating.
        Zero-hallucination: savings from engineering formulas and
        published benchmarks, no LLM in quantification path.
      class: "QuickWinsIdentifierEngine"
      file: "engines/quick_wins_identifier.py"
      required: true

    - id: financial_analyzer
      name: "Financial Analysis Engine"
      description: >-
        Performs comprehensive financial analysis for each identified
        measure. Calculates simple payback period (implementation cost
        divided by annual savings), net present value (NPV) using
        discounted cash flow over the analysis period with configurable
        discount rate, internal rate of return (IRR), savings-to-
        investment ratio (SIR), and lifecycle cost including maintenance
        impact and equipment replacement cycles. Supports energy price
        escalation modelling with configurable annual escalation rate.
        Handles multi-currency conversion for international portfolios.
        Generates cumulative savings curves showing break-even point
        and total benefit over analysis period. Supports sensitivity
        analysis varying discount rate, energy prices, and measure
        costs to show impact on payback and NPV.
        Zero-hallucination: all financial calculations from standard DCF
        formulas, energy cost from tariff data, no LLM.
      class: "FinancialAnalyzerEngine"
      file: "engines/financial_analyzer.py"
      required: true

    - id: carbon_impact
      name: "Carbon Impact Assessment Engine"
      description: >-
        Calculates carbon reduction (tCO2e) for each identified measure.
        Uses Scope 1 emission factors for natural gas, fuel oil, and LPG
        savings (per GHG Protocol). Uses Scope 2 emission factors for
        electricity savings with both location-based (grid average) and
        market-based (supplier-specific, RECs, green tariffs) accounting.
        Emission factors sourced from national grid databases (DEFRA, UBA,
        EPA eGRID, IEA), updated annually. Calculates marginal abatement
        cost (EUR per tCO2e avoided) for each measure. Generates carbon
        abatement cost curve (MACC) ranking measures from negative-cost
        (net savings) through to positive-cost. Tracks cumulative carbon
        savings against SBTi reduction pathway when enabled. Monetises
        carbon savings using configurable carbon price (default: EU ETS
        price) for total benefit calculation.
        Zero-hallucination: emission factors from published databases,
        carbon calculations from GHG Protocol formulas, no LLM.
      class: "CarbonImpactEngine"
      file: "engines/carbon_impact.py"
      required: true

    - id: prioritization
      name: "Measure Prioritization Engine"
      description: >-
        Ranks identified measures using a weighted composite scoring
        methodology. Five scoring dimensions: financial savings (annual
        EUR saved), payback period (years to break even, shorter scores
        higher), carbon reduction (tCO2e per year), implementation ease
        (no-cost > low-cost > medium-cost > capital), and co-benefits
        (comfort improvement, maintenance reduction, safety, aesthetics,
        productivity). Five priority profiles available: COST_FOCUSED
        (minimise upfront spend), SAVINGS_FOCUSED (maximise annual
        savings), BALANCED (equal weighting), CARBON_FOCUSED (maximise
        tCO2e reduction), QUICK_IMPLEMENTATION (measures achievable
        within 30 days). Generates ranked recommendation list with
        top-N selection and category grouping. Creates phased
        implementation roadmap: immediate (no-cost, this week),
        short-term (low-cost, 1-3 months), medium-term (requires
        procurement, 3-12 months).
        Zero-hallucination: scoring from weighted arithmetic, no LLM.
      class: "PrioritizationEngine"
      file: "engines/prioritization.py"
      required: true

    - id: behavioral_programme
      name: "Behavioural Programme Engine"
      description: >-
        Designs and tracks behavioural energy efficiency programmes.
        Generates customised awareness campaign materials (posters,
        email templates, intranet content) based on facility type and
        identified quick wins. Creates switch-off checklists for end-
        of-day and holiday shutdown procedures. Designs thermostat
        discipline guidelines with recommended setpoints by zone type.
        Supports energy champion network creation with role definitions,
        floor assignments, and reporting structures. Provides gamification
        framework with inter-departmental energy reduction competitions,
        league tables, and reward structures. Estimates behavioural
        savings at 3-8% of total consumption based on facility type and
        programme intensity. Tracks programme engagement metrics
        (participation rate, feedback scores, suggestion count).
        Zero-hallucination: savings estimates from published behavioural
        programme benchmarks, no LLM in percentage calculations.
      class: "BehavioralProgrammeEngine"
      file: "engines/behavioral_programme.py"
      required: false

    - id: rebate_matcher
      name: "Rebate and Incentive Matcher Engine"
      description: >-
        Matches identified quick win measures to applicable rebate and
        incentive programmes. Maintains a database of utility rebates,
        federal/national grants, state/regional incentives, and EU
        funding programmes (LIFE, Horizon Europe, Innovation Fund).
        Supports country-specific programmes: Germany (BAFA energy
        efficiency grants, KfW energy efficiency loans), UK (Enhanced
        Capital Allowances, Salix Finance), France (CEE certificates),
        and other EU member states. Calculates net implementation cost
        after rebate application and adjusted payback period. Tracks
        application deadlines and eligibility criteria. Generates
        rebate application support documents with measure specifications
        and savings calculations in the format required by each
        programme.
        Zero-hallucination: rebate values from published programme data,
        eligibility from programme criteria, no LLM.
      class: "RebateMatcherEngine"
      file: "engines/rebate_matcher.py"
      required: false

    - id: savings_verifier
      name: "Savings Verification Engine"
      description: >-
        Verifies energy savings from implemented quick win measures using
        IPMVP and ASHRAE Guideline 14 methods. Supports two primary M&V
        approaches for quick wins: Option A (retrofit isolation with key
        parameter measurement) for equipment-level measures like LED
        retrofit, VSD installation, and motor replacement; and Option C
        (whole facility measurement) for multiple interactive measures
        implemented simultaneously. Performs pre/post energy comparison
        with weather normalisation using degree-day regression. Calculates
        actual savings with uncertainty bounds using t-statistic confidence
        intervals. Tracks savings persistence over time to detect
        degradation or rebound effects. Generates savings verification
        reports suitable for ISO 50001 management review evidence,
        utility rebate post-verification, and internal reporting.
        Zero-hallucination: savings from metered data comparison,
        regression from scipy, uncertainty from ASHRAE 14 methods, no LLM.
      class: "SavingsVerifierEngine"
      file: "engines/savings_verifier.py"
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (6 quick wins workflows)
  # ===========================================================================
  workflows:
    - id: quick_scan
      name: "Quick Scan Workflow"
      description: >-
        3-phase workflow for rapid facility assessment: Phase 1 - Utility
        Bill Analysis (collect 12-24 months of utility bills, calculate
        EUI benchmark, identify consumption patterns, seasonal variation,
        and cost breakdown by fuel type) -> Phase 2 - Walkthrough Scan
        (generate pre-populated checklist by facility type, systematic
        area-by-area walk through with observation recording, photograph
        documentation, and spot measurements) -> Phase 3 - Quick Wins
        Report (identify top 5-10 quick win measures, calculate savings
        and payback for each, generate executive summary with
        implementation priority list).
      schedule: "on_demand"
      estimated_duration_minutes: 120
      phases: 3

    - id: comprehensive_assessment
      name: "Comprehensive Assessment Workflow"
      description: >-
        5-phase workflow for detailed quick wins assessment: Phase 1 -
        Data Collection (utility bills, sub-meter data, equipment
        inventory, operating schedules, maintenance records, BMS trend
        data) -> Phase 2 - Facility Scanning (comprehensive area-by-area
        scan with data logging, thermal imaging, and power monitoring) ->
        Phase 3 - Measure Identification (run all 12 action categories,
        calculate savings for each measure, assess implementation cost
        and complexity) -> Phase 4 - Financial and Carbon Analysis (NPV,
        IRR, payback, lifecycle cost, tCO2e reduction, MACC curve,
        rebate matching) -> Phase 5 - Prioritised Report (ranked
        recommendation list, phased implementation roadmap, behavioural
        programme design, executive summary with business case).
      schedule: "annual"
      estimated_duration_minutes: 480
      phases: 5

    - id: implementation_tracking
      name: "Implementation Tracking Workflow"
      description: >-
        3-phase workflow for tracking quick win implementation: Phase 1 -
        Status Update (collect implementation status for each approved
        measure, update completion percentage, record actual costs and
        any scope changes) -> Phase 2 - Progress Reporting (generate
        implementation dashboard with Gantt chart, budget vs. actual
        comparison, measures at risk identification, next actions
        required) -> Phase 3 - Savings Forecast Update (recalculate
        expected annual savings based on implemented and remaining
        measures, update cumulative savings curve, flag overdue measures).
      schedule: "monthly"
      estimated_duration_minutes: 30
      phases: 3

    - id: savings_verification
      name: "Savings Verification Workflow"
      description: >-
        4-phase workflow for post-implementation savings verification:
        Phase 1 - M&V Plan (select IPMVP option per measure type,
        define measurement boundary, document baseline) -> Phase 2 -
        Data Collection (collect pre and post energy data, weather data
        for normalisation, production data for adjustment) -> Phase 3 -
        Savings Calculation (normalised comparison, actual savings
        quantification, uncertainty analysis, persistence check) ->
        Phase 4 - Verification Report (actual vs. estimated savings
        comparison, lessons learned, recommendations for next cycle).
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 4

    - id: portfolio_rollout
      name: "Portfolio Rollout Workflow"
      description: >-
        4-phase workflow for rolling out quick wins across a portfolio of
        facilities: Phase 1 - Portfolio Prioritisation (rank facilities
        by savings potential, EUI gap to benchmark, and implementation
        readiness) -> Phase 2 - Template Scan (run standardised quick
        scan across facility portfolio using facility-type presets) ->
        Phase 3 - Portfolio Report (aggregate savings opportunity across
        portfolio, identify common measures applicable to multiple sites,
        calculate portfolio-level NPV and carbon reduction) -> Phase 4 -
        Rollout Plan (phased implementation schedule across sites,
        procurement consolidation for common measures, resource
        allocation planning).
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 4

    - id: behavioural_programme
      name: "Behavioural Programme Workflow"
      description: >-
        3-phase workflow for behavioural energy efficiency programmes:
        Phase 1 - Programme Design (select programme elements: awareness
        campaign, switch-off policy, thermostat discipline, energy
        champions, gamification; generate customised materials) ->
        Phase 2 - Programme Launch (distribute materials, brief energy
        champions, set up tracking metrics, establish baseline
        consumption for programme area) -> Phase 3 - Programme
        Monitoring (track engagement metrics, measure consumption
        changes vs. baseline, generate monthly progress reports,
        refresh materials and communications quarterly).
      schedule: "quarterly"
      estimated_duration_minutes: 60
      phases: 3

  # ===========================================================================
  # Templates - Pre-built report and output templates (8 quick wins templates)
  # ===========================================================================
  templates:
    - id: quick_wins_report
      display_name: "Quick Wins Summary Report"
      description: >-
        Executive summary report with top-ranked quick win measures,
        total savings potential (financial and carbon), implementation
        priority matrix, and recommended next steps. Designed for
        facility managers and senior leadership with clear call to
        action and business case summary.
      format: "html"
      template_file: "templates/quick_wins_report.jinja2"
      enabled: true

    - id: measure_cards
      display_name: "Detailed Measure Cards"
      description: >-
        Individual measure cards for each identified quick win with
        description, savings calculation methodology, implementation
        steps, estimated cost, payback period, carbon reduction,
        co-benefits, applicable rebates, and photo documentation
        placeholders. Suitable for implementation team briefing.
      format: "html"
      template_file: "templates/measure_cards.jinja2"
      enabled: true

    - id: financial_summary
      display_name: "Financial Analysis Summary"
      description: >-
        Financial analysis report with NPV, IRR, payback, and lifecycle
        cost for all identified measures. Includes cumulative savings
        curve, sensitivity analysis charts, and investment business
        case for budget approval. Suitable for finance department
        review and capital expenditure request.
      format: "html"
      template_file: "templates/financial_summary.jinja2"
      enabled: true

    - id: carbon_impact_report
      display_name: "Carbon Impact Report"
      description: >-
        Carbon impact assessment with tCO2e reduction per measure,
        marginal abatement cost curve (MACC), Scope 1 and Scope 2
        breakdown, and SBTi pathway contribution. Includes carbon
        price monetisation and total carbon benefit valuation.
      format: "html"
      template_file: "templates/carbon_impact_report.jinja2"
      enabled: true

    - id: implementation_dashboard
      display_name: "Implementation Tracking Dashboard"
      description: >-
        Interactive dashboard template with implementation status for
        all approved measures, Gantt chart timeline, budget tracking,
        completion percentage, and overdue measure alerts. Updates
        automatically with each tracking workflow run.
      format: "html"
      template_file: "templates/implementation_dashboard.jinja2"
      enabled: true

    - id: savings_verification_report
      display_name: "Savings Verification Report"
      description: >-
        IPMVP-compliant savings verification report with pre/post
        comparison, weather-normalised savings calculation, uncertainty
        bounds, actual vs. estimated comparison, and persistence
        monitoring results. Suitable for utility rebate verification
        and ISO 50001 management review evidence.
      format: "html"
      template_file: "templates/savings_verification_report.jinja2"
      enabled: true

    - id: walkthrough_checklist
      display_name: "Walkthrough Checklist"
      description: >-
        Pre-populated walkthrough checklist customised by facility type
        with observation fields, photo capture prompts, spot measurement
        recording, and initial savings estimate entry. Designed for
        tablet or printed use during on-site scanning.
      format: "html"
      template_file: "templates/walkthrough_checklist.jinja2"
      enabled: true

    - id: behavioural_campaign
      display_name: "Behavioural Campaign Materials"
      description: >-
        Template package for behavioural energy awareness campaigns
        including poster designs, email templates, intranet content,
        switch-off checklists, thermostat guidance, and energy champion
        briefing materials. Customised to facility type and identified
        quick wins.
      format: "html"
      template_file: "templates/behavioural_campaign.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (11 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        8-phase master pipeline: Health Check -> Configuration and Preset
        Loading -> Data Acquisition (utility bills, meter data, equipment
        inventory) -> Facility Scanning (EUI benchmark, walkthrough) ->
        Quick Wins Identification (all action categories) -> Financial
        and Carbon Analysis (NPV, payback, tCO2e, MACC) -> Prioritisation
        and Ranking (composite score, implementation roadmap) -> Report
        Generation (executive summary, measure cards, dashboard).
        Orchestrates all engines with parallel execution where possible
        (e.g., financial and carbon analysis run in parallel) and
        dependency management (scanning must complete before
        identification).
      required: true

    - id: utility_bill_bridge
      name: "Utility Bill Integration Bridge"
      description: >-
        Connects to utility data sources for automated bill retrieval
        and analysis. Supports manual CSV/Excel upload of billing data,
        API integration with utility provider platforms, and OCR
        extraction from scanned invoices via AGENT-DATA-001. Normalises
        billing periods, handles estimated vs. actual readings, and
        calculates annualised consumption with weather normalisation.
      required: true

    - id: bms_bridge
      name: "BMS Integration Bridge"
      description: >-
        Connects to Building Management Systems for HVAC scheduling
        data, zone temperature trends, lighting control status, and
        equipment run-time data. Supports BACnet/IP, Modbus, and LON
        protocols. Extracts current setpoints, schedules, and alarm
        history to identify scheduling optimisation quick wins.
      required: false

    - id: meter_data_bridge
      name: "Meter Data Integration Bridge"
      description: >-
        Connects to smart metering infrastructure for sub-meter data
        supporting detailed savings analysis and verification. Supports
        half-hourly and 15-minute interval data. Handles meter hierarchy
        for consumption disaggregation by end use (lighting, HVAC,
        plug loads, process).
      required: false

    - id: mrv_bridge
      name: "MRV Agent Bridge"
      description: >-
        Routes data from AGENT-MRV agents for carbon impact calculations.
        Prioritises AGENT-MRV-001 (stationary combustion for heating),
        AGENT-MRV-009/010 (Scope 2 electricity), and AGENT-MRV-013
        (dual reporting reconciliation). Maps energy savings to
        emission reductions using consistent emission factors.
      required: true

    - id: data_bridge
      name: "Data Agent Bridge"
      description: >-
        Connects to AGENT-DATA agents for data intake. Routes utility
        invoices through AGENT-DATA-001 (PDF extraction), meter data
        through AGENT-DATA-002 (Excel/CSV normalization), and applies
        data quality profiling through AGENT-DATA-010 and outlier
        detection through AGENT-DATA-013.
      required: true

    - id: pack031_bridge
      name: "PACK-031 Industrial Energy Audit Bridge"
      description: >-
        Bridges to PACK-031 for deeper analysis of manufacturing and
        industrial quick wins. Escalates compressed air, motor system,
        and process optimisation measures to PACK-031 engines for
        detailed engineering analysis when COMPREHENSIVE scan depth
        identifies measures requiring investment-grade assessment.
      required: false

    - id: pack032_bridge
      name: "PACK-032 Building Energy Assessment Bridge"
      description: >-
        Bridges to PACK-032 for deeper analysis of building-related
        quick wins. Escalates HVAC, lighting, and building envelope
        measures to PACK-032 engines for detailed building energy
        modelling when measures require DEC/EPC assessment or
        building simulation.
      required: false

    - id: rebate_database_bridge
      name: "Rebate Database Bridge"
      description: >-
        Connects to rebate and incentive programme databases for
        measure matching. Integrates with national programme databases
        (BAFA, Salix, ADEME), utility provider rebate APIs, and the
        EU funding programme portal. Updates programme eligibility
        criteria and available values on a monthly cycle.
      required: false

    - id: health_check
      name: "Health Check"
      description: >-
        12-category system verification covering all 8 engines,
        measure library completeness, rebate database freshness,
        emission factor currency, database connectivity, agent
        dependency status, preset validation, template integrity,
        and deployment readiness.
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        6-step guided configuration wizard: Facility Type Selection
        (office / manufacturing / retail / warehouse / healthcare /
        education / data_center / sme) -> Facility Registration
        (location, floor area, occupancy, operating hours) -> Energy
        Data Import (utility bills upload or API connection) ->
        Scan Scope Configuration (categories, depth, payback threshold)
        -> Financial Parameters (tariffs, discount rate, currency) ->
        Reporting Preferences (format, frequency, language).
      required: false

  # ===========================================================================
  # Presets - Facility-type specific configurations (8 presets)
  # ===========================================================================
  presets:
    - id: office_building
      name: "Office Building Preset"
      description: >-
        Configuration for office buildings with focus on lighting, HVAC
        scheduling, plug load management, IT power management, and
        behavioural programmes. Typical EUI 150-300 kWh/m2/yr. Savings
        potential 15-30%. Priority categories: lighting (LED retrofit,
        occupancy sensors), HVAC (setpoint optimisation, scheduling),
        plug loads (timer strips, power management), behavioural
        (switch-off campaigns, thermostat discipline).
      facility_type: "OFFICE"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - behavioral_programme
        - rebate_matcher
        - savings_verifier
      file: "config/presets/office_building.yaml"

    - id: manufacturing
      name: "Manufacturing Preset"
      description: >-
        Configuration for manufacturing facilities with focus on motors,
        compressed air, process optimisation, and lighting. Typical EUI
        200-1000 kWh/m2/yr. Savings potential 10-25%. Priority
        categories: compressed air (leak repair, pressure reduction),
        motors (belt tensioning, VSD, right-sizing), process (idle
        shutdown, batch scheduling), lighting (high-bay LED).
      facility_type: "MANUFACTURING"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - rebate_matcher
        - savings_verifier
      file: "config/presets/manufacturing.yaml"

    - id: retail_store
      name: "Retail Store Preset"
      description: >-
        Configuration for retail environments with focus on lighting,
        HVAC aligned to trading hours, refrigeration, and signage
        controls. Typical EUI 200-500 kWh/m2/yr. Savings potential
        15-35%. Priority categories: lighting (display LED, accent
        lighting), HVAC (trading hours scheduling), refrigeration
        (night curtains, anti-sweat controls), controls (signage timers).
      facility_type: "RETAIL"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - rebate_matcher
        - savings_verifier
      file: "config/presets/retail_store.yaml"

    - id: warehouse
      name: "Warehouse Preset"
      description: >-
        Configuration for warehouses and distribution centres with focus
        on high-bay lighting, HVAC, dock door management, and MHE
        charging. Typical EUI 50-200 kWh/m2/yr. Savings potential
        15-30%. Priority categories: lighting (high-bay LED, occupancy
        sensors), HVAC (destratification, dock seals), motors (conveyor
        idle mode), building envelope (dock seals, insulation).
      facility_type: "WAREHOUSE"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - rebate_matcher
        - savings_verifier
      file: "config/presets/warehouse.yaml"

    - id: healthcare
      name: "Healthcare Preset"
      description: >-
        Configuration for hospitals and clinics with focus on HVAC
        optimisation (24/7 operation), lighting in non-clinical areas,
        water heating, and BMS scheduling. Typical EUI 300-700
        kWh/m2/yr. Savings potential 10-20%. Implementation ease is
        weighted higher due to clinical constraints and safety
        requirements.
      facility_type: "HEALTHCARE"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - behavioral_programme
        - rebate_matcher
        - savings_verifier
      file: "config/presets/healthcare.yaml"

    - id: education
      name: "Education Preset"
      description: >-
        Configuration for schools and universities with focus on HVAC
        scheduling aligned to timetable, lighting, IT shutdown during
        holidays, and behavioural awareness programmes. Typical EUI
        100-350 kWh/m2/yr. Savings potential 15-30%. Behavioural
        programmes are critical with gamification and energy champion
        networks for student and staff engagement.
      facility_type: "EDUCATION"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - behavioral_programme
        - rebate_matcher
        - savings_verifier
      file: "config/presets/education.yaml"

    - id: data_center
      name: "Data Center Preset"
      description: >-
        Configuration for data centres with focus on cooling optimisation,
        airflow management, UPS efficiency, and IT load management.
        Typical EUI 1000-5000 kWh/m2/yr. Savings potential 10-25%.
        Priority categories: HVAC (free cooling setpoint, containment),
        IT (idle server decommission, blanking panels), controls (UPS
        eco-mode, temperature setpoint raise).
      facility_type: "DATA_CENTER"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - rebate_matcher
        - savings_verifier
      file: "config/presets/data_center.yaml"

    - id: sme_simplified
      name: "SME Simplified Preset"
      description: >-
        Simplified configuration for small and medium enterprises.
        Quick scan depth with focus on top 5 measures with shortest
        payback. No sub-metering required -- utility bills only.
        Priority profile set to QUICK_IMPLEMENTATION for measures
        achievable within 30 days. Behavioural programme included
        for maximum impact with minimum investment.
      facility_type: "SME"
      enabled_engines:
        - facility_scanner
        - quick_wins_identifier
        - financial_analyzer
        - carbon_impact
        - prioritization
        - behavioral_programme
      file: "config/presets/sme_simplified.yaml"

# =============================================================================
# Agent Dependencies
# =============================================================================

# ---------------------------------------------------------------------------
# MRV Agents - Energy-related MRV agents for carbon impact calculations
# ---------------------------------------------------------------------------
agents_mrv:
  scope_1:
    - id: AGENT-MRV-001
      name: "Stationary Combustion Agent"
      description: "Calculates emissions from heating systems (boilers, furnaces, unit heaters)"
      path: "greenlang/agents/mrv/stationary_combustion/"
      required: true
      version: "1.0.0"
  scope_2:
    - id: AGENT-MRV-009
      name: "Scope 2 Location-Based Agent"
      description: "Calculates location-based electricity emissions for quick win savings"
      path: "greenlang/agents/mrv/scope2_location_based/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-010
      name: "Scope 2 Market-Based Agent"
      description: "Calculates market-based electricity emissions (PPAs, GOs, RECs)"
      path: "greenlang/agents/mrv/scope2_market_based/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-013
      name: "Dual Reporting Reconciliation"
      description: "Reconciles location-based and market-based Scope 2 accounting"
      path: "greenlang/agents/mrv/dual_reporting_reconciliation/"
      required: true
      version: "1.0.0"

# ---------------------------------------------------------------------------
# Data Agents - Supporting data intake and quality agents
# ---------------------------------------------------------------------------
agents_data:
  - id: AGENT-DATA-001
    name: "PDF & Invoice Extractor"
    description: "Extracts energy data from utility bills and vendor invoices"
    required: true
  - id: AGENT-DATA-002
    name: "Excel/CSV Normalizer"
    description: "Normalises meter data exports and equipment inventories"
    required: true
  - id: AGENT-DATA-003
    name: "ERP/Finance Connector"
    description: "Connects to finance systems for energy cost data"
    required: false
  - id: AGENT-DATA-004
    name: "API Gateway Agent"
    description: "Routes external API connections for emission factors and benchmarks"
    required: true
  - id: AGENT-DATA-010
    name: "Data Quality Profiler"
    description: "Profiles data quality across utility bills and meter data"
    required: true
  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous energy consumption readings"
    required: true
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from utility bills through to savings reports"
    required: true

# ---------------------------------------------------------------------------
# Foundation Agents - Core platform agents
# ---------------------------------------------------------------------------
agents_foundation:
