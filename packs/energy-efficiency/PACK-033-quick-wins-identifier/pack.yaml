# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  facility_scanning:
    max_facilities: 500
    target_duration_per_facility_minutes: 5
    utility_bill_processing_per_bill_ms: 200
    eui_benchmark_calc_ms: 50
  measure_identification:
    max_measures_per_facility: 200
    savings_calculation_per_measure_ms: 100
    target_duration_minutes: 10
  financial_analysis:
    npv_irr_calc_per_measure_ms: 50
    sensitivity_analysis_per_measure_ms: 200
    target_duration_minutes: 5
  carbon_analysis:
    emission_calc_per_measure_ms: 30
    macc_generation_ms: 500
    target_duration_minutes: 3
  prioritization:
    scoring_per_measure_ms: 20
    ranking_per_portfolio_ms: 200
    target_duration_minutes: 2
  savings_verification:
    regression_per_meter_ms: 200
    pre_post_comparison_per_measure_ms: 100
    target_duration_minutes: 10
  cache_hit_ratio_target: 0.80
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
  required_roles:
    - energy_manager
    - facility_manager
    - sustainability_officer
    - engineer
    - viewer
    - admin
  audit_events:
    - "quick_wins.scan.started"
    - "quick_wins.scan.completed"
    - "quick_wins.measure.identified"
    - "quick_wins.measure.approved"
    - "quick_wins.measure.implemented"
    - "quick_wins.measure.verified"
    - "quick_wins.report.generated"
    - "quick_wins.report.exported"
    - "quick_wins.config.modified"
    - "quick_wins.preset.loaded"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_utility_bills.json"
    - "tests/fixtures/sample_equipment_inventory.json"
    - "tests/fixtures/sample_measure_library.json"

