# =============================================================================
# PACK-033: Quick Wins Identifier Pack
# GreenLang Energy Efficiency Pack for Quick Win Energy Savings Identification
# =============================================================================
# This pack provides a rapid, systematic approach to identifying low-cost,
# high-impact energy efficiency measures across commercial and industrial
# facilities. It covers the full quick-wins lifecycle from facility scanning
# through measure identification, financial analysis, carbon impact
# assessment, behavioural programme design, rebate matching, implementation
# tracking, and post-implementation savings verification.
#
# Quick win measures typically deliver 10-30% energy savings with payback
# periods under 3 years and minimal capital investment. This pack enables
# facility managers, energy managers, and sustainability teams to rapidly
# build an actionable list of measures ranked by composite score (financial
# savings, payback, carbon reduction, implementation ease, and co-benefits).
# It follows a zero-hallucination approach: all savings calculations use
# deterministic engineering formulas and published benchmarks -- no LLM is
# used in any calculation path.
#
# Key Capabilities:
#   - Facility energy scanning (utility bill analysis, walkthrough checklist,
#     area-by-area assessment with spot measurements)
#   - Quick win measure identification (12 action categories: lighting, HVAC,
#     plug loads, controls/scheduling, motors/drives, compressed air,
#     refrigeration, water heating, building envelope, behavioural,
#     IT equipment, process optimization)
#   - Financial analysis (simple payback, NPV, IRR, lifecycle cost, energy
#     price escalation, maintenance impact, tax incentives)
#   - Carbon impact assessment (tCO2e per measure, Scope 1+2, grid factors,
#     SBTi pathway alignment, carbon price monetisation)
#   - Behavioural change programmes (awareness campaigns, switch-off
#     policies, thermostat discipline, energy champion networks)
#   - Rebate and incentive matching (federal, state, utility, and EU
#     programmes matched to each identified measure)
#   - Implementation tracking (status tracking from identification through
#     completion, phased roadmap, Gantt chart generation)
#   - Savings verification (pre/post comparison, IPMVP Option A/C,
#     weather-normalised savings, persistence monitoring)
#
# Regulatory References:
#   - EED: Directive (EU) 2023/1791 (Energy Efficiency Directive - recast)
#   - ISO 50001:2018 (Energy Management Systems - quick wins as continual
#     improvement evidence)
#   - ASHRAE Guideline 14 (Measurement of Energy, Demand, and Water Savings)
#   - IPMVP: International Performance Measurement and Verification Protocol
#   - GHG Protocol: Corporate Standard (Scope 1+2 energy-related emissions)
#   - SBTi: Science Based Targets initiative (energy efficiency pathway)
#   - EN 16247-1:2022 (Energy Audits - quick wins identification within
#     audit scope)
#
# Facility Types Supported:
#   - Office buildings (corporate HQ, multi-tenant, co-working)
#   - Manufacturing (discrete, batch, light industrial)
#   - Retail (supermarkets, department stores, specialty retail)
#   - Warehouses (ambient, cold storage, distribution centres)
#   - Healthcare (hospitals, clinics, care homes)
#   - Education (schools, universities, campuses)
#   - Data centres (enterprise, colocation, server rooms)
#   - SME (simplified scan for small-medium enterprises)
#
# Version History:
#   1.0.0 - Initial release (2026-03-21)
# =============================================================================

