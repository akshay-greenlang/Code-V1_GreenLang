  display_name: "Quick Wins Identifier Pack"
  description: >-
    GreenLang deployment pack for rapid identification, prioritization, and
    tracking of low-cost, high-impact energy efficiency measures. Includes
    8 engines for facility energy scanning, quick-win measure identification
    across 12 action categories, financial analysis with NPV/IRR/payback,
