  - id: AGENT-FOUND-002
    name: "Schema Compiler & Validator"
    description: "Compiles and validates quick wins data schemas"
    required: true
  - id: AGENT-FOUND-003
    name: "Unit & Reference Normalizer"
    description: "Normalises energy units (kWh, MJ, GJ, m2) and references"
    required: true
  - id: AGENT-FOUND-004
    name: "Assumptions Registry"
    description: "Tracks assumptions in savings calculations and benchmarks"
    required: true
  - id: AGENT-FOUND-005
    name: "Citations & Evidence Agent"
    description: "Links savings calculations to source evidence"
    required: true
  - id: AGENT-FOUND-006
    name: "Access & Policy Guard"
    description: "Enforces role-based access for multi-site operations"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all savings calculations are reproducible with SHA-256 provenance"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors pipeline health and engine performance"
    required: true

