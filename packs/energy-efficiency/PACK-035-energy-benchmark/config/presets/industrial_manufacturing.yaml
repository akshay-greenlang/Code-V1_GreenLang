# =============================================================================
# PACK-035 Energy Benchmark - Industrial Manufacturing Preset
# =============================================================================
# Manufacturing and industrial facilities. EUI range 200-1000 kWh/m2/yr.
# Dominant end uses: process energy, compressed air, HVAC, lighting.
# Benchmarked primarily against national agency data and BPIE industrial
# benchmarks. kWh/unit output used as secondary intensity metric.
#
# Typical use cases:
#   - Discrete manufacturing (electronics, automotive parts)
#   - Light industrial workshops
#   - Food and beverage processing plants
#   - Pharmaceutical manufacturing
# =============================================================================

# --- Facility Details ---
facility_id: ""
facility_name: ""
building_type: "MANUFACTURING"
climate_zone: "ASHRAE_5A"
country_code: "DE"
currency: "EUR"
floor_area_type: "GIA"
reporting_year: 2025
operating_hours_per_week: 100.0

# --- EUI ---
eui:
  accounting_boundary: "site"
  floor_area_type: "GIA"
  include_renewables: true
  renewable_offset_method: "net_metered"
  rolling_months: 12
  include_plug_loads: true
  include_process_loads: true
  include_exterior_loads: true
  data_frequency: "MONTHLY"
  minimum_data_coverage_pct: 90.0
  energy_carriers:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "LPG"

# --- Weather ---
weather:
  enabled: true
  normalisation_method: "REGRESSION"
  base_temp_heating_c: 15.0
  base_temp_cooling_c: 18.0
  min_r_squared: 0.65
  max_cv_rmse: 0.30
  weather_source: "auto"
  degree_day_method: "mean_temperature"
  min_months_regression: 12

# --- Peer Comparison ---
peer_comparison:
  enabled: true
  benchmark_sources:
    - "NATIONAL_AGENCY"
    - "BPIE"
  peer_group_criteria:
    - "building_type"
    - "climate_zone"
    - "floor_area_band"
  min_peer_count: 5
  include_energy_star_score: false
  percentile_display: [10, 25, 50, 75, 90]
  include_quartile_analysis: true
  include_best_practice_target: true
  normalise_for_hours: true

# --- Portfolio ---
portfolio:
  enabled: false

# --- Gap Analysis ---
gap_analysis:
  enabled: true
  disaggregation_method: "both"
  end_use_categories:
    - "heating"
    - "cooling"
    - "ventilation"
    - "lighting"
    - "process"
    - "compressed_air"
    - "other"
  min_gap_threshold_pct: 8.0
  link_to_measures: true
  include_savings_potential: true
  target_source: "peer_median"
  include_payback_period: true
  include_capital_cost_estimate: true

# --- Rating ---
rating:
  enabled: true
  rating_systems:
    - "EPC_EU"
  epc_methodology: "operational"
  epc_country_annex: "DE"
  crrem_pathway_year: 2050
  crrem_scenario: "1.5C"
  include_regulatory_compliance: true

# --- Trend ---
trend:
  enabled: true
  rolling_window_months: 12
  cusum_enabled: true
  cusum_threshold_kwh_m2: 20.0
  spc_enabled: true
  spc_sigma: 2.0
  yoy_comparison: true
  seasonality_detection: true
  alert_enabled: true
  alert_channels:
    - "EMAIL"
  alert_threshold_pct: 15.0

# --- Report ---
report:
  formats:
    - "MARKDOWN"
    - "JSON"
  include_methodology: true
  include_provenance: true
  include_recommendations: true
  include_executive_summary: true
  include_charts: true
  language: "en"
  watermark_draft: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  external_audit_export: true
