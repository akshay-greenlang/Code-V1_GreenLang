metadata:
  name: PACK-034-iso50001-enms
  version: "1.0.0"
  display_name: "ISO 50001 Energy Management System Pack"
  description: >-
    GreenLang deployment pack for implementing, operating, and maintaining
    an ISO 50001:2018-compliant Energy Management System (EnMS). Includes
    10 engines for Significant Energy Use (SEU) identification via Pareto
    analysis, energy baseline development with single- and multi-variable
    regression per ISO 50006, Energy Performance Indicator (EnPI) tracking
    (absolute, intensity, regression-based, statistical, CUSUM), CUSUM
    analysis with tabular and V-mask methods, degree-day weather normalisation
    with variable-base optimisation, ISO 50001 compliance gap assessment
    against all clauses (4.1-10.2), energy monitoring plan generation per
    Clause 6.6, action plan management with financial analysis (NPV, IRR,
    payback) and IPMVP M&V planning, management review report generation
    per Clause 9.3, and continual improvement tracking with certification
    readiness assessment. Supports manufacturing, commercial office, data
    centre, healthcare, retail, logistics, food processing, SME multi-site,
    education, and hotel facilities with tailored presets. Integrates with
    PACK-031 (Industrial Energy Audit), PACK-032 (Building Energy Assessment),
    and PACK-033 (Quick Wins Identifier) for complete energy management
    coverage.
