# =============================================================================
# Agent Dependencies
# =============================================================================

# ---------------------------------------------------------------------------
# MRV Agents - Energy-related MRV agents for carbon calculations
# ---------------------------------------------------------------------------
agents_mrv:
  scope_1:
    - id: AGENT-MRV-001
      name: "Stationary Combustion Agent"
      description: "Calculates emissions from heating systems (boilers, furnaces)"
      path: "greenlang/agents/mrv/stationary_combustion/"
      required: true
      version: "1.0.0"
  scope_2:
    - id: AGENT-MRV-009
      name: "Scope 2 Location-Based Agent"
      description: "Calculates location-based electricity emissions"
      path: "greenlang/agents/mrv/scope2_location_based/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-010
      name: "Scope 2 Market-Based Agent"
      description: "Calculates market-based electricity emissions (PPAs, GOs, RECs)"
      path: "greenlang/agents/mrv/scope2_market_based/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-013
      name: "Dual Reporting Reconciliation"
      description: "Reconciles location-based and market-based Scope 2"
      path: "greenlang/agents/mrv/dual_reporting_reconciliation/"
      required: true
      version: "1.0.0"

# ---------------------------------------------------------------------------
# Data Agents - Supporting data intake and quality agents
# ---------------------------------------------------------------------------
agents_data:
  - id: AGENT-DATA-001
    name: "PDF & Invoice Extractor"
    description: "Extracts energy data from utility bills and vendor invoices"
    required: true
  - id: AGENT-DATA-002
    name: "Excel/CSV Normalizer"
    description: "Normalises meter data exports and equipment inventories"
    required: true
  - id: AGENT-DATA-003
    name: "ERP/Finance Connector"
    description: "Connects to finance systems for energy cost and production data"
    required: false
  - id: AGENT-DATA-004
    name: "API Gateway Agent"
    description: "Routes external API connections for weather and emission factors"
    required: true
  - id: AGENT-DATA-010
    name: "Data Quality Profiler"
    description: "Profiles data quality across meter data and billing data"
    required: true
  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous energy consumption readings"
    required: true
  - id: AGENT-DATA-014
    name: "Time Series Gap Filler"
    description: "Fills gaps in energy time series data for baseline analysis"
    required: true
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from meters through to EnPI reports"
    required: true
  - id: AGENT-DATA-019
    name: "Validation Rule Engine"
    description: "Validates energy data against ISO 50001 quality requirements"
    required: true

# ---------------------------------------------------------------------------
# Foundation Agents - Core platform agents
# ---------------------------------------------------------------------------
agents_foundation:
  - id: AGENT-FOUND-001
    name: "GreenLang Orchestrator (DAG)"
    description: "Orchestrates agent execution for EnMS pipeline"
    required: true
  - id: AGENT-FOUND-002
    name: "Schema Compiler & Validator"
    description: "Compiles and validates EnMS data schemas"
    required: true
  - id: AGENT-FOUND-003
    name: "Unit & Reference Normalizer"
    description: "Normalises energy units (kWh, MJ, GJ, m2) and references"
    required: true
  - id: AGENT-FOUND-004
    name: "Assumptions Registry"
    description: "Tracks assumptions in baseline models and EnPI calculations"
    required: true
  - id: AGENT-FOUND-005
    name: "Citations & Evidence Agent"
    description: "Links calculations to source evidence for audit trail"
    required: true
  - id: AGENT-FOUND-006
    name: "Access & Policy Guard"
    description: "Enforces role-based access for multi-site EnMS operations"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all calculations are reproducible with SHA-256 provenance"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors pipeline health and engine performance"
    required: true

# ---------------------------------------------------------------------------
# Pack Dependencies
# ---------------------------------------------------------------------------
agents_packs:
  - id: PACK-031
    name: "Industrial Energy Audit Pack"
    description: "Detailed energy audit data for SEU analysis and baseline development"
    required: false
    version: "1.0.0"
  - id: PACK-032
    name: "Building Energy Assessment Pack"
    description: "Building assessment data for commercial facility baseline and EnPIs"
    required: false
    version: "1.0.0"
  - id: PACK-033
    name: "Quick Wins Identifier Pack"
    description: "Quick wins as action plan items for EnMS continual improvement"
    required: false
    version: "1.0.0"

# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 27
  breakdown:
    mrv_agents: 4
    data_agents: 9
    foundation_agents: 8
    pack_dependencies: 3
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  schema: pack034_iso50001_enms
  migrations:
    - id: "V256__pack034_enms_001"
      description: "Core EnMS schema, facility profiles, scope definitions, and energy policy"
    - id: "V257__pack034_enms_002"
      description: "SEU register, energy use categories, relevant variables, and personnel"
    - id: "V258__pack034_enms_003"
      description: "Energy baseline tables (models, regression stats, adjustments, history)"
    - id: "V259__pack034_enms_004"
      description: "EnPI tables (definitions, values, targets, benchmarks, rolling averages)"
    - id: "V260__pack034_enms_005"
      description: "CUSUM analysis tables (cumulative sums, alerts, events, charts)"
    - id: "V261__pack034_enms_006"
      description: "Degree-day tables (HDD, CDD, base temps, weather stations, TMY data)"
    - id: "V262__pack034_enms_007"
      description: "Compliance tables (clause assessments, NCs, corrective actions, audits)"
    - id: "V263__pack034_enms_008"
      description: "Monitoring plan tables (meters, hierarchy, schedules, data quality)"
    - id: "V264__pack034_enms_009"
      description: "Action plan tables (items, financial analysis, M&V plans, status)"
    - id: "V265__pack034_enms_010"
      description: "Views, indexes, RLS policies, management review, seed data"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  seu_identification:
    max_energy_uses: 200
    pareto_calculation_ms: 100
    relevant_variable_analysis_ms: 500
    target_duration_minutes: 5
  baseline_development:
    regression_per_model_ms: 500
    model_comparison_ms: 200
    outlier_detection_ms: 100
    target_duration_minutes: 10
  enpi_calculation:
    enpi_per_indicator_ms: 50
    rolling_average_ms: 100
    benchmark_lookup_ms: 50
    target_duration_minutes: 3
  cusum_analysis:
    cusum_per_period_ms: 20
    chart_generation_ms: 500
    target_duration_minutes: 2
  degree_day:
    hdd_cdd_per_month_ms: 30
    base_temp_optimisation_ms: 2000
    normalisation_per_period_ms: 50
    target_duration_minutes: 3
  compliance_assessment:
    clause_assessment_ms: 100
    gap_report_generation_ms: 1000
    target_duration_minutes: 5
  management_review:
    input_compilation_ms: 2000
    report_generation_ms: 3000
    target_duration_minutes: 5
  cache_hit_ratio_target: 0.80
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
  required_roles:
    - energy_manager
    - enms_coordinator
    - facility_manager
    - sustainability_officer
    - internal_auditor
    - top_management
    - engineer
    - viewer
    - admin
  audit_events:
    - "enms.energy_review.started"
    - "enms.energy_review.completed"
    - "enms.seu.identified"
    - "enms.seu.updated"
    - "enms.baseline.created"
    - "enms.baseline.adjusted"
    - "enms.enpi.calculated"
    - "enms.enpi.target_breached"
    - "enms.cusum.alert_triggered"
    - "enms.compliance.assessed"
    - "enms.compliance.nc_raised"
    - "enms.compliance.nc_closed"
    - "enms.action_plan.created"
    - "enms.action_plan.completed"
    - "enms.action_plan.verified"
    - "enms.management_review.completed"
    - "enms.report.generated"
    - "enms.report.exported"
    - "enms.config.modified"
    - "enms.preset.loaded"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_energy_data.json"
    - "tests/fixtures/sample_production_data.json"
    - "tests/fixtures/sample_weather_data.json"
    - "tests/fixtures/sample_meter_hierarchy.json"
    - "tests/fixtures/sample_baseline_models.json"

# -----------------------------------------------------------------------------
# Compliance
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "ISO_50001"
      name: "ISO 50001:2018"
      coverage: "Full clause coverage (4.1 through 10.2)"
    - id: "ISO_50006"
      name: "ISO 50006:2014"
      coverage: "Energy baselines and EnPI methodology"
    - id: "ISO_50015"
      name: "ISO 50015:2014"
      coverage: "M&V of energy performance for action plans"
    - id: "EU_EED"
      name: "EU Energy Efficiency Directive"
      coverage: "Article 8 alternative compliance via ISO 50001 certification"
    - id: "IPMVP"
      name: "IPMVP Core Concepts"
      coverage: "M&V Options A-D for savings verification"
    - id: "ASHRAE_14"
      name: "ASHRAE Guideline 14"
      coverage: "Statistical criteria for baseline model validation"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "statsmodels>=0.14"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 100

  database:
    extensions:
      - "pgvector"
    min_connections: 10
    recommended_connections: 30

# -----------------------------------------------------------------------------
