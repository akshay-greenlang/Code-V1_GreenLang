# =============================================================================
# PACK-034 ISO 50001 EnMS - Data Center Preset
# =============================================================================
# Cooling-dominated data centre with PUE focus, UPS efficiency, and
# IT load normalisation. EUI benchmark: 1000-5000 kWh/m2/yr.
# Focus: PUE as primary EnPI with IT load as normalisation variable.
# 24/7 operation with high data granularity requirements.
#
# Typical use cases:
#   - Enterprise data centres
#   - Colocation facilities
#   - Hyperscale edge sites
#   - Server rooms within office buildings
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "DATA_CENTER"
enms_maturity: "PLANNING"
country: "DE"
reporting_year: 2026
operating_hours_per_year: 8760

# --- SEU ---
seu:
  cumulative_threshold_pct: 85.0
  individual_threshold_pct: 5.0
  min_consumers: 3
  include_categories:
    - "COOLING"
    - "IT_EQUIPMENT"
    - "HVAC"
    - "LIGHTING"
  review_frequency: "ANNUAL"
  include_relevant_variables: true
  track_personnel: true

# --- Baseline ---
baseline:
  model_preference: "MULTI_VARIABLE"
  min_data_months: 12
  max_cv_rmse: 20.0
  min_r_squared: 0.80
  significance_level: 0.05
  outlier_method: "ZSCORE"
  auto_adjust: true

# --- EnPI ---
enpi:
  enpi_types:
    - "ABSOLUTE"
    - "INTENSITY"
    - "REGRESSION_BASED"
    - "STATISTICAL"
  normalization_method: "COMPOSITE"
  target_improvement_pct: 2.0
  track_by_seu: true
  benchmark_enabled: true
  rolling_period_months: 12

# --- CUSUM ---
cusum:
  method: "TABULAR"
  alert_threshold: 1.5
  monitoring_interval: "DAILY"
  seasonal_adjustment: "DEGREE_DAY"

# --- Degree Day ---
degree_day:
  heating_base_celsius: 15.5
  cooling_base_celsius: 18.3
  optimize_base_temp: true
  normalization_basis: "TMY3"
  include_solar_gain: false

# --- Compliance ---
compliance:
  assessment_frequency: "ANNUAL"
  auto_gap_analysis: true
  nc_closure_days: 60
  surveillance_reminder_days: 30
  internal_audit_frequency: "ANNUAL"
  management_review_frequency: "SEMI_ANNUAL"

# --- Monitoring ---
monitoring:
  granularity: "HOURLY"
  data_retention_months: 60
  quality_threshold: 0.98
  auto_alerts: true
  meter_hierarchy_enabled: true
  alert_threshold_pct: 10.0

# --- Action Plan ---
action_plan:
  max_payback_years: 3.0
  discount_rate: 0.10
  analysis_period_years: 7
  verification_method: "OPTION_B"
  electricity_rate_eur_per_kwh: 0.20
  gas_rate_eur_per_kwh: 0.08

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  output_formats:
    - "MARKDOWN"
    - "HTML"
    - "JSON"
  include_charts: true
  include_recommendations: true
  management_review_template: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  baseline_change_log: true
  retention_days: 2555
