# =============================================================================
# PACK-037 Demand Response - Microgrid/DER-Rich Preset
# =============================================================================
# Facilities with significant distributed energy resources including battery
# BESS, rooftop/carport solar PV, EV chargers with V2B capability, thermal
# storage, and backup generators. Full DER orchestration enables 30-80% of
# peak curtailment with minimal occupant impact by dispatching behind-the-
# meter resources instead of curtailing loads. Islanding capability for
# extended events.
#
# Typical use cases:
#   - Corporate campuses with solar + storage
#   - Military installations and government compounds
#   - University campuses with microgrids
#   - Industrial parks with shared DER assets
#   - Community microgrids and energy cooperatives
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "MICROGRID_DER"
country: "US"
reporting_year: 2026
operating_hours_per_year: 8760

# --- DR Parameters ---
dr_parameters:
  min_curtailment_kw: 100
  max_event_duration_hours: 8
  max_events_per_season: 50
  min_notification_minutes: 15
  notification_preferences:
    channels:
      - "EMAIL"
      - "SMS"
      - "BMS_SIGNAL"
      - "SCADA_SIGNAL"
      - "DERMS_API"
    escalation_minutes: 5
  comfort_constraints:
    max_temperature_rise_c: 2.0
    max_humidity_deviation_pct: 10
    min_lighting_level_pct: 70
    noise_limit_db: 55
  operational_constraints:
    islanding_capable: true
    max_island_duration_hours: 4
    black_start_capable: true
    grid_forming_inverter: true

# --- Load Categories ---
load_categories:
  hvac:
    included: true
    default_criticality: "DEFERRABLE"
    curtailment_strategy: "SETPOINT_RAISE"
  lighting:
    included: true
    default_criticality: "FLEXIBLE"
    curtailment_strategy: "DIMMING"
  plug_loads:
    included: true
    default_criticality: "SHEDDABLE"
    curtailment_strategy: "CIRCUIT_SHED"
  ev_charging:
    included: true
    default_criticality: "FLEXIBLE"
    curtailment_strategy: "V2B_DISCHARGE"
  it_equipment:
    included: false
    default_criticality: "CRITICAL"
  refrigeration:
    included: false
    default_criticality: "ESSENTIAL"
  motors_drives:
    included: true
    default_criticality: "FLEXIBLE"
    curtailment_strategy: "VSD_REDUCTION"
  process_loads:
    included: false
    default_criticality: "ESSENTIAL"

# --- Program Preferences ---
program_preferences:
  preferred_types:
    - "CAPACITY"
    - "ANCILLARY"
    - "ECONOMIC"
    - "EMERGENCY"
    - "FREQUENCY_REGULATION"
  risk_tolerance: "HIGH"
  minimum_revenue_eur_per_year: 15000
  preferred_isos:
    - "PJM"
    - "CAISO"
    - "ERCOT"
    - "ISO_NE"

# --- Baseline Preferences ---
baseline_preferences:
  preferred_methodology: "TYPE_I_REGRESSION"
  optimization_aggressiveness: "AGGRESSIVE"
  adjustment_factor_enabled: true

# --- Dispatch Weights ---
dispatch_weights:
  operational_disruption: 0.15
  comfort_deviation: 0.15
  rebound_effect: 0.20
  target_shortfall: 0.50

# --- DER Configuration ---
der_configuration:
  battery_bess:
    enabled: true
    capacity_kwh: 4000
    max_discharge_kw: 1000
    min_soc_pct: 10
    round_trip_efficiency: 0.93
    cycles_per_day_limit: 2
  solar_pv:
    enabled: true
    capacity_kw: 1000
    behind_the_meter: true
    curtailment_for_grid: false
  backup_generator:
    enabled: true
    max_runtime_hours: 8
    fuel_type: "NATURAL_GAS"
    max_capacity_kw: 2000
  ev_v2b:
    enabled: true
    max_vehicles: 50
    min_departure_soc_pct: 40
    max_discharge_kw_per_vehicle: 10
  thermal_storage:
    enabled: true
    type: "ICE_STORAGE"
    capacity_kwh_thermal: 3000
    charge_duration_hours: 8
    discharge_duration_hours: 6

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.12
  demand_charge_eur_per_kw: 15.00
  discount_rate: 0.08
  analysis_period_years: 15

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.38
  marginal_emission_factor_kgco2_per_kwh: 0.60
  carbon_price_eur_per_tco2: 85.0
  sbti_alignment_tracking: true
  generator_emission_factor_kgco2_per_kwh: 0.20

# --- Reporting ---
reporting:
  frequency: "WEEKLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "JSON"
    - "CSV"
  executive_summary: true
  settlement_reports: true
  der_performance_reports: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 7
