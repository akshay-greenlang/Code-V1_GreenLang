# =============================================================================
# PACK-037: Demand Response Pack
# GreenLang Energy Efficiency Pack for Demand Response & Load Flexibility
# =============================================================================
# This pack provides a comprehensive demand response management solution
# covering load flexibility assessment, DR program matching and enrollment,
# customer baseline load (CBL) simulation, dispatch optimization, real-time
# event management, DER/battery/thermal coordination, performance tracking,
# revenue optimization, carbon impact quantification, and settlement
# verification.
#
# Demand response enables facilities to monetize load flexibility by
# curtailing, shifting, or reshaping electricity consumption in response
# to grid signals, price signals, and program dispatch. This pack supports
# 200+ DR programs across US ISOs (PJM, ERCOT, CAISO, ISO-NE, NYISO,
# MISO, SPP), EU aggregator markets, and UK National Grid flexibility
# services.
#
# Key Capabilities:
#   - Load flexibility assessment (criticality classification, curtailment
#     capacity, response time, rebound characterization)
#   - DR program matching (200+ programs, revenue projection, portfolio
#     optimization with stacking analysis)
#   - Customer baseline load simulation (8 methodologies: High 4 of 5,
#     10 of 10, High 5 Similar, 10CP, Deemed Profile, Type I Regression,
#     EU Standard, Custom Regression)
#   - Dispatch optimization (multi-objective LP: curtailment target,
#     comfort constraints, operational impact, rebound minimization)
#   - Real-time event management (5-phase lifecycle: notification,
#     preparation, execution, termination, assessment)
#   - DER coordination (battery BESS, solar PV, backup generator, EV
#     charger V2B, thermal storage, CHP orchestration)
#   - Performance tracking (event compliance, settlement verification,
#     trend detection, degradation alerts)
#   - Revenue optimization (capacity, energy, ancillary, demand charge
#     savings, price arbitrage, ROI, what-if analysis)
#   - Carbon impact (marginal emission factors, Scope 2 per GHG Protocol,
#     SBTi contribution, CSRD/ESRS E1 reporting)
#   - Settlement documentation (program-specific baseline, performance
#     verification, revenue reconciliation)
#
# Regulatory References:
#   - EU Electricity Market Design Regulation (EU) 2024/1747
#   - EU Energy Efficiency Directive (EU) 2023/1791
#   - FERC Order 2222 (DER aggregation in wholesale markets)
#   - FERC Order 745 (DR compensation at LMP)
#   - OpenADR 2.0b (Automated Demand Response protocol)
#   - ISO 50001:2018 (Energy management systems)
#   - GHG Protocol Corporate Standard (Scope 2 emissions)
#   - SBTi Corporate Net-Zero Standard
#
# Facility Types Supported:
#   - Commercial offices (HVAC, lighting, plug loads, EV)
#   - Manufacturing (motors, compressed air, process scheduling)
#   - Retail/grocery (HVAC, refrigeration thermal mass, lighting)
#   - Warehouses/cold storage (refrigeration, lighting, dock equipment)
#   - Healthcare (non-clinical HVAC, admin lighting, kitchen/laundry)
#   - Education/campus (HVAC, lighting, IT labs, EV charging)
#   - Data centers (cooling setpoint, UPS bypass, EV charging)
#   - Microgrid/DER-rich (full DER orchestration, islanding)
#
# Version History:
#   1.0.0 - Initial release (2026-03-23)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-037-demand-response
  version: "1.0.0"
  display_name: "Demand Response Pack"
  description: >-
    GreenLang deployment pack for comprehensive demand response management
    including load flexibility assessment, DR program matching against 200+
    programs, customer baseline load simulation with 8 methodologies,
    multi-objective dispatch optimization, real-time event management,
    DER/battery/thermal coordination, performance tracking with settlement
    verification, revenue optimization across capacity/energy/ancillary
    streams, and carbon impact quantification using marginal emission
    factors. Supports commercial offices, manufacturing, retail, warehouses,
    healthcare, education, data centers, and microgrid facilities with
    tailored presets. Bridges to MRV agents for Scope 2 emissions, DATA
    agents for meter and billing data, PACK-036 for utility rate analysis,
    and PACK-033 for DR-enabling quick wins.
  category: energy-efficiency
  tier: professional
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-23"
  support_tier: enterprise
  documentation_url: "https://docs.greenlang.io/packs/demand-response"
  changelog_url: "https://docs.greenlang.io/packs/demand-response/changelog"

  tags:
    - demand-response
    - load-flexibility
    - dr-program
    - curtailment
    - baseline-load
    - dispatch-optimization
    - event-management
    - der-coordination
    - battery-storage
    - solar-pv
    - ev-charging
    - thermal-storage
    - revenue-optimization
    - carbon-impact
    - marginal-emissions
    - openADR
    - grid-flexibility
    - energy-efficiency
    - settlement
    - performance-tracking

  regulation:
    primary:
      name: "EU Electricity Market Design Regulation"
      reference: "Regulation (EU) 2024/1747"
      effective_date: "2024-07-01"
      description: >-
        The EU Electricity Market Design Regulation mandates demand
        response participation rights (Article 17) and requires
        aggregator market access (Article 40). This pack enables
        facilities to comply with demand-side flexibility requirements
        and participate in EU flexibility markets.
    secondary:
      - name: "EU Energy Efficiency Directive (EED)"
        reference: "Directive (EU) 2023/1791"
        effective_date: "2023-10-10"
      - name: "FERC Order 2222"
        reference: "18 CFR Parts 35, 271"
        effective_date: "2020-09-17"
      - name: "FERC Order 745"
        reference: "18 CFR Part 35"
        effective_date: "2011-03-15"
      - name: "OpenADR 2.0b"
        reference: "OpenADR Alliance"
        effective_date: "2015-07-01"
      - name: "ISO 50001:2018 Energy Management Systems"
        reference: "ISO 50001:2018"
        effective_date: "2018-08-21"
      - name: "GHG Protocol Corporate Standard"
        reference: "GHG Protocol (revised 2015)"
        effective_date: "2015-01-01"
      - name: "SBTi Corporate Net-Zero Standard"
        reference: "SBTi v1.1"
        effective_date: "2023-01-01"

  compliance_references:
    - id: "EU_EMDR"
      name: "EU Electricity Market Design Regulation"
      regulation: "Regulation (EU) 2024/1747"
      effective_date: "2024-07-01"
      description: >-
        Mandates demand response participation rights and aggregator
        market access. This pack enables automated DR participation
        in EU flexibility markets with program enrollment, event
        management, and settlement verification.

    - id: "FERC_2222"
      name: "FERC Order 2222"
      regulation: "18 CFR Parts 35, 271"
      effective_date: "2020-09-17"
      description: >-
        Enables DER aggregation participation in US wholesale markets.
        This pack supports aggregated DR portfolio management across
        multiple facilities with coordinated dispatch and settlement.

    - id: "FERC_745"
      name: "FERC Order 745"
      regulation: "18 CFR Part 35"
      effective_date: "2011-03-15"
      description: >-
        Requires ISOs/RTOs to compensate DR at LMP when cost-effective.
        This pack calculates DR revenue at LMP and supports program
        enrollment across all US ISOs/RTOs.

    - id: "OpenADR"
      name: "OpenADR 2.0b"
      regulation: "OpenADR Alliance"
      effective_date: "2015-07-01"
      description: >-
        Standard communication protocol for automated demand response.
        This pack supports OpenADR 2.0b signal reception, parsing,
        and automated response execution.

    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol (revised 2015)"
      effective_date: "2015-01-01"
      description: >-
        Scope 2 emission reduction from DR events quantified using
        marginal emission factors. This pack calculates event-specific
        carbon benefits with both location-based and market-based
        accounting per GHG Protocol Scope 2 Guidance.

    - id: "SBTi"
      name: "Science Based Targets initiative"
      regulation: "SBTi Corporate Net-Zero Standard v1.1"
      effective_date: "2023-01-01"
      description: >-
        DR carbon reductions contribute to science-based targets.
        This pack tracks marginal emission reductions from DR events
        against SBTi reduction pathways.

# -----------------------------------------------------------------------------
# Components
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines (10 DR engines)
  # ===========================================================================
  engines:
    - id: load_flexibility
      name: "Load Flexibility Assessment Engine"
      description: >-
        Systematic assessment of all facility loads for DR flexibility.
        Categorizes loads by criticality (critical/essential/deferrable/
        sheddable/flexible), calculates curtailment capacity by
        notification time and duration, scores flexibility across 7
        factors. Builds a complete load flexibility register.
        Zero-hallucination: all assessments from equipment specifications
        and metered data, no LLM.
      class: "LoadFlexibilityEngine"
      file: "engines/load_flexibility_engine.py"
      required: true

    - id: dr_program
      name: "DR Program Matching Engine"
      description: >-
        Matches facility flexibility to 200+ DR programs worldwide.
        Covers US ISOs, EU aggregator markets, UK flexibility services.
        Calculates expected revenue, penalty risk, and optimal program
        portfolio with stacking analysis.
        Zero-hallucination: program data from published program guides,
        revenue from formulaic calculation, no LLM.
      class: "DRProgramEngine"
      file: "engines/dr_program_engine.py"
      required: true

    - id: baseline
      name: "Customer Baseline Load Engine"
      description: >-
        Simulates CBL using 8 industry-standard methodologies.
        Calculates baselines from historical interval data, applies
        adjustment factors, simulates outcomes, identifies optimization
        opportunities within program rules.
        Zero-hallucination: baseline from published methodologies and
        interval meter data, no LLM.
      class: "BaselineEngine"
      file: "engines/baseline_engine.py"
      required: true

    - id: dispatch_optimizer
      name: "Dispatch Optimization Engine"
      description: >-
        Multi-objective optimization for DR event dispatch. Minimizes
        disruption, comfort deviation, and rebound while meeting
        curtailment target. Uses scipy LP for deterministic solutions.
        Zero-hallucination: optimization from linear programming, no LLM.
      class: "DispatchOptimizerEngine"
      file: "engines/dispatch_optimizer_engine.py"
      required: true

    - id: event_manager
      name: "Event Manager Engine"
      description: >-
        Real-time DR event lifecycle management across 5 phases:
        notification, preparation, execution, termination, assessment.
        Manages load control commands with millisecond timestamps.
        Zero-hallucination: event tracking from metered data, no LLM.
      class: "EventManagerEngine"
      file: "engines/event_manager_engine.py"
      required: true

    - id: der_coordinator
      name: "DER Coordinator Engine"
      description: >-
        Coordinates distributed energy resources for DR events: BESS,
        solar PV, backup generators, EV chargers, thermal storage, CHP.
        Optimizes combined DER dispatch within asset constraints.
        Zero-hallucination: DER dispatch from asset specs and SOC, no LLM.
      class: "DERCoordinatorEngine"
      file: "engines/der_coordinator_engine.py"
      required: false

    - id: performance_tracker
      name: "Performance Tracker Engine"
      description: >-
        Tracks DR event performance against program requirements.
        Calculates compliance, revenue earned, penalties incurred,
        and performance trends with degradation detection.
        Zero-hallucination: performance from meter vs baseline, no LLM.
      class: "PerformanceTrackerEngine"
      file: "engines/performance_tracker_engine.py"
      required: true

    - id: revenue_optimizer
      name: "Revenue Optimizer Engine"
      description: >-
        Optimizes DR revenue across capacity, energy, ancillary,
        demand charge, and arbitrage streams. Calculates ROI, what-if
        scenarios, and optimal program portfolio allocation.
        Zero-hallucination: revenue from tariff and program data, no LLM.
      class: "RevenueOptimizerEngine"
      file: "engines/revenue_optimizer_engine.py"
      required: true

    - id: carbon_impact
      name: "Carbon Impact Engine"
      description: >-
        Calculates carbon impact of DR using marginal emission factors.
        Peak-period curtailment avoids 2-3x more emissions than average
        grid displacement. Scope 2 per GHG Protocol, SBTi tracking.
        Zero-hallucination: carbon from published marginal EFs, no LLM.
      class: "CarbonImpactEngine"
      file: "engines/carbon_impact_engine.py"
      required: true

    - id: dr_reporting
      name: "DR Reporting Engine"
      description: >-
        Aggregates DR results into 8 dashboard panels and 7 report
        types. Settlement-grade documentation for program administrators.
        Multi-format export (MD, HTML, PDF, JSON, CSV).
        Zero-hallucination: reports from aggregated engine outputs, no LLM.
      class: "DRReportingEngine"
      file: "engines/dr_reporting_engine.py"
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 DR workflows)
  # ===========================================================================
  workflows:
    - id: flexibility_assessment
      name: "Flexibility Assessment Workflow"
      description: >-
        4-phase workflow: LoadInventory -> FlexibilityScoring ->
        CurtailmentCapacity -> FlexibilityReport. Systematic load
        assessment from inventory through curtailment quantification.
      schedule: "on_demand"
      estimated_duration_minutes: 60
      phases: 4

    - id: program_enrollment
      name: "Program Enrollment Workflow"
      description: >-
        4-phase workflow: ProgramMatching -> RevenueProjection ->
        EnrollmentDocumentation -> CommitmentRegistration. DR program
        selection, revenue analysis, and enrollment preparation.
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 4

    - id: event_preparation
      name: "Event Preparation Workflow"
      description: >-
        3-phase workflow: EventNotification -> DispatchOptimization ->
        PreConditioningActivation. Event preparation from signal receipt
        through pre-event optimization.
      schedule: "on_event"
      estimated_duration_minutes: 30
      phases: 3

    - id: event_execution
      name: "Event Execution Workflow"
      description: >-
        4-phase workflow: LoadCurtailment -> RealTimeMonitoring ->
        PerformanceVerification -> LoadRestoration. Real-time event
        management from curtailment through restoration.
      schedule: "on_event"
      estimated_duration_minutes: 480
      phases: 4

    - id: settlement
      name: "Settlement Workflow"
      description: >-
        3-phase workflow: BaselineCalculation -> PerformanceMeasurement ->
        RevenueSettlement. Post-event settlement with baseline comparison.
      schedule: "post_event"
      estimated_duration_minutes: 30
      phases: 3

    - id: der_optimization
      name: "DER Optimization Workflow"
      description: >-
        3-phase workflow: AssetInventory -> DispatchStrategy ->
        CoordinatedResponse. DER coordination for DR events.
      schedule: "on_event"
      estimated_duration_minutes: 15
      phases: 3

    - id: reporting
      name: "Reporting Workflow"
      description: >-
        3-phase workflow: DataAggregation -> ReportGeneration ->
        DistributionDelivery. Report and dashboard generation.
      schedule: "monthly"
      estimated_duration_minutes: 15
      phases: 3

    - id: full_dr_lifecycle
      name: "Full DR Lifecycle Workflow"
      description: >-
        8-phase master workflow: FlexibilityAssessment -> ProgramSelection ->
        Enrollment -> EventPreparation -> EventExecution -> Settlement ->
        CarbonQuantification -> Reporting.
      schedule: "on_demand"
      estimated_duration_minutes: 1440
      phases: 8

  # ===========================================================================
  # Templates - Pre-built report and output templates (10 DR templates)
  # ===========================================================================
  templates:
    - id: flexibility_profile
      display_name: "Flexibility Profile Report"
      description: >-
        Load flexibility assessment showing all loads categorized by
        curtailability, total curtailment capacity by notification time
        and duration.
      format: "html"
      template_file: "templates/flexibility_profile_report.jinja2"
      enabled: true

    - id: program_analysis
      display_name: "Program Analysis Report"
      description: >-
        DR program comparison with eligibility, revenue projections,
        penalty risk, and enrollment recommendations.
      format: "html"
      template_file: "templates/program_analysis_report.jinja2"
      enabled: true

    - id: baseline_analysis
      display_name: "Baseline Analysis Report"
      description: >-
        CBL methodology comparison showing projected baseline under
        each methodology with optimization opportunities.
      format: "html"
      template_file: "templates/baseline_analysis_report.jinja2"
      enabled: true

    - id: dispatch_plan
      display_name: "Dispatch Plan Report"
      description: >-
        Load curtailment sequence for DR events with timing, kW
        reduction, DER dispatch, and pre-conditioning schedule.
      format: "html"
      template_file: "templates/dispatch_plan_report.jinja2"
      enabled: true

    - id: event_performance
      display_name: "Event Performance Report"
      description: >-
        Post-event analysis with actual vs baseline curtailment,
        revenue earned, penalties, and lessons learned.
      format: "html"
      template_file: "templates/event_performance_report.jinja2"
      enabled: true

    - id: revenue_dashboard
      display_name: "Revenue Dashboard"
      description: >-
        Revenue tracking across all programs with capacity, energy,
        and ancillary payment breakdowns.
      format: "html"
      template_file: "templates/revenue_dashboard.jinja2"
      enabled: true

    - id: carbon_impact
      display_name: "Carbon Impact Report"
      description: >-
        Carbon benefits of DR using marginal emission factors with
        SBTi alignment and CSRD reporting.
      format: "html"
      template_file: "templates/carbon_impact_report.jinja2"
      enabled: true

    - id: der_performance
      display_name: "DER Performance Report"
      description: >-
        DER asset performance during DR events: battery SOC, solar
        contribution, EV flexibility, thermal storage utilization.
      format: "html"
      template_file: "templates/der_performance_report.jinja2"
      enabled: true

    - id: executive_summary
      display_name: "Executive Summary Report"
      description: >-
        C-suite summary with total DR revenue, carbon impact, program
        compliance, and strategic recommendations.
      format: "html"
      template_file: "templates/executive_summary_report.jinja2"
      enabled: true

    - id: settlement_verification
      display_name: "Settlement Verification Report"
      description: >-
        Settlement-grade documentation for program administrators with
        baseline calculations, meter data, performance verification.
      format: "html"
      template_file: "templates/settlement_verification_report.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (12 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        12-phase master pipeline with DAG dependency resolution,
        SHA-256 provenance chain, and phase-level caching.
      required: true

    - id: mrv_bridge
      name: "MRV Agent Bridge"
      description: >-
        Routes to MRV agents for Scope 2 emissions from DR curtailment.
      required: true

    - id: data_bridge
      name: "Data Agent Bridge"
      description: >-
        Routes to DATA agents for meter data, billing, and quality.
      required: true

    - id: grid_signal_bridge
      name: "Grid Signal Bridge"
      description: >-
        OpenADR 2.0b, ISO/RTO dispatch, price signals, grid carbon.
      required: true

    - id: bms_control_bridge
      name: "BMS Control Bridge"
      description: >-
        BMS read/write for automated DR load control.
      required: false

    - id: meter_data_bridge
      name: "Meter Data Bridge"
      description: >-
        AMI integration for 15-minute interval data.
      required: true

    - id: der_asset_bridge
      name: "DER Asset Bridge"
      description: >-
        Battery, solar, EV, generator, thermal storage communication.
      required: false

    - id: pack036_bridge
      name: "PACK-036 Utility Analysis Bridge"
      description: >-
        Utility rate structures and demand charge data.
      required: false

    - id: pack033_bridge
      name: "PACK-033 Quick Wins Bridge"
      description: >-
        DR-enabling quick win measures integration.
      required: false

    - id: health_check
      name: "Health Check"
      description: >-
        20-category system verification.
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        9-step guided DR configuration.
      required: false

    - id: alert_bridge
      name: "Alert Bridge"
      description: >-
        Multi-channel DR event alerting and notifications.
      required: false

  # ===========================================================================
  # Presets - Facility-type specific configurations (8 presets)
  # ===========================================================================
  presets:
    - id: commercial_office
      name: "Commercial Office Preset"
      description: >-
        DR configuration for commercial offices: HVAC curtailment,
        lighting dimming, plug load shedding, EV deferral.
        Typical curtailment 15-35% of peak. Comfort constraints apply.
      facility_type: "COMMERCIAL_OFFICE"
      enabled_engines:
        - load_flexibility
        - dr_program
        - baseline
        - dispatch_optimizer
        - event_manager
        - performance_tracker
        - revenue_optimizer
        - carbon_impact
        - dr_reporting
      file: "config/presets/commercial_office.yaml"

    - id: manufacturing
      name: "Manufacturing Preset"
      description: >-
