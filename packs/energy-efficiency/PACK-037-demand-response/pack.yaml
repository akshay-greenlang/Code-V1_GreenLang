  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous meter readings and consumption spikes"
    required: true
  - id: AGENT-DATA-014
    name: "Time Series Gap Filler"
    description: "Fills gaps in interval meter data for baseline calculation"
    required: true
  - id: AGENT-DATA-015
    name: "Cross-Source Reconciliation"
    description: "Reconciles meter data against billing data"
    required: false
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from meter through settlement"
    required: true

# ---------------------------------------------------------------------------
