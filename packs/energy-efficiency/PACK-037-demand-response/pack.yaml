    required: false
    version: "1.0.0"
  - id: PACK-036
    name: "Utility Analysis Pack"
    description: "Utility rate structures and demand charge analysis"
    required: false
    version: "1.0.0"

# -----------------------------------------------------------------------------
# Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 25
  breakdown:
    mrv_agents: 3
    data_agents: 9
    foundation_agents: 8
    pack_dependencies: 2
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  schema: pack037_demand_response
  migrations:
    - id: "V286__pack037_demand_response_001"
      description: "Core DR schema: facility profiles, load inventory, flexibility assessments"
    - id: "V287__pack037_demand_response_002"
      description: "DR program database: 200+ programs, compensation, requirements"
    - id: "V288__pack037_demand_response_003"
      description: "Baseline calculation tables: 8 methodologies, interval data, adjustments"
    - id: "V289__pack037_demand_response_004"
      description: "Dispatch optimization tables: curtailment plans, load control sequences"
    - id: "V290__pack037_demand_response_005"
      description: "Event management tables: events, phases, commands, performance"
    - id: "V291__pack037_demand_response_006"
      description: "DER coordination tables: asset registry, dispatch, SOC tracking"
    - id: "V292__pack037_demand_response_007"
      description: "Performance tracking tables: compliance, trends, alerts"
    - id: "V293__pack037_demand_response_008"
      description: "Revenue tables: streams, forecasts, settlements, ROI"
    - id: "V294__pack037_demand_response_009"
      description: "Carbon impact tables: marginal EFs, event carbon, annual summaries"
    - id: "V295__pack037_demand_response_010"
      description: "Views, indexes, RLS policies, seed data"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  load_flexibility:
    max_loads: 500
    assessment_per_load_ms: 100
    target_duration_minutes: 15
  program_matching:
    max_programs: 200
    matching_per_program_ms: 50
    target_duration_seconds: 30
  baseline_calculation:
    interval_data_months: 12
    per_methodology_seconds: 60
    target_duration_minutes: 8
  dispatch_optimization:
    max_loads: 100
    optimization_seconds: 30
    target_duration_minutes: 2
  event_management:
    response_latency_seconds: 300
    monitoring_interval_seconds: 60
    target_uptime_pct: 99.95
  der_coordination:
    max_assets: 50
    dispatch_seconds: 10
    target_duration_minutes: 1
  revenue_calculation:
    annual_calculation_seconds: 10
    what_if_per_scenario_ms: 500
  carbon_calculation:
    per_event_ms: 200
    annual_summary_seconds: 5
  cache_hit_ratio_target: 0.80
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and program-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
    - RESTRICTED
  required_roles:
    - dr_manager
    - energy_manager
    - facility_manager
    - der_operator
    - sustainability_officer
    - viewer
    - admin
  audit_events:
    - "dr.flexibility.assessed"
    - "dr.program.enrolled"
    - "dr.event.received"
    - "dr.event.dispatched"
    - "dr.event.completed"
    - "dr.settlement.calculated"
    - "dr.revenue.reconciled"
    - "dr.report.generated"
    - "dr.config.modified"
    - "dr.der.dispatched"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_interval_data.json"
    - "tests/fixtures/sample_load_inventory.json"
    - "tests/fixtures/sample_dr_programs.json"
    - "tests/fixtures/sample_der_assets.json"
    - "tests/fixtures/sample_events.json"

# -----------------------------------------------------------------------------
# Compliance
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "EU_EMDR"
      name: "EU Electricity Market Design Regulation"
      coverage: "Article 17 demand response rights, Article 40 aggregator access"
    - id: "FERC_2222"
      name: "FERC Order 2222"
      coverage: "DER aggregation in wholesale markets"
    - id: "FERC_745"
      name: "FERC Order 745"
      coverage: "DR compensation at LMP"
    - id: "OpenADR"
      name: "OpenADR 2.0b"
      coverage: "Automated DR signal exchange"
    - id: "ISO_50001"
      name: "ISO 50001:2018"
      coverage: "Demand response in energy management"
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      coverage: "Scope 2 emission reduction from DR events"
    - id: "SBTi"
      name: "Science Based Targets initiative"
      coverage: "DR carbon reduction contribution to targets"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"
    - "pulp>=2.7"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 100

  database:
    extensions:
      - "pgvector"
    min_connections: 10
    recommended_connections: 30

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_emission_factor_database
    - verify_dr_program_database

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V286__pack037_demand_response_001"
      - "V287__pack037_demand_response_002"
      - "V288__pack037_demand_response_003"
      - "V289__pack037_demand_response_004"
      - "V290__pack037_demand_response_005"
      - "V291__pack037_demand_response_006"
      - "V292__pack037_demand_response_007"
      - "V293__pack037_demand_response_008"
      - "V294__pack037_demand_response_009"
      - "V295__pack037_demand_response_010"

  post_install:
    - seed_dr_program_database
    - seed_marginal_emission_factors
    - seed_baseline_methodologies
    - validate_preset_configs

