        - dr_program
        - baseline
        - dispatch_optimizer
        - event_manager
        - performance_tracker
        - revenue_optimizer
        - carbon_impact
        - dr_reporting
      file: "config/presets/manufacturing.yaml"

    - id: retail_grocery
      name: "Retail/Grocery Preset"
      description: >-
