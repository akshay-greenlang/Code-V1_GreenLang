    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors pipeline health and engine performance"
    required: true

# ---------------------------------------------------------------------------
# Pack Dependencies
# ---------------------------------------------------------------------------
agents_packs:
  - id: PACK-033
