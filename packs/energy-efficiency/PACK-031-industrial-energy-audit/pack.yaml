  display_name: "Industrial Energy Audit Pack"
  description: >-
    Comprehensive GreenLang deployment pack for industrial energy auditing and
    optimization per EU Energy Efficiency Directive (EED), ISO 50001:2018, and
    EN 16247. Includes 10 engines for energy baseline establishment, EN 16247
    audit execution, process energy mapping, equipment efficiency assessment,
    energy savings opportunity identification with IPMVP M&V, waste heat
    recovery with pinch analysis, compressed air system optimization, steam
    system optimization, lighting and HVAC optimization, and energy benchmarking
    against BAT-AEL from BREF documents. Bundles all 30 MRV agents for
    energy-related emissions, 20 data intake/quality agents, 10 foundation
    agents, and 10 bridged agents for ETS compliance, ISO 50001 certification,
    smart metering, SCADA/BMS integration, and regulatory reporting. Supports
    manufacturing, process industry, food and beverage, data center, warehouse,
    automotive, steel/metals, and SME industrial sub-sectors with tailored
    presets and regulatory template packages.
