  regulation:
    primary:
      name: "EU Energy Efficiency Directive (EED)"
      reference: "Directive (EU) 2023/1791"
      effective_date: "2023-10-10"
      description: >-
        The recast EED sets binding EU energy efficiency targets and requires
        Member States to ensure that large enterprises (non-SMEs) carry out
        energy audits at least every four years (Article 8). Enterprises with
        average annual energy consumption above 10 TJ must implement an energy
        management system certified to ISO 50001 or equivalent. The directive
        mandates energy performance indicators (EnPIs), energy baselines,
        and continuous improvement. It also requires waste heat mapping for
        facilities above 1 MW thermal input and promotes energy efficiency
        first principle across industrial policy and planning.
    secondary:
      - name: "ISO 50001:2018 Energy Management Systems"
        reference: "ISO 50001:2018"
        effective_date: "2018-08-21"
      - name: "EN 16247-1:2022 Energy Audits - General Requirements"
        reference: "EN 16247-1:2022"
        effective_date: "2022-07-01"
      - name: "EN 16247-2:2022 Energy Audits - Buildings"
        reference: "EN 16247-2:2022"
        effective_date: "2022-07-01"
      - name: "EN 16247-3:2022 Energy Audits - Processes"
        reference: "EN 16247-3:2022"
        effective_date: "2022-07-01"
      - name: "EN 16247-4:2022 Energy Audits - Transport"
        reference: "EN 16247-4:2022"
        effective_date: "2022-07-01"
      - name: "EN 16247-5:2022 Energy Audits - Competence of Energy Auditors"
        reference: "EN 16247-5:2022"
        effective_date: "2022-07-01"
      - name: "EU Emissions Trading System"
        reference: "Directive 2003/87/EC (amended)"
        effective_date: "2005-01-01"
      - name: "Industrial Emissions Directive"
        reference: "Directive 2010/75/EU"
        effective_date: "2011-01-06"
      - name: "Ecodesign Regulation - Motors and Variable Speed Drives"
        reference: "Regulation (EU) 2019/1781"
        effective_date: "2021-07-01"
      - name: "Ecodesign Regulation - Water Pumps"
        reference: "Regulation (EU) 2012/547"
        effective_date: "2013-01-01"
      - name: "EU BAT/BREF Reference Documents"
        reference: "IED Article 13 / BAT Conclusions"
