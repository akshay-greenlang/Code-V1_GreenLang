# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 70
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 10
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  facility_processing:
    max_facilities: 200
    max_meters_per_facility: 500
    max_total_meters: 50000
    target_duration_minutes: 30
    baseline_regression_per_meter_ms: 200
  energy_audit:
    max_equipment_items: 10000
    equipment_efficiency_calc_per_item_ms: 50
    energy_balance_per_process_ms: 500
    target_duration_minutes: 45
  compressed_air:
    max_compressors: 100
    max_leak_points: 5000
    specific_power_calc_ms: 100
    leak_quantification_per_point_ms: 20
    target_duration_minutes: 15
  steam_system:
    max_traps: 10000
    trap_survey_assessment_per_trap_ms: 30
    boiler_efficiency_calc_ms: 500
    target_duration_minutes: 20
  waste_heat:
    max_heat_streams: 200
    pinch_analysis_per_stream_pair_ms: 50
    heat_exchanger_sizing_ms: 500
    target_duration_minutes: 30
  savings_analysis:
    max_ecm_register_items: 500
    npv_irr_calc_per_ecm_ms: 100
    ipmvp_verification_per_ecm_ms: 500
    target_duration_minutes: 20
  benchmarking:
    max_peer_comparisons: 1000
    sec_calculation_per_facility_ms: 100
    bat_ael_comparison_ms: 200
    target_duration_minutes: 10
  meter_data_ingestion:
    max_readings_per_batch: 1000000
    ingestion_rate_readings_per_second: 10000
    target_latency_seconds: 60
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and equipment-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - energy_manager
    - facility_manager
    - maintenance_engineer
    - process_engineer
    - sustainability_officer
    - energy_auditor
    - external_verifier
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "scikit-learn>=1.3"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "lxml>=4.9"
    - "cryptography>=41.0"
    - "asyncua>=1.0"
    - "pymodbus>=3.5"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_bref_bat_ael_data
    - verify_weather_data_source
    - verify_meter_connectivity
    - verify_scada_connectivity

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
    new:
      - "PACK031-001"  # Energy baseline and EnPI tables
      - "PACK031-002"  # Energy audit lifecycle and EN 16247 tables
      - "PACK031-003"  # Process energy mapping and Sankey tables
      - "PACK031-004"  # Equipment inventory and efficiency tables
      - "PACK031-005"  # ECM register and savings analysis tables
      - "PACK031-006"  # Waste heat recovery and pinch analysis tables
      - "PACK031-007"  # Compressed air system tables
      - "PACK031-008"  # Steam system and trap survey tables
      - "PACK031-009"  # Lighting and HVAC assessment tables
      - "PACK031-010"  # Benchmarking, BAT-AEL, and peer comparison tables
      - "PACK031-011"  # Meter data management and time series tables (TimescaleDB hypertable)
      - "PACK031-012"  # ISO 50001 evidence and certification tracking tables

  post_install:
    - seed_emission_factors
    - seed_bref_bat_ael_benchmarks
    - seed_ecodesign_motor_classes
    - seed_degree_day_base_temperatures
    - seed_compressed_air_benchmarks
    - seed_steam_trap_loss_tables
    - seed_lighting_lux_standards
    - seed_ets_product_benchmarks
    - seed_weather_station_metadata
    - seed_default_presets
    - configure_timescaledb_hypertables
    - run_health_checks

