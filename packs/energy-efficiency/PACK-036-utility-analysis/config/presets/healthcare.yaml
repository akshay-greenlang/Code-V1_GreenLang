# =============================================================================
# PACK-036 Utility Analysis - Healthcare Preset
# =============================================================================
# Hospital and clinic environment with focus on 24/7 operations, budget
# accuracy for financial planning, and highly consistent demand profiles.
# EUI benchmark: 300-600 kWh/m2/yr electricity, 200-400 kWh/m2/yr gas.
# Demand charges typically represent 25-40% of the electric bill. Key
# opportunities: budget forecast accuracy improvement, steam/CHW
# sub-metering, redundant system efficiency verification, contract
# renewal optimization.
#
# Typical use cases:
#   - Acute care hospitals
#   - Outpatient clinics and medical centres
#   - Long-term care and rehabilitation facilities
#   - Veterinary hospitals
# =============================================================================

# --- Facility ---
facility:
  facility_type: "HEALTHCARE"
  operating_hours_per_week: 168.0
  occupancy_pct: 70.0
  currency: "EUR"

# --- Commodities ---
commodities:
  - commodity_type: "ELECTRICITY"
    enabled: true
    unit: "kWh"
  - commodity_type: "NATURAL_GAS"
    enabled: true
    unit: "therms"
  - commodity_type: "WATER"
    enabled: true
    unit: "m3"
  - commodity_type: "STEAM"
    enabled: true
    unit: "klb"

# --- Analysis Depth ---
analysis_depth: "COMPREHENSIVE"
reporting_year: 2026

# --- Bill Audit ---
bill_audit:
  enabled: true
  anomaly_threshold_std_dev: 1.5
  max_estimated_reads: 1
  period_gap_days: 32
  tax_tolerance_pct: 0.3
  check_rate_consistency: true
  check_meter_read_sequence: true
  lookback_months: 36

# --- Rate Optimization ---
rate_optimization:
  enabled: true
  include_tou: true
  include_demand_ratchet: true
  include_real_time_pricing: false
  include_green_tariffs: true
  min_savings_threshold_eur: 1000.0
  compare_max_tariffs: 10
  include_contract_terms: true
  peak_shaving_analysis: true

# --- Demand ---
demand:
  enabled: true
  interval_resolution_minutes: 15
  peak_threshold_pct: 95.0
  power_factor_target: 0.95
  load_factor_tracking: true
  coincident_peak_analysis: true
  ratchet_period_months: 12
  peak_event_count: 15

# --- Budget ---
budget:
  enabled: true
  forecast_horizon_months: 18
  method: "ENSEMBLE"
  monte_carlo_iterations: 5000
  rate_escalation_pct: 3.5
  confidence_levels: [0.80, 0.90, 0.95, 0.99]
  weather_normalize: true
  base_year_months: 24
  include_demand_budget: true

# --- Benchmark ---
benchmark:
  enabled: true
  standards: ["ENERGY_STAR", "ASHRAE_100"]
  peer_group_building_type: "Hospital"
  weather_normalize: true
  include_eui: true
  include_cost_intensity: true
  include_carbon_intensity: true
  percentile_target: 25

# --- Reporting ---
reporting:
  formats: ["MARKDOWN", "HTML", "XLSX"]
  frequency: "MONTHLY"
  include_executive_summary: true
  include_benchmarks: true
  include_carbon: true
  include_budget_variance: true
  include_rate_analysis: true
  include_demand_profile: true

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  gas_emission_factor_kgco2_per_kwh: 0.20
  carbon_price_eur_per_tco2: 85.0
  include_scope_1: true
  include_scope_2: true
  market_based_accounting: false
  track_carbon_trend: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  bill_image_retention: true
