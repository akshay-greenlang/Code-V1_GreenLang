# =============================================================================
# PACK-039 Energy Monitoring - Manufacturing Preset
# =============================================================================
# Industrial manufacturing facilities with 20-100 submeters, 1-5 minute
# intervals, production-normalised EnPIs (kWh/unit, kWh/tonne, SEC), and
# process-level metering. Typical peak demand 1,000-10,000 kW. Monitoring
# priorities: production lines (40-60%), compressed air (10-20%), HVAC
# (10-15%), lighting (5-10%). Anomaly detection tuned for production
# schedule-aware baselines with shift patterns.
#
# Typical use cases:
#   - Discrete and batch manufacturing plants
#   - CNC machining and metal fabrication facilities
#   - Electronics assembly and PCB manufacturing
#   - Automotive component and tier-1 suppliers
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "MANUFACTURING"
country: "US"
reporting_year: 2026
operating_hours_per_year: 6000

# --- Meters ---
meters:
  total_meter_count: 45
  primary_protocol: "MODBUS_TCP"
  secondary_protocols:
    - "OPC_UA"
    - "PULSE_OUTPUT"
  polling_interval_seconds: 30
  energy_types_monitored:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "COMPRESSED_AIR"
  virtual_meters_enabled: true
  virtual_meter_count: 10
  meter_hierarchy_depth: 4
  ct_ratio_validation: true
  automatic_gap_detection: true

# --- Interval Data ---
interval_data:
  interval_length: "5_MIN"
  minimum_data_coverage_pct: 95
  gap_fill_method: "LINEAR_INTERPOLATION"
  max_gap_fill_intervals: 6
  lookback_months: 12
  outlier_threshold_sigma: 2.5
  weather_normalization: false
  heating_base_temp_c: 15.5
  cooling_base_temp_c: 18.0
  demand_window_minutes: 15

# --- EnPI ---
enpi:
  primary_enpi_type: "INTENSITY_PRODUCTION"
  secondary_enpi_types:
    - "ABSOLUTE"
    - "CUSUM_BASELINE"
  baseline_year: 2024
  baseline_months: 12
  normalisation_variables:
    - "production_units"
    - "operating_hours"
    - "heating_degree_days"
  significance_level: 0.05
  improvement_target_pct: 4.0
  cusum_tracking_enabled: true
  regression_min_r_squared: 0.80
  auto_baseline_adjustment: false

# --- Anomaly Detection ---
anomaly_detection:
  enabled: true
  primary_method: "CUSUM"
  secondary_methods:
    - "STATISTICAL_ZSCORE"
    - "REGRESSION_RESIDUAL"
  sensitivity_sigma: 2.5
  minimum_deviation_pct: 10
  evaluation_window_hours: 8
  suppression_window_hours: 2
  weekday_weekend_split: true
  holiday_calendar_enabled: true
  after_hours_monitoring: true
  baseload_deviation_pct: 15

# --- Allocation ---
allocation:
  enabled: true
  primary_method: "DIRECT_SUBMETER"
  fallback_method: "PRODUCTION_BASED"
  common_area_split_method: "PROPORTIONAL_AREA"
  common_area_pct_cap: 15
  allocation_frequency: "MONTHLY"
  include_demand_charges: true
  demand_charge_method: "COINCIDENT_PEAK"
  loss_factor_pct: 2.0
  reconciliation_enabled: true
  reconciliation_tolerance_pct: 3.0

# --- Budget & Target ---
budget_target:
  enabled: true
  budget_method: "PRODUCTION_NORMALISED"
  monthly_distribution: "HISTORICAL_PATTERN"
  warning_variance_pct: 5
  critical_variance_pct: 10
  year_on_year_reduction_target_pct: 4.0
  rolling_forecast_enabled: true
  forecast_horizon_months: 3
  degree_day_adjustment: false

# --- Alarms ---
alarms:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
    - "SCADA_SIGNAL"
  default_priority: "MEDIUM"
  critical_response_minutes: 10
  high_response_minutes: 30
  escalation_enabled: true
  escalation_delay_minutes: 15
  suppression_window_minutes: 20
  after_hours_critical_only: false
  meter_offline_alarm_minutes: 15
  acknowledgement_required: true

# --- Cost Tracking ---
cost_tracking:
  enabled: true
  electricity_rate_eur_per_kwh: 0.10
  gas_rate_eur_per_kwh: 0.04
  demand_charge_eur_per_kw: 18.00
  time_of_use_enabled: true
  peak_rate_multiplier: 1.6
  off_peak_rate_multiplier: 0.65
  currency: "EUR"
  cost_avoidance_tracking: true

# --- Carbon ---
carbon:
  enabled: true
  electricity_ef_kgco2_per_kwh: 0.42
  gas_ef_kgco2_per_kwh: 0.20
  carbon_price_eur_per_tco2: 85.0
  market_based_accounting: false
  scope1_tracking: true
  scope2_tracking: true
  real_time_carbon_intensity: false
  sbti_alignment_tracking: true

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "CSV"
  executive_summary: true
  meter_health_report: true
  anomaly_report: true
  budget_variance_report: true
  cost_allocation_report: true
  carbon_report: true
  enpi_dashboard: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 7
