# =============================================================================
# PACK-039 Energy Monitoring - Industrial Process Preset
# =============================================================================
# Process industry facilities with 30-150 meters, production-line metering,
# batch tracking, and specific energy consumption (SEC) monitoring. Typical
# peak demand 2,000-50,000 kW. Monitoring priorities: process heating/cooling
# (30-50%), motors/drives (20-30%), compressed air (10-15%), pumps/fans
# (10-15%), auxiliaries (5-10%). EnPI: SEC (kWh/tonne, GJ/batch, kWh/unit)
# with production-normalised baselines. High-frequency interval data (1-5 min)
# to correlate energy use with production batches.
#
# Typical use cases:
#   - Chemical and petrochemical plants
#   - Food and beverage processing facilities
#   - Pulp and paper mills
#   - Cement, glass, and ceramics manufacturing
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "INDUSTRIAL_PROCESS"
country: "US"
reporting_year: 2026
operating_hours_per_year: 7500

# --- Meters ---
meters:
  total_meter_count: 80
  primary_protocol: "OPC_UA"
  secondary_protocols:
    - "MODBUS_TCP"
    - "PULSE_OUTPUT"
    - "MODBUS_RTU"
  polling_interval_seconds: 15
  energy_types_monitored:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "STEAM"
    - "COMPRESSED_AIR"
    - "FUEL_OIL"
  virtual_meters_enabled: true
  virtual_meter_count: 20
  meter_hierarchy_depth: 5
  ct_ratio_validation: true
  automatic_gap_detection: true

# --- Interval Data ---
interval_data:
  interval_length: "1_MIN"
  minimum_data_coverage_pct: 95
  gap_fill_method: "LINEAR_INTERPOLATION"
  max_gap_fill_intervals: 10
  lookback_months: 12
  outlier_threshold_sigma: 2.5
  weather_normalization: false
  heating_base_temp_c: 15.5
  cooling_base_temp_c: 18.0
  demand_window_minutes: 15

# --- EnPI ---
enpi:
  primary_enpi_type: "INTENSITY_PRODUCTION"
  secondary_enpi_types:
    - "ABSOLUTE"
    - "CUSUM_BASELINE"
    - "REGRESSION_MODEL"
  baseline_year: 2024
  baseline_months: 12
  normalisation_variables:
    - "production_tonnes"
    - "batch_count"
    - "operating_hours"
    - "ambient_temperature"
  significance_level: 0.05
  improvement_target_pct: 4.0
  cusum_tracking_enabled: true
  regression_min_r_squared: 0.85
  auto_baseline_adjustment: false

# --- Anomaly Detection ---
anomaly_detection:
  enabled: true
  primary_method: "CUSUM"
  secondary_methods:
    - "REGRESSION_RESIDUAL"
    - "STATISTICAL_ZSCORE"
  sensitivity_sigma: 2.0
  minimum_deviation_pct: 8
  evaluation_window_hours: 4
  suppression_window_hours: 1
  weekday_weekend_split: false
  holiday_calendar_enabled: true
  after_hours_monitoring: true
  baseload_deviation_pct: 12

# --- Allocation ---
allocation:
  enabled: true
  primary_method: "DIRECT_SUBMETER"
  fallback_method: "PRODUCTION_BASED"
  common_area_split_method: "PROPORTIONAL_AREA"
  common_area_pct_cap: 10
  allocation_frequency: "MONTHLY"
  include_demand_charges: true
  demand_charge_method: "COINCIDENT_PEAK"
  loss_factor_pct: 2.0
  reconciliation_enabled: true
  reconciliation_tolerance_pct: 3.0

# --- Budget & Target ---
budget_target:
  enabled: true
  budget_method: "PRODUCTION_NORMALISED"
  monthly_distribution: "HISTORICAL_PATTERN"
  warning_variance_pct: 5
  critical_variance_pct: 8
  year_on_year_reduction_target_pct: 4.0
  rolling_forecast_enabled: true
  forecast_horizon_months: 3
  degree_day_adjustment: false

# --- Alarms ---
alarms:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "SCADA_SIGNAL"
    - "BMS_SIGNAL"
  default_priority: "MEDIUM"
  critical_response_minutes: 5
  high_response_minutes: 15
  escalation_enabled: true
  escalation_delay_minutes: 10
  suppression_window_minutes: 15
  after_hours_critical_only: false
  meter_offline_alarm_minutes: 10
  acknowledgement_required: true

# --- Cost Tracking ---
cost_tracking:
  enabled: true
  electricity_rate_eur_per_kwh: 0.09
  gas_rate_eur_per_kwh: 0.03
  steam_rate_eur_per_kwh: 0.05
  demand_charge_eur_per_kw: 20.00
  time_of_use_enabled: true
  peak_rate_multiplier: 1.7
  off_peak_rate_multiplier: 0.60
  currency: "EUR"
  cost_avoidance_tracking: true

# --- Carbon ---
carbon:
  enabled: true
  electricity_ef_kgco2_per_kwh: 0.42
  gas_ef_kgco2_per_kwh: 0.20
  steam_ef_kgco2_per_kwh: 0.25
  carbon_price_eur_per_tco2: 85.0
  market_based_accounting: false
  scope1_tracking: true
  scope2_tracking: true
  real_time_carbon_intensity: false
  sbti_alignment_tracking: true

# --- Reporting ---
reporting:
  frequency: "WEEKLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "CSV"
  executive_summary: true
  meter_health_report: true
  anomaly_report: true
  budget_variance_report: true
  cost_allocation_report: true
  carbon_report: true
  enpi_dashboard: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 10
