# =============================================================================
# PACK-039 Energy Monitoring - Data Center Preset
# =============================================================================
# Data centre and server facility monitoring with 20-80 submeters, 1-minute
# intervals, PUE (Power Usage Effectiveness) monitoring, and IT vs cooling
# power allocation. Typical IT load 500-20,000 kW. Monitoring priorities:
# IT compute (45-55%), cooling (30-40%), UPS/power distribution (8-12%),
# lighting/misc (2-5%). Primary EnPI: PUE (total facility power / IT
# equipment power). Alarming requires high-frequency data with tight
# thresholds -- IT uptime SLA (99.99%) is binding.
#
# Typical use cases:
#   - Enterprise data centres and colocation facilities
#   - Hyperscale and cloud provider facilities
#   - Edge data centres and network PoPs
#   - Managed hosting and disaster recovery sites
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "DATA_CENTER"
country: "US"
reporting_year: 2026
operating_hours_per_year: 8760

# --- Meters ---
meters:
  total_meter_count: 50
  primary_protocol: "MODBUS_TCP"
  secondary_protocols:
    - "BACNET_IP"
    - "API_REST"
  polling_interval_seconds: 10
  energy_types_monitored:
    - "ELECTRICITY"
    - "CHILLED_WATER"
  virtual_meters_enabled: true
  virtual_meter_count: 15
  meter_hierarchy_depth: 5
  ct_ratio_validation: true
  automatic_gap_detection: true

# --- Interval Data ---
interval_data:
  interval_length: "1_MIN"
  minimum_data_coverage_pct: 99
  gap_fill_method: "PREVIOUS_VALUE"
  max_gap_fill_intervals: 5
  lookback_months: 12
  outlier_threshold_sigma: 2.0
  weather_normalization: false
  heating_base_temp_c: 15.5
  cooling_base_temp_c: 18.0
  demand_window_minutes: 15

# --- EnPI ---
enpi:
  primary_enpi_type: "REGRESSION_MODEL"
  secondary_enpi_types:
    - "ABSOLUTE"
    - "CUSUM_BASELINE"
  baseline_year: 2024
  baseline_months: 12
  normalisation_variables:
    - "it_load_kw"
    - "outside_air_temperature"
    - "humidity"
  significance_level: 0.05
  improvement_target_pct: 2.0
  cusum_tracking_enabled: true
  regression_min_r_squared: 0.90
  auto_baseline_adjustment: false

# --- Anomaly Detection ---
anomaly_detection:
  enabled: true
  primary_method: "STATISTICAL_ZSCORE"
  secondary_methods:
    - "CUSUM"
    - "REGRESSION_RESIDUAL"
  sensitivity_sigma: 2.0
  minimum_deviation_pct: 5
  evaluation_window_hours: 4
  suppression_window_hours: 1
  weekday_weekend_split: false
  holiday_calendar_enabled: false
  after_hours_monitoring: true
  baseload_deviation_pct: 10

# --- Allocation ---
allocation:
  enabled: true
  primary_method: "DIRECT_SUBMETER"
  fallback_method: "PROPORTIONAL_AREA"
  common_area_split_method: "PROPORTIONAL_AREA"
  common_area_pct_cap: 15
  allocation_frequency: "MONTHLY"
  include_demand_charges: true
  demand_charge_method: "COINCIDENT_PEAK"
  loss_factor_pct: 5.0
  reconciliation_enabled: true
  reconciliation_tolerance_pct: 2.0

# --- Budget & Target ---
budget_target:
  enabled: true
  budget_method: "REGRESSION_FORECAST"
  monthly_distribution: "HISTORICAL_PATTERN"
  warning_variance_pct: 3
  critical_variance_pct: 5
  year_on_year_reduction_target_pct: 2.0
  rolling_forecast_enabled: true
  forecast_horizon_months: 3
  degree_day_adjustment: false

# --- Alarms ---
alarms:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
    - "DCIM_SIGNAL"
  default_priority: "HIGH"
  critical_response_minutes: 5
  high_response_minutes: 15
  escalation_enabled: true
  escalation_delay_minutes: 5
  suppression_window_minutes: 10
  after_hours_critical_only: false
  meter_offline_alarm_minutes: 5
  acknowledgement_required: true

# --- Cost Tracking ---
cost_tracking:
  enabled: true
  electricity_rate_eur_per_kwh: 0.10
  gas_rate_eur_per_kwh: 0.04
  chilled_water_rate_eur_per_kwh: 0.08
  demand_charge_eur_per_kw: 20.00
  time_of_use_enabled: true
  peak_rate_multiplier: 1.5
  off_peak_rate_multiplier: 0.70
  currency: "EUR"
  cost_avoidance_tracking: true

# --- Carbon ---
carbon:
  enabled: true
  electricity_ef_kgco2_per_kwh: 0.40
  chilled_water_ef_kgco2_per_kwh: 0.15
  carbon_price_eur_per_tco2: 85.0
  market_based_accounting: true
  scope1_tracking: false
  scope2_tracking: true
  real_time_carbon_intensity: true
  sbti_alignment_tracking: true

# --- Reporting ---
reporting:
  frequency: "WEEKLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "JSON"
  executive_summary: true
  meter_health_report: true
  anomaly_report: true
  budget_variance_report: true
  cost_allocation_report: true
  carbon_report: true
  enpi_dashboard: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 7
