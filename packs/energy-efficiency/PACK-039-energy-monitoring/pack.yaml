# =============================================================================
# PACK-039: Energy Monitoring Pack
# GreenLang Energy Efficiency Pack for Energy Monitoring & Targeting (M&T)
# =============================================================================
# Comprehensive energy monitoring platform covering meter registry management,
# multi-source data acquisition (Modbus/BACnet/MQTT/OPC-UA/AMI/manual),
# automated data validation (12 check types per ASHRAE Guideline 14),
# statistical anomaly detection (CUSUM/EWMA/Z-score/IQR/regression),
# ISO 50001 EnPI tracking with regression normalization, multi-tenant
# cost allocation with tariff-aware interval billing, energy budgeting
# with weather-normalized variance analysis, intelligent alarm management
# (ISA 18.2 lifecycle), real-time dashboards, and automated reporting.
#
# Version History:
#   1.0.0 - Initial release (2026-03-23)
# =============================================================================

metadata:
  name: PACK-039-energy-monitoring
  version: "1.0.0"
  display_name: "Energy Monitoring Pack"
  description: >-
    GreenLang deployment pack for comprehensive energy monitoring and targeting
    covering meter registry management, multi-protocol data acquisition,
    automated data validation, statistical anomaly detection, ISO 50001
    EnPI tracking with regression normalization, multi-tenant cost allocation,
    energy budgeting with variance analysis, intelligent alarm management,
    real-time dashboards, and automated report generation.
  category: energy-efficiency
  tier: professional
  author: GreenLang Platform Team
  license: proprietary
  min_greenlang_version: "1.0.0"
  pack_id: "PACK-039"
  status: production_ready
  tags:
    - energy-monitoring
    - monitoring-targeting
    - enpi
    - iso-50001
    - submetering
    - anomaly-detection
    - cost-allocation
    - energy-budgeting
    - alarm-management
    - data-validation

components:
  engines:
    count: 10
    items:
      - id: engine_001
        name: meter_registry_engine
        file: engines/meter_registry_engine.py
        class: MeterRegistryEngine
        description: "Meter asset registry with hierarchy, calibration tracking, virtual meters"
      - id: engine_002
        name: data_acquisition_engine
        file: engines/data_acquisition_engine.py
        class: DataAcquisitionEngine
        description: "Multi-protocol data collection with timestamp alignment and normalization"
      - id: engine_003
        name: data_validation_engine
        file: engines/data_validation_engine.py
        class: DataValidationEngine
        description: "12-check automated validation with quality scoring per ASHRAE 14"
      - id: engine_004
        name: anomaly_detection_engine
        file: engines/anomaly_detection_engine.py
        class: AnomalyDetectionEngine
        description: "CUSUM/EWMA/Z-score/IQR statistical anomaly detection"
      - id: engine_005
        name: enpi_engine
        file: engines/enpi_engine.py
        class: EnPIEngine
        description: "ISO 50001 EnPI with regression normalization and CUSUM tracking"
      - id: engine_006
        name: cost_allocation_engine
        file: engines/cost_allocation_engine.py
        class: CostAllocationEngine
        description: "Interval-level tariff-aware cost allocation for tenants/departments"
      - id: engine_007
        name: budget_engine
        file: engines/budget_engine.py
        class: BudgetEngine
        description: "Energy budgeting with weather-normalized variance analysis"
      - id: engine_008
        name: alarm_engine
        file: engines/alarm_engine.py
        class: AlarmEngine
        description: "Intelligent alarm management with ISA 18.2 lifecycle"
      - id: engine_009
        name: dashboard_engine
        file: engines/dashboard_engine.py
        class: DashboardEngine
        description: "Real-time dashboard with 8 panels, KPIs, trends, heatmaps"
      - id: engine_010
        name: monitoring_reporting_engine
        file: engines/monitoring_reporting_engine.py
        class: MonitoringReportingEngine
        description: "Automated scheduled report generation with multi-format export"

  workflows:
    count: 8
    items:
      - id: workflow_001
        name: meter_setup_workflow
        file: workflows/meter_setup_workflow.py
        class: MeterSetupWorkflow
        phases: 4
        description: "MeterRegistration -> ChannelConfig -> HierarchySetup -> Commissioning"
      - id: workflow_002
        name: data_collection_workflow
        file: workflows/data_collection_workflow.py
        class: DataCollectionWorkflow
        phases: 4
        description: "ProtocolConnect -> DataPoll -> Validate -> Store"
      - id: workflow_003
        name: anomaly_response_workflow
        file: workflows/anomaly_response_workflow.py
        class: AnomalyResponseWorkflow
        phases: 3
        description: "Detect -> Investigate -> Resolve"
      - id: workflow_004
        name: enpi_tracking_workflow
        file: workflows/enpi_tracking_workflow.py
        class: EnPITrackingWorkflow
        phases: 4
        description: "DataCollection -> Normalization -> EnPICalc -> PerformanceReview"
      - id: workflow_005
        name: cost_allocation_workflow
        file: workflows/cost_allocation_workflow.py
        class: CostAllocationWorkflow
        phases: 3
        description: "MeterReading -> CostCalc -> BillGeneration"
      - id: workflow_006
        name: budget_review_workflow
        file: workflows/budget_review_workflow.py
        class: BudgetReviewWorkflow
        phases: 3
        description: "BudgetSetup -> VarianceAnalysis -> ForecastUpdate"
      - id: workflow_007
        name: reporting_workflow
        file: workflows/reporting_workflow.py
