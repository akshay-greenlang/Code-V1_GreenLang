# =============================================================================
# PACK-040 Measurement & Verification - Manufacturing Preset
# =============================================================================
# Production-dependent manufacturing facilities where energy consumption is
# driven primarily by production volume, shift count, and product mix. Option B
# retrofit isolation is standard since individual ECMs (motor replacements, VFDs,
# compressed air optimization) can be metered at the equipment level. Multivariate
# regression (MVR) baselines with production as the primary independent variable
# and temperature as secondary. Daily granularity captures production variation.
# Multi-shift operations require shift-aware scheduling adjustments.
#
# Typical ECMs:
#   - Motor replacements (IE3/IE4 premium efficiency)
#   - VFD installations on fans, pumps, compressors
#   - Compressed air system optimization
#   - Process heat recovery
#   - Boiler efficiency improvements
#   - Lighting upgrades in production areas
#
# IPMVP Approach: Option B retrofit isolation with continuous metering on
# modified equipment. Production normalization is mandatory. Daily data
# granularity captures production variation.
# =============================================================================

# --- Project Identification ---
project_name: ""
facility_name: ""
company_name: ""
facility_type: "MANUFACTURING"
country: "US"
reporting_year: 2026
operating_hours_per_year: 6000
ecm_count: 5

# --- Baseline Configuration ---
baseline:
  baseline_months: 12
  granularity: "DAILY"
  preferred_model_type: "MVR"
  auto_model_selection: true
  model_selection_criterion: "ADJUSTED_R2"
  independent_variables:
    - "production_volume"
    - "outdoor_temperature"
    - "shift_count"
  max_cvrmse_pct: 30.0
  max_nmbe_pct: 10.0
  min_r_squared: 0.50
  min_data_coverage_pct: 90.0
  outlier_removal_method: "COOKS_DISTANCE"
  outlier_threshold: 2.0
  balance_point_optimization: false
  heating_balance_point_c: 15.5
  cooling_balance_point_c: 18.0
  min_observations: 60
  durbin_watson_check: true
  f_test_significance: 0.05
  t_test_significance: 0.05

# --- Adjustments ---
adjustments:
  routine_adjustments_enabled: true
  non_routine_adjustments_enabled: true
  weather_normalization: true
  production_normalization: true
  occupancy_adjustment: false
  operating_hours_adjustment: true
  floor_area_adjustment: false
  equipment_change_adjustment: true
  schedule_change_adjustment: true
  static_factor_adjustment: true
  normalization_method: "ACTUAL"
  adjustment_documentation_required: true
  adjustment_uncertainty_pct: 15.0
  max_non_routine_adjustments: 10

# --- Savings ---
savings:
  primary_savings_type: "AVOIDED"
  secondary_savings_types:
    - "NORMALIZED"
    - "COST"
    - "ANNUALIZED"
  electricity_rate_per_kwh: 0.10
  gas_rate_per_kwh: 0.035
  steam_rate_per_kwh: 0.05
  chilled_water_rate_per_kwh: 0.07
  demand_charge_per_kw: 12.0
  include_demand_savings: true
  currency: "USD"
  escalation_rate_pct: 3.0
  discount_rate_pct: 8.0
  cumulative_tracking_enabled: true
  annualization_method: "PROPORTIONAL"
  negative_savings_handling: "ALERT"
  carbon_savings_tracking: true
  electricity_ef_kgco2_per_kwh: 0.42
  gas_ef_kgco2_per_kwh: 0.20

# --- Uncertainty ---
uncertainty:
  enabled: true
  confidence_level_pct: 90.0
  measurement_uncertainty_enabled: true
  model_uncertainty_enabled: true
  sampling_uncertainty_enabled: false
  max_fractional_savings_uncertainty_pct: 50.0
  minimum_detectable_savings_pct: 10.0
  default_meter_accuracy_pct: 0.5
  ct_pt_error_pct: 0.3
  calibration_drift_pct_per_year: 0.2
  propagation_method: "ROOT_SUM_SQUARE"

# --- IPMVP ---
ipmvp:
  default_option: "OPTION_B"
  auto_option_selection: true
  option_a_stipulated_values_review_months: 12
  option_b_metering_duration_weeks: 4
  option_c_min_ecm_share_pct: 15.0
  option_d_calibration_cvrmse_pct: 15.0
  option_d_calibration_nmbe_pct: 5.0
  measurement_boundary_documentation: true
  interactive_effects_assessment: true
  compliance_frameworks:
    - "IPMVP"
    - "ASHRAE_14"
    - "ISO_50015"
  ipmvp_version: "2022"

# --- Metering ---
metering:
  default_meter_accuracy: "CLASS_05"
  calibration_interval_months: 12
  calibration_standard: "IEC_62053"
  sampling_enabled: false
  sampling_confidence_pct: 90.0
  sampling_precision_pct: 10.0
  sampling_cv_pct: 30.0
  min_data_completeness_pct: 90.0
  max_gap_intervals: 2
  gap_fill_method: "PREVIOUS_VALUE"
  data_validation_enabled: true
  negative_value_handling: "REJECT"
  demand_window_minutes: 15

# --- Persistence ---
persistence:
  enabled: true
  tracking_years: 5
  degradation_model: "LINEAR"
  expected_annual_degradation_pct: 3.0
  alert_threshold_pct: 15.0
  recommissioning_trigger_pct: 25.0
  seasonal_pattern_analysis: false
  persistence_factor_tracking: true
  minimum_persistence_factor: 0.75
  trend_analysis_method: "MOVING_AVERAGE"
  performance_guarantee_tracking: false
  guarantee_shortfall_alert: false

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "CSV"
  mv_plan_report: true
  baseline_report: true
  savings_report: true
  uncertainty_report: true
  annual_summary: true
  persistence_report: true
  compliance_report: true
  executive_summary: true
  option_comparison_report: false
  metering_plan_report: true
  include_regression_diagnostics: true
  include_residual_analysis: true

# --- Security ---
security:
  data_classification: "CONFIDENTIAL"
  audit_logging: true
  pii_redaction: true
  encryption_at_rest: true
  tenant_data_isolation: true

# --- Performance ---
performance:
  max_ecms_per_project: 50
  max_baseline_data_points: 1095
  regression_timeout_seconds: 15
  savings_calculation_timeout_seconds: 5
  uncertainty_timeout_seconds: 10
  report_generation_timeout_seconds: 10
  cache_ttl_seconds: 300
  batch_size: 1000
  parallel_engines: 4

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 5
