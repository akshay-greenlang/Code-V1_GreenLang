# -----------------------------------------------------------------------------
# Pack Summary
# -----------------------------------------------------------------------------
pack_summary:
  total_agents: 50
  mrv_agents: 30
  data_agents: 10
  foundation_agents: 10
  pack_engines: 8
  pack_workflows: 8
  pack_templates: 8
  pack_integrations: 10

# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles
# -----------------------------------------------------------------------------
presets:
  product_presets:
    - id: asset_manager
      display_name: "Asset Manager"
      description: >-
        Standard deployment for UCITS/AIF fund managers with Article 8 products.
        Full PAI calculation, taxonomy alignment ratio, DNSH assessment, good
        governance verification, and all three disclosure annexes. Optimized
        for multi-fund management with portfolio-level aggregation and
        fund-of-funds look-through support.
      config_file: "config/presets/asset_manager.yaml"

    - id: insurance
      display_name: "Insurance Undertaking"
      description: >-
        Deployment for insurance companies managing insurance-based investment
        products (IBIPs) classified as Article 8. Includes unit-linked fund
        look-through, with-profits fund treatment, and Solvency II alignment.
        Supports both life and non-life insurance product disclosure requirements.
      config_file: "config/presets/insurance.yaml"

    - id: bank
      display_name: "Credit Institution"
      description: >-
        Deployment for credit institutions offering Article 8 structured
        products, green bonds, and ESG-linked lending products. Integrates
        with EBA Pillar 3 ESG disclosures and GAR/BTAR calculations.
        Supports both retail and institutional product classifications.
      config_file: "config/presets/bank.yaml"

    - id: pension_fund
      display_name: "Pension Fund"
      description: >-
        Deployment for occupational pension schemes (IORPs) subject to SFDR.
        Focused on long-term sustainable investment, member communication,
        stewardship reporting, and IORP II Directive alignment. Includes
        entity-level PAI statement and product-level periodic reporting
        for defined contribution arrangements.
      config_file: "config/presets/pension_fund.yaml"

    - id: wealth_manager
      display_name: "Wealth Manager"
      description: >-
        Deployment for discretionary portfolio managers and MiFID investment
        firms. Focused on model portfolio classification, client suitability
        integration, MiFID II sustainability preference alignment, and
        bespoke mandate ESG reporting. Supports aggregated reporting across
        multiple client portfolios.
      config_file: "config/presets/wealth_manager.yaml"

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 32
    min_storage_gb: 200
    recommended_cpu_cores: 16
    recommended_memory_gb: 64
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 50
    recommended_connections: 100

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  pai_calculation:
    single_indicator_max_ms: 200
    all_18_indicators_max_seconds: 15
    entity_level_max_seconds: 30
    description: "PAI indicator calculation for portfolio and entity level"

  taxonomy_alignment:
    portfolio_ratio_max_seconds: 10
    look_through_max_seconds: 30
    description: "Taxonomy alignment ratio calculation for Article 8 products"

  carbon_footprint:
    waci_max_seconds: 5
    full_footprint_max_seconds: 15
    description: "Portfolio carbon footprint and WACI calculation"

  disclosure_generation:
    annex_ii_max_seconds: 20
    annex_iii_max_seconds: 15
    annex_iv_max_seconds: 25
    pai_statement_max_seconds: 30
    description: "Disclosure and report template generation"

  screening:
    universe_10000_max_seconds: 30
    single_check_max_ms: 50
    description: "Portfolio screening operations"

  eet_processing:
    import_max_seconds: 10
    export_max_seconds: 10
    description: "EET template import and export"

  api_latency:
    p50_ms: 50
    p95_ms: 200
    p99_ms: 1000

  availability:
    target_percent: 99.9
    description: "Standard availability target"
