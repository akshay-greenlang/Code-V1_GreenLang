# =============================================================================
# PACK-006 EUDR Starter Pack - Large Operator Preset
# =============================================================================
# For large operators (>500 employees, >EUR 150M turnover).
# Full deployment with all 7 commodities, maximum supply chain depth,
# comprehensive risk assessment, EU IS production integration, and
# advanced analytics. All EUDR agents enabled.
#
# Regulatory basis: Article 4 (Operator obligations), Articles 8-12
# (Due diligence system), no simplified DD eligibility.
# =============================================================================

# Operator configuration
operator:
  operator_type: "OPERATOR"
  company_size: "LARGE"

# All 7 commodities enabled with full CN code coverage
commodities:
  - commodity_type: "cattle"
    enabled: true
    priority: 3
    certification_schemes: []
  - commodity_type: "cocoa"
    enabled: true
    priority: 2
    certification_schemes: ["RAINFOREST_ALLIANCE", "UTZ", "FAIRTRADE"]
  - commodity_type: "coffee"
    enabled: true
    priority: 4
    certification_schemes: ["FOUR_C", "RAINFOREST_ALLIANCE", "UTZ"]
  - commodity_type: "oil_palm"
    enabled: true
    priority: 1
    certification_schemes: ["RSPO", "ISCC", "MSPO", "ISPO"]
  - commodity_type: "rubber"
    enabled: true
    priority: 5
    certification_schemes: ["FSC", "PEFC"]
  - commodity_type: "soya"
    enabled: true
    priority: 3
    certification_schemes: ["RTRS", "PROTERRA", "ISCC"]
  - commodity_type: "wood"
    enabled: true
    priority: 2
    certification_schemes: ["FSC", "PEFC", "SFI"]

# Geolocation - maximum precision and coverage
geolocation:
  coordinate_precision: 8
  polygon_max_vertices: 50000
  batch_size: 2000
  overlap_detection_enabled: true
  satellite_overlay_enabled: true

# Risk assessment - full weighted model
risk_assessment:
  country_weight: 0.35
  supplier_weight: 0.25
  commodity_weight: 0.20
  document_weight: 0.20
  thresholds:
    low_max: 20.0
    medium_max: 45.0
    high_max: 70.0
    critical_min: 70.0
  auto_escalation_enabled: true
  reassessment_interval_days: 60

# DDS - standard type, multi-commodity support
dds:
  dds_type: "STANDARD"
  auto_generate: false
  review_required: true
  template_version: "1.0"
  annex_ii_version: "2023"
  retention_years: 7
  include_supporting_documents: true
  multi_commodity_dds: true

# EU Information System - production mode
euis:
  sandbox_mode: false
  auth_type: "EIDAS"
  submission_retry_count: 5
  polling_interval_seconds: 30
  timeout_seconds: 180
  batch_submission_enabled: true

# Supply chain - deep multi-tier tracing
supply_chain:
  max_tier_depth: 5
  chain_of_custody_model: "IDENTITY_PRESERVED"
  trace_level: "lot"
  require_plot_linkage: true
  mixed_shipment_handling: "split"
  upstream_data_sharing: true

# Supplier management - large-scale
supplier:
  bulk_import_limit: 5000
  engagement_auto_reminders: true
  reminder_interval_days: 7
  data_completeness_threshold: 90
  require_certification_proof: true
  supplier_self_assessment: true
  auto_risk_flag: true

# Compliance - strict enforcement
compliance:
  rules_enabled:
    - "deforestation_free"
    - "legal_compliance"
    - "geolocation_required"
    - "cutoff_date_check"
    - "cn_code_classification"
    - "country_risk_assessment"
    - "supplier_risk_assessment"
    - "dds_completeness"
    - "document_authentication"
    - "chain_of_custody"
    - "multi_tier_verification"
    - "certification_validation"
    - "temporal_analysis"
    - "protected_area_check"
  compliance_score_threshold: 85
  simplified_dd_enabled: true
  penalty_tracking: true

# Cutoff date - strict with satellite verification
cutoff_date:
  evidence_required: true
  temporal_buffer_days: 0
  satellite_verification_enabled: true
  satellite_sources:
    - "global_forest_watch"
    - "copernicus"
    - "glad_alerts"
    - "planet_labs"
    - "maxar"
  min_satellite_resolution_m: 10

# Reporting - comprehensive
reporting:
  dashboard_refresh_interval_seconds: 120
  report_formats: ["pdf", "html", "json", "csv", "xml"]
  auto_generate_quarterly: true
  auto_generate_annual: true
  include_risk_heatmap: true
  include_supplier_scorecard: true
  executive_summary_enabled: true

# Agent overrides - all enabled for large operators
agent_overrides:
  AGENT-EUDR-015:
    enabled: true       # Mobile data collector enabled
    config_overrides:
      offline_mode: true
      gps_auto_capture: true

  AGENT-EUDR-012:
    config_overrides:
      ocr_enabled: true
      fraud_detection: true

  AGENT-EUDR-017:
    config_overrides:
      scoring_model: "enterprise_v2"
      monitoring_frequency: "weekly"
