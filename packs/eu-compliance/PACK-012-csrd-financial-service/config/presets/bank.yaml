# =============================================================================
# PACK-012 CSRD Financial Service Pack - Credit Institution (Bank) Preset
# =============================================================================
# Full configuration for CRR-regulated credit institutions. Enables GAR
# (mandatory), BTAR (voluntary), Pillar 3 ESG (mandatory for large
# institutions), PCAF financed emissions, NGFS climate stress testing, and
# SBTi FI target tracking. Includes all EBA templates and cross-regulation
# alignment with SFDR, EU Taxonomy, and CSRD/ESRS.
#
# Typical use cases:
#   - Large universal banks with diverse loan and investment portfolios
#   - Retail banks with significant mortgage and consumer lending exposure
#   - Corporate banks with concentrated sector exposures
#   - Banks subject to ECB/SSM direct supervision
# =============================================================================

# --- Institution Details ---
institution_type: "BANK"
institution_name: ""
lei_code: ""
reporting_currency: "EUR"
reporting_period_start: null
reporting_period_end: null
consolidation_scope: "GROUP"

# --- PCAF Financed Emissions ---
pcaf:
  enabled: true
  enabled_asset_classes:
    - "LISTED_EQUITY_CORPORATE_BONDS"
    - "BUSINESS_LOANS_UNLISTED_EQUITY"
    - "PROJECT_FINANCE"
    - "COMMERCIAL_REAL_ESTATE"
    - "MORTGAGES"
    - "MOTOR_VEHICLE_LOANS"
  include_scope_1: true
  include_scope_2: true
  include_scope_3: true
  min_data_quality_score: 5
  target_data_quality_score: 3
  estimation_enabled: true
  estimation_methodology: "SECTOR_AVERAGE"
  emission_factor_source: "PCAF_DATABASE"
  emission_factor_vintage_year: 2024
  attribution_method: "OUTSTANDING_DIVIDED_BY_EVIC"
  sector_aggregation_code: "NACE_REV2"
  year_over_year_tracking: true
  portfolio_carbon_footprint: true
  waci_enabled: true
  data_quality_improvement_plan: true

# --- GAR/BTAR Configuration ---
gar_btar:
  gar_enabled: true
  btar_enabled: true
  gar_scopes:
    - "TURNOVER"
    - "CAPEX"
    - "OPEX"
  exposure_categories:
    - "FINANCIAL_CORPORATES"
    - "NON_FINANCIAL_CORPORATES"
    - "HOUSEHOLDS_MORTGAGES"
    - "HOUSEHOLDS_MOTOR_VEHICLE"
    - "LOCAL_GOVERNMENTS"
  exclude_sovereign_central_bank: true
  exclude_trading_book: true
  flow_gar_enabled: true
  stock_gar_enabled: true
  btar_estimation_method: "SECTOR_PROXY"
  btar_confidence_interval: true
  taxonomy_environmental_objectives:
    - "CLIMATE_MITIGATION"
    - "CLIMATE_ADAPTATION"
    - "WATER"
    - "CIRCULAR_ECONOMY"
    - "POLLUTION_PREVENTION"
    - "BIODIVERSITY"
  nace_sector_mapping_enabled: true
  pillar3_template_output: true

# --- Insurance (disabled for banks) ---
insurance:
  enabled: false

# --- Climate Risk Scoring ---
climate_risk:
  enabled: true
  enabled_scenarios:
    - "NET_ZERO_2050"
    - "BELOW_2C"
    - "DELAYED_TRANSITION"
    - "NDCS"
    - "DIVERGENT_NET_ZERO"
    - "CURRENT_POLICIES"
  physical_risk_enabled: true
  transition_risk_enabled: true
  physical_hazards:
    - "FLOOD"
    - "WILDFIRE"
    - "STORM"
    - "HEATWAVE"
    - "SEA_LEVEL_RISE"
    - "DROUGHT"
  transition_channels:
    - "POLICY_LEGAL"
    - "TECHNOLOGY"
    - "MARKET"
    - "REPUTATION"
    - "STRANDED_ASSETS"
  time_horizons_years: [5, 15, 30]
  ecb_ssm_compatible: true
  eba_exercise_compatible: true
  expected_credit_loss_impact: true
  sector_heatmap_enabled: true
  geography_heatmap_enabled: true
  pillar3_template_4_output: true

# --- Pillar 3 ESG Disclosures ---
pillar3:
  enabled: true
  enabled_templates:
    - "TEMPLATE_1"
    - "TEMPLATE_2"
    - "TEMPLATE_3"
    - "TEMPLATE_4"
    - "TEMPLATE_5"
    - "TEMPLATE_7"
    - "TEMPLATE_8"
    - "TEMPLATE_9"
    - "TEMPLATE_10"
  large_institution: false
  total_assets_eur_bn: null
  reporting_frequency: "SEMI_ANNUAL"
  xbrl_output: true
  corep_finrep_cross_validation: true
  qualitative_narrative_enabled: true

# --- FS Double Materiality ---
materiality:
  enabled: true
  esrs_topics:
    - "E1"
    - "E2"
    - "E3"
    - "E4"
    - "E5"
    - "S1"
    - "S2"
    - "S3"
    - "S4"
    - "G1"
  impact_channels:
    - "LENDING"
    - "INVESTING"
    - "ADVISORY"
  financial_materiality_enabled: true
  impact_materiality_enabled: true
  stakeholder_engagement_required: true
  materiality_threshold_financial: "MEDIUM"
  materiality_threshold_impact: "MEDIUM"
  weight_by_exposure_size: true
  generate_iro1_documentation: true

# --- Transition Plan ---
transition_plan:
  enabled: true
  sbti_fi_aligned: true
  sbti_method: "SDA"
  target_years: [2025, 2030, 2035, 2040, 2050]
  sector_targets_enabled: true
  priority_sectors:
    - "POWER_GENERATION"
    - "OIL_GAS"
    - "TRANSPORT"
    - "STEEL"
    - "CEMENT"
    - "REAL_ESTATE"
    - "AGRICULTURE"
  operational_emissions_target: true
  financed_emissions_target: true
  client_engagement_strategy: true
  fossil_fuel_phasedown: true
  capital_allocation_alignment: true
  governance_integration: true
  temperature_alignment_target: 1.5

# --- SBTi FI ---
sbti_fi:
  enabled: true
  commitment_status: "COMMITTED"
  target_type: "NEAR_TERM"
  portfolio_coverage_target_pct: 67.0
  engagement_threshold_pct: 50.0
  temperature_rating_method: true
  sda_sectors_enabled: true

# --- Data Quality ---
data_quality:
  pcaf_score_tracking: true
  min_coverage_pct: 70.0
  allow_sector_proxies: true
  proxy_usage_cap_pct: 30.0
  require_audited_emissions: false
  data_quality_improvement_roadmap: true
  stale_data_threshold_days: 365

# --- Disclosure ---
disclosure:
  esrs_chapter_enabled: true
  pillar3_package_enabled: true
  pcaf_report_enabled: true
  gar_btar_report_enabled: true
  climate_risk_report_enabled: true
  sbti_fi_report_enabled: true
  dashboard_enabled: true
  output_formats:
    - "PDF"
    - "XLSX"
  xbrl_tagging: true
  multi_language_support: false
  supported_languages: ["en"]
  review_workflow_enabled: true
  watermark_draft: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  external_audit_export: true