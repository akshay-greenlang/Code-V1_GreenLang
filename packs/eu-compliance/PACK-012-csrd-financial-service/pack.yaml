# =============================================================================
# PACK-012: CSRD Financial Service Pack
# GreenLang EU Compliance Pack for CSRD Financial Institution Sector Disclosures
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for CSRD compliance tailored specifically to financial
# institutions. Financial services companies face unique disclosure requirements
# under ESRS, including financed emissions (PCAF), Green Asset Ratio (GAR),
# Banking Book Taxonomy Alignment Ratio (BTAR), insurance underwriting
# emissions, climate risk stress testing (NGFS scenarios), EBA Pillar 3 ESG
# disclosures, and financial sector double materiality assessment. This pack
# bundles all required calculation engines, regulatory templates, and cross-
# regulation bridges to produce a unified compliance output.
#
# Key Capabilities:
#   - Financed emissions calculation per PCAF Global Standard (6 asset classes)
#   - Insurance underwriting emissions calculation per PCAF extension
#   - Green Asset Ratio (GAR) computation per EBA ITS (turnover, CapEx, OpEx)
#   - Banking Book Taxonomy Alignment Ratio (BTAR) computation
#   - Climate risk scoring (physical + transition) per NGFS scenarios
#   - Financial sector double materiality assessment (ESRS E1-E5, S1-S4, G1)
#   - Financial sector transition plan generation per ESRS E1
#   - EBA Pillar 3 ESG risk disclosure templates (CRR Article 449a)
#   - SBTi Financial Institutions target-setting integration
#   - Cross-regulation alignment (SFDR, EU Taxonomy, Solvency II)
#
# Regulatory References:
#   - CSRD: Directive (EU) 2022/2464
#   - ESRS: Delegated Regulation (EU) 2023/2772 (Set 1)
#   - EU Taxonomy: Regulation (EU) 2020/852
#   - CRR/CRD VI: Regulation (EU) 575/2013 (as amended), Article 449a
#   - SFDR: Regulation (EU) 2019/2088
#   - Solvency II: Directive 2009/138/EC (as amended)
#   - PCAF Global GHG Accounting Standard for Financial Industry (v3)
#   - SBTi Financial Institutions Framework (v1.1)
#   - EBA ITS on Pillar 3 ESG Disclosures (2022/01, 2024 update)
#
# Financial Institution Types Supported:
#   - Credit institutions (banks) - GAR, BTAR, Pillar 3
#   - Insurance / reinsurance undertakings - Solvency II, underwriting emissions
#   - Asset management companies - SFDR bridge, WACI, portfolio alignment
#   - Investment firms (MiFID II) - product governance, ESG preferences
#   - Pension funds (IORP II) - stewardship, long-horizon climate risk
#   - Financial conglomerates - multi-entity consolidation, cross-sector
#
# Version History:
#   1.0.0 - Initial release (2026-03-15)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-012-csrd-financial-service
  version: "1.0.0"
  display_name: "CSRD Financial Service Pack"
  description: >-
    Comprehensive GreenLang deployment pack for CSRD compliance by financial
    institutions. Includes 8 engines for financed emissions (PCAF), insurance
    underwriting emissions, Green Asset Ratio (GAR), Banking Book Taxonomy
    Alignment Ratio (BTAR), climate risk scoring, financial sector double
    materiality, transition plan generation, and EBA Pillar 3 ESG disclosures.
    Bundles all 30 MRV agents for operational emissions, 20 data intake/quality
    agents, 10 foundation agents, and 9 financial sector-specific agents plus
    2 climate risk agents and 1 policy guard agent. Supports bank, insurance,
    asset manager, investment firm, pension fund, and conglomerate institution
    types with tailored presets and regulatory template packages.
  category: eu-compliance
  tier: sector-specific
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-15"
  support_tier: enterprise
  documentation_url: "https://docs.greenlang.io/packs/csrd-financial-service"
  changelog_url: "https://docs.greenlang.io/packs/csrd-financial-service/changelog"

  tags:
    - csrd
    - financial-services
    - esrs
    - financed-emissions
    - pcaf
    - green-asset-ratio
    - gar
    - btar
    - pillar-3
    - eba
    - climate-risk
    - ngfs
    - insurance
    - solvency-ii
    - sfdr
    - eu-taxonomy
    - transition-plan
    - double-materiality
    - sbti-fi
    - banking
    - asset-management
    - pension-fund
    - eu-compliance
    - sector-specific

  regulation:
    primary:
      name: "Corporate Sustainability Reporting Directive"
      reference: "(EU) 2022/2464"
      effective_date: "2024-01-01"
      description: >-
        The CSRD mandates sustainability reporting for large undertakings and
        listed companies under the European Sustainability Reporting Standards
        (ESRS). Financial institutions face additional sector-specific disclosure
        requirements covering financed emissions, taxonomy alignment ratios,
        climate risk exposure, and prudential ESG integration.
    secondary:
      - name: "European Sustainability Reporting Standards (Set 1)"
        reference: "(EU) 2023/2772"
        effective_date: "2024-01-01"
      - name: "EU Taxonomy Regulation"
        reference: "(EU) 2020/852"
        effective_date: "2020-07-12"
      - name: "Capital Requirements Regulation (CRR/CRD VI)"
        reference: "(EU) 575/2013 as amended"
        effective_date: "2014-01-01"
        articles: [449, "449a"]
      - name: "Sustainable Finance Disclosure Regulation"
        reference: "(EU) 2019/2088"
        effective_date: "2021-03-10"
      - name: "Solvency II Directive"
        reference: "2009/138/EC as amended"
        effective_date: "2016-01-01"
      - name: "PCAF Global GHG Accounting Standard"
        reference: "v3 (2024)"
        effective_date: "2020-11-18"
      - name: "SBTi Financial Institutions Framework"
        reference: "v1.1"
        effective_date: "2024-01-01"
      - name: "EBA ITS on Pillar 3 ESG Disclosures"
        reference: "EBA/ITS/2022/01 (2024 update)"
        effective_date: "2023-06-28"

  compliance_references:
    - id: "CSRD"
      name: "Corporate Sustainability Reporting Directive"
      regulation: "Directive (EU) 2022/2464"
      effective_date: "2024-01-01"
      description: >-
        Framework directive requiring in-scope undertakings to report under ESRS.
        Financial institutions are in-scope from FY2024 (large PIEs) or FY2025
        (large non-PIE financial undertakings). Requires double materiality
        assessment, transition plan disclosure, and value chain coverage.

    - id: "ESRS"
      name: "European Sustainability Reporting Standards"
      regulation: "Delegated Regulation (EU) 2023/2772"
      effective_date: "2024-01-01"
      description: >-
        Set 1 cross-cutting and topical standards: ESRS 1 (general requirements),
        ESRS 2 (general disclosures), ESRS E1-E5 (environmental), ESRS S1-S4
        (social), ESRS G1 (governance). Financial institutions apply these plus
        upcoming sector-specific ESRS for financial services. ESRS E1 is
        particularly critical for financed emissions and transition plans.

    - id: "EU_TAXONOMY"
      name: "EU Taxonomy Regulation"
      regulation: "Regulation (EU) 2020/852"
      effective_date: "2020-07-12"
      description: >-
        Classification system for environmentally sustainable economic activities.
        Financial institutions must disclose their Green Asset Ratio (GAR) showing
        the proportion of taxonomy-aligned assets. Banks compute GAR for on-
        balance-sheet exposures; insurers compute for investment portfolios and
        underwriting. The BTAR extends this to the banking book.

    - id: "CRR_CRD_VI"
      name: "Capital Requirements Regulation / CRD VI"
      regulation: "Regulation (EU) 575/2013 as amended"
      effective_date: "2014-01-01"
      description: >-
        Article 449a of CRR requires credit institutions to disclose ESG risks.
        CRD VI amendments integrate ESG risk management into the prudential
        framework. EBA ITS specify templates for Pillar 3 ESG risk disclosures
        covering transition risk, physical risk, mitigating actions, and key
        performance indicators.

    - id: "SFDR"
      name: "Sustainable Finance Disclosure Regulation"
      regulation: "Regulation (EU) 2019/2088"
      effective_date: "2021-03-10"
      description: >-
        SFDR requires financial market participants and financial advisers to
        make sustainability-related disclosures. Financial institutions subject
        to both CSRD and SFDR must ensure consistency between ESRS disclosures
        and SFDR product-level disclosures (Articles 8/9 products).

    - id: "SOLVENCY_II"
      name: "Solvency II Directive"
      regulation: "Directive 2009/138/EC as amended"
      effective_date: "2016-01-01"
      description: >-
        Insurance prudential framework. Amended to integrate sustainability
        risk in ORSA (Own Risk and Solvency Assessment), investment policy,
        and climate scenario analysis. Insurance undertakings must assess
        climate-related risks across both assets and liabilities sides.

    - id: "PCAF"
      name: "PCAF Global GHG Accounting Standard"
      regulation: "PCAF v3 (2024)"
      effective_date: "2020-11-18"
      description: >-
        The Partnership for Carbon Accounting Financials Global Standard
        provides harmonized methods to measure and disclose GHG emissions
        associated with loans, investments, and insurance portfolios.
        Covers 6 asset classes with data quality scoring (1-5).

    - id: "SBTI_FI"
      name: "SBTi Financial Institutions Framework"
      regulation: "SBTi FI v1.1"
      effective_date: "2024-01-01"
      description: >-
        Science Based Targets initiative framework for financial institutions
        to set decarbonization targets aligned with Paris Agreement goals.
        Covers portfolio alignment, sectoral decarbonization approach (SDA),
        and temperature rating methodology.

    - id: "EBA_PILLAR3_ITS"
      name: "EBA ITS on Pillar 3 ESG Disclosures"
      regulation: "EBA/ITS/2022/01 (2024 update)"
      effective_date: "2023-06-28"
      description: >-
        EBA Implementing Technical Standards specifying uniform disclosure
        formats and templates for ESG risk information under CRR Article 449a.
        Templates cover: qualitative information on ESG risks (Template 1),
        scope 3 financed emissions by sector (Template 2), exposures by
        physical risk (Template 4), GAR (Template 7-10), BTAR (Template 10).

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines (8 FS-specific engines)
  # ===========================================================================
  engines:
    - id: financed_emissions
      name: "Financed Emissions Engine"
      description: >-
        Calculates financed GHG emissions per PCAF Global Standard v3 across
        all six asset classes: listed equity and corporate bonds, business loans
        and unlisted equity, project finance, commercial real estate, mortgages,
        and motor vehicle loans. Implements attribution factor methodology
        (outstanding amount / total equity + debt), handles data quality scoring
        (score 1 = verified, score 5 = estimated), supports absolute and
        intensity metrics (tCO2e, tCO2e/EUR million), Scope 1+2+3 breakdowns,
        sector-level aggregation (NACE Rev.2), and year-over-year trend analysis.
        Zero-hallucination: all emission factors from PCAF database lookups,
        attribution from deterministic formula, no LLM in calculation path.
      required: true

    - id: insurance_underwriting
      name: "Insurance Underwriting Emissions Engine"
      description: >-
        Calculates insurance-associated emissions for underwriting portfolios
        per PCAF Insurance-Associated Emissions Standard. Covers commercial
        lines and personal lines across property, casualty, specialty, and
        life/health. Implements premium-based and claims-based attribution
        methods, handles reinsurance ceding adjustments, supports gross and
        net emission calculations, and computes insurance carbon footprint
        intensity metrics. For Solvency II reporting, integrates with ORSA
        climate scenario modules. Zero-hallucination: deterministic premium
        attribution ratios and emission factor lookups only.
      required: true

    - id: green_asset_ratio
      name: "Green Asset Ratio (GAR) Engine"
      description: >-
        Computes the Green Asset Ratio per EBA ITS templates (Templates 7-10)
        for credit institutions. Calculates the proportion of taxonomy-aligned
        on-balance-sheet exposures across three KPIs: turnover-based GAR,
        CapEx-based GAR, and OpEx-based GAR. Handles all exposure categories:
        financial corporates, non-financial corporates, households (mortgages,
        motor vehicle loans), local governments, and collateral-based exposures.
        Applies NACE sector mapping, manages sovereign and central bank
        exclusions, and computes flow vs. stock GAR. Supports voluntary BTAR
        calculation for banking book exposures not covered by mandatory GAR.
        Zero-hallucination: deterministic ratio calculations from exposure
        and taxonomy alignment data, no LLM inference.
      required: true

    - id: btar_calculator
      name: "BTAR Calculator Engine"
      description: >-
        Computes the Banking Book Taxonomy Alignment Ratio (BTAR) as a
        complementary voluntary KPI to GAR. BTAR covers banking book
        exposures not captured by mandatory GAR, including SME exposures
        without taxonomy reporting, interbank lending, and trading book
        positions where applicable. Implements EBA-recommended estimation
        methodologies for counterparties without published taxonomy alignment
        data, applies NACE-sector proxies, and generates confidence intervals
        for estimated alignment. Supports both top-down (sector average) and
        bottom-up (counterparty-level) estimation approaches.
        Zero-hallucination: deterministic calculation with clearly flagged
        estimation layers, full provenance for every data point.
      required: true

    - id: climate_risk_scoring
      name: "Climate Risk Scoring Engine"
      description: >-
        Scores portfolio-level climate risk across physical and transition
        dimensions using NGFS scenarios (Net Zero 2050, Below 2C, Delayed
        Transition, NDCs, Divergent Net Zero, Current Policies). Computes
        physical risk exposure by hazard type: acute (flood, wildfire, storm,
        heatwave) and chronic (sea level rise, drought, temperature shift).
        Computes transition risk by channel: policy/legal, technology, market,
        reputation, and stranded assets. Generates risk heatmaps by sector
        (NACE), geography, and time horizon (short 0-5y, medium 5-15y, long
        15-30y). Supports ECB/SSM climate stress test scenarios and EBA
        one-off climate risk exercise parameters. Zero-hallucination: risk
        scores from lookup tables and deterministic scoring matrices, no LLM.
      required: true

    - id: fs_double_materiality
      name: "FS Double Materiality Engine"
      description: >-
        Performs double materiality assessment tailored to financial sector
        specificities per ESRS 1 (IRO-1). Evaluates financial materiality
        (risks and opportunities from sustainability matters) and impact
        materiality (impacts on people and environment through lending,
        investing, and underwriting). Handles indirect impacts via financed
        activities (Scope 3 Category 15), applies financial sector impact
        channels (lending decisions, investment allocation, insurance
        coverage, advisory influence), and weights materiality by exposure
        size. Generates sector-specific sustainability matters list covering
        climate (E1), pollution (E2), biodiversity (E3), water (E4),
        circular economy (E5), own workforce (S1), value chain workers (S2),
        affected communities (S3), consumers (S4), and governance (G1).
        LLM-assisted: materiality scoring uses LLM for qualitative assessment
        of stakeholder perspectives; quantitative thresholds are deterministic.
      required: true

    - id: fs_transition_plan
      name: "FS Transition Plan Engine"
      description: >-
        Generates financial institution transition plans per ESRS E1
        (E1-1 Transition Plan) with financial sector extensions. Covers
        decarbonization targets for financed emissions by sector (aligned
        with SBTi FI sectoral decarbonization approach), operational
        emissions reduction targets, client engagement strategy, green
        product development roadmap, fossil fuel exposure phase-down
        schedule, capital allocation alignment with Paris goals, and
        governance integration of transition objectives. Generates
        milestone tracking with interim targets (2025, 2030, 2035, 2040,
        2050). LLM-assisted: narrative generation for strategy description;
        all targets and metrics are deterministic calculations.
      required: true

    - id: pillar3_esg
      name: "Pillar 3 ESG Disclosure Engine"
      description: >-
        Generates EBA Pillar 3 ESG risk disclosures per CRR Article 449a
        and EBA ITS. Produces all required templates: Template 1 (qualitative
        ESG risk information), Template 2 (Scope 3 financed emissions by
        NACE sector), Template 3 (exposures to top carbon-intensive firms),
        Template 4 (exposures by physical risk, acute and chronic), Template 5
        (mitigating actions: green lending, ESG bonds, insurance products),
        Template 7-10 (GAR KPIs and BTAR). Handles large institution
        reporting requirements (total assets > EUR 750bn for extended
        Template 2/3 requirements). Zero-hallucination: all template
        population from deterministic aggregation of exposure data, risk
        scores, and taxonomy alignment ratios.
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 FS workflows)
  # ===========================================================================
  workflows:
    - id: financed_emissions_workflow
      name: "Financed Emissions Calculation Workflow"
      description: >-
        5-phase workflow: Portfolio Data Ingestion -> Counterparty Matching
        -> PCAF Attribution Calculation -> Data Quality Scoring -> Report
        Generation. Calculates financed emissions across all asset classes
        with PCAF data quality scores, generates sector-level aggregations,
        and produces ESRS E1 financed emissions disclosures plus Pillar 3
        Template 2 data. Supports incremental recalculation when portfolio
        positions change.
      schedule: "quarterly"
      estimated_duration_minutes: 180
      phases: 5

    - id: gar_btar_workflow
      name: "GAR/BTAR Calculation Workflow"
      description: >-
        6-phase workflow: Exposure Data Extraction -> NACE Classification
        -> Taxonomy Alignment Lookup -> GAR Ratio Calculation -> BTAR
        Estimation -> EBA Template Population. Computes Green Asset Ratio
        across turnover, CapEx, and OpEx bases for all eligible exposure
        categories. Extends to BTAR for non-covered banking book positions
        with estimation methodologies. Produces Pillar 3 Templates 7-10.
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 6

    - id: insurance_emissions_workflow
      name: "Insurance Emissions Workflow"
      description: >-
        4-phase workflow: Underwriting Portfolio Extraction -> Premium/Claims
        Attribution -> Emission Factor Application -> Solvency II Integration.
        Calculates insurance-associated emissions for underwriting portfolios,
        handles reinsurance adjustments, and feeds into ORSA climate scenario
        analysis. Generates insurer-specific ESRS E1 disclosures.
      schedule: "annual"
      estimated_duration_minutes: 120
      phases: 4

    - id: climate_stress_test
      name: "Climate Stress Test Workflow"
      description: >-
        5-phase workflow: Scenario Selection (NGFS) -> Exposure Mapping ->
        Physical Risk Assessment -> Transition Risk Assessment -> Stress
        Test Report Generation. Runs portfolio-level climate stress tests
        using NGFS scenarios, produces ECB/SSM-compatible output, generates
        risk heatmaps by sector and geography, and calculates expected
        credit loss adjustments under adverse climate scenarios.
      schedule: "annual"
      estimated_duration_minutes: 300
      phases: 5

    - id: fs_materiality
      name: "FS Double Materiality Workflow"
      description: >-
        5-phase workflow: Stakeholder Identification -> Impact Channel
        Mapping -> Financial Risk Assessment -> Materiality Matrix
        Generation -> ESRS Topic Determination. Performs double materiality
        assessment with financial sector impact channels (lending, investing,
        underwriting, advisory). Determines which ESRS topics (E1-E5, S1-S4,
        G1) are material and requires detailed disclosure. Outputs IRO-1
        assessment documentation.
      schedule: "annual"
      estimated_duration_minutes: 180
      phases: 5

    - id: transition_plan
      name: "Transition Plan Workflow"
      description: >-
        4-phase workflow: Baseline Emissions Inventory -> Target Setting
        (SBTi FI alignment) -> Action Plan Development -> Milestone
        Tracking Setup. Generates ESRS E1-1 transition plan with sector-
        specific decarbonization pathways, interim targets, capital
        allocation plans, and governance integration. Produces board-
        ready transition plan document with quantified milestones.
      schedule: "annual"
      estimated_duration_minutes: 240
      phases: 4

    - id: pillar3_reporting
      name: "Pillar 3 ESG Reporting Workflow"
      description: >-
        5-phase workflow: Data Aggregation -> Template Population ->
        Cross-Validation -> Review & Approval -> Publication. Generates
        all EBA Pillar 3 ESG disclosure templates (Templates 1-10) from
        upstream engine outputs (financed emissions, GAR/BTAR, climate
        risk scores). Cross-validates against COREP/FINREP data for
        consistency. Handles semi-annual and annual reporting cycles.
      schedule: "semi_annual"
      estimated_duration_minutes: 180
      phases: 5

    - id: regulatory_integration
      name: "Regulatory Integration Workflow"
      description: >-
        3-phase workflow: Cross-Regulation Mapping -> Consistency Check
        -> Unified Dashboard Update. Ensures consistency across CSRD/ESRS,
        Pillar 3, SFDR, Taxonomy, and Solvency II disclosures. Maps
        data points across regulatory requirements, identifies
        inconsistencies, and generates a unified regulatory compliance
        dashboard. Monitors for regulatory changes affecting financial
        institution reporting obligations.
      schedule: "on_change"
      estimated_duration_minutes: 60
      phases: 3

  # ===========================================================================
  # Templates - Pre-built report and output templates (8 FS templates)
  # ===========================================================================
  templates:
    - id: pcaf_report
      display_name: "PCAF Financed Emissions Report"
      description: >-
        PCAF-aligned financed emissions report with asset class breakdown,
        data quality scores (1-5), sector-level aggregations (NACE Rev.2),
        Scope 1+2+3 split, year-over-year trend analysis, and portfolio
        carbon footprint intensity metrics. Compliant with PCAF Global
        Standard v3 reporting requirements.
      format: "pdf"
      template_file: "templates/pcaf_report.jinja2"
      enabled: true

    - id: gar_btar_report
      display_name: "GAR/BTAR Disclosure Report"
      description: >-
        EBA ITS-compliant Green Asset Ratio and Banking Book Taxonomy
        Alignment Ratio disclosure. Populates Templates 7-10 with turnover,
        CapEx, and OpEx GAR calculations, exposure category breakdowns,
        NACE sector mapping, flow vs. stock ratios, and BTAR estimation
        methodology documentation. Includes environmental objective
        breakdown per EU Taxonomy.
      format: "xlsx"
      template_file: "templates/gar_btar_report.jinja2"
      enabled: true

    - id: pillar3_esg
      display_name: "Pillar 3 ESG Disclosure Package"
      description: >-
        Complete EBA Pillar 3 ESG disclosure package containing all
        required templates (1-10). Template 1: qualitative ESG risk
        information; Template 2: financed emissions by sector; Template 3:
        top carbon-intensive exposures; Template 4: physical risk exposures;
        Template 5: mitigating actions; Templates 7-10: GAR/BTAR. Formatted
        per EBA ITS specifications with XBRL tagging support.
      format: "xlsx"
      template_file: "templates/pillar3_esg.jinja2"
      enabled: true

    - id: climate_risk_report
      display_name: "Climate Risk Assessment Report"
      description: >-
        Climate risk assessment report with NGFS scenario analysis results,
        physical and transition risk heatmaps, sector-geography risk matrix,
        expected credit loss impact estimates, stressed capital ratios, and
        time-horizon analysis (short/medium/long term). Compatible with
        ECB/SSM climate stress test reporting format.
      format: "pdf"
      template_file: "templates/climate_risk_report.jinja2"
      enabled: true

    - id: fs_esrs_chapter
      display_name: "Financial Services ESRS Chapter"
      description: >-
        ESRS disclosure chapter tailored to financial institutions. Covers
        ESRS E1 (climate, with financed emissions and transition plan),
        ESRS E2-E5 (other environmental topics as material), ESRS S1-S4
        (social topics), and ESRS G1 (governance). Includes financial
        sector-specific metrics, impact channel descriptions, and cross-
        references to Pillar 3 and SFDR disclosures. Structured for
        direct inclusion in the management report.
      format: "pdf"
      template_file: "templates/fs_esrs_chapter.jinja2"
      enabled: true

    - id: financed_emissions_dashboard
      display_name: "Financed Emissions Dashboard"
      description: >-
        Interactive dashboard displaying real-time financed emissions
        portfolio view. Includes asset class treemap, sector heatmap,
        data quality distribution chart, Scope 1/2/3 waterfall, top 20
        counterparty emissions table, year-over-year trend lines,
        target vs. actual progress gauge, and SBTi FI alignment tracker.
      format: "html"
      template_file: "templates/financed_emissions_dashboard.jinja2"
      enabled: true

    - id: insurance_esg
      display_name: "Insurance ESG Report"
      description: >-
        Insurance undertaking ESG report combining underwriting emissions,
        investment portfolio alignment, Solvency II climate scenario
        results, ORSA sustainability integration, and physical risk
        exposure analysis for insured assets. Includes Solvency II
        specific disclosures and EIOPA prudential sustainability guidance.
      format: "pdf"
      template_file: "templates/insurance_esg.jinja2"
      enabled: true

    - id: sbti_fi_report
      display_name: "SBTi Financial Institutions Report"
      description: >-
        SBTi Financial Institutions target-setting and progress report.
        Includes portfolio temperature alignment scores, sectoral
        decarbonization approach (SDA) target tracking, portfolio coverage
        metrics, engagement funnel analysis, and Paris-aligned capital
        allocation assessment. Compatible with SBTi FI v1.1 reporting
        template.
      format: "pdf"
      template_file: "templates/sbti_fi_report.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (10 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: >-
        14-phase master pipeline: Health Check -> Configuration -> Portfolio
        Data Ingestion -> Counterparty Enrichment -> Financed Emissions
        Calculation -> Insurance Emissions (if applicable) -> GAR/BTAR
        Calculation -> Climate Risk Scoring -> Double Materiality Assessment
        -> Transition Plan Generation -> Pillar 3 Template Population ->
        ESRS Disclosure Assembly -> Cross-Regulation Validation -> Audit
        Trail Generation. Orchestrates all financial services compliance
        phases with parallel execution where possible and dependency
        management between engines.
      required: true

    - id: csrd_pack_bridge
      name: "CSRD Pack Bridge"
      description: >-
        Connects to PACK-001/002/003 CSRD Packs (Starter/Professional/
        Enterprise) for shared ESRS general disclosure components. Reuses
        ESRS 2 general disclosures, governance structures, strategy
        descriptions, and metrics frameworks. Enables seamless upgrade
        from general CSRD compliance to financial sector-specific pack
        without re-entering base ESRS configuration.
      required: true

    - id: sfdr_pack_bridge
      name: "SFDR Pack Bridge"
      description: >-
        Connects to PACK-010/011 SFDR Article 8/9 Packs for product-level
        disclosure consistency. Ensures CSRD entity-level disclosures align
        with SFDR product-level PAI indicators, taxonomy alignment ratios,
        and sustainable investment proportions. Shares PAI calculation
        infrastructure and benchmark alignment data between CSRD and SFDR
        reporting obligations.
      required: true

    - id: taxonomy_pack_bridge
      name: "Taxonomy Pack Bridge"
      description: >-
        Connects to PACK-008 EU Taxonomy Alignment Pack for activity-level
        taxonomy alignment data. Retrieves counterparty-level eligibility
        and alignment assessments, TSC compliance results, and DNSH/MS
        verification outcomes to feed GAR/BTAR calculations and ESRS
        taxonomy-related disclosures.
      required: true

    - id: mrv_investments_bridge
      name: "MRV Investments Bridge"
      description: >-
        Routes data from AGENT-MRV-028 (Investments Agent, Scope 3 Cat 15)
        and all 30 MRV agents for operational emissions. Maps counterparty
        emissions data to PCAF attribution calculations, supports data
        quality scoring, handles Scope 1+2+3 disaggregation, and provides
        emissions factor lookups for sector-based estimation. Critical
        bridge for financed emissions calculation.
      required: true

    - id: finance_agent_bridge
      name: "Finance Agent Bridge"
      description: >-
        Connects to 9 financial sector-specific agents for core banking,
        insurance, and investment data. Routes exposure data from loan
        management systems, portfolio positions from custody and PMS,
        insurance policy data from policy administration systems, and
        counterparty data from KYC/AML systems. Handles COREP/FINREP
        data alignment for Pillar 3 consistency checks.
      required: true

    - id: climate_risk_bridge
      name: "Climate Risk Bridge"
      description: >-
        Connects to 2 climate risk agents (AGENT-DATA-020 Climate Hazard
        Connector) and external NGFS scenario data providers. Routes
        physical hazard data (flood maps, wildfire risk, sea level
        projections), transition scenario parameters (carbon price paths,
        technology adoption curves), and stress test parameters from
        ECB/SSM/EBA exercises.
      required: true

    - id: eba_pillar3_bridge
      name: "EBA Pillar 3 Bridge"
      description: >-
        Connects to EBA reporting infrastructure for Pillar 3 ESG template
        submission. Handles XBRL taxonomy mapping for ESG templates, validates
        output against EBA validation rules, cross-references with COREP
        and FINREP submissions for data consistency, and manages the
        semi-annual/annual publication workflow.
      required: true

    - id: health_check
      name: "Health Check"
      description: >-
        24-category system verification covering all 8 engines, 72 agent
        dependencies, database connectivity, PCAF factor database currency,
        NGFS scenario data availability, EBA template version check, NACE
        classification tables, taxonomy alignment data freshness, SFDR
        bridge connectivity, and deployment readiness status.
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      description: >-
        14-step guided configuration wizard: Institution Type Selection
        (bank/insurance/asset_manager/investment_firm/pension_fund/
        conglomerate) -> Regulatory Scope (CSRD+Pillar3+SFDR+Solvency) ->
        Portfolio Data Source Connection -> Counterparty Database Setup ->
        PCAF Asset Class Configuration -> GAR/BTAR Scope Definition ->
        Climate Scenario Selection -> Materiality Preferences ->
        Transition Plan Parameters -> Pillar 3 Template Selection ->
        Cross-Regulation Mapping -> Reporting Calendar -> Disclosure
        Preferences -> Deployment Verification.
      required: false

  # ===========================================================================
  # Presets - Institution-type specific configurations (6 presets)
  # ===========================================================================
  presets:
    - id: bank
      name: "Credit Institution Preset"
      description: >-
        Full configuration for CRR-regulated credit institutions. Enables
        GAR (mandatory), BTAR (voluntary), Pillar 3 ESG (mandatory for
        large institutions), PCAF financed emissions, NGFS climate stress
        testing, and SBTi FI target tracking. Includes all EBA templates.
      institution_type: "BANK"
      enabled_engines:
        - financed_emissions
        - green_asset_ratio
        - btar_calculator
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
        - pillar3_esg
      file: "config/presets/bank.yaml"

    - id: insurance
      name: "Insurance Undertaking Preset"
      description: >-
        Configuration for Solvency II-regulated insurance and reinsurance
        undertakings. Enables underwriting emissions, investment portfolio
        alignment, ORSA climate integration, physical risk exposure for
        insured assets, and Solvency II prudential sustainability reporting.
      institution_type: "INSURANCE"
      enabled_engines:
        - financed_emissions
        - insurance_underwriting
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
      file: "config/presets/insurance.yaml"

    - id: asset_manager
      name: "Asset Management Preset"
      description: >-
        Configuration for UCITS management companies and AIFM. Enables
        PCAF financed emissions, portfolio carbon footprint (WACI), SFDR
        product-level alignment, sustainable investment screening, and
        SBTi FI portfolio coverage targets. Bridges to SFDR Packs for
        Article 8/9 product disclosures.
      institution_type: "ASSET_MANAGER"
      enabled_engines:
        - financed_emissions
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
      file: "config/presets/asset_manager.yaml"

    - id: investment_firm
      name: "Investment Firm Preset"
      description: >-
        Configuration for MiFID II investment firms. Enables ESG product
        governance, client ESG preference matching, portfolio alignment
        assessment, and limited Pillar 3 reporting (Class 2 firms). Lighter
        configuration focused on advisory and portfolio management services.
      institution_type: "INVESTMENT_FIRM"
      enabled_engines:
        - financed_emissions
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
      file: "config/presets/investment_firm.yaml"

    - id: pension_fund
      name: "Pension Fund Preset"
      description: >-
        Configuration for IORP II-regulated pension schemes. Enables long-
        horizon climate risk analysis (30+ year projections), stewardship
        and engagement tracking, TCFD-aligned scenario analysis, beneficiary
        interest alignment, and intergenerational equity assessment.
      institution_type: "PENSION_FUND"
      enabled_engines:
        - financed_emissions
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
      file: "config/presets/pension_fund.yaml"

    - id: conglomerate
      name: "Financial Conglomerate Preset"
      description: >-
        Configuration for financial conglomerates with mixed banking,
        insurance, and asset management operations. Enables all 8 engines,
        multi-entity consolidation, cross-sector GAR/BTAR, consolidated
        financed emissions, group-level transition plan, and inter-entity
        elimination rules.
      institution_type: "CONGLOMERATE"
      enabled_engines:
        - financed_emissions
        - insurance_underwriting
        - green_asset_ratio
        - btar_calculator
        - climate_risk_scoring
        - fs_double_materiality
        - fs_transition_plan
        - pillar3_esg
      file: "config/presets/conglomerate.yaml"

