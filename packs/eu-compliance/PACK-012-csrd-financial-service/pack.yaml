# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 72
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    financial_sector_agents: 9
    climate_agents: 2
    policy_agents: 1
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  portfolio_processing:
    max_counterparties: 50000
    target_duration_minutes: 30
    pcaf_calculation_per_counterparty_ms: 50
  gar_calculation:
    max_exposures: 100000
    target_duration_minutes: 45
  pillar3_template_generation:
    target_duration_minutes: 15
  climate_stress_test:
    max_scenarios: 6
    target_duration_minutes: 60
  cache_hit_ratio_target: 0.70
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with Chinese wall enforcement"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - fs_compliance_officer
    - fs_risk_analyst
    - fs_portfolio_manager
    - fs_sustainability_officer
    - fs_external_auditor
    - fs_admin