# =============================================================================
# PACK-007 EUDR Professional Pack - Multi-Commodity Professional Sector
# =============================================================================
# Professional multi-commodity setup with all 7 EUDR commodities enabled,
# cross-commodity analytics, unified risk framework, and global sourcing.
# =============================================================================

commodities:
  - commodity_type: "cattle"
    enabled: true
    priority: 2
    certification_schemes: []
    high_risk_origins: ["BRA", "ARG", "PRY", "BOL", "COL"]
    annual_volume_tonnes: 20000.0

  - commodity_type: "cocoa"
    enabled: true
    priority: 1
    certification_schemes: ["RAINFOREST_ALLIANCE", "UTZ", "FAIRTRADE"]
    high_risk_origins: ["CIV", "GHA", "CMR", "NGA"]
    annual_volume_tonnes: 10000.0

  - commodity_type: "coffee"
    enabled: true
    priority: 1
    certification_schemes: ["FOUR_C", "RAINFOREST_ALLIANCE", "FAIRTRADE"]
    high_risk_origins: ["BRA", "VNM", "COL", "IDN", "ETH"]
    annual_volume_tonnes: 8000.0

  - commodity_type: "oil_palm"
    enabled: true
    priority: 1
    certification_schemes: ["RSPO", "ISCC", "MSPO"]
    high_risk_origins: ["IDN", "MYS", "PNG", "COL"]
    annual_volume_tonnes: 50000.0

  - commodity_type: "rubber"
    enabled: true
    priority: 2
    certification_schemes: ["FSC", "PEFC"]
    high_risk_origins: ["THA", "IDN", "VNM", "MYS"]
    annual_volume_tonnes: 15000.0

  - commodity_type: "soya"
    enabled: true
    priority: 1
    certification_schemes: ["RTRS", "PROTERRA", "ISCC"]
    high_risk_origins: ["BRA", "ARG", "PRY", "BOL"]
    annual_volume_tonnes: 100000.0

  - commodity_type: "wood"
    enabled: true
    priority: 1
    certification_schemes: ["FSC", "PEFC", "SFI"]
    high_risk_origins: ["BRA", "COD", "IDN", "MYS", "PNG"]
    annual_volume_tonnes: 80000.0

geolocation:
  coordinate_precision: 7
  polygon_max_vertices: 50000
  batch_size: 1000

risk_assessment:
  country_weight: 0.30
  supplier_weight: 0.25
  commodity_weight: 0.25  # Higher weight for multi-commodity
  document_weight: 0.20

compliance:
  require_geolocation: true
  require_certification: false
  verification_level: "ENHANCED"
  data_quality_threshold: 0.85

advanced_geolocation:
  resolution_meters: 10
  temporal_periods: 5
  alert_systems: ["GLAD", "RADD"]

satellite_monitoring:
  providers: ["SENTINEL_1", "SENTINEL_2", "MODIS"]
  check_interval_hours: 12
  historical_months: 60

protected_areas:
  wdpa_enabled: true
  kba_enabled: true
  indigenous_check: true
  buffer_km: 10.0
  ramsar_check: true
  unesco_check: true

advanced_supply_chain:
  max_tier_depth: 5
  chain_of_custody_models: ["IDENTITY_PRESERVED", "SEGREGATED", "MASS_BALANCE", "CONTROLLED_SOURCES"]
  network_analysis: true
  diversification_scoring: true

supplier_benchmark:
  peer_group_min_size: 10
  scoring_dimensions: ["COMPLIANCE_SCORE", "DATA_QUALITY", "RISK_LEVEL", "CERTIFICATION_STATUS", "RESPONSE_TIME", "SUSTAINABILITY_PERFORMANCE"]
  benchmark_frequency: "QUARTERLY"
  degradation_alert: true
