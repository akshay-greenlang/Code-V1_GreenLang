# =============================================================================
# PACK-007 EUDR Professional Pack - Trading Company Preset
# =============================================================================
# Professional setup for trading companies managing large volumes across multiple
# suppliers and customers. Batch tracking, chain of custody verification, multi-
# tier traceability, and high-throughput data processing.
#
# Typical Use Cases:
#   - Commodity traders (bulk volumes, multiple origins)
#   - Import/export companies
#   - Logistics and distribution companies
#   - Aggregators and consolidators
#
# Key Features:
#   - Simplified DD for traders (Article 4(3))
#   - Batch and shipment tracking
#   - All chain of custody models
#   - High-volume data processing
#   - Customer-facing DDS sharing
# =============================================================================

operator:
  company_size: "LARGE"
  operator_type: "TRADER"

commodities:
  - commodity_type: "cattle"
    enabled: true
    priority: 2
  - commodity_type: "cocoa"
    enabled: true
    priority: 1
  - commodity_type: "coffee"
    enabled: true
    priority: 1
  - commodity_type: "oil_palm"
    enabled: true
    priority: 1
  - commodity_type: "rubber"
    enabled: true
    priority: 2
  - commodity_type: "soya"
    enabled: true
    priority: 1
  - commodity_type: "wood"
    enabled: true
    priority: 2

geolocation:
  coordinate_precision: 6
  polygon_max_vertices: 10000
  batch_size: 2000  # High batch size for traders
  overlap_detection_enabled: true
  satellite_overlay_enabled: true

risk_assessment:
  country_weight: 0.35
  supplier_weight: 0.30  # Higher supplier weight for traders
  commodity_weight: 0.20
  document_weight: 0.15
  auto_escalation_enabled: true
  reassessment_interval_days: 90

dds:
  dds_type: "SIMPLIFIED"  # Traders may use simplified DD
  require_all_fields: false
  enable_draft_mode: true
  retry_attempts: 3

compliance:
  require_geolocation: true
  allow_self_declarations: true
  verification_level: "STANDARD"
  audit_retention_years: 5
  data_quality_threshold: 0.85

advanced_geolocation:
  sentinel_integration: true
  modis_fire_check: true
  protected_area_check: false  # Optional for traders
  indigenous_land_check: false
  hansen_forest_change: true
  resolution_meters: 10
  temporal_periods: 3
  alert_systems: ["GLAD", "RADD"]

scenario_risk:
  simulation_count: 10000
  confidence_levels: [0.90, 0.95]
  parallel_workers: 4
  timeout_seconds: 60
  distributions:
    country_risk: "BETA"
    supplier_risk: "LOGNORMAL"
    commodity_risk: "UNIFORM"

satellite_monitoring:
  providers: ["SENTINEL_2", "MODIS"]
  check_interval_hours: 24  # Daily checks
  alert_threshold: 0.70
  historical_months: 36
  resolution_meters: 10

continuous_monitoring:
  enabled: true
  intervals:
    satellite_check_hours: 24
    risk_reassessment_hours: 48
    supplier_update_hours: 168
    regulatory_check_hours: 24
  notification_channels: ["EMAIL", "WEBHOOK"]
  escalation_enabled: true

portfolio:
  max_operators: 100  # Large trading portfolios
  shared_supplier_pool: true
  cross_operator_reporting: true
  cost_allocation: true
  hierarchy_depth: 2

audit_management:
  retention_years: 5
  hash_algorithm: "SHA-256"
  export_formats: ["JSON", "XML", "PDF"]
  mock_audit_enabled: true

protected_areas:
  wdpa_enabled: false  # Optional for traders
  kba_enabled: false
  indigenous_check: false
  buffer_km: 5.0
  ramsar_check: false
  unesco_check: false

regulatory_tracking:
  eurlex_monitoring: true
  check_interval_hours: 24
  cross_regulation_tracking: true
  auto_gap_analysis: true

grievance:
  enabled: true
  anonymous_submissions: true
  response_sla_days: 7
  resolution_sla_days: 30
  whistleblower_protection: true

cross_regulation:
  csrd_e4_linkage: false  # Optional for traders
  csddd_linkage: true
  nature_restoration_linkage: false

advanced_supply_chain:
  max_tier_depth: 3  # Traders typically have fewer tiers
  chain_of_custody_models: ["IDENTITY_PRESERVED", "SEGREGATED", "MASS_BALANCE", "CONTROLLED_SOURCES"]
  network_analysis: true
  diversification_scoring: true

supplier_benchmark:
  peer_group_min_size: 10
  scoring_dimensions: ["COMPLIANCE_SCORE", "DATA_QUALITY", "RISK_LEVEL", "RESPONSE_TIME"]
  benchmark_frequency: "QUARTERLY"
  degradation_alert: true

reporting:
  default_report_format: "PDF"
  include_executive_summary: true
  include_risk_heatmap: true
  include_supplier_details: false  # Aggregated for traders
  language: "en"
  timezone: "UTC"
