  - id: AGENT-FOUND-001
    name: "GreenLang Orchestrator (DAG)"
    description: "Orchestrates DMA workflow phases using directed acyclic graphs"
    required: true
  - id: AGENT-FOUND-002
    name: "Schema Compiler & Validator"
    description: "Compiles and validates ESRS taxonomy schemas and DMA data models"
    required: true
  - id: AGENT-FOUND-003
    name: "Unit & Reference Normalizer"
    description: "Normalizes units (tCO2e, EUR, FTE) and ESRS reference data"
    required: true
  - id: AGENT-FOUND-004
    name: "Assumptions Registry"
    description: "Tracks all assumptions in DMA scoring (weighting, thresholds, boundaries)"
    required: true
  - id: AGENT-FOUND-005
    name: "Citations & Evidence Agent"
    description: "Links materiality scores to source evidence for audit assurance"
    required: true
  - id: AGENT-FOUND-006
    name: "Access & Policy Guard"
    description: "Enforces role-based access for DMA data (scorer, reviewer, approver)"
    required: true
  - id: AGENT-FOUND-007
    name: "Agent Registry & Service Catalog"
    description: "Maintains registry of available agents and DMA engine capabilities"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all DMA scoring is reproducible with SHA-256 provenance"
    required: true
  - id: AGENT-FOUND-009
    name: "QA Test Harness"
    description: "Automated quality assurance for DMA outputs and scoring consistency"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors DMA engine performance and pipeline health"
    required: true

# ---------------------------------------------------------------------------
# Bridged Agents (12 agents for cross-pack integration and regulatory)
# ---------------------------------------------------------------------------
agents_bridged:
  - id: csrd-disclosure-agent
    name: "CSRD Disclosure Agent"
    description: "Feeds DMA outcomes into CSRD sustainability statement structure"
    required: true
  - id: esrs-taxonomy-agent
    name: "ESRS Taxonomy Agent"
    description: "Maintains ESRS topic/sub-topic/sub-sub-topic taxonomy database"
    required: true
  - id: xbrl-tagging-agent
    name: "XBRL Tagging Agent"
    description: "Tags DMA datapoints with EFRAG XBRL taxonomy identifiers"
    required: true
  - id: sector-profile-agent
    name: "Sector Materiality Profile Agent"
    description: "Provides sector-specific materiality profiles for IRO pre-population"
    required: true
  - id: value-chain-mapping-agent
    name: "Value Chain Mapping Agent"
    description: "Maps value chain structure for IRO boundary determination"
    required: true
  - id: scenario-analysis-agent
    name: "Scenario Analysis Agent"
    description: "Runs climate and transition scenarios for financial materiality assessment"
    required: false
  - id: esg-ratings-agent
    name: "ESG Ratings Integration Agent"
    description: "Imports ESG ratings and benchmarks for materiality calibration"
    required: false
  - id: taxonomy-alignment-agent
    name: "EU Taxonomy Alignment Agent"
    description: "Aligns DMA outcomes with EU Taxonomy activity assessments"
    required: false
  - id: omnibus-threshold-agent
    name: "Omnibus Threshold Agent"
    description: "Assesses CSRD Omnibus Directive threshold applicability for DMA scope"
    required: true
  - id: regulatory-change-monitor
    name: "Regulatory Change Monitor Agent"
    description: "Monitors ESRS amendments, EFRAG guidance updates, Omnibus changes"
    required: true
  - id: assurance-readiness-agent
    name: "Assurance Readiness Agent"
    description: "Prepares DMA documentation for limited/reasonable assurance engagement"
    required: true
  - id: peer-benchmark-agent
    name: "Peer Benchmarking Agent"
    description: "Benchmarks DMA outcomes against sector peers' material topic lists"
    required: false

# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 72
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 12
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  iro_identification:
    max_iro_count: 500
    iro_classification_per_item_ms: 50
    target_duration_minutes: 15
  impact_scoring:
    max_sustainability_matters: 200
    scoring_per_matter_ms: 100
    target_duration_minutes: 20
  financial_scoring:
    max_sustainability_matters: 200
    scoring_per_matter_ms: 150
    target_duration_minutes: 25
  stakeholder_engagement:
    max_stakeholder_groups: 50
    max_survey_responses: 10000
    survey_analysis_per_response_ms: 20
    target_duration_minutes: 30
  materiality_matrix:
    matrix_generation_ms: 5000
    sensitivity_analysis_iterations: 100
    target_duration_minutes: 5
  esrs_mapping:
    max_esrs_datapoints: 1200
    mapping_per_topic_ms: 100
    target_duration_minutes: 10
  report_generation:
    max_report_pages: 200
    target_duration_minutes: 15
  full_dma:
    target_duration_minutes: 600
    parallel_scoring_enabled: true
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with DMA role-based access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - dma_lead
    - sustainability_officer
    - impact_scorer
    - financial_scorer
    - stakeholder_engagement_lead
    - sustainability_committee_member
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"
    - "matplotlib>=3.7"
    - "plotly>=5.15"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 15
    recommended_connections: 40

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_esrs_taxonomy_database
    - verify_sector_materiality_profiles
    - verify_efrag_datapoint_catalog

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V083-PACK015-001"  # DMA assessment and scoring tables
      - "V083-PACK015-002"  # IRO register and classification tables
      - "V083-PACK015-003"  # Stakeholder engagement and survey tables
      - "V083-PACK015-004"  # Materiality matrix and threshold tables
      - "V083-PACK015-005"  # ESRS topic mapping and disclosure tables
      - "V083-PACK015-006"  # DMA report and audit trail tables
      - "V083-PACK015-007"  # Sector materiality profile tables

  post_install:
    - seed_esrs_topic_taxonomy
    - seed_esrs_sub_topic_taxonomy
    - seed_esrs_disclosure_requirements
    - seed_efrag_xbrl_datapoints
    - seed_sector_materiality_profiles
    - seed_scoring_methodology_defaults
    - seed_threshold_calibration_data
    - seed_default_presets
    - run_health_checks
