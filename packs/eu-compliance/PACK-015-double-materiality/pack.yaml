# =============================================================================
# PACK-015: Double Materiality Assessment Pack
# GreenLang EU Compliance Pack for Double Materiality Assessment (DMA) per ESRS 1
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for conducting Double Materiality Assessment (DMA) as
# required by ESRS 1, Chapter 3. Double materiality is the foundational
# analytical process that determines which ESRS topical standards and
# individual disclosure requirements are material for a given undertaking.
# Without a robust DMA, CSRD reporting cannot proceed, because the DMA
# governs the scope, depth, and content of the entire sustainability
# statement.
#
# Double materiality comprises two complementary perspectives:
#   - Impact materiality: The undertaking's actual or potential, positive
#     or negative impacts on people and the environment (inside-out).
#   - Financial materiality: How sustainability matters create risks and
#     opportunities that affect (or are reasonably expected to affect) the
#     undertaking's financial position, performance, and cash flows
#     (outside-in).
#
# A sustainability matter is material if it is material from either the
# impact perspective or the financial perspective, or both (ESRS 1 sect. 21).
#
# This pack implements the complete DMA lifecycle:
#   1. Stakeholder identification and engagement (ESRS 1 sect. 22-23)
#   2. Impact, Risk, and Opportunity (IRO) identification (ESRS 1 sect. 28-39)
#   3. Impact materiality assessment with scoring (ESRS 1 sect. 43-48)
#   4. Financial materiality assessment with scoring (ESRS 1 sect. 49-51)
#   5. Materiality matrix generation and threshold application
#   6. ESRS topical standard and sub-topic mapping
#   7. Disclosure requirement determination (IRO-1, IRO-2, SBM-3)
#   8. Full DMA report with audit trail and provenance
#
# The pack supports all ESRS topical areas:
#   - Environmental: E1 (Climate change), E2 (Pollution), E3 (Water and
#     marine resources), E4 (Biodiversity and ecosystems), E5 (Resource
#     use and circular economy)
#   - Social: S1 (Own workforce), S2 (Workers in the value chain),
#     S3 (Affected communities), S4 (Consumers and end-users)
#   - Governance: G1 (Business conduct)
#
# It covers all ESRS 1 Appendix A sub-topics and sub-sub-topics, providing
# a granular materiality assessment that maps to specific disclosure
# requirements in ESRS 2 and the topical standards.
#
# Key Capabilities:
#   - Impact materiality scoring (scale, scope, irremediable character,
#     likelihood for potential impacts)
#   - Financial materiality scoring (magnitude, likelihood, time horizon)
#   - Multi-stakeholder engagement management and weighting
#   - IRO identification and classification per ESRS 1 sect. 28-39
#   - Materiality matrix with configurable thresholds
#   - ESRS topic, sub-topic, and sub-sub-topic mapping to disclosure reqs
#   - Threshold scoring with sector-specific calibration
#   - Full DMA report generation with XBRL tagging for IRO-1, IRO-2, SBM-3
#   - Sector-specific materiality profiles (16+ NACE sectors)
#   - Pre-configured presets for large enterprises, mid-market, SME,
#     financial services, manufacturing, and multi-sector groups
#
# Regulatory References:
#   - ESRS 1: General Requirements, Chapter 3 (Double Materiality as a basis
#     for sustainability reporting)
#   - ESRS 1 sect. 22-23: Stakeholders and their relevance to the materiality
#     assessment process
#   - ESRS 1 sect. 28-39: Identification and assessment of impacts, risks,
#     and opportunities (IRO)
#   - ESRS 1 sect. 43-48: Impact materiality (actual and potential,
#     positive and negative impacts on people and environment)
#   - ESRS 1 sect. 49-51: Financial materiality (risks and opportunities
#     that affect or could affect financial position and performance)
#   - ESRS 2 IRO-1: Description of the processes to identify and assess
#     material impacts, risks, and opportunities
#   - ESRS 2 IRO-2: Disclosure requirements in ESRS covered by the
#     undertaking's sustainability statement
#   - ESRS 2 SBM-3: Material impacts, risks, and opportunities and their
#     interaction with strategy and business model
#   - CSRD: Directive (EU) 2022/2464 (Corporate Sustainability Reporting
#     Directive)
#   - Delegated Regulation (EU) 2023/2772 (ESRS Set 1)
#   - EFRAG Implementation Guidance IG 1: Materiality Assessment
#   - EFRAG Implementation Guidance IG 2: Value Chain
#   - EFRAG Implementation Guidance IG 3: ESRS Datapoints
#
# Sector Coverage:
#   - All NACE macro-sectors (A through U)
#   - Sector-agnostic base assessment applicable to any undertaking
#   - Sector-specific materiality profiles for common industries:
#     manufacturing, financial services, energy, real estate, transport,
#     retail, mining, agriculture, ICT, construction, healthcare,
#     professional services, hospitality, public administration, education,
#     and multi-sector conglomerates
#
# Version History:
#   1.0.0 - Initial release (2026-03-16)
# =============================================================================

