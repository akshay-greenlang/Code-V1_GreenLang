  regulation:
    primary:
      name: "European Sustainability Reporting Standards - General Requirements"
      reference: "(EU) 2023/2772 - ESRS 1"
      effective_date: "2024-01-01"
      description: >-
        ESRS 1 establishes the general principles, conventions, and
        requirements for sustainability reporting under the CSRD. Chapter 3
        defines the double materiality principle as the basis for determining
        which sustainability matters are material. The undertaking shall apply
        the criteria of impact materiality (ESRS 1 sect. 43-48) and financial
        materiality (ESRS 1 sect. 49-51) to identify material sustainability
        matters, and shall use the outcome to determine which ESRS topical
        standards and specific disclosure requirements apply. The DMA process
        involves stakeholder engagement (sect. 22-23), systematic
        identification of impacts, risks, and opportunities (sect. 28-39),
        and a structured scoring methodology.
