    description: "Orchestrates collection and calculation of own workforce metrics (most comprehensive social workflow)."
    phases:
      - hris_data_extraction
      - workforce_composition_analysis
      - pay_gap_calculation
      - health_safety_metrics_calculation
      - training_metrics_calculation
      - collective_bargaining_analysis
      - s1_report_generation
    estimated_duration_minutes: 60

  - id: s2_value_chain
    name: "ESRS S2 Workers in the Value Chain Workflow"
    file: workflows/s2_value_chain_workflow.py
    description: "Orchestrates supplier social audit data collection and value chain worker impact assessment."
    phases:
      - supplier_data_collection
      - supplier_audit_analysis
      - value_chain_incident_review
      - s2_report_generation
    estimated_duration_minutes: 35

  - id: s3_communities
    name: "ESRS S3 Affected Communities Workflow"
    file: workflows/s3_communities_workflow.py
    description: "Orchestrates community engagement data collection and impact assessment."
    phases:
      - community_mapping
      - community_engagement_analysis
      - grievance_analysis
      - community_investment_tracking
      - s3_report_generation
    estimated_duration_minutes: 30

  - id: s4_consumers
    name: "ESRS S4 Consumers and End-users Workflow"
    file: workflows/s4_consumers_workflow.py
    description: "Orchestrates consumer data collection and product safety/data privacy assessment."
    phases:
      - consumer_policy_extraction
      - product_safety_incident_analysis
      - data_privacy_breach_analysis
      - consumer_complaint_analysis
      - s4_report_generation
    estimated_duration_minutes: 25

  - id: g1_governance
    name: "ESRS G1 Business Conduct Workflow"
    file: workflows/g1_governance_workflow.py
    description: "Orchestrates business conduct data collection including anti-corruption, political influence, and payment practices."
    phases:
      - ethics_policy_extraction
      - corruption_incident_analysis
      - political_contribution_tracking
      - lobbying_activity_disclosure
      - supplier_payment_analysis
      - g1_report_generation
    estimated_duration_minutes: 35

  - id: full_esrs_coverage
    name: "Full ESRS Coverage Workflow (Orchestrator)"
    file: workflows/full_esrs_workflow.py
    description: "Master workflow that orchestrates all 12 ESRS workflows in parallel (where materiality determined)."
    phases:
      - materiality_assessment_query      # query PACK-015 results
      - disclosure_scoping                # determine which topical standards apply
      - parallel_engine_execution         # run ESRS 2, E2-E5, S1-S4, G1 engines in parallel
      - e1_bridge_execution               # query PACK-016 for E1 data
      - cross_standard_validation         # consistency checks
      - coverage_scorecard_generation     # % completion per standard
      - gap_analysis_generation           # missing DRs, data quality issues
      - xbrl_consolidation                # merge all XBRL outputs
      - annual_sustainability_statement   # generate final report
    estimated_duration_minutes: 120

