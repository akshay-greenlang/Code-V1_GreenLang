    - id: E5
      name: "Resource Use and Circular Economy"
      disclosure_requirements: 6
      datapoints: 89
      status: implemented
      engine: e5_circular_economy
    - id: S1
      name: "Own Workforce"
      disclosure_requirements: 17
      datapoints: 156
      status: implemented
      engine: s1_own_workforce
    - id: S2
      name: "Workers in the Value Chain"
      disclosure_requirements: 5
      datapoints: 48
      status: implemented
      engine: s2_value_chain_workers
    - id: S3
      name: "Affected Communities"
      disclosure_requirements: 5
      datapoints: 46
      status: implemented
      engine: s3_affected_communities
    - id: S4
      name: "Consumers and End-users"
      disclosure_requirements: 5
      datapoints: 40
      status: implemented
      engine: s4_consumers
    - id: G1
      name: "Business Conduct"
      disclosure_requirements: 6
      datapoints: 89
      status: implemented
      engine: g1_business_conduct

  total_disclosure_requirements: 82
  total_datapoints: 1093
  total_engines: 11

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
dependencies:
  required:
    - pack_id: PACK-015
      name: "Double Materiality Assessment Pack"
      version: ">=1.0.0"
      reason: "Materiality determination required per ESRS 1 for topical standard scoping"
    - pack_id: PACK-016
      name: "ESRS E1 Climate Pack"
      version: ">=1.0.0"
      reason: "E1 Climate Change disclosures (11 DRs, 312 datapoints)"

  optional:
    - pack_id: PACK-008
      name: "EU Taxonomy Alignment Pack"
      version: ">=1.0.0"
      reason: "Cross-reference for E1 climate mitigation/adaptation alignment"
    - pack_id: PACK-010
      name: "SFDR Article 8 Pack"
      version: ">=1.0.0"
      reason: "Principal adverse impacts (PAI) overlap with ESRS metrics"

  agents:
    - AGENT-FOUND-001  # Orchestrator (DAG execution)
    - AGENT-FOUND-002  # Schema Compiler (ESRS schema validation)
    - AGENT-FOUND-003  # Unit Normalizer (metric conversions)
    - AGENT-FOUND-005  # Citations Agent (regulatory references)
    - AGENT-FOUND-008  # Reproducibility Agent (provenance tracking)
    - AGENT-DATA-001   # PDF Extractor (policy documents)
    - AGENT-DATA-002   # Excel/CSV Normalizer (data intake)
    - AGENT-DATA-003   # ERP Connector (financial/operational data)
    - AGENT-DATA-008   # Supplier Questionnaire Processor (value chain data)
    - AGENT-DATA-010   # Data Quality Profiler (data validation)
    - AGENT-DATA-019   # Validation Rule Engine (ESRS validation rules)
    - AGENT-MRV-001-030 # All MRV agents (for E1 via PACK-016 bridge)

# -----------------------------------------------------------------------------
# Engines
# -----------------------------------------------------------------------------
engines:
  - id: esrs2_general_disclosures
    name: "ESRS 2 General Disclosures Engine"
    file: engines/esrs2_general_disclosures_engine.py
    class: GeneralDisclosuresEngine
    standard: ESRS_2
    description: >-
      Implements all 10 ESRS 2 disclosure requirements covering governance
      (GOV-1 to GOV-5), strategy and business model (SBM-1 to SBM-3), and
      impact/risk/opportunity management (IRO-1 to IRO-2). Produces 127
      datapoints including board composition, sustainability governance
      structures, business model description, value chain analysis, and
      materiality assessment process documentation.
    disclosure_requirements:
      - id: GOV-1
        name: "The role of the administrative, management and supervisory bodies"
        datapoints: 12
        xbrl_prefix: "esrs:GOV1"
      - id: GOV-2
        name: "Information provided to and sustainability matters addressed by the undertaking's administrative, management and supervisory bodies"
        datapoints: 8
        xbrl_prefix: "esrs:GOV2"
      - id: GOV-3
        name: "Integration of sustainability-related performance in incentive schemes"
        datapoints: 10
        xbrl_prefix: "esrs:GOV3"
      - id: GOV-4
        name: "Statement on due diligence"
        datapoints: 5
        xbrl_prefix: "esrs:GOV4"
      - id: GOV-5
        name: "Risk management and internal controls over sustainability reporting"
        datapoints: 7
        xbrl_prefix: "esrs:GOV5"
      - id: SBM-1
        name: "Strategy, business model and value chain"
        datapoints: 28
        xbrl_prefix: "esrs:SBM1"
      - id: SBM-2
        name: "Interests and views of stakeholders"
        datapoints: 15
        xbrl_prefix: "esrs:SBM2"
      - id: SBM-3
        name: "Material impacts, risks and opportunities and their interaction with strategy and business model"
        datapoints: 22
        xbrl_prefix: "esrs:SBM3"
      - id: IRO-1
        name: "Description of the processes to identify and assess material impacts, risks and opportunities"
        datapoints: 10
        xbrl_prefix: "esrs:IRO1"
      - id: IRO-2
        name: "Disclosure Requirements in ESRS covered by the undertaking's sustainability statement"
        datapoints: 10
        xbrl_prefix: "esrs:IRO2"
    inputs:
      - governance_structure_data
      - board_composition_data
      - incentive_scheme_data
      - due_diligence_policy_docs
      - risk_management_framework
      - business_model_description
      - value_chain_mapping
      - stakeholder_engagement_records
      - materiality_assessment_results
    outputs:
      - esrs2_governance_report
      - esrs2_strategy_business_model_report
      - esrs2_iro_report
      - xbrl_tagged_esrs2_data
      - provenance_hashes
    processing_time_estimate_minutes: 15
    memory_estimate_mb: 512

  - id: e2_pollution
    name: "ESRS E2 Pollution Engine"
    file: engines/e2_pollution_engine.py
    class: PollutionEngine
    standard: E2
    description: >-
      Implements all 6 ESRS E2 disclosure requirements covering pollution to
      air, water, and soil. Produces 98 datapoints including emissions of air
      pollutants (PM, NOx, SOx, VOCs), discharges to water, soil contamination,
      substances of concern, and microplastics. Covers policies (E2-1), actions
      (E2-2), targets (E2-3), pollution metrics (E2-4), substances of concern
      (E2-5), and anticipated financial effects (E2-6).
    disclosure_requirements:
      - id: E2-1
        name: "Policies related to pollution"
        datapoints: 8
        xbrl_prefix: "esrs:E21"
      - id: E2-2
        name: "Actions and resources related to pollution"
        datapoints: 12
        xbrl_prefix: "esrs:E22"
      - id: E2-3
        name: "Targets related to pollution"
        datapoints: 15
        xbrl_prefix: "esrs:E23"
      - id: E2-4
        name: "Pollution of air, water and soil"
        datapoints: 32
        xbrl_prefix: "esrs:E24"
      - id: E2-5
        name: "Substances of concern and substances of very high concern"
        datapoints: 18
        xbrl_prefix: "esrs:E25"
      - id: E2-6
        name: "Anticipated financial effects from pollution-related impacts and risks"
        datapoints: 13
        xbrl_prefix: "esrs:E26"
    inputs:
      - air_emissions_data           # PM2.5, PM10, NOx, SOx, VOCs, NH3
      - water_discharge_data         # BOD, COD, TSS, nutrients, heavy metals
      - soil_contamination_data      # contaminated sites, remediation status
      - substances_of_concern_list   # REACH, RoHS, PFAS, microplastics
      - pollution_incidents_log      # spills, exceedances, violations
      - pollution_policies           # policy documents
      - pollution_actions_capex      # CapEx/OpEx for pollution reduction
      - pollution_targets            # reduction targets
    outputs:
      - e2_pollution_report
      - air_emissions_inventory
      - water_discharge_inventory
      - substances_of_concern_register
      - xbrl_tagged_e2_data
      - provenance_hashes
    processing_time_estimate_minutes: 20
    memory_estimate_mb: 768

  - id: e3_water_marine
    name: "ESRS E3 Water and Marine Resources Engine"
    file: engines/e3_water_marine_engine.py
    class: WaterMarineEngine
    standard: E3
    description: >-
      Implements all 5 ESRS E3 disclosure requirements covering water
      consumption, water withdrawals, water discharges, and marine resources.
      Produces 74 datapoints including water consumption in water-stressed
      areas, water intensity, water recycling, ocean/marine impacts, and
      anticipated financial effects. Covers policies (E3-1), actions (E3-2),
      targets (E3-3), water metrics (E3-4), and financial effects (E3-5).
    disclosure_requirements:
      - id: E3-1
        name: "Policies related to water and marine resources"
        datapoints: 8
        xbrl_prefix: "esrs:E31"
      - id: E3-2
        name: "Actions and resources related to water and marine resources"
        datapoints: 10
        xbrl_prefix: "esrs:E32"
      - id: E3-3
        name: "Targets related to water and marine resources"
        datapoints: 12
        xbrl_prefix: "esrs:E33"
      - id: E3-4
        name: "Water consumption"
        datapoints: 28
        xbrl_prefix: "esrs:E34"
      - id: E3-5
        name: "Anticipated financial effects from water and marine resources-related impacts and risks"
        datapoints: 16
        xbrl_prefix: "esrs:E35"
    inputs:
      - water_withdrawal_data        # by source (surface, ground, municipal, seawater)
      - water_consumption_data       # net consumption after discharge/recycling
      - water_discharge_data         # by destination and quality
      - water_stress_assessment      # WRI Aqueduct, WWF Water Risk Filter
      - water_recycling_data         # recycled/reused water volumes
      - marine_impacts_data          # ocean pollution, marine biodiversity
      - water_policies               # policy documents
      - water_actions_capex          # CapEx/OpEx for water efficiency
      - water_targets                # water reduction targets
    outputs:
      - e3_water_marine_report
      - water_consumption_inventory
      - water_stress_analysis
      - marine_impacts_assessment
      - xbrl_tagged_e3_data
      - provenance_hashes
    processing_time_estimate_minutes: 18
    memory_estimate_mb: 640

  - id: e4_biodiversity
    name: "ESRS E4 Biodiversity and Ecosystems Engine"
    file: engines/e4_biodiversity_engine.py
    class: BiodiversityEngine
    standard: E4
    description: >-
      Implements all 6 ESRS E4 disclosure requirements covering biodiversity
      impacts, pressures on biodiversity (land use change, pollution, invasive
      species, resource exploitation, climate change), and ecosystem services.
      Produces 103 datapoints including sites in/near biodiversity-sensitive
      areas, land use change impacts, threatened species, ecosystem condition,
      and anticipated financial effects. Covers policies (E4-1), actions (E4-2),
      targets (E4-3), biodiversity metrics (E4-4), ecosystem impacts (E4-5),
      and financial effects (E4-6).
    disclosure_requirements:
      - id: E4-1
        name: "Policies related to biodiversity and ecosystems"
        datapoints: 10
        xbrl_prefix: "esrs:E41"
      - id: E4-2
        name: "Actions and resources related to biodiversity and ecosystems"
        datapoints: 14
        xbrl_prefix: "esrs:E42"
      - id: E4-3
        name: "Targets related to biodiversity and ecosystems"
        datapoints: 16
        xbrl_prefix: "esrs:E43"
      - id: E4-4
        name: "Impact metrics related to biodiversity and ecosystems change"
        datapoints: 22
        xbrl_prefix: "esrs:E44"
      - id: E4-5
        name: "Ecosystem extent and condition"
        datapoints: 18
        xbrl_prefix: "esrs:E45"
      - id: E4-6
        name: "Anticipated financial effects from biodiversity and ecosystem-related impacts and risks"
        datapoints: 23
        xbrl_prefix: "esrs:E46"
    inputs:
      - site_location_data           # coordinates, proximity to protected areas
      - biodiversity_assessment      # IBAT, Integrated Biodiversity Assessment Tool
      - land_use_change_data         # ha converted, habitat types affected
      - species_data                 # IUCN Red List, threatened species present
      - ecosystem_services_data      # provisioning, regulating, cultural services
      - biodiversity_policies        # policy documents
      - biodiversity_actions_capex   # CapEx/OpEx for biodiversity restoration
      - biodiversity_targets         # no net loss, net positive targets
    outputs:
      - e4_biodiversity_report
      - biodiversity_impact_assessment
      - ecosystem_services_valuation
      - land_use_change_analysis
      - xbrl_tagged_e4_data
      - provenance_hashes
    processing_time_estimate_minutes: 25
    memory_estimate_mb: 896

  - id: e5_circular_economy
    name: "ESRS E5 Resource Use and Circular Economy Engine"
    file: engines/e5_circular_economy_engine.py
    class: CircularEconomyEngine
    standard: E5
    description: >-
      Implements all 6 ESRS E5 disclosure requirements covering resource inflows
      (materials, water, energy), resource outflows (products, by-products,
      waste), and circular economy strategies (reuse, repair, refurbishment,
      remanufacturing, recycling). Produces 89 datapoints including material
      consumption, circular material use rate, waste generation, waste
      diverted from disposal, and anticipated financial effects. Covers
      policies (E5-1), actions (E5-2), targets (E5-3), resource inflows (E5-4),
      resource outflows (E5-5), and financial effects (E5-6).
    disclosure_requirements:
      - id: E5-1
        name: "Policies related to resource use and circular economy"
        datapoints: 9
        xbrl_prefix: "esrs:E51"
      - id: E5-2
        name: "Actions and resources related to resource use and circular economy"
        datapoints: 13
        xbrl_prefix: "esrs:E52"
      - id: E5-3
        name: "Targets related to resource use and circular economy"
        datapoints: 14
        xbrl_prefix: "esrs:E53"
      - id: E5-4
        name: "Resource inflows"
        datapoints: 20
        xbrl_prefix: "esrs:E54"
      - id: E5-5
        name: "Resource outflows"
        datapoints: 18
        xbrl_prefix: "esrs:E55"
      - id: E5-6
        name: "Anticipated financial effects from resource use and circular economy-related impacts and risks"
        datapoints: 15
        xbrl_prefix: "esrs:E56"
    inputs:
      - material_consumption_data    # tonnes by material type (metals, plastics, etc.)
      - recycled_content_data        # percentage recycled input materials
      - product_design_data          # design for circularity metrics
      - waste_generation_data        # by waste type and disposal method
      - waste_diverted_data          # recycling, composting, energy recovery
      - circular_economy_policies    # policy documents
      - circular_economy_actions     # CapEx/OpEx for circular initiatives
      - circular_economy_targets     # circular material use rate targets
    outputs:
      - e5_circular_economy_report
      - material_flow_analysis
      - circular_material_use_rate
      - waste_generation_inventory
      - xbrl_tagged_e5_data
      - provenance_hashes
    processing_time_estimate_minutes: 22
    memory_estimate_mb: 768

  - id: s1_own_workforce
    name: "ESRS S1 Own Workforce Engine"
    file: engines/s1_own_workforce_engine.py
    class: OwnWorkforceEngine
    standard: S1
    description: >-
      Implements all 17 ESRS S1 disclosure requirements covering own workforce
      policies, actions, targets, and metrics across working conditions,
      equal treatment, social dialogue, health and safety, work-life balance,
