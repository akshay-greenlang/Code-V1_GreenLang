    memory_estimate_mb: 640

  - id: esrs_coverage_orchestrator
    name: "ESRS Coverage Orchestrator"
    file: engines/esrs_coverage_orchestrator_engine.py
    class: ESRSCoverageOrchestrator
    standard: CROSS_CUTTING
    description: >-
      Cross-standard orchestration engine that manages the full ESRS disclosure
      lifecycle. Performs materiality-driven disclosure scoping (via PACK-015
      bridge), coordinates parallel execution of topical engines (E2-E5, S1-S4,
      G1) and ESRS 2 engine, validates cross-standard consistency (e.g., S1
      workforce data vs E1 Scope 3 Cat 7 emissions), generates coverage
      scorecard (percentage completion per standard), identifies disclosure
      gaps, and produces consolidated ESRS annual report with full XBRL tagging.
      Implements ESRS 1 principles including proportionality (phase-in
      provisions), value chain scoping, and time horizons.
    functions:
      - materiality_scoping          # query PACK-015 DMA results, scope topical standards
      - engine_orchestration         # parallel execution of 11 engines
      - cross_standard_validation    # consistency checks (S1 vs E1 Cat 7, etc.)
      - coverage_calculation         # % DRs completed, % datapoints filled
      - gap_analysis                 # missing DRs, low-quality data
      - xbrl_consolidation           # merge all engine XBRL outputs
      - report_generation            # annual sustainability statement
      - provenance_aggregation       # aggregate SHA-256 hashes
    inputs:
      - materiality_assessment_results  # from PACK-015
      - all_engine_outputs              # from ESRS 2, E2-E5, S1-S4, G1, E1 bridge
      - reporting_boundary_data         # consolidation scope
      - prior_year_data                 # for YoY comparisons
    outputs:
      - esrs_coverage_scorecard
      - esrs_gap_analysis
      - esrs_annual_sustainability_statement
      - xbrl_instance_document
      - consolidated_provenance_hashes
    processing_time_estimate_minutes: 25
    memory_estimate_mb: 1536

