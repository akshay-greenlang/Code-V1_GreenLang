      - corruption_incidents         # G1-4
      - political_influence          # G1-5
      - payment_practices            # G1-6
    formats: [PDF, HTML, XBRL]

  - id: esrs_scorecard_report
    name: "ESRS Coverage Scorecard Report Template"
    file: templates/esrs_scorecard_report.py
    description: "Cross-standard coverage scorecard showing percentage completion per standard."
    sections:
      - executive_summary
      - coverage_by_standard         # % DRs completed per ESRS 2, E1-E5, S1-S4, G1
      - datapoint_fill_rates         # % datapoints filled per standard
      - materiality_summary          # which standards assessed as material
      - gap_analysis                 # missing DRs, low-quality data
      - remediation_roadmap          # recommended next steps
    formats: [PDF, HTML, Excel]

  - id: esrs_annual_report
    name: "ESRS Annual Sustainability Statement Template"
    file: templates/esrs_annual_report.py
    description: "Consolidated annual sustainability statement covering all material ESRS disclosures."
    sections:
      - executive_summary
      - esrs_2_general_disclosures
      - e1_climate_change            # via PACK-016 bridge
      - e2_pollution                 # if material
      - e3_water_marine              # if material
      - e4_biodiversity              # if material
      - e5_circular_economy          # if material
      - s1_own_workforce             # if material
      - s2_value_chain_workers       # if material
      - s3_affected_communities      # if material
      - s4_consumers                 # if material
      - g1_business_conduct          # if material
      - appendices                   # XBRL taxonomy mapping, provenance hashes
    formats: [PDF, HTML, XBRL]

# -----------------------------------------------------------------------------
# Integrations
# -----------------------------------------------------------------------------
integrations:
  - id: pack_orchestrator
    name: "Pack Orchestrator"
    file: integrations/pack_orchestrator.py
    description: "Main orchestration logic for PACK-017. Coordinates all engines, workflows, and integrations."
    methods:
      - initialize_pack
      - query_dependencies           # check PACK-015, PACK-016 availability
      - orchestrate_execution        # run full_esrs_coverage workflow
      - aggregate_results
      - generate_scorecard
      - export_xbrl

  - id: e1_pack_bridge
    name: "PACK-016 E1 Climate Bridge"
    file: integrations/e1_pack_bridge.py
    description: "Integration bridge to PACK-016 ESRS E1 Climate Pack. Queries PACK-016 for E1 disclosures and incorporates into full ESRS report."
    target: PACK-016
    methods:
      - query_e1_data                # fetch E1 report from PACK-016
      - extract_e1_xbrl              # extract XBRL datapoints
      - validate_e1_completeness     # check 11 E1 DRs present
      - merge_e1_into_esrs_report    # include E1 in annual report

  - id: dma_pack_bridge
    name: "PACK-015 Double Materiality Assessment Bridge"
    file: integrations/dma_pack_bridge.py
    description: "Integration bridge to PACK-015 Double Materiality Assessment Pack. Queries DMA results to scope topical standard disclosures."
    target: PACK-015
    methods:
      - query_materiality_results    # fetch DMA outcomes
      - extract_material_topics      # which E/S/G topics material?
      - scope_disclosure_requirements # determine which DRs required
      - document_omitted_topics      # explain omissions per ESRS 1

  - id: csrd_app_bridge
    name: "GL-CSRD-APP Integration Bridge"
    file: integrations/csrd_app_bridge.py
    description: "Integration bridge to GL-CSRD-APP. Exports PACK-017 results to CSRD application for regulatory filing."
    target: GL-CSRD-APP
    methods:
      - export_to_csrd_app           # send ESRS data to CSRD app
      - map_to_csrd_schema           # align with CSRD app data model
      - validate_csrd_format         # validate against CSRD requirements
      - trigger_xbrl_generation      # trigger XBRL instance document creation

  - id: mrv_agent_bridge
    name: "AGENT-MRV Integration Bridge"
    file: integrations/mrv_agent_bridge.py
    description: "Integration bridge to AGENT-MRV-001-030 for E1 emissions data (via PACK-016 bridge) and other environmental metrics."
    target: AGENT-MRV
    methods:
      - query_ghg_emissions          # Scope 1/2/3 from MRV agents
      - query_energy_consumption     # energy data for E1-5
      - validate_mrv_provenance      # check SHA-256 hashes

  - id: data_agent_bridge
    name: "AGENT-DATA Integration Bridge"
    file: integrations/data_agent_bridge.py
    description: "Integration bridge to AGENT-DATA-001-020 for data intake, quality, and lineage tracking."
    target: AGENT-DATA
    methods:
      - orchestrate_data_collection  # trigger PDF, Excel, ERP connectors
      - validate_data_quality        # run data quality profiler
      - track_data_lineage           # provenance via AGENT-DATA-018

  - id: taxonomy_bridge
    name: "GL-Taxonomy-APP Integration Bridge"
    file: integrations/taxonomy_bridge.py
    description: "Integration bridge to GL-Taxonomy-APP for EU Taxonomy alignment (cross-reference with E1 climate mitigation/adaptation)."
    target: GL-Taxonomy-APP
    methods:
      - query_taxonomy_alignment     # fetch taxonomy-eligible/aligned activities
      - cross_reference_e1           # compare E1 climate actions with taxonomy
      - document_taxonomy_overlap    # explain alignment in ESRS reports

  - id: xbrl_tagging_bridge
    name: "XBRL Tagging Integration"
    file: integrations/xbrl_tagging_bridge.py
    description: "XBRL tagging engine for mapping PACK-017 outputs to EFRAG ESRS XBRL taxonomy (1,093 datapoints)."
    methods:
      - load_efrag_taxonomy          # load EFRAG ESRS XBRL schema
      - map_datapoints_to_taxonomy   # map 1,093 datapoints to XBRL concepts
      - validate_xbrl_instance       # validate against taxonomy schema
      - export_xbrl_instance         # generate .xbrl file

  - id: health_check
    name: "Pack Health Check"
    file: integrations/health_check.py
    description: "Health check integration for monitoring PACK-017 status."
    methods:
      - check_dependencies           # verify PACK-015, PACK-016 available
      - check_agents                 # verify all required agents running
      - check_database               # verify DB connectivity
      - check_engines                # verify all 11 engines initialized
      - report_health_status

  - id: setup_wizard
    name: "Pack Setup Wizard"
    file: integrations/setup_wizard.py
    description: "Interactive setup wizard for configuring PACK-017 for first-time deployment."
    methods:
      - detect_environment           # manufacturing, financial, etc.
      - recommend_preset             # suggest preset based on sector
      - configure_materiality_scope  # select material topics
      - configure_data_sources       # ERP, HRIS, etc.
      - test_integrations            # test PACK-015/016, agents
      - finalize_configuration

