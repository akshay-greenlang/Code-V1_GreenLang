workflows:
  - id: esrs2_general
    name: "ESRS 2 General Disclosures Workflow"
    file: workflows/esrs2_general_workflow.py
    description: "Orchestrates collection and compilation of ESRS 2 data across governance, strategy, and IRO."
    phases:
      - governance_data_collection   # GOV-1 to GOV-5
      - strategy_business_model      # SBM-1 to SBM-3
      - iro_process_documentation    # IRO-1 to IRO-2
      - esrs2_validation
      - esrs2_report_generation
    estimated_duration_minutes: 30

  - id: esrs2_governance
    name: "ESRS 2 Governance Sub-Workflow"
    file: workflows/esrs2_governance_workflow.py
    description: "Focused sub-workflow for GOV-1 to GOV-5 disclosures."
    phases:
      - board_composition_extraction
      - sustainability_governance_mapping
      - incentive_scheme_analysis
      - due_diligence_policy_extraction
      - risk_control_framework_mapping
    estimated_duration_minutes: 15

  - id: e2_pollution
    name: "ESRS E2 Pollution Workflow"
    file: workflows/e2_pollution_workflow.py
    description: "Orchestrates collection and calculation of pollution metrics (air, water, soil)."
    phases:
      - air_emissions_data_collection
      - water_discharge_data_collection
      - soil_contamination_assessment
      - substances_of_concern_identification
      - pollution_metrics_calculation
      - e2_report_generation
