metadata:
  name: PACK-017-esrs-full-coverage
  version: "1.0.0"
  display_name: "ESRS Full Coverage Pack"
  description: >-
    Complete ESRS compliance across all 12 European Sustainability Reporting
    Standards (ESRS 2, E1-E5, S1-S4, G1). This pack orchestrates 11 engines
    covering 82 disclosure requirements and 1,093 XBRL-tagged datapoints.
    Provides materiality-driven disclosure scoping, multi-framework data
    collection, cross-standard consistency validation, XBRL tagging to EFRAG
    taxonomy, SHA-256 provenance for quantitative metrics, gap analysis, and
    annual sustainability statement generation. Integrates with PACK-015
    (Double Materiality), PACK-016 (E1 Climate), GL-CSRD-APP, MRV agents,
    data agents, and taxonomy alignment. Pre-configured presets for
    manufacturing, financial services, energy, retail, technology, and
    multi-sector enterprises. Zero-hallucination approach for all quantitative
    calculations. Enterprise-grade performance (8GB memory, 120min max,
    6 concurrent engines).
  category: eu-compliance
  tier: enterprise
  author: GreenLang Platform Team
  license: Commercial
  min_platform_version: "2.0.0"
  release_date: "2026-03-17"
  support_tier: enterprise-premium
  documentation_url: "https://docs.greenlang.io/packs/esrs-full-coverage"
  changelog_url: "https://docs.greenlang.io/packs/esrs-full-coverage/changelog"

  tags:
