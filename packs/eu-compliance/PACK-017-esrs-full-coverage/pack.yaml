# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
performance:
  max_processing_time_minutes: 120
  max_memory_gb: 8
  parallel_execution: true
  max_concurrent_engines: 6
  caching_enabled: true
  cache_ttl_hours: 24
  async_execution: true
  batch_processing: true
  batch_size: 1000

# -----------------------------------------------------------------------------
# Quality Gates
# -----------------------------------------------------------------------------
quality_gates:
  min_coverage_pct: 95
  min_datapoint_fill_pct: 80
  provenance_required: true
  xbrl_validation: true
  cross_standard_consistency_checks: true
  materiality_justification_required: true
  audit_trail_required: true
  zero_hallucination_enforcement: true

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  unit_tests: tests/unit/
  integration_tests: tests/integration/
  end_to_end_tests: tests/e2e/
  min_test_coverage_pct: 85
  load_testing_enabled: true
  max_load_test_throughput_reports_per_hour: 50

# -----------------------------------------------------------------------------
# Documentation
# -----------------------------------------------------------------------------
documentation:
  user_guide: docs/user_guide.md
  technical_reference: docs/technical_reference.md
  api_documentation: docs/api.md
  xbrl_mapping_guide: docs/xbrl_mapping.md
  troubleshooting_guide: docs/troubleshooting.md
  faq: docs/faq.md
  release_notes: docs/release_notes.md

