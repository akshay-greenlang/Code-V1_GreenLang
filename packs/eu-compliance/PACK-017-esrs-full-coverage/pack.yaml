    description: "Orchestrates collection and calculation of water consumption and marine impacts."
    phases:
      - water_data_collection
      - water_stress_assessment
      - water_consumption_calculation
      - marine_impacts_assessment
      - e3_report_generation
    estimated_duration_minutes: 35

  - id: e4_biodiversity
    name: "ESRS E4 Biodiversity and Ecosystems Workflow"
