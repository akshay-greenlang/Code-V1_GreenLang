  regulation:
    primary:
      name: "European Sustainability Reporting Standards - Full Set 1"
      reference: "(EU) 2023/2772 - ESRS Set 1"
      effective_date: "2024-01-01"
      description: >-
        ESRS Set 1 comprises 12 standards: ESRS 1 (General Requirements),
        ESRS 2 (General Disclosures), and 10 topical standards covering
        environmental (E1-E5), social (S1-S4), and governance (G1) dimensions.
        All undertakings subject to CSRD must report on ESRS 2 and conduct
        double materiality assessments per ESRS 1. Topical standards (E1-E5,
        S1-S4, G1) are subject to materiality: if a topic is assessed as not
        material, the undertaking may omit the topical disclosures but must
        explain the outcome of the materiality assessment. ESRS requires
        disclosure of policies, actions, targets, and metrics for material
        sustainability matters, with forward-looking information on strategy,
        business model, and value chain impacts.
    secondary:
      - name: "Corporate Sustainability Reporting Directive"
        reference: "(EU) 2022/2464"
        effective_date: "2024-01-01"
      - name: "ESRS 1 General Requirements"
        reference: "(EU) 2023/2772 - ESRS 1"
        effective_date: "2024-01-01"
      - name: "ESRS 2 General Disclosures"
        reference: "(EU) 2023/2772 - ESRS 2"
        effective_date: "2024-01-01"
      - name: "EFRAG XBRL Taxonomy for ESRS"
        reference: "EFRAG ESRS XBRL Taxonomy 2024"
        effective_date: "2024-01-01"
      - name: "EU Taxonomy Regulation"
        reference: "(EU) 2020/852"
        effective_date: "2022-01-01"

  standards_covered:
    - id: ESRS_1
      name: "General Requirements"
      status: embedded
      description: "Embedded in orchestrator (materiality logic, disclosure principles)"
    - id: ESRS_2
      name: "General Disclosures"
