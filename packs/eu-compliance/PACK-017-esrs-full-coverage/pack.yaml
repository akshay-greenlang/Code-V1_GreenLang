        name: "Confirmed incidents of corruption or bribery"
        datapoints: 8
        xbrl_prefix: "esrs:G14"
      - id: G1-5
        name: "Political influence and lobbying activities"
        datapoints: 20
        xbrl_prefix: "esrs:G15"
      - id: G1-6
        name: "Payment practices"
        datapoints: 15
        xbrl_prefix: "esrs:G16"
    inputs:
