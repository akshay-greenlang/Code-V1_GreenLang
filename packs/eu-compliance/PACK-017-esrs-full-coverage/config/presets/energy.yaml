# =============================================================================
# PACK-017 ESRS Full Coverage Pack - Energy Preset
# =============================================================================
# Sector-specific configuration for energy companies including utilities,
# power generators, oil and gas producers, and renewable energy developers.
# NACE division D (Electricity, Gas, Steam) and B06/B09 (Oil and Gas).
#
# Materiality profile:
#   - E1 Climate: HIGHLY MATERIAL (dominant - power generation emissions)
#   - E2 Pollution: MATERIAL (combustion by-products, flaring, spills)
#   - E3 Water: HIGHLY MATERIAL (thermal cooling, hydropower, produced water)
#   - E4 Biodiversity: MATERIAL (land use for renewables/fossil, offshore impacts)
#   - E5 Circular Economy: MAY BE MATERIAL (decommissioning, ash, panel waste)
#   - S1 Own Workforce: MATERIAL (H&S critical in operational roles)
#   - S2 Value Chain Workers: MAY BE MATERIAL (construction, maintenance)
#   - S3 Affected Communities: MATERIAL (energy project siting, just transition)
#   - S4 Consumers: MAY BE MATERIAL (energy affordability, fuel poverty)
#   - G1 Business Conduct: MATERIAL (regulated sector, political engagement)
#
# Key characteristics:
#   - Scope 1 can be very high (thermal generation) or near-zero (pure renewables)
#   - Scope 3 Cat 11 (use of sold products) is major for oil/gas producers
#   - Cooling water withdrawal/discharge is a critical environmental metric
#   - Land use for wind/solar farms triggers biodiversity considerations
#   - Community impacts from energy project siting are significant
#   - Just transition obligations for fossil fuel workforce phase-down
# =============================================================================

# --- Preset Metadata ---
preset_name: "energy"
pack_id: "PACK-017"
pack_name: "ESRS Full Coverage Pack"
esrs_version: "ESRS Set 1 (2023)"
sector: "ENERGY"
nace_codes: ["B06", "B09", "D", "E"]

# --- ESRS Standard Materiality ---
materiality:
  e1_climate_change: HIGHLY_MATERIAL
  e2_pollution: MATERIAL
  e3_water_marine_resources: HIGHLY_MATERIAL
  e4_biodiversity_ecosystems: MATERIAL
  e5_resource_use_circular_economy: MAY_BE_MATERIAL
  s1_own_workforce: MATERIAL
  s2_workers_in_value_chain: MAY_BE_MATERIAL
  s3_affected_communities: MATERIAL
  s4_consumers_end_users: MAY_BE_MATERIAL
  g1_business_conduct: MATERIAL

# --- E1 Climate Change ---
e1_climate_change:
  enabled: true
  disclosure_requirements:
    - "E1-1"   # Transition plan for climate change mitigation
    - "E1-2"   # Policies related to climate change mitigation and adaptation
    - "E1-3"   # Actions and resources related to climate change
    - "E1-4"   # Targets related to climate change mitigation and adaptation
    - "E1-5"   # Energy consumption and mix
    - "E1-6"   # Gross Scopes 1, 2, 3 and total GHG emissions
    - "E1-7"   # GHG removals and GHG mitigation projects (carbon credits)
    - "E1-8"   # Internal carbon pricing
    - "E1-9"   # Anticipated financial effects from climate-related risks
  ghg:
    consolidation_approach: "OPERATIONAL_CONTROL"
    gwp_source: "IPCC_AR6"
    emission_factors_source: "IEA_2024"
    scopes_enabled: ["SCOPE_1", "SCOPE_2_LOCATION", "SCOPE_2_MARKET", "SCOPE_3"]
    scope_3_categories: [1, 3, 4, 5, 6, 7, 9, 11, 12, 15]
    scope_3_default_method: "HYBRID"
    kyoto_gas_disaggregation: true
    biogenic_co2_separate: true
    methane_tracking:
      enabled: true
      leak_detection: true
      flaring_tracking: true
      venting_tracking: true
    ghg_intensity_denominators:
      - "net_revenue_eur_million"
      - "mwh_generated"
      - "boe_produced"
  energy:
    reporting_unit: "MWh"
    fossil_fuel_types: ["NATURAL_GAS", "COAL", "FUEL_OIL", "DIESEL", "CRUDE_OIL"]
    renewable_categories: ["SOLAR", "WIND", "HYDRO", "BIOMASS", "GEOTHERMAL"]
    self_generation_tracking: true
    grid_emission_factor_tracking: true
    capacity_factor_tracking: true
    energy_intensity_denominators:
      - "mwh_generated"
      - "net_revenue_eur_million"
  transition_plan:
    target_year: 2050
    interim_target_years: [2027, 2030, 2035, 2040, 2045]
    scenario_alignment: "1.5C"
    decarbonization_levers:
      - "fossil_phase_down"
      - "renewable_expansion"
      - "battery_storage"
      - "green_hydrogen"
      - "grid_modernization"
      - "carbon_capture"
      - "energy_efficiency"
      - "nuclear_consideration"
    just_transition_plan: true
  carbon_pricing:
    has_carbon_pricing: true
    pricing_methods: ["SHADOW_PRICE", "REGULATORY"]
    default_price_per_tco2e: "95.00"
    eu_ets_participation: true

# --- E2 Pollution ---
e2_pollution:
  enabled: true
  disclosure_requirements:
    - "E2-1"   # Policies related to pollution
    - "E2-2"   # Actions and resources related to pollution
    - "E2-3"   # Targets related to pollution
    - "E2-4"   # Pollution of air, water and soil
    - "E2-5"   # Substances of concern and substances of very high concern
    - "E2-6"   # Anticipated financial effects from pollution-related risks
  pollutant_categories:
    air: ["NOx", "SOx", "PM10", "PM2_5", "CO", "mercury", "heavy_metals"]
    water: ["thermal_discharge", "produced_water", "oil_sheen", "heavy_metals"]
    soil: ["hydrocarbons", "PFAS", "ash_residues"]
  regulatory_frameworks: ["IED", "E_PRTR", "MARPOL", "OSPAR"]
  spill_reporting: true
  flaring_reporting: true
  incident_reporting: true

# --- E3 Water and Marine Resources ---
e3_water_marine_resources:
  enabled: true
  disclosure_requirements:
    - "E3-1"   # Policies related to water and marine resources
    - "E3-2"   # Actions and resources related to water and marine resources
    - "E3-3"   # Targets related to water and marine resources
    - "E3-4"   # Water consumption
    - "E3-5"   # Anticipated financial effects from water-related risks
  water_metrics:
    withdrawal_by_source: true
    discharge_by_destination: true
    consumption_calculation: true
    recycled_water_tracking: true
    water_stress_areas: true
    thermal_discharge_temperature: true
  reporting_unit: "megalitres"
  wri_aqueduct_integration: true
  water_types: ["COOLING_ONCE_THROUGH", "COOLING_RECIRCULATING", "PROCESS", "PRODUCED_WATER"]
  marine_environment:
    offshore_operations: true
    marine_discharge_monitoring: true
    ballast_water_management: false

# --- E4 Biodiversity and Ecosystems ---
e4_biodiversity_ecosystems:
  enabled: true
  disclosure_requirements:
    - "E4-1"   # Transition plan on biodiversity and ecosystems
    - "E4-2"   # Policies related to biodiversity and ecosystems
    - "E4-3"   # Actions and resources related to biodiversity
    - "E4-4"   # Targets related to biodiversity and ecosystems
    - "E4-5"   # Impact metrics related to biodiversity change
    - "E4-6"   # Anticipated financial effects from biodiversity-related risks
  land_use_tracking: true
  proximity_to_protected_areas: true
  deforestation_free_supply_chain: false
  tnfd_alignment: true
  biodiversity_footprint_method: "MSA"
  energy_specific:
    avian_mortality_tracking: true
    habitat_restoration: true
    marine_ecosystem_monitoring: true
    decommissioning_habitat_plans: true
    environmental_impact_assessments: true

# --- E5 Resource Use and Circular Economy ---
e5_resource_use_circular_economy:
  enabled: true
  disclosure_requirements:
    - "E5-1"   # Policies related to resource use and circular economy
    - "E5-2"   # Actions and resources related to resource use
    - "E5-3"   # Targets related to resource use and circular economy
    - "E5-4"   # Resource inflows
    - "E5-5"   # Resource outflows
    - "E5-6"   # Anticipated financial effects from circular economy
  waste_categories: ["HAZARDOUS", "NON_HAZARDOUS", "RADIOACTIVE"]
  waste_treatment_methods: ["RECYCLING", "INCINERATION", "LANDFILL", "RECOVERY", "SPECIALIZED"]
  circular_metrics:
    recycled_input_rate: true
    recyclability_rate: true
    waste_diversion_rate: true
  decommissioning:
    solar_panel_recycling: true
    wind_turbine_blade_recycling: true
    platform_decommissioning: true
    ash_and_slag_reuse: true
  reporting_unit: "tonnes"

# --- S1 Own Workforce ---
s1_own_workforce:
  enabled: true
  disclosure_requirements:
    - "S1-1"   # Policies related to own workforce
    - "S1-2"   # Processes for engaging with own workforce
    - "S1-3"   # Processes to remediate negative impacts
    - "S1-4"   # Taking action on material impacts
    - "S1-5"   # Targets related to managing negative impacts
    - "S1-6"   # Characteristics of the undertaking's employees
    - "S1-7"   # Characteristics of non-employee workers
    - "S1-8"   # Collective bargaining coverage and social dialogue
    - "S1-9"   # Diversity metrics
    - "S1-10"  # Adequate wages
    - "S1-11"  # Social protection
    - "S1-12"  # Persons with disabilities
    - "S1-13"  # Training and skills development metrics
    - "S1-14"  # Health and safety metrics
    - "S1-15"  # Work-life balance metrics
    - "S1-16"  # Remuneration metrics (pay gap, pay ratio)
    - "S1-17"  # Incidents, complaints and severe human rights impacts
  health_and_safety:
    fatality_tracking: true
    ltir_tracking: true
    trir_tracking: true
    near_miss_reporting: true
    occupational_disease_tracking: true
    safety_critical_roles: true
    process_safety_events: true
    ohs_management_system: "ISO_45001"
  training:
    hours_per_employee: true
    skills_development_programs: true
    just_transition_reskilling: true
  collective_bargaining:
    coverage_tracking: true
    works_council_engagement: true
  diversity:
    gender_breakdown: true
    age_breakdown: true
    disability_tracking: true

# --- S2 Workers in the Value Chain ---
s2_workers_in_value_chain:
  enabled: true
  disclosure_requirements:
    - "S2-1"   # Policies related to value chain workers
    - "S2-2"   # Processes for engaging with value chain workers
    - "S2-3"   # Processes to remediate negative impacts
    - "S2-4"   # Taking action on material impacts
    - "S2-5"   # Targets related to managing negative impacts
  due_diligence:
    supplier_code_of_conduct: true
    audit_programme: true
    corrective_action_tracking: true
    contractor_safety_standards: true
  focus_areas:
    - "contractor_health_and_safety"
    - "construction_worker_conditions"
    - "forced_labour_in_supply_chain"
    - "living_wage"

# --- S3 Affected Communities ---
s3_affected_communities:
  enabled: true
  disclosure_requirements:
    - "S3-1"   # Policies related to affected communities
    - "S3-2"   # Processes for engaging with affected communities
    - "S3-3"   # Processes to remediate negative impacts
    - "S3-4"   # Taking action on material impacts
    - "S3-5"   # Targets related to managing negative impacts
  community_engagement:
    stakeholder_mapping: true
    grievance_mechanism: true
    indigenous_peoples_consultation: true
    fpic_process: true
    public_hearings: true
  impact_categories:
    - "energy_project_siting"
    - "displacement_and_resettlement"
    - "noise_and_visual_amenity"
    - "local_employment_and_procurement"
    - "energy_affordability"
    - "just_transition_communities"
    - "environmental_justice"

# --- S4 Consumers and End-Users ---
s4_consumers_end_users:
  enabled: true
  disclosure_requirements:
    - "S4-1"   # Policies related to consumers and end-users
    - "S4-2"   # Processes for engaging with consumers and end-users
    - "S4-3"   # Processes to remediate negative impacts
    - "S4-4"   # Taking action on material impacts
    - "S4-5"   # Targets related to managing negative impacts
  focus_areas:
    - "energy_affordability"
    - "fuel_poverty_programmes"
    - "disconnection_policies"
    - "customer_data_protection"
    - "service_reliability"

# --- G1 Business Conduct ---
g1_business_conduct:
  enabled: true
  disclosure_requirements:
    - "G1-1"   # Business conduct policies and corporate culture
    - "G1-2"   # Management of relationships with suppliers
    - "G1-3"   # Prevention and detection of corruption and bribery
    - "G1-4"   # Confirmed incidents of corruption or bribery
    - "G1-5"   # Political influence and lobbying activities
    - "G1-6"   # Payment practices
  anti_corruption:
    policy_in_place: true
    training_programme: true
    whistleblower_mechanism: true
    incident_tracking: true
    high_risk_country_monitoring: true
  supplier_management:
    payment_terms_tracking: true
    late_payment_monitoring: true
    sme_payment_practices: true
  political_engagement:
    lobbying_disclosure: true
    political_donations_policy: "DISCLOSURE_REQUIRED"
    energy_policy_engagement: true
    climate_policy_alignment_tracking: true

# --- Cross-Cutting (ESRS 1 and ESRS 2) ---
cross_cutting:
  esrs_1_general_requirements:
    double_materiality_assessment: true
    value_chain_scope: "UPSTREAM_AND_DOWNSTREAM"
    time_horizons:
      short_term_years: 1
      medium_term_years: 5
      long_term_years: 15
  esrs_2_general_disclosures:
    disclosure_requirements:
      - "ESRS2-BP1"   # General basis for preparation
      - "ESRS2-BP2"   # Disclosures in relation to specific circumstances
      - "ESRS2-GOV1"  # Role of administrative, management and supervisory bodies
      - "ESRS2-GOV2"  # Information provided to and sustainability matters addressed
      - "ESRS2-GOV3"  # Integration of sustainability performance in incentive schemes
      - "ESRS2-GOV4"  # Statement on due diligence
      - "ESRS2-GOV5"  # Risk management and internal controls
      - "ESRS2-SBM1"  # Strategy, business model and value chain
      - "ESRS2-SBM2"  # Interests and views of stakeholders
      - "ESRS2-SBM3"  # Material impacts, risks and opportunities
      - "ESRS2-IRO1"  # Processes to identify and assess material IROs
      - "ESRS2-IRO2"  # Disclosure requirements covered by the sustainability statement
    governance_body_oversight: true
    incentive_scheme_integration: true
    due_diligence_statement: true

# --- Reporting ---
reporting:
  output_formats: ["PDF", "XBRL", "HTML"]
  xbrl_taxonomy: "ESRS_XBRL_2024"
  xbrl_tagging: true
  sha256_provenance: true
  multi_language: true
  supported_languages: ["en", "de"]
  review_workflow: true
  watermark_draft: true
  audit_trail_report: true
  executive_summary: true
  year_over_year_comparison: true
  data_quality_disclosure: true
  assumption_disclosure: true
  assurance_level: "LIMITED"
  retention_years: 10

# --- Performance ---
performance:
  max_processing_time_minutes: 180
  max_memory_gb: 12
