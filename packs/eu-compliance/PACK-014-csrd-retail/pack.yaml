# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 75
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 15
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  store_processing:
    max_stores: 5000
    max_sqm_total: 10000000
    target_duration_minutes: 15
    store_emission_calc_per_store_ms: 50
  scope3:
    max_suppliers: 50000
    max_sku_count: 500000
    target_duration_minutes: 60
  packaging:
    max_packaging_items: 100000
    ppwr_assessment_per_item_ms: 20
    target_duration_minutes: 15
  food_waste:
    max_stores_tracked: 5000
    waste_calc_per_store_ms: 30
    target_duration_minutes: 10
  supply_chain_dd:
    max_suppliers_screened: 50000
    eudr_commodity_trace_per_item_ms: 100
    target_duration_minutes: 90
  cache_hit_ratio_target: 0.70
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with store-level and regional access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - retail_compliance_officer
    - sustainability_manager
    - store_operations_manager
    - supply_chain_manager
    - packaging_manager
    - food_safety_officer
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
