# =============================================================================
# PACK-009 Demo Configuration
# =============================================================================
# Minimal demo/sandbox configuration for quick testing, onboarding, and
# sales demonstrations. Uses synthetic data, mocked pack responses, and
# a reduced regulation scope (CSRD + EU Taxonomy only) for simplicity.
#
# Usage:
#   >>> config = PackConfig.from_preset("enterprise_full", demo_mode=True)
#   Or load this file directly:
#   >>> config = PackConfig.from_yaml("config/demo/demo_config.yaml")
#
# Features:
#   - CSRD + EU Taxonomy enabled (CBAM + EUDR disabled for simplicity)
#   - Synthetic financial, emissions, and supply chain data
#   - Mocked constituent pack API responses
#   - Simplified scoring and gap analysis
#   - Tutorial mode with guided onboarding steps
#   - Reduced data quality thresholds
#   - Short audit trail retention (1 year)
#   - No XBRL tagging or advanced features
#
# Sample Data Paths:
#   - data/demo/emissions/   - Synthetic GHG emissions CSV files
#   - data/demo/financial/   - Synthetic turnover/CapEx/OpEx data
#   - data/demo/evidence/    - Sample evidence documents (PDFs, certificates)
#   - data/demo/supply_chain/- Sample supplier and commodity data
# =============================================================================

bundle_tier: "SME_ESSENTIAL"
organization_name: "Demo Climate Corp GmbH"
reporting_year: 2025

# --- Regulation Configurations ---
regulation_configs:
  CSRD:
    enabled: true
    priority: 1
    pack_id: "PACK-001-csrd-starter"
    display_name: "Corporate Sustainability Reporting Directive"
    regulation_reference: "Directive (EU) 2022/2464"
    scoring_weight: 0.50
    data_quality_threshold: 0.50
    reporting_frequency: "ANNUAL"
  CBAM:
    enabled: false
    priority: 5
    pack_id: "PACK-004-cbam-readiness"
    display_name: "Carbon Border Adjustment Mechanism"
    regulation_reference: "Regulation (EU) 2023/956"
    scoring_weight: 0.00
    data_quality_threshold: 0.50
    reporting_frequency: "QUARTERLY"
  EUDR:
    enabled: false
    priority: 5
    pack_id: "PACK-006-eudr-starter"
    display_name: "EU Deforestation Regulation"
    regulation_reference: "Regulation (EU) 2023/1115"
    scoring_weight: 0.00
    data_quality_threshold: 0.50
    reporting_frequency: "PER_SHIPMENT"
  TAXONOMY:
    enabled: true
    priority: 2
    pack_id: "PACK-008-eu-taxonomy-alignment"
    display_name: "EU Taxonomy Regulation"
    regulation_reference: "Regulation (EU) 2020/852"
    scoring_weight: 0.50
    data_quality_threshold: 0.50
    reporting_frequency: "ANNUAL"

# --- Calendar Configuration ---
calendar:
  enabled: true
  lead_time_days: 14
  critical_lead_time_days: 3
  notification_channels:
    - "IN_APP"
  conflict_detection: false
  auto_schedule_reviews: false
  review_lead_time_days: 7
  include_csrd_deadlines: true
  include_cbam_deadlines: false
  include_eudr_deadlines: false
  include_taxonomy_deadlines: true
  fiscal_year_end_month: 12
  timezone: "Europe/Brussels"

# --- Deduplication Configuration ---
deduplication:
  enabled: true
  fuzzy_match_threshold: 0.80
  hash_comparison: true
  semantic_similarity: false
  auto_merge: false
  track_savings: true
  dedup_categories:
    - "GHG_EMISSIONS"
    - "FINANCIAL_DATA"
  batch_size: 50
  preserve_provenance: true

# --- Consistency Configuration ---
consistency:
  enabled: true
  numeric_tolerance_pct: 15.0
  date_tolerance_days: 5
  auto_reconcile: false
  reconciliation_action: "FLAG_FOR_REVIEW"
  check_ghg_emissions: true
  check_financial_data: true
  check_supply_chain: false
  check_taxonomy_csrd: true
  check_cbam_taxonomy: false
  check_eudr_taxonomy: false

# --- Gap Analysis Configuration ---
gap_analysis:
  enabled: true
  severity_levels:
    - "CRITICAL"
    - "HIGH"
    - "MEDIUM"
  include_remediation_plans: true
  include_effort_estimates: false
  include_cost_estimates: false
  cross_regulation_leverage: true
  prioritize_shared_gaps: false
  gap_refresh_frequency: "QUARTERLY"
  max_gaps_per_report: 20
  include_dependency_chains: false

# --- Evidence Configuration ---
evidence:
  enabled: true
  evidence_types:
    - "DOCUMENT"
    - "CALCULATION"
    - "REPORT"
  deduplication: false
  hash_algorithm: "SHA-256"
  retention_years: 1
  lifecycle_tracking: false
  auto_expire: false
  require_verification: false
  max_file_size_mb: 10
  cross_reference_tracking: true

# --- Reporting Configuration ---
reporting:
  enabled: true
  default_format: "PDF"
  generate_executive_summary: true
  generate_dashboard: true
  generate_gap_report: true
  generate_calendar_report: false
  generate_consistency_report: false
  generate_dedup_report: false
  generate_audit_trail: false
  generate_data_map: false
  include_trend_analysis: false
  include_forecasting: false
  language: "en"
  timezone: "UTC"
  xbrl_tagging: false
  distribution_channels:
    - "in_app"

# --- Scoring Configuration ---
scoring:
  enabled: true
  composite_method: "WEIGHTED_AVERAGE"
  regulation_weights:
    CSRD: 0.50
    CBAM: 0.00
    EUDR: 0.00
    TAXONOMY: 0.50
  passing_score: 50.0
  letter_grade_thresholds:
    A: 90.0
    B: 80.0
    C: 70.0
    D: 60.0
    F: 0.0
  include_trend: false
  score_data_quality: false
  score_evidence_completeness: false
  score_timeliness: false

# --- Data Mapper Configuration ---
data_mapper:
  enabled: true
  active_categories:
    - "GHG_EMISSIONS"
    - "FINANCIAL_DATA"
  unit_conversion: true
  currency_normalization: true
  base_currency: "EUR"
  temporal_alignment: false
  field_mapping_validation: false
  track_mapping_coverage: false

# --- Health Check Configuration ---
health_check:
  enabled: false
  check_interval_minutes: 60
  check_pack_availability: true
  check_agent_status: false
  check_database_connectivity: true
  check_api_health: false
  check_configuration_validity: false
  check_integration_status: false
  alert_on_degradation: false
  alert_channels:
    - "IN_APP"

# --- Audit Trail Configuration ---
audit_trail:
  enabled: true
  retention_years: 1
  hash_algorithm: "SHA-256"
  immutable_log: false
  include_provenance_hash: true
  cross_pack_lineage: false
  export_formats:
    - "JSON"
  user_attribution: false

# --- Demo Configuration ---
demo:
  demo_mode_enabled: true
  use_synthetic_data: true
  mock_pack_responses: true
  mock_erp_data: true
  mock_supply_chain_data: true
  tutorial_mode_enabled: true
  sample_regulations:
    - "CSRD"
    - "TAXONOMY"
  sample_data_path: "data/demo"
