      version: "1.1.0"
      description: >-
        CBAM compliance application with quarterly reporting, annual
        declaration management, certificate tracking, supplier emissions
        data portal, de minimis monitoring, and verification workflow.
      required: true
      path: "applications/GL-CBAM-APP"
      inherited_from: "PACK-004-cbam-readiness"

  # Foundation agents (inherited from PACK-004)
  foundation_agents:
    - id: AGENT-FOUND-001
      name: "GreenLang Orchestrator (DAG)"
