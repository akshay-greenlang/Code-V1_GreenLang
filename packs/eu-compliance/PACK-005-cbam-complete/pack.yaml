      description: "Extracts embedded emission data from supplier PDF reports and customs declarations"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-002
      name: "Excel/CSV Normalizer"
      description: "Normalizes import manifests and supplier emission worksheets"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-003
      name: "ERP/Finance Connector"
      description: "Connects to SAP, Oracle, and customs management systems"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-004
      name: "API Gateway Agent"
      description: "Manages CBAM registry API connections and rate limiting"
      required: true
      new_in: "PACK-005"

    - id: AGENT-DATA-005
      name: "EUDR Traceability Connector"
      description: "Cross-regulation connector for EUDR supply chain data sharing"
      required: false
      new_in: "PACK-005"

    - id: AGENT-DATA-008
      name: "Supplier Questionnaire Processor"
      description: "Processes and scores supplier emission data questionnaires"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-009
