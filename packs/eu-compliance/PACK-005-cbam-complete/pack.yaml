      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-FOUND-006
      name: "Access & Policy Guard"
      description: "Enforces role-based access control for multi-entity group operations"
      required: true
      new_in: "PACK-005"

    - id: AGENT-FOUND-007
      name: "Agent Registry & Service Catalog"
      description: "Service catalog for dynamic agent discovery and routing"
      required: false
      new_in: "PACK-005"

    - id: AGENT-FOUND-008
      name: "Reproducibility Agent"
