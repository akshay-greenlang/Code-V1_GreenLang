# Workflows - Pre-defined orchestration sequences (7 inherited + 6 new)
# -----------------------------------------------------------------------------
workflows:

  # INHERITED from PACK-004 (7 workflows)
  quarterly_reporting:
    display_name: "Quarterly CBAM Report"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "quarterly"
    estimated_duration_days: 14

  annual_declaration:
    display_name: "Annual CBAM Declaration"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "annual"
    estimated_duration_days: 30

  supplier_onboarding:
    display_name: "Supplier Onboarding"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "on_demand"
    estimated_duration_days: 21

  certificate_management:
    display_name: "Certificate Management Cycle"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "continuous"
    estimated_duration_days: 365

  verification_cycle:
    display_name: "Verification Cycle"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "annual"
    estimated_duration_days: 45

  deminimis_assessment:
    display_name: "De Minimis Assessment"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "continuous"
    estimated_duration_days: 365

  data_collection:
    display_name: "CBAM Data Collection"
    inherited_from: "PACK-004-cbam-readiness"
    schedule: "weekly"
    estimated_duration_days: 3

  # NEW in PACK-005 (6 workflows)
  certificate_trading_cycle:
    display_name: "Certificate Trading & Optimization Cycle"
    new_in: "PACK-005"
    description: >-
      End-to-end certificate trading workflow. Analyzes price trends,
      executes buying strategy, manages portfolio valuation, performs
      quarterly rebalancing, and optimizes surrender timing. Integrates
      with CBAM registry for live price feeds and purchase execution.
    schedule: "continuous"
    estimated_duration_days: 365
    phases:
      - name: price_analysis
        description: "Analyze EU ETS auction prices and certificate price trends"
        agents: [GL-CBAM-APP, AGENT-FOUND-003]
        duration_days: 365

      - name: strategy_execution
        description: "Execute buying strategy (DCA, price-triggered, budget-paced)"
        agents: [GL-CBAM-APP, cbam-certificate-manager]
        duration_days: 365

      - name: portfolio_valuation
        description: "Mark-to-market or FIFO valuation of certificate holdings"
        agents: [GL-CBAM-APP, AGENT-FOUND-005]
        duration_days: 365

      - name: quarterly_rebalancing
        description: "Rebalance certificate portfolio to meet quarterly holding targets"
        agents: [GL-CBAM-APP, cbam-compliance-agent]
        duration_days: 90

      - name: surrender_optimization
        description: "Optimize surrender quantity and timing for cost minimization"
        agents: [GL-CBAM-APP, AGENT-FOUND-003, AGENT-FOUND-008]
        duration_days: 30

  group_consolidation:
    display_name: "Group Consolidation Workflow"
    new_in: "PACK-005"
    description: >-
      Consolidates CBAM data across all entities in a corporate group.
      Collects entity-level import data, allocates shared costs, reconciles
      inter-entity transfers, generates consolidated group report, and
      prepares delegated compliance packages.
    schedule: "quarterly"
    estimated_duration_days: 21
    phases:
      - name: entity_data_collection
        description: "Collect import and emission data from each group entity"
        agents: [AGENT-DATA-003, AGENT-DATA-002, GL-CBAM-APP]
        duration_days: 7

      - name: inter_entity_reconciliation
        description: "Reconcile inter-entity transfers and shared supplier data"
        agents: [AGENT-DATA-015, AGENT-DATA-019, GL-CBAM-APP]
        duration_days: 5

      - name: cost_allocation
        description: "Allocate shared CBAM costs across entities by chosen method"
        agents: [GL-CBAM-APP, AGENT-FOUND-003]
        duration_days: 3

      - name: consolidated_reporting
        description: "Generate consolidated group CBAM report"
        agents: [GL-CBAM-APP, AGENT-FOUND-005, cbam-compliance-agent]
        duration_days: 4

      - name: delegation_packaging
        description: "Prepare delegated compliance packages for subsidiary entities"
        agents: [GL-CBAM-APP, AGENT-FOUND-008]
        duration_days: 2

  registry_sync:
    display_name: "Registry Synchronization Workflow"
    new_in: "PACK-005"
    description: >-
      Bidirectional synchronization with the CBAM registry. Submits reports
      and declarations, retrieves submission status, processes registry
      notifications, and archives registry confirmations with provenance.
    schedule: "daily"
    estimated_duration_days: 365
    phases:
      - name: outbound_submission
        description: "Submit pending reports and declarations to registry"
        agents: [GL-CBAM-APP, AGENT-DATA-004]
        duration_days: 365

      - name: status_polling
        description: "Poll registry for submission status updates"
        agents: [AGENT-DATA-004, AGENT-FOUND-010]
        duration_days: 365

      - name: notification_processing
        description: "Process registry notifications and alerts"
        agents: [GL-CBAM-APP, AGENT-DATA-004]
        duration_days: 365

      - name: confirmation_archival
        description: "Archive registry confirmations with SHA-256 provenance"
        agents: [AGENT-FOUND-005, AGENT-FOUND-008]
        duration_days: 365

  anti_circumvention_monitoring:
    display_name: "Anti-Circumvention Monitoring"
    new_in: "PACK-005"
    description: >-
      Continuous monitoring of import patterns for circumvention indicators.
      Detects suspicious origin changes, CN code reclassifications, unusual
      scrap ratios, supply chain restructuring, and minor processing patterns.
      Generates compliance alerts and evidence packages for NCA defense.
    schedule: "continuous"
    estimated_duration_days: 365
    phases:
      - name: pattern_detection
        description: "Analyze import patterns against circumvention thresholds"
        agents: [anti-circumvention-monitor, AGENT-DATA-019]
        duration_days: 365

      - name: origin_tracking
        description: "Track origin changes and supply chain shifts"
        agents: [anti-circumvention-monitor, AGENT-DATA-018]
        duration_days: 365

      - name: alert_generation
        description: "Generate alerts and evidence for suspicious patterns"
        agents: [anti-circumvention-monitor, AGENT-FOUND-005]
        duration_days: 365

      - name: nca_defense_preparation
        description: "Prepare defense evidence packages for NCA inquiries"
        agents: [anti-circumvention-monitor, AGENT-FOUND-008]
        duration_days: 30

  cross_regulation_sync:
    display_name: "Cross-Regulation Data Synchronization"
    new_in: "PACK-005"
    description: >-
      Synchronizes CBAM emission data to other regulatory frameworks.
      Maps embedded emissions to CSRD E1 disclosures, CDP questionnaire
      responses, SBTi tracking, EU Taxonomy metrics, and EU ETS monitoring.
    schedule: "quarterly"
    estimated_duration_days: 7
    phases:
      - name: data_extraction
        description: "Extract CBAM emission data for cross-regulation mapping"
        agents: [GL-CBAM-APP, regulatory-mapping-agent]
        duration_days: 2

      - name: framework_mapping
        description: "Map emissions to target framework formats"
        agents: [regulatory-mapping-agent, AGENT-FOUND-003]
        duration_days: 2

      - name: gap_analysis
        description: "Identify gaps between CBAM data and framework requirements"
        agents: [compliance-gap-analyzer, AGENT-DATA-019]
        duration_days: 2

      - name: data_push
        description: "Push mapped data to target framework modules"
        agents: [regulatory-mapping-agent, AGENT-DATA-004]
        duration_days: 1

  nca_audit_preparation:
    display_name: "NCA Audit Preparation"
    new_in: "PACK-005"
    description: >-
      Prepares for National Competent Authority audits. Assembles evidence
      packages, sets up secure data rooms, validates compliance completeness,
      generates audit-ready exports, and tracks NCA correspondence deadlines.
    schedule: "on_demand"
    estimated_duration_days: 30
    phases:
      - name: evidence_assembly
        description: "Assemble all CBAM evidence: reports, certificates, verifications"
        agents: [AGENT-FOUND-005, AGENT-FOUND-008, GL-CBAM-APP]
        duration_days: 7

      - name: completeness_check
        description: "Validate evidence completeness against NCA checklist"
        agents: [cbam-compliance-agent, compliance-gap-analyzer]
        duration_days: 5

      - name: data_room_setup
        description: "Set up encrypted data room with organized evidence"
        agents: [GL-CBAM-APP, AGENT-FOUND-006]
        duration_days: 3

      - name: audit_export
        description: "Generate audit-ready exports in NCA-required formats"
        agents: [GL-CBAM-APP, AGENT-FOUND-005]
        duration_days: 5

      - name: remediation_tracking
        description: "Track open items and remediation actions"
        agents: [cbam-compliance-agent, AGENT-FOUND-010]
        duration_days: 10

