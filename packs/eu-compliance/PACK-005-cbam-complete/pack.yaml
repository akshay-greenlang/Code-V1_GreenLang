  # Data quality agents (inherited from PACK-004 + new)
  quality_agents:
    - id: AGENT-DATA-010
      name: "Data Quality Profiler"
      description: "Profiles data quality across all import and emission metrics"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-011
      name: "Duplicate Detection Agent"
      description: "Detects duplicate import records and supplier submissions"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

    - id: AGENT-DATA-015
      name: "Cross-Source Reconciliation Agent"
      description: "Reconciles import data across customs, ERP, and supplier sources"
      required: true
      new_in: "PACK-005"

    - id: AGENT-DATA-018
      name: "Data Lineage Tracker"
      description: "Full lineage tracking from source data to declaration submission"
      required: true
      new_in: "PACK-005"

    - id: AGENT-DATA-019
      name: "Validation Rule Engine"
      description: "Enforces CBAM validation rules on CN codes, emissions, and submissions"
      required: true
      inherited_from: "PACK-004-cbam-readiness"

  # Industry-specific calculators (inherited from PACK-004 + new)
  industry_calculators:
    - id: steel-calculator
      name: "Steel Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for iron and steel products (CN 72xx,
        73xx) using BF-BOF, EAF, and DRI production routes.
      required: true
      path: "calculators/steel_calculator"
      goods_categories: ["IRON_STEEL"]
      cn_code_ranges: ["7201-7229", "7301-7326"]
      inherited_from: "PACK-004-cbam-readiness"

    - id: cement-calculator
      name: "Cement Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for cement and clinker products (CN 2523).
      required: true
      path: "calculators/cement_calculator"
      goods_categories: ["CEMENT"]
      cn_code_ranges: ["2523"]
      inherited_from: "PACK-004-cbam-readiness"

    - id: aluminum-calculator
      name: "Aluminium Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for aluminium products (CN 76xx).
      required: true
      path: "calculators/aluminum_calculator"
      goods_categories: ["ALUMINIUM"]
      cn_code_ranges: ["7601-7616"]
      inherited_from: "PACK-004-cbam-readiness"

    - id: fertilizer-calculator
      name: "Fertilizer Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for fertilizer products (CN 28xx, 31xx).
        Covers ammonia, urea, nitric acid, ammonium nitrate, NPK, and mixed
        fertilizers. Handles N2O process emissions, SMR feedstock CO2, and
        precursor tracking through the ammonia-urea-AN chain.
      required: true
      path: "calculators/fertilizer_calculator"
      goods_categories: ["FERTILIZERS"]
      cn_code_ranges: ["2808", "2814", "2834", "3102-3105"]
      new_in: "PACK-005"

    - id: electricity-calculator
      name: "Electricity Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for electricity imports (CN 2716).
        Supports grid average, interconnector-specific, and PPA-based
        calculations. Handles cross-border flow attribution and hourly
        granularity when available.
      required: true
      path: "calculators/electricity_calculator"
      goods_categories: ["ELECTRICITY"]
      cn_code_ranges: ["2716"]
      new_in: "PACK-005"

    - id: hydrogen-calculator
      name: "Hydrogen Embedded Emissions Calculator"
      description: >-
        Calculates embedded emissions for hydrogen (CN 2804.10). Supports
        grey (SMR), blue (SMR+CCS), green (electrolysis), turquoise
        (pyrolysis), and pink (nuclear) production routes. Tracks upstream
        electricity emissions for electrolysis pathways.
      required: true
      path: "calculators/hydrogen_calculator"
      goods_categories: ["HYDROGEN"]
      cn_code_ranges: ["2804"]
      new_in: "PACK-005"

  # Industrial MRV agents (inherited from PACK-004 + new)
  industrial_mrv:
    - id: steel-mrv
      name: "Steel MRV Agent"
      description: "Monitoring, Reporting, and Verification for steel installations"
      required: true
      path: "mrv/steel_mrv"
      inherited_from: "PACK-004-cbam-readiness"

    - id: cement-mrv
      name: "Cement MRV Agent"
      description: "MRV agent for cement production installations"
      required: true
      path: "mrv/cement_mrv"
      inherited_from: "PACK-004-cbam-readiness"

    - id: aluminum-mrv
      name: "Aluminium MRV Agent"
      description: "MRV agent for aluminium production installations"
      required: true
      path: "mrv/aluminum_mrv"
      inherited_from: "PACK-004-cbam-readiness"

    - id: fertilizer-mrv
      name: "Fertilizer MRV Agent"
      description: >-
        MRV agent for fertilizer production installations. Monitors ammonia
        synthesis, nitric acid production (N2O), urea prilling/granulation,
        and mixed fertilizer blending.
      required: true
      path: "mrv/fertilizer_mrv"
      installation_types: ["ammonia_plant", "nitric_acid_plant", "urea_plant", "npk_blending"]
      new_in: "PACK-005"

    - id: hydrogen-mrv
      name: "Hydrogen MRV Agent"
      description: >-
        MRV agent for hydrogen production installations. Monitors SMR units,
        electrolyzer systems, CCS capture rates, and electricity source tracking.
      required: true
      path: "mrv/hydrogen_mrv"
      installation_types: ["smr_unit", "electrolyzer", "pyrolysis_reactor"]
      new_in: "PACK-005"

  # CBAM policy agents (inherited from PACK-004 + new)
  cbam_policy:
    - id: cbam-compliance-agent
      name: "CBAM Compliance Agent"
      description: >-
        Enforces CBAM regulatory requirements across the entire pipeline.
        Validates CN code classification, checks reporting deadlines,
        monitors de minimis thresholds, verifies certificate holdings,
        ensures data completeness per Implementing Regulation.
      required: true
      path: "policy/cbam_compliance_agent"
      rules_count: 187
      inherited_from: "PACK-004-cbam-readiness"

    - id: regulatory-mapping-agent
      name: "Regulatory Mapping Agent"
      description: >-
        Maps CBAM data requirements to other regulatory frameworks
        (CSRD E1, CDP Climate, SBTi, EU Taxonomy). Enables single-entry
        multi-framework compliance data flow.
      required: true
      path: "policy/regulatory_mapping_agent"
      new_in: "PACK-005"

    - id: compliance-gap-analyzer
      name: "Compliance Gap Analyzer"
      description: >-
        Performs gap analysis between current CBAM data and full compliance
        requirements. Identifies missing data, methodology gaps, and
        generates remediation plans with effort estimates.
      required: true
      path: "policy/compliance_gap_analyzer"
      new_in: "PACK-005"

    - id: anti-circumvention-monitor
      name: "Anti-Circumvention Monitor"
      description: >-
        Monitors import patterns for potential circumvention indicators
        per Article 27. Detects origin changes, CN code reclassification,
        unusual scrap ratios, supply chain restructuring, and minor
        processing to change classification.
      required: true
      path: "policy/anti_circumvention_monitor"
      rule_types:
        - "origin_change"
        - "cn_reclassification"
        - "scrap_ratio"
        - "restructuring"
        - "minor_processing"
      new_in: "PACK-005"

  # Agents bridged from other GreenLang modules
  agents_bridged:
    # GL-CBAM-APP v1.1 agents
    cbam_app_agents:
      - id: cbam-quarterly-reporter
        name: "CBAM Quarterly Report Agent"
        source: "GL-CBAM-APP"
        description: "Generates XML quarterly reports for CBAM registry submission"

      - id: cbam-annual-declarant
        name: "CBAM Annual Declaration Agent"
        source: "GL-CBAM-APP"
        description: "Prepares and submits annual CBAM declarations"

      - id: cbam-certificate-manager
        name: "CBAM Certificate Manager"
        source: "GL-CBAM-APP"
        description: "Manages certificate lifecycle: purchase, hold, surrender, repurchase"

      - id: cbam-supplier-portal
        name: "CBAM Supplier Portal Agent"
        source: "GL-CBAM-APP"
        description: "Manages supplier self-service emission data portal"

    # Industrial MRV agents bridged for precursor chain
    industrial_mrv_agents:
      - id: AGENT-MRV-001
        name: "Stationary Combustion Agent"
        source: "AGENT-MRV"
        description: "Stationary combustion emissions for industrial installations"

      - id: AGENT-MRV-004
        name: "Process Emissions Agent"
        source: "AGENT-MRV"
        description: "Process emissions (calcination, chemical reactions)"

      - id: AGENT-MRV-005
        name: "Fugitive Emissions Agent"
        source: "AGENT-MRV"
        description: "Fugitive emissions (PFC from aluminium, N2O from nitric acid)"

      - id: AGENT-MRV-009
        name: "Scope 2 Location-Based Agent"
        source: "AGENT-MRV"
        description: "Grid electricity emissions for indirect CBAM calculations"

      - id: AGENT-MRV-010
        name: "Scope 2 Market-Based Agent"
        source: "AGENT-MRV"
        description: "PPA/contract-specific electricity emissions"

    # Policy framework agents
    policy_agents:
      - id: cbam-compliance-policy
        name: "CBAM Compliance Policy Engine"
        source: "policy"
        description: "187-rule CBAM compliance policy enforcement"

      - id: regulatory-mapping
        name: "Cross-Regulation Mapping"
        source: "policy"
        description: "Maps CBAM to CSRD/CDP/SBTi/Taxonomy"

      - id: compliance-gap
        name: "Compliance Gap Analysis"
        source: "policy"
        description: "Identifies gaps in CBAM data and methodology"

  # Data assets bundled with the pack
  data_assets:
    - id: cbam_benchmarks
      name: "CBAM Benchmark Data"
      description: >-
        Benchmark emission intensities per goods category, production route,
        and country. Includes EU best-available-technology benchmarks and
        industry averages for gap analysis and target-setting.
      path: "data/cbam_benchmarks.py"
      format: "python"

    - id: cn_codes
      name: "CN Codes Reference Database"
      description: >-
        Complete Combined Nomenclature code database for all CBAM Annex I
        goods. 167 CN codes across 6 categories with descriptions, tariff
        rates, and CBAM classification rules.
      path: "data/cn_codes.json"
      format: "json"

    - id: emission_factors
      name: "Emission Factor Database"
      description: >-
        EU default and country-specific emission factors for all goods
        categories and production routes. Versioned by reference year.
      path: "data/emission_factors.py"
      format: "python"

    - id: cbam_defaults
      name: "CBAM Default Values 2024"
      description: >-
        Published CBAM default values for the transitional and definitive
        periods. Includes EU default values, country default methodology,
        and markup rules.
      path: "data/cbam_defaults_2024.json"
      format: "json"

    - id: carbon_pricing_db
      name: "Third-Country Carbon Pricing Database"
      description: >-
        Carbon pricing schemes (ETS, carbon tax) for 50+ countries.
        Used for calculating carbon price deductions per CBAM Article 9.
      path: "data/carbon_pricing_db.json"
      format: "json"
      new_in: "PACK-005"

    - id: anti_circumvention_rules
      name: "Anti-Circumvention Rule Database"
      description: >-
        Thresholds and detection rules for anti-circumvention monitoring
        per Article 27. Includes pattern definitions and alert criteria.
      path: "data/anti_circumvention_rules.json"
      format: "json"
      new_in: "PACK-005"

# -----------------------------------------------------------------------------
# Engines - Core processing engines (7 inherited + 8 new)
# -----------------------------------------------------------------------------
engines:

  # INHERITED from PACK-004 (7 engines)
  cbam_calculation:
    display_name: "CBAM Embedded Emissions Calculation Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: >-
      Deterministic calculation engine for embedded emissions per CBAM
      methodology. Supports actual, country default, and EU default methods.
    provenance_tracking: true

  certificate:
    display_name: "CBAM Certificate Management Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: >-
      Manages CBAM certificate lifecycle: price tracking, purchase planning,
      holding requirements, surrender scheduling, and re-purchase.

  quarterly_reporting:
    display_name: "Quarterly CBAM Report Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: "Generates quarterly CBAM reports per Implementing Regulation."

  supplier_management:
    display_name: "Supplier Emissions Data Management Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: "Manages supplier emissions data collection, validation, and scoring."

  deminimis:
    display_name: "De Minimis Assessment Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: "Monitors import volumes against CBAM de minimis thresholds."

  verification:
    display_name: "Verification Workflow Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: "Manages third-party verification of embedded emissions data."

  policy_compliance:
    display_name: "CBAM Policy Compliance Engine"
    version: "1.0.0"
    inherited_from: "PACK-004-cbam-readiness"
    description: "Central compliance rule engine with 187 validation rules."

  # NEW in PACK-005 (8 engines)
  certificate_trading:
    display_name: "Certificate Trading & Optimization Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Advanced certificate trading engine with buying strategy optimization,
      price-triggered alerts, DCA (dollar-cost averaging) support, FIFO and
      weighted-average valuation, budget pacing, and portfolio-level cost
      allocation across entities. Supports Monte Carlo simulation for
      optimal purchase timing and quantity optimization.
    features:
      - buying_strategy_optimization
      - price_triggered_alerts
      - dca_scheduling
      - fifo_valuation
      - weighted_average_valuation
      - mark_to_market
      - budget_pacing
      - repurchase_optimization
      - multi_entity_allocation
      - quarterly_rebalancing

  entity_group:
    display_name: "Multi-Entity Group Management Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Manages CBAM compliance across multiple legal entities within a
      corporate group. Supports parent-subsidiary hierarchies, delegated
      compliance (customs representative mode), consolidated reporting,
      cost allocation (volume/revenue/profit center/custom), and financial
      guarantee management. Handles multi-currency consolidation.
    features:
      - entity_hierarchy_management
      - delegated_compliance
      - consolidated_reporting
      - cost_allocation
      - financial_guarantee_tracking
      - multi_currency_consolidation
      - inter_entity_transfers
      - group_level_analytics

  registry_integration:
    display_name: "CBAM Registry API Integration Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Bidirectional integration with the EU CBAM Transitional and Definitive
      Registries. Supports report submission, certificate purchase orders,
      surrender execution, status polling, and registry notification
      processing. Includes sandbox mode for testing.
    features:
      - report_submission
      - certificate_purchase
      - certificate_surrender
      - status_polling
      - notification_processing
      - sandbox_mode
      - retry_with_backoff
      - certificate_authentication

  advanced_analytics:
    display_name: "Advanced CBAM Analytics Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Monte Carlo simulation, scenario analysis, and optimization engine
      for CBAM cost forecasting and strategic planning. Includes emission
      intensity benchmarking, supplier portfolio optimization, price
      sensitivity analysis, and free allocation phase-out impact modeling.
    features:
      - monte_carlo_simulation
      - scenario_tree_analysis
      - sensitivity_analysis
      - supplier_portfolio_optimization
      - benchmark_comparison
      - phase_out_impact_modeling
      - cost_attribution
      - what_if_analysis
    solver: "scipy_optimize"
    default_iterations: 10000

  customs_automation:
    display_name: "Customs Automation Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Automates customs-related CBAM processes including TARIC code
      validation, SAD (Single Administrative Document) parsing, AEO
      (Authorized Economic Operator) status verification, and anti-
      circumvention pattern detection. Integrates with EU customs
      databases for real-time CN code verification.
    features:
      - taric_cn_validation
      - sad_document_parsing
      - aeo_status_check
      - anti_circumvention_detection
      - origin_determination
      - preferential_treatment_check
      - cn_code_cache
      - downstream_monitoring

  cross_regulation:
    display_name: "Cross-Regulation Alignment Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Maps CBAM embedded emissions data to other EU and international
      regulatory frameworks. Enables single-entry, multi-framework data
      flow: CBAM data auto-populates CSRD E1 disclosures, CDP Climate
      questionnaire, SBTi target tracking, EU Taxonomy screening, EU ETS
      monitoring, and EUDR supply chain records.
    supported_regulations:
      - CSRD
      - CDP
      - SBTi
      - EU_TAXONOMY
      - EU_ETS
      - EUDR
    mapping_rules_count: 94

  audit_management:
    display_name: "NCA Audit Management Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Manages National Competent Authority (NCA) audit readiness, evidence
      packaging, data room preparation, auto-remediation alerts, penalty
      risk tracking, and NCA response deadline management. Implements
      10-year retention with encrypted evidence archival.
    features:
      - evidence_packaging
      - data_room_management
      - auto_remediation_alerts
      - nca_response_tracking
      - penalty_calculation
      - evidence_encryption
      - audit_trail_export
      - regulatory_correspondence

  precursor_chain:
    display_name: "Deep Precursor Chain Analysis Engine"
    version: "1.0.0"
    new_in: "PACK-005"
    description: >-
      Analyzes multi-tier precursor chains up to 5 levels deep. Supports
      mass-based, economic, and energy-based allocation methods. Handles
      complex chains like iron ore -> pig iron -> crude steel -> HRC ->
      coated flat product. Includes scrap classification, mass balance
      validation, and fallback waterfall logic when actual data is
      unavailable at intermediate tiers.
    features:
      - multi_tier_analysis
      - mass_allocation
      - economic_allocation
      - energy_allocation
      - scrap_classification
      - mass_balance_validation
      - fallback_waterfall
      - precursor_tree_visualization
    max_depth: 5
    allocation_methods: ["mass", "economic", "energy"]

