# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------
config:
  presets:
    - enterprise_importer
    - customs_broker
    - steel_group
    - multi_commodity_group
  sectors:
    - automotive_oem
    - construction
    - chemical_manufacturing

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
dependencies:
  required:
    - name: "PACK-004-cbam-readiness"
      version: ">= 1.0.0"
      description: "Base CBAM pack providing 7 engines, 7 workflows, and core configuration"

  optional:
    - name: "PACK-001-csrd-starter"
      version: ">= 1.0.0"
      description: "Cross-regulation: CSRD E1 emission mapping from CBAM data"

    - name: "PACK-002-csrd-professional"
      version: ">= 1.0.0"
      description: "Cross-regulation: Advanced CSRD consolidation and scenario analysis"

    - name: "PACK-003-csrd-enterprise"
      version: ">= 1.0.0"
      description: "Cross-regulation: Enterprise CSRD with multi-entity alignment"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  certificate_trading:
    monte_carlo_10k_iterations_max_seconds: 30
    portfolio_valuation_max_seconds: 5
    description: "Certificate trading engine performance targets"

  group_consolidation:
    entity_data_collection_max_seconds: 60
    consolidation_max_seconds: 30
    description: "Group consolidation performance targets"

  registry_api:
    submission_max_seconds: 10
    polling_interval_seconds: 60
    max_retries: 5
    description: "Registry API integration performance targets"

  precursor_chain:
    max_depth_5_analysis_seconds: 15
    mass_balance_validation_seconds: 5
    description: "Precursor chain analysis performance targets"

  anti_circumvention:
    pattern_detection_max_seconds: 10
    full_scan_max_seconds: 120
    description: "Anti-circumvention monitoring performance targets"

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_pack_004_installed
    - verify_registry_api_credentials

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V083"
    new:
      - "V083-PACK005-001"  # Certificate trading tables
      - "V083-PACK005-002"  # Entity group hierarchy
      - "V083-PACK005-003"  # Registry sync state
      - "V083-PACK005-004"  # Anti-circumvention alerts
      - "V083-PACK005-005"  # Cross-regulation mapping
      - "V083-PACK005-006"  # Audit evidence archive
      - "V083-PACK005-007"  # Precursor chain analysis

  post_install:
    - seed_cbam_cn_codes
    - seed_eu_ets_emission_factors
    - seed_country_default_values
    - seed_carbon_pricing_schemes
    - seed_anti_circumvention_rules
    - seed_cross_regulation_mappings
    - seed_default_presets
    - configure_registry_api_connection
    - configure_entity_group_hierarchy
    - run_health_checks
