# =============================================================================
# PACK-005 CBAM Complete Pack - Chemical Manufacturing Sector Preset
# =============================================================================
# Sector overlay for chemical manufacturers importing fertilizers and hydrogen.
# Focus on N2O tracking, hydrogen production pathway analysis, ammonia-urea
# precursor chain, and process emission verification.
#
# Chemical manufacturing imports:
#   - Anhydrous and aqueous ammonia
#   - Urea and ammonium nitrate
#   - Nitric acid and mixed fertilizers (NPK)
#   - Grey, blue, and green hydrogen
#
# NACE code: C20 (Manufacture of chemicals)
# =============================================================================

# Chemical-relevant goods categories
goods:
  enabled_categories:
    - "fertilizers"
    - "hydrogen"
  precursor_tracking:
    fertilizers:
      - "ammonia"
      - "nitric_acid"
      - "urea"
      - "phosphoric_acid"
    hydrogen: []

# Emission calculation - process emissions critical
emission:
  calculation_method: "actual"
  fallback_method: "country_default"
  default_markup_percentage: 30.0
  indirect_emissions_included: true
  precursor_tracking_enabled: true
  emission_factor_source: "eu_default"
  carbon_price_deduction_enabled: true

# Certificate management
certificate:
  cost_scenario: "mid"
  quarterly_holding_target_pct: 50

# Trading - DCA for steady chemical imports
trading:
  buying_strategy: "dca"
  valuation_method: "weighted_average"
  quarterly_holding_target_pct: 50.0
  dca_frequency_weeks: 4
  mark_to_market_frequency: "monthly"

# Analytics - chemical-specific
analytics:
  monte_carlo_iterations: 10000
  benchmark_source: "eu_bat"
  forecast_horizon_years: 5
  sensitivity_variables:
    - "ets_price"
    - "import_volume"
    - "emission_intensity"
    - "natural_gas_price"
    - "n2o_emission_factor"
    - "hydrogen_pathway_mix"
    - "free_allocation_pct"
    - "ammonia_production_route"
    - "ccs_capture_rate"

# Customs - chemical-specific monitoring
customs:
  anti_circumvention_rules:
    - "origin_change"
    - "cn_reclassification"
    - "minor_processing"
  downstream_monitoring: true
  origin_verification_enabled: true

# Cross-regulation - CDP and EUDR relevant for chemicals
cross_regulation:
  csrd_enabled: true
  cdp_enabled: true
  sbti_enabled: true
  taxonomy_enabled: true
  ets_enabled: true
  eudr_enabled: true
  mapping_rules:
    csrd: ["E1-1", "E1-2", "E1-3", "E1-4", "E1-5", "E1-6", "E2-4"]
    cdp: ["C1.1", "C2.1", "C4.1", "C6.1", "C7.1", "C7.5"]
    sbti: ["scope_1", "scope_2_location", "scope_3_cat1", "scope_3_cat3"]
    taxonomy: ["ccm_1", "ccm_2", "ccm_3"]
    eudr: ["supply_chain_origin"]

# Precursor chain - ammonia chain depth
precursor:
  max_chain_depth: 4
  allocation_method: "mass"
  default_fallback_waterfall:
    - "installation_actual"
    - "supplier_actual"
    - "country_default"
    - "eu_default"
    - "conservative_estimate"
  scrap_classification_enabled: false
  mass_balance_validation: true
  mass_balance_tolerance_pct: 5.0
  chain_completeness_threshold_pct: 80.0

# Supplier management - chemical-specific
supplier:
  quality_threshold: 75.0
  max_installations_per_supplier: 25
  auto_fallback_to_defaults: true
  supplier_portal_enabled: true

# Chemical-specific metadata
sector_metadata:
  nace_code: "C20"
  sector_name: "Chemical Manufacturing"
  primary_materials:
    - material: "anhydrous_ammonia"
      cn_codes: ["2814 10 00"]
      typical_volume_tonnes_year: 50000
      typical_sources: ["RU", "TR", "EG", "SA"]
      production_routes: ["haber_bosch", "steam_methane_reforming"]
    - material: "urea"
      cn_codes: ["3102 10 10", "3102 10 90"]
      typical_volume_tonnes_year: 30000
      typical_sources: ["CN", "RU", "EG", "QA"]
    - material: "ammonium_nitrate"
      cn_codes: ["3102 30 10", "3102 30 90"]
      typical_volume_tonnes_year: 20000
      typical_sources: ["RU", "EG", "TR"]
    - material: "nitric_acid"
      cn_codes: ["2808 00 00"]
      typical_volume_tonnes_year: 10000
      typical_sources: ["RU", "BY", "NO"]
    - material: "npk_fertilizer"
      cn_codes: ["3105 20 10", "3105 20 90"]
      typical_volume_tonnes_year: 40000
      typical_sources: ["RU", "CN", "MA"]
    - material: "grey_hydrogen"
      cn_codes: ["2804 10 00"]
      typical_volume_tonnes_year: 5000
      typical_sources: ["NO", "SA", "AE"]
      production_routes: ["grey_smr", "blue_smr_ccs"]
    - material: "green_hydrogen"
      cn_codes: ["2804 10 00"]
      typical_volume_tonnes_year: 1000
      typical_sources: ["CL", "AU", "MA"]
      production_routes: ["green_electrolysis"]
  key_compliance_drivers:
    - "N2O process emission monitoring and verification"
    - "Hydrogen production pathway certification (CertifHy)"
    - "CBAM-specific ammonia precursor tracking"
    - "CSRD E1 + E2 (pollution) disclosure"
    - "EU Taxonomy CCM manufacturing activities"
    - "EUDR supply chain traceability for raw materials"
  process_emission_considerations:
    - "N2O from nitric acid production (Ostwald process)"
    - "CO2 from steam methane reforming (ammonia feedstock)"
    - "CO2 process emissions from urea synthesis"
    - "Methane slip from incomplete SMR conversion"
    - "PFC emissions from electrolysis (negligible for alkaline)"
