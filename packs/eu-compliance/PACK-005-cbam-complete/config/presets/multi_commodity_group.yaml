# =============================================================================
# PACK-005 CBAM Complete Pack - Multi-Commodity Group Preset
# =============================================================================
# Diversified industrial group importing across all 6 CBAM goods categories.
# Full feature set with multi-entity hierarchy, commodity-level cost allocation,
# comprehensive analytics, and cross-regulation alignment.
#
# Typical use cases:
#   - Industrial conglomerates with diverse import portfolios
#   - Trading companies handling multiple commodity classes
#   - Groups with cement, steel, aluminium, and chemicals divisions
#   - Companies importing electricity and hydrogen alongside materials
# =============================================================================

# Importer details
importer:
  company_name: ""
  eori_number: ""
  authorized_declarant: ""
  eu_member_state: null
  cbam_registry_id: ""

# All 6 goods categories
goods:
  enabled_categories:
    - "cement"
    - "iron_steel"
    - "aluminium"
    - "fertilizers"
    - "electricity"
    - "hydrogen"
  precursor_tracking:
    cement: ["clinker"]
    iron_steel: ["pig_iron", "direct_reduced_iron", "crude_steel", "ferro_alloys"]
    aluminium: ["alumina", "unwrought_aluminium"]
    fertilizers: ["ammonia", "nitric_acid", "urea"]
    electricity: []
    hydrogen: []

# Emission calculation
emission:
  calculation_method: "actual"
  fallback_method: "country_default"
  default_markup_percentage: 25.0
  indirect_emissions_included: true
  precursor_tracking_enabled: true
  emission_factor_source: "eu_default"
  carbon_price_deduction_enabled: true

# Certificate management - diversified
certificate:
  ets_price_source: "auction"
  free_allocation_enabled: true
  carbon_deduction_enabled: true
  cost_scenario: "mid"
  quarterly_holding_target_pct: 55

# Certificate trading - DCA across commodities
trading:
  buying_strategy: "dca"
  price_alert_below_eur: 60.0
  price_alert_above_eur: 145.0
  repurchase_threshold_pct: 10.0
  valuation_method: "weighted_average"
  auto_purchase_enabled: false
  quarterly_holding_target_pct: 55.0
  dca_frequency_weeks: 2
  mark_to_market_frequency: "weekly"

# Entity group - commodity-based subsidiaries
entity_group:
  entities: []
  hierarchy_enabled: true
  cost_allocation_method: "revenue"
  consolidation_currency: "EUR"
  delegated_compliance_mode: false
  inter_entity_transfer_tracking: true
  consolidated_declaration: false

# Registry API
registry:
  use_sandbox: true
  auth_type: "mtls"
  polling_interval_seconds: 60
  max_retries: 5
  timeout_seconds: 30

# Advanced analytics - comprehensive multi-commodity
analytics:
  monte_carlo_iterations: 10000
  optimization_solver: "scipy_optimize"
  benchmark_source: "eu_bat"
  forecast_horizon_years: 5
  confidence_level: 0.95
  scenario_count: 5
  sensitivity_variables:
    - "ets_price"
    - "import_volume"
    - "emission_intensity"
    - "scrap_ratio"
    - "free_allocation_pct"
    - "exchange_rate"
    - "commodity_prices"
    - "electricity_grid_factor"
    - "hydrogen_pathway_mix"

# Customs automation
customs:
  sad_format: "xml"
  aeo_check_enabled: true
  anti_circumvention_rules:
    - "origin_change"
    - "cn_reclassification"
    - "scrap_ratio"
    - "restructuring"
    - "minor_processing"
  downstream_monitoring: true
  cn_cache_ttl_hours: 24
  origin_verification_enabled: true
  suspicious_pattern_alert_threshold: 3

# Cross-regulation - all frameworks
cross_regulation:
  csrd_enabled: true
  cdp_enabled: true
  sbti_enabled: true
  taxonomy_enabled: true
  ets_enabled: true
  eudr_enabled: false
  sync_frequency_hours: 24
  auto_populate_enabled: true

# Audit management
audit:
  retention_years: 10
  data_room_enabled: true
  auto_remediation_alerts: true
  nca_response_deadline_days: 30
  penalty_tracking: true
  evidence_encryption: true

# Precursor chain - varied depths by commodity
precursor:
  max_chain_depth: 5
  allocation_method: "mass"
  scrap_classification_enabled: true
  mass_balance_validation: true
  mass_balance_tolerance_pct: 5.0
  precursor_chain_visualization: true
  chain_completeness_threshold_pct: 80.0

# Quarterly reporting
quarterly:
  auto_schedule: true
  submission_deadline_buffer_days: 10
  xml_validation_enabled: true
  report_language: "EN"
  additional_languages: ["DE", "FR"]
  archive_reports: true

# Supplier management - diverse supplier base
supplier:
  auto_request_frequency_months: 3
  quality_threshold: 70.0
  max_installations_per_supplier: 40
  eori_validation_enabled: true
  auto_fallback_to_defaults: true
  supplier_portal_enabled: true
  data_retention_years: 10

# De minimis
deminimis:
  monitoring_enabled: true
  threshold_tonnes: 50.0
  alert_thresholds: [80.0, 90.0, 95.0, 100.0]
  sector_grouping: true

# Verification
verification:
  frequency: "annual"
  materiality_threshold_pct: 5.0
  verifier_accreditation_required: true
  site_visit_required: true

# Pack-level
reporting_year: 2026
reporting_period: "definitive"
demo_mode: false
log_level: "INFO"
provenance_enabled: true

# Multi-commodity source countries
source_countries_focus:
  # Steel
  - {country: "TR", name: "Turkey", categories: ["iron_steel"], typical_share_pct: 20}
  - {country: "CN", name: "China", categories: ["iron_steel", "aluminium", "fertilizers"], typical_share_pct: 18}
  - {country: "IN", name: "India", categories: ["iron_steel", "cement", "fertilizers"], typical_share_pct: 12}
  # Aluminium
  - {country: "NO", name: "Norway", categories: ["aluminium"], typical_share_pct: 8}
  - {country: "IS", name: "Iceland", categories: ["aluminium"], typical_share_pct: 5}
  - {country: "RU", name: "Russia", categories: ["aluminium", "iron_steel"], typical_share_pct: 7}
  # Cement
  - {country: "TR", name: "Turkey", categories: ["cement"], typical_share_pct: 10}
  # Fertilizers
  - {country: "EG", name: "Egypt", categories: ["fertilizers"], typical_share_pct: 6}
  # Electricity
  - {country: "NO", name: "Norway", categories: ["electricity"], typical_share_pct: 4}
  # Hydrogen
  - {country: "SA", name: "Saudi Arabia", categories: ["hydrogen"], typical_share_pct: 3}
