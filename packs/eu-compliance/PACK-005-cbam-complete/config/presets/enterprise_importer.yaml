# =============================================================================
# PACK-005 CBAM Complete Pack - Enterprise Importer Preset
# =============================================================================
# Large multi-entity group with all PACK-005 features enabled. Certificate
# trading with DCA strategy, multi-entity group management with volume-based
# cost allocation, registry API in sandbox mode, advanced Monte Carlo analytics,
# full customs automation including anti-circumvention monitoring, cross-
# regulation alignment (CSRD, CDP, SBTi, EU Taxonomy), NCA audit readiness,
# and deep precursor chain analysis (5 tiers).
#
# Typical use cases:
#   - Large industrial groups importing across multiple EU subsidiaries
#   - Groups with centralized procurement and decentralized import operations
#   - Companies subject to multiple EU regulations (CSRD + CBAM + ETS)
#   - Organizations requiring NCA audit-ready compliance posture
# =============================================================================

# Importer details (parent entity)
importer:
  company_name: ""
  eori_number: ""
  authorized_declarant: ""
  eu_member_state: null
  cbam_registry_id: ""
  contact_email: ""
  contact_phone: ""
  customs_office_code: ""

# All 6 goods categories enabled
goods:
  enabled_categories:
    - "cement"
    - "iron_steel"
    - "aluminium"
    - "fertilizers"
    - "electricity"
    - "hydrogen"
  precursor_tracking:
    cement: ["clinker"]
    iron_steel: ["pig_iron", "direct_reduced_iron", "crude_steel", "ferro_alloys"]
    aluminium: ["alumina", "unwrought_aluminium"]
    fertilizers: ["ammonia", "nitric_acid", "urea"]
    electricity: []
    hydrogen: []

# Emission calculation - prefer actual, comprehensive tracking
emission:
  calculation_method: "actual"
  fallback_method: "country_default"
  default_markup_percentage: 25.0
  indirect_emissions_included: true
  precursor_tracking_enabled: true
  emission_factor_source: "eu_default"
  emission_factor_vintage_year: 2024
  carbon_price_deduction_enabled: true
  country_carbon_price_sources:
    - "eu_ets"
    - "uk_ets"
    - "china_ets"
    - "korea_ets"
    - "carbon_tax_registry"

# Certificate management - active strategy
certificate:
  ets_price_source: "auction"
  free_allocation_enabled: true
  carbon_deduction_enabled: true
  cost_scenario: "mid"
  quarterly_holding_target_pct: 60
  surrender_deadline_month: 5
  surrender_deadline_day: 31
  repurchase_enabled: true
  repurchase_max_pct: 33.33

# Certificate trading - DCA with budget pacing
trading:
  buying_strategy: "dca"
  price_alert_below_eur: 60.0
  price_alert_above_eur: 150.0
  repurchase_threshold_pct: 10.0
  valuation_method: "weighted_average"
  budget_limit_eur: null
  auto_purchase_enabled: false
  quarterly_holding_target_pct: 60.0
  dca_frequency_weeks: 4
  dca_fixed_amount_eur: null
  opportunistic_price_window_pct: 5.0
  mark_to_market_frequency: "weekly"

# Entity group - multi-entity with volume allocation
entity_group:
  entities: []
  hierarchy_enabled: true
  cost_allocation_method: "volume"
  consolidation_currency: "EUR"
  delegated_compliance_mode: false
  financial_guarantee_eur: null
  inter_entity_transfer_tracking: true
  consolidated_declaration: false

# Registry API - sandbox for initial setup
registry:
  use_sandbox: true
  auth_type: "mtls"
  cert_path: ""
  key_path: ""
  polling_interval_seconds: 60
  max_retries: 5
  timeout_seconds: 30

# Advanced analytics - full Monte Carlo
analytics:
  monte_carlo_iterations: 10000
  optimization_solver: "scipy_optimize"
  benchmark_source: "eu_bat"
  forecast_horizon_years: 5
  confidence_level: 0.95
  scenario_count: 3
  price_volatility_annual_pct: 20.0

# Customs automation - full anti-circumvention
customs:
  sad_format: "xml"
  aeo_check_enabled: true
  anti_circumvention_rules:
    - "origin_change"
    - "cn_reclassification"
    - "scrap_ratio"
    - "restructuring"
    - "minor_processing"
  downstream_monitoring: true
  cn_cache_ttl_hours: 24
  origin_verification_enabled: true
  preferential_origin_check: true
  suspicious_pattern_alert_threshold: 3

# Cross-regulation - all frameworks
cross_regulation:
  csrd_enabled: true
  cdp_enabled: true
  sbti_enabled: true
  taxonomy_enabled: true
  ets_enabled: true
  eudr_enabled: false
  sync_frequency_hours: 24
  auto_populate_enabled: true
  conflict_resolution: "cbam_primary"

# Audit management - full NCA readiness
audit:
  retention_years: 10
  data_room_enabled: true
  auto_remediation_alerts: true
  nca_response_deadline_days: 30
  penalty_tracking: true
  evidence_encryption: true
  evidence_encryption_key_rotation_days: 90
  data_room_provider: "internal"

# Precursor chain - deep analysis
precursor:
  max_chain_depth: 5
  allocation_method: "mass"
  scrap_classification_enabled: true
  mass_balance_validation: true
  mass_balance_tolerance_pct: 5.0
  precursor_chain_visualization: true
  chain_completeness_threshold_pct: 80.0

# Quarterly reporting
quarterly:
  auto_schedule: true
  submission_deadline_buffer_days: 10
  amendment_window_days: 60
  xml_validation_enabled: true
  report_language: "EN"
  include_supporting_documents: true
  archive_reports: true

# Supplier management
supplier:
  auto_request_frequency_months: 3
  quality_threshold: 75.0
  max_installations_per_supplier: 50
  eori_validation_enabled: true
  data_submission_format: "json"
  accepted_formats: ["json", "xml", "csv", "excel"]
  auto_fallback_to_defaults: true
  supplier_portal_enabled: true
  data_retention_years: 10

# De minimis - monitoring active (enterprise unlikely to qualify)
deminimis:
  monitoring_enabled: true
  threshold_tonnes: 50.0
  alert_thresholds: [80.0, 90.0, 95.0, 100.0]
  auto_exemption: false
  sector_grouping: true

# Verification - annual, full accreditation
verification:
  frequency: "annual"
  materiality_threshold_pct: 5.0
  verifier_accreditation_required: true
  evidence_retention_years: 10
  site_visit_required: true
  remote_verification_allowed: false

# Pack-level settings
reporting_year: 2026
reporting_period: "definitive"
transitional_mode: false
demo_mode: false
log_level: "INFO"
provenance_enabled: true
