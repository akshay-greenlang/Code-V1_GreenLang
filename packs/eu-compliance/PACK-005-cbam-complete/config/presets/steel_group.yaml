# =============================================================================
# PACK-005 CBAM Complete Pack - Steel Industry Group Preset
# =============================================================================
# Steel-focused industrial group with deep precursor chains (5 tiers),
# BF-BOF and EAF route optimization, high-volume certificate trading,
# and steel-specific anti-circumvention monitoring (scrap ratio focus).
#
# Typical use cases:
#   - European steel trading groups sourcing from Turkey, China, India, Russia
#   - Automotive supply chains with steel and stainless requirements
#   - Construction groups importing structural steel and rebar
#   - Multi-entity steel distributors with warehousing across the EU
# =============================================================================

# Importer details
importer:
  company_name: ""
  eori_number: ""
  authorized_declarant: ""
  eu_member_state: null
  cbam_registry_id: ""

