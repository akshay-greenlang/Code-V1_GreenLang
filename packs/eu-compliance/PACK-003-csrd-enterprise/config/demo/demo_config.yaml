# Logging
logging:
  level: "INFO"
  show_agent_execution_times: true
  show_data_flow_summary: true
  show_calculation_steps: true
  show_consolidation_steps: true
  show_framework_mapping: true
  show_prediction_details: true
  show_iot_data_flow: true
  export_demo_report: true
