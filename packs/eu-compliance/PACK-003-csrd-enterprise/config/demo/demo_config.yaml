# =============================================================================
# PACK-003 CSRD Enterprise Pack - Demo Mode Configuration
# =============================================================================
# Demo mode provides a self-contained environment for testing, training,
# and demonstration of enterprise-tier features. Includes multi-tenant
# isolation, SSO simulation, white-label branding preview, predictive
# analytics with mock models, IoT sensor simulation, carbon credit
# portfolio demo, supply chain ESG scoring, and filing workflow preview.
#
# Usage:
#   config = PackConfig.load(demo_mode=True)
#   config = PackConfig.load(
#       size_preset="global_enterprise",
#       sector_preset="conglomerate",
#       demo_mode=True,
#   )
# =============================================================================

# Core demo settings
enabled: true
use_sample_data: true
skip_external_apis: true
mock_ai_responses: true
fast_execution: true

# Sample data paths (relative to pack root)
sample_company_profile: "config/demo/demo_config.yaml"
sample_esg_data: "config/demo/demo_iot_stream.csv"
sample_group_profile: "config/demo/demo_config.yaml"
sample_subsidiary_data: "config/demo/demo_iot_stream.csv"
sample_tenant_profiles: "config/demo/demo_tenant_profiles.json"
sample_iot_data: "config/demo/demo_iot_stream.csv"

