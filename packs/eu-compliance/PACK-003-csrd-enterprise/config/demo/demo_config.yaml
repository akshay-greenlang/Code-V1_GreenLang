  AGENT-MRV-008:
    enabled: false
  AGENT-MRV-011:
    enabled: false
  AGENT-MRV-012:
    enabled: false
  AGENT-MRV-021:
    enabled: false
  AGENT-MRV-023:
    enabled: false
  AGENT-MRV-025:
    enabled: false
  AGENT-MRV-026:
    enabled: false
  AGENT-MRV-027:
    enabled: false
  AGENT-MRV-028:
    enabled: false
  GL-CDP-WATER:
    enabled: false
  GL-CDP-FORESTS:
    enabled: false
  GL-SBTi-FLAG:
    enabled: false
  GL-SBTi-FI:
    enabled: false
  GL-CBAM-APP:
    enabled: false
  GL-VCCI-APP:
    enabled: false
