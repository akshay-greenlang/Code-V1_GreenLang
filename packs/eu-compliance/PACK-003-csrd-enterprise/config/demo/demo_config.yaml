# Mock data sources
mock_sources:
  erp:
    enabled: true
    type: "sap_s4hana"
    mock_response_time_ms: 20
    sample_accounts: 800
    sample_cost_centers: 350
    multi_entity: true

  emission_factors:
    enabled: true
    database: "ecoinvent_3.10_mock"
    factor_count: 1500
    response_time_ms: 3

  grid_factors:
    enabled: true
    source: "iea_mock"
    regions: ["DE", "FR", "NL", "SE", "PL", "IT", "ES", "US"]
    years: [2023, 2024, 2025]

  iot_sensors:
    enabled: true
    device_count: 200
    protocols: ["MQTT", "HTTP"]
    streaming_interval_seconds: 60
    data_file: "config/demo/demo_iot_stream.csv"

  carbon_registries:
    enabled: true
    mock_portfolio_size: 50000
    registries: ["VCS", "GoldStandard"]

  ml_models:
    enabled: true
    mock_forecast_data: true
    mock_anomaly_data: true
    model_response_time_ms: 20

  suppliers:
    enabled: true
    supplier_count: 500
    with_questionnaire_responses: 300
    response_time_ms: 10

  tenants:
    enabled: true
    tenant_count: 3
    profiles_file: "config/demo/demo_tenant_profiles.json"

# Demo workflow settings
workflows:
  predictive_forecasting:
    enabled: true
    fast_mode: true
    mock_models: true
    reduced_horizon: true

  iot_continuous_monitoring:
    enabled: true
    fast_mode: true
    mock_sensors: true
    sample_interval_seconds: 5

  carbon_credit_management:
    enabled: true
    fast_mode: true
    mock_registries: true

  supply_chain_esg_assessment:
    enabled: true
    fast_mode: true
    mock_questionnaires: true
    reduced_suppliers: true

  regulatory_filing:
    enabled: true
    fast_mode: true
    mock_registry: true

  narrative_generation:
    enabled: true
    fast_mode: true
    reduced_languages: true
    mock_llm: true

  tenant_onboarding:
    enabled: true
    fast_mode: true
    mock_provisioning: true

# Demo enterprise overrides
enterprise:
  tenant:
    enabled: true
    isolation_level: "SHARED"
    max_tenants: 5

  sso:
    saml_enabled: false
    oauth_enabled: false
    scim_enabled: false

  white_label:
    enabled: true
    primary_color: "#1B5E20"
    secondary_color: "#388E3C"
    accent_color: "#4CAF50"
    powered_by_visible: true

  predictive:
    models_enabled: ["emission_forecast", "anomaly_detection"]
    forecast_horizon_months: 6
    retrain_interval_days: 365

  narrative:
    languages: ["en", "de"]
    tone: "board"
    fact_checking_enabled: false
    max_draft_tokens: 4000

  workflow_builder:
    max_steps: 10
    max_custom_workflows: 5

  iot:
    enabled: true
    protocols: ["MQTT", "HTTP"]
    max_devices: 200
    aggregation_window_minutes: 60

  carbon_credit:
    enabled: true
    registries_enabled: ["VCS", "GoldStandard"]

  supply_chain:
    enabled: true
    max_tiers: 2
    auto_dispatch: false

  filing:
    enabled: true
    auto_submit: false
    validation_strictness: "relaxed"

  api_management:
    rate_limit_per_minute: 60
    rate_limit_per_day: 10000
    graphql_enabled: true

  marketplace:
    plugins_enabled: false

  consolidation:
    enabled: true
    max_subsidiaries: 10
    parallel_entity_processing: false

  approval:
    enabled: false

  quality_gates:
    enabled: true
    run_on_commit: false
    run_on_calculation: true

  scenarios:
    enabled: true
    monte_carlo_enabled: false
    physical_risk_enabled: true
    transition_risk_enabled: true

  benchmarking:
    enabled: true
    peer_comparison_enabled: true

  regulatory:
    enabled: true
    scan_frequency: "manual"
    impact_assessment_auto: false

  assurance:
    enabled: true
    assurance_level: "limited"

  webhooks:
    enabled: false

# Performance settings for demo
performance:
  ghg_single_scope_max_seconds: 5
  ghg_full_inventory_max_seconds: 30
  ghg_multi_entity_max_minutes: 5
  report_esrs_max_seconds: 15
  report_summary_max_seconds: 10
  report_xbrl_max_seconds: 20
  report_consolidated_max_seconds: 30
  report_narrative_max_seconds: 15
  forecast_max_seconds: 10
  anomaly_detection_max_seconds: 5
  scenario_single_max_seconds: 10
  scenario_full_max_minutes: 3
  quality_gate_max_seconds: 5

