# =============================================================================
# PACK-003 CSRD Enterprise Pack - Financial Enterprise Preset
# =============================================================================
# Enterprise financial institution with PCAF, Taxonomy alignment, SFDR PAI,
# auditor portal, filing to ESAP, SBTi FI targets, and CLUSTER isolation.
# Strict data governance with 15-year retention.
# =============================================================================

# ESRS Standards - All enabled, E1/S1/G1 material for financial institutions
esrs_standards:
  - id: "ESRS1"
    name: "General Requirements"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements: ["ESRS1-DR1", "ESRS1-DR2", "ESRS1-DR3", "ESRS1-DR4", "ESRS1-DR5"]
  - id: "ESRS2"
    name: "General Disclosures"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements:
      - "ESRS2-BP1"
      - "ESRS2-BP2"
      - "ESRS2-GOV1"
      - "ESRS2-GOV2"
      - "ESRS2-GOV3"
      - "ESRS2-GOV4"
      - "ESRS2-GOV5"
      - "ESRS2-SBM1"
      - "ESRS2-SBM2"
      - "ESRS2-SBM3"
      - "ESRS2-IRO1"
      - "ESRS2-IRO2"
      - "ESRS2-MDR-P"
      - "ESRS2-MDR-A"
      - "ESRS2-MDR-M"
      - "ESRS2-MDR-T"
  - id: "E1"
    name: "Climate Change"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["E1-1", "E1-2", "E1-3", "E1-4", "E1-5", "E1-6", "E1-7", "E1-8", "E1-9"]
  - id: "E2"
    name: "Pollution"
    enabled: true
    mandatory: false
    material: false
    disclosure_requirements: ["E2-1", "E2-2", "E2-3", "E2-4", "E2-5", "E2-6"]
  - id: "E3"
    name: "Water and Marine Resources"
    enabled: true
    mandatory: false
    material: false
    disclosure_requirements: ["E3-1", "E3-2", "E3-3", "E3-4", "E3-5"]
  - id: "E4"
    name: "Biodiversity and Ecosystems"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["E4-1", "E4-2", "E4-3", "E4-4", "E4-5", "E4-6"]
  - id: "E5"
    name: "Resource Use and Circular Economy"
    enabled: true
    mandatory: false
    material: false
    disclosure_requirements: ["E5-1", "E5-2", "E5-3", "E5-4", "E5-5", "E5-6"]
  - id: "S1"
    name: "Own Workforce"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["S1-1", "S1-2", "S1-3", "S1-4", "S1-5", "S1-6", "S1-7", "S1-8", "S1-9", "S1-10", "S1-11", "S1-12", "S1-13", "S1-14", "S1-15", "S1-16", "S1-17"]
  - id: "S2"
    name: "Workers in the Value Chain"
    enabled: true
    mandatory: false
    material: false
    disclosure_requirements: ["S2-1", "S2-2", "S2-3", "S2-4", "S2-5"]
  - id: "S3"
    name: "Affected Communities"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["S3-1", "S3-2", "S3-3", "S3-4", "S3-5"]
  - id: "S4"
    name: "Consumers and End-Users"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["S4-1", "S4-2", "S4-3", "S4-4", "S4-5"]
  - id: "G1"
    name: "Business Conduct"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements: ["G1-1", "G1-2", "G1-3", "G1-4", "G1-5", "G1-6"]

# Scope 3 - FI-specific categories with Cat 15 priority
scope3:
  enabled_categories: [1, 2, 3, 5, 6, 7, 13, 15]
  priority_categories: [15, 1, 6]
  screening_required: true
  materiality_threshold_percent: 1.0

# XBRL - Strict for regulated FI
xbrl:
  enabled: true
  taxonomy_version: "ESRS_2023"
  output_format: "inline_xbrl"
  validation_level: "strict"
  languages: ["en", "de", "fr"]

# Consolidation for banking groups
consolidation:
  enabled: true
  method: "financial_control"
  subsidiaries: []
  intercompany_elimination: true

# Guided mode off
guided_mode:
  enabled: false
  tutorial_mode: false
  pre_populated_examples: false
  ai_assistance_level: "standard"
  step_by_step: false
  onboarding_extended: false

# Emission factor priorities for FI
emission_factor_priorities:
  - "reported_verified"
  - "pcaf_database"
  - "cdp_reported"
  - "industry_average"
  - "exiobase"
  - "government_published"

# Performance for financial enterprise
performance:
  ghg_full_inventory_max_seconds: 600
  ghg_multi_entity_max_minutes: 45
  ghg_max_data_points: 300000
  report_esrs_max_seconds: 180
  report_xbrl_max_seconds: 300
  report_consolidated_max_seconds: 600

# Enterprise configuration for financial institutions
enterprise:
  tenant:
    enabled: true
    isolation_level: "CLUSTER"
    max_tenants: 20
    resource_quotas:
      max_agents: 300
      max_storage_gb: 2000
      max_api_calls_per_day: 5000000
      max_users: 2000
    cross_tenant_benchmarking: false
    data_residency_enforcement: true

  sso:
    saml_enabled: true
    oauth_enabled: true
    scim_enabled: true
    default_role: "viewer"
    jit_provisioning: true
    session_timeout_minutes: 240
    mfa_required: true

  white_label:
    enabled: false
    powered_by_visible: true

  predictive:
    models_enabled: ["emission_forecast", "anomaly_detection", "drift_monitor"]
    forecast_horizon_months: 24
    confidence_level: 0.95
    retrain_interval_days: 30
    anomaly_sensitivity: 0.90
    explainability_enabled: true
    auto_retrain_on_drift: true

  narrative:
    languages: ["en", "de", "fr"]
    tone: "regulatory"
    fact_checking_enabled: true
    max_draft_tokens: 12000
    revision_tracking: true
    source_citation_required: true
    human_review_required: true

  workflow_builder:
    max_steps: 50
    template_sharing: false
    conditional_logic: true
    parallel_execution: true
    human_in_loop: true
    max_custom_workflows: 100

  iot:
    enabled: false

  carbon_credit:
    enabled: true
    registries_enabled: ["VCS", "GoldStandard", "ACR"]
    auto_retirement: false
    vintage_tracking: true
    price_tracking: true
    net_zero_accounting: true

  supply_chain:
    enabled: true
    max_tiers: 2
    questionnaire_frequency_months: 12
    scoring_weights:
      environmental: 0.35
      social: 0.30
      governance: 0.35
    risk_threshold: 0.5
    auto_dispatch: true

  filing:
    enabled: true
    targets: ["ESAP", "national_registries"]
    auto_submit: false
    validation_strictness: "strict"
    deadline_buffer_days: 30
    amendment_tracking: true

  api_management:
    rate_limit_per_minute: 1000
    rate_limit_per_day: 5000000
    api_key_rotation_days: 60
    graphql_enabled: true
    burst_limit: 200

  marketplace:
    plugins_enabled: false

  consolidation:
    enabled: true
    max_subsidiaries: 200
    consolidation_approaches: ["financial_control", "equity_share"]
    default_approach: "financial_control"
    intercompany_elimination: true
    minority_interest_adjustment: true
    parallel_entity_processing: true

  approval:
    enabled: true
    require_comments_on_rejection: true
    audit_trail_enabled: true

  quality_gates:
    enabled: true
    overall_pass_threshold: 92.0
    run_on_commit: true
    run_on_calculation: true

  cross_framework:
    enabled: true
    enabled_frameworks:
      cdp: true
      tcfd: true
      sbti: true
      taxonomy: true
      gri: true
      sasb: true
      issb: true
      tnfd: false

  scenarios:
    enabled: true
    monte_carlo_enabled: true
    monte_carlo_iterations: 50000
    physical_risk_enabled: true
    transition_risk_enabled: true
    financial_impact_quantification: true

  benchmarking:
    enabled: true
    peer_group_source: "gics"
    max_peer_count: 30
    update_frequency: "quarterly"

  regulatory:
    enabled: true
    monitored_jurisdictions: ["EU", "DE", "FR", "NL", "ES", "IT", "BE", "AT", "LU", "IE"]
    monitored_regulations: ["CSRD", "ESRS", "EU_Taxonomy", "SFDR", "CSDDD", "ESEF", "ETS"]
    scan_frequency: "daily"
    impact_assessment_auto: true

  data_governance:
    enabled: true
    data_retention_years: 15
    data_classification_enabled: true
    classification_levels: ["public", "internal", "confidential", "restricted", "regulatory"]
    gdpr_compliance: true
    data_lineage_tracking: true
    version_control_enabled: true
    change_log_retention_years: 20

  assurance:
    enabled: true
    assurance_level: "reasonable"
    isae_standard: "ISAE_3410"
    assurance_scope:
      - "scope_1_emissions"
      - "scope_2_emissions"
      - "scope_3_material_categories"
      - "esrs_e1_disclosures"
      - "esrs_s1_disclosures"
      - "eu_taxonomy_kpis"
      - "financed_emissions"
      - "pcaf_data_quality"
      - "ml_model_validation"
    evidence_format: "structured"
    auditor_access_portal: true
    evidence_retention_years: 15

  webhooks:
    enabled: true
    channels: ["approval", "quality_gate", "regulatory_change", "filing_status", "anomaly_detected"]
    retry_count: 5

# Agent overrides for financial enterprise
agent_overrides:
  AGENT-MRV-004:
    enabled: false
  AGENT-MRV-005:
    enabled: false
  AGENT-MRV-006:
    enabled: false
  AGENT-MRV-007:
    enabled: false
  AGENT-MRV-008:
    enabled: false
  AGENT-MRV-011:
    enabled: false
  AGENT-MRV-012:
    enabled: false
  AGENT-MRV-028:
    enabled: true
    config_overrides:
      pcaf_enabled: true
      financed_emissions_priority: "critical"
  GL-SBTi-FI:
    enabled: true
  GL-SBTi-FLAG:
    enabled: false
  GL-CDP-WATER:
    enabled: false
  GL-CDP-FORESTS:
    enabled: false
  GL-ENT-IOT-INGEST:
    enabled: false
  GL-CBAM-APP:
    enabled: false
