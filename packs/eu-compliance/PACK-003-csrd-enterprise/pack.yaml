# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles for enterprise use
# -----------------------------------------------------------------------------
presets:

  # Size-based presets (enterprise tier)
  size_presets:
    - id: global_enterprise
      display_name: "Global Enterprise"
      description: >-
        Global conglomerate with 200+ subsidiaries across 50+ countries.
        Physical tenant isolation, full IoT integration, all registries,
        24+ languages, all workflows, AI/ML predictive analytics.
      config_file: "config/presets/global_enterprise.yaml"
      criteria:
        min_employees: 50000
        multi_entity: true
        max_subsidiaries: 500
        countries: 50

    - id: saas_platform
      display_name: "SaaS Platform"
      description: >-
        Multi-tenant SaaS deployment for platform operators. White-label
        branding, marketplace, API management, tenant isolation,
        usage-based metering, and cross-tenant benchmarking.
      config_file: "config/presets/saas_platform.yaml"
      criteria:
        multi_tenant: true
        max_tenants: 500
        saas_model: true

    - id: financial_enterprise
      display_name: "Financial Enterprise"
      description: >-
        Enterprise financial institution with PCAF, Taxonomy alignment,
        SFDR PAI, auditor portal, filing to ESAP, and SBTi FI targets.
        Cluster-level tenant isolation with strict data governance.
      config_file: "config/presets/financial_enterprise.yaml"
      criteria:
        sector: "financial_services"
        regulated: true
        pcaf_required: true
        min_employees: 10000

    - id: consulting_firm
      display_name: "Consulting Firm"
      description: >-
        Advisory firm managing multiple client engagements. White-label
        client reporting, custom workflows per client, moderate API
        limits, and cross-client anonymized benchmarking.
      config_file: "config/presets/consulting_firm.yaml"
      criteria:
        advisory: true
        multi_client: true
        max_clients: 200

  # Sector-specific presets (enterprise tier)
  sector_presets:
    - id: banking_enterprise
      display_name: "Banking Enterprise"
      description: >-
        Enterprise banking with PCAF (6 asset classes), financed emissions,
        GAR/BTAR, Cat 15, and SBTi FI targets.
      config_file: "config/sectors/banking_enterprise.yaml"
      nace_codes: ["K64"]

    - id: oil_gas_enterprise
      display_name: "Oil & Gas Enterprise"
      description: >-
        Oil and gas enterprise with methane tracking, fugitive emissions,
        carbon credits, IoT sensors, and OGMP 2.0.
      config_file: "config/sectors/oil_gas_enterprise.yaml"
      nace_codes: ["B06", "B09", "C19", "D35"]

    - id: automotive_enterprise
      display_name: "Automotive Enterprise"
      description: >-
        Automotive enterprise with supply chain ESG, product carbon
        footprint, Cat 1/4/11/12, and EV transition tracking.
      config_file: "config/sectors/automotive_enterprise.yaml"
      nace_codes: ["C29"]

    - id: pharma_enterprise
      display_name: "Pharmaceutical Enterprise"
      description: >-
        Pharmaceutical enterprise with cold chain emissions, clinical
        trial site tracking, Cat 1/4/5, and supply chain integrity.
      config_file: "config/sectors/pharma_enterprise.yaml"
      nace_codes: ["C21"]

    - id: conglomerate
      display_name: "Multi-Sector Conglomerate"
      description: >-
        Multi-sector conglomerate with cross-entity consolidation,
        sector-specific MRV, complex hierarchies, and all scopes.
      config_file: "config/sectors/conglomerate.yaml"
      nace_codes: ["MULTI"]

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# Enterprise pack requires dedicated infrastructure
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"
    timescaledb: ">=2.13"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "scipy>=1.11"
    - "scikit-learn>=1.3"
    - "networkx>=3.1"
    - "prophet>=1.1"
    - "statsmodels>=0.14"
    - "xgboost>=2.0"
    - "paho-mqtt>=2.0"
    - "asyncua>=1.0"
    - "strawberry-graphql>=0.220"
    - "python-saml>=1.16"
    - "scim2-filter-parser>=1.0"

  infrastructure:
    min_cpu_cores: 16
    min_memory_gb: 64
    min_storage_gb: 1000
    recommended_cpu_cores: 32
    recommended_memory_gb: 128
    recommended_storage_gb: 5000

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
      - "pg_partman"
    min_connections: 100
    recommended_connections: 300

# -----------------------------------------------------------------------------
# Performance Targets
# Enterprise pack targets for global-scale workloads
# -----------------------------------------------------------------------------
performance:
  data_ingestion:
    throughput_records_per_second: 50000
    max_latency_ms: 80
    iot_events_per_second: 10000
    description: "Data ingestion throughput for enterprise-scale multi-tenant workloads"

  ghg_calculation:
    single_scope_max_seconds: 30
    full_inventory_max_seconds: 300
    multi_entity_max_minutes: 30
    max_data_points: 500000
    description: "GHG calculation targets for 500K data points enterprise scale"

  report_generation:
    esrs_disclosure_max_seconds: 120
    executive_summary_max_seconds: 60
    xbrl_tagging_max_seconds: 180
    consolidated_report_max_seconds: 300
    cross_framework_max_seconds: 120
    narrative_generation_max_seconds: 180
    multi_language_max_seconds: 600
    description: "Report generation targets including narrative generation"

  predictive_analytics:
    forecast_max_seconds: 60
    anomaly_detection_max_seconds: 30
    drift_check_max_seconds: 15
    model_retraining_max_minutes: 30
    description: "ML model execution time targets"

  scenario_analysis:
    single_scenario_max_seconds: 60
    full_analysis_max_minutes: 15
    monte_carlo_iterations: 50000
    description: "Scenario analysis execution time targets"

  api_response:
    p50_ms: 40
    p95_ms: 200
    p99_ms: 800
    graphql_p50_ms: 60
    graphql_p95_ms: 300
    description: "API response time percentile targets"

  data_quality:
    profiling_max_seconds: 60
    validation_max_seconds: 30
    quality_gate_max_seconds: 30
    description: "Data quality check execution time targets"

  availability:
    target_uptime_percent: 99.99
    max_planned_downtime_minutes_per_month: 5
    rpo_minutes: 5
    rto_minutes: 15
    description: "Enterprise availability and recovery targets"

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_timescaledb_extension
    - verify_disk_space
    - verify_pack_001_installed
    - verify_pack_001_healthy
    - verify_pack_002_installed
    - verify_pack_002_healthy
    - verify_memory_requirements
    - verify_network_access
    - verify_ssl_certificates

  database_migrations:
    # PACK-001 inherited migrations
    - "V001-V006"   # Core schema
    - "V007-V008"   # Feature flags and agent factory
    - "V009-V010"   # Auth and RBAC
    - "V019-V020"   # Observability
    - "V021-V030"   # Foundation agents
    - "V031-V050"   # Data agents
    - "V051-V081"   # MRV agents
    - "V082"        # CSRD application
    # PACK-002 inherited migrations
    - "V085"        # CDP application
    - "V086"        # TCFD application
    - "V087"        # SBTi application
    - "V088"        # EU Taxonomy application
    - "V130-V136"   # Professional pack tables
    # PACK-003 EUDR agent migrations
    - "V089-V128"   # EUDR agents 001-040
    # PACK-003 enterprise-exclusive migrations
    - "V140"        # Multi-tenant isolation tables
    - "V141"        # SSO / SAML / SCIM tables
    - "V142"        # White-label configuration tables
    - "V143"        # Predictive analytics / ML model tables
    - "V144"        # Narrative generation tables
    - "V145"        # IoT sensor data (TimescaleDB hypertable)
    - "V146"        # Carbon credit registry tables
    - "V147"        # Supply chain ESG tables
    - "V148"        # Regulatory filing tables
    - "V149"        # Workflow builder tables
    - "V150"        # API management and marketplace tables

  post_install:
    - verify_pack_001_agents
    - verify_pack_002_agents
    - seed_emission_factors
    - seed_esrs_taxonomy
    - seed_cdp_questionnaire_structure
    - seed_tcfd_framework
    - seed_sbti_pathways
    - seed_eu_taxonomy_criteria
    - seed_cross_framework_mappings
    - seed_carbon_registries
    - seed_supply_chain_templates
    - seed_filing_registry_schemas
    - seed_ml_model_baselines
    - seed_iot_device_templates
    - seed_narrative_templates
    - seed_default_presets
    - configure_scheduled_jobs
    - configure_approval_workflows
    - configure_quality_gates
    - configure_tenant_defaults
    - configure_sso_providers
    - configure_api_rate_limits
    - run_health_checks
    - run_enterprise_health_checks
