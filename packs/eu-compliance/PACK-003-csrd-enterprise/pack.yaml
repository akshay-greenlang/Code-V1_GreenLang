# -----------------------------------------------------------------------------
# Workflows - Enterprise orchestration sequences
# Extends PACK-002's 13 workflows with 8 enterprise workflows
# Total: 21 workflows
# -----------------------------------------------------------------------------
workflows:

  # ---- INHERITED FROM PACK-002 (13 workflows via PACK-001 + PACK-002) ----
  # annual_reporting, quarterly_update, materiality_assessment,
  # data_onboarding, audit_preparation (PACK-001)
  # consolidated_reporting, cross_framework_alignment, scenario_analysis,
  # continuous_compliance, stakeholder_engagement, regulatory_change_mgmt,
  # board_governance, professional_audit (PACK-002)

  predictive_forecasting:
    display_name: "Predictive Emission Forecasting"
    description: >-
      ML-driven emission forecasting workflow that generates rolling
      12-36 month forecasts using historical emission data, activity
      trends, production schedules, and external signals. Includes
      anomaly detection, model retraining, and board-ready forecast reports.
    schedule: "monthly"
    estimated_duration_days: 5
    phases:
      - name: data_preparation
        description: "Prepare historical data and feature engineering"
        agents:
          - AGENT-DATA-014
          - AGENT-DATA-015
          - AGENT-DATA-016
          - GL-ENT-PREDICT-ANOMALY
        duration_days: 1
      - name: model_execution
        description: "Execute forecasting models and detect drift"
        agents:
          - GL-ENT-PREDICT-EMISSION
          - GL-ENT-PREDICT-DRIFT
        duration_days: 2
      - name: forecast_validation
        description: "Validate forecasts against quality gates"
        agents:
          - GL-PRO-QUALITY-GATE
          - AGENT-FOUND-008
        duration_days: 1
      - name: forecast_reporting
        description: "Generate forecast reports and dashboards"
        agents:
          - GL-ENT-NARRATIVE-GEN
          - GL-CSRD-APP
        duration_days: 1

  iot_continuous_monitoring:
    display_name: "IoT Continuous Emission Monitoring"
    description: >-
      Real-time emission monitoring using IoT sensor data from energy
      meters, gas flow sensors, and environmental probes. Aggregates
      sensor readings, applies emission factors, detects anomalies,
      and updates emission inventories in near real-time.
    schedule: "continuous"
    estimated_duration_days: 1
    phases:
      - name: sensor_ingestion
        description: "Ingest and validate IoT sensor data streams"
        agents:
          - GL-ENT-IOT-INGEST
          - AGENT-DATA-019
        duration_days: 0
      - name: emission_calculation
        description: "Calculate emissions from sensor readings"
        agents:
          - AGENT-MRV-001
          - AGENT-MRV-009
          - AGENT-MRV-010
        duration_days: 0
      - name: anomaly_detection
        description: "Detect anomalies in sensor data and calculations"
        agents:
          - GL-ENT-PREDICT-ANOMALY
          - AGENT-DATA-013
        duration_days: 0
      - name: inventory_update
        description: "Update emission inventory and trigger alerts"
        agents:
          - AGENT-MRV-030
          - GL-CSRD-APP
        duration_days: 1

  carbon_credit_management:
    display_name: "Carbon Credit Lifecycle Management"
    description: >-
      End-to-end carbon credit management workflow covering procurement,
      verification, retirement, and net-zero accounting alignment.
      Tracks credits across VCS, Gold Standard, ACR, CAR, CDM, and
      Article 6.4 registries with price monitoring and vintage analysis.
    schedule: "quarterly"
    estimated_duration_days: 14
    phases:
      - name: portfolio_assessment
        description: "Assess current carbon credit portfolio and gaps"
        agents:
          - GL-ENT-CARBON-CREDIT
          - GL-SBTi-PATHWAY
        duration_days: 3
      - name: credit_verification
        description: "Verify credit quality and additionality"
        agents:
          - GL-ENT-CARBON-CREDIT
          - AGENT-FOUND-005
        duration_days: 4
      - name: retirement_planning
        description: "Plan credit retirements for net-zero alignment"
        agents:
          - GL-ENT-CARBON-CREDIT
          - GL-SBTi-TARGET
        duration_days: 3
      - name: reporting
        description: "Generate carbon credit reports and disclosures"
        agents:
          - GL-ENT-NARRATIVE-GEN
          - GL-CSRD-APP
          - AGENT-FOUND-005
        duration_days: 4

  supply_chain_esg_assessment:
    display_name: "Supply Chain ESG Assessment"
    description: >-
      Multi-tier supplier ESG risk assessment workflow covering
      questionnaire dispatch, response analysis, risk scoring, and
      engagement prioritization. Supports CSDDD and EUDR compliance
      requirements for value chain due diligence.
    schedule: "semi-annual"
    estimated_duration_days: 45
    phases:
      - name: supplier_mapping
        description: "Map multi-tier supplier network and identify critical suppliers"
        agents:
          - GL-ENT-SUPPLY-CHAIN-ESG
          - AGENT-DATA-008
        duration_days: 7
      - name: questionnaire_dispatch
        description: "Dispatch ESG questionnaires to prioritized suppliers"
        agents:
          - AGENT-DATA-008
          - GL-ENT-SUPPLY-CHAIN-ESG
        duration_days: 5
      - name: response_collection
        description: "Collect and validate supplier questionnaire responses"
        agents:
          - AGENT-DATA-002
          - AGENT-DATA-008
          - AGENT-DATA-019
        duration_days: 21
      - name: risk_scoring
        description: "Score supplier ESG risk across E, S, G dimensions"
        agents:
          - GL-ENT-SUPPLY-CHAIN-ESG
          - GL-ENT-PREDICT-ANOMALY
        duration_days: 5
      - name: engagement_planning
        description: "Generate engagement plans for high-risk suppliers"
        agents:
          - GL-ENT-SUPPLY-CHAIN-ESG
          - GL-ENT-NARRATIVE-GEN
        duration_days: 4
      - name: supply_chain_reporting
        description: "Generate supply chain ESG reports and CSDDD disclosures"
        agents:
          - GL-ENT-NARRATIVE-GEN
          - GL-CSRD-APP
          - AGENT-FOUND-005
        duration_days: 3

  regulatory_filing:
    display_name: "Regulatory Filing Automation"
    description: >-
      Automated regulatory filing workflow for ESAP and national
      registries. Validates filing packages, converts formats, manages
      submission deadlines, and handles amendment cycles.
    schedule: "annual"
    estimated_duration_days: 14
    phases:
      - name: filing_preparation
        description: "Prepare filing packages for target registries"
        agents:
          - GL-ENT-FILING-AUTO
          - GL-CSRD-APP
          - GL-PRO-QUALITY-GATE
        duration_days: 5
      - name: validation
        description: "Validate filing packages against registry schemas"
        agents:
          - GL-ENT-FILING-AUTO
          - AGENT-DATA-019
          - AGENT-FOUND-008
        duration_days: 3
      - name: submission
        description: "Submit filings to registries and track receipts"
        agents:
          - GL-ENT-FILING-AUTO
          - AGENT-FOUND-005
        duration_days: 3
      - name: confirmation
        description: "Confirm acceptance and handle amendment requests"
        agents:
          - GL-ENT-FILING-AUTO
          - GL-PRO-APPROVAL
        duration_days: 3

  narrative_generation:
    display_name: "Multi-Language Narrative Generation"
    description: >-
      AI-powered narrative generation workflow for ESRS disclosures
      in 24+ languages. Generates drafts from structured data, applies
      fact-checking against source data, supports revision tracking,
      and produces final narratives in board, investor, regulatory,
      and public tones.
    schedule: "annual"
    estimated_duration_days: 21
    phases:
      - name: data_assembly
        description: "Assemble structured data for narrative generation"
        agents:
          - GL-CSRD-APP
          - GL-PRO-CROSS-FRAMEWORK
          - AGENT-FOUND-005
        duration_days: 3
      - name: draft_generation
        description: "Generate narrative drafts in primary language"
        agents:
          - GL-ENT-NARRATIVE-GEN
        duration_days: 5
      - name: fact_checking
        description: "Fact-check narratives against source data"
        agents:
          - GL-ENT-NARRATIVE-GEN
          - AGENT-FOUND-008
          - AGENT-FOUND-009
        duration_days: 3
      - name: translation
        description: "Translate narratives to required languages"
        agents:
          - GL-ENT-NARRATIVE-TRANSLATE
        duration_days: 5
      - name: review_approval
        description: "Review and approve narratives through approval chain"
        agents:
          - GL-PRO-APPROVAL
          - GL-ENT-NARRATIVE-GEN
        duration_days: 5

  custom_workflow_management:
    display_name: "Custom Workflow Management"
    description: >-
      Manages custom workflows created via the workflow builder.
      Monitors execution, handles errors, and provides audit trails
      for all custom pipeline runs.
    schedule: "on_demand"
    estimated_duration_days: 1
    phases:
      - name: workflow_validation
        description: "Validate custom workflow definition"
        agents:
          - GL-ENT-WORKFLOW-BUILDER
          - AGENT-FOUND-009
        duration_days: 0
      - name: workflow_execution
        description: "Execute custom workflow steps"
        agents:
          - GL-ENT-WORKFLOW-BUILDER
          - AGENT-FOUND-001
        duration_days: 1
      - name: audit_trail
        description: "Generate audit trail for workflow execution"
        agents:
          - AGENT-FOUND-005
          - AGENT-MRV-030
        duration_days: 0

  tenant_onboarding:
    display_name: "Tenant Onboarding"
    description: >-
      Onboarding workflow for new tenants in multi-tenant deployments.
      Provisions resources, configures SSO, applies white-label branding,
      seeds reference data, and runs health checks.
    schedule: "on_demand"
    estimated_duration_days: 3
    phases:
      - name: tenant_provisioning
        description: "Provision tenant resources and isolation"
        agents:
          - GL-ENT-WORKFLOW-BUILDER
        duration_days: 1
      - name: identity_setup
        description: "Configure SSO, SAML, and SCIM provisioning"
        agents:
          - GL-ENT-WORKFLOW-BUILDER
        duration_days: 1
      - name: data_seeding
        description: "Seed reference data and run health checks"
        agents:
          - AGENT-FOUND-001
          - AGENT-FOUND-009
        duration_days: 1

# -----------------------------------------------------------------------------
