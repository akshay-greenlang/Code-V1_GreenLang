# =============================================================================
# PACK-003: CSRD Enterprise Pack
# GreenLang EU Compliance Pack for Global Enterprise CSRD Reporting
# =============================================================================
# This pack EXTENDS PACK-002 (CSRD Professional Pack) with enterprise-grade
# features including multi-tenant isolation, SSO/SAML/SCIM, white-label
# branding, AI/ML predictive analytics, IoT sensor integration, carbon
# credit management, supply chain ESG scoring, regulatory filing automation,
# API management with GraphQL, and a marketplace for plugins.
#
# Regulatory References:
#   - CSRD: Directive (EU) 2022/2464
#   - ESRS: Delegated Regulation (EU) 2023/2772
#   - ESEF: Delegated Regulation (EU) 2019/815 (XBRL tagging)
#   - ISAE 3000: Assurance Engagements Other than Audits or Reviews
#   - ISAE 3410: Assurance Engagements on Greenhouse Gas Statements
#   - EU Taxonomy: Regulation (EU) 2020/852
#   - GHG Protocol: Corporate Standard, Scope 2 Guidance, Scope 3 Standard
#   - PCAF: Global Standard for Financial Industry (v2.0)
#
# Version History:
#   1.0.0 - Initial release (2026-03-14)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: csrd-enterprise
  version: "1.0.0"
  display_name: "CSRD Enterprise Pack"
  description: >-
    Top-tier GreenLang deployment pack extending the CSRD Professional Pack
    with multi-tenant isolation, SSO/SAML/SCIM identity federation,
    white-label branding, AI/ML predictive analytics (emission forecasting,
    anomaly detection, drift monitoring), IoT sensor data ingestion, carbon
    credit lifecycle management, supply chain ESG risk scoring, regulatory
    filing automation (ESAP, national registries), API management with
    GraphQL and rate limiting, narrative generation in 24+ languages, custom
    workflow builder, and a plugin marketplace. Designed for global
    conglomerates, SaaS platform operators, financial enterprises, and
    consulting firms managing multi-client deployments.
  category: eu-compliance
  tier: enterprise
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-14"
  support_tier: enterprise-premium
  documentation_url: "https://docs.greenlang.io/packs/csrd-enterprise"
  changelog_url: "https://docs.greenlang.io/packs/csrd-enterprise/changelog"

  tags:
    - csrd
    - esrs
    - eu-compliance
    - sustainability-reporting
    - ghg-protocol
    - double-materiality
    - xbrl
    - esef
    - cdp
    - tcfd
    - sbti
    - eu-taxonomy
    - multi-entity
    - consolidation
    - cross-framework
    - scenario-analysis
    - professional-audit
    - board-governance
    - multi-tenant
    - sso
    - saml
    - scim
    - white-label
    - predictive-analytics
    - iot
    - carbon-credits
    - supply-chain-esg
    - regulatory-filing
    - graphql
    - api-management
    - marketplace
    - narrative-generation
    - workflow-builder

  compliance_references:
    - id: "CSRD"
      name: "Corporate Sustainability Reporting Directive"
      regulation: "Directive (EU) 2022/2464"
      effective_date: "2024-01-01"
      description: >-
        Amends Directive 2013/34/EU, requiring large and listed EU companies
        to report on sustainability matters using European Sustainability
        Reporting Standards (ESRS).
    - id: "ESRS"
      name: "European Sustainability Reporting Standards"
      regulation: "Delegated Regulation (EU) 2023/2772"
      effective_date: "2024-01-01"
      description: >-
        Set 1 of ESRS covering cross-cutting standards (ESRS 1, ESRS 2) and
        topical standards (E1-E5, S1-S4, G1). Defines disclosure requirements,
        application requirements, and data points.
    - id: "ESEF"
      name: "European Single Electronic Format"
      regulation: "Delegated Regulation (EU) 2019/815"
      effective_date: "2020-01-01"
      description: >-
        Requires annual financial reports in XHTML format with inline XBRL
        tagging. Extended to sustainability reporting under CSRD.
    - id: "ISAE3000"
      name: "International Standard on Assurance Engagements 3000"
      regulation: "ISAE 3000 (Revised)"
      effective_date: "2015-12-15"
      description: >-
        Framework for assurance engagements other than audits or reviews of
        historical financial information. Used for limited and reasonable
        assurance on sustainability reports.
    - id: "ISAE3410"
      name: "Assurance Engagements on GHG Statements"
      regulation: "ISAE 3410"
      effective_date: "2012-09-15"
      description: >-
        Deals with assurance engagements to report on an entity's greenhouse
        gas statement. Requires verification of emission calculations,
        methodology, and data sources.
    - id: "EU_TAXONOMY"
      name: "EU Taxonomy Regulation"
      regulation: "Regulation (EU) 2020/852"
      effective_date: "2022-01-01"
      description: >-
        Classification system for environmentally sustainable economic
        activities. Requires disclosure of Taxonomy-eligible and
        Taxonomy-aligned turnover, CapEx, and OpEx.
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      regulation: "GHG Protocol"
      effective_date: "2004-03-01"
      description: >-
        Corporate Accounting and Reporting Standard for greenhouse gas
        emissions. Includes Scope 2 Guidance and Corporate Value Chain
        (Scope 3) Standard.
    - id: "PCAF"
      name: "Partnership for Carbon Accounting Financials"
      regulation: "PCAF Global Standard v2.0"
      effective_date: "2022-12-01"
      description: >-
        Global standard for measuring and disclosing financed emissions
        across six asset classes with data quality scoring.

# -----------------------------------------------------------------------------
# Dependencies - Extends PACK-002
# -----------------------------------------------------------------------------
dependencies:
  - pack_id: "PACK-002"
    name: "csrd-professional"
    version: ">=1.0.0"
    required: true
    description: >-
      PACK-003 extends PACK-002 and inherits all 93+ agents, 13 workflows,
      16 templates, and 7 professional engines from the Professional Pack.
      All PACK-001 and PACK-002 agents must be deployed before PACK-003
      agents can be activated.
  - pack_id: "PACK-001"
    name: "csrd-starter"
    version: ">=1.0.0"
    required: true
    description: >-
      Transitive dependency via PACK-002. Provides the 66+ base agents,
      5 workflows, and 6 templates from the Starter Pack.

# -----------------------------------------------------------------------------
# Components - All GreenLang agents included in this pack
# Inherits all 93+ agents from PACK-002 plus 42 enterprise agents
# Total: 135+ agents
# -----------------------------------------------------------------------------
components:

  # ---- INHERITED FROM PACK-002 (93+ agents via PACK-001 + PACK-002) ----
  inherited:
    pack: "PACK-002"
    agent_count: 93
    groups:
      - "apps (GL-CSRD-APP)"
      - "data_agents (AGENT-DATA-001, 002, 003, 008)"
      - "quality_agents (AGENT-DATA-010, 011, 012, 013, 019)"
      - "mrv_scope1 (AGENT-MRV-001 through 008)"
      - "mrv_scope2 (AGENT-MRV-009 through 013)"
      - "mrv_scope3 (AGENT-MRV-014 through 030)"
      - "foundation (AGENT-FOUND-001 through 010)"
      - "professional_apps (GL-CDP-APP, GL-TCFD-APP, GL-SBTi-APP, GL-TAXONOMY-APP)"
      - "cdp_engines (6 agents)"
      - "tcfd_engines (7 agents)"
      - "sbti_engines (8 agents)"
      - "taxonomy_engines (6 agents)"
      - "professional_engines (7 agents)"

  # ---- PACK-003 ENTERPRISE ENGINES (10 engines) ----

  # Predictive Analytics Engines (3 engines)
  predictive_engines:
    - id: GL-ENT-PREDICT-EMISSION
      name: "Emission Forecasting Engine"
      version: "1.0.0"
      description: >-
        ML-based emission forecasting using historical data, activity trends,
        and production schedules. Generates rolling 12-36 month forecasts with
        confidence intervals and seasonal decomposition.
      required: true
    - id: GL-ENT-PREDICT-ANOMALY
      name: "Anomaly Detection Engine"
      version: "1.0.0"
      description: >-
        Statistical and ML-based anomaly detection for emission data,
        energy consumption, and activity metrics. Identifies outliers,
        trend breaks, and data quality issues in real-time.
      required: true
    - id: GL-ENT-PREDICT-DRIFT
      name: "Model Drift Detection Engine"
      version: "1.0.0"
      description: >-
        Monitors ML model performance degradation over time using PSI,
        KS-test, and KL-divergence. Triggers automated retraining when
        drift thresholds are exceeded.
      required: true

  # Narrative Generation Engines (2 engines)
  narrative_engines:
    - id: GL-ENT-NARRATIVE-GEN
      name: "Narrative Generation Engine"
      version: "1.0.0"
      description: >-
        LLM-powered narrative generation for ESRS disclosures in 24+
        languages. Supports board, investor, regulatory, and public tone
        presets with mandatory fact-checking against source data.
      required: true
    - id: GL-ENT-NARRATIVE-TRANSLATE
      name: "Narrative Translation Engine"
      version: "1.0.0"
      description: >-
        High-fidelity translation of sustainability narratives across
        24+ EU languages with domain-specific terminology preservation
        and regulatory term consistency.
      required: true

  # IoT Integration Engine (1 engine)
  iot_engines:
    - id: GL-ENT-IOT-INGEST
      name: "IoT Sensor Data Ingestion Engine"
      version: "1.0.0"
      description: >-
        Real-time ingestion of IoT sensor data via MQTT, HTTP, OPC-UA,
        and Modbus protocols. Supports energy meters, gas flow sensors,
        water meters, and temperature probes with configurable
        aggregation windows and anomaly alerting.
      required: false

  # Carbon Credit Engine (1 engine)
  carbon_credit_engines:
    - id: GL-ENT-CARBON-CREDIT
      name: "Carbon Credit Lifecycle Engine"
      version: "1.0.0"
      description: >-
        End-to-end carbon credit lifecycle management covering issuance,
        transfer, retirement, and cancellation across VCS, Gold Standard,
        ACR, CAR, CDM, and Article 6.4 registries. Includes vintage
        tracking, price monitoring, and net-zero accounting alignment.
      required: false

  # Supply Chain ESG Engine (1 engine)
  supply_chain_engines:
    - id: GL-ENT-SUPPLY-CHAIN-ESG
      name: "Supply Chain ESG Risk Scoring Engine"
      version: "1.0.0"
      description: >-
        Multi-tier supplier ESG risk scoring with configurable weights
        for environmental, social, and governance dimensions. Automated
        questionnaire dispatch, response scoring, and risk-based
        engagement prioritization.
      required: true

  # Regulatory Filing Engine (1 engine)
  filing_engines:
    - id: GL-ENT-FILING-AUTO
      name: "Regulatory Filing Automation Engine"
      version: "1.0.0"
      description: >-
        Automated regulatory filing to ESAP (European Single Access Point)
        and national registries. Handles format conversion, validation
        against registry schemas, deadline tracking, submission receipts,
        and amendment management.
      required: true

  # Workflow Builder Engine (1 engine)
  workflow_builder_engines:
    - id: GL-ENT-WORKFLOW-BUILDER
      name: "Custom Workflow Builder Engine"
      version: "1.0.0"
      description: >-
        Visual workflow builder for creating custom agent orchestration
        pipelines. Supports conditional branching, parallel execution,
        timer-based steps, human-in-the-loop approvals, and template
        sharing across tenants.
      required: true

  # ---- PACK-003 ENTERPRISE APPLICATIONS ----
  enterprise_apps:
