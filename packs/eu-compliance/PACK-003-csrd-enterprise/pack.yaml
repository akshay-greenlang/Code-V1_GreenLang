  - id: carbon_credit_portfolio
    display_name: "Carbon Credit Portfolio Report"
    description: "Carbon credit portfolio status with vintage analysis and retirement plan"
    format: "pdf"
    template_file: "templates/carbon_credit_portfolio.jinja2"

  - id: supply_chain_esg_scorecard
    display_name: "Supply Chain ESG Scorecard"
    description: "Multi-tier supplier ESG risk scorecard with engagement priorities"
