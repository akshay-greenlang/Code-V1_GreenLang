# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 10
    recommended_connections: 30

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  data_ingestion:
    throughput_records_per_second: 3000
    max_latency_ms: 250
    description: "Import data ingestion throughput"

  emission_calculation:
    single_product_max_seconds: 5
    full_quarterly_report_max_seconds: 120
    batch_1000_imports_max_seconds: 60
    description: "Embedded emission calculation time targets"

  report_generation:
    quarterly_report_max_seconds: 60
    annual_declaration_max_seconds: 120
    certificate_dashboard_max_seconds: 30
    description: "Report generation time targets"

  api_response:
    p50_ms: 100
    p95_ms: 500
    p99_ms: 2000
    description: "API response time percentile targets"

  data_quality:
    profiling_max_seconds: 30
    validation_max_seconds: 15
    description: "Data quality check execution time targets"

  availability:
    target_uptime_percent: 99.9
    max_planned_downtime_minutes_per_month: 30
    description: "System availability targets"

# -----------------------------------------------------------------------------
# CBAM Timeline - Key regulatory milestones
# -----------------------------------------------------------------------------
cbam_timeline:
  transitional_period:
    start: "2023-10-01"
    end: "2025-12-31"
    obligations:
      - "Quarterly CBAM reports (no financial obligation)"
      - "Report embedded emissions using actual, country default, or EU default values"
      - "Report direct and indirect emissions"
      - "Report carbon price paid in country of origin"

  definitive_period:
    start: "2026-01-01"
    obligations:
      - "Annual CBAM declaration by May 31"
      - "Purchase and surrender CBAM certificates"
      - "Verified embedded emissions (accredited verifier)"
      - "Only actual emissions or country defaults (EU defaults phased out)"

  free_allocation_phaseout:
    schedule:
      2026: 97.5   # 2.5% reduction
      2027: 95.0
      2028: 90.0
      2029: 82.5
      2030: 75.0
      2031: 60.0
      2032: 45.0
      2033: 30.0
      2034: 0.0     # Full CBAM coverage
    description: >-
      EU ETS free allocations for CBAM sectors are gradually phased out
      from 2026 to 2034. CBAM certificate obligations increase inversely.

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access

  database_migrations:
    - "V001-V006"    # Core schema
    - "V007-V008"    # Feature flags and agent factory
    - "V009-V010"    # Auth and RBAC
    - "V019-V020"    # Observability
    - "V021-V030"    # Foundation agents (selected subset)
    - "V031-V050"    # Data agents (selected subset)
    - "V083"         # CBAM application schema

  post_install:
    - seed_cbam_cn_codes
    - seed_eu_ets_emission_factors
    - seed_country_default_values
    - seed_default_presets
    - configure_quarterly_schedule
    - run_health_checks
