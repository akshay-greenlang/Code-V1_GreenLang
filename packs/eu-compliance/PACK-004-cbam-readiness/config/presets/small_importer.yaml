# =============================================================================
# PACK-004 CBAM Readiness Pack - Small Importer (De Minimis) Preset
# =============================================================================
# Simplified deployment for small importers potentially eligible for
# de minimis treatment (<50 tonnes/year per category). Focus on threshold
# monitoring, simplified reporting, and exemption documentation.
#
# Key characteristics:
#   - Import volumes near or below de minimis thresholds
#   - Simplified quarterly reporting workflow
#   - Aggressive threshold monitoring with early alerts
#   - Focus on exemption eligibility documentation
#   - Country default values acceptable (less supplier engagement)
#   - Lower infrastructure requirements
#
# Typical use cases:
#   - Small manufacturers with occasional CBAM goods imports
#   - Trading companies with minor CBAM exposure
#   - Companies testing new supply chains with small trial imports
#   - Companies transitioning suppliers to non-CBAM sources
# =============================================================================

# Goods configuration - configured per instance (empty by default)
goods:
  enabled_categories: []  # Set by user during onboarding
  precursor_tracking:
    cement: []
    iron_steel: []
    aluminium: []
    fertilizers: []
    electricity: []
    hydrogen: []

# Emission calculation - simplified approach
emission:
  calculation_method: "country_default"
  fallback_method: "default"
  default_markup_percentage: 10.0
  indirect_emissions_included: true
  precursor_tracking_enabled: false
  emission_factor_source: "eu_default"
  emission_factor_vintage_year: 2024
  carbon_price_deduction_enabled: true
  country_carbon_price_sources:
    - "eu_ets"
    - "carbon_tax_registry"

# Small importer specific settings
small_importer:
  description: >-
    Configuration for importers with annual volumes near or below CBAM
    de minimis thresholds. Prioritizes threshold monitoring, simplified
    reporting, and exemption documentation.

  simplified_workflow:
    enabled: true
    skip_detailed_installation_data: true
    skip_precursor_tracking: true
    use_default_emission_factors: true
    minimal_supplier_engagement: true

  onboarding:
    guided_mode: true
    estimated_setup_minutes: 30
    required_information:
      - "company_name"
      - "eori_number"
      - "eu_member_state"
      - "expected_import_categories"
      - "expected_annual_volume_tonnes"
      - "primary_source_countries"

  exemption_assessment:
    auto_assess: true
    document_eligibility: true
    annual_review: true
    report_to_authority: true

  volume_projections:
    warning_at_pct_of_threshold: 50
    escalation_at_pct_of_threshold: 75
    action_required_at_pct: 90
    exceed_at_pct: 100

# Certificate configuration - minimal (may not need certificates)
certificate:
  ets_price_source: "auction"
  free_allocation_enabled: true
  carbon_deduction_enabled: true
  cost_scenario: "mid"
  quarterly_holding_target_pct: 0    # May not need certificates
  surrender_deadline_month: 5
  surrender_deadline_day: 31
  repurchase_enabled: false

# Quarterly reporting - simplified
quarterly:
  auto_schedule: true
  submission_deadline_buffer_days: 14
  amendment_window_days: 60
  xml_validation_enabled: true
  report_language: "EN"
  include_supporting_documents: false
  archive_reports: true
  max_retries_on_submission_failure: 3

# Supplier configuration - minimal engagement
supplier:
  auto_request_frequency_months: 6
  quality_threshold: 50.0
  max_installations_per_supplier: 5
  eori_validation_enabled: true
  data_submission_format: "csv"
  accepted_formats: ["json", "csv", "excel"]
  auto_fallback_to_defaults: true
  supplier_portal_enabled: false
  data_retention_years: 10
  reminder_days_before_deadline: [14, 7, 1]

# De minimis monitoring - PRIMARY FOCUS
deminimis:
  monitoring_enabled: true
  threshold_tonnes: 50.0
  threshold_value_eur: 150.0
  alert_thresholds: [50.0, 75.0, 85.0, 90.0, 95.0, 100.0]
  auto_exemption: true
  sector_grouping: true
  monitoring_frequency: "per_import"
  cumulative_tracking_start: "january_1"
  notification_channels: ["email", "dashboard"]

  # Enhanced monitoring for small importers
  enhanced_monitoring:
    real_time_volume_tracking: true
    projected_annual_volume: true
    trend_analysis: true
    category_breakdown: true
    monthly_summary_report: true
    threshold_distance_indicator: true

# Verification - may not be required for de minimis
verification:
  frequency: "annual"
  materiality_threshold_pct: 10.0
  verifier_accreditation_required: true
  evidence_retention_years: 10
  site_visit_required: false
  remote_verification_allowed: true
  sampling_methodology: "risk_based"

# Pack-level settings
reporting_year: 2026
reporting_period: "definitive"
transitional_mode: false
demo_mode: false
log_level: "INFO"
provenance_enabled: true

# Infrastructure - lower requirements
infrastructure_requirements:
  min_cpu_cores: 2
  min_memory_gb: 4
  min_storage_gb: 20
  database_connections: 5
