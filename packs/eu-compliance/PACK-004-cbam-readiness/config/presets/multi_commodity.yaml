# =============================================================================
# PACK-004 CBAM Readiness Pack - Multi-Commodity Importer Preset
# =============================================================================
# Full deployment for importers of multiple CBAM goods categories.
# All six categories enabled, complex multi-supplier supply chains,
# full precursor tracking, comprehensive reporting, and cross-category
# analytics.
#
# Typical use cases:
#   - Large trading houses importing across categories
#   - Industrial conglomerates with diversified imports
#   - Customs brokers managing CBAM for multiple clients
#   - Companies with complex supply chains spanning multiple sectors
# =============================================================================

# Goods configuration - ALL six categories enabled
goods:
  enabled_categories:
    - "cement"
    - "iron_steel"
    - "aluminium"
    - "fertilizers"
    - "electricity"
    - "hydrogen"
  # Use all default CN codes for all categories (inherited from pack_config.py)
  precursor_tracking:
    cement:
      - "clinker"
    iron_steel:
      - "pig_iron"
      - "direct_reduced_iron"
      - "crude_steel"
      - "ferro_alloys"
    aluminium:
      - "alumina"
      - "unwrought_aluminium"
    fertilizers:
      - "ammonia"
      - "nitric_acid"
      - "urea"
    electricity: []
    hydrogen: []

# Emission calculation - comprehensive approach
emission:
  calculation_method: "actual"
  fallback_method: "country_default"
  default_markup_percentage: 25.0
  indirect_emissions_included: true
  precursor_tracking_enabled: true
  emission_factor_source: "eu_default"
  emission_factor_vintage_year: 2024
  carbon_price_deduction_enabled: true
  country_carbon_price_sources:
    - "eu_ets"
    - "uk_ets"
    - "china_ets"
    - "korea_ets"
    - "carbon_tax_registry"

# Multi-commodity specific settings
multi_commodity:
  cross_category_analytics:
    enabled: true
    description: >-
      Enable cross-category analysis for portfolio-level emission tracking,
      cost optimization across certificate purchases, and consolidated
      reporting across all goods categories.

  portfolio_management:
    consolidation_level: "company"       # company, business_unit, product_line
    cross_subsidy_allowed: false         # CBAM certificates are per-category
    certificate_pooling: false           # Each category has separate obligation
    unified_reporting: true              # Single quarterly report covers all

  volume_tiers:
    large:
      min_annual_tonnes: 10000
      features: ["dedicated_account_manager", "priority_verification", "api_access"]
    medium:
      min_annual_tonnes: 1000
      max_annual_tonnes: 10000
      features: ["standard_reporting", "portal_access"]
    small:
      max_annual_tonnes: 1000
      features: ["simplified_reporting"]

  # Category-specific configurations
  category_overrides:
    cement:
      calculation_method: "actual"
      priority: "high"
      typical_volume_category: "medium"
    iron_steel:
      calculation_method: "actual"
      priority: "high"
      typical_volume_category: "large"
    aluminium:
      calculation_method: "actual"
      priority: "high"
      typical_volume_category: "medium"
    fertilizers:
      calculation_method: "actual"
      priority: "medium"
      typical_volume_category: "medium"
    electricity:
      calculation_method: "actual"
      priority: "medium"
      typical_volume_category: "large"
    hydrogen:
      calculation_method: "actual"
      priority: "low"
      typical_volume_category: "small"

# Certificate configuration - multi-category management
certificate:
  ets_price_source: "auction"
  free_allocation_enabled: true
  carbon_deduction_enabled: true
  cost_scenario: "mid"
  quarterly_holding_target_pct: 50
  surrender_deadline_month: 5
  surrender_deadline_day: 31
  repurchase_enabled: true
  repurchase_max_pct: 33.33

# Quarterly reporting - multi-category
quarterly:
  auto_schedule: true
  submission_deadline_buffer_days: 10
  amendment_window_days: 60
  xml_validation_enabled: true
  report_language: "EN"
  additional_languages: []
  include_supporting_documents: true
  archive_reports: true
  max_retries_on_submission_failure: 3

# Supplier configuration - large supplier base
supplier:
  auto_request_frequency_months: 3
  quality_threshold: 70.0
  max_installations_per_supplier: 30
  eori_validation_enabled: true
  data_submission_format: "json"
  accepted_formats: ["json", "xml", "csv", "excel"]
  auto_fallback_to_defaults: true
  supplier_portal_enabled: true
  data_retention_years: 10
  reminder_days_before_deadline: [30, 14, 7, 3, 1]
  questionnaire_template_version: "1.0.0"

# De minimis monitoring - per category
deminimis:
  monitoring_enabled: true
  threshold_tonnes: 50.0
  threshold_value_eur: 150.0
  alert_thresholds: [80.0, 90.0, 95.0, 100.0]
  auto_exemption: false
  sector_grouping: true
  monitoring_frequency: "per_import"
  notification_channels: ["email", "dashboard", "webhook"]

# Verification - comprehensive
verification:
  frequency: "annual"
  materiality_threshold_pct: 5.0
  verifier_accreditation_required: true
  evidence_retention_years: 10
  site_visit_required: true
  remote_verification_allowed: false
  sampling_methodology: "risk_based"
  max_findings_before_rejection: 5
  corrective_action_deadline_days: 30

# Pack-level settings
reporting_year: 2026
reporting_period: "definitive"
transitional_mode: false
demo_mode: false
log_level: "INFO"
provenance_enabled: true

# Source countries - broad geographic coverage
source_countries_focus:
  - country: "TR"
    name: "Turkey"
    categories: ["iron_steel", "cement", "aluminium"]
    typical_share_pct: 20
  - country: "CN"
    name: "China"
    categories: ["iron_steel", "aluminium", "fertilizers"]
    typical_share_pct: 18
  - country: "RU"
    name: "Russia"
    categories: ["iron_steel", "aluminium", "fertilizers"]
    typical_share_pct: 15
  - country: "IN"
    name: "India"
    categories: ["iron_steel", "cement", "aluminium", "fertilizers"]
    typical_share_pct: 10
  - country: "UA"
    name: "Ukraine"
    categories: ["iron_steel", "electricity"]
    typical_share_pct: 8
  - country: "EG"
    name: "Egypt"
    categories: ["iron_steel", "cement", "fertilizers"]
    typical_share_pct: 5
  - country: "NO"
    name: "Norway"
    categories: ["aluminium", "electricity"]
    typical_share_pct: 4
  - country: "BR"
    name: "Brazil"
    categories: ["iron_steel", "aluminium"]
    typical_share_pct: 3
  - country: "KR"
    name: "South Korea"
    categories: ["iron_steel"]
    typical_share_pct: 3
  - country: "TT"
    name: "Trinidad and Tobago"
    categories: ["fertilizers"]
    typical_share_pct: 2
