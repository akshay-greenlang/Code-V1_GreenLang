# =============================================================================
# PACK-013 CSRD Manufacturing Pack - Process Manufacturing Preset
# =============================================================================
# Configuration for continuous process manufacturing: chemicals, food &
# beverage, textiles, pulp & paper. Process emissions and water/pollution
# are co-dominant concerns. REACH/CLP compliance is critical for chemical
# manufacturers. Batch tracking for production runs enables accurate
# allocation. BAT/BREF assessment is required for IED-permitted
# installations. E-PRTR pollutant release reporting is often mandatory.
#
# Typical use cases:
#   - Specialty chemical producers
#   - Food processing plants (dairy, beverages, processed foods)
#   - Textile dyeing and finishing operations
#   - Integrated pulp and paper mills
# =============================================================================

# --- Company Details ---
company_name: ""
reporting_year: 2025
manufacturing_tier: "PROCESS"
sub_sectors:
  - "CHEMICALS"

# --- Omnibus Threshold ---
omnibus_threshold:
  enabled: true
  listed_entity: false

# --- Process Emissions ---
process_emissions:
  enabled: true
  sub_sector: "CHEMICALS"
  cbam_affected: false
  ets_phase: "PHASE_4"
  cbam_status: "NOT_AFFECTED"
  emission_sources:
    - "combustion"
    - "process"
    - "fugitive"
  mass_balance_enabled: true
  product_allocation_enabled: true
  allocation_method: "MASS"
  emission_factor_source: "EU_MRV"
  year_over_year_tracking: true

# --- Energy Intensity ---
energy_intensity:
  enabled: true
  production_unit: "tonne"
  energy_sources:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "STEAM_PURCHASED"
    - "BIOMASS"
    - "BIOGAS"
  benchmark_reference: "BAT_AEL"
  iso50001_certified: false
  enpi_tracking: true
  significant_energy_use_threshold_pct: 5.0
  renewable_energy_tracking: true
  energy_cost_tracking: true

# --- Product Carbon Footprint ---
product_pcf:
  enabled: true
  lifecycle_scope: "CRADLE_TO_GATE"
  allocation_method: "MASS"
  dpp_enabled: false
  pef_methodology: true
  iso14067_compliant: true
  emission_factor_database: "ECOINVENT"
  co_product_allocation: true
  recycled_content_crediting: true
  uncertainty_analysis: true

# --- Circular Economy ---
circular_economy:
  enabled: true
  waste_streams:
    - "HAZARDOUS"
    - "NON_HAZARDOUS"
    - "BY_PRODUCT"
    - "ORGANIC"
  recycled_content_tracking: true
  material_circularity_indicator: true
  waste_diversion_target_pct: 75.0
  industrial_symbiosis_tracking: true
  closed_loop_tracking: true

# --- Water & Pollution (CRITICAL for process manufacturing) ---
water_pollution:
  enabled: true
  water_sources:
    - "MUNICIPAL"
    - "GROUNDWATER"
    - "SURFACE_WATER"
    - "RECYCLED"
  pollutant_types:
    - "AIR_EMISSIONS"
    - "WATER_DISCHARGES"
    - "SOIL_RELEASES"
    - "WASTE_TRANSFERS"
  water_stress_assessment: true
  reach_svhc_tracking: true
  eprtr_reporting: true
  water_framework_directive: true
  wastewater_treatment_monitoring: true
  water_recycling_rate_tracking: true
  clp_hazard_classification: true
  water_intensity_metric: "m3_per_tonne"

# --- BAT/BREF Compliance ---
bat_compliance:
  enabled: true
  applicable_brefs:
    - "LVOC_BREF"
    - "CWW_BREF"
  compliance_level: "COMPLIANT"
  bat_ael_monitoring: true
  permit_conditions_monitoring: true
  ied_inspection_readiness: true

# --- Supply Chain ---
supply_chain:
  enabled: true
  tier_depth: 2
  priority_categories: [1, 3, 4, 5, 10, 12]
  supplier_engagement_platform: "CDP_SUPPLY_CHAIN"
  spend_based_screening: true
  supplier_specific_enabled: true
  hybrid_method: true
  hotspot_analysis: true

# --- Benchmark ---
benchmark:
  enabled: true
  peer_group: "NACE_SECTOR"
  kpi_set:
    - "carbon_intensity"
    - "energy_intensity"
    - "water_intensity"
    - "waste_intensity"
    - "circularity_rate"
  sbti_pathway: "WELL_BELOW_2C"
  abatement_cost_curve: true
  eu_ets_benchmark_comparison: true
  bat_ael_benchmark_comparison: true
  target_years: [2025, 2030, 2035, 2040, 2050]

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  external_audit_export: true

# --- Disclosure ---
disclosure:
  esrs_chapter_enabled: true
  process_emissions_report_enabled: true
  pcf_label_enabled: true
  energy_report_enabled: true
  circular_economy_report_enabled: true
  bat_report_enabled: true
  scorecard_enabled: true
  decarbonization_roadmap_enabled: true
  output_formats:
    - "PDF"
    - "XLSX"
  review_workflow_enabled: true
  watermark_draft: true
