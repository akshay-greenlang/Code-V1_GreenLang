# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 75
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    industrial_mrv_agents: 7
    bridged_agents: 8
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  facility_processing:
    max_facilities: 50
    max_process_lines_per_facility: 100
    target_duration_minutes: 15
    process_emission_calc_per_line_ms: 100
  energy_intensity:
    max_energy_sources: 20
    benchmark_comparison_max_seconds: 10
  product_pcf:
    max_products: 5000
    pcf_calculation_per_product_ms: 200
    target_duration_minutes: 30
  bat_compliance:
    max_installations: 50
    bat_ael_check_per_parameter_ms: 50
    target_duration_minutes: 10
  supply_chain:
    max_suppliers: 10000
    target_duration_minutes: 45
  cache_hit_ratio_target: 0.70
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - manufacturing_compliance_officer
    - ehs_manager
    - energy_manager
    - sustainability_officer
    - plant_manager
    - supply_chain_manager
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_bat_ael_reference_data

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V083-PACK013-001"  # Manufacturing facility tables
      - "V083-PACK013-002"  # Process line and emission source tables
      - "V083-PACK013-003"  # Product carbon footprint tables
      - "V083-PACK013-004"  # Circular economy and waste tables
      - "V083-PACK013-005"  # BAT compliance assessment tables
      - "V083-PACK013-006"  # Water and pollution tracking tables
      - "V083-PACK013-007"  # Manufacturing benchmark tables

  post_install:
    - seed_bat_ael_reference_data
    - seed_eu_ets_benchmarks
    - seed_emission_factors
    - seed_nace_manufacturing_codes
    - seed_reach_svhc_list
    - seed_water_stress_data
    - seed_default_presets
    - run_health_checks
