  version: "1.0.0"
  display_name: "ESRS E1 Climate Change Pack"
  description: >-
    Comprehensive GreenLang deployment pack for producing all ESRS E1 Climate
    Change disclosures (DR E1-1 through E1-9). Includes 8 engines for GHG
    inventory compilation, energy consumption and mix calculation, GHG
    reduction target tracking, transition plan compilation, climate risk and
    opportunity assessment, carbon credit tracking, internal carbon pricing,
    and full E1 report generation with XBRL tagging. Bundles all 30 MRV
    agents for Scope 1/2/3 emissions calculation, 20 data intake/quality
    agents for activity data collection, and 10 foundation agents for
    orchestration, provenance, and audit. Supports GHG Protocol Corporate
    Standard, SBTi Net-Zero alignment, IPCC AR6 GWP values, and TCFD-
    aligned climate risk assessment. Pre-configured presets for power
    generation, manufacturing, transport, financial services, real estate,
    and multi-sector groups.
