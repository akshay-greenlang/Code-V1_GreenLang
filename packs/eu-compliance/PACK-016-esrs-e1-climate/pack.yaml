      path: "greenlang/agents/mrv/cooling_purchase/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-013
      name: "Dual Reporting Reconciliation"
      description: "Reconciles location-based and market-based Scope 2 per GHG Protocol Scope 2 Guidance"
      path: "greenlang/agents/mrv/dual_reporting_reconciliation/"
      required: true
      version: "1.0.0"

  scope_3:
    - id: AGENT-MRV-014
      name: "Purchased Goods & Services Agent (Cat 1)"
      description: "Calculates Cat 1 emissions using spend-based, average-data, or supplier-specific methods"
      path: "greenlang/agents/mrv/purchased_goods_services/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-015
      name: "Capital Goods Agent (Cat 2)"
      description: "Calculates Cat 2 emissions from capital equipment and infrastructure purchases"
      path: "greenlang/agents/mrv/capital_goods/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-016
      name: "Fuel & Energy Activities Agent (Cat 3)"
      description: "Calculates Cat 3 emissions from upstream fuel production and T&D losses"
      path: "greenlang/agents/mrv/fuel_energy_activities/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-017
      name: "Upstream Transportation Agent (Cat 4)"
      description: "Calculates Cat 4 emissions from inbound logistics and third-party transport"
      path: "greenlang/agents/mrv/upstream_transportation/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-018
      name: "Waste Generated Agent (Cat 5)"
      description: "Calculates Cat 5 emissions from waste disposal (landfill, incineration, recycling)"
      path: "greenlang/agents/mrv/waste_generated/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-019
      name: "Business Travel Agent (Cat 6)"
      description: "Calculates Cat 6 emissions from air, rail, hotel, and rental car travel"
      path: "greenlang/agents/mrv/business_travel/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-020
      name: "Employee Commuting Agent (Cat 7)"
      description: "Calculates Cat 7 emissions from employee commuting and remote working"
      path: "greenlang/agents/mrv/employee_commuting/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-021
      name: "Upstream Leased Assets Agent (Cat 8)"
      description: "Calculates Cat 8 emissions from upstream leased assets not in Scope 1/2"
      path: "greenlang/agents/mrv/upstream_leased_assets/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-022
      name: "Downstream Transportation Agent (Cat 9)"
      description: "Calculates Cat 9 emissions from outbound logistics and product distribution"
      path: "greenlang/agents/mrv/downstream_transportation/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-023
      name: "Processing of Sold Products (Cat 10)"
      description: "Calculates Cat 10 emissions from downstream processing of intermediate products"
      path: "greenlang/agents/mrv/processing_sold_products/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-024
      name: "Use of Sold Products (Cat 11)"
      description: "Calculates Cat 11 emissions from end-use of sold products (direct and indirect)"
      path: "greenlang/agents/mrv/use_sold_products/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-025
      name: "End-of-Life Treatment (Cat 12)"
      description: "Calculates Cat 12 emissions from end-of-life treatment of sold products"
      path: "greenlang/agents/mrv/end_of_life_treatment/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-026
      name: "Downstream Leased Assets (Cat 13)"
      description: "Calculates Cat 13 emissions from downstream leased assets"
      path: "greenlang/agents/mrv/downstream_leased_assets/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-027
      name: "Franchises Agent (Cat 14)"
      description: "Calculates Cat 14 emissions from franchise operations"
      path: "greenlang/agents/mrv/franchises/"
      required: false
      version: "1.0.0"
    - id: AGENT-MRV-028
      name: "Investments Agent (Cat 15)"
      description: "Calculates Cat 15 financed emissions per PCAF Standard"
      path: "greenlang/agents/mrv/investments/"
      required: false
      version: "1.0.0"

  cross_cutting:
    - id: AGENT-MRV-029
      name: "Scope 3 Category Mapper"
      description: "Maps activity data to Scope 3 categories and selects appropriate calculation method"
      path: "greenlang/agents/mrv/scope3_category_mapper/"
      required: true
      version: "1.0.0"
    - id: AGENT-MRV-030
      name: "Audit Trail & Lineage"
      description: "Tracks data lineage from activity data inputs to final GHG emissions outputs"
      path: "greenlang/agents/mrv/audit_trail_lineage/"
      required: true
      version: "1.0.0"

# ---------------------------------------------------------------------------
# Data Agents - Supporting data intake and quality agents (20 agents)
# ---------------------------------------------------------------------------
agents_data:
  # Data Intake (9 agents)
  - id: AGENT-DATA-001
    name: "PDF & Invoice Extractor"
    description: "Extracts activity data from utility invoices, energy bills, and fuel receipts"
    required: true
  - id: AGENT-DATA-002
    name: "Excel/CSV Normalizer"
    description: "Normalizes activity data spreadsheets, emission factor tables, and energy consumption logs"
    required: true
  - id: AGENT-DATA-003
    name: "ERP/Finance Connector"
    description: "Connects to ERP for fuel purchase records, fleet data, utility accounts, CapEx data"
    required: true
  - id: AGENT-DATA-004
    name: "API Gateway Agent"
    description: "Routes external API connections for emission factor databases, grid factors, weather data"
    required: true
  - id: AGENT-DATA-005
    name: "EUDR Traceability Connector"
    description: "Supply chain traceability data for Scope 3 upstream emissions tracking"
    required: false
  - id: AGENT-DATA-006
    name: "GIS/Mapping Connector"
    description: "Geospatial data for site-level climate risk exposure assessment (E1-9)"
    required: false
  - id: AGENT-DATA-007
    name: "Deforestation Satellite Connector"
    description: "Satellite data for land use change emissions and carbon stock monitoring"
    required: false
  - id: AGENT-DATA-008
    name: "Supplier Questionnaire Processor"
    description: "Processes supplier-reported emissions data for Scope 3 supplier-specific calculations"
    required: true
  - id: AGENT-DATA-020
    name: "Climate Hazard Connector"
    description: "Physical climate hazard data for E1-9 physical risk assessment (flood, heat, drought maps)"
    required: false
  # Data Quality (11 agents)
  - id: AGENT-DATA-009
    name: "Spend Data Categorizer"
    description: "Categorizes procurement spend for Scope 3 Cat 1 spend-based emission calculations"
    required: false
  - id: AGENT-DATA-010
    name: "Data Quality Profiler"
    description: "Profiles data quality across all E1 activity data inputs, scoring confidence levels"
    required: true
  - id: AGENT-DATA-011
    name: "Duplicate Detection Agent"
    description: "Detects duplicate activity data entries to prevent double-counting in GHG inventory"
    required: true
  - id: AGENT-DATA-012
    name: "Missing Value Imputer"
    description: "Imputes missing activity data (e.g., months without meter readings) using estimation methods"
    required: true
  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous activity data (e.g., spike in fuel consumption) for review"
    required: true
  - id: AGENT-DATA-014
    name: "Time Series Gap Filler"
    description: "Fills temporal gaps in monthly/quarterly energy and fuel consumption time series"
    required: false
  - id: AGENT-DATA-015
    name: "Cross-Source Reconciliation"
    description: "Reconciles activity data across sources (invoices vs. meters vs. ERP vs. estimates)"
    required: true
  - id: AGENT-DATA-016
    name: "Data Freshness Monitor"
    description: "Monitors staleness of emission factors, grid factors, and activity data feeds"
    required: true
  - id: AGENT-DATA-017
    name: "Schema Migration Agent"
    description: "Manages schema evolution for emission factor database updates and format changes"
    required: true
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from raw activity data to final calculated emissions for audit"
    required: true
  - id: AGENT-DATA-019
    name: "Validation Rule Engine"
    description: "Enforces GHG Protocol and ESRS E1 validation rules on activity data and emissions"
    required: true

# ---------------------------------------------------------------------------
# Foundation Agents - Core platform agents (all 10)
# ---------------------------------------------------------------------------
agents_foundation:
  - id: AGENT-FOUND-001
    name: "GreenLang Orchestrator (DAG)"
    description: "Orchestrates E1 workflow phases using directed acyclic graphs"
    required: true
  - id: AGENT-FOUND-002
    name: "Schema Compiler & Validator"
    description: "Compiles and validates E1 data schemas and emission factor table structures"
    required: true
  - id: AGENT-FOUND-003
    name: "Unit & Reference Normalizer"
    description: "Normalizes units (tCO2e, MWh, GJ, litres, kg, m3) and reference data"
    required: true
  - id: AGENT-FOUND-004
    name: "Assumptions Registry"
    description: "Tracks all assumptions in E1 calculations (emission factors, estimation methods, boundaries)"
    required: true
  - id: AGENT-FOUND-005
    name: "Citations & Evidence Agent"
    description: "Links GHG emissions to source evidence (invoices, meters, supplier reports) for audit"
    required: true
  - id: AGENT-FOUND-006
    name: "Access & Policy Guard"
    description: "Enforces role-based access for E1 data (data entry, reviewer, approver, auditor)"
    required: true
  - id: AGENT-FOUND-007
    name: "Agent Registry & Service Catalog"
    description: "Maintains registry of available MRV agents and E1 engine capabilities"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all E1 GHG calculations are reproducible with SHA-256 provenance"
    required: true
  - id: AGENT-FOUND-009
    name: "QA Test Harness"
    description: "Automated quality assurance for E1 outputs and GHG calculation consistency"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors E1 engine performance, MRV agent health, and pipeline throughput"
    required: true

# ---------------------------------------------------------------------------
# Bridged Agents (10 agents for cross-pack integration and regulatory)
# ---------------------------------------------------------------------------
agents_bridged:
  - id: ghg-protocol-compliance-agent
    name: "GHG Protocol Compliance Agent"
    description: "Validates GHG inventory against GHG Protocol Corporate Standard requirements"
    required: true
  - id: sbti-validation-agent
    name: "SBTi Validation Agent"
    description: "Validates GHG reduction targets against SBTi near-term, long-term, and net-zero criteria"
    required: true
  - id: emission-factor-agent
    name: "Emission Factor Database Agent"
    description: "Maintains and serves emission factors from EPA, DEFRA, IEA, IPCC, and national databases"
    required: true
  - id: gwp-conversion-agent
    name: "GWP Conversion Agent"
    description: "Applies IPCC AR6 GWP-100 values for greenhouse gas to CO2e conversion"
    required: true
  - id: xbrl-e1-tagging-agent
    name: "XBRL E1 Tagging Agent"
    description: "Tags all E1 datapoints with EFRAG XBRL taxonomy identifiers for digital reporting"
    required: true
  - id: csrd-disclosure-agent
    name: "CSRD Disclosure Agent"
    description: "Integrates E1 disclosures into CSRD sustainability statement structure"
    required: true
  - id: taxonomy-alignment-agent
    name: "EU Taxonomy Alignment Agent"
    description: "Aligns E1 data with EU Taxonomy climate mitigation/adaptation criteria"
    required: false
  - id: tcfd-mapping-agent
    name: "TCFD Mapping Agent"
    description: "Maps E1-9 climate risk disclosures to TCFD recommendation pillars"
    required: false
  - id: regulatory-change-monitor
    name: "Regulatory Change Monitor Agent"
    description: "Monitors ESRS E1 amendments, GHG Protocol updates, SBTi methodology changes"
    required: true
  - id: assurance-readiness-agent
    name: "Assurance Readiness Agent"
    description: "Prepares E1 documentation for limited/reasonable assurance on GHG emissions"
    required: true

# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 70
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 10
  required_packs:
    - id: PACK-015
      name: "Double Materiality Assessment Pack"
      description: "Required for E1 materiality determination before disclosures"
  agent_dependencies:
    - "AGENT-MRV-001 through AGENT-MRV-030"
    - "AGENT-DATA-001 through AGENT-DATA-020"
    - "AGENT-FOUND-001 through AGENT-FOUND-010"
  app_dependencies:
    - "GL-GHG-APP"
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  ghg_inventory:
    max_emission_sources: 10000
    calculation_per_source_ms: 5
    target_duration_minutes: 15
  scope_1_calculation:
    max_sources: 1000
    target_duration_minutes: 5
  scope_2_calculation:
    max_meters: 500
    target_duration_minutes: 3
  scope_3_calculation:
    max_categories: 15
    max_line_items_per_category: 50000
    target_duration_minutes: 30
  energy_mix:
    max_energy_sources: 500
    target_duration_minutes: 5
  target_tracking:
    max_targets: 50
    target_duration_minutes: 2
  transition_plan:
    max_decarbonization_levers: 100
    target_duration_minutes: 10
  climate_risk:
    max_risk_items: 200
    scenario_analysis_per_scenario_ms: 5000
    target_duration_minutes: 20
  report_generation:
    max_report_pages: 150
    target_duration_minutes: 15
  full_e1_disclosure:
    target_duration_minutes: 480
    parallel_execution_enabled: true
  max_ghg_calc_time_per_entity_s: 5
  max_e1_report_time_s: 30
  cache_hit_ratio_target: 0.80
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with E1 role-based access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - e1_data_entry
    - e1_reviewer
    - e1_approver
    - ghg_analyst
    - energy_manager
    - sustainability_officer
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"
    - "matplotlib>=3.7"
    - "plotly>=5.15"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 15
    recommended_connections: 40

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_gwp_value_table
    - verify_sbti_pathway_database
    - verify_pack_015_installed

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V083-PACK016-001"  # GHG inventory and emission source tables
      - "V083-PACK016-002"  # Energy consumption and mix tables
      - "V083-PACK016-003"  # GHG target and progress tracking tables
      - "V083-PACK016-004"  # Transition plan and decarbonization lever tables
      - "V083-PACK016-005"  # Climate risk and opportunity register tables
      - "V083-PACK016-006"  # Carbon credit and removal project tables
      - "V083-PACK016-007"  # Internal carbon pricing tables
      - "V083-PACK016-008"  # E1 report and audit trail tables

  post_install:
    - seed_emission_factor_database
    - seed_gwp_ar6_values
    - seed_grid_emission_factors
    - seed_sbti_decarbonization_pathways
    - seed_energy_source_classification
    - seed_carbon_credit_standards
    - seed_climate_risk_taxonomy
    - seed_default_presets
    - run_health_checks
