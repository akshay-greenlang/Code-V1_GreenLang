# =============================================================================
# PACK-016 ESRS E1 Climate Pack - Real Estate Preset
# =============================================================================
# Sector-specific configuration for real estate owners, operators, and
# developers across NACE division L (Real Estate Activities). Scope 1
# emissions come from on-site heating (natural gas boilers, fuel oil).
# Scope 2 from purchased electricity and district heating/cooling.
# Scope 3 includes embodied carbon from construction materials (Cat 1/2),
# tenant energy consumption (Cat 13), and end-of-life demolition (Cat 12).
#
# Typical use cases:
#   - Commercial real estate owners and operators (office, retail)
#   - Residential property companies and REITs
#   - Industrial and logistics property owners
#   - Real estate developers (new construction)
#   - Hotel and hospitality property operators
#   - Mixed-use portfolio managers
#
# Key characteristics:
#   - Moderate Scope 1 (on-site gas/oil heating)
#   - Significant Scope 2 (purchased electricity, district heating)
#   - Scope 3 Cat 1/2 (embodied carbon), Cat 13 (tenant emissions)
#   - GHG intensity per sqm (kgCO2e/sqm/year) is key metric
#   - Energy Performance Certificate (EPC) rating integration
#   - Transition plan follows CRREM decarbonization pathways
#   - Building-level energy and emissions tracking
#   - Stranded asset risk from building energy performance requirements
# =============================================================================

# --- Company Details ---
company_name: ""
reporting_year: 2025
sector: "REAL_ESTATE"
fiscal_year_end: "12-31"
currency: "EUR"
reporting_boundary: "group"

# --- GHG Inventory (building operations) ---
ghg:
  enabled: true
  base_year: 2019
  reporting_year: 2025
  consolidation_approach: "OPERATIONAL_CONTROL"
  gwp_source: "IPCC_AR6"
  gwp_time_horizon: 100
  emission_factors_source: "DEFRA_2025"
  emission_factors_region: "EU"
  scopes_enabled:
    - "SCOPE_1"
    - "SCOPE_2_LOCATION"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  scope_3_categories:
    - 1
    - 2
    - 3
    - 5
    - 6
    - 7
    - 12
    - 13
  scope_3_significance_threshold_pct: 1.0
  scope_3_default_method: "AVERAGE_DATA"
  kyoto_gas_disaggregation: true
  biogenic_co2_separate: true
  ghg_intensity_denominators:
    - "net_revenue_eur_million"
    - "sqm_gla"
  base_year_recalculation_threshold_pct: 5.0
  data_quality_scoring: true

# --- Energy Consumption (building energy) ---
energy:
  enabled: true
  reporting_unit: "MWh"
  include_renewables: true
  renewable_categories:
    - "SOLAR"
    - "WIND"
    - "GEOTHERMAL"
    - "BIOMASS"
  ppa_tracking: true
  rec_tracking: true
  self_generation_tracking: true
  energy_intensity_denominators:
    - "net_revenue_eur_million"
    - "sqm_gla"
  fossil_fuel_types:
    - "NATURAL_GAS"
    - "FUEL_OIL"
    - "DIESEL"
  nuclear_included: true
  district_energy_included: true
  cross_validate_ghg: true
  epc_rating_integration: true

# --- Transition Plan (building retrofit pathway) ---
transition_plan:
  enabled: true
  target_year: 2050
  interim_targets_enabled: true
  interim_target_years:
    - 2030
    - 2035
    - 2040
    - 2045
  locked_in_emissions_calc: true
  capex_alignment: true
  opex_alignment: false
  scenario_alignment: "1.5C"
  decarbonization_levers:
    - "building_envelope_retrofit"
    - "hvac_upgrade"
    - "led_lighting"
    - "heat_pump_installation"
    - "on_site_solar"
    - "renewable_energy_procurement"
    - "smart_building_controls"
    - "embodied_carbon_reduction"
  taxonomy_alignment: true
  has_transition_plan: true

# --- Target Tracking (CRREM aligned) ---
targets:
  enabled: true
  sbti_commitment_level: "SBTi_1_5C"
  sbti_validated: false
  base_year: 2019
  base_year_approach: "FIXED"
  target_year: 2030
  long_term_target_year: 2050
  target_types:
    - "ABSOLUTE"
    - "INTENSITY"
  target_scopes:
    - "SCOPE_1"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  reduction_path: "linear"
  intensity_denominator: "sqm_gla"
  progress_tracking_frequency: "annual"
  variance_analysis: true
  base_year_recalculation_policy: true

# --- Carbon Credits ---
carbon_credits:
  enabled: true
  allowed_standards:
    - "VERRA_VCS"
    - "GOLD_STANDARD"
  credit_types:
    - "REMOVAL"
  vintage_requirements: 5
  retirement_policy: "retire_on_claim"
  quality_assessment: true
  sbti_offset_guidance: true
  removal_tracking: false
  separate_from_gross_emissions: true

# --- Carbon Pricing ---
carbon_pricing:
  enabled: true
  has_carbon_pricing: false
  pricing_methods:
    - "SHADOW_PRICE"
  price_per_tco2e: "80.00"
  price_currency: "EUR"
  coverage_scope:
    - "SCOPE_1"
    - "SCOPE_2_MARKET"
  coverage_share_pct: "75.0"
  shadow_price_scenarios:
    - scenario: "current"
      price_per_tco2e: "80.00"
      year: "2025"
    - scenario: "medium"
      price_per_tco2e: "120.00"
      year: "2030"
    - scenario: "high"
      price_per_tco2e: "200.00"
      year: "2035"
  influences_investment_decisions: true
  influences_procurement: false

# --- Climate Risk (stranded asset focus) ---
climate_risk:
  enabled: true
  physical_risk_types:
    - "ACUTE"
    - "CHRONIC"
  transition_risk_types:
    - "POLICY"
    - "TECHNOLOGY"
    - "MARKET"
    - "REPUTATION"
  scenarios:
    - "SSP1_2_6"
    - "SSP2_4_5"
    - "SSP5_8_5"
  time_horizons:
    - "SHORT_TERM"
    - "MEDIUM_TERM"
    - "LONG_TERM"
  short_term_years: 1
  medium_term_years: 5
  long_term_years: 15
  quantify_financial_effects: true
  financial_effect_currency: "EUR"
  opportunity_assessment: true
  site_level_exposure: true
  portfolio_risk: false
  tcfd_alignment: true
  use_climate_hazard_data: true

# --- Reporting ---
reporting:
  enabled: true
  disclosure_requirements:
    - "E1-1"
    - "E1-2"
    - "E1-3"
    - "E1-4"
    - "E1-5"
    - "E1-6"
    - "E1-7"
    - "E1-8"
    - "E1-9"
  output_formats:
    - "PDF"
    - "XBRL"
  xbrl_tagging: true
  sha256_provenance: true
  multi_language: false
  supported_languages: ["en"]
  review_workflow: true
  watermark_draft: true
  audit_trail_report: true
  executive_summary: true
  year_over_year_comparison: true
  data_quality_disclosure: true
  assumption_disclosure: true
  retention_years: 10
