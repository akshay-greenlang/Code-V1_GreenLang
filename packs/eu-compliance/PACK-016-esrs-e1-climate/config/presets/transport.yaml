# =============================================================================
# PACK-016 ESRS E1 Climate Pack - Transport and Logistics Preset
# =============================================================================
# Sector-specific configuration for transport, logistics, and aviation
# companies across NACE division H (Transport and Storage). Scope 1 is
# dominated by mobile combustion from fleet vehicles, ships, and aircraft.
# Scope 2 is modest (depot/terminal electricity, rail traction electricity).
# Scope 3 includes fuel supply chain (Cat 3) and business travel (Cat 6).
#
# Typical use cases:
#   - Road freight and logistics companies (trucking fleets)
#   - Maritime shipping companies (container, bulk, tanker)
#   - Airlines and air cargo operators
#   - Rail freight and passenger operators
#   - Last-mile delivery and courier services
#   - Multimodal logistics providers (3PL, 4PL)
#   - Public transport operators (bus, tram, metro)
#
# Key characteristics:
#   - High Scope 1 (mobile combustion from fleet operations)
#   - Modest Scope 2 (depots, terminals, rail traction)
#   - Scope 3 Cat 3 (fuel supply chain) is significant
#   - GHG intensity per tonne-km or per passenger-km is key metric
#   - Energy mix dominated by liquid fuels (diesel, jet fuel, marine fuel)
#   - Transition plan focuses on fleet electrification, SAF, biofuels
#   - SBTi transport sector SDA pathway applies
# =============================================================================

# --- Company Details ---
company_name: ""
reporting_year: 2025
sector: "TRANSPORT"
fiscal_year_end: "12-31"
currency: "EUR"
reporting_boundary: "group"

# --- GHG Inventory (mobile combustion dominated) ---
ghg:
  enabled: true
  base_year: 2019
  reporting_year: 2025
  consolidation_approach: "OPERATIONAL_CONTROL"
  gwp_source: "IPCC_AR6"
  gwp_time_horizon: 100
  emission_factors_source: "DEFRA_2025"
  emission_factors_region: "EU"
  scopes_enabled:
    - "SCOPE_1"
    - "SCOPE_2_LOCATION"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  scope_3_categories:
    - 1
    - 3
    - 4
    - 5
    - 6
    - 7
    - 9
  scope_3_significance_threshold_pct: 1.0
  scope_3_default_method: "AVERAGE_DATA"
  kyoto_gas_disaggregation: true
  biogenic_co2_separate: true
  ghg_intensity_denominators:
    - "net_revenue_eur_million"
    - "tonne_km"
    - "passenger_km"
  base_year_recalculation_threshold_pct: 5.0
  data_quality_scoring: true

# --- Energy Consumption (liquid fuel heavy) ---
energy:
  enabled: true
  reporting_unit: "MWh"
  include_renewables: true
  renewable_categories:
    - "SOLAR"
    - "WIND"
    - "BIOMASS"
  ppa_tracking: true
  rec_tracking: true
  self_generation_tracking: false
  energy_intensity_denominators:
    - "net_revenue_eur_million"
    - "tonne_km"
  fossil_fuel_types:
    - "DIESEL"
    - "GASOLINE"
    - "JET_FUEL"
    - "LPG"
    - "NATURAL_GAS"
    - "FUEL_OIL"
  nuclear_included: false
  district_energy_included: false
  cross_validate_ghg: true
  epc_rating_integration: false

# --- Transition Plan (fleet electrification) ---
transition_plan:
  enabled: true
  target_year: 2050
  interim_targets_enabled: true
  interim_target_years:
    - 2030
    - 2035
    - 2040
    - 2045
  locked_in_emissions_calc: true
  capex_alignment: true
  opex_alignment: false
  scenario_alignment: "1.5C"
  decarbonization_levers:
    - "fleet_electrification"
    - "biofuels"
    - "sustainable_aviation_fuel"
    - "route_optimization"
    - "modal_shift"
    - "hydrogen_fuel_cells"
    - "operational_efficiency"
  taxonomy_alignment: true
  has_transition_plan: true

# --- Target Tracking (SBTi transport SDA) ---
targets:
  enabled: true
  sbti_commitment_level: "SBTi_1_5C"
  sbti_validated: false
  base_year: 2019
  base_year_approach: "FIXED"
  target_year: 2030
  long_term_target_year: 2050
  target_types:
    - "ABSOLUTE"
    - "INTENSITY"
  target_scopes:
    - "SCOPE_1"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  reduction_path: "linear"
  intensity_denominator: "tonne_km"
  progress_tracking_frequency: "annual"
  variance_analysis: true
  base_year_recalculation_policy: true

# --- Carbon Credits ---
carbon_credits:
  enabled: true
  allowed_standards:
    - "VERRA_VCS"
    - "GOLD_STANDARD"
    - "CORSIA"
  credit_types:
    - "AVOIDANCE"
    - "REMOVAL"
  vintage_requirements: 5
  retirement_policy: "retire_on_claim"
  quality_assessment: true
  sbti_offset_guidance: true
  removal_tracking: false
  separate_from_gross_emissions: true

# --- Carbon Pricing ---
carbon_pricing:
  enabled: true
  has_carbon_pricing: false
  pricing_methods:
    - "SHADOW_PRICE"
  price_per_tco2e: "80.00"
  price_currency: "EUR"
  coverage_scope:
    - "SCOPE_1"
  coverage_share_pct: "70.0"
  shadow_price_scenarios:
    - scenario: "current"
      price_per_tco2e: "80.00"
      year: "2025"
    - scenario: "medium"
      price_per_tco2e: "120.00"
      year: "2030"
    - scenario: "high"
      price_per_tco2e: "180.00"
      year: "2035"
  influences_investment_decisions: true
  influences_procurement: false

# --- Climate Risk ---
climate_risk:
  enabled: true
  physical_risk_types:
    - "ACUTE"
    - "CHRONIC"
  transition_risk_types:
    - "POLICY"
    - "TECHNOLOGY"
    - "MARKET"
  scenarios:
    - "SSP1_2_6"
    - "SSP2_4_5"
    - "SSP5_8_5"
  time_horizons:
    - "SHORT_TERM"
    - "MEDIUM_TERM"
    - "LONG_TERM"
  short_term_years: 1
  medium_term_years: 5
  long_term_years: 10
  quantify_financial_effects: true
  financial_effect_currency: "EUR"
  opportunity_assessment: true
  site_level_exposure: false
  portfolio_risk: false
  tcfd_alignment: true
  use_climate_hazard_data: true

# --- Reporting ---
reporting:
  enabled: true
  disclosure_requirements:
    - "E1-1"
    - "E1-2"
    - "E1-3"
    - "E1-4"
    - "E1-5"
    - "E1-6"
    - "E1-7"
    - "E1-8"
    - "E1-9"
  output_formats:
    - "PDF"
    - "XBRL"
  xbrl_tagging: true
  sha256_provenance: true
  multi_language: false
  supported_languages: ["en"]
  review_workflow: true
  watermark_draft: true
  audit_trail_report: true
  executive_summary: true
  year_over_year_comparison: true
  data_quality_disclosure: true
  assumption_disclosure: true
  retention_years: 10
