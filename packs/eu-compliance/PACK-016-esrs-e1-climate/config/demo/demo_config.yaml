# =============================================================================
# PACK-016 ESRS E1 Climate Pack - Demo Configuration
# =============================================================================
# Demo configuration for NordEnergy AG, a fictional European integrated
# utility company headquartered in Hamburg, Germany. The company operates
# across power generation (natural gas CCGT, onshore wind, solar PV),
# district heating networks, and electricity distribution. NordEnergy is
# listed on the Frankfurt Stock Exchange and is subject to CSRD from
# FY2024 (first wave). The company has committed to SBTi 1.5C-aligned
# targets and is executing a transition plan to phase out fossil gas
# generation by 2040.
#
# Company: NordEnergy AG
# Headquarters: Hamburg, Germany
# Revenue: EUR 3.2 billion
# Employees: 4,800
# Installed Capacity: 5.2 GW (2.1 GW gas CCGT, 1.8 GW onshore wind,
#   0.9 GW solar PV, 0.4 GW district heating)
# Reporting Year: 2025
# Base Year: 2020
# CSRD Wave: First wave (listed large undertaking)
# SBTi Status: Targets submitted, validation pending
# =============================================================================

# --- Company Details ---
company_name: "NordEnergy AG"
reporting_year: 2025
sector: "ENERGY"
fiscal_year_end: "12-31"
currency: "EUR"
reporting_boundary: "group"

# --- GHG Inventory ---
ghg:
  enabled: true
  base_year: 2020
  reporting_year: 2025
  consolidation_approach: "OPERATIONAL_CONTROL"
  gwp_source: "IPCC_AR6"
  gwp_time_horizon: 100
  emission_factors_source: "IEA_2024"
  emission_factors_region: "EU"
  scopes_enabled:
    - "SCOPE_1"
    - "SCOPE_2_LOCATION"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  scope_3_categories:
    - 1
    - 3
    - 4
    - 5
    - 6
    - 7
    - 9
    - 11
  scope_3_significance_threshold_pct: 1.0
  scope_3_default_method: "HYBRID"
  kyoto_gas_disaggregation: true
  biogenic_co2_separate: true
  ghg_intensity_denominators:
    - "net_revenue_eur_million"
    - "mwh_generated"
  base_year_recalculation_threshold_pct: 5.0
  data_quality_scoring: true

# --- Energy Consumption and Mix ---
energy:
  enabled: true
  reporting_unit: "MWh"
  include_renewables: true
  renewable_categories:
    - "SOLAR"
    - "WIND"
    - "HYDRO"
    - "BIOMASS"
  ppa_tracking: false
  rec_tracking: false
  self_generation_tracking: true
  energy_intensity_denominators:
    - "net_revenue_eur_million"
    - "mwh_generated"
  fossil_fuel_types:
    - "NATURAL_GAS"
    - "DIESEL"
    - "FUEL_OIL"
  nuclear_included: false
  district_energy_included: true
  cross_validate_ghg: true
  epc_rating_integration: false

# --- Transition Plan ---
transition_plan:
  enabled: true
  target_year: 2050
  interim_targets_enabled: true
  interim_target_years:
    - 2027
    - 2030
    - 2035
    - 2040
    - 2045
  locked_in_emissions_calc: true
  capex_alignment: true
  opex_alignment: true
  scenario_alignment: "1.5C"
  decarbonization_levers:
    - "gas_ccgt_phase_down"
    - "onshore_wind_expansion"
    - "solar_pv_expansion"
    - "battery_storage"
    - "green_hydrogen_blending"
    - "district_heating_decarbonization"
    - "grid_modernization"
  taxonomy_alignment: true
  has_transition_plan: true

# --- Target Tracking ---
targets:
  enabled: true
  sbti_commitment_level: "SBTi_1_5C"
  sbti_validated: false
  sbti_submission_date: "2024-06-15"
  base_year: 2020
  base_year_approach: "FIXED"
  target_year: 2030
  long_term_target_year: 2050
  target_types:
    - "ABSOLUTE"
    - "INTENSITY"
    - "NET_ZERO"
  target_scopes:
    - "SCOPE_1"
    - "SCOPE_2_MARKET"
    - "SCOPE_3"
  reduction_path: "linear"
  intensity_denominator: "mwh_generated"
  progress_tracking_frequency: "annual"
  variance_analysis: true
  base_year_recalculation_policy: true

# --- Carbon Credits ---
carbon_credits:
  enabled: true
  allowed_standards:
    - "VERRA_VCS"
    - "GOLD_STANDARD"
  credit_types:
    - "AVOIDANCE"
    - "REMOVAL"
  vintage_requirements: 5
  retirement_policy: "retire_on_claim"
  quality_assessment: true
  sbti_offset_guidance: true
  removal_tracking: true
  separate_from_gross_emissions: true

# --- Carbon Pricing ---
carbon_pricing:
  enabled: true
  has_carbon_pricing: true
  pricing_methods:
    - "SHADOW_PRICE"
    - "REGULATORY"
  price_per_tco2e: "95.00"
  price_currency: "EUR"
  coverage_scope:
    - "SCOPE_1"
  coverage_share_pct: "97.0"
  shadow_price_scenarios:
    - scenario: "ets_current"
      price_per_tco2e: "95.00"
      year: "2025"
    - scenario: "ets_2030"
      price_per_tco2e: "140.00"
      year: "2030"
    - scenario: "high_ambition"
      price_per_tco2e: "220.00"
      year: "2035"
    - scenario: "social_cost"
      price_per_tco2e: "350.00"
      year: "2040"
  influences_investment_decisions: true
  influences_procurement: true

# --- Climate Risk ---
climate_risk:
  enabled: true
  physical_risk_types:
    - "ACUTE"
    - "CHRONIC"
  transition_risk_types:
    - "POLICY"
    - "TECHNOLOGY"
    - "MARKET"
    - "REPUTATION"
    - "LEGAL"
  scenarios:
    - "SSP1_2_6"
    - "SSP2_4_5"
    - "SSP5_8_5"
  time_horizons:
    - "SHORT_TERM"
    - "MEDIUM_TERM"
    - "LONG_TERM"
  short_term_years: 1
  medium_term_years: 5
  long_term_years: 15
  quantify_financial_effects: true
  financial_effect_currency: "EUR"
  opportunity_assessment: true
  site_level_exposure: true
  portfolio_risk: false
  tcfd_alignment: true
  use_climate_hazard_data: true

# --- Reporting ---
reporting:
  enabled: true
  disclosure_requirements:
    - "E1-1"
    - "E1-2"
    - "E1-3"
    - "E1-4"
    - "E1-5"
    - "E1-6"
    - "E1-7"
    - "E1-8"
    - "E1-9"
  output_formats:
    - "PDF"
    - "XBRL"
    - "HTML"
  xbrl_tagging: true
  sha256_provenance: true
  multi_language: true
  supported_languages: ["en", "de"]
  review_workflow: true
  watermark_draft: true
  audit_trail_report: true
  executive_summary: true
  year_over_year_comparison: true
  data_quality_disclosure: true
  assumption_disclosure: true
  retention_years: 10
