      phase_3_date: "2036-08-18"
      phase_3_target_pct: 15
    lead:
      phase_1_date: "2028-08-18"
      phase_1_target: "document_actual"
      phase_2_date: "2031-08-18"
      phase_2_target_pct: 85
      phase_3_date: "2036-08-18"
      phase_3_target_pct: 85

  carbon_footprint_performance_classes:
    class_a:
      label: "A"
      description: "Best performing - bottom 20th percentile CO2e/kWh"
      percentile_max: 20
    class_b:
      label: "B"
      description: "Above average - 21st to 40th percentile"
      percentile_min: 21
      percentile_max: 40
    class_c:
      label: "C"
      description: "Average - 41st to 60th percentile"
      percentile_min: 41
      percentile_max: 60
    class_d:
      label: "D"
      description: "Below average - 61st to 80th percentile"
      percentile_min: 61
      percentile_max: 80
    class_e:
      label: "E"
      description: "Worst performing - above 80th percentile"
      percentile_min: 81

  articles_covered: [6, 7, 8, 10, 13, 14, 17, 18, 19, 20, 21, 22, 48, 56, 57, 58, 59, 60, 61, 62, 63, 64, 65, 66, 67, 68, 69, 70, 71, 77, 78]
  total_engines: 8
  total_workflows: 8
  total_templates: 8
  total_integrations: 10
  total_presets: 6

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines (8 battery engines)
  # ===========================================================================
  engines:
    - id: carbon_footprint
      name: "Carbon Footprint Engine"
      file: engines/carbon_footprint_engine.py
      class: CarbonFootprintEngine
      articles: [7]
      annexes: [II]
      description: >-
        Implements Article 7 carbon footprint declaration for EV and industrial
        batteries >2kWh. Calculates the battery carbon footprint across the
        full lifecycle per Annex II methodology: raw material extraction and
        pre-processing (mining, refining of cathode/anode materials, cell
        component production), manufacturing (electrode preparation, cell
        assembly, formation cycling, battery pack assembly including BMS and
        cooling system), distribution (transport from factory to market), and
        end-of-life (collection, dismantling, recycling, disposal). Use phase
        is excluded per Art 7 scope. Functional unit: 1 kWh of total energy
        provided over the battery service life. Calculates total CO2e (kg),
        per-kWh CO2e, lifecycle stage percentage breakdown, and assigns the
        carbon footprint performance class (A through E) based on market
        percentile distribution. Validates against maximum carbon footprint
        thresholds (applicable from Feb 2028). Supports PEFCR for rechargeable
        batteries methodology. Integrates with MRV agents for upstream Scope 3
        emissions data (raw materials, transportation, end-of-life). Generates
        the EU carbon footprint declaration document. Supports chemistry-
        specific emission factor databases (NMC, NCA, LFP, LMO, lead-acid).
        Zero-hallucination: all carbon footprint calculations use deterministic
        LCA formulas with emission factors from recognised databases (ecoinvent,
        GREET, IEA); no LLM in calculation path.
      inputs:
        - battery_profile                # category, chemistry, capacity, weight
        - bill_of_materials              # raw materials, quantities, suppliers
        - manufacturing_energy_data      # electricity, heat, gas consumption
        - manufacturing_process_data     # yield rates, scrap rates, formation energy
        - transport_data                 # distances, modes, vehicle types
        - end_of_life_scenario           # recycling process, recovery rates
        - emission_factor_database       # ecoinvent, GREET, IEA grid factors
        - market_percentile_data         # for performance class assignment
      outputs:
        - carbon_footprint_declaration
        - total_co2e_kg
        - per_kwh_co2e
        - lifecycle_stage_breakdown
        - performance_class
        - threshold_compliance_status
        - methodology_reference
        - provenance_hashes
      processing_time_estimate_minutes: 25
      memory_estimate_mb: 768
      required: true

    - id: recycled_content
      name: "Recycled Content Engine"
      file: engines/recycled_content_engine.py
      class: RecycledContentEngine
      articles: [8]
      description: >-
        Implements Article 8 recycled content tracking and calculation for
        cobalt, lithium, nickel, and lead in industrial, EV, LMT, and SLI
        batteries. Calculates the percentage of recycled material in the
        active battery material using mass balance approach. Tracks recycled
        content per material against regulatory targets: Phase 1 (Aug 2028)
        documentation of actual recycled content; Phase 2 (Aug 2031) minimum
        targets (cobalt 16%, lithium 6%, nickel 6%, lead 85%); Phase 3
        (Aug 2036) increased targets (cobalt 26%, lithium 12%, nickel 15%,
        lead 85%). Validates material provenance through supply chain
        documentation including certificates of analysis, recycled material
        certificates, and mass balance calculations. Supports pre-consumer
        and post-consumer recycled content classification. Calculates
        recovery-adjusted recycled content accounting for material losses
        in recycling processes. Generates recycled content documentation
        for regulatory submission and battery passport data field population.
        Zero-hallucination: recycled content percentages are calculated using
        deterministic mass balance formulas; target comparison uses arithmetic
        threshold checks.
      inputs:
        - battery_profile
        - bill_of_materials
        - material_sourcing_data         # supplier, origin, recycled vs virgin
        - recycled_material_certificates # chain of custody documentation
        - mass_balance_records           # input/output mass tracking
        - recovery_rate_data             # recycling process recovery rates
        - target_year_selection          # 2028, 2031, or 2036 targets
      outputs:
        - recycled_content_report
        - cobalt_recycled_pct
        - lithium_recycled_pct
        - nickel_recycled_pct
        - lead_recycled_pct
        - target_compliance_status
        - mass_balance_documentation
        - provenance_hashes
      processing_time_estimate_minutes: 15
      memory_estimate_mb: 512
      required: true

    - id: battery_passport
      name: "Battery Passport Engine"
      file: engines/battery_passport_engine.py
      class: BatteryPassportEngine
      articles: [77, 78]
      annexes: [XIII]
      description: >-
        Implements Articles 77-78 battery passport (Digital Product Passport)
        compilation for EV, industrial >2kWh, and LMT batteries. Compiles
        all data fields specified in Annex XIII across six categories:
        (A) General battery information - manufacturer identification,
        manufacturing plant, model, batch/serial number, date of placing on
        market, weight, dimensions, category, chemistry; (B) Carbon footprint
        - total CO2e, per-kWh CO2e, performance class, lifecycle stage
        breakdown, methodology reference (sourced from carbon_footprint
        engine); (C) Supply chain due diligence - due diligence report
        reference, third-party verification, risk mitigation policies,
        sourcing information for cobalt, lithium, nickel, natural graphite
        (sourced from supply_chain_dd engine); (D) Material composition -
        battery chemistry details (cathode, anode, electrolyte), critical
        raw materials content, hazardous substances (mercury, cadmium, lead),
        recycled content percentages (sourced from recycled_content engine);
        (E) Performance and durability - all Annex IV parameters plus
        current State of Health (SoH) and State of Charge (SoC) (sourced
        from performance_durability engine); (F) End-of-life information -
        collection instructions, dismantling guidance, safety handling,
        waste prevention role for end-users (sourced from end_of_life
        engine). Validates data completeness against Annex XIII checklist.
        Generates QR code payload per Art 77(3) conforming to ISO/IEC 18004.
        Assigns unique passport identifier per battery model. Supports data
        export in GBA Battery Passport and Catena-X / Battery Pass formats.
        Ensures interoperability with ESPR Digital Product Passport framework.
        Zero-hallucination: passport compilation is deterministic data
        assembly and validation; no LLM in data population path.
      inputs:
        - battery_profile
        - carbon_footprint_data          # from carbon_footprint engine
        - recycled_content_data          # from recycled_content engine
        - performance_durability_data    # from performance_durability engine
        - supply_chain_dd_data           # from supply_chain_dd engine
        - end_of_life_data               # from end_of_life engine
        - material_composition_data      # chemistry, critical materials, hazardous
        - manufacturer_data              # company name, address, registration
        - manufacturing_plant_data       # plant location, production line
      outputs:
        - battery_passport_document
        - annex_xiii_data_payload
        - qr_code_payload
        - unique_passport_id
        - data_completeness_score
        - gba_format_export
        - catena_x_format_export
        - provenance_hashes
      processing_time_estimate_minutes: 20
      memory_estimate_mb: 640
      required: true

    - id: performance_durability
      name: "Performance and Durability Engine"
      file: engines/performance_durability_engine.py
      class: PerformanceDurabilityEngine
      articles: [10]
      annexes: [IV]
      description: >-
        Implements Article 10 and Annex IV performance and durability
        parameter calculation and validation. For EV batteries: rated
        capacity (Ah), capacity fade (percentage loss at defined cycle
        count), voltage (nominal, minimum, maximum), original and
        remaining power capability (W), power fade (%), internal resistance
        (initial in milliohms), internal resistance increase (%), round-trip
        energy efficiency (%), expected cycle life (number of full cycles
        at 80% rated capacity retention), and expected calendar life (years).
        For LMT batteries: rated capacity, C-rate capability, and expected
        lifetime in cycles. For portable batteries: minimum average duration
        under specified test conditions. Calculates current State of Health
        (SoH) as percentage of original rated capacity and State of Charge
        (SoC) at reporting date. Validates test data against IEC 62660
        testing standards for lithium-ion batteries. Performs threshold
        validation against delegated act minimum performance requirements.
        Tracks performance degradation trends over time for batteries with
        multiple data points. Generates Annex IV compliant performance
        data sheet. Supports temperature range specification (operating
        and storage conditions).
        Zero-hallucination: all performance metric calculations use
        deterministic formulas from IEC 62660; SoH/SoC calculations are
        arithmetic ratios; no LLM in calculation path.
      inputs:
        - battery_profile
        - test_data_rated_capacity       # initial capacity test results
        - test_data_voltage              # voltage measurements
        - test_data_power                # power capability measurements
        - test_data_resistance           # internal resistance measurements
        - test_data_efficiency           # round-trip efficiency measurements
        - test_data_cycle_life           # accelerated cycle life data
        - test_data_calendar_life        # calendar aging data
        - temperature_range_data         # operating and storage temperatures
        - current_soh_data               # current state of health
        - current_soc_data               # current state of charge
      outputs:
        - performance_report
        - rated_capacity_ah
        - capacity_fade_pct
        - voltage_metrics
        - power_metrics
        - internal_resistance_metrics
        - efficiency_pct
        - cycle_life_estimate
        - calendar_life_estimate
        - soh_pct
        - soc_pct
        - temperature_range
        - annex_iv_data_sheet
        - threshold_validation_status
        - provenance_hashes
      processing_time_estimate_minutes: 20
      memory_estimate_mb: 640
      required: true

    - id: supply_chain_dd
      name: "Supply Chain Due Diligence Engine"
      file: engines/supply_chain_dd_engine.py
      class: SupplyChainDDEngine
      articles: [48]
      description: >-
        Implements Article 48 supply chain due diligence for critical raw
        materials in battery production: cobalt, lithium, nickel, and natural
        graphite. Aligns with the OECD Due Diligence Guidance for Responsible
        Supply Chains of Minerals from Conflict-Affected and High-Risk Areas
        (3rd edition, 2016). Evaluates compliance across the OECD five-step
        framework: (Step 1) company management systems - supply chain policy,
        internal management structure, supplier engagement, grievance
        mechanism; (Step 2) risk identification and assessment - mapping
        supply chain to mine/refiner level, country risk assessment (CAHRAs),
        commodity risk assessment, due diligence questionnaires; (Step 3)
        risk management strategy - risk mitigation plans, corrective action
        plans, measurable improvement targets, suspension/disengagement
        criteria; (Step 4) independent third-party audit - audit coverage,
        audit standard (RMI RMAP, IRMA, ASI), findings tracking, corrective
        actions; (Step 5) annual reporting - due diligence report publication,
        supply chain mapping disclosure, risk assessment disclosure, audit
        results summary. Generates per-material risk assessment with risk
        levels (very high, high, medium, low, negligible) based on country
        risk (CAHRA list, Governance indicators), commodity risk, and supplier
        compliance data. Tracks supplier due diligence questionnaire
        completion and audit status.
        Zero-hallucination: risk scoring uses deterministic weighted matrix
        with country risk indices from recognised sources (OECD, World Bank);
        compliance scoring uses checklist evaluation against OECD five steps.
      inputs:
        - battery_profile
        - supplier_registry               # tier 1 and tier 2+ suppliers
        - supplier_questionnaire_data      # due diligence questionnaires
        - mine_refiner_mapping             # supply chain mapping to origin
        - country_risk_data                # CAHRA list, governance indicators
        - commodity_risk_data              # cobalt, lithium, nickel, graphite
        - audit_reports                    # RMI RMAP, IRMA, ASI audit results
        - corrective_action_tracking       # audit findings remediation
        - supply_chain_policy              # company due diligence policy
        - grievance_mechanism_data         # supply chain grievance records
      outputs:
        - due_diligence_report
        - per_material_risk_assessment
        - oecd_step_compliance_scorecard
        - supplier_risk_heatmap
        - audit_coverage_summary
        - corrective_action_status
        - annual_reporting_package
        - provenance_hashes
      processing_time_estimate_minutes: 30
      memory_estimate_mb: 768
      required: true

    - id: labelling_compliance
      name: "Labelling Compliance Engine"
      file: engines/labelling_compliance_engine.py
      class: LabellingComplianceEngine
      articles: [13, 14]
      description: >-
        Implements Articles 13 and 14 labelling and marking requirements
        for all battery categories. Validates presence and compliance of
        required label elements: CE marking (per Art 17-22 conformity
        assessment), separate collection symbol (crossed-out wheeled bin
        per Annex VI), QR code linking to battery passport (for passport-
        required categories per Art 77), capacity label (rated capacity
        in Ah and energy in Wh), hazardous substance markings (mercury
        >0.0005%, cadmium >0.002%, lead >0.004% by weight, with Cd, Pb,
        Hg chemical symbols and concentration values), battery chemistry
        marking (chemical composition identification), carbon footprint
        label (for EV and industrial batteries per Art 7), and battery
        category identification. Validates label visibility, legibility,
        and indelibility requirements. Checks QR code compliance with
        ISO/IEC 18004 standard. Validates that label information matches
        battery passport data (consistency check). Generates per-element
        compliance status (compliant, non-compliant, not applicable) with
        specific non-compliance descriptions and corrective action
        recommendations. Supports multi-language label requirements for
        cross-border EU market placement.
        Zero-hallucination: labelling compliance checks use deterministic
        rule matching against Articles 13-14 requirements; threshold
        checks for hazardous substances are arithmetic comparisons.
      inputs:
        - battery_profile
        - label_inventory                  # current labels on battery/packaging
        - hazardous_substance_data         # mercury, cadmium, lead content
        - qr_code_data                     # existing QR code content
        - passport_data                    # battery passport data for consistency
        - conformity_assessment_status     # CE marking eligibility
        - target_markets                   # EU member states, language requirements
      outputs:
        - labelling_compliance_report
        - per_element_compliance_status
        - ce_marking_eligibility
        - qr_code_compliance
        - hazardous_substance_labelling
        - corrective_action_list
        - label_template_recommendations
        - provenance_hashes
      processing_time_estimate_minutes: 10
      memory_estimate_mb: 384
      required: true

    - id: end_of_life
      name: "End-of-Life Engine"
      file: engines/end_of_life_engine.py
      class: EndOfLifeEngine
      articles: [56, 57, 58, 59, 60, 61, 62, 63, 64, 65, 66, 67, 68, 69, 70, 71]
      description: >-
        Implements Articles 56-71 end-of-life management requirements
        including collection, treatment, recycling, and material recovery.
        Calculates collection rates against regulatory targets: portable
        batteries 63% by Dec 2027 and 73% by Dec 2030; LMT batteries 51%
        by Dec 2028 and 61% by Dec 2031. Calculates recycling efficiency
        against targets: 65% for lithium-based, 70% for lead-acid, 80%
        for nickel-cadmium by Dec 2025. Calculates material recovery rates
        against targets: lithium 50% by Dec 2027 and 80% by Dec 2031;
        cobalt, copper, lead, nickel 90% by Dec 2027 and 95% by Dec 2031.
        Tracks extended producer responsibility (EPR) scheme registration
        across EU member states. Monitors collection point availability
        and take-back programme effectiveness. Evaluates second-life
        potential for EV and industrial batteries (repurposing assessment).
        Generates dismantling and disassembly information for recyclers.
        Tracks waste battery shipment compliance (Basel Convention).
        Calculates end-of-life carbon credits for carbon footprint
        lifecycle assessment (closed-loop recycling credit methodology).
        Zero-hallucination: collection rates, recycling efficiency, and
        material recovery rates are arithmetic calculations; target
        comparison uses threshold checks; no LLM in calculation path.
      inputs:
        - battery_profile
        - collection_data                  # volumes collected by category/geography
        - batteries_placed_on_market       # denominator for collection rate
        - recycling_process_data           # process type, efficiency, throughput
        - material_recovery_data           # recovered mass per material
        - epr_registration_data            # registration status per member state
        - collection_point_data            # collection infrastructure
        - second_life_assessment           # repurposing potential
        - dismantling_information          # disassembly instructions
        - waste_shipment_records           # transboundary movement
      outputs:
        - end_of_life_report
        - collection_rate_by_category
        - recycling_efficiency_by_chemistry
        - material_recovery_rates
        - target_compliance_status
        - epr_registration_status
        - second_life_potential_score
        - dismantling_data_sheet
        - end_of_life_carbon_credit
        - provenance_hashes
      processing_time_estimate_minutes: 20
      memory_estimate_mb: 640
      required: true

    - id: conformity_assessment
      name: "Conformity Assessment Engine"
      file: engines/conformity_assessment_engine.py
      class: ConformityAssessmentEngine
      articles: [17, 18, 19, 20, 21, 22]
      description: >-
        Implements Articles 17-22 conformity assessment preparation for
        batteries placed on the EU market. Determines the applicable
        conformity assessment module(s) based on battery category and
        regulatory requirements: Module A (internal production control -
        manufacturer self-assessment), Module B (EU-type examination by
        notified body), Module C (conformity to type based on internal
        production control), Module D (quality assurance of production
        process verified by notified body), Module E (product quality
        assurance verified by notified body), Module G (unit verification
        by notified body), Module H (full quality assurance verified by
        notified body). Assesses readiness for each required module by
        evaluating technical documentation completeness (Art 17), EU
        declaration of conformity readiness (Art 18), CE marking
        compliance (Art 19), notified body engagement status (Art 20-21),
        and quality management system maturity (for Modules D, E, H).
        Generates a conformity assessment checklist per module with
        compliance status and gap identification. Validates that
        technical documentation covers all essential requirements:
        general battery description, design and manufacturing drawings,
        applied harmonised standards list, test reports, carbon footprint
        declaration, recycled content documentation, performance data,
        and supply chain due diligence report. Tracks notified body
        certificate validity and renewal dates.
        Zero-hallucination: conformity assessment readiness scoring uses
        deterministic checklist evaluation against Articles 17-22
        requirements per module; no LLM in scoring path.
      inputs:
        - battery_profile
        - technical_documentation          # design, manufacturing, test reports
        - quality_management_system        # QMS documentation, ISO 9001 status
        - harmonised_standards_applied     # EN standards used
        - test_reports                     # performance, safety, environmental
        - carbon_footprint_declaration     # from carbon_footprint engine
        - recycled_content_documentation   # from recycled_content engine
        - due_diligence_report             # from supply_chain_dd engine
        - notified_body_engagement         # NB selection, contract, certificates
        - eu_declaration_of_conformity     # existing DoC if any
        - ce_marking_status                # current CE marking
      outputs:
        - conformity_assessment_report
        - applicable_modules
        - module_readiness_scorecard
        - technical_documentation_gaps
        - declaration_of_conformity_draft
        - ce_marking_eligibility
        - notified_body_requirements
        - quality_system_assessment
        - provenance_hashes
      processing_time_estimate_minutes: 20
      memory_estimate_mb: 512
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences (8 battery workflows)
  # ===========================================================================
  workflows:
    - id: carbon_footprint_assessment
      name: "Carbon Footprint Assessment Workflow"
      file: workflows/carbon_footprint_workflow.py
      class: CarbonFootprintWorkflow
      description: >-
        4-phase workflow for battery carbon footprint assessment per Art 7.
        Phase 1 (Data Collection): Gather bill of materials, manufacturing
        energy consumption, transport logistics, end-of-life recycling
        scenario, and emission factor selections from recognised databases.
        Phase 2 (LCA Calculation): Execute lifecycle assessment across all
        stages (raw material extraction, manufacturing, distribution,
        end-of-life) using PEFCR methodology with chemistry-specific
        emission factors. Phase 3 (Performance Class): Assign carbon
        footprint performance class (A through E) based on market
        percentile distribution data. Phase 4 (Declaration Generation):
        Generate the EU carbon footprint declaration document with
        lifecycle stage breakdown, methodology reference, and provenance
        hashes. Routes MRV agent data for upstream Scope 3 emissions.
      phases:
        - data_collection
        - lca_calculation
        - performance_class_assignment
        - declaration_generation
      schedule: "annual"
      estimated_duration_minutes: 60
      required: true

    - id: recycled_content_tracking
      name: "Recycled Content Tracking Workflow"
      file: workflows/recycled_content_workflow.py
      class: RecycledContentWorkflow
      description: >-
        4-phase workflow for recycled content tracking per Art 8.
        Phase 1 (Material Inventory): Catalogue all active battery
        materials with supplier information, material origin
        (virgin vs recycled), and quantities per material (cobalt,
        lithium, nickel, lead). Phase 2 (Content Calculation): Calculate
        recycled content percentage per material using mass balance
        approach, accounting for recycling process recovery rates.
        Phase 3 (Target Comparison): Compare calculated recycled
        content against applicable targets (2028 documentation,
        2031 minimum, 2036 increased) and flag non-compliance.
        Phase 4 (Documentation): Generate recycled content
        documentation package including mass balance records,
        recycled material certificates, and regulatory submission
        forms. Integrates supplier questionnaire data via AGENT-DATA-008.
      phases:
        - material_inventory
        - content_calculation
        - target_comparison
        - documentation_generation
      schedule: "semi-annual"
      estimated_duration_minutes: 40
      required: true

    - id: passport_compilation
      name: "Passport Compilation Workflow"
      file: workflows/passport_compilation_workflow.py
      class: PassportCompilationWorkflow
      description: >-
        5-phase workflow for battery passport compilation per Art 77-78.
        Phase 1 (Data Gathering): Collect all Annex XIII data fields
        from upstream engines (carbon footprint, recycled content,
        performance durability, supply chain due diligence, end of life)
        and manufacturer master data. Phase 2 (Validation): Validate
        data completeness against Annex XIII checklist, verify
        cross-field consistency, and check data freshness. Phase 3
        (Passport Assembly): Assemble all validated data fields into
        the battery passport document structure with unique passport
        identifier assignment. Phase 4 (QR Generation): Generate QR
        code payload per ISO/IEC 18004 containing passport access URL
        and essential data. Phase 5 (Registry Submission): Prepare
        data package for submission to the battery passport registry,
        generate GBA and Catena-X compatible export formats.
      phases:
        - data_gathering
        - data_validation
        - passport_assembly
        - qr_code_generation
        - registry_submission
      schedule: "per-battery-model"
      estimated_duration_minutes: 45
      required: true

    - id: performance_testing
      name: "Performance Testing Workflow"
      file: workflows/performance_testing_workflow.py
      class: PerformanceTestingWorkflow
      description: >-
        4-phase workflow for battery performance and durability assessment
        per Art 10 and Annex IV. Phase 1 (Test Data Collection): Ingest
        battery test data from laboratory information management systems
        (LIMS), test benches, and manufacturer test reports covering
        capacity, voltage, power, resistance, efficiency, and lifecycle
        tests per IEC 62660. Phase 2 (Metric Calculation): Calculate all
        Annex IV performance parameters including rated capacity, capacity
        fade, power capability, power fade, internal resistance increase,
        round-trip efficiency, cycle life projection, calendar life
        estimate, SoH, and SoC. Phase 3 (Threshold Validation): Validate
        calculated metrics against delegated act minimum performance
        requirements and flag non-compliance. Phase 4 (Report Generation):
        Generate Annex IV compliant performance data sheet and
        performance trend analysis report.
      phases:
        - test_data_collection
        - metric_calculation
        - threshold_validation
        - report_generation
      schedule: "per-battery-model"
      estimated_duration_minutes: 35
      required: true

    - id: due_diligence_assessment
      name: "Due Diligence Assessment Workflow"
      file: workflows/due_diligence_workflow.py
      class: DueDiligenceAssessmentWorkflow
      description: >-
        4-phase workflow for supply chain due diligence per Art 48.
        Phase 1 (Supplier Mapping): Map the battery raw material supply
        chain from cell manufacturer through refiners to mine/smelter
        level for cobalt, lithium, nickel, and natural graphite. Identify
        country of origin, processing facilities, and intermediaries.
        Phase 2 (Risk Assessment): Assess risks per OECD five-step
        framework using country risk data (CAHRA lists, governance
        indicators), commodity risk profiles, supplier due diligence
        questionnaire responses, and incident/allegation screening.
        Phase 3 (Mitigation Planning): Develop risk mitigation action
        plans for identified risks with timelines, responsible parties,
        and measurable improvement targets. Phase 4 (Audit Verification):
        Track third-party audit coverage (RMI RMAP, IRMA, ASI), manage
        audit findings, and monitor corrective action implementation.
        Generate annual due diligence report per OECD Step 5.
      phases:
        - supplier_mapping
        - risk_assessment
        - mitigation_planning
        - audit_verification
      schedule: "annual"
      estimated_duration_minutes: 90
      required: true

    - id: labelling_verification
      name: "Labelling Verification Workflow"
      file: workflows/labelling_verification_workflow.py
      class: LabellingVerificationWorkflow
      description: >-
        4-phase workflow for labelling compliance per Art 13-14.
        Phase 1 (Requirement Mapping): Determine all applicable label
        elements for the battery category (CE marking, collection symbol,
        QR code, capacity, hazardous substances, chemistry, carbon
        footprint). Phase 2 (Label Review): Audit current battery and
        packaging labels against requirements, documenting presence,
        visibility, legibility, and indelibility of each element.
        Phase 3 (Compliance Check): Evaluate each label element against
        regulatory requirements and flag non-compliant items with
        specific deficiency descriptions. Phase 4 (Corrective Actions):
        Generate corrective action plan for non-compliant labels with
        label design recommendations, printing specifications, and
        placement guidelines.
      phases:
        - requirement_mapping
        - label_review
        - compliance_check
        - corrective_actions
      schedule: "per-product-launch"
      estimated_duration_minutes: 20
      required: true

    - id: end_of_life_planning
      name: "End-of-Life Planning Workflow"
      file: workflows/end_of_life_workflow.py
      class: EndOfLifePlanningWorkflow
      description: >-
        4-phase workflow for end-of-life management per Art 56-71.
        Phase 1 (Collection Assessment): Evaluate current collection
        infrastructure, collection rates by battery category and
        geography, and EPR scheme registration status across EU
        member states. Phase 2 (Recycling Targets): Calculate current
        recycling efficiency and compare against targets (65%
        lithium-based, 70% lead-acid, 80% nickel-cadmium). Phase 3
        (Recovery Calculation): Calculate material recovery rates for
        lithium, cobalt, copper, lead, and nickel against targets
        (lithium 50%/80%, others 90%/95%). Phase 4 (Compliance
        Reporting): Generate end-of-life compliance report including
        collection rate trends, recycling efficiency metrics, material
        recovery tracking, second-life assessment, and EPR scheme
        status across all markets.
      phases:
        - collection_assessment
        - recycling_target_evaluation
        - recovery_calculation
        - compliance_reporting
      schedule: "annual"
      estimated_duration_minutes: 40
      required: true

    - id: regulatory_submission
      name: "Regulatory Submission Workflow"
      file: workflows/regulatory_submission_workflow.py
      class: RegulatorySubmissionWorkflow
      description: >-
        4-phase workflow for conformity assessment and regulatory
        submission per Art 17-22. Phase 1 (Documentation Assembly):
        Compile complete technical documentation package including
        battery description, design drawings, applied standards,
        test reports, carbon footprint declaration, recycled content
        documentation, performance data, and due diligence report.
        Phase 2 (Conformity Check): Evaluate technical documentation
        against applicable conformity assessment module requirements
        (A through H), identify gaps, and validate completeness.
        Phase 3 (Submission Package): Generate the EU declaration
        of conformity, prepare notified body submission package
        (for modules requiring third-party involvement), and verify
        CE marking eligibility. Phase 4 (Registry Upload): Prepare
        battery passport registry submission, generate conformity
        assessment certificates, and activate battery passport in
        the electronic exchange system.
      phases:
        - documentation_assembly
        - conformity_check
        - submission_package
        - registry_upload
      schedule: "per-product-launch"
      estimated_duration_minutes: 60
      required: true

  # ===========================================================================
  # Templates - Pre-built report and output templates (8 battery templates)
  # ===========================================================================
  templates:
    - id: carbon_footprint_declaration
      display_name: "Carbon Footprint Declaration Template"
      file: templates/carbon_footprint_declaration.py
      class: CarbonFootprintDeclarationTemplate
      description: >-
        Article 7 carbon footprint declaration document with complete
        lifecycle breakdown (raw material extraction, manufacturing,
        distribution, end-of-life), total CO2e (kg), per-kWh CO2e,
        carbon footprint performance class (A-E), methodology reference,
        emission factor sources, and system boundary description. Includes
        lifecycle stage contribution chart, comparison against market
        distribution and maximum threshold, and hotspot analysis
        identifying primary carbon footprint contributors. Formatted
        for regulatory submission and battery passport data population.
      format: "pdf"
      template_file: "templates/carbon_footprint_declaration.jinja2"
      sections:
        - executive_summary
        - methodology_and_scope
        - lifecycle_stage_breakdown
        - performance_class_assignment
        - threshold_compliance
        - hotspot_analysis
        - data_quality_assessment
        - provenance_trail
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: recycled_content_report
      display_name: "Recycled Content Report Template"
      file: templates/recycled_content_report.py
      class: RecycledContentReportTemplate
      description: >-
        Article 8 recycled content documentation report showing per-material
        recycled content percentages (cobalt, lithium, nickel, lead),
        mass balance calculations, target compliance status against
        applicable thresholds (2028, 2031, 2036), and material sourcing
        chain documentation. Includes trend charts showing recycled
        content improvement over time, gap-to-target analysis, and
        supply chain actions required to meet future targets.
      format: "pdf"
      template_file: "templates/recycled_content_report.jinja2"
      sections:
        - executive_summary
        - per_material_recycled_content
        - mass_balance_methodology
        - target_compliance_status
        - trend_analysis
        - gap_to_target_analysis
        - supply_chain_actions
        - provenance_trail
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: battery_passport_report
      display_name: "Battery Passport Report Template"
      file: templates/battery_passport_report.py
      class: BatteryPassportReportTemplate
      description: >-
        Complete battery passport data compilation per Annex XIII covering
        all six data categories: (A) general battery information, (B) carbon
        footprint, (C) supply chain due diligence, (D) material composition,
        (E) performance and durability, and (F) end-of-life information.
        Includes data completeness scorecard, QR code representation,
        unique passport identifier, and data export formats (GBA, Catena-X).
        Formatted for regulatory registry submission and public access
        via electronic exchange system.
      format: "pdf"
      template_file: "templates/battery_passport_report.jinja2"
      sections:
        - general_battery_information       # Annex XIII Section A
        - carbon_footprint_information      # Annex XIII Section B
        - supply_chain_due_diligence        # Annex XIII Section C
        - material_composition              # Annex XIII Section D
        - performance_and_durability        # Annex XIII Section E
        - end_of_life_information           # Annex XIII Section F
        - data_completeness_scorecard
        - qr_code_and_data_carrier
      formats: [PDF, HTML, JSON, GBA, CATENA_X]
      enabled: true

    - id: performance_report
      display_name: "Performance Report Template"
      file: templates/performance_report.py
      class: PerformanceReportTemplate
      description: >-
        Battery performance and durability data report per Annex IV
        covering all required parameters by battery category. EV batteries:
        rated capacity, capacity fade, voltage range, power capability,
        power fade, internal resistance, resistance increase, round-trip
        efficiency, cycle life, calendar life. LMT batteries: capacity,
        C-rate, expected lifetime. All batteries: State of Health (SoH),
        State of Charge (SoC), temperature range. Includes performance
        trend charts, degradation projections, threshold compliance
        status, and test methodology references.
      format: "pdf"
      template_file: "templates/performance_report.jinja2"
      sections:
        - executive_summary
        - capacity_and_voltage
        - power_and_resistance
        - efficiency_and_lifecycle
        - state_of_health_and_charge
        - temperature_specifications
        - threshold_compliance
        - degradation_trends
        - test_methodology
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: due_diligence_report
      display_name: "Due Diligence Report Template"
      file: templates/due_diligence_report.py
      class: DueDiligenceReportTemplate
      description: >-
        Article 48 supply chain due diligence report per OECD Mineral
        Supply Chain Guidance five-step framework. Covers company
        management systems, supply chain risk identification and
        assessment (per material: cobalt, lithium, nickel, natural
        graphite), risk management strategy, third-party audit
        coverage and findings, and annual reporting. Includes supplier
        risk heatmap by geography and material, OECD step compliance
        scorecard, corrective action status tracking, and continuous
        improvement plan.
      format: "pdf"
      template_file: "templates/due_diligence_report.jinja2"
      sections:
        - executive_summary
        - company_management_systems       # OECD Step 1
        - risk_identification_assessment   # OECD Step 2
        - risk_management_strategy         # OECD Step 3
        - third_party_audit                # OECD Step 4
        - annual_reporting                 # OECD Step 5
        - supplier_risk_heatmap
        - corrective_action_tracking
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: labelling_compliance_report
      display_name: "Labelling Compliance Report Template"
      file: templates/labelling_compliance_report.py
      class: LabellingComplianceReportTemplate
      description: >-
        Articles 13-14 labelling requirement compliance report showing
        per-element compliance status for all required labels and markings:
        CE marking, collection symbol, QR code, capacity label, hazardous
        substance markings, chemistry marking, carbon footprint label.
        Includes visual label layout examples, non-compliance descriptions,
        corrective action recommendations with design specifications, and
        multi-market label requirements for cross-border placement.
      format: "pdf"
      template_file: "templates/labelling_compliance_report.jinja2"
      sections:
        - executive_summary
        - label_element_inventory
        - per_element_compliance_status
        - non_compliance_findings
        - corrective_actions
        - label_design_recommendations
        - multi_market_requirements
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: end_of_life_report
      display_name: "End-of-Life Report Template"
      file: templates/end_of_life_report.py
      class: EndOfLifeReportTemplate
      description: >-
        Articles 56-71 end-of-life management report covering collection
        rates by battery category, recycling efficiency by chemistry,
        material recovery rates per material, EPR scheme registration
        status, second-life potential assessment, and dismantling
        information. Includes target compliance tracking with trend
        charts, gap-to-target analysis, collection infrastructure
        coverage map, and cost-per-tonne recovery economics.
      format: "pdf"
      template_file: "templates/end_of_life_report.jinja2"
      sections:
        - executive_summary
        - collection_rates
        - recycling_efficiency
        - material_recovery_rates
        - epr_scheme_status
        - second_life_assessment
        - dismantling_information
        - target_compliance_trends
      formats: [PDF, HTML, JSON]
      enabled: true

    - id: battery_regulation_scorecard
      display_name: "Battery Regulation Scorecard Template"
      file: templates/battery_regulation_scorecard.py
      class: BatteryRegulationScorecardTemplate
      description: >-
        Executive dashboard providing an article-by-article compliance
        status overview across the entire EU Battery Regulation. Traffic
        light indicators for each major article area: Art 7 carbon
        footprint, Art 8 recycled content, Art 10 performance, Art 13-14
        labelling, Art 17-22 conformity assessment, Art 48 due diligence,
        Art 56-71 end-of-life, Art 77-78 battery passport. Includes
        overall compliance score, readiness timeline against regulatory
        milestones, gap analysis summary, and priority action items.
        Trend comparison across assessment periods.
      format: "html"
