  regulation:
    primary:
      name: "EU Battery Regulation"
      reference: "Regulation (EU) 2023/1542"
      adopted_date: "2023-07-12"
      published_date: "2023-07-28"
      entry_into_force: "2023-08-17"
      description: >-
        Regulation (EU) 2023/1542 concerning batteries and waste batteries,
        amending Directive 2008/98/EC and Regulation (EU) 2019/1020 and
        repealing Directive 2006/66/EC. Establishes requirements for the
        sustainability, performance, safety, collection, recycling and second
        life of batteries, as well as sustainability information for end-users
        and economic operators. Introduces the battery passport (Digital
        Product Passport) for EV, industrial >2kWh, and LMT batteries,
        carbon footprint declaration requirements for EV and industrial
        batteries, recycled content targets for cobalt, lithium, nickel,
        and lead, supply chain due diligence for critical raw materials,
        and end-of-life collection and recycling targets. Applies to all
        batteries placed on the EU market regardless of origin.
    secondary:
      - name: "Ecodesign for Sustainable Products Regulation"
        reference: "(EU) 2024/1781"
        effective_date: "2024-07-18"
      - name: "PEFCR for Rechargeable Batteries"
        reference: "EU PEF Pilot - Batteries Category"
        effective_date: "2018-04-25"
      - name: "OECD Due Diligence Guidance for Responsible Supply Chains of Minerals"
        reference: "OECD (2016, 3rd edition)"
        effective_date: "2016-04-05"
      - name: "Corporate Sustainability Reporting Directive"
        reference: "(EU) 2022/2464"
        effective_date: "2024-01-01"
      - name: "Corporate Sustainability Due Diligence Directive"
        reference: "(EU) 2024/1760"
        effective_date: "2027-07-26"
      - name: "EU Taxonomy Regulation"
        reference: "(EU) 2020/852"
        effective_date: "2020-07-12"
      - name: "EU Deforestation Regulation"
        reference: "(EU) 2023/1115"
        effective_date: "2024-12-30"
      - name: "REACH Regulation"
        reference: "(EC) 1907/2006"
        effective_date: "2007-06-01"
      - name: "GBA Battery Passport Framework"
        reference: "Global Battery Alliance (2023)"
        effective_date: "2023-01-01"
      - name: "Catena-X Battery Pass Standard"
        reference: "Catena-X / Battery Pass Consortium"
        effective_date: "2023-06-01"

  compliance_references:
    - id: "BATT_ART7"
      name: "Article 7 - Carbon Footprint of Batteries"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-02-18"
      description: >-
        Requires EV and industrial batteries >2kWh to carry a carbon footprint
        declaration calculated per the lifecycle methodology in Annex II.
        Phase 1 (18 Feb 2025): carbon footprint declaration mandatory. Phase 2
        (18 Aug 2026): carbon footprint performance class labels (A-E). Phase 3
        (18 Feb 2028): maximum carbon footprint threshold. The carbon footprint
        shall cover the entire lifecycle: raw material extraction and
        pre-processing, manufacturing, distribution, and end-of-life (recycling).
        Use phase is excluded. The declaration must reference the calculation
        methodology and express results in kg CO2e per kWh of battery capacity.

    - id: "BATT_ART8"
      name: "Article 8 - Recycled Content"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2028-08-18"
      description: >-
        Requires documentation and eventual minimum recycled content levels
        for cobalt, lithium, nickel, and lead in industrial, EV, LMT, and SLI
        batteries. Phase 1 (18 Aug 2028): documentation of recycled content
        percentage per material. Phase 2 (18 Aug 2031): minimum recycled
        content targets (cobalt 16%, lithium 6%, nickel 6%, lead 85%). Phase 3
        (18 Aug 2036): increased targets (cobalt 26%, lithium 12%, nickel 15%,
        lead 85%). Recycled content is calculated using mass balance approach
        for the total mass of each material in the active battery material.

    - id: "BATT_ART77_78"
      name: "Articles 77-78 - Battery Passport"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2027-02-18"
      description: >-
        Requires EV, industrial >2kWh, and LMT batteries to carry a battery
        passport accessible via a data carrier (QR code) affixed to the
        battery. The battery passport must contain the data specified in
        Annex XIII covering: general battery information, carbon footprint,
        supply chain due diligence, material composition, performance and
        durability, and end-of-life information. The data carrier must be
        scannable and provide access to the passport data through an
        electronic exchange system. The passport must be interoperable with
        the ESPR Digital Product Passport framework. Each battery model must
        have a unique passport identifier. Battery passports must be kept
        accessible for at least 10 years after the battery is placed on
        the market.

    - id: "BATT_ART10"
      name: "Article 10 - Performance and Durability"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-08-18"
      description: >-
        Requires batteries to be accompanied by performance and durability
        information as specified in Annex IV. For EV batteries: rated capacity,
        capacity fade, power, power fade, internal resistance, internal
        resistance increase, energy round-trip efficiency, cycle life, and
        calendar life. For portable batteries: minimum average duration when
        used in specific applications. For LMT batteries: rated capacity,
        expected battery lifetime in cycles, and C-rate capability. All
        performance parameters must be measured using harmonised testing
        methods (delegated acts).

    - id: "BATT_ART48"
      name: "Article 48 - Supply Chain Due Diligence"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-08-18"
      description: >-
        Requires economic operators placing batteries on the EU market to
        establish and implement supply chain due diligence policies for
        raw materials (cobalt, lithium, nickel, natural graphite). The due
        diligence must be aligned with the OECD Due Diligence Guidance for
        Responsible Supply Chains of Minerals from Conflict-Affected and
        High-Risk Areas (3rd edition, 2016). Requirements include: adopting
        and communicating a supply chain policy, establishing a management
        structure, identifying and assessing risks, designing and
        implementing a risk management strategy, carrying out independent
        third-party audits, and annual reporting on due diligence. Covers
        risks related to human rights, environmental degradation, conflict
        financing, and corruption in mineral supply chains.

    - id: "BATT_ART13_14"
      name: "Articles 13-14 - Labelling and Marking"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2024-08-18"
      description: >-
        Requires batteries to bear specific labels and markings before
        placement on the EU market. Required elements include: CE marking,
        separate collection symbol (crossed-out wheeled bin), QR code
        linking to battery passport (for passport-required categories),
        capacity label, hazardous substance labels (for mercury >0.0005%,
        cadmium >0.002%, lead >0.004%), battery chemistry marking, and
        carbon footprint label (for categories requiring Art 7 declaration).
        Labels must be visible, legible, and indelible. The QR code must
        comply with ISO/IEC 18004 and provide direct access to battery
        passport information.

    - id: "BATT_ART56_71"
      name: "Articles 56-71 - End-of-Life Management"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-08-18"
      description: >-
        Establishes requirements for battery waste management including
        collection, treatment, and recycling. Collection rate targets for
        portable batteries: 63% by 31 Dec 2027, 73% by 31 Dec 2030. LMT
        battery collection: 51% by 31 Dec 2028, 61% by 31 Dec 2031.
        Recycling efficiency: 65% lithium-based, 70% lead-acid, 80%
        nickel-cadmium by 31 Dec 2025. Material recovery: lithium 50% by
        31 Dec 2027, 80% by 31 Dec 2031; cobalt, copper, lead, nickel
        90% by 31 Dec 2027, 95% by 31 Dec 2031. Producers must register
        in each member state and finance collection, treatment, and
        recycling through extended producer responsibility schemes.

    - id: "BATT_ART17_22"
      name: "Articles 17-22 - Conformity Assessment"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2024-08-18"
      description: >-
        Establishes conformity assessment procedures for verifying that
        batteries meet regulation requirements before placement on the
        EU market. Conformity assessment modules include: Module A
        (internal production control), Module B (EU-type examination),
        Module C (conformity to type based on internal production control),
        Module D (conformity to type based on quality assurance of
        production process), Module E (conformity to type based on product
        quality assurance), Module G (conformity based on unit verification),
        and Module H (conformity based on full quality assurance). The
        manufacturer must draw up an EU declaration of conformity and
        affix the CE marking. Technical documentation must be kept for
        10 years. Notified bodies carry out conformity assessment for
        modules requiring third-party involvement.

    - id: "BATT_ANNEX_II"
      name: "Annex II - Carbon Footprint Calculation Methodology"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-02-18"
      description: >-
        Specifies the methodology for calculating the carbon footprint of
        batteries across the lifecycle. Lifecycle stages: raw material
        extraction and pre-processing, manufacturing (cell and pack),
        distribution, and end-of-life (collection, dismantling, recycling).
        Use phase is excluded. Functional unit: 1 kWh of total energy
        provided over the battery service life. System boundary includes
        upstream supply chain emissions. Data requirements: primary data
        for manufacturing, secondary data permitted for upstream and
        end-of-life where primary data unavailable. Emission factors must
        be sourced from recognised databases. Results expressed in kg
        CO2e per kWh.

    - id: "BATT_ANNEX_IV"
      name: "Annex IV - Performance and Durability Parameters"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2025-08-18"
      description: >-
        Specifies the performance and durability parameters for different
        battery categories. EV batteries: rated capacity (Ah), capacity
        fade (% loss over cycles), voltage (nominal, min, max), power
        capability (W), power fade (%), internal resistance (initial and
        increase), round-trip energy efficiency (%), cycle life (number
        of full charge-discharge cycles at 80% rated capacity), calendar
        life expectancy (years). LMT batteries: rated capacity, C-rate,
        expected lifetime in cycles. All portable batteries: minimum
        average duration under specified test conditions. Temperature
        operating range and storage conditions for all categories.

    - id: "BATT_ANNEX_XIII"
      name: "Annex XIII - Battery Passport Data Requirements"
      regulation: "Regulation (EU) 2023/1542"
      effective_date: "2027-02-18"
      description: >-
        Specifies the data elements for the battery passport (Digital
        Product Passport). Categories: (A) General battery information -
        manufacturer ID, plant location, model, batch/serial number,
        placement date, weight, dimensions, category, chemistry; (B)
        Carbon footprint - total CO2e, per-kWh value, performance class,
        lifecycle stage breakdown, methodology reference; (C) Supply
        chain due diligence - report reference, third-party verification,
        sourcing information for cobalt, lithium, nickel, natural graphite;
        (D) Material composition - battery chemistry details, critical raw
        materials, hazardous substances, recycled content percentages;
        (E) Performance and durability - all Annex IV parameters plus
        current State of Health (SoH) and State of Charge (SoC); (F)
        End-of-life - collection instructions, dismantling information,
        safety handling, waste prevention guidance.

    - id: "GBA"
      name: "GBA Battery Passport Framework"
      regulation: "Global Battery Alliance (2023)"
      effective_date: "2023-01-01"
      description: >-
        Industry-led framework for battery passports developed by the
        Global Battery Alliance. Defines data fields, governance rules,
        and interoperability requirements for battery passports. The GBA
        passport standard covers ESG performance scoring, material
        provenance, carbon footprint, recycled content, and circular
        economy indicators. PACK-020 aligns with GBA data fields to
        enable dual compliance with EU regulatory and industry standards.

    - id: "CATENA_X"
      name: "Catena-X / Battery Pass Standard"
      regulation: "Catena-X / Battery Pass Consortium"
      effective_date: "2023-06-01"
      description: >-
        Automotive industry data exchange standard for battery passports
        developed through the Battery Pass consortium within Catena-X.
        Defines standardised data models, APIs, and data sharing
        protocols for battery lifecycle data exchange between OEMs,
        cell manufacturers, recyclers, and regulatory authorities. PACK-020
        supports Catena-X compatible data export for integration into
        automotive supply chain ecosystems.

    - id: "OECD_MINERALS"
      name: "OECD Due Diligence Guidance for Mineral Supply Chains"
      regulation: "OECD (2016, 3rd edition)"
      effective_date: "2016-04-05"
      description: >-
        International standard for responsible mineral sourcing due
        diligence, referenced in Art 48 of the Battery Regulation.
        Five-step framework: (1) Establish strong company management
        systems; (2) Identify and assess risks in the supply chain;
        (3) Design and implement a strategy to respond to identified
        risks; (4) Carry out independent third-party audit of supply
        chain due diligence; (5) Report annually on supply chain due
        diligence. Covers risks related to conflict-affected and
        high-risk areas, human rights abuses, child labour, forced
        labour, and environmental degradation in mineral extraction.

