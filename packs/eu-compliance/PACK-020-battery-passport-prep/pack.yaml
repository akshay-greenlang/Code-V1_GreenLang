# =============================================================================
# Pack Configuration
# =============================================================================
pack_config:
  default_battery_category: "EV"
  default_chemistry: "NMC811"
  default_target_year: 2031
  carbon_footprint_functional_unit: "kWh"
  carbon_footprint_result_unit: "kg_CO2e_per_kWh"
  recycled_content_method: "mass_balance"
  passport_retention_years: 10
  technical_documentation_retention_years: 10
  qr_code_standard: "ISO/IEC 18004"
  data_carrier_format: "QR_CODE"
  passport_interoperability:
    - ESPR_DPP
    - GBA_BATTERY_PASSPORT
    - CATENA_X_BATTERY_PASS
  emission_factor_databases:
    - ecoinvent_3_10
    - GREET_2024
    - IEA_grid_factors_2024
  testing_standards:
    - IEC_62660
    - UN_38_3
    - IEC_61960
    - IEC_62619
  conformity_modules:
    - MODULE_A
    - MODULE_B
    - MODULE_C
    - MODULE_D
    - MODULE_E
    - MODULE_G
    - MODULE_H
  provenance_algorithm: "SHA-256"
  zero_hallucination: true
  lca_methodology: "PEFCR_batteries"

demo_config:
  enabled: true
  demo_battery:
    category: "EV"
    chemistry: "NMC811"
    manufacturer: "GreenLang Demo Battery Co."
    model: "GL-EV-100"
    capacity_ah: 100
    voltage_nominal: 400
    energy_kwh: 40
    weight_kg: 300
    production_date: "2026-01-15"
  demo_carbon_footprint:
    total_co2e_kg: 2400
    per_kwh_co2e: 60
    raw_material_pct: 45
    manufacturing_pct: 35
    distribution_pct: 10
    end_of_life_pct: 10
    performance_class: "B"
  demo_recycled_content:
    cobalt_pct: 18
    lithium_pct: 8
    nickel_pct: 7
    lead_pct: 0
  demo_performance:
    rated_capacity_ah: 100
    voltage_nominal: 400
    voltage_min: 300
    voltage_max: 450
    power_capability_w: 150000
    internal_resistance_mohm: 25
    efficiency_pct: 95
    cycle_life: 2000
    calendar_life_years: 15
    soh_pct: 100
    soc_pct: 80

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  carbon_footprint:
    max_batteries_assessed: 10000
    lca_calculation_per_battery_ms: 500
    performance_class_assignment_ms: 50
    target_duration_minutes: 30
  recycled_content:
    max_material_lots: 100000
    content_calculation_per_lot_ms: 10
    target_comparison_ms: 5
    target_duration_minutes: 15
  battery_passport:
    max_passports_generated: 50000
    passport_compilation_per_unit_ms: 200
    qr_code_generation_per_unit_ms: 25
    target_duration_minutes: 30
  performance_durability:
    max_test_records: 500000
    metric_calculation_per_record_ms: 15
    soh_calculation_ms: 10
    target_duration_minutes: 20
  supply_chain_dd:
    max_suppliers_assessed: 5000
    risk_scoring_per_supplier_ms: 100
    target_duration_minutes: 30
  labelling_compliance:
    max_products_audited: 10000
    label_check_per_product_ms: 20
    target_duration_minutes: 10
  end_of_life:
    max_collection_records: 100000
    recovery_calculation_per_batch_ms: 25
    target_duration_minutes: 15
  conformity_assessment:
    max_products_assessed: 5000
    module_check_per_product_ms: 50
    target_duration_minutes: 15
  cache_hit_ratio_target: 0.65
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with battery-level and passport-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL          # supply chain DD, proprietary BOM
    - RESTRICTED            # performance test data, carbon footprint details
    - INTERNAL              # labelling data, end-of-life metrics
    - PUBLIC                # battery passport public data fields
  required_roles:
    - battery_manager
    - passport_administrator
    - carbon_footprint_analyst
    - recycled_content_specialist
    - due_diligence_officer
    - quality_engineer
    - labelling_specialist
    - compliance_officer
    - external_auditor
    - admin
  passport_access_control:
    public_fields:
      - general_battery_information
      - carbon_footprint_performance_class
      - recycled_content_summary
      - end_of_life_instructions
    restricted_fields:
      - detailed_carbon_footprint_breakdown
      - supply_chain_dd_report
      - material_composition_details
      - performance_test_raw_data

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  framework: pytest
  config_file: tests/conftest.py
  namespace: "pack020_test"
  test_structure:
    - file: tests/test_carbon_footprint_engine.py
      description: "Carbon footprint engine unit tests"
      estimated_tests: 50
    - file: tests/test_recycled_content_engine.py
      description: "Recycled content engine unit tests"
      estimated_tests: 50
    - file: tests/test_battery_passport_engine.py
      description: "Battery passport compilation engine unit tests"
      estimated_tests: 50
    - file: tests/test_performance_durability_engine.py
      description: "Performance and durability engine unit tests"
      estimated_tests: 50
    - file: tests/test_supply_chain_dd_engine.py
      description: "Supply chain due diligence engine unit tests"
      estimated_tests: 50
    - file: tests/test_labelling_compliance_engine.py
      description: "Labelling compliance engine unit tests"
      estimated_tests: 50
    - file: tests/test_end_of_life_engine.py
      description: "End-of-life engine unit tests"
      estimated_tests: 50
    - file: tests/test_conformity_assessment_engine.py
      description: "Conformity assessment engine unit tests"
      estimated_tests: 50
    - file: tests/test_templates.py
      description: "All 8 template unit tests"
      estimated_tests: 45
    - file: tests/test_workflows.py
      description: "All 8 workflow unit tests"
      estimated_tests: 40
    - file: tests/test_integrations.py
      description: "All 10 integration unit tests"
      estimated_tests: 35
    - file: tests/test_config.py
      description: "PackConfig and preset unit tests"
      estimated_tests: 30
    - file: tests/test_manifest.py
      description: "pack.yaml manifest validation tests"
      estimated_tests: 25
    - file: tests/test_demo.py
      description: "Demo configuration tests"
      estimated_tests: 15
    - file: tests/test_agent_integration.py
      description: "Agent bridge integration tests"
      estimated_tests: 30
    - file: tests/test_e2e.py
      description: "End-to-end pipeline tests"
      estimated_tests: 20
  targets:
    total_tests_min: 700
    pass_rate_pct: 100
    coverage_pct: 85
  load_testing_enabled: true
  max_load_test_throughput_passports_per_hour: 5000

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "qrcode>=7.4"
    - "pillow>=10.0"
    - "lxml>=4.9"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_mrv_agent_availability
    - verify_data_agent_availability

  database_migrations:
    inherited:
      - "V001-V006"       # Core tables
      - "V007-V008"       # Feature flags, agent factory
      - "V009-V010"       # Auth, RBAC
      - "V019-V020"       # Observability
      - "V021-V030"       # Foundation agents
      - "V031-V050"       # Data agents
      - "V051-V081"       # MRV agents
    new:
      - "V083-PACK020-001"  # Battery profile and category tables
      - "V083-PACK020-002"  # Carbon footprint declaration and LCA tables
      - "V083-PACK020-003"  # Recycled content tracking and mass balance tables
      - "V083-PACK020-004"  # Battery passport data and registry tables
      - "V083-PACK020-005"  # Performance and durability metric tables
      - "V083-PACK020-006"  # Supply chain due diligence and risk tables
      - "V083-PACK020-007"  # Labelling compliance and label element tables
      - "V083-PACK020-008"  # End-of-life collection and recovery tables
      - "V083-PACK020-009"  # Conformity assessment and module tables
      - "V083-PACK020-010"  # QR code payload and passport registry tables

  post_install:
    - seed_battery_categories
    - seed_battery_chemistries
    - seed_emission_factors_battery
    - seed_recycled_content_targets
    - seed_collection_rate_targets
    - seed_material_recovery_targets
    - seed_performance_thresholds
    - seed_label_element_requirements
    - seed_conformity_modules
    - seed_country_risk_data
    - seed_oecd_framework_checklist
    - seed_annex_xiii_data_fields
    - seed_default_presets
    - run_health_checks

