metadata:
  name: PACK-020-battery-passport-prep
  version: "1.0.0"
  display_name: "Battery Passport Prep Pack"
  description: >-
    Comprehensive battery passport readiness platform for EU Battery Regulation
    (EU) 2023/1542. Includes 8 engines for carbon footprint declaration,
    recycled content tracking, battery passport compilation, performance and
    durability validation, supply chain due diligence, labelling compliance,
    end-of-life management, and conformity assessment preparation. Covers all
    5 battery categories (EV, industrial, LMT, portable, SLI) with passport
    compilation for EV, industrial >2kWh, and LMT batteries per Articles 77-78
    and Annex XIII. Implements carbon footprint lifecycle assessment per Art 7
    and PEFCR methodology, recycled content target tracking per Art 8 (cobalt,
    lithium, nickel, lead), supply chain due diligence per Art 48 aligned with
    OECD Mineral Supply Chain Guidance, and full Annex IV performance metrics
    (SoH, SoC, capacity, voltage, cycle life, efficiency). Integrates with
    GBA Battery Passport standard, Catena-X / Battery Pass data exchange, and
    ESPR Digital Product Passport framework. Bundles 30 MRV agents for carbon
    footprint LCA, 14 data agents for BOM and test data intake, and 10
    foundation agents for orchestration and provenance. Pre-configured presets
    for EV battery, industrial storage, LMT, portable, SLI, and cell
    manufacturer sectors. Enforces zero-hallucination principle for all
    quantitative calculations with SHA-256 provenance hashing.
