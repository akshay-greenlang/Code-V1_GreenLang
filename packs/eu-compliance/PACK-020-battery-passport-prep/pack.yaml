      formats: [PDF, HTML, Excel]
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges (10 integrations)
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      file: integrations/pack_orchestrator.py
      class: BatteryPassportOrchestrator
      description: >-
        Master pipeline orchestrating all battery passport assessment
        phases. 10-phase execution: Health Check -> Configuration Loading
        -> Carbon Footprint Assessment -> Recycled Content Tracking ->
        Performance and Durability Validation -> Supply Chain Due
        Diligence -> Labelling Compliance Check -> End-of-Life Assessment
        -> Conformity Assessment Preparation -> Battery Passport
        Compilation. Manages engine dependencies (passport compilation
        depends on all other engines completing first), parallel execution
        where possible (carbon footprint and recycled content can run
        concurrently with performance testing), and error propagation
        with partial completion support. Tracks overall pipeline progress
        and generates execution summary with timing metrics.
      methods:
        - initialize_pack
        - load_configuration
        - orchestrate_execution
        - manage_engine_dependencies
        - aggregate_results
        - generate_scorecard
        - export_passport
      required: true

    - id: mrv_bridge
      name: "MRV Bridge"
      file: integrations/mrv_bridge.py
      class: MRVBridge
      description: >-
        Routes emission data from MRV agents into the carbon footprint
        engine for battery lifecycle assessment. Maps MRV Scope 1 agents
        (AGENT-MRV-001 stationary combustion, AGENT-MRV-003 mobile
        combustion, AGENT-MRV-004 process emissions) for manufacturing
        facility emissions. Maps MRV Scope 2 agents (AGENT-MRV-009
        location-based, AGENT-MRV-010 market-based) for manufacturing
        electricity consumption. Maps MRV Scope 3 Cat 1 (AGENT-MRV-014
        purchased goods) for raw material upstream emissions. Maps
        MRV Scope 3 Cat 4 (AGENT-MRV-017 upstream transportation) for
        distribution emissions. Maps MRV Scope 3 Cat 12 (AGENT-MRV-025
        end-of-life treatment) for recycling process emissions.
        Validates provenance hashes from MRV agents and propagates
        to carbon footprint declaration.
      methods:
        - query_scope1_manufacturing
        - query_scope2_electricity
        - query_scope3_upstream_materials
        - query_scope3_transportation
        - query_scope3_end_of_life
        - validate_mrv_provenance
        - map_to_lifecycle_stages
      required: true

    - id: csrd_pack_bridge
      name: "CSRD Pack Bridge"
      file: integrations/csrd_pack_bridge.py
      class: CSRDPackBridge
      description: >-
        Connects to PACK-001/002/003 CSRD Packs and PACK-017 ESRS Full
        Coverage Pack for consistency between corporate-level ESRS
        disclosures and battery regulation data. Maps ESRS E1 climate
        data (GHG emissions, energy consumption) to validate consistency
        with battery carbon footprint calculations. Maps ESRS E2
        pollution data (hazardous substances) for battery material
        composition alignment. Maps ESRS E5 circular economy data
        (recycled content, waste management) for recycled content and
        end-of-life consistency. Validates that battery-specific data
        is a subset of and consistent with corporate-level CSRD
        disclosures.
      methods:
        - query_esrs_e1_data
        - query_esrs_e2_data
        - query_esrs_e5_data
        - validate_csrd_consistency
        - map_to_battery_regulation
      required: false

    - id: supply_chain_bridge
      name: "Supply Chain Bridge"
      file: integrations/supply_chain_bridge.py
      class: SupplyChainBridge
      description: >-
        Links AGENT-DATA and AGENT-EUDR supply chain agents for mineral
        sourcing due diligence. Routes supplier questionnaire data from
        AGENT-DATA-008 (Supplier Questionnaire Processor) for due
        diligence risk assessment. Routes spend data from AGENT-DATA-009
        (Spend Data Categorizer) for material cost tracking and supplier
        identification. Connects to AGENT-EUDR agents for supply chain
        traceability (lot-level tracking from mine to battery). Supports
        supplier data enrichment with external risk intelligence sources.
      methods:
        - query_supplier_questionnaires
        - query_spend_data
        - query_eudr_traceability
        - enrich_supplier_risk_data
        - track_material_provenance
      required: true

    - id: eudr_bridge
      name: "EUDR Bridge"
      file: integrations/eudr_bridge.py
      class: EUDRBridge
      description: >-
        Connects to AGENT-EUDR agents for deforestation-free supply
        chain verification relevant to battery raw materials. While
        the EUDR primarily covers agricultural commodities, certain
        battery supply chains (particularly natural graphite and
        biomass-derived carbon materials) may intersect with
        deforestation risk areas. Routes EUDR due diligence
        methodology for geographical risk assessment overlay on
        battery mineral supply chains. Provides country-of-origin
        risk data for supply chain due diligence engine.
      methods:
        - query_deforestation_risk
        - query_country_risk_overlay
        - validate_geographical_risk
        - generate_risk_summary
      required: false

    - id: taxonomy_bridge
      name: "Taxonomy Bridge"
      file: integrations/taxonomy_bridge.py
      class: TaxonomyBridge
      description: >-
        Connects to GL-Taxonomy-APP for EU Taxonomy Do No Significant
        Harm (DNSH) criteria validation for battery manufacturing
        activities. Validates that battery manufacturing meets
        taxonomy technical screening criteria for climate change
        mitigation (battery storage for renewable energy integration)
        and circular economy (recycled content, design for
        recyclability). Maps taxonomy-eligible battery manufacturing
        activities to the corporate taxonomy KPI disclosures. Checks
        DNSH compliance across all six environmental objectives for
        battery-related economic activities.
      methods:
        - query_taxonomy_eligibility
        - validate_dnsh_criteria
        - map_battery_activities
        - generate_taxonomy_alignment
      required: false

    - id: csddd_bridge
      name: "CSDDD Bridge"
      file: integrations/csddd_bridge.py
      class: CSDDDBridge
      description: >-
        Connects to PACK-019 CSDDD Readiness Pack for linking battery
        supply chain due diligence (Art 48) with corporate-level
        CSDDD due diligence obligations (Directive (EU) 2024/1760).
        Maps OECD mineral supply chain due diligence steps to CSDDD
        due diligence framework. Validates that battery supply chain
        due diligence efforts are consistent with and contribute to
        broader corporate human rights and environmental due diligence
        obligations. Ensures battery supply chain risk assessments
        feed into the corporate adverse impact register.
      methods:
        - query_csddd_due_diligence
        - map_oecd_to_csddd_framework
        - validate_consistency
        - propagate_risk_assessments
      required: false

    - id: data_bridge
      name: "Data Bridge"
      file: integrations/data_bridge.py
      class: DataBridge
      description: >-
        Routes AGENT-DATA agents for battery-specific data intake.
        AGENT-DATA-001 (PDF Extractor) for test reports, certificates
        of analysis, and audit reports. AGENT-DATA-002 (Excel/CSV
        Normalizer) for bill of materials, test data files, and
        production records. AGENT-DATA-003 (ERP Connector) for
        manufacturing production data, inventory, and procurement.
        AGENT-DATA-008 (Supplier Questionnaire Processor) for due
        diligence questionnaire data. AGENT-DATA-009 (Spend Data
        Categorizer) for material spend categorisation. AGENT-DATA-010
        (Data Quality Profiler) for incoming data quality validation.
        AGENT-DATA-019 (Validation Rule Engine) for battery-specific
        validation rules. Ensures all data entering the battery
        compliance pipeline passes through quality profiling.
      methods:
        - orchestrate_data_collection
        - route_pdf_extraction
        - route_excel_normalization
        - route_erp_data
        - route_supplier_questionnaires
        - validate_data_quality
        - track_data_lineage
      required: true

    - id: health_check
      name: "Health Check"
      file: integrations/health_check.py
      class: BatteryPassportHealthCheck
      description: >-
        System verification across all engines, integrations, and
        dependencies. 14-category health check: 8 engine status
        checks (carbon footprint, recycled content, passport,
        performance, due diligence, labelling, end-of-life,
        conformity), database connectivity, MRV agent availability,
        data agent availability, emission factor database currency,
        passport registry connectivity, and deployment readiness.
        Reports overall system health with per-component status
        (healthy, degraded, unavailable) and recommended actions.
      methods:
        - check_engines
        - check_database
        - check_agents
        - check_emission_factors
        - check_passport_registry
        - check_data_quality
        - report_health_status
      required: false

    - id: setup_wizard
      name: "Setup Wizard"
      file: integrations/setup_wizard.py
      class: BatteryPassportSetupWizard
      description: >-
        7-step guided configuration wizard for battery passport
        deployment. Step 1 (Battery Category): Select battery
        categories in scope (EV, industrial, LMT, portable, SLI).
        Step 2 (Chemistry Selection): Configure battery chemistries
        (NMC, NCA, LFP, lead-acid, etc.) and chemistry-specific
        emission factors. Step 3 (Supply Chain Setup): Register
        tier 1 and tier 2 suppliers for due diligence. Step 4
        (Data Source Configuration): Connect ERP, LIMS, test
        bench systems, and document repositories. Step 5 (Target
        Configuration): Set applicable recycled content targets,
        collection rate targets, and material recovery targets
        based on timeline. Step 6 (Integration Testing): Test
        all bridges (MRV, CSRD, supply chain, data agents).
        Step 7 (Preset Selection): Select or customise sector
        preset and finalize configuration.
      methods:
        - select_battery_categories
        - configure_chemistries
        - register_supply_chain
        - configure_data_sources
        - set_compliance_targets
        - test_integrations
        - finalize_configuration
      required: false

  # ===========================================================================
  # Presets - Sector-specific configurations (6 presets)
  # ===========================================================================
  presets:
    - id: ev_battery
      name: "EV Battery Preset"
      description: >-
        Configuration for electric vehicle traction battery manufacturers
        and OEMs. Full regulatory scope: carbon footprint declaration
        (Art 7 all phases), recycled content (Art 8), battery passport
        (Art 77-78), performance and durability (Art 10 with full Annex IV
        EV parameters), supply chain due diligence (Art 48), labelling
        (Art 13-14 including carbon footprint label), end-of-life (Art 56-71
        with second-life assessment), and conformity assessment (Art 17-22).
        All 8 engines enabled. Highest data requirements. Chemistry focus:
        NMC, NCA, LFP, solid-state. Catena-X data exchange enabled.
      sector: "EV_BATTERY"
      battery_categories: [EV]
      passport_required: true
      carbon_footprint_required: true
      recycled_content_required: true
      enabled_engines:
        - carbon_footprint
        - recycled_content
        - battery_passport
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - end_of_life
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - mrv_bridge
        - csrd_pack_bridge
        - supply_chain_bridge
        - taxonomy_bridge
        - csddd_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/ev_battery.yaml"

    - id: industrial_storage
      name: "Industrial Storage Preset"
      description: >-
        Configuration for stationary energy storage, UPS, data centre
        backup, and grid-scale storage batteries >2kWh. Full passport
        and carbon footprint scope. Performance focus on cycle life,
        calendar life, and round-trip efficiency. Supply chain due
        diligence for all critical raw materials. Chemistry focus:
        LFP, NMC, lead-acid, sodium-ion. Extended calendar life
        testing (10-20 year projections).
      sector: "INDUSTRIAL_STORAGE"
      battery_categories: [INDUSTRIAL]
      passport_required: true
      carbon_footprint_required: true
      recycled_content_required: true
      enabled_engines:
        - carbon_footprint
        - recycled_content
        - battery_passport
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - end_of_life
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - mrv_bridge
        - supply_chain_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/industrial_storage.yaml"

    - id: lmt_battery
      name: "LMT Battery Preset"
      description: >-
        Configuration for light means of transport batteries: e-bikes,
        e-scooters, electric wheelchairs. Passport required but no carbon
        footprint declaration. Performance focus on rated capacity, C-rate,
        and expected lifetime in cycles. Recycled content tracking for
        2028+ targets. Supply chain due diligence for critical raw
        materials. Chemistry focus: NMC, LFP, NCA. Collection rate
        tracking (51% by Dec 2028, 61% by Dec 2031).
      sector: "LMT_BATTERY"
      battery_categories: [LMT]
      passport_required: true
      carbon_footprint_required: false
      recycled_content_required: true
      enabled_engines:
        - recycled_content
        - battery_passport
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - end_of_life
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - supply_chain_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/lmt_battery.yaml"

    - id: portable_battery
      name: "Portable Battery Preset"
      description: >-
        Configuration for portable batteries: consumer electronics,
        AA/AAA, button cells, power tool batteries. No passport or
        carbon footprint required. Focus on labelling compliance
        (collection symbol, capacity, hazardous substances), end-of-life
        collection rates (63% by Dec 2027, 73% by Dec 2030), supply
        chain due diligence, and performance (minimum average duration).
        Simplified engine set. Chemistry focus: alkaline, lithium-ion,
        NiMH, zinc-air.
      sector: "PORTABLE_BATTERY"
      battery_categories: [PORTABLE]
      passport_required: false
      carbon_footprint_required: false
      recycled_content_required: false
      enabled_engines:
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - end_of_life
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - supply_chain_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/portable_battery.yaml"

    - id: sli_battery
      name: "SLI Battery Preset"
      description: >-
        Configuration for starting, lighting, and ignition batteries:
        car starters, motorcycle batteries, truck starter batteries.
        No passport or carbon footprint required. Recycled content
        required (especially lead at 85% target). Focus on performance
        (cranking amps, reserve capacity), labelling (lead content
        marking critical), end-of-life (lead-acid recycling targets),
        and supply chain due diligence. Chemistry focus: lead-acid
        (flooded, AGM, gel). High recycled content baseline (lead-acid
        recycling is well-established at ~99% collection in EU).
      sector: "SLI_BATTERY"
      battery_categories: [SLI]
      passport_required: false
      carbon_footprint_required: false
      recycled_content_required: true
      enabled_engines:
        - recycled_content
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - end_of_life
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - supply_chain_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/sli_battery.yaml"

    - id: cell_manufacturer
      name: "Cell Manufacturer Preset"
      description: >-
        Configuration for battery cell production companies supplying
        cells to pack assemblers and OEMs. Focus on carbon footprint
        (manufacturing-stage emissions dominate), supply chain due
        diligence (direct material sourcing), and recycled content
        (input material tracking). Performance data provided per
        cell specification rather than pack level. Does not generate
        battery passport (pack assembler responsibility) but provides
        data inputs for downstream passport compilation. Chemistry
        coverage: NMC (all variants), NCA, LFP, LMO, LTO, solid-state.
        Manufacturing energy intensity tracking critical for carbon
        footprint. Gigafactory-scale batch processing supported.
      sector: "CELL_MANUFACTURER"
      battery_categories: [EV, INDUSTRIAL, LMT]
      passport_required: false
      carbon_footprint_required: true
      recycled_content_required: true
      enabled_engines:
        - carbon_footprint
        - recycled_content
        - performance_durability
        - supply_chain_dd
        - labelling_compliance
        - conformity_assessment
      enabled_integrations:
        - pack_orchestrator
        - mrv_bridge
        - supply_chain_bridge
        - data_bridge
        - health_check
        - setup_wizard
      file: "config/presets/cell_manufacturer.yaml"

