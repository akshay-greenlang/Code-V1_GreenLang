# =============================================================================
# PACK-020: Battery Passport Prep Pack
# GreenLang EU Compliance Pack for EU Battery Regulation (EU) 2023/1542
# =============================================================================
# This pack provides a comprehensive, production-ready battery passport
# readiness and compliance platform for the EU Battery Regulation, Regulation
# (EU) 2023/1542, which establishes sustainability, safety, labelling, and
# information requirements for batteries placed on the EU market, including
# the groundbreaking Digital Product Passport (Battery Passport) requirement.
#
# The EU Battery Regulation replaces the Batteries Directive 2006/66/EC and
# introduces a lifecycle approach to battery sustainability covering:
#   - Carbon footprint declaration and performance classification (Art 7)
#   - Recycled content documentation and minimum targets (Art 8)
#   - Battery passport / Digital Product Passport (Art 77-78, Annex XIII)
#   - Performance and durability information (Art 10, Annex IV)
#   - Supply chain due diligence for critical raw materials (Art 48)
#   - Labelling and marking requirements (Art 13-14)
#   - End-of-life management, collection, and recycling (Art 56-71)
#   - Conformity assessment and CE marking (Art 17-22)
#
# Battery Categories Covered:
#   - EV (Electric Vehicle) - traction batteries for BEV/PHEV
#   - Industrial - stationary storage >2kWh, UPS, data centre backup
#   - LMT (Light Means of Transport) - e-bike, e-scooter batteries
#   - Portable - consumer electronics, AA/AAA, button cells
#   - SLI (Starting, Lighting, Ignition) - automotive starter batteries
#
# Passport-Required Categories (from 18 February 2027):
#   - EV batteries
#   - Industrial batteries >2kWh
#   - LMT batteries
#
# Battery Passport Data Requirements (Annex XIII):
#   A. General Battery Information (manufacturer, model, batch/serial, weight)
#   B. Carbon Footprint Information (total CO2e, lifecycle breakdown, class)
#   C. Supply Chain Due Diligence (cobalt, lithium, nickel, natural graphite)
#   D. Material Composition (chemistry, critical raw materials, hazardous)
#   E. Performance & Durability (capacity, voltage, power, SoH, SoC, cycles)
#   F. End-of-Life Information (collection, recycling, dismantling, safety)
#
# Key Capabilities:
#   - Battery carbon footprint declaration per Art 7 and Annex II
#   - Carbon footprint performance class assignment (Class A to E)
#   - Carbon footprint maximum threshold compliance checking
#   - Recycled content calculation for cobalt, lithium, nickel, lead per Art 8
#   - Recycled content target tracking (2028 documentation, 2031/2036 minimums)
#   - Complete battery passport data compilation per Annex XIII
#   - QR code and data carrier generation per Art 77(3)
#   - Battery performance metric validation per Annex IV (SoH, SoC, capacity)
#   - Supply chain due diligence for critical raw materials per Art 48
#   - OECD Due Diligence Guidance alignment for mineral supply chains
#   - Labelling and marking validation (CE, QR, collection symbol, hazardous)
#   - End-of-life collection rate and recycling efficiency tracking
#   - Material recovery rate calculation per Art 71
#   - Conformity assessment preparation per Modules A-H
#   - GBA Battery Passport standard alignment
#   - Catena-X / Battery Pass data exchange interoperability
#   - ESPR Digital Product Passport framework integration
#   - SHA-256 provenance tracking for all quantitative data
#   - Zero-hallucination: all calculations use deterministic formulas
#   - Pre-configured presets for EV, industrial, LMT, portable, SLI, cell mfg
#   - Cross-regulation consistency (CSRD, CSDDD, EUDR, EU Taxonomy)
#
# Regulatory References:
#   - EU Battery Regulation: Regulation (EU) 2023/1542
#   - ESPR: Regulation (EU) 2024/1781 (Digital Product Passport framework)
#   - GBA Battery Passport: Global Battery Alliance passport standard
#   - Catena-X / Battery Pass: Automotive data exchange standards
#   - ISO 14040/14044: Life Cycle Assessment standards
#   - IEC 62660: Lithium-ion battery testing
#   - UN 38.3: Transport safety testing for lithium batteries
#   - OECD Due Diligence Guidance: Mineral supply chains (3rd ed., 2016)
#   - PEFCR for Rechargeable Batteries: Product Environmental Footprint
#   - EU Taxonomy Regulation: (EU) 2020/852 (DNSH for battery manufacturing)
#   - CSRD: Directive (EU) 2022/2464 (ESRS E1/E2/E5 disclosures)
#   - CSDDD: Directive (EU) 2024/1760 (supply chain due diligence)
#   - REACH: Regulation (EC) 1907/2006 (hazardous substances)
#   - RoHS: Directive 2011/65/EU (restricted substances in electronics)
#   - WEEE: Directive 2012/19/EU (waste electrical and electronic equipment)
#   - Basel Convention: Transboundary movement of hazardous wastes
#
# Version History:
#   1.0.0 - Initial release (2026-03-17)
# =============================================================================

