  battery_categories:
    - id: EV
      name: "Electric Vehicle Battery"
      definition: "Battery for traction in hybrid or electric vehicles"
      examples: ["BEV traction pack", "PHEV traction pack"]
      passport_required: true
      carbon_footprint_required: true
      recycled_content_required: true
      due_diligence_required: true
    - id: INDUSTRIAL
      name: "Industrial Battery"
      definition: "Battery >2kWh not EV/LMT/SLI/portable"
      examples: ["Stationary storage", "UPS", "Data centre backup", "Grid-scale storage"]
      passport_required: true
      carbon_footprint_required: true
      recycled_content_required: true
      due_diligence_required: true
    - id: LMT
      name: "Light Means of Transport Battery"
      definition: "Sealed battery <=25 kg for e-bikes/scooters"
      examples: ["E-bike battery", "E-scooter battery", "Electric wheelchair battery"]
      passport_required: true
      carbon_footprint_required: false
      recycled_content_required: true
      due_diligence_required: true
    - id: PORTABLE
      name: "Portable Battery"
      definition: "Sealed battery <=5 kg, not industrial/EV/SLI/LMT"
      examples: ["AA/AAA", "Laptop battery", "Phone battery", "Power tool battery"]
      passport_required: false
      carbon_footprint_required: false
      recycled_content_required: false
      due_diligence_required: true
    - id: SLI
      name: "Starting, Lighting and Ignition Battery"
      definition: "Battery for vehicle SLI functions"
      examples: ["Car starter battery", "Motorcycle battery", "Truck starter battery"]
      passport_required: false
      carbon_footprint_required: false
      recycled_content_required: true
      due_diligence_required: true

