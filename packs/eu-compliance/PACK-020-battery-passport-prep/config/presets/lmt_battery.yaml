# =============================================================================
# PACK-020 Battery Passport Prep Pack - LMT Battery Preset
# =============================================================================
# Configuration preset for light means of transport (LMT) batteries per
# EU Battery Regulation (EU) 2023/1542. LMT batteries power e-bikes,
# e-scooters, e-mopeds, and similar light electric vehicles. They require
# a battery passport, carbon footprint declaration (phased in later than
# EV/industrial), recycled content, due diligence, and labelling.
#
# LMT battery characteristics:
#   - Capacity: typically 0.25-2 kWh (up to 4 kWh for e-mopeds)
#   - Chemistry: NMC622, NMC532, LFP (most common)
#   - Weight: 2-15 kg (integrated or removable)
#   - Voltage: 24-72V nominal
#   - Cycle life: minimum 1,000 cycles to 70% SoH
#   - Removability and replaceability required (Art. 11)
#   - Passport required per Art. 65, carbon footprint from 18 Aug 2028
# =============================================================================

# --- Preset Metadata ---
pack_name: "PACK-020 Battery Passport Prep Pack"
version: "1.0.0"
battery_category: "LMT"
chemistry: "NMC622"
reporting_year: 2026
manufacturing_country: "CN"

# --- Carbon Footprint (Art. 7-9) ---
carbon_footprint:
  enabled: true
  methodology: "EU_BATTERY_REG_DA"
  functional_unit: "kgCO2e_per_kWh"
  lifecycle_stages:
    - "RAW_MATERIAL_EXTRACTION"
    - "MANUFACTURING"
    - "DISTRIBUTION"
    - "END_OF_LIFE"
  class_thresholds:
    CLASS_A: null
    CLASS_B: null
    CLASS_C: null
    CLASS_D: null
    CLASS_E: null
  max_threshold_per_kwh: null
  gwp_source: "IPCC_AR6"
  emission_factor_database: "ECOINVENT_3.10"
  allocation_method: "PHYSICAL"
  electricity_mix_source: "COUNTRY_SPECIFIC"
  data_quality_rating_required: true
  third_party_verification: true
  declaration_per_batch: true

# --- Recycled Content (Art. 8, 17) ---
recycled_content:
  enabled: true
  targets_2031:
    cobalt: 16.0
    lithium: 6.0
    nickel: 6.0
    lead: 85.0
  targets_2036:
    cobalt: 26.0
    lithium: 12.0
    nickel: 15.0
    lead: 85.0
  verification_method: "MASS_BALANCE"
  third_party_audit: true
  tracking_granularity: "MODEL"

# --- Performance and Durability (Art. 10, 11, 14) ---
performance:
  enabled: true
  soh_thresholds:
    excellent: 95.0
    good: 85.0
    acceptable: 70.0
    degraded: 50.0
    end_of_life: 0.0
  durability_ratings:
    lmt_minimum_cycle_life: 1000
    lmt_minimum_soh_at_eol: 70.0
    lmt_removability_required: true
    lmt_replaceability_required: true
  soh_data_access: true
  soh_parameters:
    - "remaining_capacity_ah"
    - "remaining_capacity_pct"
    - "state_of_charge_pct"
    - "cycle_count"
    - "internal_resistance_mohm"
    - "calendar_age_days"
    - "expected_remaining_lifetime_cycles"
    - "expected_remaining_lifetime_months"
  test_standards:
    - "IEC_62619"
    - "IEC_62133_2"
    - "EN_15194"
  capacity_measurement_standard: "IEC_62619"

# --- Supply Chain Due Diligence (Art. 22-26) ---
supply_chain:
  enabled: true
  critical_materials:
    - "COBALT"
    - "LITHIUM"
    - "NICKEL"
    - "NATURAL_GRAPHITE"
    - "MANGANESE"
  high_risk_countries:
    - "CD"
    - "CN"
    - "MM"
    - "PH"
    - "ID"
    - "RU"
    - "ZM"
  due_diligence_framework: "OECD_MINERALS"
  audit_requirements:
    third_party_audit_required: true
    audit_frequency_months: 12
    audit_standard: "OECD_MINERALS_ANNEX_II"
    conflict_minerals_screening: true
    human_rights_assessment: true
    environmental_impact_assessment: true
    child_labour_zero_tolerance: true
    forced_labour_zero_tolerance: true
    tier_1_coverage_pct: 100
    tier_2_coverage_pct: 70
    tier_3_coverage_pct: 30
    smelter_refiner_identification: true
    mine_of_origin_traceability: false
  grievance_mechanism: true
  public_reporting: true
  chain_of_custody_tracking: true

# --- Labelling (Art. 13) ---
labelling:
  enabled: true
  required_elements_by_category:
    LMT:
      - "CE_MARKING"
      - "QR_CODE"
      - "COLLECTION_SYMBOL"
      - "CAPACITY_LABEL"
      - "HAZARDOUS_SUBSTANCE"
      - "BATTERY_CHEMISTRY"
      - "CARBON_FOOTPRINT"
      - "SEPARATE_COLLECTION"

# --- End-of-Life (Art. 69-73) ---
eol:
  enabled: true
  collection_targets:
    lmt:
      "2028": 51.0
      "2031": 61.0
  recycling_targets:
    lithium_ion:
      "2025": 65.0
      "2030": 70.0
  recovery_targets:
    cobalt:
      "2027": 90.0
      "2031": 95.0
    copper:
      "2027": 90.0
      "2031": 95.0
    lithium:
      "2027": 50.0
      "2031": 80.0
    nickel:
      "2027": 90.0
      "2031": 95.0
  second_life_assessment: false
  take_back_obligation: false
  producer_responsibility: true
  recycler_certification_required: true

# --- Conformity Assessment (Art. 27) ---
conformity:
  enabled: true
  module_by_category:
    LMT:
      - "MODULE_A"
      - "MODULE_B"
      - "MODULE_C"
      - "MODULE_D"
  notified_body_required: false
  quality_management_standard: "ISO_9001"

# --- Reporting ---
reporting:
  enabled: true
  format: "PDF"
  additional_formats:
    - "JSON"
    - "HTML"
  include_qr: true
  sha256_provenance: true
  passport_api_format: "JSON_LD"
  review_workflow: true
  audit_trail_report: true
  executive_summary: true
  data_quality_disclosure: true
  retention_years: 10
