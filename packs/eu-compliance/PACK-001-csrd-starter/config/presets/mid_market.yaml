# =============================================================================
# PACK-001 CSRD Starter Pack - Mid-Market Preset
# =============================================================================
# For organizations with 250-500 employees, EUR 10M-40M revenue.
# All ESRS standards enabled with material topics focus, top 5 Scope 3
# categories, single language, standard XBRL tagging.
# =============================================================================

# ESRS Standards Configuration - All enabled, materiality-driven depth
esrs_standards:
  # Cross-cutting standards (always mandatory)
  - id: "ESRS1"
    name: "General Requirements"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements:
      - "ESRS1-DR1"
      - "ESRS1-DR2"
      - "ESRS1-DR3"
      - "ESRS1-DR4"
      - "ESRS1-DR5"

  - id: "ESRS2"
    name: "General Disclosures"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements:
      - "ESRS2-BP1"
      - "ESRS2-BP2"
      - "ESRS2-GOV1"
      - "ESRS2-GOV2"
      - "ESRS2-GOV3"
      - "ESRS2-GOV4"
      - "ESRS2-GOV5"
      - "ESRS2-SBM1"
      - "ESRS2-SBM2"
      - "ESRS2-SBM3"
      - "ESRS2-IRO1"
      - "ESRS2-IRO2"
      - "ESRS2-MDR-P"
      - "ESRS2-MDR-A"
      - "ESRS2-MDR-M"
      - "ESRS2-MDR-T"

  # Environment - Climate Change is typically material for all
  - id: "E1"
    name: "Climate Change"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements:
      - "E1-1"
      - "E1-2"
      - "E1-3"
      - "E1-4"
      - "E1-5"
      - "E1-6"
      - "E1-7"
      - "E1-9"

  - id: "E2"
    name: "Pollution"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "E2-1"
      - "E2-2"
      - "E2-3"
      - "E2-4"
      - "E2-6"

  - id: "E3"
    name: "Water and Marine Resources"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "E3-1"
      - "E3-3"
      - "E3-4"
      - "E3-5"

  - id: "E4"
    name: "Biodiversity and Ecosystems"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "E4-1"
      - "E4-2"
      - "E4-3"
      - "E4-5"

  - id: "E5"
    name: "Resource Use and Circular Economy"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "E5-1"
      - "E5-3"
      - "E5-4"
      - "E5-5"

  # Social standards
  - id: "S1"
    name: "Own Workforce"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements:
      - "S1-1"
      - "S1-2"
      - "S1-4"
      - "S1-5"
      - "S1-6"
      - "S1-8"
      - "S1-9"
      - "S1-13"
      - "S1-14"
      - "S1-16"
      - "S1-17"

  - id: "S2"
    name: "Workers in the Value Chain"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "S2-1"
      - "S2-2"
      - "S2-4"
      - "S2-5"

  - id: "S3"
    name: "Affected Communities"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "S3-1"
      - "S3-4"
      - "S3-5"

  - id: "S4"
    name: "Consumers and End-Users"
    enabled: true
    mandatory: false
    material: null  # Subject to materiality assessment
    disclosure_requirements:
      - "S4-1"
      - "S4-4"
      - "S4-5"

  # Governance
  - id: "G1"
    name: "Business Conduct"
    enabled: true
    mandatory: false
    material: true
    disclosure_requirements:
      - "G1-1"
      - "G1-2"
      - "G1-3"
      - "G1-4"
      - "G1-5"
      - "G1-6"

# Scope 3 Configuration - Top 5 most material categories
scope3:
  enabled_categories: [1, 3, 4, 5, 6]
  priority_categories: [1, 3, 4]
  screening_required: true
  materiality_threshold_percent: 5.0

# XBRL Configuration - Standard single-language tagging
xbrl:
  enabled: true
  taxonomy_version: "ESRS_2023"
  output_format: "inline_xbrl"
  validation_level: "standard"
  languages:
    - "en"

# No multi-subsidiary consolidation
consolidation:
  enabled: false
  method: "operational_control"
  subsidiaries: []
  intercompany_elimination: false

# Guided mode - light touch for mid-market
guided_mode:
  enabled: false
  tutorial_mode: false
  pre_populated_examples: false
  ai_assistance_level: "standard"
  step_by_step: false
  onboarding_extended: false

# Emission factor priorities for mid-market
emission_factor_priorities:
  - "industry_average"
  - "government_published"
  - "ipcc_2006"
  - "defra"
  - "epa"

# Agent overrides - disable optional agents not needed for mid-market
agent_overrides:
  AGENT-MRV-006:
    enabled: false          # Land use - rarely material for mid-market
  AGENT-MRV-008:
    enabled: false          # Agriculture - rarely material for mid-market
  AGENT-MRV-011:
    enabled: false          # Steam/heat - disable unless needed
  AGENT-MRV-012:
    enabled: false          # Cooling - disable unless needed
  AGENT-MRV-015:
    enabled: false          # Capital goods (Cat 2) - not in top 5
  AGENT-MRV-020:
    enabled: false          # Employee commuting (Cat 7) - not in top 5
  AGENT-MRV-021:
    enabled: false          # Upstream leased (Cat 8) - not in top 5
  AGENT-MRV-022:
    enabled: false          # Downstream transport (Cat 9) - not in top 5
  AGENT-MRV-023:
    enabled: false          # Processing sold (Cat 10) - not in top 5
  AGENT-MRV-024:
    enabled: false          # Use of sold (Cat 11) - not in top 5
  AGENT-MRV-025:
    enabled: false          # End of life (Cat 12) - not in top 5
  AGENT-MRV-026:
    enabled: false          # Downstream leased (Cat 13) - not in top 5
  AGENT-MRV-027:
    enabled: false          # Franchises (Cat 14) - not in top 5
  AGENT-MRV-028:
    enabled: false          # Investments (Cat 15) - not in top 5
