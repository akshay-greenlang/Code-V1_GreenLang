# =============================================================================
# PACK-001 CSRD Starter Pack - First-Time Reporter Preset
# =============================================================================
# For organizations reporting under CSRD for the first time. Provides extended
# onboarding, tutorial mode, pre-populated examples, increased AI assistance,
# and step-by-step guided workflow. All ESRS standards are available but
# materiality assessment is guided with detailed explanations.
# =============================================================================

# ESRS Standards - All available with guided materiality assessment
esrs_standards:
  # Cross-cutting (mandatory, with tutorials)
  - id: "ESRS1"
    name: "General Requirements"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements:
      - "ESRS1-DR1"
      - "ESRS1-DR2"
      - "ESRS1-DR3"
      - "ESRS1-DR4"
      - "ESRS1-DR5"

  - id: "ESRS2"
    name: "General Disclosures"
    enabled: true
    mandatory: true
    material: true
    disclosure_requirements:
      - "ESRS2-BP1"
      - "ESRS2-BP2"
      - "ESRS2-GOV1"
      - "ESRS2-GOV2"
      - "ESRS2-GOV3"
      - "ESRS2-GOV4"
      - "ESRS2-GOV5"
      - "ESRS2-SBM1"
      - "ESRS2-SBM2"
      - "ESRS2-SBM3"
      - "ESRS2-IRO1"
      - "ESRS2-IRO2"
      - "ESRS2-MDR-P"
      - "ESRS2-MDR-A"
      - "ESRS2-MDR-M"
      - "ESRS2-MDR-T"

  # All topical standards available - materiality to be assessed
  - id: "E1"
    name: "Climate Change"
    enabled: true
    mandatory: false
    material: true           # Climate change is material for virtually all companies
    disclosure_requirements:
      - "E1-1"
      - "E1-2"
      - "E1-3"
      - "E1-4"
      - "E1-5"
      - "E1-6"
      - "E1-9"

  - id: "E2"
    name: "Pollution"
    enabled: true
    mandatory: false
    material: null            # Will be assessed during guided materiality
    disclosure_requirements:
      - "E2-1"
      - "E2-2"
      - "E2-3"
      - "E2-4"
      - "E2-6"

  - id: "E3"
    name: "Water and Marine Resources"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "E3-1"
      - "E3-3"
      - "E3-4"
      - "E3-5"

  - id: "E4"
    name: "Biodiversity and Ecosystems"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "E4-1"
      - "E4-2"
      - "E4-3"
      - "E4-5"

  - id: "E5"
    name: "Resource Use and Circular Economy"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "E5-1"
      - "E5-3"
      - "E5-4"
      - "E5-5"

  - id: "S1"
    name: "Own Workforce"
    enabled: true
    mandatory: false
    material: true            # Own workforce is material for virtually all companies
    disclosure_requirements:
      - "S1-1"
      - "S1-2"
      - "S1-4"
      - "S1-5"
      - "S1-6"
      - "S1-8"
      - "S1-9"
      - "S1-13"
      - "S1-14"
      - "S1-16"
      - "S1-17"

  - id: "S2"
    name: "Workers in the Value Chain"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "S2-1"
      - "S2-2"
      - "S2-4"
      - "S2-5"

  - id: "S3"
    name: "Affected Communities"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "S3-1"
      - "S3-4"
      - "S3-5"

  - id: "S4"
    name: "Consumers and End-Users"
    enabled: true
    mandatory: false
    material: null
    disclosure_requirements:
      - "S4-1"
      - "S4-4"
      - "S4-5"

  - id: "G1"
    name: "Business Conduct"
    enabled: true
    mandatory: false
    material: true            # Business conduct is material for virtually all companies
    disclosure_requirements:
      - "G1-1"
      - "G1-2"
      - "G1-3"
      - "G1-4"
      - "G1-5"
      - "G1-6"

# Scope 3 - Start with screening, then enable material categories
scope3:
  enabled_categories: [1, 3, 5, 6]   # Start with common high-impact categories
  priority_categories: [1, 3]
  screening_required: true
  materiality_threshold_percent: 5.0

# XBRL - Standard setup, single language
xbrl:
  enabled: true
  taxonomy_version: "ESRS_2023"
  output_format: "inline_xbrl"
  validation_level: "standard"
  languages:
    - "en"

# No consolidation for first-time reporters (simplify)
consolidation:
  enabled: false
  method: "operational_control"
  subsidiaries: []
  intercompany_elimination: false

# Full guided mode with tutorials and examples
guided_mode:
  enabled: true
  tutorial_mode: true
  pre_populated_examples: true
  ai_assistance_level: "enhanced"
  step_by_step: true
  onboarding_extended: true

# Emission factor priorities - start with easiest sources
emission_factor_priorities:
  - "defra"                  # DEFRA factors are well-documented and easy to use
  - "government_published"
  - "ipcc_2006"
  - "epa"
  - "industry_average"

# Agent overrides - disable advanced optional agents to reduce complexity
agent_overrides:
  AGENT-MRV-006:
    enabled: false          # Land use - too complex for first report
  AGENT-MRV-008:
    enabled: false          # Agriculture - specialized
  AGENT-MRV-011:
    enabled: false          # Steam/heat
  AGENT-MRV-012:
    enabled: false          # Cooling
  AGENT-MRV-015:
    enabled: false          # Capital goods (Cat 2) - defer to later
  AGENT-MRV-020:
    enabled: false          # Employee commuting (Cat 7) - defer
  AGENT-MRV-021:
    enabled: false          # Upstream leased (Cat 8) - defer
  AGENT-MRV-022:
    enabled: false          # Downstream transport (Cat 9) - defer
  AGENT-MRV-023:
    enabled: false          # Processing sold (Cat 10) - defer
  AGENT-MRV-024:
    enabled: false          # Use of sold (Cat 11) - defer
  AGENT-MRV-025:
    enabled: false          # End of life (Cat 12) - defer
  AGENT-MRV-026:
    enabled: false          # Downstream leased (Cat 13) - defer
  AGENT-MRV-027:
    enabled: false          # Franchises (Cat 14) - defer
  AGENT-MRV-028:
    enabled: false          # Investments (Cat 15) - defer
