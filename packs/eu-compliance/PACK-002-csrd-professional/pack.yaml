# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles for professional use
# -----------------------------------------------------------------------------
presets:

  # Size-based presets (professional tier)
  size_presets:
    - id: enterprise_group
      display_name: "Enterprise Group"
      description: >-
        Multi-entity corporate group with up to 100 subsidiaries. All 3
        consolidation methods, 4-level approval, all quality gates,
        reasonable assurance, all cross-frameworks, all scenarios.
      config_file: "config/presets/enterprise_group.yaml"
      criteria:
        min_employees: 5000
        multi_entity: true
        max_subsidiaries: 100

    - id: listed_company
      display_name: "Listed Company"
      description: >-
        Stock-exchange listed company with investor reporting requirements.
        TCFD, CDP, and SBTi alignment mandatory. Limited to reasonable
        assurance roadmap. Investor-focused reporting templates.
      config_file: "config/presets/listed_company.yaml"
      criteria:
        listed: true
        min_employees: 1000
        max_subsidiaries: 50

    - id: financial_institution
      display_name: "Financial Institution"
      description: >-
        Banks, insurers, and asset managers with PCAF financed emissions,
        GAR/BTAR reporting, stranded asset analysis, and SBTi FI targets.
      config_file: "config/presets/financial_institution.yaml"
      criteria:
        sector: "financial_services"
        regulated: true
        pcaf_required: true

    - id: multinational
      display_name: "Multinational Corporation"
      description: >-
        Multi-jurisdiction global organization with up to 200 subsidiaries.
        Per-jurisdiction regulatory calendars, multi-currency with FX,
        all languages, 10+ EU national filing formats.
      config_file: "config/presets/multinational.yaml"
      criteria:
        min_employees: 10000
        jurisdictions: 5
        max_subsidiaries: 200

  # Sector-specific presets (professional tier)
  sector_presets:
    - id: manufacturing_pro
      display_name: "Manufacturing Professional"
      description: >-
        Enhanced manufacturing preset with EU ETS integration, sector-specific
        SBTi pathways, CBAM preparedness, and industrial scenario analysis.
      config_file: "config/sectors/manufacturing_pro.yaml"
      nace_codes: ["C10-C33"]

    - id: financial_services_pro
      display_name: "Financial Services Professional"
      description: >-
        Financial services preset with PCAF (6 asset classes), GAR/BTAR
        reporting, financed emissions (Cat 15), stranded asset analysis,
        and SBTi FI targets.
      config_file: "config/sectors/financial_services_pro.yaml"
      nace_codes: ["K64-K66"]

    - id: technology_pro
      display_name: "Technology Professional"
      description: >-
        Technology sector preset with SCI/PUE metrics, data center energy
        optimization, Scope 3 digital services, and cloud emissions tracking.
      config_file: "config/sectors/technology_pro.yaml"
      nace_codes: ["J58-J63"]

    - id: energy_pro
      display_name: "Energy Professional"
      description: >-
        Energy sector preset with EU ETS integration, OGMP 2.0 methane
        reporting, stranded asset risk, transition plan requirements, and
        sector-specific SBTi pathways.
      config_file: "config/sectors/energy_pro.yaml"
      nace_codes: ["B05-B09", "D35"]

    - id: heavy_industry_pro
      display_name: "Heavy Industry Professional"
      description: >-
        Heavy industry preset for cement, steel, chemicals, and mining
        with process emission intensity, CBAM, EU ETS benchmarks, and
        hard-to-abate sector pathways.
      config_file: "config/sectors/heavy_industry_pro.yaml"
      nace_codes: ["B05-B09", "C19-C25"]

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# Professional pack requires more resources than Starter
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "scipy>=1.11"
    - "scikit-learn>=1.3"
    - "networkx>=3.1"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 32
    min_storage_gb: 250
    recommended_cpu_cores: 16
    recommended_memory_gb: 64
    recommended_storage_gb: 1000

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 50
    recommended_connections: 100

# -----------------------------------------------------------------------------
# Performance Targets
# Professional pack targets for multi-entity workloads
# -----------------------------------------------------------------------------
performance:
  data_ingestion:
    throughput_records_per_second: 10000
    max_latency_ms: 150
    description: "Data ingestion throughput for multi-entity CSV/Excel processing"

  ghg_calculation:
    single_scope_max_seconds: 45
    full_inventory_max_seconds: 600
    multi_entity_max_minutes: 45
    max_data_points: 50000
    description: "GHG calculation targets for 50K data points multi-entity"

  report_generation:
    esrs_disclosure_max_seconds: 180
    executive_summary_max_seconds: 90
    xbrl_tagging_max_seconds: 300
    consolidated_report_max_seconds: 600
    cross_framework_max_seconds: 240
    description: "Report generation targets including consolidated group reports"

  scenario_analysis:
    single_scenario_max_seconds: 120
    full_analysis_max_minutes: 30
    monte_carlo_iterations: 10000
    description: "Scenario analysis execution time targets"

  api_response:
    p50_ms: 80
    p95_ms: 400
    p99_ms: 1500
    description: "API response time percentile targets"

  data_quality:
    profiling_max_seconds: 90
    validation_max_seconds: 45
    quality_gate_max_seconds: 60
    description: "Data quality check execution time targets"

  availability:
    target_uptime_percent: 99.95
    max_planned_downtime_minutes_per_month: 15
    description: "System availability targets"

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_pack_001_installed
    - verify_pack_001_healthy
    - verify_memory_requirements

  database_migrations:
    # PACK-001 inherited migrations
    - "V001-V006"   # Core schema
    - "V007-V008"   # Feature flags and agent factory
    - "V009-V010"   # Auth and RBAC
    - "V019-V020"   # Observability
    - "V021-V030"   # Foundation agents
    - "V031-V050"   # Data agents
    - "V051-V081"   # MRV agents
    - "V082"        # CSRD application
    # PACK-002 additional migrations
    - "V085"        # CDP application
    - "V086"        # TCFD application
    - "V087"        # SBTi application
    - "V088"        # EU Taxonomy application
    - "V130"        # Professional consolidation tables
    - "V131"        # Approval workflow tables
    - "V132"        # Quality gate tables
    - "V133"        # Cross-framework mapping tables
    - "V134"        # Scenario analysis tables
    - "V135"        # Benchmarking tables
    - "V136"        # Regulatory change tracking tables

  post_install:
    - verify_pack_001_agents
    - seed_emission_factors
    - seed_esrs_taxonomy
    - seed_cdp_questionnaire_structure
    - seed_tcfd_framework
    - seed_sbti_pathways
    - seed_eu_taxonomy_criteria
    - seed_cross_framework_mappings
    - seed_default_presets
    - configure_scheduled_jobs
    - configure_approval_workflows
    - configure_quality_gates
    - run_health_checks
