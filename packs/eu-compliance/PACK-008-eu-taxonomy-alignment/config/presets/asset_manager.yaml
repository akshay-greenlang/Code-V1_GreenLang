# =============================================================================
# PACK-008 Preset: Asset Manager
# =============================================================================
# Deployment for asset managers and fund companies subject to SFDR.
# Investment taxonomy focus with fund-level analysis, SFDR Article 8/9
# product alignment, portfolio-level taxonomy ratios, and investor reporting.
#
# Applicable to:
#   - Asset management companies
#   - Fund management companies (UCITS, AIF)
#   - Pension funds
#   - Insurance companies managing investment portfolios
#   - SFDR Article 8/9 product managers
#
# Key Features:
#   - Investment-level taxonomy alignment assessment
#   - Fund-level taxonomy ratio calculation
#   - SFDR Article 8/9 product alignment
#   - Portfolio-level aggregation
#   - Counterparty taxonomy data collection
#   - Investor disclosure templates
#   - PAI (Principal Adverse Impact) linkage
# =============================================================================

organization_type: "ASSET_MANAGER"
reporting_period: "ANNUAL"

objectives_in_scope:
  - "CCM"
  - "CCA"
  - "WTR"
  - "CE"
  - "PPC"
  - "BIO"

eligibility:
  screening_mode: "HYBRID"
  nace_version: "NACE_REV2"
  min_confidence: 0.80
  batch_size: 500
  include_transitional: true
  include_enabling: true
  revenue_weighted: false
  auto_classify_nace: true

sc_assessment:
  evaluation_mode: "STANDARD"
  threshold_strictness: "STANDARD"
  evidence_required: true
  quantitative_tolerance_pct: 5.0
  track_enabling_activities: true
  track_transitional_activities: true

dnsh:
  objectives_assessed:
    - "CCM"
    - "CCA"
    - "WTR"
    - "CE"
    - "PPC"
    - "BIO"
  require_all_pass: true
  climate_risk_assessment_enabled: true
  evidence_required: true

minimum_safeguards:
  human_rights_check: true
  anti_corruption_check: true
  taxation_check: true
  fair_competition_check: true
  assessment_mode: "PROCEDURAL"
  require_all_pass: true

kpi:
  calculate_turnover: false
  calculate_capex: false
  calculate_opex: false
  double_counting_prevention: true
  currency: "EUR"

gar:
  calculate_stock_gar: true
  calculate_flow_gar: true
  calculate_btar: false
  exposure_types:
    - "EQUITY_HOLDINGS"
    - "DEBT_SECURITIES"
    - "CORPORATE_LOANS"
  epc_integration: true
  epc_threshold_rating: "C"
  de_minimis_threshold: 0.0
  counterparty_data_source: "DIRECT"
  sovereign_exclusion: true
  interbank_exclusion: true

reporting:
  article8_enabled: true
  eba_pillar3_enabled: false
  xbrl_tagging: false
  nuclear_gas_supplementary: true
  yoy_comparison: true
  default_format: "PDF"
  include_methodology_note: true
  language: "en"
  cross_framework_targets:
    - "SFDR"
    - "CSRD_ESRS_E1"

regulatory:
  delegated_act_version: "CLIMATE_DA_2021"
  active_delegated_acts:
    - "CLIMATE_DA_2021"
    - "ENVIRONMENTAL_DA_2023"
    - "DISCLOSURES_DA_2021"
  track_updates: true
  auto_migration: false

data_quality:
  min_quality_score: 0.75
  completeness_threshold: 0.85
  require_primary_data: false
  allow_estimates: true

audit_trail:
  retention_years: 5
  hash_algorithm: "SHA-256"
  immutable_log: true
  include_provenance_hash: true
