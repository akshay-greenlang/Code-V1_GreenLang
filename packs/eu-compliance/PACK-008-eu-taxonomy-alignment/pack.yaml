pack_summary:
  total_agents: 51
  taxonomy_app: 1
  mrv_agents: 30
  data_agents: 10
  foundation_agents: 10
  pack_engines: 10
  pack_workflows: 10
  pack_templates: 10
  pack_integrations: 12

# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles
# -----------------------------------------------------------------------------
presets:
  size_presets:
    - id: non_financial_undertaking
      display_name: "Non-Financial Undertaking"
      description: >-
        Standard deployment for non-financial undertakings subject to CSRD/NFRD.
        Focused on Turnover/CapEx/OpEx KPI calculation, all 6 environmental
        objectives, full eligibility and alignment assessment.
      config_file: "config/presets/non_financial_undertaking.yaml"

    - id: financial_institution
      display_name: "Financial Institution"
      description: >-
        Deployment for credit institutions and investment firms. Focused on
        Green Asset Ratio (GAR/BTAR) calculation, exposure classification,
        counterparty taxonomy data, EPC integration for real estate, and EBA
        Pillar 3 disclosure templates (Templates 6-10).
      config_file: "config/presets/financial_institution.yaml"

    - id: asset_manager
      display_name: "Asset Manager"
      description: >-
        Deployment for asset managers and fund companies. Investment taxonomy
        focus with fund-level analysis, SFDR Article 8/9 product alignment,
        portfolio-level taxonomy ratios, and investor reporting.
      config_file: "config/presets/asset_manager.yaml"

    - id: large_enterprise
      display_name: "Large Enterprise"
      description: >-
        Full-featured deployment with all features enabled. All 6 environmental
        objectives, comprehensive assessment, full Article 8 disclosure, GAR
        calculation capability, cross-framework reporting, and advanced
        regulatory tracking.
      config_file: "config/presets/large_enterprise.yaml"

    - id: sme_simplified
      display_name: "SME Simplified"
      description: >-
        Simplified deployment for SMEs with de minimis eligibility. Focused
        on CCM and CCA objectives, simplified assessment criteria, reduced
        evidence requirements, and streamlined KPI calculation.
      config_file: "config/presets/sme_simplified.yaml"

  sector_presets:
    - id: energy
      display_name: "Energy Sector"
      description: "Power generation, renewables, grid infrastructure, energy storage"
      config_file: "config/sectors/energy.yaml"
      primary_activities: ["electricity_generation", "renewables", "transmission", "storage"]

    - id: manufacturing
      display_name: "Manufacturing Sector"
      description: "Industrial processes, cement, steel, aluminium, chemicals, automotive"
      config_file: "config/sectors/manufacturing.yaml"
      primary_activities: ["cement", "steel", "aluminium", "chemicals", "automotive"]

    - id: real_estate
      display_name: "Real Estate Sector"
      description: "Building renovation, new construction, EPC improvements, property management"
      config_file: "config/sectors/real_estate.yaml"
      primary_activities: ["renovation", "construction", "acquisition", "management"]

    - id: transport
      display_name: "Transport Sector"
      description: "Low-carbon vehicles, rail infrastructure, shipping, urban mobility"
      config_file: "config/sectors/transport.yaml"
      primary_activities: ["vehicles", "rail", "shipping", "urban_mobility"]

    - id: forestry_agriculture
      display_name: "Forestry & Agriculture Sector"
      description: "Afforestation, forest management, restoration, organic farming"
      config_file: "config/sectors/forestry_agriculture.yaml"
      primary_activities: ["afforestation", "forest_management", "restoration", "organic"]

    - id: financial_services
      display_name: "Financial Services Sector"
      description: "Banking, insurance, asset management, green bonds, sustainable finance"
      config_file: "config/sectors/financial_services.yaml"
      primary_activities: ["banking", "insurance", "asset_management", "green_bonds"]

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 32
    min_storage_gb: 200
    recommended_cpu_cores: 16
    recommended_memory_gb: 64
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 50
    recommended_connections: 100

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  activity_screening:
    single_activity_max_ms: 100
    batch_240_max_seconds: 10
    description: "Activity screening against ~240 taxonomy activities"

  alignment_assessment:
    single_activity_max_seconds: 5
    batch_50_max_seconds: 60
    description: "Full 4-condition alignment assessment per activity"

  kpi_calculation:
    full_portfolio_max_seconds: 10
    description: "KPI calculation for Turnover/CapEx/OpEx ratios"

  gar_calculation:
    banking_book_max_seconds: 30
    description: "Green Asset Ratio calculation for financial institutions"

  report_generation:
    article_8_template_max_seconds: 15
    eba_pillar3_max_seconds: 20
    executive_summary_max_seconds: 10
    description: "Disclosure and report generation"

  api_latency:
    p50_ms: 50
    p95_ms: 200
    p99_ms: 1000

  availability:
    target_percent: 99.9
    description: "Standard availability target"
