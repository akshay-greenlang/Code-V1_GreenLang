      - id: AGENT-MRV-021
        name: "Upstream Leased Assets Agent (Cat 8)"
        description: "Calculates Scope 3 Category 8 upstream leased assets emissions"
        path: "greenlang/agents/mrv/upstream_leased_assets/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-022
        name: "Downstream Transportation Agent (Cat 9)"
        description: "Calculates Scope 3 Category 9 downstream transportation emissions"
        path: "greenlang/agents/mrv/downstream_transportation/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-023
        name: "Processing of Sold Products (Cat 10)"
        description: "Calculates Scope 3 Category 10 processing of sold products emissions"
        path: "greenlang/agents/mrv/processing_sold_products/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-024
        name: "Use of Sold Products (Cat 11)"
        description: "Calculates Scope 3 Category 11 use of sold products emissions"
        path: "greenlang/agents/mrv/use_sold_products/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-025
        name: "End-of-Life Treatment (Cat 12)"
        description: "Calculates Scope 3 Category 12 end-of-life treatment emissions"
        path: "greenlang/agents/mrv/end_of_life_treatment/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-026
        name: "Downstream Leased Assets (Cat 13)"
        description: "Calculates Scope 3 Category 13 downstream leased assets emissions"
        path: "greenlang/agents/mrv/downstream_leased_assets/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-027
        name: "Franchises Agent (Cat 14)"
        description: "Calculates Scope 3 Category 14 franchises emissions"
        path: "greenlang/agents/mrv/franchises/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-028
        name: "Investments Agent (Cat 15)"
        description: "Calculates Scope 3 Category 15 investments emissions"
        path: "greenlang/agents/mrv/investments/"
        required: true
        version: "1.0.0"

    # -------------------------------------------------------------------------
    # Cross-Cutting MRV Agents (2 agents)
    # -------------------------------------------------------------------------
    cross_cutting:
      - id: AGENT-MRV-029
        name: "Scope 3 Category Mapper"
        description: "Maps emissions data across all 15 Scope 3 categories"
        path: "greenlang/agents/mrv/scope3_category_mapper/"
        required: true
        version: "1.0.0"

      - id: AGENT-MRV-030
        name: "Audit Trail & Lineage"
        description: "Tracks data lineage and audit trails for all MRV calculations"
        path: "greenlang/agents/mrv/audit_trail_lineage/"
        required: true
        version: "1.0.0"

  # ===========================================================================
  # Data Agents - Supporting data intake and quality agents (10 agents)
  # ===========================================================================
  agents_data:
    # Data Intake (4 agents)
    - id: AGENT-DATA-001
      name: "PDF & Invoice Extractor"
      description: "Extracts financial and activity data from PDF documents and invoices"
      required: true

    - id: AGENT-DATA-002
      name: "Excel/CSV Normalizer"
      description: "Normalizes tabular financial and activity data from Excel/CSV files"
      required: true

    - id: AGENT-DATA-003
      name: "ERP/Finance Connector"
      description: "Connects to ERP and finance systems for turnover, CapEx, OpEx data"
      required: true

    - id: AGENT-DATA-008
      name: "Supplier Questionnaire Processor"
      description: "Processes supplier taxonomy questionnaires and self-declarations"
      required: true

    # Data Quality (6 agents)
    - id: AGENT-DATA-009
      name: "Spend Data Categorizer"
      description: "Categorizes spend data into taxonomy activity categories"
      required: true

    - id: AGENT-DATA-010
      name: "Data Quality Profiler"
      description: "Profiles data quality across all taxonomy compliance data sources"
      required: true

    - id: AGENT-DATA-011
      name: "Duplicate Detection Agent"
      description: "Detects and resolves duplicate activity, financial, and evidence records"
      required: true

    - id: AGENT-DATA-012
      name: "Missing Value Imputer"
      description: "Imputes missing values in taxonomy assessment datasets"
      required: true

    - id: AGENT-DATA-018
      name: "Data Lineage Tracker"
      description: "Tracks data lineage across taxonomy assessment pipeline"
      required: true

    - id: AGENT-DATA-019
      name: "Validation Rule Engine"
      description: "Enforces taxonomy-specific validation rules on all compliance data"
      required: true

  # ===========================================================================
  # Foundation Agents - Core platform agents (all 10)
  # ===========================================================================
  agents_foundation:
    - id: AGENT-FOUND-001
      name: "GreenLang Orchestrator (DAG)"
      description: "Orchestrates agent execution using directed acyclic graphs"
      required: true
    - id: AGENT-FOUND-002
      name: "Schema Compiler & Validator"
      description: "Compiles and validates data schemas for taxonomy compliance"
      required: true
    - id: AGENT-FOUND-003
      name: "Unit & Reference Normalizer"
      description: "Normalizes units (financial, emissions, energy) and reference data"
      required: true
    - id: AGENT-FOUND-004
      name: "Assumptions Registry"
      description: "Tracks all assumptions used in taxonomy assessments and calculations"
      required: true
    - id: AGENT-FOUND-005
      name: "Citations & Evidence Agent"
      description: "Links all data points to source evidence for audit trails"
      required: true
    - id: AGENT-FOUND-006
      name: "Access & Policy Guard"
      description: "Enforces role-based access and data policies"
      required: true
    - id: AGENT-FOUND-007
      name: "Agent Registry & Service Catalog"
      description: "Maintains registry of available agents and their capabilities"
      required: true
    - id: AGENT-FOUND-008
      name: "Reproducibility Agent"
      description: "Ensures all taxonomy calculations are reproducible with provenance tracking"
      required: true
    - id: AGENT-FOUND-009
      name: "QA Test Harness"
      description: "Runs quality assurance checks on all agent outputs"
      required: true
    - id: AGENT-FOUND-010
      name: "Observability & Telemetry Agent"
      description: "Provides monitoring, logging, and telemetry for all agents"
      required: true

