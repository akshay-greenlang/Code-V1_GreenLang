# -----------------------------------------------------------------------------
# Pack Summary
# -----------------------------------------------------------------------------
pack_summary:
  total_agents: 50
  mrv_agents: 30
  data_agents: 10
  foundation_agents: 10
  pack_engines: 8
  pack_workflows: 8
  pack_templates: 8
  pack_integrations: 10

# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles
# -----------------------------------------------------------------------------
presets:
  product_presets:
    - id: impact_fund
      display_name: "Impact Fund"
      description: >-
        Deployment for Article 9(1) impact investment funds with environmental
        and/or social sustainable objectives. Full impact measurement framework
        with SDG mapping, impact KPI tracking, and theory of change reporting.
        95% minimum sustainable investment proportion. Comprehensive DNSH and
        governance assessment. Supports both environmental and social impact
        funds with configurable impact categories and measurement approaches.
      config_file: "config/presets/impact_fund.yaml"

    - id: climate_fund
      display_name: "Climate Fund"
      description: >-
        Deployment for Article 9(3) carbon emission reduction funds with
        EU Paris-Aligned Benchmark (PAB) designation. Mandatory 7% year-on-year
        decarbonization trajectory, carbon budget tracking, temperature
        alignment scoring, and forward-looking emissions projections. 95%
        minimum sustainable investment proportion with enhanced fossil fuel
        exclusions per PAB methodology. Science-based target integration.
      config_file: "config/presets/climate_fund.yaml"

    - id: social_fund
      display_name: "Social Fund"
      description: >-
        Deployment for Article 9(1) social objective funds focused on social
        sustainability outcomes. Prioritizes social PAI indicators (10-14),
        social impact KPIs (jobs, health, education, inclusion), and social
        DNSH criteria. 90% minimum sustainable investment proportion with
        social taxonomy alignment tracking. Supports affordable housing,
        healthcare, education, and financial inclusion themes.
      config_file: "config/presets/social_fund.yaml"

    - id: esg_leader_fund
      display_name: "ESG Leader Fund"
      description: >-
        Deployment for Article 9(1) best-in-class ESG leader funds that invest
        in companies demonstrating top-tier ESG performance. 95% minimum
        sustainable investment proportion with enhanced governance screening.
        Full PAI calculation with all 18 mandatory indicators. Positive
        screening with top-quartile ESG score requirement. Supports multi-
        factor ESG integration with quality, momentum, and controversy overlays.
      config_file: "config/presets/esg_leader_fund.yaml"

    - id: transition_fund
      display_name: "Transition Fund"
      description: >-
        Deployment for Article 9(1) transition financing funds investing in
        companies committed to climate and sustainability transition. EU Climate
        Transition Benchmark (CTB) alignment with sector-specific decarbonization
        pathways. 90% minimum sustainable investment proportion. Enhanced focus
        on forward-looking metrics: science-based targets, transition plans,
        capex alignment, and green revenue trajectories. Supports high-emitter
        engagement and transition bond strategies.
      config_file: "config/presets/transition_fund.yaml"

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 32
    min_storage_gb: 200
    recommended_cpu_cores: 16
    recommended_memory_gb: 64
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 50
    recommended_connections: 100

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  sustainable_verification:
    single_holding_max_ms: 100
    full_portfolio_max_seconds: 20
    continuous_monitoring_interval_seconds: 300
    description: "Sustainable investment verification for all holdings"

  enhanced_dnsh:
    single_investee_max_ms: 150
    full_portfolio_max_seconds: 25
    description: "Enhanced DNSH assessment for all portfolio holdings"

  pai_calculation:
    single_indicator_max_ms: 200
    all_18_indicators_max_seconds: 15
    entity_level_max_seconds: 30
    description: "PAI indicator calculation with mandatory Scope 3"

  taxonomy_alignment:
    portfolio_ratio_max_seconds: 10
    six_objective_breakdown_max_seconds: 15
    look_through_max_seconds: 30
    description: "Full taxonomy alignment ratio with environmental objective breakdown"

  impact_measurement:
    kpi_calculation_max_seconds: 10
    sdg_mapping_max_seconds: 5
    full_impact_report_max_seconds: 30
    description: "Impact measurement and SDG mapping"

  benchmark_alignment:
    tracking_error_max_seconds: 5
    decarbonization_trajectory_max_seconds: 10
    description: "Benchmark alignment and carbon trajectory calculations"

  carbon_trajectory:
    trajectory_calculation_max_seconds: 10
    temperature_alignment_max_seconds: 15
    description: "Carbon trajectory and temperature alignment scoring"

  disclosure_generation:
    annex_iii_max_seconds: 25
    annex_v_max_seconds: 30
    impact_report_max_seconds: 20
    pai_statement_max_seconds: 30
    description: "Disclosure and report template generation"

  screening:
    universe_10000_max_seconds: 30
    single_check_max_ms: 50
    description: "Investment universe screening operations"

  eet_processing:
    import_max_seconds: 10
    export_max_seconds: 10
    description: "EET template import and export"

  api_latency:
    p50_ms: 50
    p95_ms: 200
    p99_ms: 1000

  availability:
    target_percent: 99.9
    description: "Standard availability target"
