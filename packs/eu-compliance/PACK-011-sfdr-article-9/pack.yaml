# =============================================================================
# PACK-011: SFDR Article 9 Pack
# GreenLang EU Compliance Pack for SFDR (EU) 2019/2088 Article 9 Products
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for SFDR Article 9 "dark green" financial product
# compliance. Article 9 products have sustainable investment as their objective,
# requiring significantly higher thresholds and more rigorous disclosure
# compared to Article 8 products. This pack bundles sustainable objective
# verification, enhanced DNSH assessment, full taxonomy alignment computation,
# impact measurement and reporting, benchmark alignment monitoring, mandatory
# PAI indicator calculation, carbon trajectory tracking, and investment universe
# management.
#
# Key Capabilities:
#   - Sustainable investment objective verification per Article 9(1)/(2)/(3)
#   - Enhanced DNSH assessment with stricter thresholds for all holdings
#   - Full EU Taxonomy alignment computation for sustainable investments
#   - Impact measurement framework with KPI tracking and SDG mapping
#   - EU Climate Benchmark alignment (CTB/PAB) per Article 9(3)
#   - All 18 mandatory PAI indicators with mandatory consideration
#   - Carbon trajectory tracking with decarbonization pathway monitoring
#   - Investment universe screening and eligibility management
#   - Pre-contractual disclosure (Annex III) generation
#   - Periodic reporting (Annex V) generation
#   - Website disclosure generation
#   - Article 5 information integration for sustainable products
#   - Downgrade risk monitoring (Article 9 to Article 8 reclassification)
#   - Regulatory change tracking (SFDR Level 1, RTS, ESMA Q&A updates)
#
# Regulatory References:
#   - SFDR Level 1: Regulation (EU) 2019/2088
#   - SFDR RTS: Delegated Regulation (EU) 2022/1288
#   - Taxonomy Disclosures DA: Delegated Regulation (EU) 2021/2178
#   - Benchmarks Regulation: Regulation (EU) 2016/1011 (as amended)
#   - ESMA Q&A: SFDR and Taxonomy-related Q&A updates
#   - EET Standard: European ESG Template v1.1 (FinDatEx)
#
# SFDR Article 9 Sub-Types:
#   - Article 9(1): General sustainable investment objective (environmental/social)
#   - Article 9(2): Index-based sustainable investment objective (passive tracking)
#   - Article 9(3): Carbon emission reduction objective (CTB/PAB alignment)
#
# Key Differences from Article 8 (PACK-010):
#   - ALL investments must be sustainable (minimum 95% threshold)
#   - DNSH assessment required for ALL holdings, not just sustainable portion
#   - PAI consideration is mandatory (not optional)
#   - Annex III pre-contractual / Annex V periodic (vs. Annex II/IV for Art. 8)
#   - Benchmark designation mandatory for Art. 9(2) and Art. 9(3)
#   - Carbon reduction trajectory required for Art. 9(3)
#   - Downgrade risk monitoring for potential Article 9 -> 8 reclassification
#   - Impact measurement and reporting as core requirement
#
# Version History:
#   1.0.0 - Initial release (2026-03-15)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-011-sfdr-article-9
  version: "1.0.0"
  display_name: "SFDR Article 9 Pack"
  description: >-
    Comprehensive GreenLang deployment pack for SFDR (EU) 2019/2088 Article 9
    "dark green" financial product compliance. Includes 8 engines for sustainable
    objective verification, enhanced DNSH assessment, full taxonomy alignment
    computation, impact measurement and reporting, benchmark alignment monitoring,
    mandatory PAI indicator calculation, carbon trajectory tracking, and investment
    universe management. Bundles all 30 MRV agents for PAI emissions data, 10 data
    intake/quality agents, and 10 foundation agents. Supports pre-contractual
    disclosure (Annex III), periodic reporting (Annex V), website disclosure,
    impact reporting, benchmark methodology documentation, downgrade risk
    monitoring, and regulatory change management. Designed for fund managers,
    insurance undertakings, and financial market participants offering Article 9
    sustainable investment products.
  category: eu-compliance
  tier: standalone
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-15"
  support_tier: enterprise
  documentation_url: "https://docs.greenlang.io/packs/sfdr-article-9"
  changelog_url: "https://docs.greenlang.io/packs/sfdr-article-9/changelog"

