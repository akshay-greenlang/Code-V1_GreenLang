# =============================================================================
# GL-Taxonomy-APP v1.0 -- EU Taxonomy Alignment & Green Investment Ratio
#                          Platform Configuration
# =============================================================================
# Standard: EU Taxonomy Regulation 2020/852 (June 2020)
# Climate DA: Commission Delegated Regulation 2021/2139 (June 2021)
# Environmental DA: Commission Delegated Regulation 2023/2486 (June 2023)
# Article 8 DA: Commission Delegated Regulation 2021/4987 (July 2021)
# EBA ITS: EBA ITS on Pillar 3 ESG Disclosures (CRR Article 449a)
# Omnibus: Omnibus I Simplification Package (proposed Feb 2025)
#
# This file is the single source of truth for all EU Taxonomy-specific
# configuration consumed by the activity screening engine, substantial
# contribution engine, DNSH assessment engine, minimum safeguards engine,
# KPI calculation engine, GAR calculation engine, alignment engine,
# reporting engine, data quality engine, and regulatory update engine.
#
# IMPORTANT: All thresholds, criteria, and activity codes are sourced
# directly from the official EU Taxonomy Delegated Acts and Technical
# Screening Criteria Annexes.  The alignment engine performs deterministic
# threshold checks -- zero hallucination for compliance values.
#
# Environment variable overrides use the TAXONOMY_APP_ prefix.
# Example: TAXONOMY_APP_DEBUG=true, TAXONOMY_APP_LOG_LEVEL=DEBUG
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Application Metadata
# ---------------------------------------------------------------------------
application:
  name: "GL-Taxonomy-APP"
  version: "1.0.0"
  description: "EU Taxonomy Alignment & Green Investment Ratio Platform"
  standard: "EU Taxonomy Regulation 2020/852"
  climate_da: "Commission Delegated Regulation 2021/2139"
  environmental_da: "Commission Delegated Regulation 2023/2486"
  article_8_da: "Commission Delegated Regulation 2021/4987"
  eba_its: "EBA ITS on Pillar 3 ESG Disclosures"
  supported_years: [2024, 2025, 2026]
  default_year: 2026
  log_level: INFO
  debug: false
  base_url: "https://api.greenlang.io/taxonomy/v1"

# ---------------------------------------------------------------------------
# 2. Environmental Objectives (Article 9, Regulation 2020/852)
# ---------------------------------------------------------------------------
# The EU Taxonomy defines 6 environmental objectives.  An economic activity
# must make a substantial contribution to at least one objective, do no
# significant harm (DNSH) to the remaining five, and comply with minimum
# safeguards.
# ---------------------------------------------------------------------------
environmental_objectives:
  climate_change_mitigation:
    name: "Climate Change Mitigation"
    abbreviation: "CCM"
    article: "Article 10"
    description: "Substantial contribution to stabilising GHG concentrations at a level consistent with the Paris Agreement long-term temperature goal of 1.5C"
    delegated_act: "Climate DA 2021/2139, Annex I"
    application_date: "2022-01-01"
    activity_count: 88
  climate_change_adaptation:
    name: "Climate Change Adaptation"
    abbreviation: "CCA"
    article: "Article 11"
    description: "Substantial contribution to reducing material physical climate risks through adaptation solutions and activities"
    delegated_act: "Climate DA 2021/2139, Annex II"
    application_date: "2022-01-01"
    activity_count: 68
  sustainable_use_water:
    name: "Sustainable Use and Protection of Water and Marine Resources"
    abbreviation: "WTR"
    article: "Article 12"
    description: "Substantial contribution to achieving good status of water bodies or preventing deterioration of marine environments"
    delegated_act: "Environmental DA 2023/2486, Annex I"
    application_date: "2024-01-01"
    activity_count: 18
  circular_economy:
    name: "Transition to a Circular Economy"
    abbreviation: "CE"
    article: "Article 13"
    description: "Substantial contribution to transitioning to circular economy through waste prevention, reuse, recycling, and resource efficiency"
    delegated_act: "Environmental DA 2023/2486, Annex II"
    application_date: "2024-01-01"
    activity_count: 22
  pollution_prevention:
    name: "Pollution Prevention and Control"
    abbreviation: "PPC"
    article: "Article 14"
    description: "Substantial contribution to preventing or reducing pollutant emissions to air, water, or land"
    delegated_act: "Environmental DA 2023/2486, Annex III"
    application_date: "2024-01-01"
    activity_count: 12
  biodiversity:
    name: "Protection and Restoration of Biodiversity and Ecosystems"
    abbreviation: "BIO"
    article: "Article 15"
    description: "Substantial contribution to protecting, conserving, or restoring biodiversity and ecosystem services"
    delegated_act: "Environmental DA 2023/2486, Annex IV"
    application_date: "2024-01-01"
    activity_count: 14

# ---------------------------------------------------------------------------
# 3. Delegated Acts
# ---------------------------------------------------------------------------
# The EU Taxonomy is operationalized through Delegated Acts that define the
# Technical Screening Criteria (TSC), DNSH criteria, and reporting templates
# for each environmental objective.
# ---------------------------------------------------------------------------
delegated_acts:
  climate_da:
    name: "Climate Delegated Act"
    regulation: "Commission Delegated Regulation (EU) 2021/2139"
    effective_date: "2022-01-01"
    version: "2.0"
    objectives_covered: [climate_change_mitigation, climate_change_adaptation]
    annex_count: 2
    amendment_history:
      - date: "2022-03-09"
        regulation: "2022/631"
        description: "Inclusion of certain nuclear and gas activities (Complementary DA)"
      - date: "2023-06-27"
        regulation: "2023/2485"
        description: "Amendment adding manufacturing and transport activities"
      - date: "2023-11-21"
        regulation: "2023/2486"
        description: "Technical corrections and clarifications"
  environmental_da:
    name: "Environmental Delegated Act"
    regulation: "Commission Delegated Regulation (EU) 2023/2486"
    effective_date: "2024-01-01"
    version: "1.0"
    objectives_covered: [sustainable_use_water, circular_economy, pollution_prevention, biodiversity]
    annex_count: 4
    amendment_history: []
  article_8_da:
    name: "Article 8 Delegated Act"
    regulation: "Commission Delegated Regulation (EU) 2021/4987"
    effective_date: "2022-01-01"
    version: "1.1"
    description: "Disclosure rules for non-financial and financial undertakings under Article 8 of the Taxonomy Regulation"
    amendment_history:
      - date: "2023-06-27"
        regulation: "2023/2486"
        description: "Extended to include 4 environmental objectives reporting"
  eba_pillar_3:
    name: "EBA Pillar 3 ESG ITS"
    regulation: "EBA/ITS/2022/01"
    effective_date: "2023-06-28"
    version: "2.0"
    description: "Implementing Technical Standards on prudential disclosures on ESG risks (CRR Article 449a)"
    template_count: 10
    amendment_history:
      - date: "2024-01-01"
        regulation: "EBA/ITS/2023/05"
        description: "Updated GAR templates and BTAR introduction"

# ---------------------------------------------------------------------------
# 4. Sectors (NACE Level-1 Macro Sectors)
# ---------------------------------------------------------------------------
# The EU Taxonomy organizes 150+ economic activities into 13 macro sectors
# aligned with NACE Rev. 2 statistical classification codes.  Each sector
# contains multiple specific activities with individual TSC thresholds.
# ---------------------------------------------------------------------------
sectors:
  forestry:
    name: "Forestry"
    nace_level_1: "A"
    description: "Afforestation, reforestation, forest management, and conservation forestry"
    activity_count: 4
    objectives: [climate_change_mitigation, climate_change_adaptation, biodiversity]
    key_activities: ["A.1 - Afforestation", "A.2 - Rehabilitation of forests", "A.3 - Forest management", "A.4 - Conservation forestry"]
  environmental_protection:
    name: "Environmental Protection and Restoration"
    nace_level_1: "E"
    description: "Restoration of wetlands, environmental remediation, water treatment"
    activity_count: 5
    objectives: [climate_change_mitigation, sustainable_use_water, biodiversity]
    key_activities: ["E.1 - Wetland restoration", "E.2 - Nature-based solutions"]
  manufacturing:
    name: "Manufacturing"
    nace_level_1: "C"
    description: "Low-carbon technologies, cement, iron/steel, aluminium, hydrogen, chemicals, plastics"
    activity_count: 24
    objectives: [climate_change_mitigation, circular_economy, pollution_prevention]
    key_activities: ["C.1 - Cement", "C.2 - Aluminium", "C.3 - Iron and steel", "C.4 - Hydrogen", "C.5 - Chemicals", "C.6 - Plastics"]
  energy:
    name: "Energy"
    nace_level_1: "D"
    description: "Electricity generation from renewables, nuclear, gas, storage, hydrogen, heat/cool networks"
    activity_count: 18
    objectives: [climate_change_mitigation, climate_change_adaptation]
    key_activities: ["D.1 - Solar PV", "D.2 - Wind", "D.3 - Hydropower", "D.4 - Nuclear", "D.5 - Gas co-gen", "D.6 - Storage"]
  water_supply:
    name: "Water Supply, Sewerage, Waste Management"
    nace_level_1: "E"
    description: "Water collection/treatment, sewerage, waste management, material recovery"
    activity_count: 8
    objectives: [sustainable_use_water, circular_economy, pollution_prevention]
    key_activities: ["E.3 - Water supply", "E.4 - Waste collection", "E.5 - Material recovery"]
  transport:
    name: "Transport"
    nace_level_1: "H"
    description: "Rail, road, waterborne, cycling, urban/interurban, freight, infrastructure"
    activity_count: 17
    objectives: [climate_change_mitigation, climate_change_adaptation, pollution_prevention]
    key_activities: ["H.1 - Rail passenger", "H.2 - Rail freight", "H.3 - Urban transport", "H.4 - Low-emission vehicles", "H.5 - Cycling"]
  construction:
    name: "Construction and Real Estate"
    nace_level_1: "F"
    description: "New buildings, renovation, infrastructure for transport/water/energy, demolition"
    activity_count: 10
    objectives: [climate_change_mitigation, climate_change_adaptation, circular_economy]
    key_activities: ["F.1 - New buildings", "F.2 - Renovation", "F.3 - Heating/cooling systems", "F.4 - EV charging"]
  ict:
    name: "Information and Communication"
    nace_level_1: "J"
    description: "Data centres, data-driven solutions, digital enabling activities"
    activity_count: 4
    objectives: [climate_change_mitigation, circular_economy]
    key_activities: ["J.1 - Data centres", "J.2 - Data-driven solutions"]
  professional_activities:
    name: "Professional, Scientific and Technical Activities"
    nace_level_1: "M"
    description: "Climate-related R&D, engineering, consultancy services"
    activity_count: 3
    objectives: [climate_change_mitigation, climate_change_adaptation]
    key_activities: ["M.1 - R&D for climate", "M.2 - Engineering for renewables"]
  financial_insurance:
    name: "Financial and Insurance Activities"
    nace_level_1: "K"
    description: "Lending, investment, insurance for taxonomy-aligned activities"
    activity_count: 4
    objectives: [climate_change_mitigation, climate_change_adaptation]
    key_activities: ["K.1 - Non-life insurance", "K.2 - Reinsurance"]
  education:
    name: "Education"
    nace_level_1: "P"
    description: "Education and training activities related to environmental sustainability"
    activity_count: 2
    objectives: [climate_change_mitigation, climate_change_adaptation]
    key_activities: ["P.1 - Education for sustainability"]
  health:
    name: "Human Health and Social Work"
    nace_level_1: "Q"
    description: "Healthcare and social services with environmental contribution"
    activity_count: 2
    objectives: [climate_change_adaptation, pollution_prevention]
    key_activities: ["Q.1 - Healthcare services"]
  arts_entertainment:
    name: "Arts, Entertainment and Recreation"
    nace_level_1: "R"
    description: "Cultural, sports, and recreational activities with environmental contribution"
    activity_count: 2
    objectives: [biodiversity, climate_change_adaptation]
    key_activities: ["R.1 - Nature-based recreation"]

