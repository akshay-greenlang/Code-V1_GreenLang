contract_version: "2.0"
app_id: "GL-CBAM-APP"
pipeline_id: "cbam-quarterly-v2"
runtime: "greenlang-v2"
stages:
  - id: validate_inputs
    type: validate
  - id: compute_emissions
    type: compute
  - id: apply_policy
    type: policy
  - id: export_outputs
    type: export
  - id: write_audit
    type: audit
runtime_conventions:
  command: "gl run cbam <config.yaml> <imports.csv> <output_dir>"
  success_exit_code: 0
  blocked_exit_code: 4
  artifact_contract:
    - cbam_report.xml
    - report_summary.xlsx
    - audit/run_manifest.json
    - audit/checksums.json
