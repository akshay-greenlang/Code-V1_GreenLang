# ============================================================================
# ESRS METRIC CALCULATION FORMULAS
# ============================================================================
#
# Deterministic calculation formulas for all ESRS metrics
# All formulas are zero-hallucination compatible (database lookups + arithmetic)
#
# Version: 1.1.0
# Standards: ESRS 1, ESRS 2, E1-E5, S1-S4, G1
# Total Formulas: 524
# ============================================================================

metadata:
  title: "ESRS Metric Calculation Formulas"
  version: "1.1.0"
  source: "EFRAG ESRS Set 1 Technical Guidance"
  total_formulas: 524
  standards_covered: ["ESRS-1", "ESRS-2", "E1", "E2", "E3", "E4", "E5", "S1", "S2", "S3", "S4", "G1"]
  last_updated: "2026-03-01"

# ============================================================================
# E1: CLIMATE CHANGE (82 formulas)
# ============================================================================

E1_formulas:

  # --- E1 GHG EMISSIONS: SCOPE 1 ---

  E1_001_scope1_total:
    metric_code: "E1-1"
    metric_name: "Total Scope 1 GHG Emissions"
    formula: "scope1_stationary + scope1_mobile + scope1_process + scope1_fugitive"
    unit: "tCO2e"
    inputs:
      - scope1_stationary_combustion
      - scope1_mobile_combustion
      - scope1_process_emissions
      - scope1_fugitive_emissions
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_002_scope1_stationary:
    metric_code: "E1-1-1"
    metric_name: "Scope 1 - Stationary Combustion"
    formula: "SUM(fuel_consumption[i] * emission_factor[fuel_type[i]]) for all fuels"
    unit: "tCO2e"
    inputs:
      - fuel_consumption
      - fuel_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_003_scope1_mobile:
    metric_code: "E1-1-2"
    metric_name: "Scope 1 - Mobile Combustion"
    formula: "SUM(distance[i] * ef[vehicle_type[i]]) + SUM(fuel[j] * ef[fuel_type[j]])"
    unit: "tCO2e"
    inputs:
      - distance
      - vehicle_type
      - fuel_consumption
      - fuel_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_004_scope1_process:
    metric_code: "E1-1-3"
    metric_name: "Scope 1 - Process Emissions"
    formula: "SUM(process_output[i] * ef[process_type[i]])"
    unit: "tCO2e"
    inputs:
      - process_output
      - process_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_005_scope1_fugitive:
    metric_code: "E1-1-4"
    metric_name: "Scope 1 - Fugitive Emissions"
    formula: "SUM(refrigerant_leakage[i] * gwp[refrigerant_type[i]])"
    unit: "tCO2e"
    inputs:
      - refrigerant_leakage
      - refrigerant_type
      - gwp_database
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_006_scope1_co2:
    metric_code: "E1-1-CO2"
    metric_name: "Scope 1 CO2 Emissions"
    formula: "SUM(fuel_consumption[i] * co2_factor[fuel_type[i]])"
    unit: "tCO2"
    inputs:
      - fuel_consumption
      - fuel_type
      - co2_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_007_scope1_ch4:
    metric_code: "E1-1-CH4"
    metric_name: "Scope 1 CH4 Emissions"
    formula: "SUM(fuel_consumption[i] * ch4_factor[fuel_type[i]] * gwp_ch4)"
    unit: "tCO2e"
    inputs:
      - fuel_consumption
      - fuel_type
      - ch4_emission_factors
      - gwp_ch4
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_008_scope1_n2o:
    metric_code: "E1-1-N2O"
    metric_name: "Scope 1 N2O Emissions"
    formula: "SUM(fuel_consumption[i] * n2o_factor[fuel_type[i]] * gwp_n2o)"
    unit: "tCO2e"
    inputs:
      - fuel_consumption
      - fuel_type
      - n2o_emission_factors
      - gwp_n2o
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_009_scope1_hfcs:
    metric_code: "E1-1-HFC"
    metric_name: "Scope 1 HFC Emissions"
    formula: "SUM(hfc_leakage[i] * gwp[hfc_type[i]])"
    unit: "tCO2e"
    inputs:
      - hfc_leakage
      - hfc_type
      - gwp_database
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_010_scope1_pfcs:
    metric_code: "E1-1-PFC"
    metric_name: "Scope 1 PFC Emissions"
    formula: "SUM(pfc_release[i] * gwp[pfc_type[i]])"
    unit: "tCO2e"
    inputs:
      - pfc_release
      - pfc_type
      - gwp_database
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_011_scope1_sf6:
    metric_code: "E1-1-SF6"
    metric_name: "Scope 1 SF6 Emissions"
    formula: "sf6_leakage * gwp_sf6"
    unit: "tCO2e"
    inputs:
      - sf6_leakage
      - gwp_sf6
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  E1_012_scope1_nf3:
    metric_code: "E1-1-NF3"
    metric_name: "Scope 1 NF3 Emissions"
    formula: "nf3_release * gwp_nf3"
    unit: "tCO2e"
    inputs:
      - nf3_release
      - gwp_nf3
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  E1_013_scope1_biogenic:
    metric_code: "E1-1-BIO"
    metric_name: "Scope 1 Biogenic CO2 Emissions"
    formula: "SUM(biofuel_consumption[i] * biogenic_co2_factor[fuel_type[i]])"
    unit: "tCO2"
    inputs:
      - biofuel_consumption
      - fuel_type
      - biogenic_co2_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true
    note: "Reported separately per GHG Protocol; not included in Scope 1 total"

  # --- E1 GHG EMISSIONS: SCOPE 2 ---

  E1_014_scope2_location:
    metric_code: "E1-2"
    metric_name: "Scope 2 GHG Emissions (Location-Based)"
    formula: "SUM(electricity[i] * grid_factor[region[i]]) + SUM(heat_steam[j] * heat_factor[region[j]])"
    unit: "tCO2e"
    inputs:
      - electricity_purchased
      - region
      - grid_emission_factors
      - heat_steam_purchased
      - heat_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_015_scope2_market:
    metric_code: "E1-2A"
    metric_name: "Scope 2 GHG Emissions (Market-Based)"
    formula: "SUM(electricity[i] * contractual_factor[contract[i]])"
    unit: "tCO2e"
    inputs:
      - electricity_purchased
      - contractual_instrument
      - contractual_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_016_scope2_electricity_location:
    metric_code: "E1-2-ELEC-L"
    metric_name: "Scope 2 Electricity Emissions (Location-Based)"
    formula: "SUM(electricity_kwh[i] * grid_ef[region[i]] / 1000)"
    unit: "tCO2e"
    inputs:
      - electricity_kwh
      - region
      - grid_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_017_scope2_heat_location:
    metric_code: "E1-2-HEAT-L"
    metric_name: "Scope 2 Heat/Steam Emissions (Location-Based)"
    formula: "SUM(heat_kwh[i] * heat_ef[region[i]] / 1000)"
    unit: "tCO2e"
    inputs:
      - heat_kwh
      - region
      - heat_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_018_scope2_cooling_location:
    metric_code: "E1-2-COOL-L"
    metric_name: "Scope 2 Cooling Emissions (Location-Based)"
    formula: "SUM(cooling_kwh[i] * cooling_ef[region[i]] / 1000)"
    unit: "tCO2e"
    inputs:
      - cooling_kwh
      - region
      - cooling_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_019_scope2_recs_avoided:
    metric_code: "E1-2-RECS"
    metric_name: "Scope 2 Emissions Avoided via RECs"
    formula: "recs_mwh * grid_ef_avg - recs_mwh * rec_ef"
    unit: "tCO2e"
    inputs:
      - recs_mwh
      - grid_ef_avg
      - rec_ef
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  # --- E1 GHG EMISSIONS: SCOPE 3 ---

  E1_020_scope3_total:
    metric_code: "E1-3"
    metric_name: "Total Scope 3 GHG Emissions"
    formula: "SUM(scope3_category[i]) for i in 1..15"
    unit: "tCO2e"
    inputs:
      - scope3_cat1_purchased_goods
      - scope3_cat2_capital_goods
      - scope3_cat3_fuel_energy
      - scope3_cat4_upstream_transport
      - scope3_cat5_waste
      - scope3_cat6_business_travel
      - scope3_cat7_employee_commuting
      - scope3_cat8_upstream_leased
      - scope3_cat9_downstream_transport
      - scope3_cat10_processing
      - scope3_cat11_use_of_products
      - scope3_cat12_end_of_life
      - scope3_cat13_downstream_leased
      - scope3_cat14_franchises
      - scope3_cat15_investments
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_021_scope3_cat1:
    metric_code: "E1-3-1"
    metric_name: "Scope 3 Cat 1: Purchased Goods and Services"
    formula: "SUM(spend[i] * eeio_ef[category[i]]) OR SUM(mass[j] * physical_ef[material[j]])"
    unit: "tCO2e"
    inputs:
      - procurement_spend
      - procurement_category
      - mass_purchased
      - material_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true
    methods: ["spend-based", "average-data", "supplier-specific", "hybrid"]

  E1_022_scope3_cat2:
    metric_code: "E1-3-2"
    metric_name: "Scope 3 Cat 2: Capital Goods"
    formula: "SUM(capex_spend[i] * eeio_ef[asset_category[i]])"
    unit: "tCO2e"
    inputs:
      - capex_spend
      - asset_category
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true
    note: "100% year-of-acquisition; no depreciation"

  E1_023_scope3_cat3:
    metric_code: "E1-3-3"
    metric_name: "Scope 3 Cat 3: Fuel and Energy Activities"
    formula: "wtt_fuel + upstream_electricity + td_losses + generation_sold"
    unit: "tCO2e"
    inputs:
      - wtt_fuel_emissions
      - upstream_electricity_emissions
      - td_loss_emissions
      - generation_sold_emissions
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_024_scope3_cat4:
    metric_code: "E1-3-4"
    metric_name: "Scope 3 Cat 4: Upstream Transportation"
    formula: "SUM(tonne_km[i] * ef[mode[i]]) + SUM(fuel[j] * ef[fuel_type[j]])"
    unit: "tCO2e"
    inputs:
      - tonne_km
      - transport_mode
      - fuel_consumption
      - fuel_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_025_scope3_cat5:
    metric_code: "E1-3-5"
    metric_name: "Scope 3 Cat 5: Waste Generated in Operations"
    formula: "SUM(waste_mass[i] * ef[treatment_method[i], waste_type[i]])"
    unit: "tCO2e"
    inputs:
      - waste_mass
      - treatment_method
      - waste_type
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_026_scope3_cat6:
    metric_code: "E1-3-6"
    metric_name: "Scope 3 Cat 6: Business Travel"
    formula: "SUM(distance[i] * ef[travel_mode[i], class[i]])"
    unit: "tCO2e"
    inputs:
      - travel_distance
      - travel_mode
      - travel_class
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_027_scope3_cat7:
    metric_code: "E1-3-7"
    metric_name: "Scope 3 Cat 7: Employee Commuting"
    formula: "SUM(employees[i] * avg_distance[i] * working_days * 2 * ef[commute_mode[i]])"
    unit: "tCO2e"
    inputs:
      - employee_count
      - average_commute_distance
      - working_days_per_year
      - commute_mode
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_028_scope3_cat8:
    metric_code: "E1-3-8"
    metric_name: "Scope 3 Cat 8: Upstream Leased Assets"
    formula: "SUM(asset_area[i] * ef[asset_type[i], region[i]])"
    unit: "tCO2e"
    inputs:
      - asset_area
      - asset_type
      - region
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_029_scope3_cat9:
    metric_code: "E1-3-9"
    metric_name: "Scope 3 Cat 9: Downstream Transportation"
    formula: "SUM(tonne_km[i] * ef[mode[i]])"
    unit: "tCO2e"
    inputs:
      - tonne_km
      - transport_mode
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_030_scope3_cat10:
    metric_code: "E1-3-10"
    metric_name: "Scope 3 Cat 10: Processing of Sold Products"
    formula: "SUM(product_mass[i] * processing_ef[product_type[i]])"
    unit: "tCO2e"
    inputs:
      - product_mass
      - product_type
      - processing_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_031_scope3_cat11:
    metric_code: "E1-3-11"
    metric_name: "Scope 3 Cat 11: Use of Sold Products"
    formula: "SUM(units_sold[i] * lifetime_use_ef[product_type[i]])"
    unit: "tCO2e"
    inputs:
      - units_sold
      - product_type
      - lifetime_use_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_032_scope3_cat12:
    metric_code: "E1-3-12"
    metric_name: "Scope 3 Cat 12: End-of-Life Treatment of Sold Products"
    formula: "SUM(units_sold[i] * product_mass[i] * eol_ef[disposal_method[i]])"
    unit: "tCO2e"
    inputs:
      - units_sold
      - product_mass
      - disposal_method
      - eol_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_033_scope3_cat13:
    metric_code: "E1-3-13"
    metric_name: "Scope 3 Cat 13: Downstream Leased Assets"
    formula: "SUM(leased_area[i] * ef[asset_type[i], region[i]])"
    unit: "tCO2e"
    inputs:
      - leased_area
      - asset_type
      - region
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_034_scope3_cat14:
    metric_code: "E1-3-14"
    metric_name: "Scope 3 Cat 14: Franchises"
    formula: "SUM(franchise_area[i] * ef[franchise_type[i], region[i]])"
    unit: "tCO2e"
    inputs:
      - franchise_area
      - franchise_type
      - region
      - emission_factor_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_035_scope3_cat15:
    metric_code: "E1-3-15"
    metric_name: "Scope 3 Cat 15: Investments"
    formula: "SUM(investment_value[i] / investee_revenue[i] * investee_emissions[i])"
    unit: "tCO2e"
    inputs:
      - investment_value
      - investee_revenue
      - investee_emissions
    calculation_type: "ratio_and_multiply"
    deterministic: true
    zero_hallucination: true

  E1_036_scope3_upstream_total:
    metric_code: "E1-3-UP"
    metric_name: "Scope 3 Upstream Total"
    formula: "cat1 + cat2 + cat3 + cat4 + cat5 + cat6 + cat7 + cat8"
    unit: "tCO2e"
    inputs:
      - scope3_cat1 through scope3_cat8
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_037_scope3_downstream_total:
    metric_code: "E1-3-DN"
    metric_name: "Scope 3 Downstream Total"
    formula: "cat9 + cat10 + cat11 + cat12 + cat13 + cat14 + cat15"
    unit: "tCO2e"
    inputs:
      - scope3_cat9 through scope3_cat15
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  # --- E1 GHG TOTALS AND INTENSITIES ---

  E1_038_total_ghg:
    metric_code: "E1-4"
    metric_name: "Total GHG Emissions"
    formula: "scope1_total + scope2_location + scope3_total"
    unit: "tCO2e"
    inputs:
      - E1_001_scope1_total
      - E1_014_scope2_location
      - E1_020_scope3_total
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_039_total_ghg_market:
    metric_code: "E1-4A"
    metric_name: "Total GHG Emissions (Market-Based)"
    formula: "scope1_total + scope2_market + scope3_total"
    unit: "tCO2e"
    inputs:
      - E1_001_scope1_total
      - E1_015_scope2_market
      - E1_020_scope3_total
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_040_ghg_intensity_revenue:
    metric_code: "E1-INT-REV"
    metric_name: "GHG Intensity per Revenue"
    formula: "total_ghg / (revenue / 1000000)"
    unit: "tCO2e per EUR million"
    inputs:
      - total_ghg_emissions
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_041_ghg_intensity_fte:
    metric_code: "E1-INT-FTE"
    metric_name: "GHG Intensity per FTE"
    formula: "total_ghg / employee_fte"
    unit: "tCO2e per FTE"
    inputs:
      - total_ghg_emissions
      - employee_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_042_ghg_intensity_unit:
    metric_code: "E1-INT-UNIT"
    metric_name: "GHG Intensity per Unit of Product"
    formula: "total_ghg / total_units_produced"
    unit: "tCO2e per unit"
    inputs:
      - total_ghg_emissions
      - total_units_produced
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_043_scope1_intensity_revenue:
    metric_code: "E1-INT-S1R"
    metric_name: "Scope 1 Intensity per Revenue"
    formula: "scope1_total / (revenue / 1000000)"
    unit: "tCO2e per EUR million"
    inputs:
      - scope1_total
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_044_scope2_intensity_revenue:
    metric_code: "E1-INT-S2R"
    metric_name: "Scope 2 Intensity per Revenue"
    formula: "scope2_total / (revenue / 1000000)"
    unit: "tCO2e per EUR million"
    inputs:
      - scope2_total
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_045_scope12_intensity_revenue:
    metric_code: "E1-INT-S12R"
    metric_name: "Scope 1+2 Intensity per Revenue"
    formula: "(scope1_total + scope2_total) / (revenue / 1000000)"
    unit: "tCO2e per EUR million"
    inputs:
      - scope1_total
      - scope2_total
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  # --- E1 ENERGY ---

  E1_046_total_energy:
    metric_code: "E1-5"
    metric_name: "Total Energy Consumption"
    formula: "renewable_energy + non_renewable_energy"
    unit: "MWh"
    inputs:
      - renewable_energy_consumption
      - non_renewable_energy_consumption
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_047_renewable_energy:
    metric_code: "E1-6"
    metric_name: "Renewable Energy Consumption"
    formula: "SUM(source[i]) WHERE source_type IN (solar, wind, hydro, geothermal, biomass)"
    unit: "MWh"
    inputs:
      - energy_consumption_by_source
      - source_type
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E1_048_nonrenewable_energy:
    metric_code: "E1-6A"
    metric_name: "Non-Renewable Energy Consumption"
    formula: "SUM(source[i]) WHERE source_type IN (coal, oil, natural_gas, nuclear)"
    unit: "MWh"
    inputs:
      - energy_consumption_by_source
      - source_type
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E1_049_renewable_pct:
    metric_code: "E1-7"
    metric_name: "Renewable Energy Percentage"
    formula: "(renewable_energy / total_energy) * 100"
    unit: "percentage"
    inputs:
      - renewable_energy
      - total_energy
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_050_energy_self_generated:
    metric_code: "E1-5-SG"
    metric_name: "Self-Generated Energy"
    formula: "SUM(self_generated[i]) by source"
    unit: "MWh"
    inputs:
      - self_generated_energy_by_source
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_051_energy_purchased:
    metric_code: "E1-5-PUR"
    metric_name: "Purchased Energy"
    formula: "purchased_electricity + purchased_heat + purchased_steam + purchased_cooling"
    unit: "MWh"
    inputs:
      - purchased_electricity
      - purchased_heat
      - purchased_steam
      - purchased_cooling
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_052_energy_sold:
    metric_code: "E1-5-SOLD"
    metric_name: "Energy Sold"
    formula: "SUM(energy_sold[i]) by type"
    unit: "MWh"
    inputs:
      - energy_sold_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_053_net_energy:
    metric_code: "E1-5-NET"
    metric_name: "Net Energy Consumption"
    formula: "total_energy - energy_sold"
    unit: "MWh"
    inputs:
      - total_energy
      - energy_sold
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E1_054_energy_intensity_revenue:
    metric_code: "E1-5-INT-R"
    metric_name: "Energy Intensity per Revenue"
    formula: "total_energy / (revenue / 1000000)"
    unit: "MWh per EUR million"
    inputs:
      - total_energy
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_055_energy_intensity_fte:
    metric_code: "E1-5-INT-F"
    metric_name: "Energy Intensity per FTE"
    formula: "total_energy / employee_fte"
    unit: "MWh per FTE"
    inputs:
      - total_energy
      - employee_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_056_energy_intensity_unit:
    metric_code: "E1-5-INT-U"
    metric_name: "Energy Intensity per Unit"
    formula: "total_energy / total_units_produced"
    unit: "MWh per unit"
    inputs:
      - total_energy
      - total_units_produced
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_057_energy_fossil_fuel:
    metric_code: "E1-5-FF"
    metric_name: "Fossil Fuel Energy Consumption"
    formula: "coal_energy + oil_energy + natural_gas_energy"
    unit: "MWh"
    inputs:
      - coal_energy
      - oil_energy
      - natural_gas_energy
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_058_fossil_fuel_pct:
    metric_code: "E1-5-FF-PCT"
    metric_name: "Fossil Fuel Energy Percentage"
    formula: "(fossil_fuel_energy / total_energy) * 100"
    unit: "percentage"
    inputs:
      - fossil_fuel_energy
      - total_energy
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_059_nuclear_pct:
    metric_code: "E1-5-NUC-PCT"
    metric_name: "Nuclear Energy Percentage"
    formula: "(nuclear_energy / total_energy) * 100"
    unit: "percentage"
    inputs:
      - nuclear_energy
      - total_energy
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  # --- E1 TARGETS AND PROGRESS ---

  E1_060_ghg_yoy_change:
    metric_code: "E1-YOY"
    metric_name: "GHG Emissions Year-over-Year Change"
    formula: "((current_year_ghg - previous_year_ghg) / previous_year_ghg) * 100"
    unit: "percentage"
    inputs:
      - current_year_ghg
      - previous_year_ghg
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_061_scope1_yoy:
    metric_code: "E1-YOY-S1"
    metric_name: "Scope 1 Year-over-Year Change"
    formula: "((current_scope1 - previous_scope1) / previous_scope1) * 100"
    unit: "percentage"
    inputs:
      - current_scope1
      - previous_scope1
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_062_scope2_yoy:
    metric_code: "E1-YOY-S2"
    metric_name: "Scope 2 Year-over-Year Change"
    formula: "((current_scope2 - previous_scope2) / previous_scope2) * 100"
    unit: "percentage"
    inputs:
      - current_scope2
      - previous_scope2
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_063_scope3_yoy:
    metric_code: "E1-YOY-S3"
    metric_name: "Scope 3 Year-over-Year Change"
    formula: "((current_scope3 - previous_scope3) / previous_scope3) * 100"
    unit: "percentage"
    inputs:
      - current_scope3
      - previous_scope3
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_064_sbti_progress_s12:
    metric_code: "E1-SBTI-S12"
    metric_name: "SBTi Target Progress (Scope 1+2)"
    formula: "((base_year_s12 - current_s12) / (base_year_s12 - target_s12)) * 100"
    unit: "percentage"
    inputs:
      - base_year_scope12
      - current_scope12
      - target_scope12
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_065_sbti_progress_s3:
    metric_code: "E1-SBTI-S3"
    metric_name: "SBTi Target Progress (Scope 3)"
    formula: "((base_year_s3 - current_s3) / (base_year_s3 - target_s3)) * 100"
    unit: "percentage"
    inputs:
      - base_year_scope3
      - current_scope3
      - target_scope3
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_066_absolute_reduction_base:
    metric_code: "E1-RED-ABS"
    metric_name: "Absolute Emissions Reduction from Base Year"
    formula: "base_year_emissions - current_year_emissions"
    unit: "tCO2e"
    inputs:
      - base_year_emissions
      - current_year_emissions
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E1_067_pct_reduction_base:
    metric_code: "E1-RED-PCT"
    metric_name: "Percentage Reduction from Base Year"
    formula: "((base_year - current_year) / base_year) * 100"
    unit: "percentage"
    inputs:
      - base_year_emissions
      - current_year_emissions
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_068_linear_target_trajectory:
    metric_code: "E1-TRAJ"
    metric_name: "Linear Target Trajectory Value"
    formula: "base_year - (base_year - target) * ((current_year - base_year_date) / (target_year - base_year_date))"
    unit: "tCO2e"
    inputs:
      - base_year_emissions
      - target_emissions
      - current_year
      - base_year_date
      - target_year
    calculation_type: "linear_interpolation"
    deterministic: true
    zero_hallucination: true

  E1_069_target_gap:
    metric_code: "E1-TGAP"
    metric_name: "Gap to Target Trajectory"
    formula: "current_emissions - linear_target_trajectory"
    unit: "tCO2e"
    inputs:
      - current_emissions
      - linear_target_trajectory
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  # --- E1 CARBON CREDITS AND PRICING ---

  E1_070_carbon_credits_retired:
    metric_code: "E1-CC-RET"
    metric_name: "Carbon Credits Retired"
    formula: "SUM(credits_retired[i])"
    unit: "tCO2e"
    inputs:
      - credits_retired_by_project
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_071_carbon_credits_purchased:
    metric_code: "E1-CC-PUR"
    metric_name: "Carbon Credits Purchased"
    formula: "SUM(credits_purchased[i])"
    unit: "tCO2e"
    inputs:
      - credits_purchased_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E1_072_carbon_credit_spend:
    metric_code: "E1-CC-SPEND"
    metric_name: "Carbon Credit Total Spend"
    formula: "SUM(credits[i] * price_per_credit[i])"
    unit: "EUR"
    inputs:
      - credits_by_type
      - price_per_credit
    calculation_type: "sum_product"
    deterministic: true
    zero_hallucination: true

  E1_073_carbon_credit_avg_price:
    metric_code: "E1-CC-AVG"
    metric_name: "Average Carbon Credit Price"
    formula: "total_credit_spend / total_credits_retired"
    unit: "EUR per tCO2e"
    inputs:
      - total_credit_spend
      - total_credits_retired
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E1_074_net_emissions_after_credits:
    metric_code: "E1-NET"
    metric_name: "Net Emissions After Carbon Credits"
    formula: "total_ghg - carbon_credits_retired"
    unit: "tCO2e"
    inputs:
      - total_ghg_emissions
      - carbon_credits_retired
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true
    note: "Reported separately; does not replace gross emissions"

  E1_075_internal_carbon_price:
    metric_code: "E1-ICP"
    metric_name: "Internal Carbon Price"
    formula: "internal_carbon_price_per_tonne"
    unit: "EUR per tCO2e"
    inputs:
      - internal_carbon_price_per_tonne
    calculation_type: "direct_value"
    deterministic: true
    zero_hallucination: true

  E1_076_shadow_carbon_cost:
    metric_code: "E1-ICP-COST"
    metric_name: "Shadow Carbon Cost"
    formula: "total_ghg * internal_carbon_price"
    unit: "EUR"
    inputs:
      - total_ghg_emissions
      - internal_carbon_price
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  E1_077_carbon_cost_pct_revenue:
    metric_code: "E1-ICP-REV"
    metric_name: "Carbon Cost as Percentage of Revenue"
    formula: "(shadow_carbon_cost / revenue) * 100"
    unit: "percentage"
    inputs:
      - shadow_carbon_cost
      - revenue
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_078_eu_ets_exposure:
    metric_code: "E1-ETS"
    metric_name: "EU ETS Compliance Cost"
    formula: "ets_liable_emissions * ets_allowance_price - free_allowances * ets_allowance_price"
    unit: "EUR"
    inputs:
      - ets_liable_emissions
      - ets_allowance_price
      - free_allowances
    calculation_type: "multiply_and_subtract"
    deterministic: true
    zero_hallucination: true

  E1_079_energy_yoy_change:
    metric_code: "E1-5-YOY"
    metric_name: "Energy Consumption Year-over-Year Change"
    formula: "((current_energy - previous_energy) / previous_energy) * 100"
    unit: "percentage"
    inputs:
      - current_energy
      - previous_energy
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E1_080_renewable_yoy_change:
    metric_code: "E1-7-YOY"
    metric_name: "Renewable Percentage Year-over-Year Change"
    formula: "current_renewable_pct - previous_renewable_pct"
    unit: "percentage points"
    inputs:
      - current_renewable_pct
      - previous_renewable_pct
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E1_081_scope3_cat1_pct:
    metric_code: "E1-3-1-PCT"
    metric_name: "Scope 3 Category 1 as Percentage of Total Scope 3"
    formula: "(scope3_cat1 / scope3_total) * 100"
    unit: "percentage"
    inputs:
      - scope3_cat1
      - scope3_total
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E1_082_scope3_top3_categories:
    metric_code: "E1-3-TOP3"
    metric_name: "Top 3 Scope 3 Categories Share"
    formula: "(top3_sum / scope3_total) * 100"
    unit: "percentage"
    inputs:
      - scope3_categories_sorted_desc
      - scope3_total
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

# ============================================================================
# E2: POLLUTION (41 formulas)
# ============================================================================

E2_formulas:

  # --- E2 AIR POLLUTANTS ---

  E2_001_nox:
    metric_code: "E2-1-NOx"
    metric_name: "Emissions of NOx"
    formula: "SUM(fuel_consumption[i] * nox_factor[fuel_type[i]])"
    unit: "tonnes"
    inputs:
      - fuel_consumption
      - fuel_type
      - nox_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_002_sox:
    metric_code: "E2-1-SOx"
    metric_name: "Emissions of SOx"
    formula: "SUM(fuel_consumption[i] * sox_factor[fuel_type[i]])"
    unit: "tonnes"
    inputs:
      - fuel_consumption
      - fuel_type
      - sox_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_003_pm25:
    metric_code: "E2-1-PM25"
    metric_name: "Emissions of PM2.5"
    formula: "SUM(fuel_consumption[i] * pm25_factor[fuel_type[i]])"
    unit: "tonnes"
    inputs:
      - fuel_consumption
      - fuel_type
      - pm25_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_004_pm10:
    metric_code: "E2-1-PM10"
    metric_name: "Emissions of PM10"
    formula: "SUM(fuel_consumption[i] * pm10_factor[fuel_type[i]])"
    unit: "tonnes"
    inputs:
      - fuel_consumption
      - fuel_type
      - pm10_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_005_total_pm:
    metric_code: "E2-1-PM"
    metric_name: "Total Particulate Matter"
    formula: "pm25_emissions + pm10_emissions"
    unit: "tonnes"
    inputs:
      - pm25_emissions
      - pm10_emissions
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_006_voc:
    metric_code: "E2-1-VOC"
    metric_name: "Volatile Organic Compounds"
    formula: "SUM(process_output[i] * voc_factor[process_type[i]])"
    unit: "tonnes"
    inputs:
      - process_output
      - process_type
      - voc_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_007_hap:
    metric_code: "E2-1-HAP"
    metric_name: "Hazardous Air Pollutants"
    formula: "SUM(hap_release[i]) by substance"
    unit: "tonnes"
    inputs:
      - hap_releases_by_substance
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_008_total_air_pollutants:
    metric_code: "E2-1-TOTAL"
    metric_name: "Total Air Pollutant Emissions"
    formula: "nox + sox + pm_total + voc + hap + co + nh3"
    unit: "tonnes"
    inputs:
      - nox_emissions
      - sox_emissions
      - pm_total
      - voc_emissions
      - hap_emissions
      - co_emissions
      - nh3_emissions
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_009_co_emissions:
    metric_code: "E2-1-CO"
    metric_name: "Carbon Monoxide Emissions"
    formula: "SUM(fuel_consumption[i] * co_factor[fuel_type[i]])"
    unit: "tonnes"
    inputs:
      - fuel_consumption
      - fuel_type
      - co_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_010_nh3_emissions:
    metric_code: "E2-1-NH3"
    metric_name: "Ammonia Emissions"
    formula: "SUM(activity[i] * nh3_factor[activity_type[i]])"
    unit: "tonnes"
    inputs:
      - activity_data
      - activity_type
      - nh3_emission_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  E2_011_heavy_metals_air:
    metric_code: "E2-1-HM"
    metric_name: "Heavy Metals to Air"
    formula: "SUM(metal_release[i]) for Hg, Pb, Cd, As, Cr, Ni"
    unit: "kg"
    inputs:
      - heavy_metal_releases_air
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_012_odp_substances:
    metric_code: "E2-1-ODP"
    metric_name: "Ozone-Depleting Substance Emissions"
    formula: "SUM(ods_release[i] * odp[substance[i]])"
    unit: "kg CFC-11 eq"
    inputs:
      - ods_releases
      - substance_type
      - ozone_depletion_potential_db
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  # --- E2 WATER POLLUTANTS ---

  E2_013_water_pollutants_total:
    metric_code: "E2-3"
    metric_name: "Total Emissions to Water"
    formula: "SUM(concentration[i] * discharge_volume * 1e-6)"
    unit: "tonnes"
    inputs:
      - pollutant_concentration
      - water_discharge_volume
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_014_cod:
    metric_code: "E2-3-COD"
    metric_name: "Chemical Oxygen Demand in Discharge"
    formula: "cod_concentration * discharge_volume / 1000000"
    unit: "tonnes"
    inputs:
      - cod_concentration_mg_l
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_015_bod:
    metric_code: "E2-3-BOD"
    metric_name: "Biological Oxygen Demand in Discharge"
    formula: "bod_concentration * discharge_volume / 1000000"
    unit: "tonnes"
    inputs:
      - bod_concentration_mg_l
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_016_tss:
    metric_code: "E2-3-TSS"
    metric_name: "Total Suspended Solids in Discharge"
    formula: "tss_concentration * discharge_volume / 1000000"
    unit: "tonnes"
    inputs:
      - tss_concentration_mg_l
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_017_nitrogen_water:
    metric_code: "E2-3-N"
    metric_name: "Total Nitrogen to Water"
    formula: "nitrogen_concentration * discharge_volume / 1000000"
    unit: "tonnes"
    inputs:
      - nitrogen_concentration_mg_l
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_018_phosphorus_water:
    metric_code: "E2-3-P"
    metric_name: "Total Phosphorus to Water"
    formula: "phosphorus_concentration * discharge_volume / 1000000"
    unit: "tonnes"
    inputs:
      - phosphorus_concentration_mg_l
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  E2_019_heavy_metals_water:
    metric_code: "E2-3-HM"
    metric_name: "Heavy Metals to Water"
    formula: "SUM(metal_concentration[i] * discharge_volume / 1e6)"
    unit: "kg"
    inputs:
      - heavy_metal_concentrations
      - discharge_volume_m3
    calculation_type: "multiply_and_convert"
    deterministic: true
    zero_hallucination: true

  # --- E2 SOIL POLLUTANTS ---

  E2_020_soil_pollutants_total:
    metric_code: "E2-4"
    metric_name: "Total Emissions to Soil"
    formula: "SUM(soil_release[i]) by substance"
    unit: "tonnes"
    inputs:
      - soil_pollutant_releases
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_021_pesticides:
    metric_code: "E2-4-PEST"
    metric_name: "Pesticide Use and Release"
    formula: "SUM(pesticide_applied[i])"
    unit: "tonnes"
    inputs:
      - pesticide_application_data
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_022_fertilizer_runoff:
    metric_code: "E2-4-FERT"
    metric_name: "Fertilizer Runoff to Soil"
    formula: "SUM(fertilizer_applied[i] * runoff_factor[soil_type[i]])"
    unit: "tonnes"
    inputs:
      - fertilizer_applied
      - soil_type
      - runoff_factors
    calculation_type: "database_lookup_and_multiply"
    deterministic: true
    zero_hallucination: true

  # --- E2 SUBSTANCES OF CONCERN ---

  E2_023_soc_total:
    metric_code: "E2-5"
    metric_name: "Total Substances of Concern"
    formula: "SUM(soc_quantity[i]) by substance"
    unit: "tonnes"
    inputs:
      - substances_of_concern_quantities
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_024_svhc_total:
    metric_code: "E2-5-SVHC"
    metric_name: "Substances of Very High Concern (SVHC)"
    formula: "SUM(svhc_quantity[i]) WHERE substance IN REACH_SVHC_list"
    unit: "tonnes"
    inputs:
      - svhc_quantities
      - reach_svhc_list
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E2_025_soc_pct_output:
    metric_code: "E2-5-PCT"
    metric_name: "SoC as Percentage of Total Production"
    formula: "(total_soc / total_production_mass) * 100"
    unit: "percentage"
    inputs:
      - total_soc
      - total_production_mass
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  # --- E2 PRTR AND MICROPLASTICS ---

  E2_026_prtr_threshold:
    metric_code: "E2-PRTR"
    metric_name: "PRTR Threshold Exceedance Count"
    formula: "COUNT(substances WHERE release > prtr_threshold[substance])"
    unit: "count"
    inputs:
      - substance_releases
      - prtr_thresholds
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E2_027_prtr_total_releases:
    metric_code: "E2-PRTR-TOT"
    metric_name: "Total PRTR Reportable Releases"
    formula: "SUM(release[i]) WHERE release[i] > prtr_threshold[substance[i]]"
    unit: "tonnes"
    inputs:
      - substance_releases
      - prtr_thresholds
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E2_028_microplastics:
    metric_code: "E2-MP"
    metric_name: "Microplastics Released"
    formula: "SUM(microplastic_release[i]) by pathway"
    unit: "tonnes"
    inputs:
      - microplastic_releases_by_pathway
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_029_microplastics_water:
    metric_code: "E2-MP-W"
    metric_name: "Microplastics Released to Water"
    formula: "SUM(mp_water[i]) from wastewater and runoff"
    unit: "kg"
    inputs:
      - microplastic_water_releases
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  # --- E2 INTENSITIES AND YOY ---

  E2_030_air_pollutant_intensity:
    metric_code: "E2-INT-AIR"
    metric_name: "Air Pollutant Intensity per Revenue"
    formula: "total_air_pollutants / (revenue / 1000000)"
    unit: "tonnes per EUR million"
    inputs:
      - total_air_pollutants
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E2_031_nox_yoy:
    metric_code: "E2-NOx-YOY"
    metric_name: "NOx Emissions Year-over-Year Change"
    formula: "((current_nox - previous_nox) / previous_nox) * 100"
    unit: "percentage"
    inputs:
      - current_nox
      - previous_nox
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E2_032_sox_yoy:
    metric_code: "E2-SOx-YOY"
    metric_name: "SOx Emissions Year-over-Year Change"
    formula: "((current_sox - previous_sox) / previous_sox) * 100"
    unit: "percentage"
    inputs:
      - current_sox
      - previous_sox
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E2_033_pollution_incidents:
    metric_code: "E2-INC"
