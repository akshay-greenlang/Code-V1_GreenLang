# ============================================================================
# CROSS-CUTTING FORMULAS (40 formulas)
# ============================================================================

cross_cutting_formulas:

  CC_001_materiality_threshold:
    metric_code: "CC-MAT-THRES"
    metric_name: "Financial Materiality Threshold"
    formula: "revenue * materiality_percentage / 100"
    unit: "EUR"
    inputs:
      - revenue
      - materiality_percentage
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  CC_002_material_topics_count:
    metric_code: "CC-MAT-COUNT"
    metric_name: "Material Topics Identified"
    formula: "COUNT(topics WHERE is_material == true)"
    unit: "count"
    inputs:
      - materiality_assessment_results
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  CC_003_impact_score:
    metric_code: "CC-IMPACT"
    metric_name: "Impact Materiality Score"
    formula: "severity * likelihood * scope_adjustment"
    unit: "score"
    inputs:
      - severity_rating
      - likelihood_rating
      - scope_adjustment_factor
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  CC_004_financial_mat_score:
    metric_code: "CC-FIN-MAT"
    metric_name: "Financial Materiality Score"
    formula: "financial_impact * probability * time_horizon_weight"
    unit: "score"
    inputs:
      - financial_impact_estimate
      - probability
      - time_horizon_weight
    calculation_type: "multiply"
    deterministic: true
    zero_hallucination: true

  CC_005_double_mat_score:
    metric_code: "CC-DMAT"
    metric_name: "Double Materiality Score"
    formula: "MAX(impact_materiality_score, financial_materiality_score)"
    unit: "score"
    inputs:
      - impact_materiality_score
      - financial_materiality_score
    calculation_type: "maximum"
    deterministic: true
    zero_hallucination: true

  CC_006_dqi_score:
    metric_code: "CC-DQI"
    metric_name: "Data Quality Index Score"
    formula: "(accuracy + completeness + timeliness + consistency + reliability) / 5"
    unit: "score 0-100"
    inputs:
      - accuracy_score
      - completeness_score
      - timeliness_score
      - consistency_score
      - reliability_score
    calculation_type: "average"
    deterministic: true
    zero_hallucination: true

  CC_007_completeness:
    metric_code: "CC-COMPL"
    metric_name: "Data Completeness Rate"
    formula: "(populated_fields / total_required_fields) * 100"
    unit: "percentage"
    inputs:
      - populated_data_fields
      - total_required_fields
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  CC_008_assurance_coverage:
    metric_code: "CC-ASSUR-COV"
    metric_name: "External Assurance Coverage"
    formula: "(assured_data_points / total_data_points) * 100"
    unit: "percentage"
    inputs:
      - externally_assured_data_points
      - total_data_points
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  CC_009_limited_assurance:
    metric_code: "CC-ASSUR-LIM"
