    formula: "(compliant_volume / total_relevant_volume) * 100"
    unit: "percentage"
    inputs:
      - eudr_compliant_volume
      - total_relevant_volume
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E4_039_carbon_stock:
