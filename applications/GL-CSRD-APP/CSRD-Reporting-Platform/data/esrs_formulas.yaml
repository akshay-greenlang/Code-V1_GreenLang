    deterministic: true
    zero_hallucination: true

# ============================================================================
# E5: RESOURCE USE AND CIRCULAR ECONOMY (50 formulas)
# ============================================================================

E5_formulas:

  E5_001_total_waste:
    metric_code: "E5-1"
    metric_name: "Total Waste Generated"
    formula: "hazardous_waste + non_hazardous_waste"
    unit: "tonnes"
    inputs:
      - hazardous_waste
      - non_hazardous_waste
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_002_hazardous:
    metric_code: "E5-2"
    metric_name: "Hazardous Waste Generated"
    formula: "SUM(hazardous_waste[i]) by type"
    unit: "tonnes"
    inputs:
      - hazardous_waste_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_003_non_hazardous:
    metric_code: "E5-3"
    metric_name: "Non-Hazardous Waste Generated"
    formula: "SUM(non_hazardous_waste[i]) by type"
    unit: "tonnes"
    inputs:
      - non_hazardous_waste_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_004_waste_diverted:
    metric_code: "E5-4"
    metric_name: "Waste Diverted from Disposal"
    formula: "recycled + reused + composted + anaerobic_digestion + other_recovery"
    unit: "tonnes"
    inputs:
      - waste_recycled
      - waste_reused
      - waste_composted
      - waste_anaerobic_digestion
      - waste_other_recovery
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_005_recycled:
    metric_code: "E5-4-REC"
    metric_name: "Waste Recycled"
    formula: "SUM(recycled[i]) by material"
    unit: "tonnes"
    inputs:
      - recycled_waste_by_material
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_006_reused:
    metric_code: "E5-4-REU"
    metric_name: "Waste Reused"
    formula: "SUM(reused[i]) by type"
    unit: "tonnes"
    inputs:
      - reused_waste_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_007_composted:
    metric_code: "E5-4-COMP"
    metric_name: "Waste Composted"
    formula: "SUM(composted[i])"
    unit: "tonnes"
    inputs:
      - composted_waste
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_008_diversion_rate:
    metric_code: "E5-5"
    metric_name: "Waste Diversion Rate"
    formula: "(waste_diverted / total_waste) * 100"
    unit: "percentage"
    inputs:
      - waste_diverted
      - total_waste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_009_recycling_rate:
    metric_code: "E5-5-REC"
    metric_name: "Waste Recycling Rate"
    formula: "(waste_recycled / total_waste) * 100"
    unit: "percentage"
    inputs:
      - waste_recycled
      - total_waste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_010_landfill:
    metric_code: "E5-6-LF"
    metric_name: "Waste to Landfill"
    formula: "SUM(landfill_waste[i]) by type"
    unit: "tonnes"
    inputs:
      - landfill_waste_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_011_incinerated:
    metric_code: "E5-6-INC"
    metric_name: "Waste Incinerated"
    formula: "with_recovery + without_recovery"
    unit: "tonnes"
    inputs:
      - waste_incinerated_with_recovery
      - waste_incinerated_without_recovery
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_012_incinerated_energy:
    metric_code: "E5-6-INC-ER"
    metric_name: "Waste Incinerated with Energy Recovery"
    formula: "SUM(incinerated_with_recovery[i])"
    unit: "tonnes"
    inputs:
      - waste_incinerated_with_energy_recovery
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_013_waste_disposed:
    metric_code: "E5-6"
    metric_name: "Waste Directed to Disposal"
    formula: "total_waste - waste_diverted"
    unit: "tonnes"
    inputs:
      - total_waste
      - waste_diverted
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E5_014_circularity_rate:
    metric_code: "E5-7"
    metric_name: "Circular Material Use Rate"
    formula: "(recycled_inputs / total_inputs) * 100"
    unit: "percentage"
    inputs:
      - recycled_input_materials
      - total_input_materials
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_015_recycled_content:
    metric_code: "E5-7-RC"
    metric_name: "Recycled Content Percentage"
    formula: "(recycled_content_mass / total_material_mass) * 100"
    unit: "percentage"
    inputs:
      - recycled_content_mass
      - total_material_mass
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_016_total_material:
    metric_code: "E5-8"
    metric_name: "Total Material Input"
    formula: "SUM(material_input[i]) by type"
    unit: "tonnes"
    inputs:
      - material_inputs_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_017_renewable_material:
    metric_code: "E5-8-REN"
    metric_name: "Renewable Material Input"
    formula: "SUM(material[i]) WHERE is_renewable == true"
    unit: "tonnes"
    inputs:
      - material_inputs
      - renewable_flag
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E5_018_renewable_material_pct:
    metric_code: "E5-8-REN-PCT"
    metric_name: "Renewable Material Percentage"
    formula: "(renewable / total) * 100"
    unit: "percentage"
    inputs:
      - renewable_material_input
      - total_material_input
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_019_secondary_material:
    metric_code: "E5-8-SEC"
    metric_name: "Secondary (Recycled) Material Input"
    formula: "SUM(material[i]) WHERE is_secondary == true"
    unit: "tonnes"
    inputs:
      - material_inputs
      - secondary_flag
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E5_020_material_output:
    metric_code: "E5-9"
    metric_name: "Total Material Output (Products)"
    formula: "products + by_products"
    unit: "tonnes"
    inputs:
      - product_mass
      - by_product_mass
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_021_recyclability_score:
    metric_code: "E5-10"
    metric_name: "Product Recyclability Score"
    formula: "SUM(mass[i] * recyclability[i]) / total_mass"
    unit: "percentage"
    inputs:
      - product_mass_by_type
      - recyclability_scores
      - total_product_mass
    calculation_type: "weighted_average"
    deterministic: true
    zero_hallucination: true

  E5_022_product_recycled:
    metric_code: "E5-10-RC"
    metric_name: "Average Product Recycled Content"
    formula: "SUM(mass[i] * rc_pct[i]) / total_mass"
    unit: "percentage"
    inputs:
      - product_mass
      - recycled_content_percentages
      - total_product_mass
    calculation_type: "weighted_average"
    deterministic: true
    zero_hallucination: true

  E5_023_durability:
    metric_code: "E5-10-DUR"
    metric_name: "Average Product Lifetime"
    formula: "SUM(units[i] * lifetime[i]) / total_units"
    unit: "years"
    inputs:
      - units_by_product
      - expected_lifetime
      - total_units
    calculation_type: "weighted_average"
    deterministic: true
    zero_hallucination: true

  E5_024_waste_intensity_rev:
    metric_code: "E5-INT-REV"
    metric_name: "Waste Intensity per Revenue"
    formula: "total_waste / (revenue / 1000000)"
    unit: "tonnes per EUR million"
    inputs:
      - total_waste
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_025_waste_intensity_fte:
    metric_code: "E5-INT-FTE"
    metric_name: "Waste Intensity per FTE"
    formula: "total_waste / employee_fte"
    unit: "tonnes per FTE"
    inputs:
      - total_waste
      - employee_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_026_waste_intensity_unit:
    metric_code: "E5-INT-UNIT"
    metric_name: "Waste Intensity per Unit"
    formula: "total_waste / total_units_produced"
    unit: "tonnes per unit"
    inputs:
      - total_waste
      - total_units_produced
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_027_hazardous_pct:
    metric_code: "E5-2-PCT"
    metric_name: "Hazardous Waste Percentage"
    formula: "(hazardous / total) * 100"
    unit: "percentage"
    inputs:
      - hazardous_waste
      - total_waste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_028_waste_yoy:
    metric_code: "E5-1-YOY"
    metric_name: "Total Waste Year-over-Year Change"
    formula: "((current - previous) / previous) * 100"
    unit: "percentage"
    inputs:
      - current_waste
      - previous_waste
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E5_029_diversion_yoy:
    metric_code: "E5-5-YOY"
    metric_name: "Diversion Rate Year-over-Year Change"
    formula: "current_rate - previous_rate"
    unit: "percentage points"
    inputs:
      - current_diversion_rate
      - previous_diversion_rate
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E5_030_waste_reduction:
    metric_code: "E5-RED"
    metric_name: "Waste Reduction from Base Year"
    formula: "((base - current) / base) * 100"
    unit: "percentage"
    inputs:
      - base_year_waste
      - current_waste
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E5_031_zero_waste_landfill:
    metric_code: "E5-ZWTL"
    metric_name: "Zero Waste to Landfill Achievement"
    formula: "((total - landfill) / total) * 100"
    unit: "percentage"
    inputs:
      - total_waste
      - landfill_waste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_032_packaging_total:
    metric_code: "E5-PKG"
    metric_name: "Total Packaging Material Used"
    formula: "SUM(packaging[i]) by type"
    unit: "tonnes"
    inputs:
      - packaging_materials_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_033_packaging_recycled:
    metric_code: "E5-PKG-REC"
    metric_name: "Recycled Content in Packaging"
    formula: "(recycled_pkg / total_pkg) * 100"
    unit: "percentage"
    inputs:
      - recycled_packaging_material
      - total_packaging_material
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_034_packaging_recyclable:
    metric_code: "E5-PKG-ABLE"
    metric_name: "Recyclable Packaging Percentage"
    formula: "(recyclable_pkg / total_pkg) * 100"
    unit: "percentage"
    inputs:
      - recyclable_packaging_material
      - total_packaging_material
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_035_single_use_plastic:
    metric_code: "E5-SUP"
    metric_name: "Single-Use Plastic Used"
    formula: "SUM(single_use_plastic[i])"
    unit: "tonnes"
    inputs:
      - single_use_plastic_volumes
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_036_material_productivity:
    metric_code: "E5-PROD"
    metric_name: "Material Productivity"
    formula: "revenue / total_material_input"
    unit: "EUR per tonne"
    inputs:
      - revenue
      - total_material_input
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_037_productivity_yoy:
    metric_code: "E5-PROD-YOY"
    metric_name: "Material Productivity YoY Change"
    formula: "((current - previous) / previous) * 100"
    unit: "percentage"
    inputs:
      - current_material_productivity
      - previous_material_productivity
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E5_038_circular_revenue:
    metric_code: "E5-CREV"
    metric_name: "Revenue from Circular Business Models"
    formula: "SUM(revenue[i]) WHERE model IN ('reuse', 'refurbish', 'remanufacture', 'sharing')"
    unit: "EUR"
    inputs:
      - revenue_by_business_model
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E5_039_circular_revenue_pct:
    metric_code: "E5-CREV-PCT"
    metric_name: "Circular Revenue Percentage"
    formula: "(circular_revenue / total_revenue) * 100"
    unit: "percentage"
    inputs:
      - circular_revenue
      - total_revenue
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_040_food_waste:
    metric_code: "E5-FW"
    metric_name: "Food Waste Generated"
    formula: "SUM(food_waste[i]) by stage"
    unit: "tonnes"
    inputs:
      - food_waste_by_stage
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_041_food_waste_intensity:
    metric_code: "E5-FW-INT"
    metric_name: "Food Waste per Revenue"
    formula: "food_waste / (revenue / 1000000)"
    unit: "tonnes per EUR million"
    inputs:
      - food_waste
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_042_ewaste:
    metric_code: "E5-EW"
    metric_name: "Electronic Waste Generated"
    formula: "SUM(e_waste[i]) by category"
    unit: "tonnes"
    inputs:
      - electronic_waste_by_category
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_043_ewaste_recycled:
    metric_code: "E5-EW-REC"
    metric_name: "Electronic Waste Recycled Pct"
    formula: "(recycled / total) * 100"
    unit: "percentage"
    inputs:
      - ewaste_recycled
      - total_ewaste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_044_waste_target:
    metric_code: "E5-TPROG"
    metric_name: "Waste Reduction Target Progress"
    formula: "((base - current) / (base - target)) * 100"
    unit: "percentage"
    inputs:
      - base_year_waste
      - current_waste
      - target_waste
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_045_circularity_target:
    metric_code: "E5-CIRC-TPROG"
    metric_name: "Circularity Rate Target Progress"
    formula: "((current - base) / (target - base)) * 100"
    unit: "percentage"
    inputs:
      - current_circularity_rate
      - base_year_circularity_rate
      - target_circularity_rate
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_046_waste_cost:
    metric_code: "E5-COST"
    metric_name: "Waste Management Cost"
    formula: "SUM(waste_cost[i]) by method"
    unit: "EUR"
    inputs:
      - waste_management_costs
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E5_047_waste_cost_per_tonne:
    metric_code: "E5-COST-T"
    metric_name: "Waste Cost per Tonne"
    formula: "total_cost / total_waste"
    unit: "EUR per tonne"
    inputs:
      - total_waste_cost
      - total_waste
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E5_048_resource_efficiency:
    metric_code: "E5-REI"
    metric_name: "Resource Efficiency Index"
    formula: "(output / input) * 100"
    unit: "percentage"
    inputs:
      - total_material_output
      - total_material_input
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E5_049_epr_cost:
    metric_code: "E5-EPR"
    metric_name: "Extended Producer Responsibility Cost"
    formula: "SUM(epr_fee[i] * product_mass[i])"
    unit: "EUR"
    inputs:
      - epr_fees
      - product_masses
    calculation_type: "sum_product"
    deterministic: true
    zero_hallucination: true

  E5_050_landfill_target:
    metric_code: "E5-LF-TPROG"
    metric_name: "Landfill Diversion Target Progress"
    formula: "((base_pct - current_pct) / (base_pct - target_pct)) * 100"
    unit: "percentage"
    inputs:
      - base_year_landfill_pct
      - current_landfill_pct
      - target_landfill_pct
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

# ============================================================================
# S1: OWN WORKFORCE (120 formulas)
# ============================================================================

S1_formulas:

  # --- S1 WORKFORCE COMPOSITION ---

  S1_001_total_headcount:
    metric_code: "S1-HC"
    metric_name: "Total Workforce Headcount"
    formula: "SUM(employees[i])"
    unit: "count"
    inputs:
      - employees_by_category
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  S1_002_total_fte:
    metric_code: "S1-FTE"
    metric_name: "Total FTE"
    formula: "SUM(employees[i] * fte_factor[i])"
    unit: "FTE"
    inputs:
      - employees_by_category
      - fte_factors
    calculation_type: "sum_product"
    deterministic: true
    zero_hallucination: true

  S1_003_permanent:
    metric_code: "S1-PERM"
    metric_name: "Permanent Employees"
    formula: "COUNT(employees WHERE contract_type == 'permanent')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_004_temporary:
    metric_code: "S1-TEMP"
    metric_name: "Temporary Employees"
    formula: "COUNT(employees WHERE contract_type == 'temporary')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_005_full_time:
    metric_code: "S1-FT"
    metric_name: "Full-Time Employees"
    formula: "COUNT(employees WHERE work_type == 'full_time')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_006_part_time:
    metric_code: "S1-PT"
    metric_name: "Part-Time Employees"
    formula: "COUNT(employees WHERE work_type == 'part_time')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_007_non_guaranteed_hours:
    metric_code: "S1-NGH"
    metric_name: "Non-Guaranteed Hours Employees"
    formula: "COUNT(employees WHERE contract_type == 'non_guaranteed_hours')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_008_gender_female:
    metric_code: "S1-GEN-F"
    metric_name: "Female Employees"
    formula: "COUNT(employees WHERE gender == 'female')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_009_gender_male:
    metric_code: "S1-GEN-M"
    metric_name: "Male Employees"
    formula: "COUNT(employees WHERE gender == 'male')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_010_gender_other:
    metric_code: "S1-GEN-O"
    metric_name: "Other/Not Disclosed Gender"
    formula: "COUNT(employees WHERE gender == 'other' OR gender == 'not_disclosed')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_011_female_pct:
    metric_code: "S1-GEN-F-PCT"
    metric_name: "Female Employee Percentage"
    formula: "(female_count / total_headcount) * 100"
    unit: "percentage"
    inputs:
      - female_employees
      - total_headcount
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_012_by_region:
    metric_code: "S1-REG"
    metric_name: "Employees by Region"
    formula: "GROUP_BY(employees, region)"
    unit: "count"
    inputs:
      - employee_records
      - region_attribute
    calculation_type: "group_by_count"
    deterministic: true
    zero_hallucination: true

  S1_013_by_country:
    metric_code: "S1-CTRY"
    metric_name: "Employees by Country"
    formula: "GROUP_BY(employees, country)"
    unit: "count"
    inputs:
      - employee_records
      - country_attribute
    calculation_type: "group_by_count"
    deterministic: true
    zero_hallucination: true

  S1_014_non_employees:
    metric_code: "S1-NE"
    metric_name: "Non-Employee Workers"
    formula: "contractors + agency_workers + freelancers"
    unit: "count"
    inputs:
      - contractor_count
      - agency_worker_count
      - freelancer_count
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  S1_015_workforce_total:
    metric_code: "S1-WF"
    metric_name: "Total Workforce (Employees + Non-Employees)"
    formula: "total_employees + non_employee_workers"
    unit: "count"
    inputs:
      - total_employees
      - non_employee_workers
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  S1_016_avg_workforce:
    metric_code: "S1-AVG"
    metric_name: "Average Workforce During Period"
    formula: "(start_headcount + end_headcount) / 2"
    unit: "count"
    inputs:
      - start_period_headcount
      - end_period_headcount
    calculation_type: "average"
    deterministic: true
    zero_hallucination: true

  # --- S1 AGE DISTRIBUTION ---

  S1_017_age_under30:
    metric_code: "S1-AGE-U30"
    metric_name: "Employees Under 30"
    formula: "COUNT(employees WHERE age < 30)"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_018_age_30to50:
    metric_code: "S1-AGE-3050"
    metric_name: "Employees 30-50"
    formula: "COUNT(employees WHERE age >= 30 AND age <= 50)"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_019_age_over50:
    metric_code: "S1-AGE-O50"
    metric_name: "Employees Over 50"
    formula: "COUNT(employees WHERE age > 50)"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_020_age_under30_pct:
    metric_code: "S1-AGE-U30-PCT"
    metric_name: "Under 30 Percentage"
    formula: "(under_30 / total) * 100"
    unit: "percentage"
    inputs:
      - employees_under_30
      - total_headcount
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_021_age_30to50_pct:
    metric_code: "S1-AGE-3050-PCT"
    metric_name: "30-50 Percentage"
    formula: "(age_30_50 / total) * 100"
    unit: "percentage"
    inputs:
      - employees_30_50
      - total_headcount
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_022_age_over50_pct:
    metric_code: "S1-AGE-O50-PCT"
    metric_name: "Over 50 Percentage"
    formula: "(over_50 / total) * 100"
    unit: "percentage"
    inputs:
      - employees_over_50
      - total_headcount
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_023_avg_age:
    metric_code: "S1-AGE-AVG"
    metric_name: "Average Employee Age"
    formula: "SUM(age[i]) / total_employees"
    unit: "years"
    inputs:
      - employee_ages
      - total_employees
    calculation_type: "average"
    deterministic: true
    zero_hallucination: true

  # --- S1 DIVERSITY METRICS ---

  S1_024_disability:
    metric_code: "S1-DIV-DIS"
    metric_name: "Employees with Disabilities"
    formula: "COUNT(employees WHERE disability_status == true)"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_025_disability_pct:
    metric_code: "S1-DIV-DIS-PCT"
    metric_name: "Disability Percentage"
    formula: "(disabled / total) * 100"
    unit: "percentage"
    inputs:
      - employees_with_disabilities
      - total_headcount
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_026_female_mgmt:
    metric_code: "S1-DIV-FMGMT"
    metric_name: "Female Managers"
    formula: "COUNT(employees WHERE gender == 'female' AND is_manager == true)"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_027_female_mgmt_pct:
    metric_code: "S1-DIV-FMGMT-PCT"
    metric_name: "Female Manager Percentage"
    formula: "(female_managers / total_managers) * 100"
    unit: "percentage"
    inputs:
      - female_managers
      - total_managers
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_028_female_senior:
    metric_code: "S1-DIV-FSEN"
    metric_name: "Female Senior Management"
    formula: "COUNT(employees WHERE gender == 'female' AND level == 'senior_management')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_029_female_senior_pct:
    metric_code: "S1-DIV-FSEN-PCT"
    metric_name: "Female Senior Management Percentage"
    formula: "(female_senior / total_senior) * 100"
    unit: "percentage"
    inputs:
      - female_senior_management
      - total_senior_management
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_030_female_board:
    metric_code: "S1-DIV-FBRD"
    metric_name: "Female Board Members"
    formula: "COUNT(board_members WHERE gender == 'female')"
    unit: "count"
    inputs:
      - board_member_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_031_female_board_pct:
    metric_code: "S1-DIV-FBRD-PCT"
    metric_name: "Female Board Percentage"
    formula: "(female_board / total_board) * 100"
    unit: "percentage"
    inputs:
      - female_board_members
      - total_board_members
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_032_female_stem:
    metric_code: "S1-DIV-FSTEM"
    metric_name: "Female STEM Employees"
    formula: "COUNT(employees WHERE gender == 'female' AND department_type == 'STEM')"
    unit: "count"
    inputs:
      - employee_records
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  S1_033_female_new_hires_pct:
    metric_code: "S1-DIV-FNH-PCT"
    metric_name: "Female New Hire Percentage"
    formula: "(female_new_hires / total_new_hires) * 100"
    unit: "percentage"
    inputs:
      - female_new_hires
      - total_new_hires
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  # --- S1 PAY AND COMPENSATION ---

  S1_034_gender_pay_gap_mean:
    metric_code: "S1-GPG-MEAN"
    metric_name: "Gender Pay Gap (Mean)"
    formula: "((avg_male_pay - avg_female_pay) / avg_male_pay) * 100"
    unit: "percentage"
    inputs:
      - average_male_salary
      - average_female_salary
    calculation_type: "percentage_gap"
    deterministic: true
    zero_hallucination: true

  S1_035_gender_pay_gap_median:
    metric_code: "S1-GPG-MED"
    metric_name: "Gender Pay Gap (Median)"
    formula: "((median_male_pay - median_female_pay) / median_male_pay) * 100"
    unit: "percentage"
    inputs:
      - median_male_salary
      - median_female_salary
    calculation_type: "percentage_gap"
    deterministic: true
    zero_hallucination: true

  S1_036_gpg_by_category:
    metric_code: "S1-GPG-CAT"
    metric_name: "Gender Pay Gap by Employee Category"
    formula: "((avg_male[cat] - avg_female[cat]) / avg_male[cat]) * 100 for each category"
    unit: "percentage"
    inputs:
      - salary_data_by_gender_and_category
    calculation_type: "percentage_gap"
    deterministic: true
    zero_hallucination: true

  S1_037_ceo_pay_ratio:
    metric_code: "S1-CEO-RATIO"
    metric_name: "CEO Pay Ratio"
    formula: "ceo_total_compensation / median_employee_compensation"
    unit: "ratio"
    inputs:
      - ceo_total_compensation
      - median_employee_compensation
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  S1_038_adequate_wage:
    metric_code: "S1-AW"
    metric_name: "Adequate Wage Ratio"
    formula: "(lowest_wage / adequate_wage_benchmark) * 100"
    unit: "percentage"
    inputs:
      - lowest_wage_paid
      - adequate_wage_benchmark
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_039_adequate_wage_coverage:
    metric_code: "S1-AW-COV"
    metric_name: "Adequate Wage Coverage"
    formula: "(employees_above_adequate / total_employees) * 100"
    unit: "percentage"
    inputs:
      - employees_above_adequate_wage
      - total_employees
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_040_living_wage:
    metric_code: "S1-LW"
    metric_name: "Living Wage Coverage"
    formula: "(employees_above_living_wage / total_employees) * 100"
    unit: "percentage"
    inputs:
      - employees_above_living_wage
      - total_employees
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_041_bonus_gap:
    metric_code: "S1-BG"
    metric_name: "Gender Bonus Gap"
    formula: "((avg_male_bonus - avg_female_bonus) / avg_male_bonus) * 100"
    unit: "percentage"
    inputs:
      - average_male_bonus
      - average_female_bonus
    calculation_type: "percentage_gap"
    deterministic: true
    zero_hallucination: true

  S1_042_total_compensation:
    metric_code: "S1-TCOMP"
    metric_name: "Total Employee Compensation Cost"
    formula: "SUM(salary[i] + benefits[i] + bonus[i]) for all employees"
    unit: "EUR"
    inputs:
      - salary_data
      - benefits_data
      - bonus_data
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  S1_043_avg_compensation:
    metric_code: "S1-AVGCOMP"
    metric_name: "Average Employee Compensation"
    formula: "total_compensation / total_fte"
    unit: "EUR"
    inputs:
      - total_compensation
      - total_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  # --- S1 TURNOVER AND RETENTION ---

  S1_044_turnover_rate:
    metric_code: "S1-TURN"
    metric_name: "Employee Turnover Rate"
    formula: "(departures / average_workforce) * 100"
    unit: "percentage"
    inputs:
      - employee_departures
      - average_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_045_voluntary_turnover:
    metric_code: "S1-TURN-VOL"
    metric_name: "Voluntary Turnover Rate"
    formula: "(voluntary_departures / average_workforce) * 100"
    unit: "percentage"
    inputs:
      - voluntary_departures
      - average_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_046_involuntary_turnover:
    metric_code: "S1-TURN-INV"
    metric_name: "Involuntary Turnover Rate"
    formula: "(involuntary_departures / average_workforce) * 100"
    unit: "percentage"
    inputs:
      - involuntary_departures
      - average_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_047_turnover_female:
    metric_code: "S1-TURN-F"
    metric_name: "Female Turnover Rate"
    formula: "(female_departures / avg_female_workforce) * 100"
    unit: "percentage"
    inputs:
      - female_departures
      - average_female_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_048_turnover_male:
    metric_code: "S1-TURN-M"
    metric_name: "Male Turnover Rate"
    formula: "(male_departures / avg_male_workforce) * 100"
    unit: "percentage"
    inputs:
      - male_departures
      - average_male_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_049_new_hires:
    metric_code: "S1-HIRE"
    metric_name: "New Hires"
    formula: "SUM(new_hires[i]) by category"
    unit: "count"
    inputs:
      - new_hire_records
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  S1_050_new_hire_rate:
    metric_code: "S1-HIRE-RATE"
    metric_name: "New Hire Rate"
    formula: "(new_hires / average_workforce) * 100"
    unit: "percentage"
    inputs:
      - new_hires
      - average_workforce
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  S1_051_retention_rate:
    metric_code: "S1-RET"
    metric_name: "Employee Retention Rate"
    formula: "100 - turnover_rate"
    unit: "percentage"
    inputs:
      - turnover_rate
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  S1_052_avg_tenure:
    metric_code: "S1-TEN"
    metric_name: "Average Employee Tenure"
    formula: "SUM(tenure[i]) / total_employees"
    unit: "years"
