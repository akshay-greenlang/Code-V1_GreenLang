    formula: "COUNT(incidents WHERE type IN ('spill', 'leak', 'exceedance'))"
    unit: "count"
    inputs:
      - incident_log
      - incident_type
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E2_034_pollution_incident_severity:
    metric_code: "E2-INC-SEV"
    metric_name: "Pollution Incident Volume Released"
    formula: "SUM(incident_volume[i])"
    unit: "tonnes"
    inputs:
      - incident_volumes
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_035_pollution_fines:
    metric_code: "E2-FINES"
    metric_name: "Pollution-Related Fines"
    formula: "SUM(fine_amount[i]) WHERE fine_type == 'pollution'"
    unit: "EUR"
    inputs:
      - fines_and_penalties
      - fine_type
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E2_036_remediation_cost:
    metric_code: "E2-REM"
    metric_name: "Environmental Remediation Costs"
    formula: "SUM(remediation_spend[i])"
    unit: "EUR"
    inputs:
      - remediation_expenditures
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_037_pollution_prevention_spend:
    metric_code: "E2-PREV"
    metric_name: "Pollution Prevention Expenditure"
    formula: "SUM(prevention_spend[i]) by category"
    unit: "EUR"
    inputs:
      - pollution_prevention_expenditures
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E2_038_air_pollutant_per_fte:
    metric_code: "E2-INT-FTE"
    metric_name: "Air Pollutant Intensity per FTE"
    formula: "total_air_pollutants / employee_fte"
    unit: "tonnes per FTE"
    inputs:
      - total_air_pollutants
      - employee_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E2_039_water_pollutant_intensity:
    metric_code: "E2-INT-WP"
    metric_name: "Water Pollutant Intensity per Revenue"
    formula: "total_water_pollutants / (revenue / 1000000)"
    unit: "tonnes per EUR million"
    inputs:
      - total_water_pollutants
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E2_040_soc_reduction_pct:
    metric_code: "E2-SOC-RED"
    metric_name: "Substances of Concern Reduction Percentage"
    formula: "((base_year_soc - current_soc) / base_year_soc) * 100"
    unit: "percentage"
    inputs:
      - base_year_soc
      - current_soc
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E2_041_pollution_target_progress:
    metric_code: "E2-TPROG"
    metric_name: "Pollution Reduction Target Progress"
    formula: "((base_year_pol - current_pol) / (base_year_pol - target_pol)) * 100"
    unit: "percentage"
    inputs:
      - base_year_pollution
      - current_pollution
      - target_pollution
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

# ============================================================================
# E3: WATER AND MARINE RESOURCES (36 formulas)
# ============================================================================

E3_formulas:

  E3_001_water_consumption:
    metric_code: "E3-1"
    metric_name: "Total Water Consumption"
    formula: "water_withdrawal - water_discharge"
    unit: "m3"
    inputs:
      - water_withdrawal
      - water_discharge
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E3_002_water_stress_consumption:
    metric_code: "E3-2"
    metric_name: "Water Consumption in Water-Stressed Areas"
    formula: "SUM(consumption[i]) WHERE water_stress_level[location[i]] >= 'high'"
    unit: "m3"
    inputs:
      - water_consumption_by_location
      - location
      - water_stress_database
    calculation_type: "conditional_sum_with_lookup"
    deterministic: true
    zero_hallucination: true

  E3_003_withdrawal_total:
    metric_code: "E3-3"
    metric_name: "Total Water Withdrawal"
    formula: "surface + groundwater + seawater + produced + third_party"
    unit: "m3"
    inputs:
      - surface_water_withdrawal
      - groundwater_withdrawal
      - seawater_withdrawal
      - produced_water
      - third_party_water
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_004_withdrawal_surface:
    metric_code: "E3-3-SURF"
    metric_name: "Surface Water Withdrawal"
    formula: "SUM(surface_withdrawal[i]) by source"
    unit: "m3"
    inputs:
      - surface_water_withdrawals
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_005_withdrawal_ground:
    metric_code: "E3-3-GW"
    metric_name: "Groundwater Withdrawal"
    formula: "SUM(groundwater_withdrawal[i]) by well"
    unit: "m3"
    inputs:
      - groundwater_withdrawals
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_006_withdrawal_seawater:
    metric_code: "E3-3-SEA"
    metric_name: "Seawater Withdrawal"
    formula: "SUM(seawater_withdrawal[i])"
    unit: "m3"
    inputs:
      - seawater_withdrawals
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_007_withdrawal_third_party:
    metric_code: "E3-3-3P"
    metric_name: "Third-Party Water Withdrawal"
    formula: "municipal_supply + industrial_supply"
    unit: "m3"
    inputs:
      - municipal_water_supply
      - industrial_water_supply
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_008_withdrawal_stress_areas:
    metric_code: "E3-3-STRESS"
    metric_name: "Water Withdrawal in Water-Stressed Areas"
    formula: "SUM(withdrawal[i]) WHERE water_stress_level[location[i]] >= 'high'"
    unit: "m3"
    inputs:
      - withdrawal_by_location
      - water_stress_database
    calculation_type: "conditional_sum_with_lookup"
    deterministic: true
    zero_hallucination: true

  E3_009_discharge_total:
    metric_code: "E3-4"
    metric_name: "Total Water Discharge"
    formula: "surface_discharge + groundwater_discharge + seawater_discharge + third_party_discharge"
    unit: "m3"
    inputs:
      - surface_water_discharge
      - groundwater_discharge
      - seawater_discharge
      - third_party_discharge
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_010_discharge_treated:
    metric_code: "E3-4-TREAT"
    metric_name: "Treated Water Discharged"
    formula: "SUM(discharge[i]) WHERE treatment_level[i] >= 'secondary'"
    unit: "m3"
    inputs:
      - water_discharges
      - treatment_level
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E3_011_discharge_untreated:
    metric_code: "E3-4-UNTR"
    metric_name: "Untreated Water Discharged"
    formula: "total_discharge - treated_discharge"
    unit: "m3"
    inputs:
      - total_discharge
      - treated_discharge
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E3_012_recycling_rate:
    metric_code: "E3-5"
    metric_name: "Water Recycling Rate"
    formula: "(water_recycled / water_withdrawal) * 100"
    unit: "percentage"
    inputs:
      - water_recycled
      - water_withdrawal
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_013_water_recycled_vol:
    metric_code: "E3-5-VOL"
    metric_name: "Total Water Recycled/Reused"
    formula: "SUM(recycled_volume[i]) by process"
    unit: "m3"
    inputs:
      - recycled_water_volumes
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_014_water_efficiency:
    metric_code: "E3-5-EFF"
    metric_name: "Water Use Efficiency"
    formula: "total_production_output / water_consumption"
    unit: "units per m3"
    inputs:
      - total_production_output
      - water_consumption
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E3_015_water_intensity_rev:
    metric_code: "E3-INT-REV"
    metric_name: "Water Intensity per Revenue"
    formula: "water_consumption / (revenue / 1000000)"
    unit: "m3 per EUR million"
    inputs:
      - water_consumption
      - revenue
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E3_016_water_intensity_fte:
    metric_code: "E3-INT-FTE"
    metric_name: "Water Intensity per FTE"
    formula: "water_consumption / employee_fte"
    unit: "m3 per FTE"
    inputs:
      - water_consumption
      - employee_fte
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E3_017_water_intensity_unit:
    metric_code: "E3-INT-UNIT"
    metric_name: "Water Intensity per Unit"
    formula: "water_consumption / total_units_produced"
    unit: "m3 per unit"
    inputs:
      - water_consumption
      - total_units_produced
    calculation_type: "ratio"
    deterministic: true
    zero_hallucination: true

  E3_018_withdrawal_yoy:
    metric_code: "E3-3-YOY"
    metric_name: "Water Withdrawal Year-over-Year Change"
    formula: "((current_withdrawal - previous_withdrawal) / previous_withdrawal) * 100"
    unit: "percentage"
    inputs:
      - current_withdrawal
      - previous_withdrawal
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E3_019_consumption_yoy:
    metric_code: "E3-1-YOY"
    metric_name: "Water Consumption Year-over-Year Change"
    formula: "((current_consumption - previous_consumption) / previous_consumption) * 100"
    unit: "percentage"
    inputs:
      - current_consumption
      - previous_consumption
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E3_020_stress_area_pct:
    metric_code: "E3-2-PCT"
    metric_name: "Water Stressed Area Consumption Percentage"
    formula: "(stress_area_consumption / total_consumption) * 100"
    unit: "percentage"
    inputs:
      - stress_area_consumption
      - total_consumption
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_021_freshwater_withdrawal:
    metric_code: "E3-3-FW"
    metric_name: "Freshwater Withdrawal"
    formula: "surface_water + groundwater + third_party_freshwater"
    unit: "m3"
    inputs:
      - surface_water_withdrawal
      - groundwater_withdrawal
      - third_party_freshwater
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_022_freshwater_pct:
    metric_code: "E3-3-FW-PCT"
    metric_name: "Freshwater as Percentage of Total Withdrawal"
    formula: "(freshwater_withdrawal / total_withdrawal) * 100"
    unit: "percentage"
    inputs:
      - freshwater_withdrawal
      - total_withdrawal
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_023_water_storage_change:
    metric_code: "E3-STOR"
    metric_name: "Change in Water Storage"
    formula: "end_period_storage - start_period_storage"
    unit: "m3"
    inputs:
      - end_period_storage
      - start_period_storage
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E3_024_water_balance:
    metric_code: "E3-BAL"
    metric_name: "Water Balance Check"
    formula: "withdrawal - discharge - consumption - storage_change"
    unit: "m3"
    inputs:
      - total_withdrawal
      - total_discharge
      - total_consumption
      - storage_change
    calculation_type: "balance"
    deterministic: true
    zero_hallucination: true
    note: "Should equal zero; non-zero indicates data gap"

  E3_025_marine_discharge:
    metric_code: "E3-4-MAR"
    metric_name: "Discharge to Marine Environments"
    formula: "SUM(marine_discharge[i])"
    unit: "m3"
    inputs:
      - marine_water_discharges
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_026_recycling_target_progress:
    metric_code: "E3-5-TPROG"
    metric_name: "Recycling Rate Target Progress"
    formula: "((current_rate - base_rate) / (target_rate - base_rate)) * 100"
    unit: "percentage"
    inputs:
      - current_recycling_rate
      - base_year_recycling_rate
      - target_recycling_rate
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_027_water_risk_score:
    metric_code: "E3-RISK"
    metric_name: "Weighted Water Risk Score"
    formula: "SUM(withdrawal[i] * risk_score[location[i]]) / total_withdrawal"
    unit: "score 0-5"
    inputs:
      - withdrawal_by_location
      - water_risk_scores
      - total_withdrawal
    calculation_type: "weighted_average"
    deterministic: true
    zero_hallucination: true

  E3_028_consumption_reduction:
    metric_code: "E3-RED"
    metric_name: "Water Consumption Reduction from Base Year"
    formula: "((base_year - current) / base_year) * 100"
    unit: "percentage"
    inputs:
      - base_year_consumption
      - current_consumption
    calculation_type: "percentage_change"
    deterministic: true
    zero_hallucination: true

  E3_029_discharge_quality:
    metric_code: "E3-DQ"
    metric_name: "Discharge Quality Compliance Rate"
    formula: "(compliant_samples / total_samples) * 100"
    unit: "percentage"
    inputs:
      - compliant_discharge_samples
      - total_discharge_samples
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_030_water_capex:
    metric_code: "E3-CAPEX"
    metric_name: "Water-Related Capital Expenditure"
    formula: "SUM(water_capex[i]) by project"
    unit: "EUR"
    inputs:
      - water_capital_expenditures
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_031_water_opex:
    metric_code: "E3-OPEX"
    metric_name: "Water-Related Operating Expenditure"
    formula: "SUM(water_opex[i]) by category"
    unit: "EUR"
    inputs:
      - water_operating_expenditures
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_032_rainwater:
    metric_code: "E3-RAIN"
    metric_name: "Rainwater Harvested"
    formula: "SUM(rainwater_collected[i]) by site"
    unit: "m3"
    inputs:
      - rainwater_collection_volumes
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_033_desalination:
    metric_code: "E3-DESAL"
    metric_name: "Desalinated Water Volume"
    formula: "SUM(desalination_output[i])"
    unit: "m3"
    inputs:
      - desalination_outputs
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E3_034_stress_withdrawal_pct:
    metric_code: "E3-STRESS-PCT"
    metric_name: "Withdrawal in Stressed Areas as Pct"
    formula: "(stress_area_withdrawal / total_withdrawal) * 100"
    unit: "percentage"
    inputs:
      - stress_area_withdrawal
      - total_withdrawal
    calculation_type: "percentage"
    deterministic: true
    zero_hallucination: true

  E3_035_water_incidents:
    metric_code: "E3-INC"
    metric_name: "Water-Related Incidents"
    formula: "COUNT(incidents WHERE type IN ('contamination', 'spill', 'exceedance'))"
    unit: "count"
    inputs:
      - water_incident_log
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E3_036_water_cost:
    metric_code: "E3-COST"
    metric_name: "Total Water Cost"
    formula: "water_purchase_cost + water_treatment_cost + discharge_fees"
    unit: "EUR"
    inputs:
      - water_purchase_cost
      - water_treatment_cost
      - discharge_fees
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

# ============================================================================
# E4: BIODIVERSITY AND ECOSYSTEMS (45 formulas)
# ============================================================================

E4_formulas:

  E4_001_biodiversity_sites:
    metric_code: "E4-1"
    metric_name: "Sites in Biodiversity-Sensitive Areas"
    formula: "COUNT(sites WHERE biodiversity_sensitive == true)"
    unit: "count"
    inputs:
      - site_locations
      - biodiversity_sensitive_flag
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E4_002_sites_near_protected:
    metric_code: "E4-1-PROT"
    metric_name: "Sites Near Protected Areas"
    formula: "COUNT(sites WHERE distance_to_protected_area <= threshold_km)"
    unit: "count"
    inputs:
      - site_locations
      - protected_area_database
      - threshold_km
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E4_003_sites_kba:
    metric_code: "E4-1-KBA"
    metric_name: "Sites in Key Biodiversity Areas"
    formula: "COUNT(sites WHERE overlaps_kba == true)"
    unit: "count"
    inputs:
      - site_locations
      - kba_database
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E4_004_total_land_use:
    metric_code: "E4-2"
    metric_name: "Total Land Use"
    formula: "SUM(land_area[i]) by type"
    unit: "hectares"
    inputs:
      - land_area_by_type
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E4_005_land_sealed:
    metric_code: "E4-2-SEAL"
    metric_name: "Total Sealed Land Area"
    formula: "SUM(sealed_area[i]) WHERE surface_type IN ('building', 'road', 'parking', 'paved')"
    unit: "hectares"
    inputs:
      - sealed_area_by_type
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E4_006_land_natural:
    metric_code: "E4-2-NAT"
    metric_name: "Natural Ecosystem Land Area"
    formula: "SUM(natural_area[i]) WHERE ecosystem_type IN ('forest', 'wetland', 'grassland')"
    unit: "hectares"
    inputs:
      - natural_area_by_type
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E4_007_land_use_change:
    metric_code: "E4-3"
    metric_name: "Land Use Change"
    formula: "current_period_land_use - previous_period_land_use"
    unit: "hectares"
    inputs:
      - current_land_use_by_type
      - previous_land_use_by_type
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E4_008_land_converted:
    metric_code: "E4-3-CONV"
    metric_name: "Natural Land Converted"
    formula: "SUM(converted_area[i]) WHERE original_type IN ('forest', 'wetland', 'grassland')"
    unit: "hectares"
    inputs:
      - land_conversions
    calculation_type: "conditional_sum"
    deterministic: true
    zero_hallucination: true

  E4_009_land_restored:
    metric_code: "E4-3-REST"
    metric_name: "Land Restored"
    formula: "SUM(restored_area[i]) by ecosystem type"
    unit: "hectares"
    inputs:
      - restoration_projects
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E4_010_net_land_change:
    metric_code: "E4-3-NET"
    metric_name: "Net Land Use Change"
    formula: "land_restored - land_converted"
    unit: "hectares"
    inputs:
      - land_restored
      - land_converted
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E4_011_deforestation:
    metric_code: "E4-3-DEF"
    metric_name: "Deforestation Area"
    formula: "SUM(deforested_area[i]) by site"
    unit: "hectares"
    inputs:
      - deforestation_data
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E4_012_reforestation:
    metric_code: "E4-3-REF"
    metric_name: "Reforestation/Afforestation Area"
    formula: "SUM(reforested_area[i]) by project"
    unit: "hectares"
    inputs:
      - reforestation_projects
    calculation_type: "sum"
    deterministic: true
    zero_hallucination: true

  E4_013_net_deforestation:
    metric_code: "E4-3-NDEF"
    metric_name: "Net Deforestation"
    formula: "deforestation - reforestation"
    unit: "hectares"
    inputs:
      - total_deforestation
      - total_reforestation
    calculation_type: "subtraction"
    deterministic: true
    zero_hallucination: true

  E4_014_iucn_species:
    metric_code: "E4-4"
    metric_name: "IUCN Red List Species Affected"
    formula: "COUNT(species WHERE iucn_status IN ('CR', 'EN', 'VU') AND in_operational_area)"
    unit: "count"
    inputs:
      - species_in_operational_areas
      - iucn_red_list
    calculation_type: "conditional_count"
    deterministic: true
    zero_hallucination: true

  E4_015_species_cr:
    metric_code: "E4-4-CR"
    metric_name: "Critically Endangered Species Affected"
    formula: "COUNT(species WHERE iucn_status == 'CR')"
    unit: "count"
    inputs:
      - species_in_operational_areas
      - iucn_red_list
    calculation_type: "conditional_count"
    deterministic: true
