[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "greenlang-cli"
version = "0.3.0"
description = "GreenLang Climate OS: auditable climate data foundation and compliance applications, with Factors as the current hardened foundation"
readme = "README.md"
authors = [{ name = "GreenLang Maintainers", email = "maintainers@greenlang.io" }]
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
keywords = [
  "climate",
  "emissions",
  "sustainability",
  "carbon",
  "green",
  "environment",
  "AI",
  "orchestration",
  "platform",
  "infrastructure",
  "framework",
  "SDK",
  "climate-intelligence",
  "decarbonization",
  "net-zero",
  "ESG",
  "HVAC",
  "buildings",
  "energy"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Atmospheric Science",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
  "Environment :: Console",
  "Framework :: Pydantic",
  "Natural Language :: English",
]
dependencies = [
  "typer==0.9.0",
  "pydantic==2.12.5",
  "pyyaml==6.0.1",
  "rich==13.7.0",
  "jsonschema==4.26.0",
  "packaging==23.2",
  "python-dotenv==1.2.2",
  "typing-extensions==4.15.0",
  "httpx==0.28.1",
  "requests==2.33.0",
  "networkx==3.2.1",
  "tenacity==8.2.3",
  "pybreaker==1.0.2",
  "psutil==7.1.3",
]

[project.urls]
"Homepage" = "https://greenlang.io"
"Documentation" = "https://greenlang.io/docs"
"Repository" = "https://github.com/akshay-greenlang/Code-V1_GreenLang"
"Bug Tracker" = "https://github.com/akshay-greenlang/Code-V1_GreenLang/issues"
"Changelog" = "https://github.com/akshay-greenlang/Code-V1_GreenLang/blob/master/CHANGELOG.md"
"Discord" = "https://discord.gg/greenlang"

[project.scripts]
# CLI entry points
gl = "greenlang.cli.main:main"
greenlang = "greenlang.cli.main:main"  # Backward compatibility

