# =============================================================================
# PACK-034 ISO 50001 EnMS - Logistics Warehouse Preset
# =============================================================================
# Logistics warehouse with high-bay lighting, dock operations, MHE
# charging, and throughput-normalised EnPIs. EUI benchmark: 50-200
# kWh/m2/yr. Focus: throughput as primary relevant variable (pallets
# moved, m3 storage), shift-pattern baseline adjustments.
#
# Typical use cases:
#   - Ambient warehouses and distribution centres
#   - Cold storage and chilled distribution
#   - Logistics hubs and cross-dock facilities
#   - Third-party logistics (3PL) centres
#   - E-commerce fulfilment centres
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "LOGISTICS"
enms_maturity: "PLANNING"
country: "DE"
reporting_year: 2026
operating_hours_per_year: 5000

# --- SEU ---
seu:
  cumulative_threshold_pct: 80.0
  individual_threshold_pct: 5.0
  min_consumers: 3
  include_categories:
    - "LIGHTING"
    - "HVAC"
    - "MOTORS_DRIVES"
    - "REFRIGERATION"
    - "BUILDING_ENVELOPE"
  review_frequency: "ANNUAL"
  include_relevant_variables: true
  track_personnel: true

# --- Baseline ---
baseline:
  model_preference: "AUTO"
  min_data_months: 12
  max_cv_rmse: 25.0
  min_r_squared: 0.75
  significance_level: 0.05
  outlier_method: "IQR"
  auto_adjust: true

# --- EnPI ---
enpi:
  enpi_types:
    - "ABSOLUTE"
    - "INTENSITY"
    - "REGRESSION_BASED"
  normalization_method: "PRODUCTION"
  target_improvement_pct: 3.0
  track_by_seu: true
  benchmark_enabled: true

# --- CUSUM ---
cusum:
  method: "TABULAR"
  alert_threshold: 2.0
  monitoring_interval: "MONTHLY"
  seasonal_adjustment: "DEGREE_DAY"

# --- Degree Day ---
degree_day:
  heating_base_celsius: 15.5
  cooling_base_celsius: 18.3
  optimize_base_temp: true
  normalization_basis: "TMY3"

# --- Compliance ---
compliance:
  assessment_frequency: "ANNUAL"
  auto_gap_analysis: true
  nc_closure_days: 90
  surveillance_reminder_days: 30
  internal_audit_frequency: "ANNUAL"
  management_review_frequency: "ANNUAL"

# --- Monitoring ---
monitoring:
  granularity: "MONTHLY"
  data_retention_months: 60
  quality_threshold: 0.95
  auto_alerts: true

# --- Action Plan ---
action_plan:
  max_payback_years: 4.0
  discount_rate: 0.08
  verification_method: "OPTION_C"
  electricity_rate_eur_per_kwh: 0.22
  gas_rate_eur_per_kwh: 0.08

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  output_formats:
    - "MARKDOWN"
    - "HTML"
  include_charts: true
  include_recommendations: true
  management_review_template: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_days: 2555
