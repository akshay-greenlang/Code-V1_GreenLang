# =============================================================================
# PACK-034 ISO 50001 EnMS - Commercial Office Preset
# =============================================================================
# HVAC-dominated commercial office with lighting, plug loads, and
# occupancy-driven EnPIs. EUI benchmark: 150-300 kWh/m2/yr.
# Focus: weather-normalised baseline with HDD/CDD as primary
# relevant variables; area-based and occupancy-based intensity EnPIs.
#
# Typical use cases:
#   - Corporate headquarters and regional offices
#   - Multi-tenant commercial office buildings
#   - Government and public administration buildings
#   - Co-working and flexible workspace facilities
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "COMMERCIAL_OFFICE"
enms_maturity: "PLANNING"
country: "DE"
reporting_year: 2026
operating_hours_per_year: 2500

# --- SEU ---
seu:
  cumulative_threshold_pct: 80.0
  individual_threshold_pct: 5.0
  min_consumers: 3
  include_categories:
    - "HVAC"
    - "LIGHTING"
    - "IT_EQUIPMENT"
    - "WATER_HEATING"
  review_frequency: "ANNUAL"
  include_relevant_variables: true
  track_personnel: true

# --- Baseline ---
baseline:
  model_preference: "AUTO"
  min_data_months: 12
  max_cv_rmse: 25.0
  min_r_squared: 0.75
  significance_level: 0.05
  outlier_method: "IQR"
  auto_adjust: true

# --- EnPI ---
enpi:
  enpi_types:
    - "ABSOLUTE"
    - "INTENSITY"
    - "REGRESSION_BASED"
  normalization_method: "AREA"
  target_improvement_pct: 3.0
  track_by_seu: true
  benchmark_enabled: true

# --- CUSUM ---
cusum:
  method: "TABULAR"
  alert_threshold: 2.0
  monitoring_interval: "MONTHLY"
  seasonal_adjustment: "DEGREE_DAY"

# --- Degree Day ---
degree_day:
  heating_base_celsius: 15.5
  cooling_base_celsius: 18.3
  optimize_base_temp: true
  normalization_basis: "TMY3"

# --- Compliance ---
compliance:
  assessment_frequency: "ANNUAL"
  auto_gap_analysis: true
  nc_closure_days: 90
  surveillance_reminder_days: 30
  internal_audit_frequency: "ANNUAL"
  management_review_frequency: "ANNUAL"

# --- Monitoring ---
monitoring:
  granularity: "MONTHLY"
  data_retention_months: 60
  quality_threshold: 0.95
  auto_alerts: true

# --- Action Plan ---
action_plan:
  max_payback_years: 5.0
  discount_rate: 0.08
  verification_method: "OPTION_C"
  electricity_rate_eur_per_kwh: 0.28
  gas_rate_eur_per_kwh: 0.09

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  output_formats:
    - "MARKDOWN"
    - "HTML"
  include_charts: true
  include_recommendations: true
  management_review_template: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_days: 2555
