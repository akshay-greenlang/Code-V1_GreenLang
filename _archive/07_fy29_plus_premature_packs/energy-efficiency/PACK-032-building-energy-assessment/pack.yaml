metadata:
  name: PACK-032-building-energy-assessment
  version: "1.0.0"
  display_name: "Building Energy Assessment Pack"
  description: >-
    Comprehensive GreenLang deployment pack for building energy performance
    assessment, EPC/DEC rating, and retrofit optimization per EU Energy
    Performance of Buildings Directive (EPBD 2024/1275), EN ISO 52000-1:2017,
    and EN 15978:2011. Includes 10 engines for building envelope thermal
    analysis, EPC rating calculation, HVAC system assessment, domestic hot
    water evaluation, lighting energy assessment with LENI calculation,
    renewable energy integration with solar PV and heat pump SPF, building
    energy benchmarking against CIBSE TM46 and CRREM pathways, retrofit
    analysis with fabric-first and deep renovation strategies, indoor
    environment quality assessment per EN 16798, and whole-life carbon
    assessment per EN 15978 lifecycle stages A1-D. Bundles building-specific
    MRV agents for operational emissions, 20 data intake/quality agents, 10
    foundation agents, and bridged agents for LEED certification, BREEAM
    assessment, CRREM compliance, Energy Star benchmarking, EPC lodgement,
    and regulatory reporting. Supports commercial office, retail, hospitality,
    healthcare, education, residential multi-dwelling, public building, and
    mixed-use development sub-sectors with tailored presets and regulatory
    template packages.
