# ---------------------------------------------------------------------------
# MRV Building Agents - Building-specific MRV agents for operational emissions
# ---------------------------------------------------------------------------
agents_mrv:
  building_specific:
    - id: GL-MRV-BLD-001
      name: "Building Stationary Combustion Agent"
      description: "Calculates emissions from building heating plant -- gas boilers, oil boilers, biomass boilers, CHP"
      path: "greenlang/agents/mrv/building_stationary_combustion/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-002
      name: "Building Refrigerant Agent"
      description: "Calculates F-gas emissions from building cooling systems -- chillers, split systems, VRF/VRV"
      path: "greenlang/agents/mrv/building_refrigerants/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-003
      name: "Building Scope 2 Location Agent"
      description: "Calculates location-based electricity emissions for building HVAC, lighting, and small power"
      path: "greenlang/agents/mrv/building_scope2_location/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-004
      name: "Building Scope 2 Market Agent"
      description: "Calculates market-based electricity emissions using PPAs, GOs, RECs for building load"
      path: "greenlang/agents/mrv/building_scope2_market/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-005
      name: "Building District Heating Agent"
      description: "Calculates emissions from purchased district heating and heat network connections"
      path: "greenlang/agents/mrv/building_district_heating/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-006
      name: "Building District Cooling Agent"
      description: "Calculates emissions from purchased district cooling and chilled water networks"
      path: "greenlang/agents/mrv/building_district_cooling/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-007
      name: "Building Dual Reporting Agent"
      description: "Reconciles location-based and market-based Scope 2 for building portfolio reporting"
      path: "greenlang/agents/mrv/building_dual_reporting/"
      required: true
      version: "1.0.0"
    - id: GL-MRV-BLD-008
      name: "Building Fuel & Energy Activities Agent"
      description: "Calculates upstream fuel and energy-related emissions (Scope 3 Cat 3) for building energy"
      path: "greenlang/agents/mrv/building_fuel_energy/"
      required: true
      version: "1.0.0"

  decarbonization:
    - id: GL-DECARB-BLD-001
      name: "Building Decarbonization Pathway Agent"
      description: "Models building decarbonization pathways aligned with CRREM, SBTi, and EPBD MEPS targets"
      path: "greenlang/agents/decarb/building_pathway/"
      required: true
      version: "1.0.0"
    - id: GL-DECARB-BLD-002
      name: "Building Retrofit Impact Agent"
      description: "Calculates carbon impact of retrofit measures across Scope 1, 2, and embodied carbon"
      path: "greenlang/agents/decarb/building_retrofit_impact/"
      required: true
      version: "1.0.0"

  building_profile:
    - id: GL-BLD-PROFILE-001
      name: "Building Profile Agent"
      description: "Manages building asset data, construction details, system inventory, and renovation history"
      path: "greenlang/agents/building/building_profile/"
      required: true
      version: "1.0.0"

# ---------------------------------------------------------------------------
# Data Agents - Supporting data intake and quality agents (20 agents)
# ---------------------------------------------------------------------------
agents_data:
  # Data Intake (9 agents)
  - id: AGENT-DATA-001
    name: "PDF & Invoice Extractor"
    description: "Extracts energy data from utility bills, EPC certificates, survey reports, and equipment specifications"
    required: true
  - id: AGENT-DATA-002
    name: "Excel/CSV Normalizer"
    description: "Normalizes meter data exports, building schedules, equipment inventories, and material take-offs"
    required: true
  - id: AGENT-DATA-003
    name: "ERP/Finance Connector"
    description: "Connects to property management systems (Yardi, MRI, SAP RE-FX) for building and lease data"
    required: true
  - id: AGENT-DATA-004
    name: "API Gateway Agent"
    description: "Routes external API connections for weather, grid factors, CRREM pathways, EPC registers, and Energy Star"
    required: true
  - id: AGENT-DATA-005
    name: "EUDR Traceability Connector"
    description: "Supply chain traceability for timber and bio-based building materials (whole-life carbon)"
    required: false
  - id: AGENT-DATA-006
    name: "GIS/Mapping Connector"
    description: "Geospatial data for building locations, solar irradiance mapping, and district heating network proximity"
    required: false
  - id: AGENT-DATA-007
    name: "Deforestation Satellite Connector"
    description: "Satellite data for timber sourcing verification in whole-life carbon assessment"
    required: false
  - id: AGENT-DATA-008
    name: "Supplier Questionnaire Processor"
    description: "Processes equipment manufacturer EPDs, material carbon factors, and supply chain questionnaires"
    required: true
  - id: AGENT-DATA-020
    name: "Climate Hazard Connector"
    description: "Physical climate hazard data for overheating risk, flood risk, and building resilience assessment"
    required: false
  # Data Quality (11 agents)
  - id: AGENT-DATA-009
    name: "Spend Data Categorizer"
    description: "Categorizes building procurement spend for Scope 3 estimation and embodied carbon tracking"
    required: true
  - id: AGENT-DATA-010
    name: "Data Quality Profiler"
    description: "Profiles data quality across meter data, building surveys, material quantities, and EPC records"
    required: true
  - id: AGENT-DATA-011
    name: "Duplicate Detection Agent"
    description: "Detects duplicate meter readings, building records, EPC entries, and material line items"
    required: true
  - id: AGENT-DATA-012
    name: "Missing Value Imputer"
    description: "Imputes missing meter data using regression, interpolation, and similar-day methods for buildings"
    required: true
  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous building energy consumption, unusual EUI spikes, and meter faults"
    required: true
  - id: AGENT-DATA-014
    name: "Time Series Gap Filler"
    description: "Fills temporal gaps in continuous building metering and BMS data with validated estimates"
    required: true
  - id: AGENT-DATA-015
    name: "Cross-Source Reconciliation"
    description: "Reconciles data across utility meters, BMS, sub-meters, EPC records, and property management systems"
    required: true
  - id: AGENT-DATA-016
    name: "Data Freshness Monitor"
    description: "Monitors staleness of meter data, weather feeds, EPC certificates, CRREM pathways, and carbon factors"
    required: true
  - id: AGENT-DATA-017
    name: "Schema Migration Agent"
    description: "Manages schema evolution for EPBD, SAP, SBEM, EN 15978, and certification format changes"
    required: true
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from raw meter data and survey inputs through calculations to EPC and report outputs"
    required: true
  - id: AGENT-DATA-019
    name: "Validation Rule Engine"
    description: "Enforces U-value limits, EPC calculation validation, EN 15978 completeness, and M&V rules"
    required: true

