  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with building-level and zone-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - admin
    - energy_assessor
    - building_manager
    - tenant
    - viewer

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "scikit-learn>=1.3"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "lxml>=4.9"
    - "cryptography>=41.0"
    - "ladybug-core>=0.42"
    - "eppy>=0.5"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

  regulatory_references:
    - id: "EPBD_2024_1275"
      name: "EU Energy Performance of Buildings Directive (recast)"
      reference: "Directive (EU) 2024/1275"
      description: "Zero-emission buildings, MEPS, Building Renovation Passports, EPC reform, solar obligations"
    - id: "EN_ISO_52000_1"
      name: "EN ISO 52000-1:2017"
      reference: "Overarching EPB assessment framework"
      description: "Overall structure for energy performance calculation procedures"
    - id: "EN_15603"
      name: "EN 15603:2008"
      reference: "Overall energy use and energy ratings"
      description: "Calculated (asset) and measured (operational) energy rating methodology"
    - id: "EN_15978"
      name: "EN 15978:2011"
      reference: "Assessment of environmental performance of buildings"
      description: "Whole-life carbon lifecycle stages A1-D, reference study period, system boundary"
    - id: "EN_16798_1"
      name: "EN 16798-1:2019"
      reference: "Indoor environmental input parameters"
      description: "Thermal comfort, IAQ ventilation rates, Categories I-IV"
    - id: "ASHRAE_90_1_2022"
      name: "ASHRAE Standard 90.1-2022"
      reference: "Energy Standard for Sites and Buildings"
      description: "Prescriptive, trade-off, and performance compliance paths"
    - id: "LEED_V4_1"
      name: "LEED v4.1"
      reference: "Leadership in Energy and Environmental Design"
      description: "Energy and Atmosphere prerequisites and credits"
    - id: "BREEAM_2024"
      name: "BREEAM 2024"
      reference: "Building Research Establishment Environmental Assessment Method"
      description: "Ene category credits, EPR, DSM methodology"
    - id: "CRREM_V2"
      name: "CRREM v2.0"
      reference: "Carbon Risk Real Estate Monitor"
      description: "Science-based decarbonization pathways, stranding year, 1.5C/2C alignment"
    - id: "ENERGY_STAR_PM"
      name: "Energy Star Portfolio Manager"
      reference: "EPA commercial building benchmarking"
      description: "1-100 score, source EUI normalization, 75+ certification"

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_weather_data_source
    - verify_epc_methodology_version
    - verify_crrem_pathway_data
    - verify_epd_carbon_factor_database

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
    new:
      - "PACK032-001"  # Building profiles, zones, and construction details tables
      - "PACK032-002"  # Envelope U-values, thermal bridges, and air tightness tables
      - "PACK032-003"  # EPC rating, SAP/SBEM calculation, and certificate tables
      - "PACK032-004"  # HVAC systems, efficiency, and controls assessment tables
      - "PACK032-005"  # DHW systems, solar thermal, and distribution loss tables
      - "PACK032-006"  # Lighting inventory, LENI calculation, and daylight tables
      - "PACK032-007"  # Renewable systems, PV yield, heat pump SPF tables
      - "PACK032-008"  # Benchmark data, CIBSE TM46, CRREM pathway tables
      - "PACK032-009"  # Retrofit measures, packages, and Building Renovation Passport tables
      - "PACK032-010"  # Indoor environment, thermal comfort, and IAQ tables
      - "PACK032-011"  # Whole-life carbon, EN 15978 lifecycle stages, EPD tables
      - "PACK032-012"  # Meter data management and time series tables (TimescaleDB hypertable)

  post_install:
    - seed_emission_factors
    - seed_epc_methodology_tables
    - seed_uvalue_defaults_by_construction_age
    - seed_cibse_tm46_benchmarks
    - seed_crrem_pathway_data
    - seed_energy_star_benchmarks
    - seed_epd_carbon_factor_database
    - seed_en15978_reference_service_life
    - seed_weather_station_metadata
    - seed_default_presets
    - configure_timescaledb_hypertables
    - run_health_checks

