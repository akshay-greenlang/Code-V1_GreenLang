    name: "Energy Star Portfolio Manager Agent"
    description: "Calculates Energy Star score, manages property data, and tracks portfolio benchmarking"
    required: true
  - id: epc-methodology-agent
    name: "EPC Methodology Agent"
    description: "Maintains SAP, RdSAP, and SBEM calculation engines with version control and national annexes"
    required: true
  - id: epd-database-agent
    name: "EPD Database Agent"
    description: "Manages Environmental Product Declaration database for whole-life carbon material carbon factors"
    required: true
  - id: building-renovation-passport-agent
    name: "Building Renovation Passport Agent"
    description: "Generates and maintains Building Renovation Passports per EPBD Article 12 requirements"
    required: true
  - id: smart-readiness-indicator-agent
    name: "Smart Readiness Indicator Agent"
    description: "Calculates building SRI (Smart Readiness Indicator) per EPBD delegated regulation methodology"
    required: true
  - id: regulatory-change-monitor
    name: "Regulatory Change Monitor Agent"
    description: "Monitors EPBD, MEPS, ASHRAE, LEED, BREEAM, and EN standard updates affecting building energy"
    required: true
  - id: grid-carbon-agent
    name: "Grid Carbon Intensity Agent"
    description: "Provides real-time and forecast grid carbon intensity for operational carbon and demand response"
    required: false

