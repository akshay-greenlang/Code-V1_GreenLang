# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  single_building:
    envelope_analysis_ms: 1500
    epc_rating_calculation_ms: 2000
    hvac_assessment_ms: 1800
    dhw_assessment_ms: 800
    lighting_assessment_ms: 1000
    renewable_integration_ms: 1500
    benchmark_comparison_ms: 500
    retrofit_analysis_ms: 2000
    indoor_environment_ms: 1200
    whole_life_carbon_ms: 2000
    full_assessment_target_seconds: 15
  batch_processing:
    buildings_per_batch: 100
