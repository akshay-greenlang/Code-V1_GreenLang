# =============================================================================
# PACK-032: Building Energy Assessment Pack
# GreenLang Energy Efficiency Pack for Building Energy Performance Assessment
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for building energy performance assessment, rating, and
# retrofit optimization. It covers the full building energy lifecycle from
# envelope thermal analysis through renewable integration and whole-life carbon
# assessment, tailored for commercial offices, retail, hospitality, healthcare,
# education, residential multi-dwelling, public buildings, and mixed-use
# developments.
#
# Buildings account for approximately 40% of global energy consumption and 36%
# of energy-related CO2 emissions. This pack enables systematic evaluation of
# building energy performance through rigorous engineering analysis, EPC rating
# calculation, retrofit pathway optimization, and certification readiness. It
# follows a zero-hallucination approach: all energy calculations use
# deterministic formulas from EN ISO 52000, EN 15603, EN 16798, and ASHRAE 90.1
# -- no LLM is used in any calculation path.
#
# Key Capabilities:
#   - Building envelope assessment (U-values, thermal bridging, air tightness,
#     condensation risk, EN ISO 6946, EN ISO 13370, EN ISO 10077)
#   - EPC/DEC rating calculation (SAP/RdSAP for dwellings, SBEM for non-
#     domestic, EPBD recast methodology, A-G banding)
#   - HVAC system assessment (heating plant efficiency, cooling COP/EER,
#     ventilation SFP, distribution losses, controls optimization)
#   - Domestic hot water assessment (system efficiency, solar thermal,
#     heat pump DHW, storage losses, distribution losses)
#   - Lighting assessment (LENI calculation EN 15193, daylight factor,
#     LED retrofit, occupancy and daylight controls)
#   - Renewable energy integration (solar PV yield, heat pump SPF,
#     wind feasibility, battery storage, grid interaction)
#   - Building benchmark comparison (CIBSE TM46, Energy Star, DEC ratings,
#     CRREM decarbonization pathways, NABERS)
#   - Retrofit analysis (fabric first approach, whole-house retrofit,
#     EnerPHit, deep renovation, staged improvement pathways)
#   - Indoor environment quality (thermal comfort PMV/PPD per EN 16798,
#     IAQ ventilation rates, daylighting, overheating TM59/CIBSE TM52)
#   - Whole-life carbon assessment (EN 15978 lifecycle stages A1-D,
#     embodied carbon, operational carbon, biogenic carbon, circularity)
#
# Regulatory References:
#   - EPBD: Directive (EU) 2024/1275 (Energy Performance of Buildings recast)
#   - EN ISO 52000-1:2017 (Energy Performance of Buildings - Overarching EPB)
#   - EN 15603:2008 (Energy Performance of Buildings - Overall energy use)
#   - EN 15978:2011 (Sustainability of Buildings - Assessment of environmental
#     performance / Whole-life carbon)
#   - EN 16798-1:2019 (Energy Performance of Buildings - Ventilation / Indoor
#     environment)
#   - ASHRAE 90.1-2022 (Energy Standard for Sites and Buildings)
#   - LEED v4.1 (Leadership in Energy and Environmental Design)
#   - BREEAM 2024 (Building Research Establishment Environmental Assessment)
#   - CRREM (Carbon Risk Real Estate Monitor - decarbonization pathways)
#   - Energy Star Portfolio Manager (US building benchmarking program)
#   - EN ISO 6946 (Building components - Thermal resistance and transmittance)
#   - EN ISO 13370 (Thermal performance - Heat transfer via the ground)
#   - EN ISO 10077 (Windows and doors - Thermal transmittance)
#   - EN 15193 (Energy performance of buildings - Lighting energy requirements)
#   - EN ISO 13790 (Energy performance of buildings - Calculation of energy use)
#   - EN 15316 series (Heating systems and water based cooling systems)
#   - CIBSE TM46 (Energy benchmarks for building types)
#   - CIBSE TM54 (Evaluating operational energy use)
#   - CIBSE Guide F (Energy efficiency in buildings)
#   - GHG Protocol: Corporate Standard (Scope 1+2 building energy emissions)
#
# Building Sub-Sectors Supported:
#   - Commercial Office: Grade A, Grade B, serviced offices, co-working
#   - Retail: High street, shopping centres, supermarkets, warehouses
#   - Hospitality: Hotels, restaurants, conference centres
#   - Healthcare: Hospitals, clinics, care homes, laboratories
#   - Education: Schools, universities, lecture halls, libraries
#   - Residential: Multi-dwelling units, social housing, student accommodation
#   - Public Buildings: Government offices, museums, leisure centres
#   - Mixed-Use: Combined commercial, residential, retail developments
#
# Version History:
#   1.0.0 - Initial release (2026-03-20)
# =============================================================================

