# =============================================================================
# PACK-032 Building Energy Assessment - Residential Multifamily Preset
# =============================================================================
# Multi-family apartment blocks: diverse occupancy patterns, communal
# heating and hot water systems. Typical 500-10,000 m2 GIA.
# Focus on building envelope (fabric-first), heating system, DHW,
# and common area energy. Typical EUI: 80-200 kWh/m2/yr,
# target <60 kWh/m2/yr (good practice).
#
# Typical use cases:
#   - Social housing tower blocks
#   - Private rental apartment buildings
#   - New build residential developments
#   - Housing association portfolios
# =============================================================================

# --- Building Details ---
building_name: ""
building_address: ""
client_name: ""
building_type: "RESIDENTIAL_APARTMENT"
building_age: "1965_1982"
climate_zone: "CENTRAL_MARITIME"
country: "GB"
assessment_level: "STANDARD"
certification_target: "NONE"
reporting_year: 2025

# --- Building Characteristics ---
number_of_floors: 8
floor_to_ceiling_height_m: 2.5
occupancy_pattern: "CONTINUOUS"
operating_hours_per_year: 8760
ownership_type: "MULTI_TENANT"
primary_heating_fuel: "NATURAL_GAS"

# --- Envelope (CRITICAL for residential - fabric first) ---
envelope:
  wall_u_target: 0.22
  roof_u_target: 0.15
  floor_u_target: 0.18
  window_u_target: 1.2
  window_g_value_target: 0.55
  airtightness_target_m3_h_m2: 3.0
  thermal_bridge_method: "TABULATED_PSI"
  condensation_risk_check: true
  overheating_assessment: true

# --- HVAC ---
hvac:
  heating_system_type: "gas_boiler"
  cooling_system_type: "none"
  ventilation_type: "MVHR"
  heat_recovery_enabled: true
  heat_recovery_efficiency_pct: 85.0
  target_heating_cop: 0.92
  target_cooling_seer: 4.0
  boiler_efficiency_target_pct: 92.0
  ahu_optimization: false
  free_cooling_assessment: false
  bms_optimization: false
  zone_control_assessment: true
  demand_controlled_ventilation: false
  vsd_on_pumps_fans: false
  pipe_insulation_assessment: true

# --- Lighting ---
lighting:
  lpd_target_w_m2: 6.0
  control_type: "OCCUPANCY_SENSING"
  daylight_factor_target: 2.0
  led_retrofit_analysis: true
  outdoor_lighting: true
  lux_level_measurement: false
  parasitic_lighting_load: true

# --- DHW (significant load for residential) ---
dhw:
  system_type: "gas_boiler"
  solar_thermal_enabled: true
  solar_thermal_contribution_pct: 20.0
  legionella_temp_c: 60.0
  distribution_loss_assessment: true
  secondary_return_enabled: true

# --- Renewables ---
renewable:
  solar_pv_enabled: true
  pv_capacity_kwp: 30.0
  pv_yield_kwh_per_kwp: 850.0
  solar_thermal_enabled: true
  collector_area_m2: 20.0
  heat_pump_enabled: false

# --- Benchmark ---
benchmark:
  enabled: true
  benchmark_standard: "NATIONAL"
  reference_eui_kwh_m2: 60
  peer_group_size: 20
  dec_rating_enabled: false
  asset_rating_enabled: true
  percentile_tracking: true
  gap_to_best_practice: true
  trend_analysis_years: 3
  kpi_set:
    - "eui_kwh_m2_yr"
    - "heating_kwh_m2_yr"
    - "dhw_kwh_m2_yr"
    - "electricity_kwh_m2_yr"
    - "gas_kwh_m2_yr"
    - "carbon_kgco2_m2_yr"
    - "epc_rating"
    - "sap_rating"

# --- Retrofit ---
retrofit:
  budget_eur: 800000
  retrofit_ambition: "LOW_ENERGY"
  discount_rate_pct: 3.5
  energy_price_escalation_pct: 3.0
  study_period_years: 30
  carbon_price_eur_per_tonne: 85.0
  fabric_first_approach: true
  include_grants_subsidies: true
  max_payback_years: 20.0
  enable_staged_retrofit: true

# --- Indoor Environment ---
indoor_environment:
  ieq_category: "CATEGORY_II"
  thermal_comfort_method: "ADAPTIVE"
  target_co2_ppm: 800
  target_temperature_heating_c: 21.0
  target_temperature_cooling_c: 26.0
  daylighting_assessment: true
  overheating_hours_threshold: 35

# --- Carbon ---
carbon:
  grid_emission_factor_kg_per_kwh: 0.233
  gas_emission_factor_kg_per_kwh: 0.204
  include_embodied: true
  grid_decarbonisation_enabled: true

# --- Compliance ---
compliance:
  epbd_country: "GB"
  epc_methodology: "SAP"
  mees_enabled: true
  mees_minimum_rating: "E"
  dec_required: false
  epbd_renovation_passport: true

# --- Report ---
report:
  language: "en"
  currency: "GBP"
  include_executive_summary: true
  include_financial_analysis: true
  include_retrofit_roadmap: true
  include_epc_simulation: true
  include_carbon_trajectory: true
  output_formats:
    - "PDF"
    - "XLSX"
  watermark_draft: true

# --- Integration ---
integration:
  bms_enabled: false
  weather_source: "met_office"
  epc_register_lookup: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  measure_tracking: true
  epc_lodgement_record: true
