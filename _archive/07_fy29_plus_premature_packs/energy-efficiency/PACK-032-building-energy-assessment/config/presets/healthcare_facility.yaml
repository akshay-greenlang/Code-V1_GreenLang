# =============================================================================
# PACK-032 Building Energy Assessment - Healthcare Facility Preset
# =============================================================================
# Hospitals and healthcare facilities: 24h critical operation, strict IAQ
# requirements, high ventilation rates. Typical 5,000-100,000 m2 GIA.
# Focus on ventilation (infection control), heating/steam, medical
# equipment load, and backup power. Typical EUI: 300-600 kWh/m2/yr,
# target <300 kWh/m2/yr.
#
# Typical use cases:
#   - Acute care hospitals
#   - Outpatient clinics and medical centres
#   - Mental health facilities
#   - Care homes and residential healthcare
# =============================================================================

# --- Building Details ---
building_name: ""
building_address: ""
client_name: ""
building_type: "HOSPITAL"
building_age: "1965_1982"
climate_zone: "CENTRAL_MARITIME"
country: "GB"
assessment_level: "DETAILED"
certification_target: "BREEAM_EXCELLENT"
reporting_year: 2025

# --- Building Characteristics ---
number_of_floors: 5
floor_to_ceiling_height_m: 3.2
occupancy_pattern: "CONTINUOUS"
operating_hours_per_year: 8760
ownership_type: "PUBLIC_SECTOR"
primary_heating_fuel: "NATURAL_GAS"

# --- Envelope ---
envelope:
  wall_u_target: 0.26
  roof_u_target: 0.18
  floor_u_target: 0.22
  window_u_target: 1.4
  window_g_value_target: 0.45
  airtightness_target_m3_h_m2: 5.0
  thermal_bridge_method: "TABULATED_PSI"
  condensation_risk_check: true
  overheating_assessment: true

# --- HVAC (CRITICAL for healthcare - IAQ and infection control) ---
hvac:
  heating_system_type: "gas_boiler"
  cooling_system_type: "chiller"
  ventilation_type: "MECHANICAL_SUPPLY_EXTRACT"
  heat_recovery_enabled: true
  heat_recovery_efficiency_pct: 75.0
  target_heating_cop: 0.92
  target_cooling_seer: 5.0
  boiler_efficiency_target_pct: 92.0
  ahu_optimization: true
  free_cooling_assessment: true
  bms_optimization: true
  zone_control_assessment: true
  demand_controlled_ventilation: false
  vsd_on_pumps_fans: true
  pipe_insulation_assessment: true

# --- Lighting ---
lighting:
  lpd_target_w_m2: 8.0
  control_type: "COMBINED_OCCUPANCY_DAYLIGHT"
  daylight_factor_target: 2.5
  led_retrofit_analysis: true
  emergency_lighting_audit: true
  outdoor_lighting: true
  lux_level_measurement: true
  parasitic_lighting_load: true

# --- DHW ---
dhw:
  system_type: "gas_boiler"
  solar_thermal_enabled: true
  solar_thermal_contribution_pct: 15.0
  legionella_temp_c: 60.0
  distribution_loss_assessment: true
  secondary_return_enabled: true

# --- Renewables ---
renewable:
  solar_pv_enabled: true
  pv_capacity_kwp: 200.0
  pv_yield_kwh_per_kwp: 850.0
  solar_thermal_enabled: true
  collector_area_m2: 50.0
  heat_pump_enabled: false

# --- Benchmark ---
benchmark:
  enabled: true
  benchmark_standard: "CIBSE_TM46"
  reference_eui_kwh_m2: 280
  peer_group_size: 10
  dec_rating_enabled: true
  asset_rating_enabled: true
  percentile_tracking: true
  gap_to_best_practice: true
  trend_analysis_years: 5
  kpi_set:
    - "eui_kwh_m2_yr"
    - "heating_kwh_m2_yr"
    - "cooling_kwh_m2_yr"
    - "ventilation_kwh_m2_yr"
    - "electricity_kwh_m2_yr"
    - "carbon_kgco2_m2_yr"
    - "epc_rating"

# --- Retrofit ---
retrofit:
  budget_eur: 2000000
  retrofit_ambition: "COST_OPTIMAL"
  discount_rate_pct: 3.5
  energy_price_escalation_pct: 2.5
  study_period_years: 30
  carbon_price_eur_per_tonne: 85.0
  fabric_first_approach: true
  max_payback_years: 15.0
  enable_staged_retrofit: true

# --- Indoor Environment (CRITICAL - strict IAQ for infection control) ---
indoor_environment:
  ieq_category: "CATEGORY_I"
  thermal_comfort_method: "PMV_PPD"
  target_co2_ppm: 700
  target_temperature_heating_c: 22.0
  target_temperature_cooling_c: 24.0
  daylighting_assessment: true
  acoustic_assessment: true
  post_occupancy_evaluation: true
  overheating_hours_threshold: 25

# --- Carbon ---
carbon:
  grid_emission_factor_kg_per_kwh: 0.233
  gas_emission_factor_kg_per_kwh: 0.204
  include_embodied: true
  grid_decarbonisation_enabled: true
  scope_1_included: true
  scope_2_included: true
  refrigerant_leakage_included: true

# --- Compliance ---
compliance:
  epbd_country: "GB"
  epc_methodology: "SBEM"
  mees_enabled: false
  dec_required: true
  eed_public_body: true
  epbd_renovation_passport: true

# --- Report ---
report:
  language: "en"
  currency: "GBP"
  include_executive_summary: true
  include_financial_analysis: true
  include_thermal_model: true
  include_retrofit_roadmap: true
  include_epc_simulation: true
  include_carbon_trajectory: true
  output_formats:
    - "PDF"
    - "XLSX"
  watermark_draft: true

# --- Integration ---
integration:
  bms_enabled: true
  bms_protocol: "BACNET"
  weather_source: "met_office"
  epc_register_lookup: true
  utility_data_api: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  external_audit_export: true
  measure_tracking: true
  epc_lodgement_record: true
