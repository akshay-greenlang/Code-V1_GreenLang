# =============================================================================
# PACK-038 Peak Shaving - University Campus Preset
# =============================================================================
# University and college campuses with large-scale HVAC scheduling, EV fleet
# management, thermal energy storage, and multi-building coordination. Typical
# peak demand 5000-30000 kW. Peak drivers: HVAC (45%), research (20%),
# lighting (15%), dining (10%), other (10%). Target peak reduction: 15-25%
# via HVAC scheduling, EV fleet management, and thermal storage dispatch.
# Summer months offer enhanced opportunity due to reduced occupancy. Research
# labs may have special exclusion requirements.
#
# Typical use cases:
#   - Large research universities with central plant
#   - Community colleges and teaching campuses
#   - Medical school campuses (non-clinical buildings)
#   - Multi-building campus districts
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "UNIVERSITY_CAMPUS"
country: "US"
reporting_year: 2026
operating_hours_per_year: 6000

# --- Interval Data ---
interval_data:
  interval_length: "15_MIN"
  minimum_data_coverage_pct: 90
  peak_window_start_hour: 12
  peak_window_end_hour: 18
  lookback_months: 12
  outlier_threshold_sigma: 3.0
  weather_normalization: true

# --- Peak Target ---
peak_target:
  target_reduction_pct: 20
  trigger_threshold_pct: 83
  summer_enhanced: true
  summer_extra_reduction_pct: 10
  min_sustained_minutes: 15

# --- Demand Charge ---
demand_charge:
  tariff_type: "DEMAND_CHARGE"
  on_peak_demand_charge_eur_per_kw: 14.00
  off_peak_demand_charge_eur_per_kw: 4.00
  on_peak_start_hour: 12
  on_peak_end_hour: 20
  critical_peak_pricing_enabled: false
  incentive_program: "PEAK_REDUCTION"

# --- BESS ---
bess:
  enabled: true
  capacity_kwh: 5000
  max_discharge_kw: 2500
  max_charge_kw: 1250
  chemistry: "LFP"
  min_soc_pct: 10
  max_soc_pct: 95
  round_trip_efficiency: 0.92
  cycles_per_day_limit: 2
  degradation_tracking: true
  warranty_cycles: 6000
  reserve_for_backup_pct: 5

# --- Load Shift ---
load_shift:
  pre_cooling_enabled: true
  pre_cooling_duration_minutes: 90
  pre_cooling_setpoint_offset_c: -2.5
  coast_duration_minutes: 150
  max_temperature_rise_c: 3.0
  ev_charging_deferral: true
  production_batch_scheduling: false
  compressed_air_management: false
  thermal_mass_ride_through: true

# --- Coincident Peak ---
cp:
  enabled: true
  methodology: "PJM_5CP"
  alert_lead_time_minutes: 90
  cp_season_start_month: 6
  cp_season_end_month: 9
  target_reduction_during_cp_pct: 25
  max_cp_events_per_season: 15
  notification_channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
  multi_site_coordination: true

# --- Ratchet ---
ratchet:
  enabled: true
  ratchet_type: "ANNUAL"
  ratchet_percentage: 75
  ratchet_lookback_months: 12

# --- Power Factor ---
power_factor:
  enabled: true
  current_power_factor: 0.88
  target_power_factor: 0.95
  utility_penalty_threshold: 0.90
  correction_type: "CAPACITOR_BANK"
  kva_demand_billing: false

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.10
  demand_charge_eur_per_kw: 14.00
  ratchet_demand_charge_eur_per_kw: 11.00
  bess_capex_eur_per_kwh: 320
  bess_annual_opex_pct: 2.0
  discount_rate: 0.06
  analysis_period_years: 15
  energy_price_escalation_pct: 3.0
  demand_charge_escalation_pct: 2.0
  include_incentives: true

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  marginal_emission_factor_kgco2_per_kwh: 0.65
  carbon_price_eur_per_tco2: 85.0
  sbti_alignment_tracking: true
  peak_hour_premium_factor: 1.3

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "CSV"
  executive_summary: true
  peak_event_log: true
  bess_performance_report: true
  cp_performance_report: true
  ratchet_exposure_report: true

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
  warning_threshold_pct: 78
  critical_threshold_pct: 88
  escalation_minutes: 10
  suppression_window_minutes: 30

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
