# =============================================================================
# PACK-038 Peak Shaving - Data Center Preset
# =============================================================================
# Data centres and colocation facilities with very limited peak shaving
# flexibility. Only CRAH/CRAC cooling setpoint adjustments, UPS eco-mode
# switching, non-critical lighting, and EV charging deferral are permissible.
# IT compute, network, and storage loads are permanently excluded. Typical
# peak demand 2000-20000 kW. Peak drivers: IT compute (55%), cooling (35%),
# UPS/power distribution (10%). Target peak reduction: 5-10% via cooling
# optimisation and UPS efficiency gains. PUE constraint: max +0.10 PUE
# increase during shaving events. IT uptime SLAs (99.99%+) are absolute.
#
# Typical use cases:
#   - Enterprise data centres (Tier III/IV)
#   - Colocation and hosting facilities
#   - Server rooms within office buildings
#   - Edge computing and telecom sites
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "DATA_CENTER"
country: "US"
reporting_year: 2026
operating_hours_per_year: 8760

# --- Interval Data ---
interval_data:
  interval_length: "5_MIN"
  minimum_data_coverage_pct: 99
  peak_window_start_hour: 12
  peak_window_end_hour: 18
  lookback_months: 12
  outlier_threshold_sigma: 3.0
  weather_normalization: true

# --- Peak Target ---
peak_target:
  target_reduction_pct: 8
  trigger_threshold_pct: 92
  summer_enhanced: true
  summer_extra_reduction_pct: 2
  min_sustained_minutes: 10

# --- Demand Charge ---
demand_charge:
  tariff_type: "DEMAND_CHARGE"
  on_peak_demand_charge_eur_per_kw: 20.00
  off_peak_demand_charge_eur_per_kw: 8.00
  on_peak_start_hour: 12
  on_peak_end_hour: 20
  critical_peak_pricing_enabled: true
  critical_peak_multiplier: 3.0
  incentive_program: "PEAK_REDUCTION"

# --- BESS ---
bess:
  enabled: true
  capacity_kwh: 5000
  max_discharge_kw: 2000
  max_charge_kw: 1000
  chemistry: "LFP"
  min_soc_pct: 20
  max_soc_pct: 95
  round_trip_efficiency: 0.93
  cycles_per_day_limit: 2
  degradation_tracking: true
  warranty_cycles: 7000
  reserve_for_backup_pct: 30

# --- Load Shift ---
load_shift:
  pre_cooling_enabled: true
  pre_cooling_duration_minutes: 30
  pre_cooling_setpoint_offset_c: -1.5
  coast_duration_minutes: 60
  max_temperature_rise_c: 2.0
  ev_charging_deferral: true
  production_batch_scheduling: false
  compressed_air_management: false
  thermal_mass_ride_through: false

# --- Coincident Peak ---
cp:
  enabled: true
  methodology: "PJM_5CP"
  alert_lead_time_minutes: 60
  cp_season_start_month: 6
  cp_season_end_month: 9
  target_reduction_during_cp_pct: 10
  max_cp_events_per_season: 10
  notification_channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
    - "DCIM_SIGNAL"
  multi_site_coordination: false

# --- Ratchet ---
ratchet:
  enabled: true
  ratchet_type: "ANNUAL"
  ratchet_percentage: 85
  ratchet_lookback_months: 12

# --- Power Factor ---
power_factor:
  enabled: true
  current_power_factor: 0.95
  target_power_factor: 0.98
  utility_penalty_threshold: 0.90
  correction_type: "ACTIVE_FILTER"
  kva_demand_billing: true

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.08
  demand_charge_eur_per_kw: 20.00
  ratchet_demand_charge_eur_per_kw: 17.00
  bess_capex_eur_per_kwh: 380
  bess_annual_opex_pct: 2.0
  discount_rate: 0.10
  analysis_period_years: 7
  energy_price_escalation_pct: 3.0
  demand_charge_escalation_pct: 2.0
  include_incentives: true

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.38
  marginal_emission_factor_kgco2_per_kwh: 0.60
  carbon_price_eur_per_tco2: 85.0
  sbti_alignment_tracking: true
  market_based_accounting: true
  peak_hour_premium_factor: 1.2

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
    - "JSON"
  executive_summary: true
  peak_event_log: true
  bess_performance_report: true
  cp_performance_report: true
  ratchet_exposure_report: true

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - "EMAIL"
    - "SMS"
    - "BMS_SIGNAL"
    - "DCIM_SIGNAL"
  warning_threshold_pct: 85
  critical_threshold_pct: 93
  escalation_minutes: 3
  suppression_window_minutes: 15

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
