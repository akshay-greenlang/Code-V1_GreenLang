# =============================================================================
# PACK-031 Industrial Energy Audit - Data Center Preset
# =============================================================================
# Data centers, server farms, colocation facilities. Focus on PUE (Power
# Usage Effectiveness), cooling optimization, UPS efficiency, hot/cold aisle
# containment, and free cooling maximization. Steam and compressed air
# engines disabled (not applicable). Target PUE <1.3. EN 50600 series
# alignment. Electricity is nearly 100% of energy consumption.
#
# Typical use cases:
#   - Enterprise data centers
#   - Colocation / multi-tenant facilities
#   - Edge data centers and modular facilities
#   - Hyperscale campuses (per building)
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
industry_sector: "DATA_CENTER"
facility_tier: "LARGE_ENTERPRISE"
country: "DE"
reporting_year: 2025
operating_hours_per_year: 8760
number_of_shifts: 3
production_unit_name: "kW_IT"

energy_carriers:
  - "ELECTRICITY"
  - "DISTRICT_COOLING"

# --- Baseline ---
baseline:
  min_months: 12
  r_squared_threshold: 0.80
  cv_rmse_threshold: 0.20
  normalization_method: "NONE"
  secondary_variables:
    - "it_load_kw"
    - "outdoor_temperature"
  granularity: "MONTHLY"
  energy_carriers:
    - "ELECTRICITY"
  ipmvp_option: "C"

# --- Audit ---
audit:
  default_audit_level: "DETAILED"
  en16247_compliance: true
  en16247_parts: [1, 2]
  eed_article_8: true
  schedule_months: 48
  significant_energy_use_threshold_pct: 3.0
  minimum_coverage_pct: 95.0
  measure_payback_threshold_years: 5.0
  include_no_cost_measures: true
  include_behavioral_measures: true

# --- Equipment (UPS, PDU, cooling plant) ---
equipment:
  enabled: true
  motor_efficiency_min_class: "IE4"
  motor_inventory_enabled: true
  motor_load_profiling: true
  pump_benchmark_enabled: true
  pump_system_assessment: true
  fan_benchmark_enabled: true
  vsd_retrofit_analysis: true
  vsd_min_savings_threshold_pct: 10.0
  power_quality_monitoring: true
  equipment_age_threshold_years: 10

# --- Steam (NOT APPLICABLE for data centers) ---
steam:
  enabled: false

# --- Compressed Air (NOT APPLICABLE for data centers) ---
compressed_air:
  enabled: false

# --- Waste Heat (server exhaust heat reuse) ---
waste_heat:
  enabled: true
  min_temperature_c: 30.0
  pinch_analysis_enabled: false
  heat_exchanger_assessment: true
  orc_screening: false
  heat_pump_assessment: true
  heat_pump_max_sink_temperature_c: 70.0
  cascade_analysis: false
  flue_gas_recovery: false
  thermal_storage_screening: false

# --- Lighting (minimal but still relevant) ---
lighting:
  enabled: true
  lpd_standard: "EN_12464_1"
  led_retrofit_analysis: true
  controls_assessment: true
  outdoor_lighting: true
  high_bay_assessment: false
  lux_level_measurement: false

# --- HVAC (CRITICAL - cooling is dominant energy use) ---
hvac:
  enabled: true
  vsd_analysis: true
  economizer_analysis: true
  heat_recovery: true
  ahu_optimization: true
  chiller_efficiency: true
  free_cooling_assessment: true
  building_envelope: true
  bms_optimization: true
  setpoint_review: true
  cleanroom_hvac: false
  process_ventilation: false

# --- Benchmark (PUE-centric) ---
benchmark:
  enabled: true
  peer_group_size_min: 5
  bat_ael_comparison: false
  kpi_set:
    - "pue"
    - "cooling_efficiency"
    - "ups_efficiency"
    - "it_load_density_kw_per_m2"
    - "free_cooling_hours"
    - "wue"
    - "enpi_trend"
  sector_benchmark_source: "ENERGY_STAR"
  percentile_tracking: true
  gap_to_best_practice: true
  trend_analysis_years: 3

# --- ISO 50001 ---
iso50001:
  enabled: true
  enpi_tracking_frequency: "MONTHLY"
  enpi_types:
    - "PUE"
    - "COP"
  energy_review_frequency: "QUARTERLY"
  management_review_frequency: "SEMI_ANNUAL"
  seu_register_enabled: true
  action_plan_tracking: true
  eed_exemption_tracking: true

# --- EED ---
eed:
  enabled: true
  mandatory_audit: true
  audit_interval_months: 48
  minimum_energy_covered_pct: 95.0
  member_state: "DE"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  external_audit_export: true
  measure_tracking: true

# --- Reporting ---
reporting:
  executive_summary_enabled: true
  detailed_report_enabled: true
  equipment_register_enabled: true
  ecm_register_enabled: true
  energy_balance_enabled: true
  benchmark_report_enabled: true
  iso50001_gap_report_enabled: true
  output_formats:
    - "PDF"
    - "XLSX"
  watermark_draft: true
