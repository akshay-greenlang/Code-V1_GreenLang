# =============================================================================
# PACK-031 Industrial Energy Audit - Automotive Manufacturing Preset
# =============================================================================
# Automotive OEM and Tier 1 suppliers. All engines enabled. Paint shop is the
# highest energy consumer (30-50% of total plant energy), followed by body
# shop (welding/resistance), assembly, and press shop. Compressed air is
# critical for pneumatic tooling. Steam used for paint curing/pre-treatment.
# BAT-AEL from Surface Treatment BREF and Smitheries and Foundries BREF.
#
# Typical use cases:
#   - Vehicle assembly plants (OEM)
#   - Tier 1 body/chassis/powertrain suppliers
#   - Paint shop operations
#   - Press shop and stamping facilities
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
industry_sector: "AUTOMOTIVE"
facility_tier: "LARGE_ENTERPRISE"
country: "DE"
reporting_year: 2025
operating_hours_per_year: 5400
number_of_shifts: 2
production_unit_name: "vehicle"

energy_carriers:
  - "ELECTRICITY"
  - "NATURAL_GAS"
  - "STEAM"
  - "COMPRESSED_AIR"

# --- Baseline ---
baseline:
  min_months: 12
  r_squared_threshold: 0.75
  cv_rmse_threshold: 0.25
  normalization_method: "PRODUCTION_VOLUME"
  secondary_variables:
    - "degree_days"
    - "model_mix"
  granularity: "MONTHLY"
  energy_carriers:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "STEAM"
  ipmvp_option: "C"

# --- Audit ---
audit:
  default_audit_level: "DETAILED"
  en16247_compliance: true
  en16247_parts: [1, 2, 3]
  eed_article_8: true
  schedule_months: 48
  significant_energy_use_threshold_pct: 3.0
  minimum_coverage_pct: 95.0
  measure_payback_threshold_years: 5.0
  include_no_cost_measures: true
  include_behavioral_measures: true

# --- Equipment (welding, presses, conveyors) ---
equipment:
  enabled: true
  motor_efficiency_min_class: "IE3"
  motor_inventory_enabled: true
  motor_load_profiling: true
  pump_benchmark_enabled: true
  pump_system_assessment: true
  fan_benchmark_enabled: true
  vsd_retrofit_analysis: true
  vsd_min_savings_threshold_pct: 15.0
  power_quality_monitoring: true
  equipment_age_threshold_years: 15

# --- Steam (CRITICAL - paint pre-treatment, curing ovens) ---
steam:
  enabled: true
  boiler_efficiency_assessment: true
  boiler_efficiency_target_pct: 88.0
  trap_survey_enabled: true
  trap_survey_interval_months: 12
  insulation_assessment_enabled: true
  condensate_return_tracking: true
  condensate_return_target_pct: 85.0
  blowdown_optimization: true
  blowdown_target_pct: 5.0
  flash_steam_recovery: true
  steam_pressure_optimization: true
  chp_assessment: true

# --- Compressed Air (CRITICAL - pneumatic tooling, robots) ---
compressed_air:
  enabled: true
  leak_survey_enabled: true
  leak_survey_interval_months: 6
  leak_rate_target_pct: 8.0
  specific_power_target_kw_per_m3_min: 6.0
  pressure_optimization: true
  pressure_band_bar: [6.0, 7.0]
  heat_recovery_assessment: true
  control_optimization: true
  demand_profiling: true
  inappropriate_use_audit: true
  dryer_efficiency: true

# --- Waste Heat (paint ovens, curing, process exhaust) ---
waste_heat:
  enabled: true
  min_temperature_c: 80.0
  pinch_analysis_enabled: false
  heat_exchanger_assessment: true
  orc_screening: false
  heat_pump_assessment: true
  heat_pump_max_sink_temperature_c: 90.0
  cascade_analysis: true
  flue_gas_recovery: true
  thermal_storage_screening: false

# --- Lighting ---
lighting:
  enabled: true
  lpd_standard: "EN_12464_1"
  led_retrofit_analysis: true
  controls_assessment: true
  daylighting_integration: false
  outdoor_lighting: true
  high_bay_assessment: true
  lux_level_measurement: true

# --- HVAC (paint booth conditioning, welding ventilation) ---
hvac:
  enabled: true
  vsd_analysis: true
  economizer_analysis: true
  heat_recovery: true
  ahu_optimization: true
  chiller_efficiency: true
  free_cooling_assessment: true
  bms_optimization: true
  setpoint_review: true
  process_ventilation: true

# --- Benchmark ---
benchmark:
  enabled: true
  peer_group_size_min: 5
  bat_ael_comparison: true
  kpi_set:
    - "sec_kwh_per_vehicle"
    - "electricity_intensity"
    - "thermal_intensity"
    - "compressed_air_specific_power"
    - "steam_system_efficiency"
    - "paint_shop_energy_intensity"
    - "enpi_trend"
  site_to_site_comparison: true
  sector_benchmark_source: "ODYSSEE_MURE"
  percentile_tracking: true
  gap_to_best_practice: true
  trend_analysis_years: 3

# --- ISO 50001 ---
iso50001:
  enabled: true
  enpi_tracking_frequency: "MONTHLY"
  enpi_types:
    - "SEC"
    - "THERMAL_EFFICIENCY"
    - "SPECIFIC_POWER"
  energy_review_frequency: "ANNUAL"
  management_review_frequency: "SEMI_ANNUAL"
  seu_register_enabled: true
  action_plan_tracking: true
  competence_matrix_enabled: true
  eed_exemption_tracking: true

# --- EED ---
eed:
  enabled: true
  mandatory_audit: true
  audit_interval_months: 48
  minimum_energy_covered_pct: 95.0
  member_state: "DE"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  external_audit_export: true
  measure_tracking: true

# --- Reporting ---
reporting:
  executive_summary_enabled: true
  detailed_report_enabled: true
  equipment_register_enabled: true
  ecm_register_enabled: true
  energy_balance_enabled: true
  benchmark_report_enabled: true
  iso50001_gap_report_enabled: true
  output_formats:
    - "PDF"
    - "XLSX"
  watermark_draft: true
