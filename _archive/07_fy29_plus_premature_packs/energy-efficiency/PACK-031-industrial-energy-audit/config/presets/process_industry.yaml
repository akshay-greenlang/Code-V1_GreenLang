# =============================================================================
# PACK-031 Industrial Energy Audit - Process Industry Preset
# =============================================================================
# Chemical, petrochemical, and pharmaceutical continuous processes. All engines
# enabled. Heavy focus on process energy mapping, waste heat recovery, steam
# systems, and pinch analysis. SEC varies significantly by product. High-
# temperature waste heat sources common (>400 deg C). EU ETS coverage likely.
#
# Typical use cases:
#   - Chemical plants (bulk and specialty)
#   - Petrochemical refining
#   - Pharmaceutical active ingredient synthesis
#   - Continuous process manufacturing
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
industry_sector: "PROCESS_INDUSTRY"
facility_tier: "LARGE_ENTERPRISE"
country: "DE"
reporting_year: 2025
operating_hours_per_year: 8000
number_of_shifts: 3
production_unit_name: "tonne"

energy_carriers:
  - "ELECTRICITY"
  - "NATURAL_GAS"
  - "STEAM"
  - "FUEL_OIL"

# --- Baseline ---
baseline:
  min_months: 24
  r_squared_threshold: 0.80
  cv_rmse_threshold: 0.20
  normalization_method: "PRODUCTION_VOLUME"
  secondary_variables:
    - "degree_days"
    - "product_mix"
  granularity: "MONTHLY"
  energy_carriers:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "STEAM"
    - "FUEL_OIL"
  ipmvp_option: "C"

# --- Audit ---
audit:
  default_audit_level: "INVESTMENT_GRADE"
  en16247_compliance: true
  en16247_parts: [1, 3]
  eed_article_8: true
  schedule_months: 48
  significant_energy_use_threshold_pct: 3.0
  minimum_coverage_pct: 95.0
  measure_payback_threshold_years: 7.0
  include_no_cost_measures: true
  include_behavioral_measures: true

# --- Equipment ---
equipment:
  enabled: true
  motor_efficiency_min_class: "IE3"
  motor_inventory_enabled: true
  motor_load_profiling: true
  pump_benchmark_enabled: true
  pump_system_assessment: true
  fan_benchmark_enabled: true
  vsd_retrofit_analysis: true
  vsd_min_savings_threshold_pct: 10.0
  power_quality_monitoring: true
  equipment_age_threshold_years: 20

# --- Steam (CRITICAL for process industry) ---
steam:
  enabled: true
  boiler_efficiency_assessment: true
  boiler_efficiency_target_pct: 90.0
  trap_survey_enabled: true
  trap_survey_interval_months: 6
  insulation_assessment_enabled: true
  condensate_return_tracking: true
  condensate_return_target_pct: 90.0
  blowdown_optimization: true
  blowdown_target_pct: 4.0
  flash_steam_recovery: true
  steam_pressure_optimization: true
  chp_assessment: true

# --- Compressed Air ---
compressed_air:
  enabled: true
  leak_survey_enabled: true
  leak_survey_interval_months: 6
  leak_rate_target_pct: 8.0
  specific_power_target_kw_per_m3_min: 6.0
  pressure_optimization: true
  pressure_band_bar: [6.0, 8.0]
  heat_recovery_assessment: true
  control_optimization: true
  demand_profiling: true
  inappropriate_use_audit: true
  dryer_efficiency: true

# --- Waste Heat (CRITICAL - high-temperature sources) ---
waste_heat:
  enabled: true
  min_temperature_c: 80.0
  pinch_analysis_enabled: true
  heat_exchanger_assessment: true
  orc_screening: true
  orc_min_temperature_c: 200.0
  heat_pump_assessment: true
  heat_pump_max_sink_temperature_c: 120.0
  cascade_analysis: true
  flue_gas_recovery: true
  thermal_storage_screening: true

# --- Lighting ---
lighting:
  enabled: true
  lpd_standard: "EN_12464_1"
  led_retrofit_analysis: true
  controls_assessment: true
  outdoor_lighting: true
  high_bay_assessment: true
  lux_level_measurement: true

# --- HVAC ---
hvac:
  enabled: true
  vsd_analysis: true
  economizer_analysis: false
  heat_recovery: true
  ahu_optimization: true
  chiller_efficiency: true
  free_cooling_assessment: true
  bms_optimization: true
  setpoint_review: true
  process_ventilation: true

# --- Benchmark ---
benchmark:
  enabled: true
  peer_group_size_min: 5
  bat_ael_comparison: true
  kpi_set:
    - "sec_kwh_per_tonne"
    - "electricity_intensity"
    - "thermal_intensity"
    - "steam_system_efficiency"
    - "waste_heat_recovery_rate"
    - "enpi_trend"
  sector_benchmark_source: "ODYSSEE_MURE"
  percentile_tracking: true
  gap_to_best_practice: true
  trend_analysis_years: 5

# --- ISO 50001 ---
iso50001:
  enabled: true
  enpi_tracking_frequency: "MONTHLY"
  enpi_types:
    - "SEC"
    - "THERMAL_EFFICIENCY"
    - "COP"
  energy_review_frequency: "ANNUAL"
  seu_register_enabled: true
  action_plan_tracking: true
  eed_exemption_tracking: true

# --- EED ---
eed:
  enabled: true
  mandatory_audit: true
  audit_interval_months: 48
  minimum_energy_covered_pct: 95.0
  member_state: "DE"

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 10
  external_audit_export: true
  measure_tracking: true

# --- Reporting ---
reporting:
  executive_summary_enabled: true
  detailed_report_enabled: true
  equipment_register_enabled: true
  ecm_register_enabled: true
  energy_balance_enabled: true
  benchmark_report_enabled: true
  iso50001_gap_report_enabled: true
  output_formats:
    - "PDF"
    - "XLSX"
  watermark_draft: true
