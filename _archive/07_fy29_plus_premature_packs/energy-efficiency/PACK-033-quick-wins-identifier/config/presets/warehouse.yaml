# =============================================================================
# PACK-033 Quick Wins Identifier - Warehouse Preset
# =============================================================================
# Warehouse and distribution centre with focus on high-bay lighting,
# HVAC destratification, dock seal maintenance, and MHE charging
# optimization. EUI benchmark: 50-200 kWh/m2/yr. Key opportunities:
# high-bay LED with occupancy sensors, dock door seal replacement,
# destratification fans, forklift charging optimization.
#
# Typical use cases:
#   - Ambient warehouses and distribution centres
#   - Cold storage and chilled distribution
#   - Logistics hubs and cross-dock facilities
#   - Third-party logistics (3PL) centres
# =============================================================================

# --- Facility Details ---
facility_name: ""
company_name: ""
facility_type: "WAREHOUSE"
country: "DE"
reporting_year: 2026
operating_hours_per_year: 5000

# --- Scan ---
scan:
  depth: "STANDARD"
  categories:
    - "LIGHTING"
    - "HVAC"
    - "BUILDING_ENVELOPE"
    - "CONTROLS_SCHEDULING"
    - "MOTORS_DRIVES"
    - "PLUG_LOADS"
    - "BEHAVIORAL"
  max_measures_per_category: 8
  include_no_cost_measures: true
  include_low_cost_measures: true
  include_medium_cost_measures: true
  max_payback_years: 3.0
  minimum_annual_savings_eur: 300.0
  utility_bill_months: 12
  walkthrough_checklist: true

# --- Financial ---
financial:
  electricity_rate_eur_per_kwh: 0.22
  gas_rate_eur_per_kwh: 0.08
  discount_rate: 0.08
  analysis_period_years: 10
  energy_price_escalation_pct: 3.0

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  gas_emission_factor_kgco2_per_kwh: 0.20
  carbon_price_eur_per_tco2: 85.0

# --- Prioritization ---
prioritization:
  profile: "BALANCED"
  weight_financial_savings: 0.30
  weight_payback_period: 0.25
  weight_carbon_reduction: 0.20
  weight_implementation_ease: 0.15
  weight_co_benefits: 0.10
  top_n_recommendations: 10

# --- Behavioural ---
behavioral:
  enabled: true
  awareness_campaign: true
  switch_off_programme: true
  thermostat_discipline: false
  estimated_savings_pct: 3.0

# --- Rebate ---
rebate:
  enabled: true
  country: "DE"
  include_federal_programmes: true
  include_utility_rebates: true

# --- Reporting ---
reporting:
  frequency: "QUARTERLY"
  formats:
    - "MARKDOWN"
    - "HTML"
  executive_summary: true
  detailed_measure_cards: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  retention_years: 5
