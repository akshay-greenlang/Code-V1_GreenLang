# =============================================================================
# PACK-040: Measurement & Verification (M&V) Pack
# GreenLang Energy Efficiency Pack for M&V per IPMVP / ASHRAE 14
# =============================================================================
# Comprehensive M&V platform covering baseline development with multivariate
# regression and change-point models (3P/4P/5P/TOWT), routine and non-routine
# adjustments per IPMVP, ASHRAE Guideline 14 statistical validation (CVRMSE,
# NMBE, R-squared, t-statistics, F-test), all four IPMVP options (A/B/C/D),
# fractional savings uncertainty quantification, metering plan management,
# multi-year persistence tracking with degradation analysis, and automated
# M&V reporting compliant with ISO 50015, FEMP 4.0, and EU EED Article 7.
#
# Version History:
#   1.0.0 - Initial release (2026-03-23)
# =============================================================================

metadata:
  name: PACK-040-mv
  version: "1.0.0"
  display_name: "M&V Pack"
  description: >-
    GreenLang deployment pack for comprehensive Measurement & Verification
    covering baseline development with multivariate regression and change-point
    models, routine and non-routine adjustments per IPMVP, ASHRAE Guideline 14
    statistical validation, all four IPMVP options, fractional savings
    uncertainty quantification, metering plan management, multi-year persistence
    tracking, and standards-compliant M&V reporting.
  category: energy-efficiency
  tier: professional
  author: GreenLang Platform Team
  license: proprietary
  min_greenlang_version: "1.0.0"
  pack_id: "PACK-040"
  status: production_ready
  tags:
    - measurement-verification
    - mv
    - ipmvp
    - ashrae-14
    - baseline-modeling
    - savings-verification
    - uncertainty-analysis
    - persistence-tracking
    - change-point-regression
    - iso-50015

components:
  engines:
    count: 10
    items:
      - id: engine_001
        name: baseline_engine
        file: engines/baseline_engine.py
        class: BaselineEngine
        description: "Multivariate regression baselines with 3P/4P/5P change-point and TOWT models"
      - id: engine_002
        name: adjustment_engine
        file: engines/adjustment_engine.py
        class: AdjustmentEngine
        description: "Routine and non-routine adjustments per IPMVP methodology"
      - id: engine_003
        name: savings_engine
        file: engines/savings_engine.py
        class: SavingsEngine
        description: "Avoided energy, normalized savings, and cost savings calculation"
      - id: engine_004
        name: uncertainty_engine
        file: engines/uncertainty_engine.py
        class: UncertaintyEngine
        description: "ASHRAE 14 fractional savings uncertainty with measurement/model/sampling"
      - id: engine_005
        name: ipmvp_option_engine
        file: engines/ipmvp_option_engine.py
        class: IPMVPOptionEngine
        description: "IPMVP Options A/B/C/D implementation with automated option selection"
      - id: engine_006
        name: regression_engine
        file: engines/regression_engine.py
        class: RegressionEngine
        description: "OLS, change-point (3P/4P/5P), TOWT regression with full diagnostics"
      - id: engine_007
        name: weather_engine
        file: engines/weather_engine.py
        class: WeatherEngine
        description: "HDD/CDD calculation, balance point optimization, TMY normalization"
      - id: engine_008
        name: metering_engine
        file: engines/metering_engine.py
        class: MeteringEngine
        description: "Metering plan development, calibration tracking, sampling protocols"
      - id: engine_009
        name: persistence_engine
        file: engines/persistence_engine.py
        class: PersistenceEngine
        description: "Multi-year savings persistence with degradation analysis"
      - id: engine_010
        name: mv_reporting_engine
        file: engines/mv_reporting_engine.py
        class: MVReportingEngine
        description: "Automated M&V report generation with compliance checking"

  workflows:
    count: 8
    items:
      - id: workflow_001
        name: baseline_development_workflow
        file: workflows/baseline_development_workflow.py
        class: BaselineDevelopmentWorkflow
        phases: 4
        description: "DataCollection -> ModelSelection -> RegressionFitting -> Validation"
      - id: workflow_002
        name: mv_plan_workflow
        file: workflows/mv_plan_workflow.py
        class: MVPlanWorkflow
        phases: 4
        description: "ECMReview -> OptionSelection -> BoundaryDefinition -> MeteringPlan"
      - id: workflow_003
        name: option_selection_workflow
        file: workflows/option_selection_workflow.py
        class: OptionSelectionWorkflow
        phases: 3
        description: "ECMCharacterization -> OptionEvaluation -> RecommendationReport"
      - id: workflow_004
        name: post_installation_workflow
        file: workflows/post_installation_workflow.py
        class: PostInstallationWorkflow
        phases: 4
        description: "InstallVerification -> MeterCommission -> ShortTermTest -> BaselineUpdate"
      - id: workflow_005
        name: savings_verification_workflow
        file: workflows/savings_verification_workflow.py
        class: SavingsVerificationWorkflow
        phases: 4
        description: "DataCollection -> AdjustmentCalc -> SavingsCalc -> UncertaintyAnalysis"
      - id: workflow_006
        name: annual_reporting_workflow
        file: workflows/annual_reporting_workflow.py
        class: AnnualReportingWorkflow
        phases: 3
        description: "DataAggregation -> ComplianceCheck -> ReportGeneration"
      - id: workflow_007
        name: persistence_tracking_workflow
        file: workflows/persistence_tracking_workflow.py
        class: PersistenceTrackingWorkflow
        phases: 3
