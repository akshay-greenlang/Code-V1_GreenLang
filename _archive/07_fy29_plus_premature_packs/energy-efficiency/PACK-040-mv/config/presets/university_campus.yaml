# =============================================================================
# PACK-040 Measurement & Verification - University Campus Preset
# =============================================================================
# Multi-building university campuses with central plants (steam, chilled water)
# serving diverse building types (classrooms, labs, residence halls, dining,
# athletics). Option C whole-facility per building is standard with academic
# calendar adjustments for semester/break periods. 5-parameter change-point
# models capture heating and cooling seasons. Monthly granularity per building
# with campus-wide aggregation. Academic calendar non-routine adjustments
# account for enrollment changes and building occupancy shifts.
#
# Typical ECMs:
#   - Central plant optimization (chiller and boiler sequencing)
#   - Building HVAC upgrades and retro-commissioning
#   - Campus-wide LED lighting conversion
#   - Lab ventilation demand-based controls
#   - Building automation system upgrades
#   - Steam distribution system improvements
#   - Building envelope upgrades
#
# IPMVP Approach: Option C whole-facility per building with campus aggregation.
# Academic calendar adjustments for semester/break occupancy variation.
# Central plant savings require separate thermal M&V.
# =============================================================================

# --- Project Identification ---
project_name: ""
facility_name: ""
company_name: ""
facility_type: "UNIVERSITY_CAMPUS"
country: "US"
reporting_year: 2026
operating_hours_per_year: 4500
ecm_count: 8

# --- Baseline Configuration ---
baseline:
  baseline_months: 12
  granularity: "MONTHLY"
  preferred_model_type: "FIVE_PARAMETER"
  auto_model_selection: true
  model_selection_criterion: "CVRMSE"
  independent_variables:
    - "outdoor_temperature"
    - "student_fte"
    - "academic_schedule"
  max_cvrmse_pct: 25.0
  max_nmbe_pct: 5.0
  min_r_squared: 0.70
  min_data_coverage_pct: 90.0
  outlier_removal_method: "STUDENTIZED_RESIDUAL"
  outlier_threshold: 3.0
  balance_point_optimization: true
  heating_balance_point_c: 15.0
  cooling_balance_point_c: 18.5
  min_observations: 12
  durbin_watson_check: true
  f_test_significance: 0.05
  t_test_significance: 0.05

# --- Adjustments ---
adjustments:
  routine_adjustments_enabled: true
  non_routine_adjustments_enabled: true
  weather_normalization: true
  production_normalization: false
  occupancy_adjustment: true
  operating_hours_adjustment: true
  floor_area_adjustment: true
  equipment_change_adjustment: true
  schedule_change_adjustment: true
  static_factor_adjustment: true
  normalization_method: "TMY"
  adjustment_documentation_required: true
  adjustment_uncertainty_pct: 12.0
  max_non_routine_adjustments: 10

# --- Savings ---
savings:
  primary_savings_type: "AVOIDED"
  secondary_savings_types:
    - "NORMALIZED"
    - "COST"
    - "CUMULATIVE"
  electricity_rate_per_kwh: 0.11
  gas_rate_per_kwh: 0.04
  steam_rate_per_kwh: 0.06
  chilled_water_rate_per_kwh: 0.08
  demand_charge_per_kw: 14.0
  include_demand_savings: true
  currency: "USD"
  escalation_rate_pct: 3.0
  discount_rate_pct: 6.0
  cumulative_tracking_enabled: true
  annualization_method: "PROPORTIONAL"
  negative_savings_handling: "REPORT"
  carbon_savings_tracking: true
  electricity_ef_kgco2_per_kwh: 0.38
  gas_ef_kgco2_per_kwh: 0.20

# --- Uncertainty ---
uncertainty:
  enabled: true
  confidence_level_pct: 90.0
  measurement_uncertainty_enabled: true
  model_uncertainty_enabled: true
  sampling_uncertainty_enabled: false
  max_fractional_savings_uncertainty_pct: 50.0
  minimum_detectable_savings_pct: 10.0
  default_meter_accuracy_pct: 1.0
  ct_pt_error_pct: 0.5
  calibration_drift_pct_per_year: 0.2
  propagation_method: "ROOT_SUM_SQUARE"

# --- IPMVP ---
ipmvp:
  default_option: "OPTION_C"
  auto_option_selection: true
  option_a_stipulated_values_review_months: 12
  option_b_metering_duration_weeks: 4
  option_c_min_ecm_share_pct: 10.0
  option_d_calibration_cvrmse_pct: 15.0
  option_d_calibration_nmbe_pct: 5.0
  measurement_boundary_documentation: true
  interactive_effects_assessment: true
  compliance_frameworks:
    - "IPMVP"
    - "ASHRAE_14"
  ipmvp_version: "2022"

# --- Metering ---
metering:
  default_meter_accuracy: "CLASS_10"
  calibration_interval_months: 12
  calibration_standard: "ANSI_C12_20"
  sampling_enabled: false
  sampling_confidence_pct: 90.0
  sampling_precision_pct: 10.0
  sampling_cv_pct: 25.0
  min_data_completeness_pct: 90.0
  max_gap_intervals: 4
  gap_fill_method: "LINEAR_INTERPOLATION"
  data_validation_enabled: true
  negative_value_handling: "FLAG"
  demand_window_minutes: 15

# --- Persistence ---
persistence:
  enabled: true
  tracking_years: 7
  degradation_model: "LINEAR"
  expected_annual_degradation_pct: 4.0
  alert_threshold_pct: 20.0
  recommissioning_trigger_pct: 30.0
  seasonal_pattern_analysis: true
  persistence_factor_tracking: true
  minimum_persistence_factor: 0.70
  trend_analysis_method: "LINEAR_REGRESSION"
  performance_guarantee_tracking: false
  guarantee_shortfall_alert: false

# --- Reporting ---
reporting:
  frequency: "MONTHLY"
  formats:
    - "MARKDOWN"
    - "HTML"
  mv_plan_report: true
  baseline_report: true
  savings_report: true
  uncertainty_report: true
  annual_summary: true
  persistence_report: true
  compliance_report: true
  executive_summary: true
  option_comparison_report: true
  metering_plan_report: true
  include_regression_diagnostics: true
  include_residual_analysis: true

# --- Security ---
security:
  data_classification: "INTERNAL"
  audit_logging: true
  pii_redaction: true
  encryption_at_rest: true
  tenant_data_isolation: true

# --- Performance ---
performance:
  max_ecms_per_project: 50
  max_baseline_data_points: 1095
  regression_timeout_seconds: 15
  savings_calculation_timeout_seconds: 5
  uncertainty_timeout_seconds: 10
  report_generation_timeout_seconds: 15
  cache_ttl_seconds: 600
  batch_size: 500
  parallel_engines: 6

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
