# =============================================================================
# PACK-035 Energy Benchmark - Multi-Site Portfolio Preset
# =============================================================================
# Portfolio mode for organisations with multiple buildings across mixed
# types, sizes, and geographies. Area-weighted aggregation at portfolio,
# region, country, and building-type levels. Facility ranking with
# league tables and bubble charts. Supports 1-1000+ facilities.
# CRREM and SBTi pathway overlays for decarbonisation tracking.
#
# Typical use cases:
#   - Corporate real estate portfolios (office + retail + warehouse)
#   - Public sector estate management (schools + hospitals + offices)
#   - REIT and fund manager portfolio analysis
#   - Multi-national group reporting across geographies
# =============================================================================

# --- Facility Details ---
facility_id: ""
facility_name: "Portfolio Benchmark"
building_type: "MIXED_USE"
climate_zone: "ASHRAE_4A"
country_code: "DE"
currency: "EUR"
floor_area_type: "GIA"
reporting_year: 2025

# --- EUI ---
eui:
  accounting_boundary: "site"
  floor_area_type: "GIA"
  include_renewables: true
  renewable_offset_method: "net_metered"
  rolling_months: 12
  include_plug_loads: true
  include_process_loads: false
  include_exterior_loads: true
  data_frequency: "MONTHLY"
  minimum_data_coverage_pct: 85.0
  energy_carriers:
    - "ELECTRICITY"
    - "NATURAL_GAS"
    - "DISTRICT_HEATING"

# --- Weather ---
weather:
  enabled: true
  normalisation_method: "CHANGE_POINT"
  base_temp_heating_c: 15.5
  base_temp_cooling_c: 18.0
  min_r_squared: 0.65
  max_cv_rmse: 0.30
  weather_source: "auto"
  degree_day_method: "mean_temperature"
  min_months_regression: 12

# --- Peer Comparison ---
peer_comparison:
  enabled: true
  benchmark_sources:
    - "ENERGY_STAR"
    - "CIBSE_TM46"
    - "BPIE"
  peer_group_criteria:
    - "building_type"
    - "climate_zone"
    - "floor_area_band"
  min_peer_count: 5
  include_energy_star_score: true
  percentile_display: [10, 25, 50, 75, 90]
  include_quartile_analysis: true
  include_best_practice_target: true
  normalise_for_hours: true

# --- Portfolio (CRITICAL - this preset enables portfolio mode) ---
portfolio:
  enabled: true
  aggregation_method: "AREA_WEIGHTED"
  ranking_criteria:
    - "eui_site"
    - "eui_weather_normalised"
    - "energy_star_score"
    - "epc_grade"
  entity_levels:
    - "portfolio"
    - "region"
    - "country"
    - "building_type"
  include_yoy_trend: true
  include_league_table: true
  league_table_top_n: 10
  include_bubble_chart: true
  target_reduction_pct_pa: 3.0
  sbti_pathway_enabled: true
  crrem_pathway_enabled: true

# --- Gap Analysis ---
gap_analysis:
  enabled: true
  disaggregation_method: "carrier_split"
  end_use_categories:
    - "heating"
    - "cooling"
    - "lighting"
    - "plug_loads"
    - "other"
  min_gap_threshold_pct: 8.0
  link_to_measures: true
  include_savings_potential: true
  target_source: "peer_top_quartile"
  include_payback_period: true
  include_capital_cost_estimate: true

# --- Rating ---
rating:
  enabled: true
  rating_systems:
    - "EPC_EU"
    - "ENERGY_STAR"
    - "CRREM"
  epc_methodology: "operational"
  epc_country_annex: "DE"
  crrem_pathway_year: 2050
  crrem_scenario: "1.5C"
  include_regulatory_compliance: true

# --- Trend ---
trend:
  enabled: true
  rolling_window_months: 12
  cusum_enabled: true
  cusum_threshold_kwh_m2: 10.0
  spc_enabled: true
  spc_sigma: 2.0
  yoy_comparison: true
  seasonality_detection: true
  alert_enabled: true
  alert_channels:
    - "EMAIL"
    - "SLACK"
  alert_threshold_pct: 10.0
  forecast_enabled: true
  forecast_method: "linear_trend"

# --- Report ---
report:
  formats:
    - "MARKDOWN"
    - "HTML"
    - "JSON"
    - "CSV"
  include_methodology: true
  include_provenance: true
  include_data_quality_notes: true
  include_recommendations: true
  include_executive_summary: true
  include_charts: true
  language: "en"
  watermark_draft: true

# --- Performance (scaled for large portfolios) ---
performance:
  cache_ttl_seconds: 7200
  max_facilities: 1000
  parallel_processing: true
  max_parallel_workers: 8
  memory_ceiling_mb: 4096
  batch_size: 500
  calculation_timeout_seconds: 300
  weather_data_cache_enabled: true
  lazy_loading: true

# --- Security ---
security:
  roles:
    - "energy_manager"
    - "facility_manager"
    - "portfolio_analyst"
    - "sustainability_lead"
    - "viewer"
    - "admin"
  data_classification: "CONFIDENTIAL"
  audit_logging: true
  pii_redaction: true
  encryption_at_rest: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
  external_audit_export: true
