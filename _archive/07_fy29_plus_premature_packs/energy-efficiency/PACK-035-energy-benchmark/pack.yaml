# -----------------------------------------------------------------------------
# Component Registry: Engines
# -----------------------------------------------------------------------------
engines:
  - name: EUICalculatorEngine
    file: engines/eui_calculator_engine.py
    description: "Site/source/primary EUI with multiple accounting boundaries"
  - name: PeerComparisonEngine
    file: engines/peer_comparison_engine.py
    description: "ENERGY STAR, CIBSE TM46, DIN V 18599, BPIE percentile ranking"
  - name: SectorBenchmarkEngine
    file: engines/sector_benchmark_engine.py
    description: "Sector-specific benchmarks for 8 building types with sub-sectors"
  - name: WeatherNormalisationEngine
