      - "V051-V081"   # AGENT-MRV
    new:
      - "V266__pack035_energy_benchmark_001"
      - "V267__pack035_energy_benchmark_002"
      - "V268__pack035_energy_benchmark_003"
      - "V269__pack035_energy_benchmark_004"
      - "V270__pack035_energy_benchmark_005"
      - "V271__pack035_energy_benchmark_006"
      - "V272__pack035_energy_benchmark_007"
      - "V273__pack035_energy_benchmark_008"
      - "V274__pack035_energy_benchmark_009"
      - "V275__pack035_energy_benchmark_010"

  post_install:
