      coverage: "EPC rating, DEC, MEPS compliance, ZEB tracking"
    - id: "ISO_50001"
      name: "ISO 50001:2018"
      coverage: "EnPI benchmarking, energy baseline establishment"
    - id: "ISO_50006"
      name: "ISO 50006:2014"
      coverage: "Energy performance indicators, regression normalisation"
    - id: "ASHRAE_100"
      name: "ASHRAE Standard 100-2018"
      coverage: "Building energy benchmarking methodology, EUI targets"
    - id: "ENERGY_STAR"
      name: "ENERGY STAR Portfolio Manager"
      coverage: "1-100 score calculation, property benchmarking, certification"
    - id: "CIBSE_TM46"
      name: "CIBSE TM46:2008"
      coverage: "UK building energy benchmarks by type"
    - id: "GHG_PROTOCOL"
      name: "GHG Protocol Corporate Standard"
      coverage: "Carbon intensity benchmarking (kgCO2e/m2)"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "statsmodels>=0.14"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
