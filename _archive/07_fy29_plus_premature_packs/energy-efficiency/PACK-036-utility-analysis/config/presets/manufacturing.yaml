# =============================================================================
# PACK-036 Utility Analysis - Manufacturing Preset
# =============================================================================
# Industrial manufacturing facility with focus on demand charge management,
# power factor correction, and process load scheduling. EUI benchmark:
# 200-500 kWh/m2/yr electricity, 100-400 kWh/m2/yr gas. Demand charges
# typically represent 40-60% of the electric bill. Key opportunities:
# demand ratchet avoidance, power factor penalty elimination, shift-based
# load scheduling, process start-up staggering.
#
# Typical use cases:
#   - Discrete and batch manufacturing plants
#   - CNC machining and metal cutting facilities
#   - Food and beverage processing plants
#   - Automotive component manufacturers
# =============================================================================

# --- Facility ---
facility:
  facility_type: "MANUFACTURING"
  operating_hours_per_week: 120.0
  occupancy_pct: 90.0
  currency: "EUR"

# --- Commodities ---
commodities:
  - commodity_type: "ELECTRICITY"
    enabled: true
    unit: "kWh"
  - commodity_type: "NATURAL_GAS"
    enabled: true
    unit: "therms"
  - commodity_type: "WATER"
    enabled: true
    unit: "m3"

# --- Analysis Depth ---
analysis_depth: "STANDARD"
reporting_year: 2026

# --- Bill Audit ---
bill_audit:
  enabled: true
  anomaly_threshold_std_dev: 2.0
  max_estimated_reads: 1
  period_gap_days: 33
  tax_tolerance_pct: 0.5
  check_rate_consistency: true
  check_meter_read_sequence: true
  lookback_months: 24

# --- Rate Optimization ---
rate_optimization:
  enabled: true
  include_tou: true
  include_demand_ratchet: true
  include_real_time_pricing: false
  include_green_tariffs: false
  min_savings_threshold_eur: 1000.0
  compare_max_tariffs: 15
  include_contract_terms: true
  peak_shaving_analysis: true

# --- Demand ---
demand:
  enabled: true
  interval_resolution_minutes: 15
  peak_threshold_pct: 90.0
  power_factor_target: 0.95
  load_factor_tracking: true
  coincident_peak_analysis: true
  ratchet_period_months: 12
  peak_event_count: 20

# --- Budget ---
budget:
  enabled: true
  forecast_horizon_months: 12
  method: "REGRESSION"
  rate_escalation_pct: 3.5
  confidence_levels: [0.80, 0.90, 0.95]
  weather_normalize: false
  base_year_months: 12
  include_demand_budget: true

# --- Benchmark ---
benchmark:
  enabled: true
  standards: ["ASHRAE_100", "ISO_50001"]
  peer_group_building_type: "Manufacturing"
  weather_normalize: false
  include_eui: true
  include_cost_intensity: true
  include_carbon_intensity: true
  percentile_target: 25
  normalize_by_occupancy: false

# --- Reporting ---
reporting:
  formats: ["MARKDOWN", "HTML", "XLSX"]
  frequency: "MONTHLY"
  include_executive_summary: true
  include_benchmarks: true
  include_carbon: true
  include_budget_variance: true
  include_rate_analysis: true
  include_demand_profile: true

# --- Carbon ---
carbon:
  enabled: true
  grid_emission_factor_kgco2_per_kwh: 0.40
  gas_emission_factor_kgco2_per_kwh: 0.20
  carbon_price_eur_per_tco2: 85.0
  include_scope_1: true
  include_scope_2: true
  track_carbon_trend: true

# --- Audit Trail ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: true
  retention_years: 7
