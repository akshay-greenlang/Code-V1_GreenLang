metadata:
  name: PACK-036-utility-analysis
  version: "1.0.0"
  display_name: "Utility Analysis Pack"
  description: >-
    GreenLang deployment pack for comprehensive utility cost and consumption
    analysis across commercial and industrial facilities. Includes 10 engines
    for automated utility bill parsing (PDF, CSV, Excel, EDI with line-item
    disaggregation), rate structure analysis (TOU, CPP, RTP, demand ratchet,
    declining block), demand profiling (peak demand, load factor, demand
    response opportunities), cost allocation (departmental, tenant, process-
    level chargeback), budget forecasting (12-36 month projections with Monte
    Carlo uncertainty), procurement intelligence (market tracking, RFP
    generation, PPA assessment, hedging strategy), utility benchmarking (cost
    per m2, unit rate comparison, peer benchmarking), regulatory charge
    optimisation (transmission, distribution, capacity, carbon charge
    analysis with exemption identification), weather normalisation (degree-
    day regression for fair period and site comparison), and executive
    reporting (dashboards, variance analysis, savings tracking). Supports
    office buildings, manufacturing, retail, warehouses, healthcare,
    education, data centres, and multi-site portfolios with tailored presets.
    Bridges to PACK-031 (Industrial Energy Audit), PACK-032 (Building Energy
    Assessment), PACK-033 (Quick Wins Identifier), and PACK-035 (Energy
    Benchmark) for deeper analysis. Bundles relevant MRV agents for emission
    cost correlation and data intake/quality agents for bill processing.
