# =============================================================================
# PACK-036: Utility Analysis Pack
# GreenLang Energy Efficiency Pack for Comprehensive Utility Cost and Usage Analysis
# =============================================================================
# This pack provides a comprehensive utility analysis platform for parsing,
# analysing, benchmarking, and optimising utility costs and consumption across
# commercial and industrial facilities. It covers the full utility management
# lifecycle from bill parsing and rate structure analysis through demand
# management, cost allocation, budget forecasting, procurement intelligence,
# utility benchmarking, regulatory charge optimisation, weather normalisation,
# and executive reporting.
#
# Utility costs represent one of the largest controllable operating expenses
# for commercial and industrial organisations. Without systematic analysis
# of utility bills, rate structures, demand profiles, and procurement options,
# organisations routinely overpay by 5-15% through billing errors, suboptimal
# rate structures, poor demand management, and missed procurement opportunities.
# This pack enables facility managers, energy managers, procurement teams, and
# finance departments to gain complete visibility into utility spend, identify
# savings opportunities, forecast budgets accurately, and make data-driven
# procurement decisions.
#
# Key Capabilities:
#   - Utility bill parsing (automated extraction from PDF, CSV, Excel, and EDI
#     formats for electricity, natural gas, water, steam, and chilled water
#     bills with line-item disaggregation of energy charges, demand charges,
#     fixed charges, taxes, surcharges, and regulatory fees)
#   - Rate structure analysis (tariff modelling for TOU, CPP, RTP, demand
#     ratchet, declining block, interruptible, and standby rate structures
#     with optimal rate identification and switching recommendations)
#   - Demand analysis (peak demand profiling, load factor calculation,
#     coincident vs. non-coincident peak, demand ratchet exposure, load
#     duration curves, and demand response opportunity identification)
#   - Cost allocation (departmental, tenant, process-level, and project-level
#     cost allocation using sub-metering, floor area proration, and activity-
#     based costing with chargeback report generation)
#   - Budget forecasting (12-36 month utility budget projections using
#     historical consumption, weather normalisation, rate escalation,
#     planned efficiency measures, and occupancy changes with Monte Carlo
#     uncertainty quantification)
#   - Procurement intelligence (market price tracking, contract analysis,
#     RFP generation, supplier comparison, hedging strategy evaluation,
#     renewable PPA assessment, and green tariff analysis)
#   - Utility benchmarking (cost per unit area, cost per unit production,
#     unit rate comparison across facilities and periods, peer cost
#     benchmarking against published datasets)
#   - Regulatory charge optimisation (analysis of transmission, distribution,
#     capacity, renewable obligation, and carbon charges with identification
#     of exemption eligibility and charge reduction strategies)
#   - Weather normalisation (degree-day regression for weather-adjusted
#     consumption and cost trending, enabling fair period-over-period and
#     site-over-site comparisons)
#   - Comprehensive reporting (executive dashboards, variance analysis,
#     savings tracking, and regulatory compliance documentation)
#
# Regulatory References:
#   - EED: Directive (EU) 2023/1791 (Energy Efficiency Directive - recast,
#     Article 10a metering and billing, Article 11 cost information)
#   - ISO 50001:2018 (Energy Management Systems - energy procurement,
#     monitoring, and analysis requirements)
#   - ISO 50006:2014 (Measuring energy performance using energy baselines
#     and energy performance indicators - EnPI normalisation)
#   - ASHRAE Guideline 14-2014 (Measurement of Energy, Demand, and Water
#     Savings - utility bill analysis methodology)
#   - ENERGY STAR Portfolio Manager (utility cost benchmarking)
#   - CIBSE TM46:2008 (UK energy benchmarks including utility cost context)
#   - EU Taxonomy Regulation 2020/852 (Substantial contribution criteria
#     for energy efficiency investments informed by utility analysis)
#
# Facility Types Supported:
#   - Office buildings (corporate HQ, multi-tenant, co-working)
#   - Manufacturing (discrete, batch, process, light industrial)
#   - Retail (supermarkets, department stores, specialty retail)
#   - Warehouses (ambient, cold storage, distribution centres)
#   - Healthcare (hospitals, clinics, care homes)
#   - Education (schools, universities, campuses)
#   - Data centres (enterprise, colocation, server rooms)
#   - Multi-site portfolios (heterogeneous building stock)
#
# Version History:
#   1.0.0 - Initial release (2026-03-22)
# =============================================================================

