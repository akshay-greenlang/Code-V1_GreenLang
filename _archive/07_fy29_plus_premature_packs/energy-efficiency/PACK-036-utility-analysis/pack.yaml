    target_duration_minutes: 3
  budget_forecasting:
    regression_per_facility_ms: 500
    monte_carlo_1000_iterations_ms: 2000
    scenario_adjustment_ms: 100
    target_duration_minutes: 10
  procurement:
    market_data_refresh_ms: 1000
    contract_analysis_ms: 200
    rfp_generation_ms: 500
    target_duration_minutes: 5
  benchmarking:
    cost_normalisation_per_facility_ms: 100
    peer_comparison_ms: 200
    portfolio_ranking_ms: 500
    target_duration_minutes: 3
  report_generation:
    markdown_per_facility_ms: 200
    html_per_facility_ms: 500
    chart_generation_per_chart_ms: 300
    target_duration_minutes: 5
  cache_hit_ratio_target: 0.85
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and portfolio-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - INTERNAL
    - CONFIDENTIAL
    - FINANCIAL
  required_roles:
    - energy_manager
    - facility_manager
    - finance_manager
    - procurement_manager
    - sustainability_officer
    - viewer
    - admin
  audit_events:
    - "utility.bill.parsed"
    - "utility.bill.validated"
    - "utility.bill.error_detected"
    - "utility.rate.analysed"
    - "utility.rate.switch_recommended"
    - "utility.demand.profiled"
    - "utility.cost.allocated"
    - "utility.budget.forecasted"
    - "utility.procurement.analysed"
    - "utility.benchmark.completed"
    - "utility.report.generated"
    - "utility.report.exported"
    - "utility.config.modified"
    - "utility.preset.loaded"

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  test_directory: "tests/"
  coverage_target: 85
  test_categories:
    - unit
    - integration
    - e2e
  fixtures:
    - "tests/fixtures/sample_utility_bills.json"
    - "tests/fixtures/sample_interval_data.json"
    - "tests/fixtures/sample_rate_schedules.json"
    - "tests/fixtures/sample_weather_data.json"
    - "tests/fixtures/sample_market_data.json"

# -----------------------------------------------------------------------------
# Compliance
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "EU_EED"
      name: "EU Energy Efficiency Directive"
      coverage: "Article 10a metering and billing, Article 11 cost information"
    - id: "ISO_50001"
      name: "ISO 50001:2018"
      coverage: "Energy procurement, monitoring, analysis, and evaluation"
    - id: "ISO_50006"
      name: "ISO 50006:2014"
      coverage: "Energy performance indicators, regression normalisation"
    - id: "ASHRAE_14"
      name: "ASHRAE Guideline 14"
      coverage: "Utility bill analysis methodology, weather normalisation"
    - id: "ENERGY_STAR"
      name: "ENERGY STAR Portfolio Manager"
      coverage: "Utility cost benchmarking and property scoring"
    - id: "CIBSE_TM46"
      name: "CIBSE TM46:2008"
      coverage: "UK building energy and cost benchmarks by type"
    - id: "EU_TAXONOMY"
      name: "EU Taxonomy Regulation 2020/852"
      coverage: "Energy efficiency investment classification and reporting"

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "statsmodels>=0.14"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 100

  database:
    extensions:
      - "pgvector"
    min_connections: 10
    recommended_connections: 30

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_rate_schedule_database
    - verify_weather_data_access
    - verify_emission_factor_database

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
    new:
      - "V276__pack036_utility_analysis_001"
      - "V277__pack036_utility_analysis_002"
      - "V278__pack036_utility_analysis_003"
      - "V279__pack036_utility_analysis_004"
      - "V280__pack036_utility_analysis_005"
      - "V281__pack036_utility_analysis_006"
      - "V282__pack036_utility_analysis_007"
      - "V283__pack036_utility_analysis_008"
      - "V284__pack036_utility_analysis_009"
      - "V285__pack036_utility_analysis_010"

  post_install:
    - seed_rate_schedules
    - seed_regulatory_charges
    - seed_benchmark_datasets
    - seed_emission_factors
    - seed_market_data_sources
    - validate_preset_configs

