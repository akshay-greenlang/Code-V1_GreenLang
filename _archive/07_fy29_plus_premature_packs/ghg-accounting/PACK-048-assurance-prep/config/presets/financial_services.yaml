# =============================================================================
# PACK-048 GHG Assurance Prep - Financial Services Preset
# =============================================================================
# Financial services assurance preparation with PCAF alignment, financed
# emissions evidence requirements, portfolio-level materiality assessment,
# and SFDR PAI compliance. Covers both operational (Scope 1+2) and financed
# emissions (Scope 3 Category 15) with data quality evidence at the PCAF
# quality ladder level.
#
# Typical use cases:
#   - Banks and lending institutions
#   - Asset managers and investment funds
#   - Insurance companies (underwriting portfolio)
#   - Pension funds and sovereign wealth funds
#   - Development finance institutions
#
# Typical engagement profile:
#   Assurance level: Limited (ISAE 3410)
#   Scopes: Scope 1 + Scope 2 + Scope 3 Cat 15 (financed)
#   Duration: 12-18 weeks
#   Typical cost: 80,000 - 200,000 EUR
# =============================================================================

# --- Assurance Engagement ---
assurance_standard: "ISAE_3410"
assurance_level: "LIMITED"
company_size: "LARGE"
scopes_in_scope:
  - "SCOPE_1"
  - "SCOPE_2"
  - "SCOPE_3"

# --- Evidence Consolidation ---
evidence:
  minimum_quality: "GOOD"
  require_provenance_hash: true
  retention_years: 7
  auto_extract_from_packs: true
  evidence_format: "STRUCTURED"
  max_evidence_size_mb: 750

# --- Readiness Assessment ---
readiness:
  standard: "ISAE_3410"
  target_level: "LIMITED"
  minimum_readiness_score_pct: 75.0
  include_gap_remediation: true
  auto_score_from_evidence: true

# --- Calculation Provenance ---
provenance:
  verify_all_calculations: true
  replay_tolerance_pct: 0.01
  include_input_hashes: true
  include_intermediate_hashes: true
  generate_certificate: true

# --- Control Testing ---
controls:
  minimum_effectiveness: "PARTIALLY_EFFECTIVE"
  target_maturity: "LEVEL_3_DEFINED"
  test_sample_size: 30
  include_it_general_controls: true
  walkthroughs_required: true
  remediation_timeline_days: 90

# --- Verifier Collaboration ---
verifier:
  max_query_response_days: 5
  query_escalation_days: 3
  finding_response_days: 10
  enable_collaboration_portal: true
  auto_evidence_sharing: true
  track_verifier_hours: true

# --- Materiality Assessment ---
materiality:
  overall_materiality_pct: 5.0
  performance_materiality_pct: 65.0
  clearly_trivial_pct: 5.0
  scope_specific_enabled: true
  scope_weights:
    SCOPE_1: 0.10
    SCOPE_2: 0.10
    SCOPE_3: 0.80
  revision_frequency: "QUARTERLY"

# --- Sampling Plan ---
sampling:
  primary_method: "STRATIFIED"
  confidence_level_pct: 95.0
  tolerable_misstatement_pct: 5.0
  expected_misstatement_pct: 1.5
  minimum_sample_size: 30
  stratification_enabled: true
  stratification_criteria:
    - "scope"
    - "asset_class"
    - "pcaf_quality_score"
    - "portfolio_weight"

# --- Regulatory Requirements ---
regulatory:
  jurisdictions:
    - "EU_CSRD"
  company_size: "LARGE"
  include_upcoming_requirements: true
  track_effective_dates: true
  deadline_warning_days: 90

# --- Cost & Timeline ---
cost_timeline:
  company_size: "LARGE"
  assurance_level: "LIMITED"
  include_scope_3: true
  multi_jurisdiction: false
  first_time_engagement: false
  complex_operations: true
  target_completion_weeks: 16
  currency: "EUR"

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "PDF"
  sections:
    - "executive_summary"
    - "readiness_assessment"
    - "evidence_summary"
    - "control_testing"
    - "materiality_sampling"
    - "provenance_verification"
    - "regulatory_compliance"
    - "verifier_collaboration"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true
  include_appendices: true

# --- Alerts ---
alerts:
  alert_types:
    - "READINESS_GAP"
    - "CONTROL_FAILURE"
    - "EVIDENCE_MISSING"
    - "QUERY_OVERDUE"
    - "DEADLINE_APPROACHING"
  channels:
    - "EMAIL"
    - "SLACK"
  query_overdue_days: 3
  evidence_gap_alert: true
