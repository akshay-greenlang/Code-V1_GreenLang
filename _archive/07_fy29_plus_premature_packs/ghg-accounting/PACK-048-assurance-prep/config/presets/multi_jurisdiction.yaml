# =============================================================================
# PACK-048 GHG Assurance Prep - Multi-Jurisdiction Preset
# =============================================================================
# Multi-jurisdiction assurance preparation covering EU CSRD, US SEC, UK SECR,
# and additional jurisdictions. Consolidated evidence packages, harmonised
# materiality thresholds, and unified verifier coordination across multiple
# regulatory regimes. Cost multipliers apply for multi-jurisdiction scope.
#
# Typical use cases:
#   - Multinational corporations listed in multiple jurisdictions
#   - Companies with EU, US, and UK reporting obligations
#   - Groups with subsidiaries in 3+ regulatory regimes
#   - Dual-listed companies (e.g., NYSE + Euronext)
#
# Typical engagement profile:
#   Assurance level: Limited (varies by jurisdiction)
#   Scopes: Scope 1 + Scope 2 + Scope 3 (jurisdiction dependent)
#   Duration: 16-24 weeks
#   Typical cost: 100,000 - 350,000 EUR
# =============================================================================

# --- Assurance Engagement ---
assurance_standard: "ISAE_3410"
assurance_level: "LIMITED"
company_size: "LARGE"
scopes_in_scope:
  - "SCOPE_1"
  - "SCOPE_2"
  - "SCOPE_3"

# --- Evidence Consolidation ---
evidence:
  minimum_quality: "GOOD"
  require_provenance_hash: true
  retention_years: 10
  auto_extract_from_packs: true
  evidence_format: "STRUCTURED"
  max_evidence_size_mb: 1000

# --- Readiness Assessment ---
readiness:
  standard: "ISAE_3410"
  target_level: "LIMITED"
  minimum_readiness_score_pct: 75.0
  include_gap_remediation: true
  auto_score_from_evidence: true
  remediation_priority_threshold: 50.0

# --- Calculation Provenance ---
provenance:
  verify_all_calculations: true
  replay_tolerance_pct: 0.01
  include_input_hashes: true
  include_intermediate_hashes: true
  generate_certificate: true

# --- Control Testing ---
controls:
  minimum_effectiveness: "PARTIALLY_EFFECTIVE"
  target_maturity: "LEVEL_3_DEFINED"
  test_sample_size: 30
  include_it_general_controls: true
  walkthroughs_required: true
  remediation_timeline_days: 90

# --- Verifier Collaboration ---
verifier:
  max_query_response_days: 5
  query_escalation_days: 3
  finding_response_days: 10
  enable_collaboration_portal: true
  auto_evidence_sharing: true
  track_verifier_hours: true

# --- Materiality Assessment ---
materiality:
  overall_materiality_pct: 5.0
  performance_materiality_pct: 65.0
  clearly_trivial_pct: 5.0
  scope_specific_enabled: true
  revision_frequency: "QUARTERLY"

# --- Sampling Plan ---
sampling:
  primary_method: "MUS"
  confidence_level_pct: 95.0
  tolerable_misstatement_pct: 5.0
  expected_misstatement_pct: 1.0
  minimum_sample_size: 30
  stratification_enabled: true
  stratification_criteria:
    - "scope"
    - "category"
    - "facility"
    - "jurisdiction"

# --- Regulatory Requirements ---
regulatory:
  jurisdictions:
    - "EU_CSRD"
    - "US_SEC"
    - "UK_SECR"
    - "SINGAPORE_SGX"
  company_size: "LARGE"
  include_upcoming_requirements: true
  track_effective_dates: true
  deadline_warning_days: 120

# --- Cost & Timeline ---
cost_timeline:
  company_size: "LARGE"
  assurance_level: "LIMITED"
  include_scope_3: true
  multi_jurisdiction: true
  first_time_engagement: false
  complex_operations: true
  target_completion_weeks: 20
  currency: "EUR"

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "PDF"
  sections:
    - "executive_summary"
    - "readiness_assessment"
    - "evidence_summary"
    - "control_testing"
    - "materiality_sampling"
    - "provenance_verification"
    - "regulatory_compliance"
    - "verifier_collaboration"
    - "cost_timeline"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true
  include_appendices: true

# --- Alerts ---
alerts:
  alert_types:
    - "READINESS_GAP"
    - "CONTROL_FAILURE"
    - "EVIDENCE_MISSING"
    - "QUERY_OVERDUE"
    - "DEADLINE_APPROACHING"
    - "PROVENANCE_MISMATCH"
  channels:
    - "EMAIL"
    - "SLACK"
  query_overdue_days: 3
  evidence_gap_alert: true
  daily_digest: true
