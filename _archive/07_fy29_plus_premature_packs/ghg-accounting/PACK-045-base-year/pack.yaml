    - gl_by_inventory_calculation_chains
    - gl_by_inventory_provenance
    - gl_by_recalculation_policies
    - gl_by_policy_versions
    - gl_by_policy_approvals
    - gl_by_trigger_events
    - gl_by_trigger_classifications
    - gl_by_trigger_affected_entities
    - gl_by_significance_assessments
    - gl_by_significance_metrics
    - gl_by_cumulative_impact_tracking
    - gl_by_adjustments
    - gl_by_adjustment_lines
    - gl_by_adjustment_evidence
    - gl_by_time_series_metadata
    - gl_by_consistency_checks
    - gl_by_restatements
    - gl_by_targets
    - gl_by_target_pathways
    - gl_by_target_progress
    - gl_by_target_rebasing
    - gl_by_audit_events
