      description: "Core base year schema: base years, versions, selection criteria, and candidate evaluations"
    - id: "V367__pack045_base_year_002"
      description: "Base year inventory tables: source-level emissions, calculation chains, and provenance hashes"
    - id: "V368__pack045_base_year_003"
      description: "Recalculation policy tables: thresholds, trigger categories, approval workflows, and policy versions"
    - id: "V369__pack045_base_year_004"
      description: "Trigger detection tables: events, classifications, affected entities, and estimated impacts"
    - id: "V370__pack045_base_year_005"
      description: "Significance assessment tables: metrics, threshold comparisons, determinations, and cumulative tracking"
    - id: "V371__pack045_base_year_006"
      description: "Adjustment calculation tables: line-by-line changes, before/after values, and methodology records"
    - id: "V372__pack045_base_year_007"
      description: "Time series consistency tables: methodology metadata by year, consistency checks, and restatements"
    - id: "V373__pack045_base_year_008"
      description: "Target tracking tables: targets, pathways, progress records, rebasing history, and SBTi alignment"
    - id: "V374__pack045_base_year_009"
      description: "Audit trail tables: events, provenance hashes, version diffs, evidence links, and verification records"
    - id: "V375__pack045_base_year_010"
      description: "Views, indexes, RLS policies, compliance mapping tables, and seed data for base year management"

  tables:
