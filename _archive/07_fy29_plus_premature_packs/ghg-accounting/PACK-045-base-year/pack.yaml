# =============================================================================
# PACK-045: Base Year Management Pack
# GreenLang GHG Accounting Pack for Complete Base Year Lifecycle Management
# =============================================================================
# This pack delivers a production-ready, verification-grade base year
# management system covering the full lifecycle of GHG base year operations
# as defined by GHG Protocol Corporate Standard Chapter 5. It orchestrates
# ten specialised engines -- base year selection, inventory establishment,
# recalculation policy definition, trigger detection, significance assessment,
# adjustment calculation, time-series consistency enforcement, target tracking,
# audit verification, and multi-framework reporting.
#
# The pack follows a zero-hallucination approach: all recalculation triggers,
# significance assessments, and adjustment calculations use deterministic
# formulas from GHG Protocol Chapter 5, IPCC 2006/2019, and established
# statistical methodologies. No LLM is used in any calculation path.
# Significance thresholds, adjustment factors, and recalculation rules are
# configurable per corporate policy with full provenance tracking.
#
# The pack complements and extends the GreenLang GHG accounting suite:
#   - PACK-041 (Scope 1-2 Complete) provides the emission calculations
#   - PACK-042 (Scope 3 Starter) provides upstream Scope 3 calculations
#   - PACK-043 (Scope 3 Complete) provides full value chain calculations
#   - PACK-044 (GHG Governance) provides policy and approval workflows
#   - PACK-045 (this pack) provides base year lifecycle management
#
# Base year management is a critical element of GHG inventories that ensures
# meaningful year-on-year comparisons, target tracking integrity, and
# regulatory compliance. Without proper base year management, structural
# changes such as mergers, acquisitions, and divestitures can distort
# emission trends and render reduction targets meaningless.
#
# The base year output maps directly to seven regulatory frameworks:
#   1. GHG Protocol Corporate Standard Chapter 5 (Base Year)
#   2. ISO 14064-1:2018 (Clause 5.4 - Base Year Selection)
#   3. EU CSRD / ESRS E1 (E1-4 Climate Targets, E1-5 Actions)
#   4. CDP Climate Change Questionnaire (C5.1-C5.2 Base Year)
#   5. SBTi Corporate Net-Zero Standard (Base Year Requirements)
#   6. US SEC Climate Disclosure Rules (Base Year Disclosure)
#   7. California SB 253 (Base Year Consistency Requirements)
#
# Key Capabilities:
#   - Base year selection with criteria-based evaluation (data quality,
#     representative year, availability of records, verification status)
#   - Complete base year inventory establishment with source-level detail
#     and full provenance chain back to original activity data
#   - Recalculation policy definition with configurable significance
#     thresholds (default 5% of total base year emissions), allowed
#     triggers, and approval workflow requirements
#   - Automated trigger detection for structural changes (M&A, divestitures,
#     outsourcing, insourcing), methodology changes (emission factor
#     updates, calculation methodology improvements, GWP value changes),
#     and error discovery (significant errors in historical data)
#   - Quantitative significance assessment using absolute change, percentage
#     change, and cumulative impact metrics against policy thresholds
#   - Pro-rata adjustment calculation for mergers (add acquired emissions
#     as if owned in base year), divestitures (remove divested emissions),
#     and outsourcing/insourcing (boundary reclassification)
#   - Time-series consistency enforcement ensuring all comparison years
#     use consistent methodology, boundary, and emission factor vintage
#   - Target tracking with automatic base year adjustment propagation
#     to absolute and intensity targets, SBTi pathway recalculation,
#     and target restatement documentation
#   - Comprehensive audit trail with SHA-256 provenance hashing on every
#     trigger assessment, significance test, and adjustment calculation
#   - Multi-framework reporting from a single base year dataset
#
# Recalculation Trigger Categories (GHG Protocol Ch. 5):
#   STRUCTURAL: Acquisitions, divestitures, mergers, spin-offs,
#     outsourcing, insourcing of emitting activities
#   METHODOLOGICAL: Emission factor source changes, calculation
#     methodology updates, GWP assessment report changes,
#     allocation method changes, improved data availability
#   ERROR: Discovery of significant errors or omissions in
#     historical activity data or emission calculations
#   ORGANIC_GROWTH: NOT a trigger (organic growth and closures
#     do not require base year recalculation per GHG Protocol)
#
# Significance Thresholds:
#   DEFAULT: 5% of total base year emissions (GHG Protocol recommended)
#   CONSERVATIVE: 3% of total base year emissions
#   RELAXED: 10% of total base year emissions
#   CUMULATIVE: Tracks cumulative impact across multiple triggers
#
# Sector Presets:
#   corporate_office - Office-based organisations (Scope 2 dominant)
#   manufacturing - Industrial manufacturing (Scope 1 dominant, M&A active)
#   energy_utility - Power generation and distribution (asset-heavy)
#   transport_logistics - Fleet and logistics (mobile fleet changes)
#   food_agriculture - Agricultural operations (land use changes)
#   real_estate - Property portfolios (portfolio rebalancing)
#   healthcare - Hospital and healthcare systems (expansion/contraction)
#   sme_simplified - Simplified base year for small-medium enterprises
#
# Version History:
#   1.0.0 - Initial release (2026-03-24)
# =============================================================================

