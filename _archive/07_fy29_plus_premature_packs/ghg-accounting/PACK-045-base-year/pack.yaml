# -----------------------------------------------------------------------------
# Compliance Framework Mappings
# -----------------------------------------------------------------------------
compliance:
  frameworks:
    - id: "GHG_PROTOCOL_CH5"
      name: "GHG Protocol Corporate Standard Chapter 5"
      coverage: "Base year selection, recalculation triggers, significance threshold, adjustment methodology"
    - id: "ISO_14064_1"
      name: "ISO 14064-1:2018 Clause 5.4"
      coverage: "Base year selection, recalculation conditions, documentation requirements"
    - id: "ESRS_E1"
      name: "ESRS E1 Climate Change"
      coverage: "E1-4 base year for targets, E1-5 base year reference, recalculation disclosure"
    - id: "CDP_C5"
      name: "CDP Climate Change C5"
      coverage: "C5.1 base year emissions, C5.2 recalculation policy, C5.3 changes to base year"
    - id: "SBTI"
      name: "Science Based Targets initiative"
      coverage: "Post-2015 base year, 95% Scope 1+2 coverage, 5% materiality threshold, revalidation"
    - id: "SEC"
      name: "US SEC Climate Disclosure"
      coverage: "Base year disclosure, recalculation explanation, target base year reference"
    - id: "SB_253"
      name: "California SB 253"
      coverage: "Base year consistency for annual reporting, recalculation documentation"

