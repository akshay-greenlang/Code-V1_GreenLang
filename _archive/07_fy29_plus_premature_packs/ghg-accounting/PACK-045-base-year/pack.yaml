    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "plotly>=5.18"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
    min_connections: 15
    recommended_connections: 40

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_pack041_deployed
    - verify_mrv_agents_available
    - verify_base_year_schema_ready
    - verify_historical_data_accessible

  database_migrations:
    inherited:
      - "V001-V006"   # Core platform tables
      - "V007-V008"   # Feature flags and agent factory
      - "V009-V010"   # Authentication and RBAC
      - "V019-V020"   # Observability
      - "V021-V030"   # AGENT-FOUND
      - "V031-V050"   # AGENT-DATA
      - "V051-V081"   # AGENT-MRV
      - "V326-V335"   # PACK-041 (required dependency)
    new:
      - "V366__pack045_base_year_001"
      - "V367__pack045_base_year_002"
      - "V368__pack045_base_year_003"
      - "V369__pack045_base_year_004"
      - "V370__pack045_base_year_005"
      - "V371__pack045_base_year_006"
      - "V372__pack045_base_year_007"
      - "V373__pack045_base_year_008"
      - "V374__pack045_base_year_009"
      - "V375__pack045_base_year_010"

  post_install:
    - seed_significance_thresholds
    - seed_trigger_categories
    - seed_adjustment_methodologies
    - seed_target_pathway_templates
    - seed_policy_templates
    - validate_preset_configs

