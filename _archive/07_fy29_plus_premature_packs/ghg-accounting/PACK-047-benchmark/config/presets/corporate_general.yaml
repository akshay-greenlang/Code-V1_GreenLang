# =============================================================================
# PACK-047 GHG Emissions Benchmark - Corporate General Preset
# =============================================================================
# General corporate benchmark configuration for multi-sector companies
# where revenue-weighted intensity is the primary benchmark metric. Peer
# group matching uses GICS 4-digit sector codes with global scope. ITR
# is calculated via budget-based method with IEA NZE and SBTi SDA
# pathway alignment. CDP and TPI provide external benchmark context.
#
# Typical use cases:
#   - Diversified industrial conglomerates
#   - Multi-brand consumer goods corporations
#   - Holding companies with diverse subsidiaries
#   - Companies with mixed sector exposures
#   - First-time benchmark assessment
#
# Typical emission profile:
#   Peer group size: 20-50 entities
#   Key benchmark metric: tCO2e / MEUR revenue
#   Typical ITR range: 1.5C - 3.0C
# =============================================================================

# --- Peer Group Construction ---
peer_group:
  sector_classification: "GICS_4DIG"
  size_band: "LARGE"
  require_same_region: false
  region_scope: "GLOBAL"
  min_peers: 10
  max_peers: 50
  revenue_tolerance_pct: 50.0
  require_disclosure_coverage: true
  min_disclosure_pct: 60.0

# --- Scope Normalisation ---
normalisation:
  scope_alignment: "S1_S2M"
  consolidation_approach: "OPERATIONAL_CONTROL"
  target_gwp: "AR6"
  currency_normalisation: true
  target_currency: "EUR"
  period_alignment: "CALENDAR_YEAR"
  data_gap_strategy: "INTERPOLATE"
  biogenic_treatment: "EXCLUDE"
  climate_zone_adjustment: false

# --- External Data Sources ---
external_data:
  sources:
    - "CDP"
    - "TPI"
  cache_ttl_hours: 168
  auto_refresh: true
  cdp_year: 2025
  tpi_version: "5.0"

# --- Pathway Alignment ---
pathway:
  pathways:
    - "IEA_NZE"
    - "SBTI_SDA"
  primary_scenario: "ONE_POINT_FIVE_C"
  assessment_years:
    - 2025
    - 2030
    - 2035
    - 2050
  sbti_sector: "buildings"
  convergence_year: 2050
  include_overshoot_analysis: true

# --- Implied Temperature Rise ---
itr:
  methods:
    - "BUDGET_BASED"
    - "SECTOR_RELATIVE"
  primary_method: "BUDGET_BASED"
  budget_start_year: 2020
  target_horizon_year: 2050
  include_scope_3: false

# --- Trajectory Benchmarking ---
trajectory:
  historical_years: 5
  projection_years: 10
  regression_model: "OLS"
  min_data_points: 3
  include_confidence_bands: true

# --- Portfolio Benchmarking ---
portfolio:
  waci_enabled: false
  carbon_footprint_enabled: false
  pcaf_alignment: false

# --- Data Quality Scoring ---
data_quality:
  scoring_method: "PCAF_V3"
  target_score: 2
  improvement_roadmap: true
  staleness_threshold_days: 365

# --- Transition Risk Scoring ---
transition_risk:
  categories:
    - "CARBON_BUDGET"
    - "REGULATORY"
    - "COMPETITIVE"
  carbon_price_scenario: "IEA_NZE"
  carbon_price_2030_eur: 130.0
  carbon_price_2050_eur: 250.0

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "PDF"
  sections:
    - "executive_summary"
    - "peer_comparison"
    - "pathway_alignment"
    - "implied_temperature_rise"
    - "data_quality"
    - "transition_risk"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true

# --- Disclosure ---
disclosure:
  frameworks:
    - "ESRS"
    - "CDP"
    - "TCFD"
  mandatory_only: false
  include_methodology_notes: true
  include_data_quality_notes: true

# --- Alerts ---
alerts:
  alert_types:
    - "THRESHOLD"
    - "PATHWAY_DEVIATION"
    - "DATA_STALENESS"
  channels:
    - "EMAIL"
  pathway_deviation_threshold_pct: 15.0
  data_staleness_days: 180
