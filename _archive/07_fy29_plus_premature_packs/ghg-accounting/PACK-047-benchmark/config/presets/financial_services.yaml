# =============================================================================
# PACK-047 GHG Emissions Benchmark - Financial Services Preset
# =============================================================================
# Financial institutions where financed emissions (tCO2e/MEUR invested)
# and WACI are the primary benchmark metrics, aligned with PCAF Global
# Standard v3. Portfolio-level benchmarking is enabled for listed equity,
# corporate bonds, and project finance. ITR is calculated at both entity
# and portfolio level. SFDR PAI indicators are included for EU fund
# disclosure requirements.
#
# Typical use cases:
#   - Banks and lending institutions
#   - Asset managers and investment funds
#   - Insurance companies (underwriting portfolio)
#   - Pension funds and sovereign wealth funds
#   - Development finance institutions
#
# Typical emission profile:
#   Scope 1+2 (operational): <5% of total footprint
#   Scope 3 Cat 15 (investments): >95% of total footprint
#   Key benchmark metric: tCO2e / MEUR invested (WACI)
#   Typical WACI range: 50-300 tCO2e / MEUR
#   Typical ITR range: 1.8C - 3.5C (portfolio-dependent)
# =============================================================================

# --- Peer Group Construction ---
peer_group:
  sector_classification: "GICS_4DIG"
  size_band: "ENTERPRISE"
  require_same_region: false
  region_scope: "GLOBAL"
  min_peers: 10
  max_peers: 50
  revenue_tolerance_pct: 50.0
  require_disclosure_coverage: true
  min_disclosure_pct: 70.0

# --- Scope Normalisation ---
normalisation:
  scope_alignment: "S1_S2_S3"
  consolidation_approach: "EQUITY_SHARE"
  target_gwp: "AR6"
  currency_normalisation: true
  target_currency: "EUR"
  period_alignment: "CALENDAR_YEAR"
  data_gap_strategy: "INTERPOLATE"
  biogenic_treatment: "EXCLUDE"

# --- External Data Sources ---
external_data:
  sources:
    - "CDP"
    - "TPI"
    - "ISS_ESG"
  cache_ttl_hours: 168
  auto_refresh: true
  cdp_year: 2025
  tpi_version: "5.0"
  iss_esg_enabled: true

# --- Pathway Alignment ---
pathway:
  pathways:
    - "IEA_NZE"
    - "SBTI_SDA"
    - "OECM"
  primary_scenario: "ONE_POINT_FIVE_C"
  assessment_years:
    - 2025
    - 2030
    - 2035
    - 2050
  sbti_sector: "buildings"
  convergence_year: 2050
  include_overshoot_analysis: true

# --- Implied Temperature Rise ---
itr:
  methods:
    - "BUDGET_BASED"
    - "SECTOR_RELATIVE"
    - "RATE_OF_REDUCTION"
  primary_method: "BUDGET_BASED"
  budget_start_year: 2020
  target_horizon_year: 2050
  include_scope_3: true

# --- Trajectory Benchmarking ---
trajectory:
  historical_years: 5
  projection_years: 10
  regression_model: "OLS"
  min_data_points: 3
  include_confidence_bands: true
  convergence_test: true

# --- Portfolio Benchmarking ---
portfolio:
  asset_classes:
    - "LISTED_EQUITY"
    - "CORPORATE_BONDS"
    - "PROJECT_FINANCE"
    - "COMMERCIAL_RE"
  waci_enabled: true
  carbon_footprint_enabled: true
  attribution_method: "EVIC"
  include_sovereign: false
  benchmark_index: "MSCI_WORLD"
  pcaf_alignment: true

# --- Data Quality Scoring ---
data_quality:
  scoring_method: "PCAF_V3"
  target_score: 2
  improvement_roadmap: true
  staleness_threshold_days: 365

# --- Transition Risk Scoring ---
transition_risk:
  categories:
    - "CARBON_BUDGET"
    - "STRANDING"
    - "REGULATORY"
    - "COMPETITIVE"
    - "FINANCIAL"
  carbon_price_scenario: "IEA_NZE"
  carbon_price_2030_eur: 130.0
  carbon_price_2050_eur: 250.0

# --- Reporting ---
reporting:
  formats:
    - "HTML"
    - "JSON"
    - "PDF"
  sections:
    - "executive_summary"
    - "peer_comparison"
    - "pathway_alignment"
    - "implied_temperature_rise"
    - "trajectory_analysis"
    - "transition_risk"
    - "data_quality"
    - "methodology"
  language: "en"
  include_charts: true
  include_data_tables: true
  include_appendices: true

# --- Disclosure ---
disclosure:
  frameworks:
    - "ESRS"
    - "CDP"
    - "TCFD"
    - "SFDR"
  mandatory_only: false
  include_methodology_notes: true
  include_data_quality_notes: true
  sfdr_pai_indicators:
    - 1
    - 2
    - 3
    - 4

# --- Alerts ---
alerts:
  alert_types:
    - "THRESHOLD"
    - "PATHWAY_DEVIATION"
    - "DATA_STALENESS"
    - "QUALITY_DROP"
    - "RANK_CHANGE"
  channels:
    - "EMAIL"
    - "SLACK"
  pathway_deviation_threshold_pct: 10.0
  data_staleness_days: 90
