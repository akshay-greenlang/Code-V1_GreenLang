# PACK-049 Preset: Healthcare
# Hospital network with bed-day KPIs and 24/7 operations

site_registry:
  max_sites: 2000
  facility_types_enabled: ["HOSPITAL", "OFFICE", "LABORATORY", "WAREHOUSE"]
  lifecycle_tracking: true
  grouping_enabled: true

data_collection:
  collection_period: MONTHLY
  data_entry_modes: ["MANUAL", "SPREADSHEET_UPLOAD", "ERP_CONNECTOR"]
  validation_strictness: STRICT
  estimation_allowed: true
  reminder_days: [14, 7, 3, 1]

boundary:
  consolidation_approach: OPERATIONAL_CONTROL
  materiality_threshold: 0.03
  de_minimis_threshold: 0.005
  annual_boundary_lock: true

regional_factor:
  preferred_tier: TIER_2_NATIONAL
  default_source: DEFRA
  grid_factor_update_frequency: ANNUAL
  climate_zone_enabled: true

consolidation:
  elimination_enabled: true
  equity_adjustment_enabled: true
  completeness_threshold: 0.95
  reconciliation_tolerance: 0.01

allocation:
  default_method: FLOOR_AREA
  shared_services_enabled: true
  landlord_tenant_enabled: false
  cogeneration_enabled: true

comparison:
  default_kpi: EMISSIONS_PER_M2
  peer_group_min_size: 3
  percentile_bands: [10, 25, 50, 75, 90]
  trend_years: 5

completion:
  completeness_target: 0.98
  deadline_reminders_days: [14, 7, 3, 1]
  escalation_enabled: true
  auto_estimation_enabled: false

quality:
  minimum_quality_score: 2
  improvement_tracking_enabled: true

reporting:
  default_format: HTML
  drill_down_levels: 4
  multi_year_enabled: true
