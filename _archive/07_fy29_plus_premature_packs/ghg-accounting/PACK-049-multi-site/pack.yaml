# =============================================================================
# PACK-049: GHG Multi-Site Management Pack
# GreenLang GHG Accounting Pack for Multi-Facility Inventory Management
# =============================================================================
# This pack delivers a production-ready, verification-grade multi-site GHG
# inventory management system covering facility registry, decentralised data
# collection, organisational boundary definition, regional emission factor
# assignment, multi-site consolidation, shared-services allocation, internal
# portfolio benchmarking, submission completeness tracking, site-level data
# quality scoring, and consolidated multi-site reporting.
#
# The pack follows a zero-hallucination approach: all consolidation
# calculations, equity adjustments, allocation splits, quality scores, and
# completeness assessments use deterministic formulas from established
# standards (GHG Protocol, ISO 14064-1, PCAF). No LLM is used in any
# calculation path. Regional emission factors are from authoritative
# databases (IPCC, DEFRA, EPA, IEA) with full provenance tracking.
# =============================================================================

pack:
  id: PACK-049
  name: "GHG Multi-Site Management Pack"
  version: "1.0.0"
  category: "ghg-accounting"
  tier: "enterprise"
  status: "production-ready"
  author: "GreenLang Platform Team"
  date: "2026-03-26"
  license: "Proprietary"
  min_platform_version: "1.0.0"

description:
  short: "Comprehensive multi-site GHG inventory management with facility registry, data collection, boundary definition, consolidation, allocation, benchmarking, and quality scoring"
  long: |
    PACK-049 provides the complete multi-site GHG inventory management
    lifecycle for organisations operating across multiple facilities, regions,
    and legal entities. It enables facility-level data collection with
    decentralised submission workflows, organisational boundary definition
    (equity share / operational control / financial control per GHG Protocol
    Chapter 3), regional emission factor assignment with tiered lookup
    (facility > national > regional > IPCC default), multi-site consolidation
    with intra-group elimination and equity adjustments, shared-services
    allocation (floor area / headcount / revenue / production / custom),
    landlord-tenant splits, co-generation allocation, internal portfolio
    benchmarking across sites, submission completeness tracking with deadline
    management, site-level data quality scoring (PCAF 1-5), and consolidated
    multi-site reporting with drill-down from corporate to site level.

regulatory_basis:
  - framework: "GHG Protocol Corporate Standard"
    description: "Chapter 3: Setting Organisational Boundaries; Chapter 4: Setting Operational Boundaries"
  - framework: "ISO 14064-1:2018"
    description: "Clause 5: Organisational boundaries; Clause 6: Reporting boundaries"
  - framework: "EU CSRD / ESRS E1"
    description: "Consolidated GHG reporting across value chain"
  - framework: "US SEC Climate Rules"
    description: "Entity-level GHG disclosure for registrants"
  - framework: "California SB 253"
    description: "Facility-level emissions reporting"
  - framework: "PCAF Global Standard"
    description: "Data quality scoring per asset/facility"
  - framework: "GRI 305"
    description: "Site-level and consolidated GHG reporting"
  - framework: "IFRS S2"
    description: "Climate disclosure at reporting entity level"
  - framework: "EPA 40 CFR 98"
    description: "Facility-level GHG mandatory reporting"
  - framework: "UK SECR"
    description: "Energy and carbon reporting per legal entity"
  - framework: "Australia NGER"
    description: "Facility-level GHG reporting"
  - framework: "ISO 50001:2018"
    description: "Energy management across multiple sites"

