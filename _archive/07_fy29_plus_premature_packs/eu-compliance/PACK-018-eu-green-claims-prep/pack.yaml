    description: "Maintains registry of available agents and claim processing capabilities"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all claim substantiation calculations are reproducible with SHA-256"
    required: true
  - id: AGENT-FOUND-009
    name: "QA Test Harness"
    description: "Automated quality assurance for claim substantiation outputs"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors claim processing pipeline health and performance"
    required: true

# ---------------------------------------------------------------------------
# Bridged Agents (4 agents for green claims, PCF, LCA, and circular economy)
# ---------------------------------------------------------------------------
agents_bridged:
  - id: gl_008_green_claims
    name: "Green Claims Agent"
    description: >-
      Core GreenLang green claims assessment agent providing claim
      classification, substantiation scoring, and ECGT compliance
      checking capabilities. Supplies the foundational claim type
      taxonomy and substantiation rule engine used by the pack engines.
    required: true
  - id: gl_009_pcf
    name: "Product Carbon Footprint Agent"
    description: >-
      GreenLang product carbon footprint calculation agent per ISO 14067
      and PEF climate change impact category. Provides cradle-to-gate and
      cradle-to-grave carbon footprint calculations that substantiate
      carbon neutral, low-carbon, and reduced carbon footprint claims.
    required: true
  - id: gl_077_lca
    name: "Lifecycle Assessment Agent"
    description: >-
      GreenLang lifecycle assessment agent implementing PEF methodology
      across all 16 impact categories. Provides the lifecycle-based
      scientific evidence required by Article 3 of the Green Claims
      Directive for product and organisation-level claim substantiation.
    required: true
  - id: gl_078_circular_economy
    name: "Circular Economy Agent"
    description: >-
      GreenLang circular economy agent providing recyclability assessment,
      recycled content verification, biodegradability evaluation, and
      Material Circularity Indicator (MCI) calculation. Substantiates
      circularity-related claims (recyclable, recycled content,
      biodegradable, compostable, zero-waste) per ISO 14021 and EN 13432.
    required: true

# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 64
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 4
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  claim_assessment:
    max_claims: 10000
    claim_classification_per_item_ms: 25
    substantiation_scoring_per_claim_ms: 100
    target_duration_minutes: 30
  evidence_chain:
    max_evidence_items: 50000
    hash_computation_per_item_ms: 5
    dag_assembly_per_claim_ms: 50
    target_duration_minutes: 15
  lifecycle_assessment:
    max_products_assessed: 500
    pef_calculation_per_product_minutes: 5
    target_duration_minutes: 120
  label_compliance:
    max_labels_audited: 1000
    label_validation_per_item_ms: 30
    target_duration_minutes: 10
  greenwashing_detection:
    max_claims_screened: 10000
    seven_sins_scoring_per_claim_ms: 50
    target_duration_minutes: 15
  comparative_claims:
    max_comparisons: 500
    comparison_validation_per_pair_ms: 200
    target_duration_minutes: 10
  cache_hit_ratio_target: 0.65
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with claim-level and evidence-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - green_claims_manager
    - sustainability_officer
    - compliance_analyst
    - marketing_compliance_lead
    - product_manager
    - lca_specialist
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_pef_database_access
    - verify_emission_factor_database
    - verify_eco_label_registry

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V083-PACK018-001"  # Claim inventory and classification tables
      - "V083-PACK018-002"  # Evidence chain and provenance hash tables
      - "V083-PACK018-003"  # PEF lifecycle assessment result tables
      - "V083-PACK018-004"  # Eco-label registry and compliance tables
      - "V083-PACK018-005"  # Greenwashing risk scoring tables
      - "V083-PACK018-006"  # Trader obligation checklist tables
      - "V083-PACK018-007"  # Comparative claim validation tables
      - "V083-PACK018-008"  # Benchmark and scorecard tables

  post_install:
    - seed_pef_impact_categories
    - seed_pefcr_catalogue
    - seed_eco_label_scheme_registry
    - seed_ucpd_blacklisted_practices
    - seed_terrachoice_seven_sins_rubric
    - seed_article3_checklist_criteria
    - seed_iso_14021_claim_types
    - seed_emission_factor_sources
    - seed_default_presets
    - run_health_checks
