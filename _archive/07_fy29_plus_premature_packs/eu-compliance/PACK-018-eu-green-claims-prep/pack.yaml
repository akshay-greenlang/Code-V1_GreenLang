# =============================================================================
# PACK-018: EU Green Claims Prep Pack
# GreenLang EU Compliance Pack for Green Claims Directive Substantiation
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for environmental claim assessment, substantiation, and
# verification-readiness per the EU Green Claims Directive (COM(2023)166 /
# 2023/0085/COD) and the Empowering Consumers Directive (EU) 2024/825. The
# Green Claims Directive will require all explicit environmental claims made
# by traders operating in the EU to be substantiated using a lifecycle-based
# methodology, independently verified by accredited conformity assessment
# bodies, and communicated in a manner that is clear, unambiguous, and not
# misleading.
#
# This pack integrates with the Product Environmental Footprint (PEF)
# methodology, the Ecodesign for Sustainable Products Regulation (ESPR) for
# Digital Product Passports, the EU Taxonomy Regulation for taxonomy-aligned
# activity claims, the CSRD/ESRS framework for corporate-level environmental
# disclosures, and the Unfair Commercial Practices Directive (UCPD) for
# consumer protection enforcement.
#
# Key Capabilities:
#   - Claim inventory and classification (Article 3 explicit claims)
#   - Lifecycle-based substantiation per PEF/PEFCR/OEFSR methodology
#   - Evidence chain management with SHA-256 provenance hashing
#   - Eco-label and environmental labelling scheme compliance (Article 10)
#   - Comparative claim validation against ISO 14025 and PEF benchmarks
#   - Greenwashing detection using TerraChoice Seven Sins framework
#   - Trader obligation tracking (Article 3-8 compliance checklist)
#   - Green claims benchmarking against sector peers and best practices
#   - Conformity assessment body (CAB) submission readiness
#   - Cross-regulation consistency (CSRD, Taxonomy, ESPR, CBAM)
#
# Regulatory References:
#   - Green Claims Directive: COM(2023)166 / 2023/0085/COD
#   - Empowering Consumers Directive: (EU) 2024/825
#   - Unfair Commercial Practices Directive: 2005/29/EC (as amended)
#   - PEF Recommendation: 2013/179/EU & update 2021/2279
#   - ESPR: Regulation (EU) 2024/1781
#   - CSRD: Directive (EU) 2022/2464
#   - EU Taxonomy: Regulation (EU) 2020/852
#   - ISO 14021: Self-declared environmental claims (Type II)
#   - ISO 14024: Environmental labelling (Type I)
#   - ISO 14025: Environmental declarations (Type III / EPD)
#   - ISO 14067: Carbon footprint of products
#   - EN 13432: Packaging - compostability requirements
#
# Claim Types Supported:
#   - Carbon claims: carbon neutral, net-zero, climate positive, low-carbon
#   - Circularity claims: recyclable, recycled content, biodegradable, compostable
#   - Resource claims: zero waste, reduced water use, energy efficient
#   - Nature claims: deforestation-free, biodiversity positive, ocean-friendly
#   - Aggregate claims: eco-friendly, sustainable, green, environmentally friendly
#   - Comparative claims: X% less carbon than competitor, best-in-class
#   - Offset-based claims: carbon offset, climate contribution, insetting
#   - Future-oriented claims: will be net-zero by 2030, transition plan
#
# Version History:
#   1.0.0 - Initial release (2026-03-17)
# =============================================================================

