# =============================================================================
# PACK-008 Sector: Financial Services
# =============================================================================
# Sector-specific configuration for the financial services industry including
# banking, insurance, asset management, green bonds, and sustainable finance
# products.
#
# Key NACE Sections: K (Financial and insurance activities)
# Primary Objectives: CCM, CCA (all 6 via counterparty data)
# Taxonomy Activities: ~4 direct activities
#
# Features:
#   - GAR/BTAR calculation for banking book
#   - Exposure classification across all asset types
#   - Counterparty taxonomy data aggregation
#   - EPC integration for real estate loan portfolios
#   - EBA Pillar 3 Templates 6-10
#   - SFDR product-level taxonomy ratios
#   - Green bond framework alignment
# =============================================================================

active_sectors:
  - "FINANCIAL_SERVICES"

eligibility:
  screening_mode: "HYBRID"
  min_confidence: 0.80
  batch_size: 1000
  include_transitional: true
  include_enabling: true

sc_assessment:
  evaluation_mode: "STANDARD"
  threshold_strictness: "STANDARD"

dnsh:
  climate_risk_assessment_enabled: true
  evidence_required: true

gar:
  calculate_stock_gar: true
  calculate_flow_gar: true
  calculate_btar: true
  exposure_types:
    - "CORPORATE_LOANS"
    - "DEBT_SECURITIES"
    - "EQUITY_HOLDINGS"
    - "RESIDENTIAL_MORTGAGES"
    - "COMMERCIAL_MORTGAGES"
    - "PROJECT_FINANCE"
    - "INTERBANK_LOANS"
  epc_integration: true
  epc_threshold_rating: "C"
  de_minimis_threshold: 0.0
  counterparty_data_source: "DIRECT"
  sovereign_exclusion: true
  interbank_exclusion: true

reporting:
  article8_enabled: true
  eba_pillar3_enabled: true
  xbrl_tagging: true
  nuclear_gas_supplementary: true
  yoy_comparison: true
  cross_framework_targets:
    - "EBA_PILLAR3"
    - "SFDR"
    - "CSRD_ESRS_E1"

regulatory:
  include_complementary_da: true
  track_updates: true

data_quality:
  min_quality_score: 0.85
  completeness_threshold: 0.90
