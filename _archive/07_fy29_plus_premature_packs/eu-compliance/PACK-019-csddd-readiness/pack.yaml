# =============================================================================
# PACK-019: CSDDD Readiness Pack
# GreenLang EU Compliance Pack for Corporate Sustainability Due Diligence
# Directive (EU) 2024/1760 Readiness Assessment and Implementation
# =============================================================================
# This pack provides a comprehensive, pre-configured deployment of GreenLang
# agents and workflows for assessing readiness and implementing compliance with
# the Corporate Sustainability Due Diligence Directive (CSDDD), adopted as
# Directive (EU) 2024/1760 on 13 June 2024. The CSDDD requires in-scope
# companies to conduct human rights and environmental due diligence across
# their operations, subsidiaries, and chains of activities (upstream and
# downstream business partners). It codifies the OECD Due Diligence Guidance
# for Responsible Business Conduct (2018) six-step framework into binding EU
# law, requiring companies to identify, prevent, mitigate, and account for
# adverse impacts on human rights and the environment.
#
# The directive applies in a phased manner:
#   - 26 July 2027: Companies with >5,000 employees AND >EUR 1,500M net
#     worldwide turnover (and ultimate parent companies meeting these thresholds)
#   - 26 July 2028: Companies with >3,000 employees AND >EUR 900M net
#     worldwide turnover
#   - 26 July 2029: Companies with >1,000 employees AND >EUR 450M net
#     worldwide turnover (full scope)
#   - Non-EU companies: Same thresholds based on EU-generated net turnover
#
# Key CSDDD Obligations (Articles covered):
#   - Art. 5: Due diligence policy integration into all policies and systems
#   - Art. 6: Identification and assessment of actual and potential adverse
#     impacts on human rights (Annex Part I) and environment (Annex Part II)
#   - Art. 7: Prevention and mitigation of potential adverse impacts
#   - Art. 8: Bringing actual adverse impacts to an end
#   - Art. 9: Meaningful engagement with affected stakeholders
#   - Art. 10: Grievance mechanism (complaints procedure)
#   - Art. 11: Monitoring the effectiveness of due diligence measures
#   - Art. 12: Public communication and reporting
#   - Art. 13: Meaningful engagement as cross-cutting obligation
#   - Art. 14: Contractual cascading of due diligence requirements
#   - Art. 22: Climate transition plan (aligned with Paris Agreement 1.5C)
#   - Art. 29: Civil liability for failure to comply with due diligence
#
# OECD Six-Step Framework Implementation:
#   Step 1: Embed RBC into policies and management systems (Art. 5)
#   Step 2: Identify and assess adverse impacts (Art. 6)
#   Step 3: Cease, prevent, or mitigate adverse impacts (Art. 7, 8)
#   Step 4: Track implementation and results (Art. 11)
#   Step 5: Communicate (Art. 12)
#   Step 6: Provide for or cooperate in remediation (Art. 8, 10)
#
# Adverse Impact Categories (Annex):
#   Part I - Human Rights (12 categories):
#     1. Right to life, liberty, and security
#     2. Prohibition of torture, cruel, inhuman treatment
#     3. Prohibition of forced labour and trafficking
#     4. Freedom of association and collective bargaining
#     5. Right to just and favourable working conditions
#     6. Prohibition of child labour
#     7. Right to adequate housing
#     8. Right to adequate food
#     9. Right to water and sanitation
#     10. Right to the highest attainable standard of health
#     11. Right to education
#     12. Rights of indigenous peoples (FPIC)
#
#   Part II - Environmental (9 categories):
#     1. Prohibition of activities causing environmental degradation (soil,
#        water, air, biodiversity)
#     2. Prohibition of activities causing deforestation (linked to EUDR)
#     3. Prohibition of hazardous waste export (Basel Convention)
#     4. Prohibition of activities causing adverse impacts on protected areas
#     5. Prohibition of activities adversely affecting access to clean water
#     6. Prohibition of mercury and mercury compounds use (Minamata)
#     7. Prohibition of persistent organic pollutants (Stockholm Convention)
#     8. Prohibition of hazardous chemicals and pesticides (Rotterdam)
#     9. Prohibition of ozone-depleting substances (Montreal/Vienna/Kigali)
#
# Key Capabilities:
#   - Scope threshold assessment (employee count, turnover, EU vs non-EU)
#   - Due diligence policy gap analysis against OECD framework
#   - Adverse impact identification and assessment (21 categories)
#   - Value chain mapping with risk prioritisation
#   - Prevention and mitigation action planning with effectiveness tracking
#   - Stakeholder engagement management with meaningful engagement criteria
#   - Grievance mechanism assessment and case management
#   - Due diligence monitoring and KPI tracking
#   - Climate transition plan assessment (Art. 22 / Paris 1.5C alignment)
#   - Civil liability risk assessment (Art. 29)
#   - Contractual cascading compliance tracking (Art. 14)
#   - Cross-regulation consistency (CSRD/ESRS, EUDR, EU Taxonomy)
#   - SHA-256 provenance tracking for all assessment outputs
#   - Zero-hallucination compliance scoring using deterministic rules
#
# Regulatory References:
#   - CSDDD: Directive (EU) 2024/1760
#   - OECD Due Diligence Guidance for RBC (2018)
#   - UN Guiding Principles on Business and Human Rights (2011)
#   - ILO Declaration on Fundamental Principles and Rights at Work
#   - International Bill of Human Rights (UDHR, ICCPR, ICESCR)
#   - Paris Agreement (2015) - Art. 22 climate transition plan
#   - CSRD: Directive (EU) 2022/2464 (Art. 12 reporting alignment)
#   - EUDR: Regulation (EU) 2023/1115 (deforestation-free supply chains)
#   - EU Taxonomy: Regulation (EU) 2020/852 (DNSH criteria)
#   - Basel Convention on Hazardous Waste (1989)
#   - Minamata Convention on Mercury (2013)
#   - Stockholm Convention on Persistent Organic Pollutants (2001)
#   - Rotterdam Convention on Hazardous Chemicals (1998)
#   - Montreal Protocol on Ozone-Depleting Substances (1987)
#   - Vienna Convention for the Protection of the Ozone Layer (1985)
#   - Kigali Amendment to the Montreal Protocol (2016)
#   - ILO Conventions: C29, C87, C98, C100, C105, C111, C138, C182
#
# Version History:
#   1.0.0 - Initial release (2026-03-17)
# =============================================================================

