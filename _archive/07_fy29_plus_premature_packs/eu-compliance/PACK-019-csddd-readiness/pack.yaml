  regulation:
    primary:
      name: "Corporate Sustainability Due Diligence Directive"
      reference: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        The CSDDD requires in-scope companies to integrate due diligence into
        their policies and management systems, identify and assess actual and
        potential adverse impacts on human rights and the environment in their
        own operations, subsidiaries, and chains of activities (upstream and
        downstream business partners), take appropriate measures to prevent
        and mitigate potential adverse impacts and bring actual adverse impacts
        to an end, establish and maintain a grievance mechanism, monitor the
        effectiveness of their due diligence measures, and publicly communicate
        on their due diligence. The directive also requires companies to adopt
        and put into effect a climate transition plan compatible with the Paris
        Agreement 1.5C target. Non-compliance triggers civil liability under
        Article 29 and administrative supervision with fines up to 5% of
        worldwide net turnover under Articles 24-25.
    secondary:
      - name: "OECD Due Diligence Guidance for Responsible Business Conduct"
        reference: "OECD (2018)"
        effective_date: "2018-05-30"
      - name: "UN Guiding Principles on Business and Human Rights"
        reference: "UN A/HRC/17/31 (2011)"
        effective_date: "2011-06-16"
      - name: "ILO Declaration on Fundamental Principles and Rights at Work"
        reference: "ILO (1998, amended 2022)"
        effective_date: "1998-06-18"
      - name: "Corporate Sustainability Reporting Directive"
        reference: "(EU) 2022/2464"
        effective_date: "2024-01-01"
      - name: "EU Deforestation Regulation"
        reference: "(EU) 2023/1115"
        effective_date: "2024-12-30"
      - name: "EU Taxonomy Regulation"
        reference: "(EU) 2020/852"
        effective_date: "2020-07-12"
      - name: "Paris Agreement"
        reference: "UNFCCC Paris Agreement (2015)"
        effective_date: "2016-11-04"
      - name: "Basel Convention on Hazardous Waste"
        reference: "Basel Convention (1989)"
        effective_date: "1992-05-05"
      - name: "Minamata Convention on Mercury"
        reference: "Minamata Convention (2013)"
        effective_date: "2017-08-16"
      - name: "Stockholm Convention on Persistent Organic Pollutants"
        reference: "Stockholm Convention (2001)"
        effective_date: "2004-05-17"

  compliance_references:
    - id: "CSDDD_ART5"
      name: "Article 5 - Due Diligence Policy"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to integrate due diligence into all relevant
        policies and risk management systems. The due diligence policy must
        describe the company's approach to due diligence, including the
        long-term approach; a code of conduct describing rules and principles
        to be followed by the company's employees and subsidiaries; and a
        description of the processes put in place to implement due diligence,
        including the measures taken to verify compliance with the code of
        conduct and to extend its application to established business
        relationships. The policy must be updated at least every 24 months
        or whenever there is a significant change in the risk profile.

    - id: "CSDDD_ART6"
      name: "Article 6 - Identifying and Assessing Adverse Impacts"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to take appropriate measures to identify and assess
        actual and potential adverse human rights impacts and adverse
        environmental impacts arising from their own operations or those of
        their subsidiaries, and from their chain of activities, in particular
        from established business relationships. Identification must cover
        all 12 human rights categories (Annex Part I) and 9 environmental
        categories (Annex Part II). The assessment must consider severity
        (scale, scope, irremediability) and likelihood. Companies must map
        their chain of activities, identify and assess which areas pose
        the greatest risk of adverse impacts, and prioritise the most
        severe and likely risks for action.

    - id: "CSDDD_ART7"
      name: "Article 7 - Prevention and Mitigation of Potential Adverse Impacts"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to take appropriate measures to prevent, or where
        prevention is not possible or not immediately possible, adequately
        mitigate potential adverse impacts that have been, or should have
        been, identified pursuant to Article 6. Measures include developing
        and implementing a prevention action plan with reasonable and clearly
        defined timelines, seeking contractual assurances from direct
        business partners (cascading), making necessary investments
        (financial or into processes), providing targeted support to SME
        business partners, and collaborating with other entities including
        through industry initiatives. If prevention or adequate mitigation
        is not possible, the company must refrain from entering into new
        or extending existing relations with the partner, or temporarily
        suspend or terminate the business relationship as a last resort.

    - id: "CSDDD_ART8"
      name: "Article 8 - Bringing Actual Adverse Impacts to an End"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to take appropriate measures to bring actual
        adverse impacts to an end and, where this is not immediately
        possible, to minimise their extent. Measures include neutralisation
        of the adverse impact or minimisation of its extent, a corrective
        action plan with reasonable timelines, seeking contractual
        assurances from direct business partners, making necessary
        investments, and providing targeted support. Where adverse impacts
        cannot be brought to an end or minimised, the company must refrain
        from entering new relations or extending existing ones, and must
        temporarily suspend or terminate the relationship if there is a
        reasonable expectation that the measures will not succeed. The
        company must also provide for remediation of adverse impacts.

    - id: "CSDDD_ART9"
      name: "Article 9 - Meaningful Engagement with Stakeholders"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to carry out meaningful engagement with
        stakeholders (affected persons, trade unions, civil society
        organisations, national human rights institutions) when identifying
        adverse impacts (Art. 6), developing prevention and corrective
        action plans (Art. 7, 8), deciding on termination of business
        relationships (Art. 7, 8), and adopting remediation measures
        (Art. 8). Meaningful engagement requires providing relevant and
        timely information, consulting in good faith, taking views into
        account in decision-making, providing feedback on how views were
        considered, and ensuring accessibility. Engagement must respect
        the rights of indigenous peoples to free, prior and informed
        consent (FPIC) where applicable.

    - id: "CSDDD_ART10"
      name: "Article 10 - Grievance Mechanism"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to provide the possibility for persons and
        organisations to submit complaints where they have legitimate
        concerns regarding actual or potential adverse impacts. The
        grievance mechanism must be accessible, predictable, equitable,
        transparent, rights-compatible, and a source of continuous
        learning. It must allow complaints to be submitted by persons
        affected or having reasonable grounds to believe they might be
        affected, trade unions, civil society organisations, and national
        human rights institutions. The company must not require
        complainants to waive their right to judicial remedies. Companies
        must handle complaints in a timely manner, inform complainants
        of the outcome, and take appropriate follow-up action. Companies
        may participate in collaborative grievance mechanisms.

    - id: "CSDDD_ART11"
      name: "Article 11 - Monitoring"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to carry out periodic assessments of their own
        operations and measures, those of their subsidiaries, and where
        related to the chain of activities, those of their established
        business relationships, to monitor the implementation and
        effectiveness of the identification, prevention, mitigation,
        bringing to an end, and minimisation of adverse impacts. The
        assessments must be based on qualitative and quantitative
        indicators and must be carried out at least every 12 months
        and whenever there are reasonable grounds to believe that
        significant new risks have arisen. Monitoring results must
        feed back into the due diligence policy and action plans.

    - id: "CSDDD_ART12"
      name: "Article 12 - Communication"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to report on matters covered by the directive.
        Companies subject to CSRD shall be deemed to have complied with
        Art. 12 by reporting in accordance with ESRS (in particular ESRS 2
        GOV-4 on due diligence, S1-S4 on social topics, E1-E5 on
        environmental topics, and G1 on business conduct). Companies not
        subject to CSRD must publish an annual statement on their website
        covering due diligence policies, identified adverse impacts and
        actions taken, and the outcome of monitoring. The statement must
        be published within 12 months of the end of the financial year.

    - id: "CSDDD_ART13"
      name: "Article 13 - Meaningful Engagement (Cross-Cutting)"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Cross-cutting provision reinforcing meaningful engagement
        requirements throughout all due diligence steps. Engagement must
        be proportionate to the severity and likelihood of the adverse
        impact, the characteristics of the business relationship and the
        undertaking's leverage, and the nature and context of the operation.
        Where engagement with all affected stakeholders is not feasible,
        the company must engage with credible representative organisations.

    - id: "CSDDD_ART14"
      name: "Article 14 - Contractual Cascading"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to seek contractual assurances from direct
        business partners that they will comply with the company's code
        of conduct and, as necessary, a prevention action plan. The
        contractual assurances must be accompanied by appropriate measures
        to verify compliance. Companies must cascade these requirements
        through the chain of activities by requiring direct partners to
        obtain equivalent contractual assurances from their own partners.
        Contractual cascading is a key mechanism for extending due
        diligence obligations through multi-tier supply chains.

    - id: "CSDDD_ART22"
      name: "Article 22 - Climate Transition Plan"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Requires companies to adopt and put into effect a transition plan
        for climate change mitigation which aims to ensure, through best
        efforts, that the business model and strategy of the company are
        compatible with the transition to a sustainable economy and with
        the limiting of global warming to 1.5C in line with the Paris
        Agreement. The transition plan must contain time-bound targets
        related to climate change for 2030 and in five-year steps up to
        2050, a description of identified decarbonisation levers and key
        actions planned, an explanation of the investment and funding
        supporting the implementation, and a description of the role of
        the administrative, management and supervisory bodies. Companies
        subject to CSRD reporting under ESRS E1 transition plan
        disclosures shall be deemed to comply with this article.

    - id: "CSDDD_ART29"
      name: "Article 29 - Civil Liability"
      regulation: "Directive (EU) 2024/1760"
      effective_date: "2027-07-26"
      description: >-
        Establishes civil liability for companies that fail to comply with
        their due diligence obligations under Articles 7 and 8, where
        such failure results in damage to a natural or legal person. The
        company is liable for damage caused by its failure to prevent,
        mitigate, bring to an end, or minimise adverse impacts. The
        burden of proof is on the claimant, but the company must provide
        access to evidence in its control. Limitation period is at least
        5 years. Overriding mandatory provisions of forum state apply.
        Companies cannot contractually exclude or limit their liability.

    - id: "OECD_DD"
      name: "OECD Due Diligence Guidance for Responsible Business Conduct"
      regulation: "OECD (2018)"
      effective_date: "2018-05-30"
      description: >-
        The foundational framework for responsible business conduct due
        diligence, codified into binding EU law through the CSDDD. The
        six-step process provides: (1) Embed RBC into policies and
        management systems; (2) Identify and assess actual and potential
        adverse impacts; (3) Cease, prevent, or mitigate adverse impacts;
        (4) Track implementation and results; (5) Communicate how impacts
        are addressed; (6) Provide for or cooperate in remediation when
        appropriate. The CSDDD maps directly to these six steps, making
        the OECD framework the operational methodology for CSDDD compliance.

    - id: "UNGP"
      name: "UN Guiding Principles on Business and Human Rights"
      regulation: "UN A/HRC/17/31 (2011)"
      effective_date: "2011-06-16"
      description: >-
        Authoritative global standard on preventing and addressing adverse
        human rights impacts linked to business activity. Three pillars:
        (1) State duty to protect human rights; (2) Corporate responsibility
        to respect human rights; (3) Access to remedy. The UNGPs define
        the concept of human rights due diligence that the CSDDD codifies
        into binding law, including the concepts of severity (scale, scope,
        irremediability), salience, and leverage. The CSDDD's approach to
        identifying and addressing adverse impacts is rooted in UNGP
        methodology.

