    required: true
  - id: AGENT-FOUND-002
    name: "Schema Compiler & Validator"
    description: "Compiles and validates CSDDD data schemas and adverse impact taxonomy"
    required: true
  - id: AGENT-FOUND-003
    name: "Unit & Reference Normalizer"
    description: "Normalises units (tCO2e, EUR, headcount, hours) and reference data"
    required: true
  - id: AGENT-FOUND-004
    name: "Assumptions Registry"
    description: "Tracks all assumptions in risk scoring, severity assessment, and threshold application"
    required: true
  - id: AGENT-FOUND-005
    name: "Citations & Evidence Agent"
    description: "Links due diligence findings to source evidence with SHA-256 provenance"
    required: true
  - id: AGENT-FOUND-006
    name: "Access & Policy Guard"
    description: "Enforces role-based access for due diligence data and confidential findings"
    required: true
  - id: AGENT-FOUND-007
    name: "Agent Registry & Service Catalog"
    description: "Maintains registry of available agents and due diligence capabilities"
    required: true
  - id: AGENT-FOUND-008
    name: "Reproducibility Agent"
    description: "Ensures all risk assessments and compliance scores are reproducible with SHA-256"
    required: true
  - id: AGENT-FOUND-009
    name: "QA Test Harness"
    description: "Automated quality assurance for due diligence outputs and compliance scoring"
    required: true
  - id: AGENT-FOUND-010
    name: "Observability & Telemetry Agent"
    description: "Monitors due diligence pipeline health and engine performance"
    required: true

