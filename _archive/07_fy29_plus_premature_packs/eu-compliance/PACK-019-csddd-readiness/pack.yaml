  description: >-
    End-to-end readiness assessment and implementation support for the Corporate
    Sustainability Due Diligence Directive (EU) 2024/1760. Includes 8 engines
    for due diligence policy assessment, adverse impact identification, value
    chain risk mapping, prevention and mitigation planning, stakeholder
    engagement, grievance mechanism management, monitoring and effectiveness
    tracking, and climate transition plan assessment. Implements the OECD
    Six-Step Due Diligence Framework with 21 adverse impact categories (12
    human rights from Annex Part I, 9 environmental from Annex Part II).
    Bundles all 30 MRV agents for climate transition plan substantiation,
    20 data intake and quality agents for supply chain data collection, 10
    foundation agents for orchestration and provenance, and 40 EUDR agents
    for deforestation-free supply chain integration. Supports manufacturing,
    extractives, financial services, retail and consumer goods, technology,
    and SME sectors with tailored presets. Enforces the zero-hallucination
    principle for all compliance scoring and risk rating calculations.
