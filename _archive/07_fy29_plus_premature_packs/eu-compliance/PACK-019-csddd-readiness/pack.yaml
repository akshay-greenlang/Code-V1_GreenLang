# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 64
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    bridged_agents: 4
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

  packs:
    required:
      - pack_id: PACK-001
        name: "CSRD Starter Pack"
        version: ">=1.0.0"
        reason: "Art. 12 reporting alignment and Art. 22 deemed compliance via ESRS E1-1"

    optional:
      - pack_id: PACK-004
        name: "CBAM Readiness Pack"
        version: ">=1.0.0"
        reason: "Supply chain environmental data for value chain risk mapping"
      - pack_id: PACK-006
        name: "EUDR Starter Pack"
        version: ">=1.0.0"
        reason: "ENV-2 deforestation due diligence and EUDR compliance data"
      - pack_id: PACK-008
        name: "EU Taxonomy Alignment Pack"
        version: ">=1.0.0"
        reason: "DNSH criteria for environmental adverse impact assessment"
      - pack_id: PACK-016
        name: "ESRS E1 Climate Pack"
        version: ">=1.0.0"
        reason: "Art. 22 climate transition plan via ESRS E1-1 deemed compliance"
      - pack_id: PACK-017
        name: "ESRS Full Coverage Pack"
        version: ">=1.0.0"
        reason: "Full ESRS coverage for Art. 12 deemed compliance"
      - pack_id: PACK-018
        name: "EU Green Claims Prep Pack"
        version: ">=1.0.0"
        reason: "Cross-validation of environmental claims against due diligence findings"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  scope_assessment:
    max_entities: 500
    assessment_per_entity_ms: 50
    target_duration_minutes: 5
  adverse_impact_identification:
    max_suppliers: 50000
    max_adverse_impacts: 10000
    risk_scoring_per_impact_ms: 10
    target_duration_minutes: 30
  prevention_mitigation:
    max_action_plans: 5000
    plan_assessment_per_item_ms: 20
    target_duration_minutes: 15
  stakeholder_engagement:
    max_engagement_records: 10000
    engagement_assessment_per_item_ms: 15
    target_duration_minutes: 10
  grievance_mechanism:
    max_cases: 5000
    case_processing_per_item_ms: 25
    target_duration_minutes: 10
  monitoring:
    max_kpis: 500
    kpi_calculation_per_item_ms: 5
    target_duration_minutes: 5
  climate_transition:
    max_decarbonisation_levers: 100
    target_duration_minutes: 15
  civil_liability:
    max_risk_items: 1000
    risk_assessment_per_item_ms: 30
    target_duration_minutes: 10
  full_assessment:
    max_company_profiles: 1000
    target_duration_minutes: 120
    parallel_execution_enabled: true
  cache_hit_ratio_target: 0.65
  memory_ceiling_mb: 8192

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with due-diligence-level and impact-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - csddd_manager
    - due_diligence_officer
    - compliance_analyst
    - human_rights_specialist
    - environmental_specialist
    - supply_chain_manager
    - stakeholder_engagement_lead
    - grievance_officer
    - legal_counsel
    - external_auditor
    - admin

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "scipy>=1.11"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "lxml>=4.9"
    - "xmlschema>=3.0"
    - "cryptography>=41.0"
    - "networkx>=3.1"

  infrastructure:
    min_cpu_cores: 8
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 16
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Testing
# -----------------------------------------------------------------------------
testing:
  framework: pytest
  config: tests/conftest.py
  test_files: 16
  target_tests: 700
  target_pass_rate: 100
  unit_tests: tests/unit/
  integration_tests: tests/integration/
  end_to_end_tests: tests/e2e/
  min_test_coverage_pct: 85
  load_testing_enabled: true
  max_load_test_throughput_assessments_per_hour: 50

# -----------------------------------------------------------------------------
# Quality Gates
# -----------------------------------------------------------------------------
quality_gates:
  min_article_coverage_pct: 100
  min_impact_category_coverage_pct: 100
  provenance_required: true
  cross_article_consistency_checks: true
  oecd_step_completeness_required: true
  audit_trail_required: true
  zero_hallucination_enforcement: true
  csrd_alignment_check: true
  eudr_alignment_check: false

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_country_risk_database
    - verify_commodity_risk_database
    - verify_ilo_convention_data
    - verify_mrv_agent_availability
    - verify_data_agent_availability

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
    new:
      - "V083-PACK019-001"  # Company profile and scope assessment tables
      - "V083-PACK019-002"  # Due diligence policy and code of conduct tables
      - "V083-PACK019-003"  # Adverse impact register and severity scoring tables
      - "V083-PACK019-004"  # Value chain mapping and risk overlay tables
      - "V083-PACK019-005"  # Prevention and corrective action plan tables
      - "V083-PACK019-006"  # Stakeholder engagement and FPIC tracking tables
      - "V083-PACK019-007"  # Grievance mechanism and case management tables
      - "V083-PACK019-008"  # Monitoring KPIs and effectiveness scoring tables
      - "V083-PACK019-009"  # Climate transition plan assessment tables
      - "V083-PACK019-010"  # Civil liability risk matrix and scoring tables
      - "V083-PACK019-011"  # Contractual cascading and compliance tracking tables
      - "V083-PACK019-012"  # Cross-regulation alignment and readiness report tables

  post_install:
    - seed_adverse_impact_categories
    - seed_hr_instrument_references
    - seed_env_convention_references
    - seed_country_risk_indices
    - seed_commodity_risk_profiles
    - seed_sector_risk_indicators
    - seed_ilo_convention_ratifications
    - seed_oecd_step_checklist_criteria
    - seed_ungp_severity_criteria
    - seed_escalation_ladder_stages
    - seed_default_presets
    - run_health_checks

