# ---------------------------------------------------------------------------
# Data Agents - Supporting data intake and quality agents (20 agents)
# ---------------------------------------------------------------------------
agents_data:
  # Data Intake (9 agents)
  - id: AGENT-DATA-001
    name: "PDF & Invoice Extractor"
    description: "Extracts evidence from audit reports, supplier certifications, and policy documents"
    required: true
  - id: AGENT-DATA-002
    name: "Excel/CSV Normalizer"
    description: "Normalises supplier lists, risk assessment data, and due diligence questionnaire responses"
    required: true
  - id: AGENT-DATA-003
    name: "ERP/Finance Connector"
    description: "Connects to ERP for supplier master data, spend data, and contract data"
    required: true
  - id: AGENT-DATA-004
    name: "API Gateway Agent"
    description: "Routes external API connections for country risk indices, commodity risk data, and ILO databases"
    required: true
  - id: AGENT-DATA-005
    name: "EUDR Traceability Connector"
    description: "Supply chain traceability data for ENV-2 deforestation and commodity geolocation"
    required: false
  - id: AGENT-DATA-006
    name: "GIS/Mapping Connector"
    description: "Geospatial data for supplier site locations and community proximity analysis"
    required: false
  - id: AGENT-DATA-007
    name: "Deforestation Satellite Connector"
    description: "Satellite imagery for ENV-2 deforestation monitoring in supply chain"
    required: false
  - id: AGENT-DATA-008
    name: "Supplier Questionnaire Processor"
    description: "Processes supplier due diligence questionnaires for adverse impact assessment"
    required: true
  - id: AGENT-DATA-020
    name: "Climate Hazard Connector"
    description: "Climate hazard data for physical risk assessment supporting Art. 22"
    required: false
  # Data Quality (11 agents)
  - id: AGENT-DATA-009
    name: "Spend Data Categorizer"
    description: "Categorises procurement spend by human rights and environmental risk category"
    required: true
  - id: AGENT-DATA-010
    name: "Data Quality Profiler"
    description: "Profiles data quality across due diligence inputs for evidence reliability"
    required: true
  - id: AGENT-DATA-011
    name: "Duplicate Detection Agent"
    description: "Detects duplicate supplier entries, impact records, and complaint cases"
    required: true
  - id: AGENT-DATA-012
    name: "Missing Value Imputer"
    description: "Imputes missing risk assessment data using proxy indicators and peer data"
    required: true
  - id: AGENT-DATA-013
    name: "Outlier Detection Agent"
    description: "Detects anomalous risk scores and KPI values for due diligence review"
    required: true
  - id: AGENT-DATA-014
    name: "Time Series Gap Filler"
    description: "Fills temporal gaps in monitoring KPI time series for trend analysis"
    required: false
  - id: AGENT-DATA-015
    name: "Cross-Source Reconciliation"
    description: "Reconciles due diligence data across audit reports, questionnaires, and external indices"
    required: true
  - id: AGENT-DATA-016
    name: "Data Freshness Monitor"
    description: "Monitors staleness of country risk indices, commodity risk data, and audit results"
    required: true
  - id: AGENT-DATA-017
    name: "Schema Migration Agent"
    description: "Manages schema evolution for risk assessment and due diligence data formats"
    required: true
  - id: AGENT-DATA-018
    name: "Data Lineage Tracker"
    description: "Tracks data lineage from source evidence through due diligence assessment pipeline"
    required: true
  - id: AGENT-DATA-019
    name: "Validation Rule Engine"
    description: "Enforces CSDDD, OECD, and UNGP validation rules on due diligence data"
    required: true

# ---------------------------------------------------------------------------
