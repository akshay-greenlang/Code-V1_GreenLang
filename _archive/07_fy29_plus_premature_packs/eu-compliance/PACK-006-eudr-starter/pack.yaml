# =============================================================================
# PACK-006: EUDR Starter Pack
# GreenLang EU Compliance Pack for EU Deforestation Regulation
# =============================================================================
# This pack provides a complete, pre-configured deployment of GreenLang agents
# and workflows for EU Deforestation Regulation (EUDR) compliance. It bundles
# EUDR-specific agents, data connectors, workflows, presets, and templates
# into a single installable unit for due diligence statement generation,
# geolocation verification, risk assessment, and supply chain traceability.
#
# Regulatory References:
#   - EUDR: Regulation (EU) 2023/1115
#   - Articles: 3 (Prohibition), 4 (Operator Obligations), 8 (Due Diligence),
#               9 (DDS), 10 (Information), 11 (Risk Assessment), 12 (Risk Mitigation),
#               13 (Simplified DD), 29 (Country Benchmarking), 33 (EU IS)
#   - Cutoff Date: 31 December 2020
#   - Commodities: Cattle, Cocoa, Coffee, Oil Palm, Rubber, Soya, Wood
#   - Annex I CN Codes: 400+ product classifications
#
# Version History:
#   1.0.0 - Initial release (2026-03-14)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-006-eudr-starter
  version: "1.0.0"
  display_name: "EUDR Starter Pack"
  description: >-
    Complete GreenLang deployment pack for EU Deforestation Regulation (EUDR)
    compliance. Includes supply chain traceability, geolocation verification,
    risk assessment, due diligence statement generation, commodity classification,
    and EU Information System integration. Supports all 7 EUDR commodities with
    400+ CN code classifications, 200+ country risk benchmarks, and configurable
    presets for large operators, mid-market companies, SMEs, and first-time
    declarants.
  category: eu-compliance
  tier: starter
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-14"
  support_tier: enterprise
  documentation_url: "https://docs.greenlang.io/packs/eudr-starter"
  changelog_url: "https://docs.greenlang.io/packs/eudr-starter/changelog"

  tags:
    - eudr
    - eu-deforestation
    - eu-compliance
    - supply-chain
    - traceability
    - geolocation
    - due-diligence
    - deforestation-free
    - risk-assessment
    - commodity-compliance

  regulation:
    name: "EU Deforestation Regulation"
    reference: "(EU) 2023/1115"
    effective_date: "2024-12-30"
    sme_effective_date: "2025-06-30"
    articles: [3, 4, 8, 9, 10, 11, 12, 13, 29, 33]
    cutoff_date: "2020-12-31"
    commodities: 7
    annex_i_cn_codes: 400+
    description: >-
      The EU Deforestation Regulation prohibits the placing on the EU market,
      making available on the EU market, or exporting from the EU, of relevant
      commodities and products unless they are deforestation-free, produced in
      accordance with the relevant legislation of the country of production,
      and covered by a due diligence statement.

  compliance_references:
    - id: "EUDR"
      name: "EU Deforestation Regulation"
      regulation: "Regulation (EU) 2023/1115"
      effective_date: "2024-12-30"
      description: >-
        Regulation on deforestation-free products. Establishes mandatory due
        diligence requirements for operators and traders placing specified
        commodities and derived products on the EU market.
    - id: "EUDR-DDS"
      name: "Due Diligence Statement Requirements"
      regulation: "Regulation (EU) 2023/1115, Article 4(2)"
      effective_date: "2024-12-30"
      description: >-
        Operators must submit a Due Diligence Statement (DDS) to the EU
        Information System prior to placing products on the market. The DDS
        must contain information per Article 4(2) and Annex II.
    - id: "EUDR-GEO"
      name: "Geolocation Requirements"
      regulation: "Regulation (EU) 2023/1115, Article 9(1)(d)"
      effective_date: "2024-12-30"
      description: >-
        Geolocation coordinates of all plots of land where commodities were
        produced. For plots above 4 hectares, polygon coordinates are required.
        For plots at or below 4 hectares, a single GPS point is sufficient.
    - id: "EUDR-BENCH"
      name: "Country Benchmarking System"
      regulation: "Regulation (EU) 2023/1115, Article 29"
      effective_date: "2024-12-30"
      description: >-
        The Commission classifies countries or parts thereof as low, standard,
        or high risk based on deforestation rates, forest cover, agricultural
        expansion, and governance indicators.
    - id: "EUDR-EUIS"
      name: "EU Information System"
      regulation: "Regulation (EU) 2023/1115, Article 33"
      effective_date: "2024-12-30"
      description: >-
        Electronic interface for submission and verification of due diligence
        statements, reference number generation, and competent authority access.

# -----------------------------------------------------------------------------
# Components - All GreenLang agents and modules included in this pack
# -----------------------------------------------------------------------------
components:

  # ===========================================================================
  # Engines - Core calculation and processing engines
  # ===========================================================================
  engines:
    - id: dds_assembly_engine
      name: "DDS Assembly Engine"
      description: >-
        Assembles complete Due Diligence Statements by collecting, validating,
        and formatting all required information per Article 4(2) and Annex II.
      required: true

    - id: geolocation_engine
      name: "Geolocation Verification Engine"
      description: >-
        Verifies geolocation data including coordinate validation, polygon
        area calculation, CRS transformation, and overlap detection with
        protected areas and deforestation alerts.
      required: true

    - id: risk_scoring_engine
      name: "Risk Scoring Engine"
      description: >-
        Calculates composite risk scores using weighted factors for country
        risk, supplier risk, commodity risk, and documentation completeness
        per Article 10.
      required: true

    - id: commodity_classification_engine
      name: "Commodity Classification Engine"
      description: >-
        Classifies products against EUDR Annex I CN codes to determine
        whether they fall within scope of the regulation. Handles multi-
        commodity derived products and mixed shipments.
      required: true

    - id: supplier_compliance_engine
      name: "Supplier Compliance Engine"
      description: >-
        Tracks and assesses supplier-level compliance status across all tiers
        of the supply chain. Manages engagement workflows, data collection,
        and compliance scoring.
      required: true

    - id: cutoff_date_engine
      name: "Cutoff Date Verification Engine"
      description: >-
        Verifies that production plots have not been subject to deforestation
        or forest degradation after 31 December 2020 using satellite imagery,
        historical land use data, and temporal analysis.
      required: true

    - id: policy_compliance_engine
      name: "Policy Compliance Engine"
      description: >-
        Validates compliance with the relevant legislation of the country of
        production, including land use rights, environmental regulations,
        labour laws, and tax obligations.
      required: true

  # ===========================================================================
  # Workflows - Pre-defined orchestration sequences
  # ===========================================================================
  workflows:
    - id: dds_generation
      name: "DDS Generation Workflow"
      description: >-
        End-to-end workflow for generating a complete Due Diligence Statement.
        Covers data collection, geolocation verification, risk assessment,
        mitigation review, and DDS submission to the EU Information System.
      schedule: "on_demand"
      estimated_duration_days: 14
      phases:
        - name: data_collection
          description: "Collect supply chain data, geolocation, and documentation"
          agents:
            - AGENT-EUDR-001
            - AGENT-EUDR-002
            - AGENT-EUDR-007
            - AGENT-EUDR-008
            - AGENT-EUDR-012
            - AGENT-EUDR-015
          duration_days: 5
        - name: verification
          description: "Verify geolocation, validate coordinates, check cutoff date"
          agents:
            - AGENT-EUDR-002
            - AGENT-EUDR-006
            - AGENT-EUDR-007
            - AGENT-EUDR-009
          duration_days: 3
        - name: risk_assessment
          description: "Assess country, supplier, and commodity risk"
          agents:
            - AGENT-EUDR-016
            - AGENT-EUDR-017
            - AGENT-EUDR-018
            - AGENT-EUDR-028
          duration_days: 2
        - name: dds_assembly
          description: "Assemble DDS, generate reference number, submit to EUIS"
          agents:
            - AGENT-EUDR-026
            - AGENT-EUDR-030
            - AGENT-EUDR-037
            - AGENT-EUDR-038
            - AGENT-EUDR-036
          duration_days: 4

    - id: supplier_onboarding
      name: "Supplier Onboarding Workflow"
      description: >-
        Onboarding workflow for new suppliers entering the EUDR-compliant
        supply chain. Captures supplier data, validates documentation,
        performs initial risk assessment, and establishes traceability links.
      schedule: "on_demand"
      estimated_duration_days: 10
      phases:
        - name: supplier_registration
          description: "Register supplier, capture basic information"
          agents:
            - AGENT-EUDR-001
            - AGENT-EUDR-008
          duration_days: 2
        - name: documentation_collection
          description: "Collect and authenticate supplier documentation"
          agents:
            - AGENT-EUDR-012
            - AGENT-EUDR-015
            - AGENT-DATA-001
          duration_days: 3
        - name: geolocation_capture
          description: "Capture and validate plot geolocations"
          agents:
            - AGENT-EUDR-002
            - AGENT-EUDR-006
            - AGENT-EUDR-007
          duration_days: 2
        - name: initial_risk_assessment
          description: "Perform initial risk scoring on new supplier"
          agents:
            - AGENT-EUDR-016
            - AGENT-EUDR-017
            - AGENT-EUDR-018
          duration_days: 3

    - id: quarterly_compliance_review
      name: "Quarterly Compliance Review"
      description: >-
        Periodic compliance review to reassess risk levels, update supplier
        statuses, verify ongoing data quality, and generate management reports.
      schedule: "quarterly"
      estimated_duration_days: 7
      phases:
        - name: data_refresh
          description: "Refresh supplier data and satellite imagery"
          agents:
            - AGENT-EUDR-001
            - AGENT-EUDR-002
            - AGENT-DATA-005
          duration_days: 2
        - name: risk_reassessment
          description: "Reassess risk scores with updated data"
          agents:
            - AGENT-EUDR-016
            - AGENT-EUDR-017
            - AGENT-EUDR-018
            - AGENT-EUDR-028
          duration_days: 2
        - name: compliance_reporting
          description: "Generate compliance status reports and dashboards"
          agents:
            - AGENT-EUDR-030
            - AGENT-EUDR-026
          duration_days: 3

    - id: data_quality_baseline
      name: "Data Quality Baseline"
      description: >-
        Establishes data quality baseline for EUDR compliance data. Profiles
        all data sources, identifies gaps, validates coordinate accuracy, and
        sets quality thresholds.
      schedule: "on_demand"
      estimated_duration_days: 5
      phases:
        - name: data_profiling
          description: "Profile all EUDR data sources for quality"
          agents:
            - AGENT-DATA-010
            - AGENT-DATA-011
            - AGENT-DATA-019
          duration_days: 2
        - name: geolocation_validation
          description: "Validate all stored coordinates and polygons"
          agents:
            - AGENT-EUDR-002
            - AGENT-EUDR-007
          duration_days: 2
        - name: gap_analysis
          description: "Identify data gaps and remediation priorities"
          agents:
            - AGENT-EUDR-026
            - AGENT-DATA-010
          duration_days: 1

    - id: risk_reassessment
      name: "Risk Reassessment Workflow"
      description: >-
        Targeted risk reassessment triggered by changes in country benchmarking,
        supplier circumstances, or regulatory updates.
      schedule: "on_demand"
      estimated_duration_days: 3
      phases:
        - name: trigger_analysis
          description: "Analyze trigger event and determine scope of reassessment"
          agents:
            - AGENT-EUDR-016
            - AGENT-EUDR-027
          duration_days: 1
        - name: risk_recalculation
          description: "Recalculate risk scores for affected suppliers/commodities"
          agents:
            - AGENT-EUDR-017
            - AGENT-EUDR-018
            - AGENT-EUDR-028
          duration_days: 1
        - name: mitigation_update
          description: "Update mitigation measures and compliance status"
          agents:
            - AGENT-EUDR-026
            - AGENT-EUDR-030
          duration_days: 1

    - id: bulk_import
      name: "Bulk Import Workflow"
      description: >-
        Bulk import workflow for large-scale supplier and plot data ingestion.
        Supports CSV, Excel, GeoJSON, and API-based import with validation,
        deduplication, and quality checks.
      schedule: "on_demand"
      estimated_duration_days: 3
      phases:
        - name: data_ingestion
          description: "Ingest and normalize bulk data files"
          agents:
            - AGENT-DATA-001
            - AGENT-DATA-002
            - AGENT-DATA-005
          duration_days: 1
        - name: validation_dedup
          description: "Validate, deduplicate, and quality-check imported data"
          agents:
            - AGENT-DATA-010
            - AGENT-DATA-011
            - AGENT-DATA-019
          duration_days: 1
        - name: integration
          description: "Integrate validated data into EUDR compliance database"
          agents:
            - AGENT-EUDR-001
            - AGENT-EUDR-008
            - AGENT-EUDR-002
          duration_days: 1

  # ===========================================================================
  # Templates - Pre-built report and output templates
  # ===========================================================================
  templates:
    - id: dds_standard_report
      display_name: "Due Diligence Statement (Standard)"
      description: "Full DDS report for standard risk operators per Article 4(2) and Annex II"
      format: "pdf"
      template_file: "templates/dds_standard_report.jinja2"
      annex_version: "Annex II"
      enabled: true

    - id: dds_simplified_report
      display_name: "Due Diligence Statement (Simplified)"
      description: "Simplified DDS for low-risk country sourcing per Article 13"
      format: "pdf"
      template_file: "templates/dds_simplified_report.jinja2"
      annex_version: "Annex II (Simplified)"
      enabled: true

    - id: compliance_dashboard
      display_name: "EUDR Compliance Dashboard"
      description: "Interactive compliance status dashboard with KPIs, risk heatmaps, and supplier status"
      format: "html"
      template_file: "templates/compliance_dashboard.jinja2"
      enabled: true

    - id: supplier_risk_report
      display_name: "Supplier Risk Report"
      description: "Detailed supplier-level risk assessment report with scoring breakdown"
      format: "pdf"
      template_file: "templates/supplier_risk_report.jinja2"
      enabled: true

    - id: country_risk_matrix
      display_name: "Country Risk Matrix"
      description: "Country-by-commodity risk matrix with Article 29 benchmarking overlay"
      format: "pdf"
      template_file: "templates/country_risk_matrix.jinja2"
      enabled: true

    - id: geolocation_report
      display_name: "Geolocation Verification Report"
      description: "Plot geolocation verification report with coordinate validation and satellite overlay"
      format: "pdf"
      template_file: "templates/geolocation_report.jinja2"
      enabled: true

    - id: executive_summary
      display_name: "EUDR Executive Summary"
      description: "Board-level executive summary of EUDR compliance posture and risk exposure"
      format: "pdf"
      template_file: "templates/executive_summary.jinja2"
      enabled: true

  # ===========================================================================
  # Integrations - Agent wiring and external system bridges
  # ===========================================================================
  integrations:
    - id: pack_orchestrator
      name: "Pack Orchestrator"
      description: "Master orchestrator that coordinates all EUDR pack agents and workflows"
      required: true

    - id: eudr_app_bridge
      name: "EUDR Application Bridge"
      description: "Connects the EUDR pack to the GL-EUDR-APP v1.0 application layer"
      required: true

    - id: traceability_bridge
      name: "Traceability Data Bridge"
      description: "Bridges EUDR traceability connector (AGENT-DATA-005) with supply chain agents"
      required: true

    - id: satellite_bridge
      name: "Satellite Data Bridge"
      description: "Bridges deforestation satellite connector (AGENT-DATA-007) with verification agents"
      required: true

    - id: gis_bridge
      name: "GIS Data Bridge"
      description: "Bridges GIS/mapping connector (AGENT-DATA-006) with geolocation agents"
      required: true

    - id: eu_information_system_bridge
      name: "EU Information System Bridge"
      description: "Manages communication with the EU Information System for DDS submission and reference numbers"
      required: true

    - id: setup_wizard
      name: "Setup Wizard"
      description: "Guided setup wizard for initial EUDR pack configuration and commodity selection"
      required: false

    - id: health_check
      name: "Health Check"
      description: "Verifies all pack agents, data sources, and integrations are operational"
      required: false

  # ===========================================================================
  # EUDR Agents - 18 of 40 EUDR agents included in Starter Pack
  # ===========================================================================
  agents_eudr:

    # -------------------------------------------------------------------------
    # Supply Chain Traceability (8 agents)
    # -------------------------------------------------------------------------
    supply_chain_traceability:
      - id: AGENT-EUDR-001
        name: "Supply Chain Mapper"
        description: "Maps multi-tier supply chains for EUDR-regulated commodities"
        path: "greenlang/agents/eudr/supply_chain_mapper/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-002
        name: "Geolocation Verification"
        description: "Verifies geolocation coordinates and polygons for production plots"
        path: "greenlang/agents/eudr/geolocation_verification/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-006
        name: "Plot Boundary Manager"
        description: "Manages plot boundary polygons, area calculations, and overlap detection"
        path: "greenlang/agents/eudr/plot_boundary/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-007
        name: "GPS Coordinate Validator"
        description: "Validates GPS coordinate formats, precision, and datum transformations"
        path: "greenlang/agents/eudr/gps_coordinate_validator/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-008
        name: "Multi-Tier Supplier Tracker"
        description: "Tracks suppliers across multiple tiers with traceability links"
        path: "greenlang/agents/eudr/multi_tier_supplier/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-009
        name: "Chain of Custody Agent"
        description: "Manages chain of custody models (identity preserved, segregated, mass balance)"
        path: "greenlang/agents/eudr/chain_of_custody/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-012
        name: "Document Authentication"
        description: "Authenticates and validates supply chain documents, certificates, and permits"
        path: "greenlang/agents/eudr/document_authentication/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-015
        name: "Mobile Data Collector"
        description: "Enables field-level data collection via mobile devices with GPS capture"
        path: "greenlang/agents/eudr/mobile_data_collector/"
        required: false
        version: "1.0.0"

    # -------------------------------------------------------------------------
    # Risk Assessment (3 agents)
    # -------------------------------------------------------------------------
    risk_assessment:
      - id: AGENT-EUDR-016
        name: "Country Risk Evaluator"
        description: "Evaluates country-level deforestation risk using Article 29 benchmarking"
        path: "greenlang/agents/eudr/country_risk_evaluator/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-017
        name: "Supplier Risk Scorer"
        description: "Calculates composite supplier risk scores with weighted factor analysis"
        path: "greenlang/agents/eudr/supplier_risk_scorer/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-018
        name: "Commodity Risk Analyzer"
        description: "Analyzes commodity-specific risk factors including origin, certification, and volume"
        path: "greenlang/agents/eudr/commodity_risk_analyzer/"
        required: true
        version: "1.0.0"

    # -------------------------------------------------------------------------
    # Due Diligence Core (3 agents)
    # -------------------------------------------------------------------------
    due_diligence_core:
      - id: AGENT-EUDR-026
        name: "Due Diligence Orchestrator"
        description: "Orchestrates the full due diligence process per Articles 8-12"
        path: "greenlang/agents/eudr/due_diligence_orchestrator/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-027
        name: "Information Gathering"
        description: "Gathers and organizes all required information per Article 9"
        path: "greenlang/agents/eudr/information_gathering/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-028
        name: "Risk Assessment Engine"
        description: "Implements the risk assessment procedure per Article 10"
        path: "greenlang/agents/eudr/risk_assessment_engine/"
        required: true
        version: "1.0.0"

    # -------------------------------------------------------------------------
    # Due Diligence Workflow (4 agents)
    # -------------------------------------------------------------------------
    due_diligence_workflow:
      - id: AGENT-EUDR-030
        name: "Documentation Generator"
        description: "Generates compliance documentation, reports, and evidence packages"
        path: "greenlang/agents/eudr/documentation_generator/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-036
        name: "EU Information System Interface"
        description: "Interfaces with the EUDR EU Information System for DDS submission"
        path: "greenlang/agents/eudr/eu_information_system_interface/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-037
        name: "DDS Statement Creator"
        description: "Creates Due Diligence Statements conforming to Annex II format"
        path: "greenlang/agents/eudr/due_diligence_statement_creator/"
        required: true
        version: "1.0.0"

      - id: AGENT-EUDR-038
        name: "Reference Number Generator"
        description: "Generates and manages unique DDS reference numbers per Article 4(2)"
        path: "greenlang/agents/eudr/reference_number_generator/"
        required: true
        version: "1.0.0"

  # ===========================================================================
  # Data Agents - Supporting data intake and quality agents
  # ===========================================================================
  agents_data:
    - id: AGENT-DATA-001
      name: "PDF & Invoice Extractor"
      description: "Extracts supply chain data from PDF documents, invoices, and certificates"
      required: true

    - id: AGENT-DATA-002
      name: "Excel/CSV Normalizer"
      description: "Normalizes tabular supplier and commodity data from Excel/CSV files"
      required: true

    - id: AGENT-DATA-005
      name: "EUDR Traceability Connector"
      description: "Dedicated connector for EUDR traceability data sources and APIs"
      required: true

    - id: AGENT-DATA-010
      name: "Data Quality Profiler"
      description: "Profiles data quality across all EUDR compliance data sources"
      required: true

    - id: AGENT-DATA-011
      name: "Duplicate Detection Agent"
      description: "Detects and resolves duplicate supplier, plot, and shipment records"
      required: true

    - id: AGENT-DATA-019
      name: "Validation Rule Engine"
      description: "Enforces EUDR-specific validation rules on all compliance data"
      required: true

  # ===========================================================================
  # Foundation Agents - Core platform agents (all 10)
  # ===========================================================================
  agents_foundation:
    - id: AGENT-FOUND-001
      name: "GreenLang Orchestrator (DAG)"
      description: "Orchestrates agent execution using directed acyclic graphs"
      required: true
    - id: AGENT-FOUND-002
      name: "Schema Compiler & Validator"
      description: "Compiles and validates data schemas for EUDR compliance"
      required: true
    - id: AGENT-FOUND-003
      name: "Unit & Reference Normalizer"
      description: "Normalizes units (hectares, coordinates) and reference data"
      required: true
    - id: AGENT-FOUND-004
      name: "Assumptions Registry"
      description: "Tracks all assumptions used in risk assessments and calculations"
      required: true
    - id: AGENT-FOUND-005
      name: "Citations & Evidence Agent"
      description: "Links all data points to source evidence for audit trails"
      required: true
    - id: AGENT-FOUND-006
      name: "Access & Policy Guard"
      description: "Enforces role-based access and data policies"
      required: true
    - id: AGENT-FOUND-007
      name: "Agent Registry & Service Catalog"
      description: "Maintains registry of available agents and their capabilities"
      required: true
    - id: AGENT-FOUND-008
      name: "Reproducibility Agent"
      description: "Ensures all risk calculations are reproducible with provenance tracking"
      required: true
    - id: AGENT-FOUND-009
      name: "QA Test Harness"
      description: "Runs quality assurance checks on all agent outputs"
      required: true
    - id: AGENT-FOUND-010
      name: "Observability & Telemetry Agent"
      description: "Provides monitoring, logging, and telemetry for all agents"
      required: true

  # ===========================================================================
  # Data Connectors - External data source connectors
  # ===========================================================================
  data_connectors:
    - id: eudr_traceability_connector
      name: "EUDR Traceability Connector"
      description: "Connects to EUDR traceability data sources, customs systems, and trade databases"
      path: "greenlang/agents/data/eudr_traceability/"
      required: true

    - id: deforestation_satellite_connector
      name: "Deforestation Satellite Connector"
      description: "Connects to satellite imagery services (Global Forest Watch, Copernicus, GLAD)"
      path: "greenlang/agents/data/deforestation_satellite/"
      required: true

    - id: gis_mapping_connector
      name: "GIS/Mapping Connector"
      description: "Connects to GIS platforms for spatial analysis and mapping"
      path: "greenlang/agents/data/gis_connector/"
      required: true

# -----------------------------------------------------------------------------
# Commodities - EUDR Article 1 regulated commodities and Annex I CN codes
# -----------------------------------------------------------------------------
commodities:

  cattle:
    display_name: "Cattle"
    eudr_article: "Article 1(1)(a)"
    description: >-
      Cattle and products derived from cattle, including beef, leather, hides,
      and tallow. Covers live animals and processed products.
    cn_codes:
      - "0102"   # Live bovine animals
      - "0201"   # Meat of bovine animals, fresh or chilled
      - "0202"   # Meat of bovine animals, frozen
      - "0206"   # Edible offal of bovine animals
