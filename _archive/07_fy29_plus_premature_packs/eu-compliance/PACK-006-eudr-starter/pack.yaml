# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles
# -----------------------------------------------------------------------------
presets:

  # Size-based presets
  size_presets:
    - id: large_operator
      display_name: "Large Operator"
      description: >-
        Full deployment for large operators (>500 employees, >EUR 150M turnover).
        All 7 commodities enabled, full DDS workflow, multi-tier supply chain
        depth (5 tiers), all risk assessment dimensions, EU IS production
        integration, and advanced analytics.
      config_file: "config/presets/large_operator.yaml"
      criteria:
        min_employees: 500
        min_turnover_eur: 150000000
        operator_type: "OPERATOR"

    - id: mid_market
      display_name: "Mid-Market Company"
      description: >-
        Optimized for mid-market companies (50-500 employees). Configurable
        commodity selection, standard DDS workflow, 3-tier supply chain depth,
        core risk assessment, EU IS sandbox integration.
      config_file: "config/presets/mid_market.yaml"
      criteria:
        min_employees: 50
        max_employees: 500
        operator_type: "OPERATOR"

    - id: sme
      display_name: "SME (Small/Medium Enterprise)"
      description: >-
        Simplified deployment for SMEs (<50 employees or traders). Simplified
        DDS where eligible, 2-tier supply chain, guided mode enabled, core
        risk assessment only.
      config_file: "config/presets/sme.yaml"
      criteria:
        max_employees: 50
        operator_type: "TRADER"

    - id: first_time
      display_name: "First-Time Declarant"
      description: >-
        Extended onboarding for organizations making their first DDS submission.
        Tutorial mode, pre-populated examples, step-by-step guidance, demo
        data available, all validations with detailed explanations.
      config_file: "config/presets/first_time.yaml"
      criteria:
        first_declaration: true

  # Sector-specific presets (by commodity focus)
  sector_presets:
    - id: palm_oil
      display_name: "Palm Oil"
      description: "Palm oil and derivatives supply chain with RSPO/ISCC certification support"
      config_file: "config/sectors/palm_oil.yaml"
      primary_commodities: ["oil_palm"]

    - id: timber_wood
      display_name: "Timber & Wood Products"
      description: "Timber, wood products, pulp, and paper supply chain with FSC/PEFC certification"
      config_file: "config/sectors/timber_wood.yaml"
      primary_commodities: ["wood"]

    - id: cocoa_coffee
      display_name: "Cocoa & Coffee"
      description: "Cocoa and coffee supply chains with Rainforest Alliance/4C certification"
      config_file: "config/sectors/cocoa_coffee.yaml"
      primary_commodities: ["cocoa", "coffee"]

    - id: soy_cattle
      display_name: "Soy & Cattle"
      description: "Soy and cattle supply chains with focus on South American sourcing"
      config_file: "config/sectors/soy_cattle.yaml"
      primary_commodities: ["soya", "cattle"]

    - id: rubber
      display_name: "Rubber"
      description: "Natural rubber supply chain with Southeast Asian sourcing focus"
      config_file: "config/sectors/rubber.yaml"
      primary_commodities: ["rubber"]

# -----------------------------------------------------------------------------
# Templates (report templates metadata)
# -----------------------------------------------------------------------------
report_templates:
  - id: dds_standard
    display_name: "Standard DDS Report"
    format: "pdf"
    template_file: "templates/dds_standard_report.jinja2"
    description: "Standard Due Diligence Statement per Annex II"

  - id: dds_simplified
    display_name: "Simplified DDS Report"
    format: "pdf"
    template_file: "templates/dds_simplified_report.jinja2"
    description: "Simplified DDS for low-risk country sourcing (Article 13)"

  - id: compliance_dashboard
    display_name: "Compliance Dashboard"
    format: "html"
    template_file: "templates/compliance_dashboard.jinja2"
    description: "Interactive EUDR compliance status dashboard"

  - id: supplier_risk
    display_name: "Supplier Risk Report"
    format: "pdf"
    template_file: "templates/supplier_risk_report.jinja2"
    description: "Supplier-level risk assessment with scoring breakdown"

  - id: country_risk
    display_name: "Country Risk Matrix"
    format: "pdf"
    template_file: "templates/country_risk_matrix.jinja2"
    description: "Country-by-commodity risk matrix"

  - id: geolocation
    display_name: "Geolocation Report"
    format: "pdf"
    template_file: "templates/geolocation_report.jinja2"
    description: "Plot geolocation verification with satellite overlay"

  - id: executive_summary
    display_name: "Executive Summary"
    format: "pdf"
    template_file: "templates/executive_summary.jinja2"
    description: "Board-level EUDR compliance summary"

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "shapely>=2.0"
    - "pyproj>=3.6"
    - "geojson>=3.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 16
    min_storage_gb: 100
    recommended_cpu_cores: 8
    recommended_memory_gb: 32
    recommended_storage_gb: 500

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
      - "postgis"
    min_connections: 20
    recommended_connections: 50

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  data_ingestion:
    throughput_records_per_second: 5000
    max_latency_ms: 200
    description: "Data ingestion throughput for supplier and plot data"

  geolocation_verification:
    single_coordinate_max_ms: 50
    polygon_verification_max_ms: 500
    batch_1000_max_seconds: 30
    description: "Geolocation coordinate and polygon verification"

  risk_assessment:
    single_supplier_max_seconds: 5
    batch_100_max_seconds: 60
    country_risk_lookup_max_ms: 10
    description: "Risk scoring calculation times"

  dds_generation:
    single_dds_max_seconds: 30
    batch_50_max_seconds: 300
    description: "DDS assembly and generation"

  api_latency:
    p50_ms: 100
    p95_ms: 500
    p99_ms: 2000

  availability:
    target_percent: 99.9
    description: "Target system availability"
