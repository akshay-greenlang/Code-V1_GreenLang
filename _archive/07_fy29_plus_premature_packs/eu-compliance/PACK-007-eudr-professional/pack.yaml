    - id: grievance_portal_bridge
      name: "Grievance Portal Bridge"
      description: "Anonymous grievance submission portal with case management integration"
      required: false
      professional_feature: true

    - id: portfolio_aggregator
      name: "Portfolio Aggregator"
      description: "Aggregates compliance data across multiple operators for group reporting"
      required: false
      professional_feature: true

    - id: advanced_analytics_bridge
      name: "Advanced Analytics Bridge"
      description: "Connects to business intelligence and analytics platforms for custom reporting"
      required: false
      professional_feature: true

    - id: setup_wizard_pro
      name: "Setup Wizard (Professional)"
      description: "Guided setup wizard with professional configuration options and portfolio setup"
