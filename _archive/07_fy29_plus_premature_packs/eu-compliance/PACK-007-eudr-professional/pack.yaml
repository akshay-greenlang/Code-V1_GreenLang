# -----------------------------------------------------------------------------
# Professional Pack Summary
# -----------------------------------------------------------------------------
pack_summary:
  total_agents: 60
  eudr_agents: 40
  data_agents: 10
  foundation_agents: 10
  professional_engines: 10
  professional_workflows: 10
  professional_templates: 10
  professional_integrations: 12

# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles (Professional tier)
# -----------------------------------------------------------------------------
presets:
  size_presets:
    - id: multi_commodity
      display_name: "Multi-Commodity Company"
      description: >-
        Professional deployment for companies managing 3+ EUDR commodities
        with complex supply chains (1000+ suppliers). All professional features
        enabled, portfolio management for up to 100 operators, advanced analytics.
      config_file: "config/presets/multi_commodity.yaml"

    - id: high_risk
      display_name: "High-Risk Sourcing"
      description: >-
        Optimized for companies sourcing primarily from high-risk countries.
        Enhanced satellite monitoring (6-hour intervals), scenario risk modeling,
        protected area checks, and continuous monitoring enabled.
      config_file: "config/presets/high_risk.yaml"

    - id: trading_company
      display_name: "Trading Company"
      description: >-
        Professional setup for trading companies managing large volumes across
        multiple suppliers and customers. Batch tracking, chain of custody
        verification, and multi-tier traceability enabled.
      config_file: "config/presets/trading_company.yaml"

    - id: multi_subsidiary
      display_name: "Multi-Subsidiary Group"
      description: >-
        Group-level deployment for companies with multiple subsidiaries or
        divisions. Portfolio management, shared supplier pools, cross-operator
        reporting, and cost allocation enabled.
      config_file: "config/presets/multi_subsidiary.yaml"

    - id: industry_association
      display_name: "Industry Association"
      description: >-
        Deployment for industry associations managing compliance for multiple
        member companies. Portfolio aggregation, benchmarking, best practice
        sharing, and association-level reporting.
      config_file: "config/presets/industry_association.yaml"

  sector_presets:
    - id: palm_oil_professional
      display_name: "Palm Oil (Professional)"
      description: "Professional palm oil supply chain with RSPO/ISCC verification, peatland checks, mill traceability"
      config_file: "config/sectors/palm_oil_professional.yaml"
      primary_commodities: ["oil_palm"]

    - id: timber_professional
      display_name: "Timber & Wood Products (Professional)"
      description: "Professional timber supply chain with FSC/PEFC verification, concession mapping, sawmill tracking"
      config_file: "config/sectors/timber_professional.yaml"
      primary_commodities: ["wood"]

    - id: cocoa_coffee_professional
      display_name: "Cocoa & Coffee (Professional)"
      description: "Professional cocoa/coffee with Rainforest Alliance/4C verification, cooperative mapping"
      config_file: "config/sectors/cocoa_coffee_professional.yaml"
      primary_commodities: ["cocoa", "coffee"]

    - id: soy_cattle_professional
      display_name: "Soy & Cattle (Professional)"
      description: "Professional soy/cattle with Cerrado focus, RTRS/ProTerra verification, ranch mapping"
      config_file: "config/sectors/soy_cattle_professional.yaml"
      primary_commodities: ["soya", "cattle"]

    - id: rubber_professional
      display_name: "Rubber (Professional)"
      description: "Professional rubber with Southeast Asia focus, plantation mapping, processor tracking"
      config_file: "config/sectors/rubber_professional.yaml"
      primary_commodities: ["rubber"]

    - id: multi_commodity_sector
      display_name: "Multi-Commodity (Professional)"
      description: "Professional multi-commodity setup with all 7 commodities, cross-commodity analytics"
      config_file: "config/sectors/multi_commodity.yaml"
      primary_commodities: ["cattle", "cocoa", "coffee", "oil_palm", "rubber", "soya", "wood"]

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements (Professional tier)
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"
    elasticsearch: ">=8"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "shapely>=2.0"
    - "pyproj>=3.6"
    - "geojson>=3.0"
    - "rasterio>=1.3"
    - "scipy>=1.11"
    - "scikit-learn>=1.3"

  infrastructure:
    min_cpu_cores: 16
    min_memory_gb: 64
    min_storage_gb: 500
    recommended_cpu_cores: 32
    recommended_memory_gb: 128
    recommended_storage_gb: 2000

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
      - "postgis"
    min_connections: 100
    recommended_connections: 200

# -----------------------------------------------------------------------------
# Performance Targets (Professional tier)
# -----------------------------------------------------------------------------
performance:
  data_ingestion:
    throughput_records_per_second: 10000
    max_latency_ms: 100
    description: "High-performance data ingestion for large-scale deployments"

  geolocation_verification:
    single_coordinate_max_ms: 30
    polygon_verification_max_ms: 300
    batch_10000_max_seconds: 60
    description: "Advanced geolocation with Sentinel/MODIS integration"

  risk_assessment:
    single_supplier_max_seconds: 3
    batch_1000_max_seconds: 120
    scenario_simulation_10k_max_minutes: 5
    description: "Scenario-based risk modeling with Monte Carlo simulation"

  dds_generation:
    single_dds_max_seconds: 15
    batch_100_max_seconds: 180
    description: "Optimized DDS generation with professional features"

  satellite_monitoring:
    check_interval_hours: 6
    alert_processing_max_seconds: 60
    description: "Real-time satellite monitoring with 6-hour check intervals"

  api_latency:
    p50_ms: 50
    p95_ms: 200
    p99_ms: 1000

  availability:
    target_percent: 99.95
    description: "Enterprise-grade availability with professional SLA"
