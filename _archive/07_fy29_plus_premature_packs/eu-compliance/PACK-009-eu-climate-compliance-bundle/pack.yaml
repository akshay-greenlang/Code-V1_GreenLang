# -----------------------------------------------------------------------------
# Pack Summary
# -----------------------------------------------------------------------------
pack_summary:
  constituent_packs: 4
  total_inherited_agents: 208
  agents_by_pack:
    pack_001_csrd: 51
    pack_004_cbam: 47
    pack_006_eudr: 59
    pack_008_taxonomy: 51
  deduplicated_agent_count: ~120
  deduplication_note: >-
    Many agents (MRV, DATA, FOUND) are shared across constituent packs.
    The bundle deduplicates agent instances so each agent runs once and
    distributes results to all packs that need them. Approximately 120
    unique agents after deduplication from ~208 total inherited references.
  bundle_engines: 8
  bundle_workflows: 8
  bundle_templates: 8
  bundle_integrations: 10
  total_bundle_components: 34
  total_components_with_inherited: 242

# -----------------------------------------------------------------------------
# Presets - Pre-configured deployment profiles
# -----------------------------------------------------------------------------
presets:
  bundle_presets:
    - id: enterprise_full
      display_name: "Enterprise Full"
      description: >-
        Full-featured deployment for large enterprises subject to all four EU
        regulations. All regulations enabled at maximum capability, all engines
        active, comprehensive cross-regulation analysis, consolidated reporting,
        full audit trails, and XBRL digital tagging support.
      config_file: "config/presets/enterprise_full.yaml"
      regulations_enabled: ["CSRD", "CBAM", "EUDR", "EU-TAXONOMY"]
      recommended_for:
        - "Large enterprises (250+ employees)"
        - "Listed companies on EU-regulated markets"
        - "Companies importing CBAM goods and sourcing EUDR commodities"

    - id: financial_institution
      display_name: "Financial Institution"
      description: >-
        Deployment optimized for banks, asset managers, and insurance companies.
        EU Taxonomy GAR/BTAR focus with CSRD mandatory reporting. CBAM and EUDR
        enabled for financed emissions and portfolio-level supply chain risk.
        EBA Pillar 3 ESG disclosure templates included.
      config_file: "config/presets/financial_institution.yaml"
      regulations_enabled: ["CSRD", "CBAM", "EUDR", "EU-TAXONOMY"]
      recommended_for:
        - "Credit institutions (banks)"
        - "Asset managers and fund companies"
        - "Insurance and reinsurance undertakings"

    - id: eu_importer
      display_name: "EU Importer"
      description: >-
        Deployment focused on EU importers of CBAM-covered goods and EUDR
        commodities. CBAM and EUDR as primary regulations with CSRD and EU
        Taxonomy as secondary supporting frameworks. Optimized for supply
        chain data collection, embedded emissions calculation, and due
        diligence statement generation.
      config_file: "config/presets/eu_importer.yaml"
      regulations_enabled: ["CSRD", "CBAM", "EUDR", "EU-TAXONOMY"]
      recommended_for:
        - "Importers of cement, steel, aluminium, fertilizers, electricity, hydrogen"
        - "Operators placing EUDR commodities on EU market"
        - "Trading companies with EU customs obligations"

    - id: sme_essential
      display_name: "SME Essential"
      description: >-
        Simplified deployment for SMEs with basic CSRD reporting and EU
        Taxonomy obligations. CBAM and EUDR disabled by default (enable
        individually if applicable). Reduced complexity with streamlined
        workflows, simplified assessment modes, and lower data quality
        thresholds.
      config_file: "config/presets/sme_essential.yaml"
      regulations_enabled: ["CSRD", "EU-TAXONOMY"]
      recommended_for:
        - "Listed SMEs subject to CSRD"
        - "SMEs in taxonomy-relevant sectors"
        - "SMEs preparing for voluntary CSRD adoption"

# -----------------------------------------------------------------------------
# Requirements - System and infrastructure requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=14"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"

  infrastructure:
    min_cpu_cores: 16
    min_memory_gb: 64
    min_storage_gb: 500
    recommended_cpu_cores: 32
    recommended_memory_gb: 128
    recommended_storage_gb: 1000
    description: >-
      Bundle packs require higher infrastructure specifications than
      standalone packs due to running multiple regulation packs
      simultaneously with cross-regulation analysis engines.

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 100
    recommended_connections: 200
    description: >-
      Higher connection pool requirements to support concurrent access
      from all four constituent packs plus bundle-level engines.

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  cross_regulation_analysis:
    full_analysis_max_seconds: 60
    consistency_check_max_seconds: 30
    gap_analysis_max_seconds: 45
    description: "Cross-regulation analysis across all four packs"

  data_deduplication:
    dedup_scan_max_seconds: 30
    field_comparison_max_seconds: 10
    description: "Data deduplication across regulation-specific stores"

  consolidated_reporting:
    dashboard_generation_max_seconds: 15
    executive_summary_max_seconds: 20
    full_report_max_seconds: 60
    description: "Consolidated report generation across all regulations"

  calendar_management:
    deadline_scan_max_seconds: 5
    conflict_detection_max_seconds: 10
    description: "Regulatory calendar management"

  bundle_health_check:
    full_check_max_seconds: 30
    per_pack_check_max_seconds: 10
    description: "Bundle and per-pack health verification"

  api_latency:
    p50_ms: 75
    p95_ms: 300
    p99_ms: 1500
    description: "Bundle API latency targets (higher than standalone packs)"

  availability:
    target_percent: 99.9
    description: "Standard availability target"
