    - INFRA-010  # Agent Factory

  security:
    - SEC-001    # JWT Authentication
    - SEC-002    # RBAC Authorization
    - SEC-003    # Encryption at Rest
    - SEC-005    # Centralized Audit Logging

  observability:
    - OBS-001    # Prometheus Metrics
    - OBS-002    # Grafana Dashboards
    - OBS-003    # OpenTelemetry Tracing

  mrv_agents:
    all: true  # All 30 MRV agents

  data_agents:
    all: true  # All 20 DATA agents

  pack_dependencies:
    - pack_id: "PACK-021"
      name: "Net Zero Starter Pack"
      relationship: "recommended"
      description: "Provides baseline emissions and long-term targets"
    - pack_id: "PACK-028"
      name: "Sector Pathway Pack"
      relationship: "recommended"
      description: "Provides sector pathways and abatement levers"

