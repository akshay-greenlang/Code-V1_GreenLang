# =============================================================================
# PACK-029 Interim Targets Pack - SBTi Well-Below 2C Pathway Preset
# =============================================================================
# Configuration for organizations committed to SBTi Well-Below 2C (WB2C)
# aligned interim targets. This pathway requires a minimum 30% absolute
# reduction in Scope 1+2 emissions from base year by 2030, with 90%
# reduction by 2050 for long-term net-zero.
#
# SBTi WB2C Key Requirements:
#   - Near-term (2030): >= 30% reduction Scope 1+2 (2.5%/yr linear)
#   - Near-term (2030): >= 20% reduction Scope 3 (1.8%/yr linear)
#   - Long-term (2050): >= 90% reduction all scopes from base year
#   - Same coverage thresholds as 1.5C (95%/95%/67%)
#
# Typical use cases:
#   - Organizations in hard-to-abate sectors where 1.5C is challenging
#   - Companies beginning their decarbonization journey
#   - Organizations with high Scope 3 complexity needing more time
#   - Sectors with long capital asset replacement cycles (heavy industry)
#
# Key differences from 1.5C preset:
#   - Lower near-term ambition (30% vs 42% by 2030)
#   - Lower annual reduction rate (2.5%/yr vs 4.2%/yr)
#   - Less aggressive 10-year target (50% vs 65%)
#   - More feasible for capital-intensive transitions
#   - Still requires same long-term 90% reduction by 2050
# =============================================================================

# --- Organization ---
organization_name: ""
organization_id: null

# --- Temporal Settings ---
baseline_year: 2019
current_year: 2024
reporting_year: 2024

# --- Long-Term Target ---
long_term_target_year: 2050
long_term_reduction_pct: 90.0
net_zero_year: 2050
sbti_pathway: "WB2C"

# --- 5-Year Interim Target (SBTi Near-Term) ---
interim_target_5yr:
  enabled: true
  target_year: 2030
  min_reduction_pct: 30.0
  scope_1_2_reduction_pct: 30.0
  scope_3_reduction_pct: 20.0
  label: "SBTi WB2C near-term target (2030)"

# --- 10-Year Interim Target (Mid-Term Milestone) ---
interim_target_10yr:
  enabled: true
  target_year: 2035
  min_reduction_pct: 50.0
  scope_1_2_reduction_pct: 50.0
  scope_3_reduction_pct: 35.0
  label: "Mid-term milestone (2035)"

# --- Custom Milestones ---
custom_milestones: []

# --- Pathway ---
pathway_type: "linear"
annual_reduction_rate: 2.5
s_curve_inflection_year: null
milestone_years: null
milestone_reductions_pct: null

# --- Scope Coverage ---
scope:
  scope_1_included: true
  scope_2_included: true
  scope_2_method: "market_based"
  scope_3_included: true
  scope_3_lag_years: 5
  scope_3_categories: [1, 2, 3, 4, 5, 6, 7, 11, 12]
  scope_3_significant_threshold_pct: 40.0
  scope_3_coverage_pct: 67.0
  scope_1_coverage_pct: 95.0
  scope_2_coverage_pct: 95.0

# --- Progress Monitoring ---
monitoring:
  monitoring_frequency: "quarterly"
  variance_tolerance_pct: 12.0
  performance_scoring_enabled: true
  amber_threshold_multiplier: 1.0
  red_threshold_multiplier: 2.0
  trend_detection_enabled: true
  trend_window_periods: 4
  cumulative_tracking_enabled: true
  year_on_year_comparison: true
  normalized_tracking: true

# --- Variance Analysis ---
variance:
  variance_method: "lmdi"
  decomposition_levels:
    - "scope"
    - "category"
    - "initiative"
  root_cause_classification: true
  root_cause_taxonomy: "standard"
  materiality_threshold_pct: 3.0
  historical_comparison_years: 3
  waterfall_visualization: true
  attribution_confidence_enabled: true

# --- Trend Extrapolation ---
extrapolation:
  extrapolation_method: "exponential_smoothing"
  forecast_horizon_years: 3
  confidence_interval: 0.95
  backtesting_enabled: true
  backtesting_holdout_years: 2
  ensemble_enabled: false
  scenario_adjustment_enabled: true
  min_data_points: 4
  outlier_detection: true
  outlier_z_score_threshold: 2.5

# --- Corrective Actions ---
corrective_action:
  corrective_action_trigger: "amber"
  gap_quantification_enabled: true
  initiative_optimization: true
  macc_integration: true
  macc_carbon_price_usd: 60.0
  scenario_remodeling: true
  action_plan_template: true
  escalation_enabled: true
  escalation_threshold_periods: 3
  max_corrective_actions: 15
  cost_benefit_analysis: true
  implementation_timeline: true

# --- Carbon Budget ---
carbon_budget:
  carbon_budget_enabled: true
  budget_allocation_method: "linear"
  budget_overshoot_allowed: false
  overshoot_compensation_years: 2
  cumulative_budget_tracking: true
  budget_reserve_pct: 5.0
  quarterly_budget_splits: true
  scope_level_budgets: true
  facility_level_budgets: false
  budget_unit: "tCO2e"

# --- SBTi Validation ---
sbti_validation:
  sbti_validation_enabled: true
  sbti_criteria_count: 21
  sbti_minimum_ambition_check: true
  sbti_boundary_check: true
  sbti_timeframe_check: true
  sbti_recalculation_trigger_pct: 5.0
  sbti_submission_date: null
  sbti_commitment_type: "near_term_and_net_zero"
  auto_fix_suggestions: true

# --- Reporting ---
reporting:
  reporting_frameworks:
    - "sbti"
    - "cdp"
    - "tcfd"
  reporting_frequency: "annual"
  public_disclosure_enabled: true
  assurance_level: "limited"
  sha256_provenance: true
  calculation_trace: true
  assumption_register: true
  data_lineage_enabled: true
  retention_years: 7
  executive_summary_enabled: true
  benchmark_comparison: true

# --- Alerting ---
alerting:
  email_alerts_enabled: true
  slack_alerts_enabled: false
  webhook_alerts_enabled: false
  alert_recipients: []
  slack_channel: null
  webhook_url: null
  alert_escalation_enabled: true
  escalation_recipients: []
  alert_on_green: false
  alert_on_amber: true
  alert_on_red: true
  digest_frequency: "weekly"

# --- Performance ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 3600
  max_concurrent_calcs: 4
  timeout_seconds: 300
  batch_size: 1000
  memory_limit_mb: 4096

# --- Pack Metadata ---
pack_version: "1.0.0"
