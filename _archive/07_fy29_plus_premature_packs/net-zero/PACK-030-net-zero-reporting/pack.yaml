      - id: tcfd_governance_template
        name: "TCFD Governance Pillar Template"
        file: "templates/tcfd_governance_template.py"
        lines: 400
        formats: ["pdf", "html"]
      - id: tcfd_strategy_template
        name: "TCFD Strategy Pillar Template"
        file: "templates/tcfd_strategy_template.py"
        lines: 600
        formats: ["pdf", "html"]
      - id: tcfd_risk_template
        name: "TCFD Risk Management Template"
        file: "templates/tcfd_risk_template.py"
        lines: 500
        formats: ["pdf", "html"]
      - id: tcfd_metrics_template
        name: "TCFD Metrics & Targets Template"
        file: "templates/tcfd_metrics_template.py"
        lines: 550
        formats: ["pdf", "html"]
      - id: gri_305_template
        name: "GRI 305 Disclosure Template"
        file: "templates/gri_305_template.py"
        lines: 700
        formats: ["pdf", "html", "json"]
      - id: issb_s2_template
        name: "ISSB IFRS S2 Template"
        file: "templates/issb_s2_template.py"
        lines: 650
        formats: ["pdf", "xbrl"]
      - id: sec_climate_template
        name: "SEC Climate Disclosure Template"
        file: "templates/sec_climate_template.py"
        lines: 600
        formats: ["pdf", "xbrl", "ixbrl"]
      - id: csrd_e1_template
        name: "CSRD ESRS E1 Template"
        file: "templates/csrd_e1_template.py"
        lines: 800
        formats: ["pdf", "digital_taxonomy"]
      - id: investor_dashboard_template
        name: "Investor Dashboard Template"
        file: "templates/investor_dashboard_template.py"
        lines: 500
        formats: ["html", "pdf"]
      - id: regulator_dashboard_template
        name: "Regulator Dashboard Template"
        file: "templates/regulator_dashboard_template.py"
        lines: 450
        formats: ["html", "pdf"]
      - id: customer_carbon_template
        name: "Customer Carbon Report Template"
        file: "templates/customer_carbon_template.py"
        lines: 400
        formats: ["pdf", "html"]
      - id: assurance_evidence_template
        name: "Assurance Evidence Bundle Template"
        file: "templates/assurance_evidence_template.py"
        lines: 550
        formats: ["pdf", "zip"]

  integrations:
    count: 12
    list:
      - id: pack021_integration
        name: "PACK-021 Net Zero Starter Integration"
        file: "integrations/pack021_integration.py"
        lines: 700
        description: "Pull baseline emissions, inventory data"
      - id: pack022_integration
        name: "PACK-022 Net Zero Acceleration Integration"
        file: "integrations/pack022_integration.py"
        lines: 700
        description: "Pull reduction initiatives, MACC curves"
      - id: pack028_integration
        name: "PACK-028 Sector Pathway Integration"
        file: "integrations/pack028_integration.py"
        lines: 700
        description: "Pull sector pathways, convergence data"
      - id: pack029_integration
        name: "PACK-029 Interim Targets Integration"
        file: "integrations/pack029_integration.py"
        lines: 700
        description: "Pull interim targets, progress monitoring, variance analysis"
      - id: gl_sbti_app_integration
        name: "GL-SBTi-APP Integration"
        file: "integrations/gl_sbti_app_integration.py"
        lines: 800
        description: "Pull SBTi target data, validation results"
      - id: gl_cdp_app_integration
        name: "GL-CDP-APP Integration"
        file: "integrations/gl_cdp_app_integration.py"
