# Dependencies
platform_dependencies:
  infrastructure:
    - INFRA-001  # Kubernetes/EKS
    - INFRA-002  # PostgreSQL + TimescaleDB
    - INFRA-003  # Redis
    - INFRA-004  # S3/Object Storage
    - INFRA-006  # API Gateway (Kong)
    - INFRA-010  # Agent Factory

  security:
    - SEC-001    # JWT Authentication
    - SEC-002    # RBAC Authorization
    - SEC-003    # Encryption at Rest
    - SEC-004    # TLS 1.3
    - SEC-005    # Centralized Audit Logging
    - SEC-006    # Secrets Management (Vault)

  observability:
    - OBS-001    # Prometheus Metrics
    - OBS-002    # Grafana Dashboards
    - OBS-003    # OpenTelemetry Tracing
    - OBS-004    # Alerting & Notifications

  applications:
    - GL-SBTi-APP   # SBTi target management
    - GL-CDP-APP    # CDP questionnaire management
    - GL-TCFD-APP   # TCFD scenario analysis
    - GL-GHG-APP    # GHG inventory management

  pack_dependencies:
    - pack_id: "PACK-021"
      name: "Net Zero Starter Pack"
      relationship: "required"
      description: "Provides baseline emissions and inventory data"
    - pack_id: "PACK-022"
      name: "Net Zero Acceleration Pack"
      relationship: "required"
      description: "Provides reduction initiatives and MACC curves"
    - pack_id: "PACK-028"
      name: "Sector Pathway Pack"
      relationship: "required"
      description: "Provides sector pathways and convergence data"
    - pack_id: "PACK-029"
      name: "Interim Targets Pack"
      relationship: "required"
      description: "Provides interim targets, progress monitoring, variance analysis"

# Database
database:
  migrations:
    start: "V211"
    end: "V225"
    count: 15
  tables: 15
  views: 5
  indexes: "350+"
  rls_policies: 30

# Testing
testing:
  files: 17
  tests: "2020+"
  coverage: "90%+"
  pass_rate: "100%"

# Technical specifications
technical_specs:
  language: "Python 3.11+"
  framework: "FastAPI 0.110+"
  async: true
  database: "PostgreSQL 16+ with TimescaleDB"
  caching: "Redis 7+"
  pdf_engine: "WeasyPrint 60+"
  xbrl_engine: "Custom XBRL/iXBRL generator"
  deployment: "Kubernetes 1.28+"
  supported_languages: ["en", "de", "fr", "es"]
  output_formats: ["PDF", "HTML", "Excel", "JSON", "XBRL", "iXBRL"]

