  presets:
    count: 8
    list:
      - id: csrd_focus
        name: "CSRD ESRS E1 Focus"
        file: "config/presets/csrd_focus.yaml"
      - id: cdp_alist
        name: "CDP A-List Target"
        file: "config/presets/cdp_alist.yaml"
      - id: tcfd_investor
