      - id: gl_ghg_app_integration
        name: "GL-GHG-APP Integration"
        file: "integrations/gl_ghg_app_integration.py"
        lines: 750
        description: "Pull GHG inventory, emission factors"
      - id: xbrl_taxonomy_integration
        name: "XBRL Taxonomy Integration"
        file: "integrations/xbrl_taxonomy_integration.py"
