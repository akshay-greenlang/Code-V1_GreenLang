# =============================================================================
# PACK-030 Net Zero Reporting Pack - CDP A-List Target Preset
# =============================================================================
# Configuration optimized for achieving CDP Climate Change A-list scoring.
# Prioritizes complete questionnaire coverage (C0-C12 modules), high-quality
# narrative responses, data completeness scoring, and Excel export for
# CDP online submission preparation.
#
# CDP Climate Change Questionnaire Modules:
#   - C0: Introduction (organization profile, reporting boundary)
#   - C1: Governance (board oversight, management responsibility)
#   - C2: Risks and opportunities (identification, assessment)
#   - C3: Business strategy (scenario analysis, financial planning)
#   - C4: Targets and performance (emissions targets, progress)
#   - C5: Emissions methodology (reporting boundary, methodology)
#   - C6: Emissions data (Scope 1 & 2 emissions)
#   - C7: Emissions breakdown (Scope 3 emissions by category)
#   - C8: Energy (energy consumption and mix)
#   - C9: Additional metrics (product emissions, low-carbon products)
#   - C10: Verification (third-party verification details)
#   - C11: Carbon pricing (internal carbon pricing, carbon credits)
#   - C12: Engagement (value chain engagement, policy engagement)
#
# CDP A-List Scoring Criteria:
#   - Completeness: 100% of required questions answered
#   - Quality: High-quality narrative responses with evidence
#   - Ambition: Science-based targets with progress
#   - Governance: Board-level oversight demonstrated
#   - Transparency: Full Scope 3 disclosure
#
# Typical use cases:
#   - Companies targeting CDP A-list or Leadership band
#   - Organizations responding to investor CDP requests
#   - Companies with SBTi targets reporting annual progress via CDP
#   - Enterprises benchmarking against CDP peer scores
#
# Key characteristics:
#   - CDP as primary framework with TCFD and GRI as secondary
#   - 100% completeness target for all required questions
#   - High-quality narrative generation for text responses
#   - Excel output for CDP online submission preparation
#   - Full Scope 3 category-level disclosure (Cat 1-15)
#   - Historical CDP score tracking for improvement
# =============================================================================

# --- Organization ---
organization_name: ""
organization_id: null

# --- Temporal Settings ---
reporting_year: 2025
baseline_year: 2019
fiscal_year_end_month: 12

# --- Framework Configuration ---
frameworks:
  frameworks_enabled:
    - "CDP"
    - "TCFD"
    - "GRI"
    - "SBTi"
  primary_framework: "CDP"
  secondary_frameworks:
    - "TCFD"
    - "GRI"
    - "SBTi"
  framework_outputs:
    - format: "Excel"
      template: "cdp_questionnaire"
      enabled: true
    - format: "PDF"
      template: "cdp_summary_report"
      enabled: true
    - format: "HTML"
      template: "cdp_dashboard"
      enabled: true

# --- Output Settings ---
output_formats:
  - "Excel"
  - "PDF"
  - "HTML"
  - "JSON"
languages:
  - "en"

# --- Branding ---
branding:
  style: "corporate"
  logo_path: null
  primary_color: "#1E3A8A"
  secondary_color: "#3B82F6"
  font_family: "Arial, Helvetica, sans-serif"
  include_charts: true
  include_toc: true
  include_page_numbers: true
  include_headers_footers: true
  custom_css: null

# --- Data Aggregation ---
data_aggregation:
  pack_021_requirement: "required"
  pack_022_requirement: "required"
  pack_028_requirement: "recommended"
  pack_029_requirement: "required"
  gl_sbti_app_requirement: "required"
  gl_cdp_app_requirement: "required"
  gl_tcfd_app_requirement: "recommended"
  gl_ghg_app_requirement: "required"
  auto_reconciliation: true
  reconciliation_tolerance_pct: 0.5
  gap_detection_enabled: true
  lineage_tracking_enabled: true
  lineage_diagram_format: "svg"
  completeness_scoring: true
  parallel_fetching: true
  fetch_timeout_seconds: 30
  retry_count: 3
  circuit_breaker_threshold: 5

# --- Narrative Generation ---
narrative:
  narrative_quality: "premium"
  citation_management_enabled: true
  citation_format: "inline"
  hyperlinked_citations: true
  consistency_validation_enabled: true
  consistency_target_pct: 97.0
  harmonization_suggestions: true
  human_review_required: true
  review_workflow_enabled: true
  max_narrative_length_words: 8000

# --- Translation ---
translation:
  languages:
    - "en"
  primary_language: "en"
  translation_service: "native"
  climate_glossary_enabled: true
  preserve_citations: true
  quality_validation_enabled: false
  quality_target_pct: 98.0

# --- XBRL/iXBRL ---
xbrl:
  xbrl_enabled: false
  sec_taxonomy_version: "2024"
  csrd_taxonomy_version: "2024"
  issb_taxonomy_version: "2024"
  taxonomy_validation_enabled: false
  ixbrl_enabled: false
  taxonomy_cache_enabled: false
  taxonomy_cache_ttl_hours: 168
  auto_tag_detection: false

# --- Assurance ---
assurance:
  assurance_level: "limited"
  include_evidence_bundle: true
  include_provenance: true
  include_lineage_diagrams: true
  include_methodology_docs: true
  include_control_matrix: false
  include_assumption_register: true
  include_change_log: true
  evidence_bundle_format: "zip"
  isae_3410_compliance: true
  isae_3000_compliance: false

# --- Dashboard ---
dashboard:
  executive_dashboard_enabled: true
  framework_dashboards_enabled: true
  stakeholder_views_enabled: true
  default_stakeholder_view: "board"
  framework_coverage_heatmap: true
  deadline_countdown: true
  drill_down_enabled: true
  interactive_charts: true
  responsive_design: true
  export_to_pdf: true
  auto_refresh_interval_seconds: 0

# --- Validation ---
validation:
  schema_validation_enabled: true
  completeness_validation_enabled: true
  consistency_validation_enabled: true
  consistency_strictness: "strict"
  quality_scoring_enabled: true
  minimum_quality_score: 90.0
  metric_reconciliation: true
  metric_tolerance_pct: 0.1
  narrative_spell_check: true
  narrative_grammar_check: true
  block_publish_on_critical: true

# --- Notifications ---
notifications:
  email_notifications_enabled: true
  slack_notifications_enabled: false
  teams_notifications_enabled: false
  webhook_notifications_enabled: false
  notification_recipients: []
  slack_channel: null
  webhook_url: null
  deadline_reminders:
    - 120
    - 90
    - 60
    - 30
    - 14
    - 7
  notify_on_generation: true
  notify_on_validation_failure: true
  notify_on_approval: true

# --- Performance ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 3600
  cache_hit_ratio_target: 95.0
  max_concurrent_reports: 8
  report_generation_timeout_seconds: 10
  api_response_timeout_ms: 200
  pdf_render_timeout_seconds: 5
  parallel_framework_execution: true
  batch_size: 1000
  memory_limit_mb: 4096

# --- Pack Metadata ---
pack_version: "1.0.0"
