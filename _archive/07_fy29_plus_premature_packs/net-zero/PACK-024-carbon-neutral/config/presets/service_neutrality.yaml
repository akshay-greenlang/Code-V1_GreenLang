# =============================================================================
# PACK-024 Carbon Neutral Pack - Service Neutrality Preset
# =============================================================================
# Service-based carbon neutrality for professional services, consulting,
# IT services, financial services, and other service-oriented businesses
# where direct emissions are minimal and value chain emissions dominate.
# Covers office operations, business travel, employee commuting, cloud
# infrastructure, and client delivery. Aligned with PAS 2060:2014 and
# ISO 14068-1:2023 for service carbon neutrality claims.
#
# Typical use cases:
#   - Management consulting firms
#   - IT services and software companies
#   - Legal and accounting firms
#   - Advertising and marketing agencies
#   - Insurance and financial advisory firms
#   - Co-working and shared office providers
# =============================================================================

# --- Identity ---
organization_name: ""
neutrality_type: "SERVICE"
boundary_scope: "SERVICE_OPERATIONS"
region: "EU"
country: ""

# --- Temporal ---
reporting_year: 2025
base_year: 2024
pack_version: "1.0.0"
service_type: "professional_services"

# --- Scope Configuration ---
scope_boundaries:
  scope1:
    included: true
    coverage_pct: 100.0
    consolidation: "operational_control"
    sources:
      - "office_heating_gas"
      - "company_vehicles"
      - "refrigerant_leakage"
  scope2:
    included: true
    coverage_pct: 100.0
    methods:
      - "location_based"
      - "market_based"
    preferred_method: "market_based"
    sources:
      - "office_electricity"
      - "data_center_electricity"
      - "office_cooling"
  scope3:
    included: true
    coverage_pct: 67.0
    categories: [1, 2, 3, 5, 6, 7, 8, 11]
    materiality_threshold_pct: 1.0
    de_minimis_pct: 5.0
    service_specific_sources:
      - "cloud_infrastructure"
      - "business_travel"
      - "employee_commuting"
      - "remote_working"
      - "office_supplies"
      - "client_site_operations"
      - "digital_services_delivery"

# --- Engines Configuration ---
engines:
  footprint_quantification:
    enabled: true
    consolidation_approach: "operational_control"
    include_biogenic_co2: false
    uncertainty_assessment: true
    data_quality_scoring: true
    gwp_source: "IPCC_AR6"
    gwp_timeframe: 100
    materiality_threshold_pct: 1.0
    service_specific:
      fte_normalization: true
      revenue_normalization: true
      remote_work_accounting: true
      cloud_emissions_tracking: true
  carbon_management_plan:
    enabled: true
    planning_horizon_years: 3
    reduction_first_strategy: true
    min_reduction_before_offset_pct: 40.0
    internal_carbon_price_eur: 80.0
    max_offset_reliance_pct: 60.0
    annual_reduction_target_pct: 5.0
    service_interventions:
      - "green_office_electricity"
      - "travel_policy_reduction"
      - "remote_work_optimization"
      - "cloud_green_regions"
      - "electric_fleet"
      - "sustainable_procurement"
  credit_quality:
    enabled: true
    min_quality_score: 60
    icvcm_ccp_compliance: false
    preferred_standards:
      - "gold_standard"
      - "verra_vcs"
    min_additionality_score: 6
    min_permanence_score: 6
    require_sdg_contribution: true
  portfolio_optimization:
    enabled: true
    max_nature_based_pct: 50.0
    max_avoidance_pct: 60.0
    min_removal_pct: 15.0
    diversification_min_types: 2
    vintage_max_age_years: 5
    geographic_diversification: false
    budget_constraint_enabled: true
  registry_retirement:
    enabled: true
    auto_retirement: false
    retirement_timing: "within_reporting_period"
    supported_registries:
      - "gold_standard"
      - "verra"
    serial_number_tracking: true
    double_counting_prevention: true
  neutralization_balance:
    enabled: true
    balance_method: "annual"
    allow_forward_credits: false
    buffer_pool_pct: 5.0
    shortfall_action: "purchase_additional"
    surplus_carryover: false
    verification_frequency: "annual"
  claims_substantiation:
    enabled: true
    claim_type: "carbon_neutral_service"
    standard: "ISO_14068_1"
    pas2060_compliance: true
    vcmi_claims_code: false
    public_disclosure_required: true
    third_party_verification: true
    claim_period: "annual"
  verification_package:
    enabled: true
    assurance_level: "limited"
    standard: "ISAE_3410"
    third_party_verifier: true
    evidence_completeness_target_pct: 90.0
    documentation_format: "PDF"
  annual_cycle:
    enabled: true
    cycle_start_month: 1
    cycle_end_month: 12
    milestone_frequency: "quarterly"
    progress_reporting: true
    recertification_reminder_days: 90
    continuous_improvement_tracking: true
  permanence_risk:
    enabled: true
    risk_assessment_frequency: "annual"
    buffer_contribution_pct: 10.0
    reversal_monitoring: false
    replacement_trigger_threshold_pct: 10.0

# --- Service-Specific Parameters ---
service_parameters:
  employee_count: 500
  office_area_sqm: 3000
  average_fte_travel_km_per_year: 15000
  travel_modal_split:
    air: 0.50
    rail: 0.25
    car: 0.20
    other: 0.05
  remote_work_pct: 40.0
  cloud_provider: "azure"
  data_center_pue: 1.2
  billable_hours_per_fte: 1600

# --- Climate Finance ---
finance:
  enabled: true
  carbon_price_eur_per_tco2e: 80.0
  reporting_currency: "EUR"
  credit_budget_annual_eur: 75000.0
  credit_price_range:
    min_eur: 10.0
    max_eur: 80.0
    avg_eur: 25.0

# --- Data Quality ---
data_quality:
  target_dqis_score: 2.5
  acceptable_data_sources:
    - "primary_measured"
    - "expense_data"
    - "travel_booking_data"
    - "default_factors"
  emission_factor_source: "DEFRA_2024"

# --- Assurance ---
assurance:
  enabled: true
  assurance_level: "LIMITED"
  target_assurance_level: "REASONABLE"
  progression_year: 2027
  workpaper_format: "ISAE_3410"
  methodology_documentation: true
  sha256_provenance: true
  retention_years: 7

# --- Multi-Entity ---
multi_entity:
  enabled: true
  max_entities: 20
  consolidation_method: "OPERATIONAL_CONTROL"

# --- Reporting ---
reporting:
  formats:
    - "PDF"
    - "HTML"
    - "JSON"
  include_iso14068_mapping: true
  include_pas2060_mapping: true
  include_ghg_protocol_mapping: true
  language: "en"
  watermark_draft: true

# --- Performance ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 3600
  max_concurrent_calcs: 4
  timeout_seconds: 300
  batch_size: 500
  memory_limit_mb: 2048
