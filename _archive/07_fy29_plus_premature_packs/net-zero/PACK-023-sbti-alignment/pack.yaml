        for corporate science-based target setting, covering organization
        boundary and scope coverage, base year and emissions inventory,
        target ambition and pathway (ACA at 4.2%/yr for 1.5C, SDA for 12
        sectors), Scope 2 methodology, Scope 3 materiality and targets,
        target timeframe and review, and reporting and disclosure
        requirements.
