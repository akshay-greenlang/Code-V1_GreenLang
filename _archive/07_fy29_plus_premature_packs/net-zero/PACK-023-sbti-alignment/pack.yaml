# -----------------------------------------------------------------------------
# Agent Dependencies Summary
# -----------------------------------------------------------------------------
dependencies:
  total_agents: 85
  breakdown:
    mrv_agents: 30
    data_agents: 20
    foundation_agents: 10
    decarb_agents: 21
    sbti_app_engines: 14
  bridged_apps: 4
  bridged_packs: 2
  python_min_version: "3.11"
  platform_min_version: "2.0.0"

# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  target_setting:
    target_duration_minutes: 5
    max_targets: 20
  criteria_validation:
    criteria_count: 42
    target_duration_minutes: 5
    per_criterion_ms: 200
  scope3_screening:
    categories_count: 15
    target_duration_minutes: 3
    per_category_ms: 500
  sda_sector:
    supported_sectors: 12
    target_duration_minutes: 2
    per_sector_ms: 500
  flag_assessment:
    commodities_count: 11
    target_duration_minutes: 2
    per_commodity_ms: 500
  temperature_rating:
    max_entities: 500
    single_entity_seconds: 30
    portfolio_50_entities_minutes: 5
    aggregation_methods: 6
  progress_tracking:
    target_duration_minutes: 5
    max_targets_tracked: 50
  recalculation:
    target_duration_minutes: 10
    max_trigger_types: 6
  fi_portfolio:
    max_entities: 500
    asset_classes: 8
    target_duration_minutes: 10
  submission_readiness:
    target_duration_minutes: 15
    readiness_dimensions: 5
  full_lifecycle_workflow:
    target_duration_minutes: 120
  cache_hit_ratio_target: 0.75
  memory_ceiling_mb: 4096

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  authentication: "JWT (RS256)"
  authorization: "RBAC with facility-level and target-level access control"
  encryption_at_rest: "AES-256-GCM"
  encryption_in_transit: "TLS 1.3"
  audit_logging: true
  pii_redaction: true
  data_classification:
    - CONFIDENTIAL
    - RESTRICTED
    - INTERNAL
    - PUBLIC
  required_roles:
    - sbti_admin
    - sustainability_manager
    - climate_analyst
    - fi_portfolio_manager
    - external_auditor
    - viewer

# -----------------------------------------------------------------------------
# Requirements
# -----------------------------------------------------------------------------
requirements:
  runtime:
    python: ">=3.11"
    postgresql: ">=16"
    redis: ">=7"

  python_packages:
    - "pydantic>=2.0"
    - "pyyaml>=6.0"
    - "pandas>=2.0"
    - "numpy>=1.24"
    - "httpx>=0.24"
    - "psycopg[binary]>=3.1"
    - "psycopg_pool>=3.1"
    - "redis>=5.0"
    - "jinja2>=3.1"
    - "openpyxl>=3.1"
    - "cryptography>=41.0"

  infrastructure:
    min_cpu_cores: 4
    min_memory_gb: 8
    min_storage_gb: 50
    recommended_cpu_cores: 8
    recommended_memory_gb: 16
    recommended_storage_gb: 200

  database:
    extensions:
      - "pgvector"
      - "timescaledb"
    min_connections: 20
    recommended_connections: 60

# -----------------------------------------------------------------------------
# Installation Configuration
# -----------------------------------------------------------------------------
installation:
  pre_checks:
    - verify_python_version
    - verify_postgresql_connection
    - verify_redis_connection
    - verify_disk_space
    - verify_network_access
    - verify_emission_factor_database
    - verify_sbti_criteria_definitions
    - verify_sbti_sda_sector_benchmarks
    - verify_sbti_flag_commodity_data
    - verify_sbti_temperature_coefficients
    - verify_ipcc_gwp_values
    - verify_pcaf_scoring_criteria

  database_migrations:
    inherited:
      - "V001-V006"
      - "V007-V008"
      - "V009-V010"
      - "V019-V020"
      - "V021-V030"
      - "V031-V050"
      - "V051-V081"
      - "V082-V088"
    new:
      - "V083-PACK023-001"  # SBTi target definitions and pathways
      - "V083-PACK023-002"  # 42-criterion validation results
      - "V083-PACK023-003"  # Scope 3 screening and coverage tracking
      - "V083-PACK023-004"  # SDA sector convergence pathway records
      - "V083-PACK023-005"  # FLAG assessment and commodity records
      - "V083-PACK023-006"  # Temperature rating results and portfolio scores
      - "V083-PACK023-007"  # Progress tracking and recalculation records
      - "V083-PACK023-008"  # FI portfolio targets and PCAF scores
      - "V083-PACK023-009"  # Submission readiness assessment records

  post_install:
    - seed_ipcc_ar6_gwp_values
    - seed_emission_factor_databases
    - seed_sbti_criteria_definitions
    - seed_sbti_sda_sector_benchmarks
    - seed_sbti_flag_commodity_pathways
    - seed_sbti_temperature_coefficients
    - seed_sbti_finz_asset_class_config
    - seed_pcaf_scoring_criteria
    - seed_grid_emission_factors
    - seed_default_presets
    - run_health_checks
