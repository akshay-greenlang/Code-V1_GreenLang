# -----------------------------------------------------------------------------
# Primary Regulatory Framework
# -----------------------------------------------------------------------------
primary_framework:
  standard: SME Climate Hub
  version: "2023"
  issuing_body: UNFCCC Climate Champions
  effective_date: "2021-01-01"
  description: >-
    UN-backed global initiative enabling SMEs to pledge net zero by 2050,
    with simplified requirements compared to SBTi corporate route. Requires
    baseline, interim 2030 target, and annual progress reporting. Over 10,000
    SMEs committed globally as of 2023.

# -----------------------------------------------------------------------------
# Components
# -----------------------------------------------------------------------------
components:
  engines:
    count: 8
    description: >-
      SME-optimized calculation engines with minimal data requirements.
      All engines support three data quality tiers (Bronze: industry averages
      15min/±40%, Silver: basic activity data 1hr/±15%, Gold: detailed bills
      2-3hr/±5%). Focus on practical actions with <3 year payback and grant
      funding opportunities.

    items:
      - id: sme_baseline_engine
        name: SME Baseline Calculator
        description: >-
          Simplified GHG baseline using three-tier approach. Bronze tier uses
          industry averages by NACE code + company size (15 minutes, ±40%
          accuracy). Silver tier uses basic activity data from utility bills
          and spend (1 hour, ±15% accuracy). Gold tier uses detailed bills
          and employee questionnaires (2-3 hours, ±5% accuracy). Spend-based
          Scope 3 using DEFRA/EPA EEIO factors. No process emissions or
          advanced fugitive calculations (98% of SMEs don't need these).
        performance_target: "<2 seconds for Bronze, <10 seconds for Silver, <30 seconds for Gold"

      - id: simplified_target_engine
        name: Simplified Target Calculator
        description: >-
          Pre-configured 1.5°C pathway with ACA methodology only (no SDA
          sector-specific pathways). Hard-coded targets: 50% reduction by 2030,
          90% by 2050. Scope coverage: 95% S1+2, 67% S3 (simplified to
          categories 1, 6, 7 only). No pathway selection dialog - auto-generates
          compliant targets based on baseline.
        performance_target: "<5 seconds for target generation"

      - id: quick_wins_engine
        name: Quick Wins Identifier
        description: >-
          Identifies high-impact, low-cost actions from database of 50+ SME
          quick wins. Each action includes: emissions reduction (tCO2e/%), cost,
          annual savings, payback period, difficulty level (1-5), sector
          applicability, prerequisites, grant eligibility. Ranking algorithm:
          (CO2 reduction / cost) × urgency_factor. Filters by sector, size,
          budget. Outputs top 5-10 actions with implementation timeline.
        performance_target: "<10 seconds for ranking 50+ actions"

      - id: scope3_estimator_engine
        name: Scope 3 Estimator (Spend-Based)
        description: >-
          Spend-based Scope 3 calculation using DEFRA/EPA EEIO factors.
          Simplified to 3 primary categories: Cat 1 (Purchased Goods), Cat 6
          (Business Travel), Cat 7 (Employee Commuting). Optional: Cat 2
          (Capital Goods), Cat 3 (Fuel & Energy), Cat 4 (Upstream Transport).
          Integrates with accounting software (Xero/QuickBooks/Sage) to
          auto-import spend by GL code. Provides data quality score.
        performance_target: "<15 seconds for 3-category estimate"

      - id: action_prioritization_engine
        name: Action Prioritization (MACC Lite)
        description: >-
          Simplified Marginal Abatement Cost Curve (MACC) analysis. Ranks up
          to 10 actions by: NPV (5-year horizon), IRR (target >15%), payback
          period (target <3 years), emissions reduction (tCO2e), ease of
          implementation (1-5 scale). Cost-benefit analysis with ±20%
          sensitivity. No Monte Carlo scenarios. Outputs phased roadmap
          (Year 1/2/3).
        performance_target: "<20 seconds for 10-action ranking"

      - id: cost_benefit_engine
        name: Cost-Benefit Analyzer
        description: >-
          Financial metrics for each action: upfront CAPEX, annual OPEX
          savings, carbon savings, NPV (5-10 year, 5-10% discount rate), IRR,
          simple and discounted payback period. Adjusts for grants/incentives
          (reduces net cost). Risk scenarios (conservative/optimistic ±20%).
          Generates cost-benefit tables and charts.
        performance_target: "<10 seconds per action"

      - id: grant_finder_engine
        name: Grant & Incentive Finder
        description: >-
          Matches SME profile to 50+ available grants/subsidies/tax incentives.
          Database includes UK (ITRPF, ESOS, Green Finance Institute, Salix),
          EU (Cohesion Fund, Just Transition, LIFE Programme), US (DOE, EPA,
          state programs). Matching by: industry code (NACE/NAICS), company
          size (micro/small/medium), emissions profile (S1/S2/S3 breakdown),
          location (country, region, postcode), project type (energy efficiency,
          renewable, EV fleet). Eligibility scoring (0-100). Outputs top 3-5
          grants with deadlines and requirements.
        performance_target: "<15 seconds for database query + ranking"

      - id: certification_readiness_engine
        name: Certification Readiness Assessor
        description: >-
          Assesses readiness for SME certifications: SME Climate Hub (easiest),
          B Corp Climate Collective, ISO 14001, Carbon Trust Standard, Climate
          Active (Australia), CDP Supply Chain. Five dimensions: baseline data
          quality, target ambition, action plan completeness, governance
          structure, disclosure/reporting. Gap analysis with remediation plan.
          Readiness score (0-100), recommended pathway, timeline to certification.
        performance_target: "<10 seconds for assessment"

  workflows:
    count: 6
    description: >-
      Streamlined workflows optimized for SME time and resource constraints.
      Express onboarding completes in <15 minutes, quarterly reviews in <30
      minutes. All workflows designed for part-time sustainability managers
      with minimal technical expertise.

    items:
      - id: express_onboarding_workflow
        name: Express Onboarding (15 minutes)
        phases: 4
        description: >-
          4-phase rapid setup: (1) Organization profile (5 min), (2) Bronze
          baseline using industry averages (5 min), (3) Auto-generate 1.5°C
          targets (instant), (4) Identify top 5 quick wins (5 min). Total time:
          15-20 minutes. Uses sme_baseline_engine (Bronze mode),
          simplified_target_engine, quick_wins_engine.

      - id: standard_setup_workflow
        name: Standard Setup (1-2 hours)
        phases: 6
        description: >-
          6-phase comprehensive setup: (1) Organization profile, (2) Guided
          data collection (electricity bills, fuel, travel spend), (3) Silver
          baseline (±15% accuracy), (4) Target validation, (5) Action
          prioritization (MACC lite, top 10 actions), (6) Grant matching.
          Total time: 1-2 hours. Uses all 8 engines.

      - id: grant_application_workflow
        name: Grant Application Assistant
        phases: 5
        description: >-
          5-phase grant application support: (1) Grant search by sector/size/
          location, (2) Eligibility check, (3) Data preparation (baseline,
          targets, project description), (4) Generate pre-filled application
          templates, (5) Export to PDF for manual submission. Uses
          grant_finder_engine, certification_readiness_engine.

      - id: quarterly_review_workflow
        name: Quarterly Progress Review
        phases: 3
        description: >-
          3-phase rapid progress tracking: (1) Update energy/travel/procurement
          spend (5-10 min), (2) Calculate progress vs. target pathway, (3)
          Generate dashboard + board brief. Total time: 15-30 minutes. Uses
          sme_baseline_engine, cost_benefit_engine.

      - id: quick_wins_implementation_workflow
        name: Quick Wins Implementation
        phases: 5
        description: >-
          5-phase action implementation: (1) Select 3-5 quick wins, (2)
          Research vendors/suppliers, (3) Detailed cost-benefit for selected
          actions, (4) Implementation timeline + project plan, (5) Post-
          implementation verification (savings achieved?). Uses
          quick_wins_engine, action_prioritization_engine, cost_benefit_engine.

      - id: certification_pathway_workflow
        name: Certification Pathway
        phases: 6
        description: >-
          6-phase certification journey: (1) Select certification (SME Climate
          Hub, B Corp, ISO 14001, Carbon Trust), (2) Readiness assessment, (3)
          Gap closure (data quality, governance, targets), (4) Prepare
          submission documents, (5) Submit to certification body, (6) Await
          verification result. Uses certification_readiness_engine,
          simplified_target_engine.

  templates:
    count: 8
    description: >-
      SME-friendly report templates (1-2 pages, visual focus, mobile-optimized).
      All templates support Markdown, HTML, JSON, and Excel outputs. Emphasis
      on actionable insights and clear next steps for busy SME managers.

    items:
      - id: sme_baseline_report
        formats: ["markdown", "html", "json", "excel"]
        description: >-
          1-2 page visual dashboard with executive summary, scope breakdown
          (bar charts), industry peer comparison (percentile), data quality
          score, top 3 emission sources, simple next steps.

      - id: sme_quick_wins_report
        formats: ["markdown", "html", "json", "excel"]
        description: >-
          Top 5-10 quick wins ranked by ROI. Each action shows emissions
          reduction, cost, savings, payback, difficulty. Includes 6-24 month
          timeline (Gantt chart) and 5-year total ROI.

      - id: sme_grant_report
        formats: ["markdown", "html", "json", "excel"]
        description: >-
          Matched grants summary (top 3-5) with funding range, eligibility
          score, deadline, requirements checklist, supporting docs needed,
          application timeline. Pre-filled data fields.

      - id: sme_board_brief
        formats: ["markdown", "html", "json"]
        description: >-
          1-page executive summary for board/leadership: current emissions,
          targets, top 3 quick wins with ROI, grant opportunities, investment
          required, risk/opportunity summary, recommended decision.

      - id: sme_roadmap_report
        formats: ["markdown", "html", "json", "excel"]
        description: >-
          3-year decarbonization roadmap with annual actions, emissions
          trajectory, investment + savings, milestones + KPIs, MACC curve,
          budget allocation table.

      - id: sme_progress_dashboard
        formats: ["markdown", "html", "json"]
        description: >-
          Annual KPI tracking dashboard with year-over-year comparison,
          progress bars (2030/2050 targets), scope trends (3 years), quick
          wins status, grants received, cost savings realized, next quarter
          actions.

      - id: sme_certification_submission
        formats: ["markdown", "html", "json", "excel"]
        description: >-
          Certification-specific formats (SME Climate Hub, B Corp, ISO 14001,
          Carbon Trust) with pre-filled fields, supporting evidence links,
          submission checklist.

      - id: sme_accounting_guide
        formats: ["markdown", "html", "json"]
        description: >-
          Step-by-step accounting software setup (Xero/QuickBooks/Sage) with
          GL code mapping, spend categorization, carbon cost allocation, tax
          deduction guidance.

  integrations:
    count: 13
    description: >-
      SME-focused integrations emphasizing automation and cost-effectiveness.
      Includes accounting software connectors (Xero, QuickBooks, Sage), grant
      database sync, certification body APIs, and peer benchmarking network.

    items:
      - id: pack_orchestrator
        description: 6-phase DAG pipeline for SME workflows

      - id: mrv_bridge
        description: >-
          Simplified MRV agent integration (subset of 30 agents). Only
          activated: stationary combustion, mobile, electricity, natural gas,
          business travel, employee commuting. Spend-based Scope 3.

      - id: data_bridge
        description: >-
          Integration with DATA agents for spend categorization, auto-mapping,
          data quality profiling, missing value handling with industry defaults.

      - id: xero_connector
        description: >-
          Xero API integration (OAuth2) with chart of accounts retrieval,
          transaction export by GL code, spend categorization mapping,
          monthly/annual aggregation, rate limiting (5 req/sec).

      - id: quickbooks_connector
        description: >-
          QuickBooks Online API integration (OAuth2) with chart of accounts,
          P&L report export, spend category mapping, monthly/annual aggregation,
          rate limiting.

      - id: sage_connector
        description: >-
          Sage Business Cloud API integration with nominal ledger export, spend
          categorization, multi-currency support, rate limiting.

      - id: grant_database_bridge
        description: >-
          Integration with UK/EU/US public grant databases (BEIS, Green Finance
          Institute, Horizon Europe, LIFE, Cohesion Fund, DOE, EPA). Scheduled
          monthly sync. Grant matching algorithm, deadline tracking.

      - id: sme_climate_hub_bridge
        description: >-
          UN SME Climate Hub API integration for commitment submission, annual
          progress reporting, verification status retrieval, badge/certification
          download.

      - id: certification_body_bridge
        description: >-
          Multi-certification integration (B Corp API, Carbon Trust, ISO 14001,
          Climate Active). Submission status tracking, document upload.

      - id: peer_network_bridge
        description: >-
          Anonymous peer benchmarking with aggregated industry stats by sector
          + size + geography. Privacy-preserving, percentile ranking.

      - id: renewable_ppa_marketplace
        description: >-
          Integration with renewable PPA aggregators (Arcano, Enel, NextEnergy)
          to query available contracts by location/consumption/duration,
          estimate cost savings.

      - id: setup_wizard
        description: >-
          Interactive 5-step configuration wizard: organization profile, data
          tier selection, accounting software connection, grant preferences,
          certification pathway.

      - id: health_check
        description: >-
          System health monitoring: database connectivity, agent availability
          (SME subset), accounting API status, grant database currency,
          performance metrics.

  presets:
    count: 6
    description: >-
      SME-specific configuration presets covering different size tiers and
      sectors. Each preset optimized for data availability, budget constraints,
      and certification pathways appropriate to SME type.

    items:
      - id: micro_business
        name: Micro Business (1-9 employees)
        target_audience: "Micro enterprises, freelancers, solopreneurs"
        description: >-
          Bronze tier (industry averages only), S1+2 estimate, S3 optional,
          30% reduction by 2030, top 3 quick wins, <€5,000 budget, micro-grants
          focus, SME Climate Hub certification, self-declaration verification.

      - id: small_business
        name: Small Business (10-49 employees)
        target_audience: "Small enterprises, local businesses"
        description: >-
          Silver tier (basic activity data), S1+2 measured, S3 spend-based
          (Cat 1/6/7), 42% by 2030 (SBTi SME minimum), top 5-7 quick wins,
          €5K-€20K budget, national grants, SME Climate Hub + B Corp, third-
          party light verification.

      - id: medium_business
        name: Medium Business (50-249 employees)
        target_audience: "Medium enterprises, growth companies"
        description: >-
          Gold tier (detailed bills + questionnaires), S1+2 measured, S3
          detailed (Cat 1-7), 50% by 2030 (full 1.5°C), top 10 actions (MACC),
          €20K-€100K budget, EU/national strategic programs, ISO 14001 +
          Carbon Trust, third-party full audit.

      - id: service_sme
        name: Service Sector SME
        target_audience: "Tech, consulting, professional services SMEs"
        description: >-
          Scope focus: S2 (electricity) + S3 dominant (Cat 1/6/7). Emissions
          profile: 15% S1+2, 85% S3. Quick wins: renewable PPA, remote work,
          supplier engagement. Grant eligibility: energy efficiency, innovation.
          B Corp Climate Collective certification.

      - id: manufacturing_sme
        name: Manufacturing SME
        target_audience: "Small manufacturing, production companies"
        description: >-
          Scope focus: S1 (fuel) + S2 (electricity) significant. Emissions
          profile: 40% S1, 35% S2, 25% S3. Quick wins: process efficiency,
          HVAC, renewable energy. Grant eligibility: industrial decarbonization,
          technology. ISO 14001 + Carbon Trust certification.

      - id: retail_sme
        name: Retail SME
        target_audience: "Retail shops, small chains"
        description: >-
          Scope focus: S2 (store electricity) + S3 (Cat 1/4/9 packaging).
          Emissions profile: 20% S1+2, 80% S3. Quick wins: LED lighting,
          refrigeration, packaging reduction. Grant eligibility: retail energy,
          circular economy. SME Climate Hub + Carbon Trust certification.

