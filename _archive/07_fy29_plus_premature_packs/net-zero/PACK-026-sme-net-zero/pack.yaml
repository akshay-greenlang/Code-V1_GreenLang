    description: Subset of 30 MRV agents relevant to SMEs
    items:
      - AGENT-MRV-001  # Stationary Combustion
      - AGENT-MRV-003  # Mobile Combustion
      - AGENT-MRV-009  # Scope 2 Location-Based
      - AGENT-MRV-014  # Purchased Goods & Services (spend-based)
      - AGENT-MRV-019  # Business Travel
      - AGENT-MRV-020  # Employee Commuting
      - AGENT-MRV-021  # Upstream Leased Assets (if applicable)
      - AGENT-MRV-026  # Downstream Leased Assets (if applicable)

  data_agents:
    count: 10
    description: Subset of 20 DATA agents for SME data quality
    items:
      - AGENT-DATA-002  # Excel/CSV Normalizer
      - AGENT-DATA-009  # Spend Data Categorizer
      - AGENT-DATA-010  # Data Quality Profiler
      - AGENT-DATA-011  # Duplicate Detection
      - AGENT-DATA-012  # Missing Value Imputer
      - AGENT-DATA-013  # Outlier Detection
      - AGENT-DATA-019  # Validation Rule Engine

  foundation_agents:
    count: 5
    description: Core foundation agents (simplified)
    items:
      - AGENT-FOUND-003  # Unit & Reference Normalizer
      - AGENT-FOUND-005  # Citations & Evidence
      - AGENT-FOUND-008  # Reproducibility
      - AGENT-FOUND-009  # QA Test Harness
      - AGENT-FOUND-010  # Observability & Telemetry

  bridged_apps:
