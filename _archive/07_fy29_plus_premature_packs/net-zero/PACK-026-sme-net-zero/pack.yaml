# =============================================================================
# PACK-026: SME Net Zero Pack
# GreenLang SME-Optimized Net Zero Solution for Small and Medium Enterprises
# =============================================================================
# This pack provides a simplified, cost-effective net zero solution specifically
# designed for SMEs (<250 employees) with limited resources, budgets, and
# technical expertise. It implements 8 engines optimized for minimal data
# requirements (Bronze/Silver/Gold tiers), 6 streamlined workflows (express
# onboarding in <15 minutes), 8 SME-friendly templates (1-2 pages, visual focus),
# and 13 integrations including accounting software connectors (Xero, QuickBooks,
# Sage), grant database matching, and certification pathway support.
#
# Key SME Features:
#   - Three-tier data approach (Bronze: ±40%, Silver: ±15%, Gold: ±5% accuracy)
#   - Spend-based Scope 3 using DEFRA/EPA EEIO factors
#   - Quick wins database (50+ actions with ROI < 3 years)
#   - Grant finder (50+ UK/EU/US programs, automatic matching)
#   - Accounting software integration (auto-import spend data)
#   - Simplified targets (1.5°C pathway, 50% by 2030, pre-set)
#   - Certification pathways (SME Climate Hub, B Corp, ISO 14001, Carbon Trust)
#   - Peer benchmarking (compare to similar-sized SMEs)
#
# SME Market Sizing:
#   - 99% of businesses globally are SMEs
#   - Collectively responsible for 50%+ of global emissions
#   - Limited resources: <3 FTE for sustainability, <€20K annual budget
#   - Time constraints: <2 hours for baseline, <30 min for quarterly review
#   - Data challenges: Often missing activity data, need estimation methods
#
# Regulatory and Framework References:
#   - GHG Protocol Corporate Standard (simplified for SMEs)
#   - SBTi SME Pathway (launched 2023)
#   - SME Climate Hub (UN-backed net zero commitment platform)
#   - B Corp Climate Collective
#   - ISO 14001 Environmental Management System
#   - Carbon Trust Standard
#   - DEFRA/EPA EEIO Emission Factors
#
# Version History:
#   1.0.0 - Initial release (2026-03-18)
# =============================================================================

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
metadata:
  name: PACK-026-sme-net-zero
  version: "1.0.0"
  display_name: "SME Net Zero Pack"
  description: >-
    Comprehensive GreenLang deployment pack optimized for Small and Medium
    Enterprises (SMEs) with <250 employees. Provides simplified net zero
    solutions with minimal data requirements (Bronze/Silver/Gold tiers),
    cost-effective actions (quick wins database with <3yr payback), grant
    finder (50+ UK/EU/US programs), accounting software integration (Xero,
    QuickBooks, Sage auto-import), and streamlined certification pathways
    (SME Climate Hub, B Corp, ISO 14001, Carbon Trust). Includes 8 engines,
    6 workflows optimized for speed (<15 min express onboarding), 8 SME-friendly
    templates (1-2 pages), 13 integrations, and 6 presets (micro/small/medium
    businesses across service/manufacturing/retail sectors). Targets 90%+
    accuracy with minimal effort, <€5,000 implementation cost for micro
    businesses, and >50% grant application success rate.
  category: net-zero
  tier: sme-optimized
  author: GreenLang Platform Team
  license: Proprietary
  min_platform_version: "2.0.0"
  release_date: "2026-03-18"
  support_tier: standard
  documentation_url: "https://docs.greenlang.io/packs/sme-net-zero"
  changelog_url: "https://docs.greenlang.io/packs/sme-net-zero/changelog"

  tags:
