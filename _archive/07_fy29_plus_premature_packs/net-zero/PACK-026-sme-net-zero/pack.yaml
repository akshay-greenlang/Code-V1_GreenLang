# -----------------------------------------------------------------------------
# Performance Targets
# -----------------------------------------------------------------------------
performance:
  baseline_calculation:
    bronze_tier: "2 seconds"
    silver_tier: "10 seconds"
    gold_tier: "30 seconds"

  express_onboarding: "15 minutes total"
  standard_onboarding: "1-2 hours"
  quarterly_review: "30 minutes"
  grant_search: "15 seconds"

  quick_wins_ranking: "10 seconds for 50 actions"
  action_prioritization: "20 seconds for 10 actions"
  cost_benefit_analysis: "10 seconds per action"

  mobile_dashboard_load: "3 seconds"

  memory_ceiling: "1024 MB"
  storage_minimum: "20 GB"
  cpu_minimum: "2 cores"

# -----------------------------------------------------------------------------
# Security & RBAC
# -----------------------------------------------------------------------------
security:
  authentication: JWT (RS256)
  authorization: RBAC
  roles:
    - name: sme_admin
      permissions: [all]
    - name: sustainability_manager
      permissions: [baseline, targets, actions, grants, reporting]
    - name: finance_manager
      permissions: [accounting_integration, cost_benefit, grants]
    - name: auditor
      permissions: [read_all, verify]
    - name: viewer
      permissions: [read_baseline, read_targets, read_reports]

  encryption:
    at_rest: AES-256-GCM
    in_transit: TLS 1.3

  audit_trail:
    enabled: true
    retention_years: 3
    events: [baseline_calc, target_set, action_planned, grant_applied, data_sync, report_generated]

