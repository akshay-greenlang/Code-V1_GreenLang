# =============================================================================
# PACK-026 SME Net Zero Pack - Small Business Preset
# =============================================================================
# Configuration for small enterprises (10-49 employees, EUR 2-10M revenue).
# Uses SILVER data quality tier with basic activity data (utility bills,
# fuel receipts). Scope 1+2 measured from bills, Scope 3 spend-based for
# Categories 1 (purchased goods), 6 (business travel), and 7 (employee
# commuting). ACA pathway with 42% reduction target by 2030 (SBTi SME
# pathway minimum). Top 5-7 quick wins recommended.
#
# Budget: EUR 5,000-20,000 total
# Grant focus: National programs, sector-specific
# Certification: SME Climate Hub + B Corp aspiration
# Verification: Third-party (light)
# Processing: Standard mode, 1GB memory, <20 sec processing
#
# Typical use cases:
#   - Growing startups and scale-ups (15-40 employees)
#   - Small professional services firms (accounting, legal, design)
#   - Small retail chains (2-5 locations)
#   - IT companies and digital agencies
#   - Small construction firms
#   - Family-owned manufacturing workshops
#   - Hospitality businesses (restaurants, small hotels)
#   - Regional logistics companies (small fleet)
# =============================================================================

# --- Temporal Settings ---
reporting_year: 2025
base_year: 2024
pack_version: "1.0.0"

# --- Organization ---
organization:
  name: ""
  sme_size: "SMALL"
  sector: "OTHER"
  region: "EU"
  country: "DE"
  fiscal_year_end: "12-31"
  accounting_software: "XERO"
  number_of_sites: 2
  has_fleet: false
  has_production_facility: false

# --- Data Quality (SILVER: Basic activity data) ---
data_quality:
  tier: "SILVER"
  allow_industry_averages: true
  allow_spend_based_estimation: true
  require_utility_bills: true
  require_supplier_data: false
  data_completeness_target_pct: 65.0
  emission_factor_source: "DEFRA_2024"
  data_improvement_plan: true

# --- Boundary ---
boundary:
  method: "OPERATIONAL_CONTROL"
  reporting_currency: "EUR"
  base_year_recalculation_threshold_pct: 10.0
  include_all_sites: true

# --- Scope Configuration (S1+2 measured, S3 spend-based) ---
scope:
  include_scope1: true
  include_scope2: true
  include_scope3: true
  scope1_estimation_method: "activity_based"
  scope2_methods:
    - "location_based"
    - "market_based"
  scope3_categories: [1, 6, 7]
  scope3_method: "SPEND_BASED"
  scope3_category_methods:
    cat_1: "spend_based"
    cat_6: "spend_based"
    cat_7: "spend_based"
    default: "spend_based"
  scope3_materiality_threshold_pct: 5.0
  scope3_optional: false

# --- Target Setting (42% by 2030 - SBTi SME minimum) ---
target:
  ambition_level: "CELSIUS_1_5"
  pathway_type: "ACA"
  near_term_target_year: 2030
  long_term_target_year: 2050
  near_term_reduction_pct: 42.0
  long_term_reduction_pct: 90.0
  annual_linear_reduction_pct: 4.2
  sbti_sme_route: true
  sbti_submission_planned: false
  sme_climate_hub_commitment: true

# --- Reduction Actions (5-7 quick wins, EUR 5K-20K) ---
reduction:
  max_actions: 7
  planning_horizon_years: 3
  budget_range_min_eur: 5000.0
  budget_range_max_eur: 20000.0
  include_quick_wins: true
  quick_win_max_count: 5
  include_renewable_procurement: true
  include_energy_efficiency: true
  include_supplier_engagement: false
  include_fleet_electrification: false
  include_process_optimization: false
  include_behavioral_change: true
  include_macc_analysis: false
  carbon_price_eur_per_tco2e: 50.0
  discount_rate_pct: 8.0
  scenario_count: 2

# --- Grant Preferences (National programs, sector-specific) ---
grant:
  enabled: true
  preferred_categories:
    - "NATIONAL_PROGRAM"
    - "SECTOR_SPECIFIC"
    - "ENERGY_EFFICIENCY"
    - "LOCAL_PROGRAM"
  max_application_complexity: "MEDIUM"
  region_focus: "NATIONAL"
  sector_specific: true
  include_tax_incentives: true
  include_green_loans: true
  budget_match_required: false

# --- Certification (SME Climate Hub + B Corp aspiration) ---
certification:
  primary_pathway: "SME_CLIMATE_HUB"
  secondary_pathway: "B_CORP"
  auto_recommend: true
  readiness_assessment: true
  max_certification_budget_eur: 2000.0
  max_time_months: 6

# --- Reporting (PDF + Excel, 3 templates) ---
reporting:
  formats:
    - "PDF"
    - "EXCEL"
  templates:
    - "net_zero_summary"
    - "action_plan"
    - "annual_progress"
  include_cdp_mapping: false
  include_sbti_mapping: true
  include_sme_climate_hub_mapping: true
  language: "en"
  review_workflow_enabled: false
  watermark_draft: true
  include_grant_recommendations: true
  include_certification_roadmap: true

# --- Performance (Standard: 1GB, <20 sec) ---
performance:
  cache_enabled: true
  cache_ttl_seconds: 1800
  max_concurrent_calcs: 2
  timeout_seconds: 20
  batch_size: 250
  memory_limit_mb: 1024
  lightweight_mode: true

# --- Audit Trail (3-year, standard) ---
audit_trail:
  enabled: true
  sha256_provenance: true
  calculation_logging: true
  assumption_tracking: true
  data_lineage_enabled: false
  retention_years: 3
  external_audit_export: false

# --- Verification (Third-party light) ---
verification:
  level: "THIRD_PARTY_LIGHT"
  frequency: "ANNUAL"
  scope_of_verification:
    - "scope_1"
    - "scope_2"
  include_scope3_in_verification: false

# --- Scorecard (Quick assessment) ---
scorecard:
  enabled: true
  assessment_mode: "QUICK"
  dimensions:
    - "baseline_completeness"
    - "target_ambition"
    - "reduction_progress"
    - "data_quality"
    - "certification_readiness"
  benchmark_enabled: true
  peer_group: "SME_SIZE"
  kpi_set:
    - "absolute_emissions_trajectory"
    - "emission_intensity_revenue"
    - "yoy_reduction_rate"
    - "renewable_electricity_pct"
    - "data_quality_score"
  target_years: [2025, 2028, 2030, 2050]
