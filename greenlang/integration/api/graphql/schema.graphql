# GreenLang GraphQL Schema
# Phase 4 - Comprehensive API Layer

scalar DateTime
scalar JSON
scalar Upload

# ==============================================================================
# Enums
# ==============================================================================

enum PermissionAction {
  CREATE
  READ
  UPDATE
  DELETE
  EXECUTE
  LIST
  APPROVE
  ADMIN
  ALL
}

enum ResourceType {
  PIPELINE
  PACK
  DATASET
  MODEL
  AGENT
  WORKFLOW
  TENANT
  USER
  ROLE
  API_KEY
  CLUSTER
  NAMESPACE
  SECRET
  CONFIG
  ALL
}

enum ExecutionStatus {
  PENDING
  RUNNING
  COMPLETED
  FAILED
  CANCELLED
  TIMEOUT
}

enum SortOrder {
  ASC
  DESC
}

enum AgentStatus {
  ENABLED
  DISABLED
  ARCHIVED
}

enum WorkflowStepStatus {
  PENDING
  RUNNING
  COMPLETED
  FAILED
  SKIPPED
}

enum SubscriptionEvent {
  CREATED
  UPDATED
  DELETED
  STATUS_CHANGED
  PROGRESS_UPDATE
}

# ==============================================================================
# Input Types
# ==============================================================================

input PaginationInput {
  page: Int = 1
  pageSize: Int = 20
  offset: Int
  limit: Int
}

input SortInput {
  field: String!
  order: SortOrder = ASC
}

input FilterInput {
  field: String!
  operator: FilterOperator!
  value: JSON!
}

enum FilterOperator {
  EQUALS
  NOT_EQUALS
  CONTAINS
  NOT_CONTAINS
  GREATER_THAN
  LESS_THAN
  GREATER_THAN_OR_EQUAL
  LESS_THAN_OR_EQUAL
  IN
  NOT_IN
  IS_NULL
  IS_NOT_NULL
  STARTS_WITH
  ENDS_WITH
}

input AgentFilterInput {
  name: String
  version: String
  status: AgentStatus
  tags: [String!]
  createdAfter: DateTime
  createdBefore: DateTime
}

input WorkflowFilterInput {
  name: String
  version: String
  tags: [String!]
  createdAfter: DateTime
  createdBefore: DateTime
}

input ExecutionFilterInput {
  status: ExecutionStatus
  workflowId: ID
  agentId: ID
  userId: ID
  startedAfter: DateTime
  startedBefore: DateTime
  completedAfter: DateTime
  completedBefore: DateTime
}

input CreateAgentInput {
  name: String!
  description: String!
  version: String = "0.0.1"
  enabled: Boolean = true
  parameters: JSON
  resourcePaths: [String!]
  logLevel: String = "INFO"
  tags: [String!]
  metadata: JSON
}

input UpdateAgentInput {
  name: String
  description: String
  version: String
  enabled: Boolean
  parameters: JSON
  resourcePaths: [String!]
  logLevel: String
  tags: [String!]
  metadata: JSON
}

input CreateWorkflowInput {
  name: String!
  description: String!
  version: String = "0.0.1"
  steps: [WorkflowStepInput!]!
  outputMapping: JSON
  metadata: JSON
  tags: [String!]
}

input UpdateWorkflowInput {
  name: String
  description: String
  version: String
  steps: [WorkflowStepInput!]
  outputMapping: JSON
  metadata: JSON
  tags: [String!]
}

input WorkflowStepInput {
  name: String!
  agentId: ID!
  description: String
  inputMapping: JSON
  outputKey: String
  condition: String
  onFailure: String = "stop"
  retryCount: Int = 0
  timeout: Int
}

input ExecuteWorkflowInput {
  workflowId: ID!
  inputData: JSON!
  context: JSON
  tags: [String!]
}

input ExecuteSingleAgentInput {
  agentId: ID!
  inputData: JSON!
  context: JSON
  tags: [String!]
}

input CreateRoleInput {
  name: String!
  description: String
  permissions: [PermissionInput!]!
  parentRoles: [String!]
  metadata: JSON
}

input UpdateRoleInput {
  description: String
  permissions: [PermissionInput!]
  parentRoles: [String!]
  metadata: JSON
}

input PermissionInput {
  resource: String!
  action: String!
  scope: String
  conditions: JSON
}

input AssignRoleInput {
  userId: ID!
  roleNames: [String!]!
}

input CreateAPIKeyInput {
  name: String!
  description: String
  scopes: [String!]
  expiresIn: Int
  allowedIps: [String!]
  allowedOrigins: [String!]
  rateLimit: Int
}

# ==============================================================================
# Object Types
# ==============================================================================

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
}

type Permission {
  resource: String!
  action: String!
  scope: String
  conditions: JSON
}

type Role {
  name: String!
  description: String
  permissions: [Permission!]!
  parentRoles: [String!]!
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type User {
  id: ID!
  tenantId: ID!
  username: String!
  email: String!
  active: Boolean!
  roles: [Role!]!
  permissions: [Permission!]!
  createdAt: DateTime!
  lastLogin: DateTime
  metadata: JSON
}

type APIKey {
  keyId: ID!
  name: String!
  description: String
  displayKey: String!
  scopes: [String!]!
  tenantId: ID!
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  useCount: Int!
  active: Boolean!
  allowedIps: [String!]!
  allowedOrigins: [String!]!
  rateLimit: Int
}

type AgentMetrics {
  executionTimeMs: Float!
  inputSize: Int!
  outputSize: Int!
  recordsProcessed: Int!
  cacheHits: Int!
  cacheMisses: Int!
  customMetrics: JSON
}

type AgentStats {
  executions: Int!
  successes: Int!
  failures: Int!
  successRate: Float!
  totalTimeMs: Float!
  avgTimeMs: Float!
  customCounters: JSON
  customTimers: JSON
}

type Agent {
  id: ID!
  name: String!
  description: String!
  version: String!
  enabled: Boolean!
  parameters: JSON
  resourcePaths: [String!]!
  logLevel: String!
  tags: [String!]!
  metadata: JSON
  stats: AgentStats!
  createdAt: DateTime!
  updatedAt: DateTime!

  # Relationships
  workflows: [Workflow!]!
  executions(
    pagination: PaginationInput
    filter: ExecutionFilterInput
    sort: [SortInput!]
  ): ExecutionConnection!
}

type WorkflowStep {
  name: String!
  agentId: ID!
  agent: Agent
  description: String
  inputMapping: JSON
  outputKey: String
  condition: String
  onFailure: String!
  retryCount: Int!
  timeout: Int
}

type Workflow {
  id: ID!
  name: String!
  description: String!
  version: String!
  steps: [WorkflowStep!]!
  outputMapping: JSON
  metadata: JSON
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!

  # Relationships
  agents: [Agent!]!
  executions(
    pagination: PaginationInput
    filter: ExecutionFilterInput
    sort: [SortInput!]
  ): ExecutionConnection!
}

type ExecutionStepResult {
  stepName: String!
  agentId: ID!
  status: WorkflowStepStatus!
  result: JSON
  error: String
  metrics: AgentMetrics
  startedAt: DateTime
  completedAt: DateTime
  duration: Float
  attempts: Int!
}

type Execution {
  id: ID!
  executionId: String!
  workflowId: ID
  workflow: Workflow
  agentId: ID
  agent: Agent
  userId: ID
  user: User
  status: ExecutionStatus!
  inputData: JSON!
  outputData: JSON
  context: JSON
  errors: [JSON!]!
  tags: [String!]!

  # Step results
  stepResults: [ExecutionStepResult!]!

  # Metrics
  totalDuration: Float
  startedAt: DateTime!
  completedAt: DateTime

  # Metadata
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ExecutionResult {
  success: Boolean!
  execution: Execution!
  errors: [String!]
}

# ==============================================================================
# Connection Types (for pagination)
# ==============================================================================

type AgentEdge {
  node: Agent!
  cursor: String!
}

type AgentConnection {
  edges: [AgentEdge!]!
  nodes: [Agent!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type WorkflowEdge {
  node: Workflow!
  cursor: String!
}

type WorkflowConnection {
  edges: [WorkflowEdge!]!
  nodes: [Workflow!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ExecutionEdge {
  node: Execution!
  cursor: String!
}

type ExecutionConnection {
  edges: [ExecutionEdge!]!
  nodes: [Execution!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RoleEdge {
  node: Role!
  cursor: String!
}

type RoleConnection {
  edges: [RoleEdge!]!
  nodes: [Role!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# ==============================================================================
# Query Types
# ==============================================================================

type Query {
  # Agent queries
  agent(id: ID!): Agent
  agents(
    pagination: PaginationInput
    filter: AgentFilterInput
    sort: [SortInput!]
  ): AgentConnection!

  # Workflow queries
  workflow(id: ID!): Workflow
  workflows(
    pagination: PaginationInput
    filter: WorkflowFilterInput
    sort: [SortInput!]
  ): WorkflowConnection!

  # Execution queries
  execution(id: ID!): Execution
  executions(
    pagination: PaginationInput
    filter: ExecutionFilterInput
    sort: [SortInput!]
  ): ExecutionConnection!

  # RBAC queries
  role(name: String!): Role
  roles(
    pagination: PaginationInput
    sort: [SortInput!]
  ): RoleConnection!

  user(id: ID!): User
  currentUser: User!

  # Permission checks
  checkPermission(
    resource: String!
    action: String!
    context: JSON
  ): Boolean!

  # API Key queries
  apiKey(keyId: ID!): APIKey
  apiKeys(pagination: PaginationInput): [APIKey!]!

  # System queries
  systemHealth: SystemHealth!
  metrics(
    timeRange: TimeRangeInput
    aggregation: AggregationType
  ): [Metric!]!
}

type SystemHealth {
  status: String!
  version: String!
  uptime: Float!
  agentCount: Int!
  workflowCount: Int!
  executionCount: Int!
  timestamp: DateTime!
  checks: [HealthCheck!]!
}

type HealthCheck {
  name: String!
  status: String!
  message: String
  latency: Float
}

type Metric {
  name: String!
  value: Float!
  unit: String
  timestamp: DateTime!
  labels: JSON
}

input TimeRangeInput {
  start: DateTime!
  end: DateTime!
}

enum AggregationType {
  SUM
  AVG
  MIN
  MAX
  COUNT
}

# ==============================================================================
# Mutation Types
# ==============================================================================

type Mutation {
  # Agent mutations
  createAgent(input: CreateAgentInput!): Agent!
  updateAgent(id: ID!, input: UpdateAgentInput!): Agent!
  deleteAgent(id: ID!): Boolean!
  enableAgent(id: ID!): Agent!
  disableAgent(id: ID!): Agent!

  # Workflow mutations
  createWorkflow(input: CreateWorkflowInput!): Workflow!
  updateWorkflow(id: ID!, input: UpdateWorkflowInput!): Workflow!
  deleteWorkflow(id: ID!): Boolean!
  cloneWorkflow(id: ID!, name: String!): Workflow!

  # Execution mutations
  executeWorkflow(input: ExecuteWorkflowInput!): ExecutionResult!
  executeSingleAgent(input: ExecuteSingleAgentInput!): ExecutionResult!
  cancelExecution(id: ID!): Execution!
  retryExecution(id: ID!): ExecutionResult!

  # RBAC mutations
  createRole(input: CreateRoleInput!): Role!
  updateRole(name: String!, input: UpdateRoleInput!): Role!
  deleteRole(name: String!): Boolean!
  assignRole(input: AssignRoleInput!): User!
  revokeRole(userId: ID!, roleName: String!): User!

  # API Key mutations
  createAPIKey(input: CreateAPIKeyInput!): APIKey!
  revokeAPIKey(keyId: ID!): Boolean!
  rotateAPIKey(keyId: ID!): APIKey!

  # Batch mutations
  batchCreateAgents(inputs: [CreateAgentInput!]!): [Agent!]!
  batchDeleteExecutions(ids: [ID!]!): Int!
}

# ==============================================================================
# Subscription Types
# ==============================================================================

type Subscription {
  # Execution subscriptions
  executionUpdated(
    executionId: ID
    workflowId: ID
    agentId: ID
    userId: ID
  ): ExecutionUpdate!

  executionStatusChanged(
    executionId: ID
  ): ExecutionStatusUpdate!

  executionProgress(
    executionId: ID!
  ): ExecutionProgress!

  # Agent subscriptions
  agentUpdated(agentId: ID): AgentUpdate!

  # Workflow subscriptions
  workflowUpdated(workflowId: ID): WorkflowUpdate!

  # System subscriptions
  systemMetrics(interval: Int = 5000): SystemMetrics!
}

type ExecutionUpdate {
  event: SubscriptionEvent!
  execution: Execution!
  timestamp: DateTime!
}

type ExecutionStatusUpdate {
  executionId: ID!
  oldStatus: ExecutionStatus
  newStatus: ExecutionStatus!
  timestamp: DateTime!
}

type ExecutionProgress {
  executionId: ID!
  currentStep: String
  completedSteps: Int!
  totalSteps: Int!
  progress: Float!
  estimatedTimeRemaining: Float
  timestamp: DateTime!
}

type AgentUpdate {
  event: SubscriptionEvent!
  agent: Agent!
  timestamp: DateTime!
}

type WorkflowUpdate {
  event: SubscriptionEvent!
  workflow: Workflow!
  timestamp: DateTime!
}

type SystemMetrics {
  cpuUsage: Float!
  memoryUsage: Float!
  activeExecutions: Int!
  requestsPerSecond: Float!
  timestamp: DateTime!
}

# ==============================================================================
# Directives
# ==============================================================================

directive @auth(
  requires: PermissionAction
) on FIELD_DEFINITION | OBJECT

directive @rateLimit(
  max: Int!
  window: Int!
) on FIELD_DEFINITION

directive @complexity(
  value: Int!
  multipliers: [String!]
) on FIELD_DEFINITION

directive @deprecated(
  reason: String = "This field is deprecated"
) on FIELD_DEFINITION | ENUM_VALUE

# ==============================================================================
# Schema Definition
# ==============================================================================

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# ==============================================================================
# ============================= Factors ========================================
# ==============================================================================
#
# GAP-12: Factors surface for GraphQL.  Mirror of the Factors REST
# endpoints under /api/v1/factors.  Resolvers live in
# ``resolvers_factors.py``; full commentary is in ``schema_factors.graphql``.
# Keep this section in sync with that partial — code-generators rely on
# both being identical.
# ==============================================================================

# ---------- Enums ----------

enum FactorStatus {
  CERTIFIED
  PREVIEW
  CONNECTOR_ONLY
  DEPRECATED
}

enum EditionStatus {
  PUBLISHED
  PENDING
  DEPRECATED
}

enum FactorScope {
  SCOPE_1
  SCOPE_2
  SCOPE_3
}

enum BatchJobStatus {
  QUEUED
  RUNNING
  COMPLETED
  FAILED
  CANCELLED
}

enum FactorSortField {
  RELEVANCE
  FACTOR_ID
  CO2E_PER_UNIT
  DATA_QUALITY
  VALID_FROM
  SOURCE_YEAR
}

enum TimeGranularity {
  ANNUAL
  QUARTERLY
  MONTHLY
  DAILY
  HOURLY
  SEASONAL
}

enum RegulatoryFramework {
  GHG_PROTOCOL_CORPORATE
  GHG_PROTOCOL_SCOPE2_LOCATION_BASED
  GHG_PROTOCOL_SCOPE2_MARKET_BASED
  GHG_PROTOCOL_SCOPE3
  GHG_PROTOCOL_PRODUCT
  ISO_14064_1
  ISO_14064_2
  ISO_14067
  ISO_14083
  EU_CBAM
  EU_CSRD
  EU_ESRS_E1
  EU_TAXONOMY
  EU_PEF
  EU_OEF
  UK_PAS_2050
  UK_SECR
  US_SEC_CLIMATE
  US_CA_SB253
  US_CA_SB261
  TCFD
  IFRS_S2
  CDP
  SBTI
  PCAF
}

enum FactorEventKind {
  SOURCE_ARTIFACT_CHANGED
  SOURCE_UNAVAILABLE
  SOURCE_BREAKING_CHANGE
  FACTOR_ADDED
  FACTOR_UPDATED
  FACTOR_REMOVED
  FACTOR_DEPRECATED
  LICENSE_CHANGED
  METHODOLOGY_CHANGED
  EDITION_PUBLISHED
}

# ---------- Value objects ----------

type Jurisdiction {
  code: String!
  name: String
  level: String
}

type ActivitySchema {
  activityId: String!
  label: String
  unit: String
  category: String
  description: String
}

type QualityScore {
  overallScore: Float!
  rating: String
  temporal: Float
  geographical: Float
  technological: Float
  representativeness: Float
  methodological: Float
}

type Uncertainty {
  ci95: Float
  distribution: String
  stdDev: Float
  sampleSize: Int
}

type GasBreakdown {
  co2: Float
  ch4: Float
  n2o: Float
  hfcs: Float
  pfcs: Float
  sf6: Float
  nf3: Float
  biogenicCo2: Float
  ch4Gwp: Float
  n2oGwp: Float
}

# ---------- Core entities ----------

type Source {
  sourceId: ID!
  organization: String
  publication: String
  year: Int
  url: String
  methodology: String
  license: String
  version: String
}

type MethodPack {
  methodPackId: ID!
  name: String
  version: String
  scope: String
  description: String
  jurisdictions: [String!]!
}

type Edition {
  editionId: ID!
  status: String
  label: String
  manifestHash: String
  publishedAt: DateTime
}

type Factor {
  factorId: ID!
  fuelType: String
  unit: String
  geography: String
  geographyLevel: String
  scope: String
  boundary: String

  co2PerUnit: Float
  ch4PerUnit: Float
  n2oPerUnit: Float
  co2ePerUnit: Float

  dataQuality: QualityScore
  source: Source
  uncertainty95ci: Float

  validFrom: String
  validTo: String

  timeGranularity: TimeGranularity

  factorStatus: String
  license: String
  licenseClass: String
  complianceFrameworks: [String!]!
  regulatoryFrameworks: [RegulatoryFramework!]!
  tags: [String!]!
  activityTags: [String!]!
  sectorTags: [String!]!
  notes: String

  editionId: String
  sourceId: String
  sourceRelease: String
  releaseVersion: String
  replacementFactorId: String
  contentHash: String
}

type FactorMatch {
  factorId: ID!
  score: Float!
  explanation: JSON
}

type UnitConversion {
  targetUnit: String
  factor: Float
  convertedCo2ePerUnit: Float
  path: [String!]!
  note: String
}

type ResolvedFactor {
  chosenFactorId: String
  factorId: String
  factorVersion: String
  methodProfile: String
  methodPackVersion: String

  fallbackRank: Int
  stepLabel: String
  whyChosen: String

  qualityScore: QualityScore
  uncertainty: Uncertainty
  gasBreakdown: GasBreakdown
  co2eBasis: String

  assumptions: [String!]!
  alternates: JSON

  deprecationStatus: String
  deprecationReplacement: String

  unitConversion: UnitConversion

  explain: JSON
  editionId: String
}

type FactorDiff {
  factorId: ID!
  leftEdition: String!
  rightEdition: String!
  status: String!
  leftExists: Boolean
  rightExists: Boolean
  changes: JSON
  leftContentHash: String
  rightContentHash: String
}

type AuditBundle {
  factorId: ID!
  editionId: String!
  contentHash: String
  payloadSha256: String
  normalizedRecord: JSON
  provenance: JSON
  licenseInfo: JSON
  quality: JSON
  verificationChain: JSON
  rawArtifactUri: String
  parserLog: String
  qaErrors: [String!]!
  reviewerDecision: String
}

type Override {
  overlayId: ID!
  tenantId: ID!
  factorId: String!
  overrideValue: Float!
  overrideUnit: String
  validFrom: String
  validTo: String
  source: String
  notes: String
  createdBy: String
  createdAt: String
  updatedAt: String
  active: Boolean!
}

type CoverageReport {
  totalFactors: Int
  byGeography: JSON
  byScope: JSON
  byFuelType: JSON
  bySource: JSON
  editionId: String
}

type BatchJobHandle {
  jobId: ID!
  status: String!
  totalItems: Int
  processedItems: Int
  progressPercent: Float
  resultsUrl: String
  createdAt: DateTime
  completedAt: DateTime
  errorMessage: String
}

# ---------- Connections ----------

type FactorEdge {
  node: Factor!
  cursor: String!
}

type FactorConnection {
  edges: [FactorEdge!]!
  nodes: [Factor!]!
  pageInfo: PageInfo!
  totalCount: Int!
  editionId: String
  searchTimeMs: Float
}

# ---------- Input types ----------

input FactorFilterInput {
  fuelType: String
  geography: String
  scope: String
  boundary: String
  sourceId: String
  factorStatus: String
  licenseClass: String
  edition: String
  activityTags: [String!]
  sectorTags: [String!]
  dqsMin: Float
  validOnDate: String
  includePreview: Boolean = false
  includeConnector: Boolean = false
  regulatoryFramework: RegulatoryFramework
  regulatoryFrameworks: [RegulatoryFramework!]
  timeGranularity: TimeGranularity
}

input FactorSortInput {
  field: FactorSortField! = RELEVANCE
  order: SortOrder! = DESC
}

input ResolutionRequestInput {
  activity: String!
  methodProfile: String!
  jurisdiction: String
  reportingDate: String
  supplierId: String
  facilityId: String
  utilityOrGridRegion: String
  preferredSources: [String!]
  extras: JSON
  edition: String
  includePreview: Boolean = false
  includeConnector: Boolean = false
  timeGranularity: TimeGranularity = ANNUAL
  reportingHour: Int
  reportingMonth: Int
  targetUnit: String
}

input SearchFactorsInput {
  query: String!
  filter: FactorFilterInput
  sort: FactorSortInput
  first: Int
  after: String
}

input MatchInput {
  activityDescription: String!
  geography: String
  fuelType: String
  scope: String
  limit: Int = 10
  edition: String
}

input OverrideInput {
  factorId: ID!
  tenantId: ID
  co2ePerUnit: Float!
  overrideUnit: String = "kg_co2e"
  justification: String
  effectiveFrom: String
  effectiveTo: String
  source: String
  metadata: JSON
}

# ---------- Query extensions ----------

extend type Query {
  factor(id: ID!, edition: String): Factor
  factors(
    filter: FactorFilterInput
    first: Int = 20
    after: String
    sort: FactorSortInput
  ): FactorConnection!
  searchFactors(input: SearchFactorsInput!): FactorConnection!
  resolveFactor(request: ResolutionRequestInput!): ResolvedFactor!
    @auth(requires: "pro")
  resolveFactorExplain(
    request: ResolutionRequestInput!
    alternatesLimit: Int = 5
  ): ResolvedFactor! @auth(requires: "pro")
  factorAlternates(factorId: ID!, limit: Int = 5): [Factor!]!
    @auth(requires: "pro")
  factorDiff(
    factorId: ID!
    fromEdition: String!
    toEdition: String!
  ): FactorDiff!
  factorAuditBundle(factorId: ID!, edition: String): AuditBundle
    @auth(requires: "enterprise")
  editions(status: EditionStatus): [Edition!]!
  edition(id: ID!): Edition
  sources: [Source!]!
  source(id: ID!): Source
  methodPacks: [MethodPack!]!
  methodPack(id: ID!): MethodPack
  factorCoverage(methodProfile: String, edition: String): CoverageReport!
}

# ---------- Mutation extensions ----------

extend type Mutation {
  setFactorOverride(input: OverrideInput!): Override!
    @auth(requires: "consulting")
  removeFactorOverride(tenantId: ID!, factorId: ID!): Boolean!
    @auth(requires: "consulting")
  submitBatchResolution(requests: [ResolutionRequestInput!]!): BatchJobHandle!
    @auth(requires: "pro")
  matchFactor(input: MatchInput!): [Factor!]!
}

# ---------- Subscription extensions ----------

type RegulatoryChangeEvent {
  eventId: ID!
  eventKind: FactorEventKind!
  sourceId: String!
  detectedAt: DateTime!
  severity: String!
  factorId: String
  oldValue: Float
  newValue: Float
  unit: String
  requiresHumanReview: Boolean!
  reviewReason: String
}

extend type Subscription {
  factorEventStream(
    sourceId: String
    eventKinds: [FactorEventKind!]
    tenantId: ID
  ): RegulatoryChangeEvent! @auth(requires: "pro")

  editionPublished: Edition! @auth(requires: "pro")
}
