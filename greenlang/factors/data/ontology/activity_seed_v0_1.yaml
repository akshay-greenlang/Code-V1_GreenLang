# =============================================================================
# GreenLang Factors v0.1 Alpha — Activity Taxonomy Seed
# =============================================================================
# Phase 2 / WS5 — canonical reference data for the
# `factors_v0_1.activity` table created by V502.
#
# URN form: urn:gl:activity:<taxonomy>:<code-slug>
#   - taxonomy: one of the 15 enums defined in
#     `greenlang.factors.ontology.urn.ALLOWED_ACTIVITY_TAXONOMIES`.
#   - code-slug: lowercase a-z 0-9 hyphen dot underscore, no colons.
#     Source codes containing '.' (e.g. IPCC '1.A.1.a') are rendered
#     using '-' as the separator: `1-a-1-a`. The original code is kept
#     verbatim in the `code` column.
#
# v0.1 scope: reference data only. The frozen factor_record_v0_1 schema
# does NOT yet require an activity_taxonomy_urn FK on `factor`; FK
# promotion is deferred to v0.2.
#
# Authority: docs/factors/PHASE_2_PLAN.md §2.3c (CTO Phase 2 brief
# 2026-04-27).
# =============================================================================

