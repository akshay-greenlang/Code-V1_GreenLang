# =============================================================================
# GreenLang Factors v0.1 Alpha — Geography ontology seed
# =============================================================================
# Source authority:
#   - ISO 3166-1 alpha-2 country codes (ISO 3166 Maintenance Agency)
#   - EPA eGRID 2024 subregion list
#     https://www.epa.gov/egrid/egrid-summary-tables
#   - ENTSO-E bidding zone list (European Network of Transmission System
#     Operators for Electricity)
#     https://www.entsoe.eu/data/map/
#   - NERC Balancing Authority list (North American Electric Reliability
#     Corporation)
#     https://www.nerc.com/pa/RAPA/ra/Pages/default.aspx
#   - UN M.49 / OECD / ASEAN / EU-27 sub-region lists
#   - Major drainage basins per UNEP-WCMC (illustrative only — NOT
#     attached to any v0.1 alpha factor record)
#
# CTO Phase 2 brief (2026-04-27): Phase 2 ontology seed — geography.
# Source-of-truth for v0.1 alpha. Every URN MUST be lowercase and MUST
# parse via greenlang.factors.ontology.urn.parse.
#
# Tag conventions:
#   - 'phase2_v0_1' — every Phase 2 seed row carries this tag.
#   - 'iso-3166-1-alpha-2' / 'egrid-2024' / 'entsoe-bidding-zone' /
#     'nerc-ba' / 'un-m49' / 'unep-wcmc-basin' — provenance markers.
#   - 'illustrative' — for ontology rows not yet referenced by any v0.1
#     factor record (e.g., basin/tenant rows).
#
# This file is consumed by greenlang.factors.data.ontology.loaders
# .geography_loader.load_geography. Re-running the loader is idempotent
# (INSERT ... ON CONFLICT (urn) DO NOTHING).
#
# All entries must satisfy the V501 widened geography type CHECK enum:
#   global | country | subregion | state_or_province | grid_zone |
#   bidding_zone | balancing_authority | basin | tenant
# =============================================================================

