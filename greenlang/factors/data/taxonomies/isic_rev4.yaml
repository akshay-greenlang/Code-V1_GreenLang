# ---------------------------------------------------------------------------
# ISIC Rev.4 - International Standard Industrial Classification
# ---------------------------------------------------------------------------
# UN Statistics Division, International Standard Industrial Classification of
# All Economic Activities, Revision 4 (2008).
#
# Structure: Section (letter) > Division (2 digits) > Group (3 digits) > Class (4 digits)
#
# This file covers:
#   - All 21 Sections (A-U) with labels
#   - All 88 Divisions (full top-level list)
#   - Full 4-digit Classes for the sectors prioritised by GreenLang:
#       05-09 Mining & quarrying (full)
#       10-33 Manufacturing (full)
#       35    Electricity, gas, steam (full)
#       49-53 Transportation & storage (full)
#       64-66 Financial & insurance activities (full)
#
# Sector-level default emission factors (EF_default_kgco2e_per_usd) are
# populated for classes that correspond to spend-based Scope 3 families.
# Defaults are drawn from Exiobase v3.8.2 (2020 global avg, USD2020) and
# EORA26 cross-walks where Exiobase coverage is missing.
#
# Source: UNSD (https://unstats.un.org/unsd/classifications/Econ/isic)
# License: Public domain (UN classification).
# ---------------------------------------------------------------------------
