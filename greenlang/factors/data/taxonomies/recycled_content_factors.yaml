# ---------------------------------------------------------------------------
# Recycled-content embodied-carbon factors
# ---------------------------------------------------------------------------
# Each entry gives the ratio of secondary/recycled-route emissions to the
# primary/virgin-route emissions for the same end-product. These ratios are
# multiplicative modifiers applied on top of a primary embodied-carbon factor.
#
# Values are order-of-magnitude defaults drawn from published LCA averages:
#   - WorldSteel LCA 2023 (EAF vs. BF-BOF)
#   - Aluminium Stewardship Initiative / IAI Global Aluminium Cycle 2022
#   - Ellen MacArthur Foundation "New Plastics Economy" 2017
#   - Cement Sustainability Initiative / GCCA Getting the Numbers Right 2022
#   - European Container Glass Federation (FEVE) 2022
#   - Confederation of European Paper Industries (CEPI) 2023
#
# License: Aggregated public figures - redistribution permitted with attribution.
# ---------------------------------------------------------------------------
metadata:
  version: "1.0"
  last_updated: "2026-04-01"
  source: "Aggregated WorldSteel / ASI / EMF / GCCA / FEVE / CEPI public data"
  license: "Public / attribution"
  units: "kgCO2e per kg of material"

