# ---------------------------------------------------------------------------
# Land-Use Change (LUC) commodity factors by commodity x production region
# ---------------------------------------------------------------------------
# Each commodity block gives:
#   - base LUC factor (tCO2e / tonne product) under moderate-risk assumptions
#   - regional overrides keyed by ISO-3 country code + ecoregion when relevant
#   - deforestation risk tier: high / medium / low / negligible
#   - permanence class: ephemeral / short / medium / long (IPCC 2019 Refinement)
#
# Factors are annualised over a 20-year amortisation window per the
# GHG Protocol Land Sector and Removals Guidance (draft, 2023) and IPCC
# 2019 Refinement. They include both biogenic CO2 and fossil CO2 where
# agriculture uses fossil inputs; biogenic_share is given separately.
#
# Sources:
#   - IPCC 2019 Refinement to the 2006 Guidelines, Vol 4 (AFOLU)
#   - FAO FAOSTAT land-use emissions by country, 2023
#   - GHG Protocol Land Sector and Removals Guidance (v0.1 draft)
#   - Curtis et al. 2018 "Classifying drivers of global forest loss"
#   - EUDR risk benchmarking draft (European Commission, 2024)
#
# License: Public / attribution (IPCC/FAO/GHGP all permit redistribution).
# ---------------------------------------------------------------------------
