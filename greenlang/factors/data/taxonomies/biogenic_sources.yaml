# ---------------------------------------------------------------------------
# Biogenic feedstock source factors
# ---------------------------------------------------------------------------
# Covers the principal biomass, biogas and waste-derived bio-feedstocks
# used by the GreenLang bioenergy method profiles. Each entry captures:
#   - moisture content (wet-basis fraction)
#   - lower heating value (GJ / tonne as-received)
#   - carbon content (kg C / kg dry matter)
#   - CO2 accounting treatment: "carbon_neutral" (IPCC default for sustainable
#     short-rotation biomass) or "short_rotation_sequestration" (explicit
#     sequestration credit for multi-year rotation, e.g. SRF)
#   - biogenic_share (always 1.0 for pure biomass sources)
#
# Sources:
#   - IEA Bioenergy Task 32 "Fuel properties database" (2022)
#   - IPCC 2019 Refinement, Vol 4, Ch. 2 (Generic methodologies)
#   - EU Renewable Energy Directive (RED III) Annex VI
#   - RSB sustainability criteria v4.3
#   - USDA Forest Products Laboratory "Wood Handbook" (2021 ed.)
#
# License: Public / attribution.
# ---------------------------------------------------------------------------
metadata:
  version: "1.0"
  last_updated: "2026-04-01"
  units:
    moisture_content: "fraction wet basis (0-1)"
    lhv: "GJ per tonne, as-received"
    carbon_content: "kg C per kg dry matter"

