# ---------------------------------------------------------------------------
# ISIC Rev.4 <-> NACE Rev.2 crosswalk
# ---------------------------------------------------------------------------
# NACE Rev.2 is derived from ISIC Rev.4 and is identical at the 2-digit
# Division level. At 3/4-digit depth NACE disaggregates further so one ISIC
# class may map to multiple NACE classes. We list the principal 4-digit
# equivalences for the priority sectors.
#
# match_quality:
#   - "identical"   : codes are literally the same (most 2-digit Divisions)
#   - "one_to_one"  : 1:1 at 4-digit with identical scope
#   - "split"       : ISIC 4-digit splits into multiple NACE 4-digit codes
#   - "merge"       : several ISIC 4-digit codes merge into a single NACE code
#
# Source: Eurostat correspondence tables (RAMON), NACE Rev.2 Introductory Guide.
# License: Public / attribution.
# ---------------------------------------------------------------------------
metadata:
  from_system: "isic"
  from_revision: "Rev.4"
  to_system: "nace"
  to_revision: "Rev.2"
  source: "Eurostat RAMON correspondence tables"
  license: "Public / attribution"

