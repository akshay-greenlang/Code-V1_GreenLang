# ---------------------------------------------------------------------------
# ISIC Rev.4 <-> NAICS 2022 crosswalk
# ---------------------------------------------------------------------------
# NAICS is production-oriented while ISIC is activity-oriented, so the match
# is never perfectly 1:1 even at Section level. This file lists the principal
# correspondence at 4-digit ISIC -> 6-digit NAICS for priority sectors.
#
# match_quality:
#   - "identical"   : conceptual match is complete
#   - "primary"     : NAICS code is the best single match (most coverage)
#   - "split"       : ISIC class maps to multiple NAICS codes
#   - "partial"     : only part of the ISIC scope is covered by this NAICS code
#
# Source: U.S. Census Bureau concordance tables + UNSD crosswalks.
# License: Public domain.
# ---------------------------------------------------------------------------
metadata:
  from_system: "isic"
  from_revision: "Rev.4"
  to_system: "naics"
  to_revision: "2022"
  source: "US Census Bureau / UNSD"
  license: "Public domain"

