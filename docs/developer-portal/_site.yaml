    - concepts/licensing-classes.md
  cookbook/scope-2-location-vs-market.md:
    - concepts/method-packs.md
  cookbook/freight-wtw-vs-ttw.md:
    - concepts/method-packs.md
  cookbook/refrigerant-gwp-selection.md:
    - concepts/gas-breakdown-vs-co2e.md
  cookbook/product-carbon-pact-export.md:
    - concepts/method-packs.md
  cookbook/financed-emissions-pcaf.md:
    - concepts/method-packs.md

# Canonical header names the portal documents.
canonical_headers:
  edition_pin_request: X-Factors-Edition
  edition_pin_response_primary: X-GreenLang-Edition
  edition_pin_response_legacy: X-Factors-Edition
  method_profile_response: X-GreenLang-Method-Profile
  receipt_signature: X-GreenLang-Receipt-Signature
  receipt_algorithm: X-GreenLang-Receipt-Algorithm
  receipt_key_id: X-GreenLang-Receipt-Key-Id
  receipt_signed_at: X-GreenLang-Receipt-Signed-At
  receipt_payload_hash: X-GreenLang-Receipt-Hash
  rate_limit: X-RateLimit-Limit
  rate_remaining: X-RateLimit-Remaining
  rate_reset: X-RateLimit-Reset
  retry_after: Retry-After
