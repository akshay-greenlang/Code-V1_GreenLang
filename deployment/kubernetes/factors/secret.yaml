apiVersion: v1
kind: Secret
metadata:
  name: factors-secrets
  namespace: greenlang-factors
  labels:
    app: factors-service
type: Opaque
# Values should be base64-encoded. These are placeholders for external secrets operator.
stringData:
  database-url: "postgresql://factors:CHANGEME@postgres:5432/greenlang_factors"
  redis-url: "redis://:CHANGEME@redis:6379/2"
  jwt-secret: "CHANGEME"
  slack-webhook-url: ""
  # Licensed connector keys (resolved from Vault/ExternalSecrets in production)
  iea-license-key: ""
  ecoinvent-license-key: ""
  electricity-maps-api-key: ""
