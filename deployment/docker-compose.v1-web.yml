version: "3.9"

services:
  greenlang-v1-web:
    image: python:3.11-slim
    container_name: greenlang-v1-web
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: >
      sh -c "pip install --upgrade pip &&
             pip install -e /workspace &&
             pip install -e /workspace/cbam-pack-mvp[web] &&
             uvicorn cbam_pack.web.app:create_app --factory --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      GREENLANG_WEB_VERSION: "v1-quarter-fix"
      GL_V1_ALLOW_BACKEND_FALLBACK: "1"
      # Optional security hardening:
      # CBAM_API_KEY: "replace-with-strong-token"
    restart: unless-stopped
