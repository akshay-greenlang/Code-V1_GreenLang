---
# Remap Vault paths to the prod tree.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-api-secrets
  namespace: greenlang-factors
spec:
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: factors/prod/jwt
        property: secret
    - secretKey: api_keys_csv
      remoteRef:
        key: factors/prod/api_keys
        property: csv
    - secretKey: factors_signing_secret
      remoteRef:
        key: factors/prod/signing
        property: hmac_secret
    - secretKey: factors_ed25519_private_key
      remoteRef:
        key: factors/prod/signing
        property: ed25519_private_key
    - secretKey: database_url
      remoteRef:
        key: factors/prod/postgres
        property: dsn
    - secretKey: redis_url
      remoteRef:
        key: factors/prod/redis
        property: url
    - secretKey: openai_api_key
      remoteRef:
        key: factors/prod/vendor
        property: openai_api_key
    - secretKey: anthropic_api_key
      remoteRef:
        key: factors/prod/vendor
        property: anthropic_api_key
    - secretKey: stripe_api_key
      remoteRef:
        key: factors/prod/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: factors/prod/stripe
        property: webhook_secret
