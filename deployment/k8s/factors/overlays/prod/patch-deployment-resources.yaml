---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factors-api
  namespace: greenlang-factors
spec:
  template:
    spec:
      containers:
        - name: factors-api
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          args:
            - uvicorn
            - greenlang.integration.api.main:app
            - --host=0.0.0.0
            - --port=8080
            - --workers=4
            - --access-log
            - --proxy-headers
