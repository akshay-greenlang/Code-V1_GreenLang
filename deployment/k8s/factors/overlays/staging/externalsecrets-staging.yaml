---
# =============================================================================
# ExternalSecrets — factors-staging (Vault-backed)
# =============================================================================
# Vault mount path: kv/factors/staging/
#
# Assumes a ClusterSecretStore named `vault-staging` already exists in the
# cluster, configured to authenticate the factors-staging namespace against
# the `kv` v2 secrets engine in Vault. If it does not, create it per the
# runbook (deployment/runbooks/factors_incidents.md — "Vault prerequisites").
#
# Each ExternalSecret projects one or more keys from Vault into a Kubernetes
# Secret of the same name, which the base Deployment mounts via
# `envFrom: secretRef:`. NO secret material ever appears in a manifest file.
#
# Rotation policy (enforced by Vault + cron, not by this file):
#   STRIPE_API_KEY                : 180 days  (test-mode in staging)
#   SIGNING_KEY_ED25519_PRIV/PUB  : 180 days  (coordinate verifier clients)
#   DB_URL                        : 30 days   (Vault-agent rotates RDS password)
#   REDIS_URL                     : 90 days
#   JWT_SECRET                    : 90 days
#   WEBHOOK_HMAC_SECRET           : 90 days
# =============================================================================

# --- Unified application secret (envFrom target) ---------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-api-secrets
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-staging
    kind: ClusterSecretStore
  target:
    name: factors-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Database / cache
        DATABASE_URL: "{{ .db_url }}"
        DB_URL: "{{ .db_url }}"
        REDIS_URL: "{{ .redis_url }}"

        # Auth
        JWT_SECRET: "{{ .jwt_secret }}"
        GL_JWT_SECRET: "{{ .jwt_secret }}"
        WEBHOOK_HMAC_SECRET: "{{ .webhook_hmac_secret }}"
        GL_FACTORS_SIGNING_SECRET: "{{ .webhook_hmac_secret }}"

        # Ed25519 signing (public + private)
        SIGNING_KEY_ED25519_PRIV: "{{ .signing_ed25519_priv }}"
        GL_FACTORS_ED25519_PRIVATE_KEY: "{{ .signing_ed25519_priv }}"
        SIGNING_KEY_ED25519_PUB: "{{ .signing_ed25519_pub }}"
        GL_FACTORS_ED25519_PUBLIC_KEY: "{{ .signing_ed25519_pub }}"
        SIGNING_KEY_ROTATED_AT: "{{ .signing_rotated_at }}"
        SIGNING_KEY_NEXT_ROTATION_AT: "{{ .signing_next_rotation_at }}"

        # Stripe (test mode in staging)
        STRIPE_API_KEY: "{{ .stripe_api_key }}"
        STRIPE_WEBHOOK_SECRET: "{{ .stripe_webhook_secret }}"
  data:
    - secretKey: db_url
      remoteRef:
        key: kv/factors/staging/db
        property: url
    - secretKey: redis_url
      remoteRef:
        key: kv/factors/staging/redis
        property: url
    - secretKey: jwt_secret
      remoteRef:
        key: kv/factors/staging/jwt
        property: secret
    - secretKey: webhook_hmac_secret
      remoteRef:
        key: kv/factors/staging/webhooks
        property: hmac_secret
    - secretKey: signing_ed25519_priv
      remoteRef:
        key: kv/factors/staging/signing
        property: ed25519_priv
    - secretKey: signing_ed25519_pub
      remoteRef:
        key: kv/factors/staging/signing
        property: ed25519_pub
    - secretKey: signing_rotated_at
      remoteRef:
        key: kv/factors/staging/signing
        property: rotated_at
    - secretKey: signing_next_rotation_at
      remoteRef:
        key: kv/factors/staging/signing
        property: next_rotation_at
    - secretKey: stripe_api_key
      remoteRef:
        key: kv/factors/staging/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: kv/factors/staging/stripe
        property: webhook_secret

---
# --- Standalone ExternalSecret per sensitive key -------------------------
# Some tooling (SBOM, policy review, audit logs) lists ExternalSecret
# resources by name to confirm coverage. Emitting per-key resources makes
# the Vault → Kubernetes mapping explicit and auditable.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-signing-ed25519
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: vault-staging
    kind: ClusterSecretStore
  target:
    name: factors-signing-ed25519
    creationPolicy: Owner
  data:
    - secretKey: ed25519_priv
      remoteRef:
        key: kv/factors/staging/signing
        property: ed25519_priv
    - secretKey: ed25519_pub
      remoteRef:
        key: kv/factors/staging/signing
        property: ed25519_pub

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-stripe
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: vault-staging
    kind: ClusterSecretStore
  target:
    name: factors-stripe
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: kv/factors/staging/stripe
        property: api_key
    - secretKey: webhook_secret
      remoteRef:
        key: kv/factors/staging/stripe
        property: webhook_secret
