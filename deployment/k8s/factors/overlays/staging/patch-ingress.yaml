---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factors-api
  namespace: greenlang-factors
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  tls:
    - hosts:
        - staging.greenlang.io
      secretName: factors-api-tls-staging
  rules:
    - host: staging.greenlang.io
      http:
        paths:
          - path: /api/v1/factors
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
          - path: /api/v1/health
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
          - path: /api/v1/editions
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
          - path: /api/v1/calculate
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
          - path: /api/v1/dashboards
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
          - path: /api/v1/marketplace
            pathType: Prefix
            backend:
              service:
                name: factors-api
                port:
                  number: 8080
