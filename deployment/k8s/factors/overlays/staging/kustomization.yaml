---
# =============================================================================
# GreenLang Factors API — Staging overlay (DEP1)
# =============================================================================
# Target cluster : greenlang-staging (EKS us-east-1)
# Target namespace: factors-staging   (isolated from greenlang-factors prod)
# Public host     : factors-staging.greenlang.com
#
# This overlay intentionally deviates from the legacy overlay shape so the
# staging tenant is fully isolated from prod:
#   * distinct namespace          (factors-staging)
#   * distinct name prefix         (staging-*)
#   * distinct Vault mount         (kv/factors/staging/*)
#   * distinct Postgres / Redis    (ExternalSecret DB_URL / REDIS_URL)
#   * distinct signing key pair    (ed25519; never shared with prod)
#
# Render (dry-run):
#   kubectl kustomize deployment/k8s/factors/overlays/staging
#
# Apply (SRE only — developers invoke deploy-staging.sh):
#   kubectl apply -k deployment/k8s/factors/overlays/staging \
#     --server-side --force-conflicts
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: factors-staging

namePrefix: staging-

commonLabels:
  env: staging
  app.kubernetes.io/instance: factors-staging

commonAnnotations:
  greenlang.io/env: staging
  greenlang.io/vault-path: kv/factors/staging

resources:
  - externalsecrets-staging.yaml

patches:
  - path: hpa-patch.yaml
  - path: configmap-patch.yaml
  - path: ingressroute-patch.yaml

images:
  - name: ghcr.io/greenlang/factors-api
    newTag: staging
