---
# Remap Vault paths to the staging tree. The base file already uses
# factors/staging/* — this patch is a no-op in staging but kept for
# symmetry with the prod overlay (which flips to factors/prod/*).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-api-secrets
  namespace: greenlang-factors
spec:
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: factors/staging/jwt
        property: secret
    - secretKey: api_keys_csv
      remoteRef:
        key: factors/staging/api_keys
        property: csv
    - secretKey: factors_signing_secret
      remoteRef:
        key: factors/staging/signing
        property: hmac_secret
    - secretKey: factors_ed25519_private_key
      remoteRef:
        key: factors/staging/signing
        property: ed25519_private_key
    - secretKey: database_url
      remoteRef:
        key: factors/staging/postgres
        property: dsn
    - secretKey: redis_url
      remoteRef:
        key: factors/staging/redis
        property: url
    - secretKey: openai_api_key
      remoteRef:
        key: factors/staging/vendor
        property: openai_api_key
    - secretKey: anthropic_api_key
      remoteRef:
        key: factors/staging/vendor
        property: anthropic_api_key
    - secretKey: stripe_api_key
      remoteRef:
        key: factors/staging/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: factors/staging/stripe
        property: webhook_secret
