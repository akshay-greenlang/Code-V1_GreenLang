---
# =============================================================================
# ExternalSecrets - factors-production (Vault-backed)
# =============================================================================
# Vault mount path: kv/factors/production/
# ClusterSecretStore `vault-production` must exist in the cluster.
# Rotation cadence enforced by Vault policy:
#   JWT_SECRET                    : 60 days
#   WEBHOOK_HMAC_SECRET           : 60 days
#   SIGNING_KEY_ED25519_PRIV/PUB  : 180 days
#   DB_URL                        : 30 days (RDS password rotation)
#   REDIS_URL                     : 90 days
#   STRIPE_API_KEY                : 180 days
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-api-secrets
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-production
    kind: ClusterSecretStore
  target:
    name: factors-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        DATABASE_URL: "{{ .db_url }}"
        DB_URL: "{{ .db_url }}"
        REDIS_URL: "{{ .redis_url }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        GL_JWT_SECRET: "{{ .jwt_secret }}"
        WEBHOOK_HMAC_SECRET: "{{ .webhook_hmac_secret }}"
        GL_FACTORS_SIGNING_SECRET: "{{ .webhook_hmac_secret }}"
        SIGNING_KEY_ED25519_PRIV: "{{ .signing_ed25519_priv }}"
        GL_FACTORS_ED25519_PRIVATE_KEY: "{{ .signing_ed25519_priv }}"
        SIGNING_KEY_ED25519_PUB: "{{ .signing_ed25519_pub }}"
        GL_FACTORS_ED25519_PUBLIC_KEY: "{{ .signing_ed25519_pub }}"
        STRIPE_API_KEY: "{{ .stripe_api_key }}"
        STRIPE_WEBHOOK_SECRET: "{{ .stripe_webhook_secret }}"
  data:
    - secretKey: db_url
      remoteRef:
        key: kv/factors/production/db
        property: url
    - secretKey: redis_url
      remoteRef:
        key: kv/factors/production/redis
        property: url
    - secretKey: jwt_secret
      remoteRef:
        key: kv/factors/production/jwt
        property: secret
    - secretKey: webhook_hmac_secret
      remoteRef:
        key: kv/factors/production/webhooks
        property: hmac_secret
    - secretKey: signing_ed25519_priv
      remoteRef:
        key: kv/factors/production/signing
        property: ed25519_priv
    - secretKey: signing_ed25519_pub
      remoteRef:
        key: kv/factors/production/signing
        property: ed25519_pub
    - secretKey: stripe_api_key
      remoteRef:
        key: kv/factors/production/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: kv/factors/production/stripe
        property: webhook_secret
