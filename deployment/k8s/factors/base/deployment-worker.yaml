apiVersion: apps/v1
kind: Deployment
metadata:
  name: factors-worker-watch
  namespace: greenlang-factors
  labels:
    app.kubernetes.io/name: factors-worker
    app.kubernetes.io/component: worker
    greenlang.io/worker-mode: watch
  annotations:
    # Long-running watch streamer. The daily batch watch runs as a CronJob
    # (deployment/k8s/factors-watch-cronjob.yaml); this Deployment keeps a
    # single watcher hot for near-real-time source notifications.
    greenlang.io/cronjob-sibling: factors-watch-daily
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: factors-worker
      greenlang.io/worker-mode: watch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factors-worker
        app.kubernetes.io/component: worker
        greenlang.io/worker-mode: watch
    spec:
      serviceAccountName: factors-api
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/greenlang/factors-api:staging
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKER_MODE
              value: "watch"
          envFrom:
            - configMapRef:
                name: factors-worker-env
            - secretRef:
                name: factors-api-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/greenlang
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
