---
apiVersion: v1
kind: Service
metadata:
  name: factors-api
  namespace: greenlang-factors
  labels:
    app.kubernetes.io/name: factors-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: factors-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
---
# Headless service for Prometheus ServiceMonitor scraping.
apiVersion: v1
kind: Service
metadata:
  name: factors-api-metrics
  namespace: greenlang-factors
  labels:
    app.kubernetes.io/name: factors-api
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: factors-api
    app.kubernetes.io/component: api
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
