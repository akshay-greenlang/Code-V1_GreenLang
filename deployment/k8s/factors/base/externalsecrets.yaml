---
# ExternalSecret wiring per SEC-006 (Vault + External Secrets Operator).
# Vault path convention:   secret/factors/{{stage}}/...
# The {{stage}} placeholder ("staging" or "prod") is substituted per-overlay
# by the Kustomize patch `externalsecrets-stage.yaml`.
#
# Rotation cadence (set in Vault policy, enforced by cron):
#   jwt-secret               : 90 days
#   factors-signing-secret   : 90 days
#   factors-ed25519-key      : 180 days  (coordinate with verifier clients)
#   database DSN password    : 30 days   (RDS IAM / vault-agent rotation)
#   openai / anthropic keys  : 180 days
#   stripe keys              : 180 days  (staging uses test mode)

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-factors
  namespace: greenlang-factors
spec:
  provider:
    vault:
      server: https://vault.security.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: factors-api
          serviceAccountRef:
            name: factors-api
      caProvider:
        type: ConfigMap
        name: vault-ca
        namespace: security
        key: ca.crt

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: factors-api-secrets
  namespace: greenlang-factors
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-factors
    kind: SecretStore
  target:
    name: factors-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Exact env-var names as read by greenlang/integration/api/main.py
        GL_JWT_SECRET: "{{ .jwt_secret }}"
        # Legacy alias — some SEC-001 middleware modules read JWT_SECRET.
        # Keep both set until the middleware migration is complete.
        JWT_SECRET: "{{ .jwt_secret }}"
        GL_API_KEYS: "{{ .api_keys_csv }}"
        GL_FACTORS_SIGNING_SECRET: "{{ .factors_signing_secret }}"
        GL_FACTORS_ED25519_PRIVATE_KEY: "{{ .factors_ed25519_private_key }}"
        DATABASE_URL: "{{ .database_url }}"
        REDIS_URL: "{{ .redis_url }}"
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key }}"
        STRIPE_API_KEY: "{{ .stripe_api_key }}"
        STRIPE_WEBHOOK_SECRET: "{{ .stripe_webhook_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: factors/staging/jwt
        property: secret
    - secretKey: api_keys_csv
      remoteRef:
        key: factors/staging/api_keys
        property: csv
    - secretKey: factors_signing_secret
      remoteRef:
        key: factors/staging/signing
        property: hmac_secret
    - secretKey: factors_ed25519_private_key
      remoteRef:
        key: factors/staging/signing
        property: ed25519_private_key
    - secretKey: database_url
      remoteRef:
        key: factors/staging/postgres
        property: dsn
    - secretKey: redis_url
      remoteRef:
        key: factors/staging/redis
        property: url
    - secretKey: openai_api_key
      remoteRef:
        key: factors/staging/vendor
        property: openai_api_key
    - secretKey: anthropic_api_key
      remoteRef:
        key: factors/staging/vendor
        property: anthropic_api_key
    - secretKey: stripe_api_key
      remoteRef:
        key: factors/staging/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: factors/staging/stripe
        property: webhook_secret
