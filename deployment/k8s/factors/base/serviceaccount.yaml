---
# ServiceAccount used by both the API deployment and worker deployments.
# IRSA annotation is patched by the overlay (staging vs prod IAM role).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: factors-api
  namespace: greenlang-factors
  annotations:
    # Patched per-environment in overlays (eks.amazonaws.com/role-arn)
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/greenlang-factors-placeholder
automountServiceAccountToken: true
