apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "greenlang-factors.fullname" . }}-config
  labels:
    {{- include "greenlang-factors.labels" . | nindent 4 }}
data:
  GL_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  GL_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  APP_PORT: {{ .Values.config.appPort | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  WORKERS: {{ .Values.config.workers | quote }}
  TIER_COMMUNITY_RATE_LIMIT: {{ .Values.ingress.rateLimits.community.requestsPerDay | quote }}
  TIER_PRO_RATE_LIMIT: {{ .Values.ingress.rateLimits.pro.requestsPerDay | quote }}
  TIER_ENTERPRISE_RATE_LIMIT: {{ .Values.ingress.rateLimits.enterprise.requestsPerDay | quote }}
