apiVersion: v1
kind: Service
metadata:
  name: {{ include "greenlang-factors.fullname" . }}
  labels:
    {{- include "greenlang-factors.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "greenlang-factors.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
