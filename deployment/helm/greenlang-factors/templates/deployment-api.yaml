apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "greenlang-factors.fullname" . }}-api
  labels:
    {{- include "greenlang-factors.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "greenlang-factors.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "greenlang-factors.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "greenlang-factors.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.appPort }}
            - name: metrics
              containerPort: {{ .Values.config.metricsPort }}
          envFrom:
            - configMapRef:
                name: {{ include "greenlang-factors.fullname" . }}-config
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ include "greenlang-factors.fullname" . }}-secrets
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v1/factors/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/factors/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/greenlang
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
