{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "greenlang-factors.fullname" . }}-secrets
  labels:
    {{- include "greenlang-factors.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "greenlang-factors.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.databaseUrl }}
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.redisUrl }}
    - secretKey: JWT_SIGNING_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.keys.jwtSigningKey }}
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.keys.s3AccessKey }}
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.keys.s3SecretKey }}
{{- end }}
