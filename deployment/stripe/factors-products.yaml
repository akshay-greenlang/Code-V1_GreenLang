# =============================================================================
# GreenLang Factors FY27 — Stripe product + price catalog
# =============================================================================
#
# This file is the **declarative mirror** of
# ``greenlang/factors/billing/skus.py``. Every product / price / meter entry
# here maps 1:1 to a Python dataclass in that module. The provisioning
# script (``scripts/factors_stripe_provision.py``) loads this YAML, creates
# or updates the corresponding Stripe resources, and writes the resulting
# IDs to ``stripe_catalog_lockfile.json`` for runtime lookup.
#
# Conventions
# -----------
#   * ``id`` fields are GreenLang-owned Stripe IDs; they follow
#     ``prod_factors_<scope>`` and ``price_factors_<scope>_<cadence>``.
#   * ``currency`` is USD everywhere in v1. Multi-currency lives behind
#     a feature flag and is not provisioned here.
#   * ``amount_usd`` is a string so Decimal round-trips are safe.
#   * Meter amounts are unit prices (per API call / per row / per MB).
#   * Annual prices are raw ACV floors; PRD sect. 7.2 defines the band.
#
# See also: docs/product/PRD-FY27-Factors.md sect. 7.
# =============================================================================

version: 1
currency: usd

# ---------------------------------------------------------------------------
# Tier products — one product per subscription plan, with monthly + annual
# recurring prices and per-meter overage prices.
# ---------------------------------------------------------------------------
tiers:

  # ------------------------------ Community ------------------------------
  - tier: community
    product:
      id: prod_factors_community
      name: "GreenLang Factors — Community"
      description: >
        Free developer tier. 1,000 API calls/month, Certified factors only,
        no premium packs, no audit bundle.
      metadata:
        tier: community
        gl_product_family: factors
    prices:
      - id: price_factors_community_monthly
        nickname: "Community monthly"
        amount_usd: "0.00"
        recurring:
          interval: month
          usage_type: licensed
      - id: price_factors_community_annual
        nickname: "Community annual"
        amount_usd: "0.00"
        recurring:
          interval: year
          usage_type: licensed
    meters:
      # Community hard-stops at its quota, so overage prices are zero.
      - meter: api_calls
        price_id: price_factors_meter_api_calls_community
        included_per_month: 1000
        overage_unit_price_usd: "0"
        unit_label: "API call"
      - meter: batch_rows
        price_id: price_factors_meter_batch_rows_community
        included_per_month: 1000
        overage_unit_price_usd: "0"
        unit_label: "row"

  # -------------------------------- Pro ----------------------------------
