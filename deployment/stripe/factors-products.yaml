# ---------------------------------------------------------------------------
# Feature flags (Stripe "entitlements" — Product Features API). These
# back-fill the Pricing Table UI in Stripe Checkout and the customer
# portal, so a finance analyst can see at a glance what the tier unlocks.
# ---------------------------------------------------------------------------
feature_flags:
  - id: feat_factors_preview
    name: "Preview factors"
    applies_to_tiers: [pro, consulting, platform, enterprise]
  - id: feat_factors_connector_only
    name: "Connector-only factors"
    applies_to_tiers: [enterprise]
  - id: feat_factors_audit_bundle
    name: "Audit bundle export"
    applies_to_tiers: [consulting, platform, enterprise]
  - id: feat_factors_bulk_export
    name: "Bulk export"
    applies_to_tiers: [pro, consulting, platform, enterprise]
  - id: feat_factors_private_registry
    name: "Private registry / tenant overlay"
    applies_to_tiers: [pro, consulting, platform, enterprise]
  - id: feat_factors_oem_embed
    name: "OEM white-label embed"
    applies_to_tiers: [platform, enterprise]
  - id: feat_factors_sso_scim
    name: "SSO / SCIM"
    applies_to_tiers: [enterprise]
  - id: feat_factors_signed_ed25519
    name: "Ed25519 signed receipts"
    applies_to_tiers: [consulting, platform, enterprise]
