        included_per_month: 100000
        overage_unit_price_usd: "0.002"
        unit_label: "API call"
      - meter: batch_rows
        price_id: price_factors_meter_batch_rows_pro
        included_per_month: 100000
        overage_unit_price_usd: "0.0005"
        unit_label: "row"
      - meter: private_registry_mb
