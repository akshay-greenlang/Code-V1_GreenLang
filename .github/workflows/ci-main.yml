# GreenLang Main CI Pipeline
#
# Current master gate for the active release profile. The full monorepo
# contains future-scope products and archived code, so this workflow gates the
# supported v0.1 alpha Factors surface plus package build/installability.

name: CI Main

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"
  PYTHON_VERSION: "3.11"

jobs:
  alpha-quality:
    name: Alpha Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install quality dependencies
        run: |
          python -m pip install -U pip
          pip install ruff

      - name: Ruff check active alpha files
        run: |
          ruff check \
            greenlang/factors/rights \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/source_registry.py \
            tests/factors/v0_1_alpha/test_source_rights_phase1_followups.py \
            tests/factors/v0_1_alpha/test_source_rights_service.py \
            --select E,F,W \
            --ignore E501

      - name: Compile active alpha modules
        run: |
          python -m compileall -q \
            greenlang/factors/rights \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/source_registry.py \
            scripts/check_magic_numbers.py

      - name: Magic-number report
        run: |
          python scripts/check_magic_numbers.py greenlang/factors --exclude tests --exclude __pycache__ --json-output magic-numbers.json

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpha-quality-report
          path: magic-numbers.json
          if-no-files-found: warn
          retention-days: 7

  alpha-tests:
    name: v0.1 Alpha Test Suite
    runs-on: ubuntu-latest
    needs: [alpha-quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install alpha test dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[factors-test]"

      - name: Run v0.1 alpha suite
        run: |
          pytest tests/factors/v0_1_alpha -q \
            --junitxml=test-results/junit-alpha.xml

      - name: Upload alpha test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpha-test-results
          path: test-results/junit-alpha.xml
          if-no-files-found: warn
          retention-days: 7

  build-and-validate:
    name: Build & Validate Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: python -m pip install -U pip build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Validate source distribution
        run: twine check dist/*.tar.gz

      - name: Test source distribution installation in clean env
        shell: bash
        run: |
          python -m venv test_venv
          source test_venv/bin/activate
          pip install dist/*.tar.gz
          python -c "import greenlang; print(greenlang.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/
          retention-days: 7

  ci-gate:
    name: CI Gate Check
    runs-on: ubuntu-latest
    needs: [alpha-quality, alpha-tests, build-and-validate]
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.alpha-quality.result }}" != "success" ]]; then
            echo "::error::Alpha quality failed"
            exit 1
          fi
          if [[ "${{ needs.alpha-tests.result }}" != "success" ]]; then
            echo "::error::Alpha tests failed"
            exit 1
          fi
          if [[ "${{ needs.build-and-validate.result }}" != "success" ]]; then
            echo "::error::Build and validate failed"
            exit 1
          fi
          echo "All CI gates passed"
