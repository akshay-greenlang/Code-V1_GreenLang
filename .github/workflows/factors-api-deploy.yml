---
# =============================================================================
# Factors API — Build, Test, Deploy
# =============================================================================
# Triggers:
#   - push to main       -> auto deploy to staging
#   - workflow_dispatch  -> manual deploy to prod (2-approver GitHub env gate)
#
# Stages:
#   lint-test -> build-image -> sbom-sign -> deploy-staging -> smoke-staging
#                                        -> gate-prod -> deploy-prod -> smoke-prod
#                                        -> rollback-on-failure (any stage)
# =============================================================================

name: factors-api-deploy

on:
  push:
    branches:
      - main
    paths:
      - "greenlang/integration/api/**"
      - "greenlang/factors/**"
      - "deployment/docker/Dockerfile.factors-service"
      - "deployment/k8s/factors/**"
      - ".github/workflows/factors-api-deploy.yml"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deploy target (staging or prod)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      skip_tests:
        description: "Skip lint-test (emergency hotfix only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: factors-api-deploy-${{ github.ref }}-${{ github.event.inputs.stage || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: greenlang/factors-api
  AWS_REGION: us-east-1

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: read
  deployments: write

jobs:
  # ==================== 1. lint-test ====================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,data,security,test]"

      - name: Ruff lint
        run: |
          pip install ruff==0.5.5
          ruff check greenlang/integration/api greenlang/factors tests/factors

      - name: Pytest with coverage gate (85%)
        env:
          GL_ENV: test
          GL_JWT_SECRET: unit-test-secret
        run: |
          pytest tests/factors/ \
            -v \
            --cov=greenlang/factors \
            --cov=greenlang/integration/api \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=85 \
            --junitxml=pytest.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            pytest.xml

  # ==================== 2. build-image ====================
  build-image:
    name: Build Multi-Arch Image
    runs-on: ubuntu-latest
    needs: [lint-test]
    if: ${{ always() && (needs.lint-test.result == 'success' || github.event.inputs.skip_tests == 'true') }}
    timeout-minutes: 30
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=${{ github.event.inputs.stage || 'staging' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push (production target)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.factors-service
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=factors-api
          cache-to: type=gha,scope=factors-api,mode=max
          provenance: true

      - name: Build & push (worker target)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.factors-service
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ github.event.inputs.stage || 'staging' }}
          cache-from: type=gha,scope=factors-worker
          cache-to: type=gha,scope=factors-worker,mode=max

  # ==================== 3. sbom-sign ====================
  sbom-sign:
    name: SBOM & Cosign
    runs-on: ubuntu-latest
    needs: [build-image]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          syft "$IMAGE" -o spdx-json > factors-api.sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: factors-api-sbom
          path: factors-api.sbom.spdx.json

      - name: Cosign sign image (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image_digest }}"
          cosign sign --yes "$IMAGE"

      - name: Cosign attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image_digest }}"
          cosign attest --yes \
            --predicate factors-api.sbom.spdx.json \
            --type spdxjson \
            "$IMAGE"

  # ==================== 4. deploy-staging ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-image, sbom-sign]
    if: ${{ github.ref == 'refs/heads/main' || github.event.inputs.stage == 'staging' }}
    environment:
      name: factors-staging
      url: https://staging.greenlang.io/api/v1/health
    timeout-minutes: 20
    outputs:
      previous_revision: ${{ steps.capture.outputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (staging EKS)
        run: |
          aws eks update-kubeconfig \
            --name greenlang-staging \
            --region ${{ env.AWS_REGION }}

      - name: Capture current revision (for rollback)
        id: capture
        run: |
          REV=$(kubectl -n greenlang-factors rollout history deploy/factors-api \
                  --revision=0 2>/dev/null | tail -n 1 | awk '{print $1}' || echo "0")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"

      - name: Set image tag to current SHA
        working-directory: deployment/k8s/factors/overlays/staging
        run: |
          kustomize edit set image \
            ghcr.io/greenlang/factors-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Kustomize dry-run
        run: |
          kubectl kustomize deployment/k8s/factors/overlays/staging \
            | kubectl apply --dry-run=client -f -

      - name: Apply
        run: |
          kubectl kustomize deployment/k8s/factors/overlays/staging \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n greenlang-factors rollout status \
            deploy/factors-api --timeout=10m

      - name: Inline smoke (health + coverage)
        run: |
          kubectl -n greenlang-factors run curl-smoke-$RANDOM \
            --rm -i --restart=Never \
            --image=curlimages/curl:8.7.1 -- \
            sh -c 'curl -fsS http://factors-api.greenlang-factors.svc.cluster.local:8080/api/v1/health \
                    && curl -fsS http://factors-api.greenlang-factors.svc.cluster.local:8080/api/v1/stats/coverage'

  # ==================== 5. smoke-staging ====================
  smoke-staging:
    name: Smoke — Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          pip install pytest==8.2.0 httpx==0.27.0 pyjwt==2.8.0

      - name: Run staging smoke
        env:
          GL_FACTORS_STAGING_URL: https://staging.greenlang.io
          GL_FACTORS_STAGING_JWT: ${{ secrets.FACTORS_STAGING_SMOKE_JWT }}
          GL_FACTORS_STAGING_APIKEY: ${{ secrets.FACTORS_STAGING_SMOKE_APIKEY }}
        run: |
          pytest tests/factors/smoke/test_staging.py -v --maxfail=1

  # ==================== 6. gate-prod (2-approver) ====================
  gate-prod:
    name: Prod Approval Gate
    runs-on: ubuntu-latest
    needs: [smoke-staging]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'prod' }}
    environment:
      # Configure this environment in GitHub Settings -> Environments:
      #   - Required reviewers: 2 people
      #   - Wait timer: 0
      #   - Deployment branches: main only
      name: factors-prod-gate
    steps:
      - name: Announce gate
        run: |
          echo "Waiting for 2 approvers on the factors-prod-gate environment."

  # ==================== 7. deploy-prod ====================
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [gate-prod]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'prod' }}
    environment:
      name: factors-prod
      url: https://factors.greenlang.io/api/v1/health
    timeout-minutes: 25
    outputs:
      previous_revision: ${{ steps.capture.outputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (prod EKS)
        run: |
          aws eks update-kubeconfig \
            --name greenlang-prod \
            --region ${{ env.AWS_REGION }}

      - name: Capture current revision (for rollback)
        id: capture
        run: |
          REV=$(kubectl -n greenlang-factors rollout history deploy/factors-api \
                  --revision=0 2>/dev/null | tail -n 1 | awk '{print $1}' || echo "0")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"

      - name: Set image tag to current SHA
        working-directory: deployment/k8s/factors/overlays/prod
        run: |
          kustomize edit set image \
            ghcr.io/greenlang/factors-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Kustomize dry-run
        run: |
          kubectl kustomize deployment/k8s/factors/overlays/prod \
            | kubectl apply --dry-run=client -f -

      - name: Apply
        run: |
          kubectl kustomize deployment/k8s/factors/overlays/prod \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n greenlang-factors rollout status \
            deploy/factors-api --timeout=15m

      - name: Prod smoke
        env:
          GL_FACTORS_STAGING_URL: https://factors.greenlang.io
          GL_FACTORS_STAGING_JWT: ${{ secrets.FACTORS_PROD_SMOKE_JWT }}
          GL_FACTORS_STAGING_APIKEY: ${{ secrets.FACTORS_PROD_SMOKE_APIKEY }}
        run: |
          pip install pytest==8.2.0 httpx==0.27.0 pyjwt==2.8.0
          pytest tests/factors/smoke/test_staging.py -v --maxfail=1

      - name: Slack notify (success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: factors-api deployed to prod @ sha-${{ github.sha }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_FACTORS }}"

  # ==================== 8. rollback-on-failure ====================
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-staging, deploy-prod]
    if: ${{ always() && (needs.smoke-staging.result == 'failure' || needs.deploy-prod.result == 'failure') }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.deploy-prod.result == 'failure' && secrets.AWS_ROLE_PROD || secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER=greenlang-staging
          if [[ "${{ needs.deploy-prod.result }}" == "failure" ]]; then
            CLUSTER=greenlang-prod
          fi
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}

      - name: Rollout undo
        run: |
          kubectl -n greenlang-factors rollout undo deploy/factors-api
          kubectl -n greenlang-factors rollout status deploy/factors-api --timeout=10m

      - name: Slack notify (rollback)
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: factors-api rollback executed (sha ${{ github.sha }} failed smoke). Investigate: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_FACTORS }}"
