# Manual DAST scan for deployed environments.
#
# DAST depends on a live target. It is intentionally manual so archive/future
# applications and unavailable staging URLs do not block active alpha PRs.

name: DAST Security Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL to scan, for example https://staging.greenlang.io"
        required: true
        type: string
      scan_type:
        description: "OWASP ZAP scan type"
        required: true
        default: baseline
        type: choice
        options:
          - baseline

permissions:
  contents: read
  security-events: write

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate target
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          if ! echo "$TARGET_URL" | grep -Eq '^https?://'; then
            echo "::error::target_url must start with http:// or https://"
            exit 1
          fi
          echo "Scanning $TARGET_URL"

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          cmd_options: "-a -j -m 5"
          fail_action: true
          allow_issue_writing: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: warn
