name: VCCI Frontend CI

on:
  push:
    branches:
      - main
      - master
      - "release/**"
    paths:
      - "applications/GL-VCCI-Carbon-APP/VCCI-Scope3-Platform/frontend/**"
      - ".github/workflows/vcci-frontend-ci.yml"
  pull_request:
    paths:
      - "applications/GL-VCCI-Carbon-APP/VCCI-Scope3-Platform/frontend/**"
      - ".github/workflows/vcci-frontend-ci.yml"

jobs:
  vcci-frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/GL-VCCI-Carbon-APP/VCCI-Scope3-Platform/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: applications/GL-VCCI-Carbon-APP/VCCI-Scope3-Platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run type-check

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
