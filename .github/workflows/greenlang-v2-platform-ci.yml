name: GreenLang V2 Platform CI

on:
  push:
    branches:
      - main
      - master
      - "release/**"
    paths:
      - "greenlang/v2/**"
      - "greenlang/cli/cmd_v2.py"
      - "applications/**/v2/**"
      - "tests/v2/**"
      - "docs/v2/**"
      - ".github/workflows/greenlang-v2-platform-ci.yml"
  pull_request:
    paths:
      - "greenlang/v2/**"
      - "greenlang/cli/cmd_v2.py"
      - "applications/**/v2/**"
      - "tests/v2/**"
      - "docs/v2/**"
      - ".github/workflows/greenlang-v2-platform-ci.yml"

jobs:
  v2-smoke-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run V2 smoke lane
        run: |
          python -m greenlang.cli.main v2 validate-contracts
          python -m greenlang.cli.main v2 runtime-checks
          python -m greenlang.cli.main v2 agent-checks
          python -m greenlang.cli.main v2 connector-checks
          python -m greenlang.cli.main v2 docs-check
          python -c "from pathlib import Path; from greenlang.v2.agent_lifecycle import validate_agent_registry; r=validate_agent_registry(Path('greenlang/agents/v2_agent_registry.yaml')); print(r.errors); raise SystemExit(1 if not r.ok else 0)"
          python -c "from greenlang.v2.reliability_runtime import validate_connector_registry; r=validate_connector_registry(); print(r.errors); raise SystemExit(1 if not r.ok else 0)"
          python -c "from pathlib import Path; from greenlang.v2.pack_tiers import validate_tier_registry; p=Path('greenlang/ecosystem/packs/v2_tier_registry.yaml'); errs=validate_tier_registry(p); print(errs); raise SystemExit(1 if errs else 0)"
          pytest -q tests/v2/test_contracts.py tests/v2/test_pack_tiers.py tests/v2/test_pack_tier_lifecycle.py tests/v2/test_cli_v2.py tests/v2/test_agent_lifecycle_phase3.py tests/v2/test_connector_reliability_acceptance.py tests/v2/test_phase4_security_determinism.py tests/v2/test_runtime_execution_checks.py tests/v2/test_v2_profile_backend_parity.py tests/v2/test_policy_bundle_semantics.py

  v2-full-gate:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run V2 full gate
        run: |
          pytest -q tests/v2
          python -m greenlang.cli.main v2 agent-checks
          python -m greenlang.cli.main v2 connector-checks
          python -m greenlang.cli.main v2 gate
          python -c "from pathlib import Path; from greenlang.v2.agent_lifecycle import validate_agent_registry; r=validate_agent_registry(Path('greenlang/agents/v2_agent_registry.yaml')); print(r.errors); raise SystemExit(1 if not r.ok else 0)"
          python -c "from greenlang.v2.reliability_runtime import validate_connector_registry; r=validate_connector_registry(); print(r.errors); raise SystemExit(1 if not r.ok else 0)"
          python -c "from pathlib import Path; from greenlang.v2.pack_tiers import validate_tier_registry; p=Path('greenlang/ecosystem/packs/v2_tier_registry.yaml'); errs=validate_tier_registry(p); print(errs); raise SystemExit(1 if errs else 0)"
