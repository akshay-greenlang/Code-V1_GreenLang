# GreenLang Acceptance & Golden Tests
#
# Active master acceptance gate for the current v0.1 alpha release profile.
# Broader product and monorepo acceptance suites remain future-scope until
# their release profiles are promoted.

name: Acceptance & Golden Tests

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"
  PYTHON_VERSION: "3.11"

jobs:
  alpha-acceptance:
    name: v0.1 Alpha Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install alpha test dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[factors-test]"

      - name: Run alpha schema, API, SDK, source, and provenance tests
        run: |
          pytest tests/factors/v0_1_alpha -q \
            --junitxml=test-results/junit-alpha-acceptance.xml

      - name: Upload alpha acceptance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpha-acceptance-results
          path: test-results/junit-alpha-acceptance.xml
          if-no-files-found: warn
          retention-days: 14

  acceptance-gate:
    name: Acceptance Gate Check
    runs-on: ubuntu-latest
    needs: [alpha-acceptance]
    if: always()

    steps:
      - name: Check alpha acceptance passed
        run: |
          if [[ "${{ needs.alpha-acceptance.result }}" != "success" ]]; then
            echo "::error::Alpha acceptance failed"
            exit 1
          fi
          echo "All acceptance tests passed"
