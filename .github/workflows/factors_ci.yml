# GreenLang Factors FY27 reproducible test CI

name: Factors CI (factors-test extras)

on:
  pull_request:
    paths:
      - 'greenlang/factors/**'
      - 'tests/factors/**'
      - 'pyproject.toml'
      - '.github/workflows/factors_ci.yml'
  push:
    branches: [master]
    paths:
      - 'greenlang/factors/**'
      - 'tests/factors/**'
      - 'pyproject.toml'
      - '.github/workflows/factors_ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  factors-alpha-test:
    name: Run v0.1 alpha with [factors-test] extras
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GL_ENV: test
      GL_LOG_LEVEL: WARNING
      GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"
      STRIPE_API_KEY: "test_key_mock"
      STRIPE_WEBHOOK_SECRET: "test_secret_mock"
      GL_FACTORS_SIGNING_SECRET: "test-signing-secret-for-pytest-only-32-chars-min"
      GL_JWT_SECRET: "test-jwt-secret-for-pytest-only-32-chars-min"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Show toolchain
        run: |
          python --version
          pip --version

      - name: Install factors-test extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[factors-test]"

      - name: Run v0.1 alpha tests
        run: |
          pytest tests/factors/v0_1_alpha -q \
            --junitxml=junit-factors-alpha.xml

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factors-alpha-junit-py${{ matrix.python-version }}
          path: junit-factors-alpha.xml
          if-no-files-found: warn
          retention-days: 14
