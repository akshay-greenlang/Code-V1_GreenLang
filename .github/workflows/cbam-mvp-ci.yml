name: CBAM MVP CI

on:
  push:
    paths:
      - "cbam-pack-mvp/**"
      - "greenlang/cli/**"
      - ".github/workflows/cbam-mvp-ci.yml"
  pull_request:
    paths:
      - "cbam-pack-mvp/**"
      - "greenlang/cli/**"
      - ".github/workflows/cbam-mvp-ci.yml"

jobs:
  cbam-mvp-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CBAM package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e "./cbam-pack-mvp[dev,web]"

      - name: Run CBAM tests
        run: |
          pytest -q "cbam-pack-mvp/tests" --cov=cbam_pack --cov-report=term-missing --cov-report=xml

      - name: Run lint and type checks
        run: |
          ruff check "cbam-pack-mvp/src" "cbam-pack-mvp/tests"
          mypy "cbam-pack-mvp/src"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cbam-mvp-coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Run multi-app web contract tests
        run: |
          pytest -q "cbam-pack-mvp/tests" -k "web_"
