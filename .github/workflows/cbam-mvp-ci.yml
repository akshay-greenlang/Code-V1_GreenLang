name: CBAM MVP CI

on:
  push:
    paths:
      - "cbam-pack-mvp/**"
      - "greenlang/cli/**"
      - ".github/workflows/cbam-mvp-ci.yml"
  pull_request:
    paths:
      - "cbam-pack-mvp/**"
      - "greenlang/cli/**"
      - ".github/workflows/cbam-mvp-ci.yml"

jobs:
  cbam-mvp-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CBAM package
        run: |
          python -m pip install --upgrade pip
          pip install -e "./cbam-pack-mvp[dev,web]"

      - name: Run CBAM tests
        run: |
          pytest -q "cbam-pack-mvp/tests"
