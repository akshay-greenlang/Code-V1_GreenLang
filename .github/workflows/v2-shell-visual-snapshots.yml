name: Update V2 shell Playwright snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e "./cbam-pack-mvp[dev,web]"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build shell
        working-directory: frontend
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Update visual snapshots
        working-directory: frontend
        env:
          CI: "true"
          PLAYWRIGHT_PREBUILT: "1"
        run: npx playwright test e2e/visual-shell.spec.ts --update-snapshots
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2-shell-playwright-snapshots
          path: frontend/e2e/visual-shell.spec.ts-snapshots
          if-no-files-found: warn
