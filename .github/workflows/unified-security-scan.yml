# GreenLang scoped security gate.
#
# This workflow gates the active, release-supported surfaces on push/PR.
# Archive, planning, and future-scope application folders are intentionally
# excluded until a release profile promotes them into the supported surface.
# Full-history secret scanning is available on schedule/manual runs only.

name: Unified Security Scan

on:
  workflow_call:
    inputs:
      scan_type:
        required: false
        type: string
        default: all
      full_history:
        required: false
        type: boolean
        default: false

  pull_request:
    branches: [main, master, develop]
    paths:
      - ".github/workflows/unified-security-scan.yml"
      - ".gitleaks.toml"
      - "pyproject.toml"
      - "config/**"
      - "deployment/**"
      - "greenlang/factors/**"
      - "greenlang/cli/**"
      - "greenlang/integration/**"
      - "scripts/**"

  push:
    branches: [main, master]
    paths:
      - ".github/workflows/unified-security-scan.yml"
      - ".gitleaks.toml"
      - "pyproject.toml"
      - "config/**"
      - "deployment/**"
      - "greenlang/factors/**"
      - "greenlang/cli/**"
      - "greenlang/integration/**"
      - "scripts/**"

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scanner to run"
        required: false
        default: all
        type: choice
        options:
          - all
          - dependencies
          - bandit
          - semgrep
          - gitleaks
          - trivy
          - license
          - sbom
      full_history:
        description: "Run full git-history secret scan. Audit-only except manual review."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'dependencies' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install active alpha dependency set
        run: |
          python -m pip install -U pip setuptools
          python -m pip install -e ".[factors-test]"
          python -m pip install pip-audit

      - name: Run pip-audit on installed active environment
        run: |
          python -m pip_audit --format json --output pip-audit-results.json

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: pip-audit-results.json
          if-no-files-found: warn

  bandit-scan:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'bandit' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: python -m pip install -U pip setuptools "bandit[toml,sarif]"

      - name: Run Bandit on active surfaces
        run: |
          bandit -r \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/api_v0_1_alpha_models.py \
            greenlang/factors/factors_app.py \
            greenlang/factors/rights \
            greenlang/factors/source_registry.py \
            greenlang/factors/sdk/python \
            scripts/factors_phase1_migrate_source_registry.py \
            scripts/factors_phase1_approve_v0_1_sources.py \
            -f json -o bandit-results.json \
            --severity-level high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
          if-no-files-found: warn

  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'semgrep' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: python -m pip install -U pip setuptools semgrep

      - name: Run Semgrep on active surfaces
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/api_v0_1_alpha_models.py \
            greenlang/factors/factors_app.py \
            greenlang/factors/rights \
            greenlang/factors/source_registry.py \
            greenlang/factors/sdk/python \
            scripts/factors_phase1_migrate_source_registry.py \
            scripts/factors_phase1_approve_v0_1_sources.py

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: warn

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'gitleaks' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Scan working tree for newly introduced secrets
        run: |
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-git \
            --redact \
            --report-format json \
            --report-path gitleaks-results.json

      - name: Full-history secret scan audit
        if: ${{ github.event_name == 'schedule' || inputs.full_history == true }}
        continue-on-error: true
        run: |
          git fetch --prune --unshallow || true
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --report-format json \
            --report-path gitleaks-history-results.json

      - name: Upload Gitleaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks-results.json
            gitleaks-history-results.json
          if-no-files-found: warn

  trivy-scan:
    name: Trivy Active Filesystem Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'trivy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on active repository surface
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          vuln-type: os,library
          skip-dirs: _archive,applications,docs/planning,frontend,greenlang-normalizer,node_modules

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          if-no-files-found: warn

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || inputs.scan_type == '' || inputs.scan_type == 'all' || inputs.scan_type == 'license' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install active alpha environment
        run: |
          python -m pip install -U pip setuptools
          python -m pip install -e ".[factors-test]"
          python -m pip install pip-licenses

      - name: Check installed package licenses
        run: |
          pip-licenses --format json --output licenses.json
          if grep -iE '"License": ".*(AGPL|GPL-3|SSPL|CC-BY-NC)' licenses.json; then
            echo "::error::Forbidden license detected in active dependency set"
            exit 1
          fi

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          if-no-files-found: warn

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: ${{ inputs.scan_type == 'all' || inputs.scan_type == 'sbom' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate active alpha SBOM
        run: |
          python -m pip install -U pip setuptools
          python -m pip install -e ".[factors-test]"
          python -m pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - dependency-scan
      - bandit-scan
      - semgrep-scan
      - gitleaks-scan
      - trivy-scan
      - license-check
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          failed=0
          for result in \
            "${{ needs.dependency-scan.result }}" \
            "${{ needs.bandit-scan.result }}" \
            "${{ needs.semgrep-scan.result }}" \
            "${{ needs.gitleaks-scan.result }}" \
            "${{ needs.trivy-scan.result }}" \
            "${{ needs.license-check.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more active-surface security jobs failed"
            exit 1
          fi
          echo "Active-surface security gate passed"
