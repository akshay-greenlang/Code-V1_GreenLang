# GreenLang Factors Catalog CI
#
# Active Factors gate for v0.1 alpha. Later-release Factors modules remain in
# the repository but are not release-blocking until their profile is promoted.

name: Factors Catalog CI

on:
  pull_request:
    paths:
      - 'greenlang/factors/**'
      - 'greenlang/data/emission_factor_record.py'
      - 'greenlang/data/emission_factor_database.py'
      - 'tests/factors/**'
      - 'pyproject.toml'
      - '.github/workflows/factors-tests.yml'
  push:
    branches: [master]
    paths:
      - 'greenlang/factors/**'
      - 'tests/factors/**'
      - 'pyproject.toml'
      - '.github/workflows/factors-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Alpha Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install --quiet ruff

      - name: Ruff check active alpha files
        run: |
          ruff check \
            greenlang/factors/rights \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/source_registry.py \
            tests/factors/v0_1_alpha/test_source_rights_phase1_followups.py \
            tests/factors/v0_1_alpha/test_source_rights_service.py \
            --select E,F,W \
            --ignore E501

  unit-test:
    name: v0.1 Alpha Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[factors-test]"

      - name: Run alpha tests
        run: |
          pytest tests/factors/v0_1_alpha -q \
            --junitxml=junit-factors-alpha.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factors-alpha-test-results
          path: junit-factors-alpha.xml
          if-no-files-found: warn
          retention-days: 14

  registry-validation:
    name: Validate Source Registry
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[factors-test]"

      - name: Validate alpha source registry
        run: |
          pytest tests/factors/v0_1_alpha/test_source_registry_alpha_completeness.py -q

  ci-summary:
    name: Factors CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-test, registry-validation]
    if: always()
    steps:
      - name: Check factors gates
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Factors lint failed"
            exit 1
          fi
          if [[ "${{ needs.unit-test.result }}" != "success" ]]; then
            echo "::error::Factors alpha tests failed"
            exit 1
          fi
          if [[ "${{ needs.registry-validation.result }}" != "success" ]]; then
            echo "::error::Factors registry validation failed"
            exit 1
          fi
          echo "Factors v0.1 alpha CI passed"
