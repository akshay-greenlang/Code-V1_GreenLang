name: factors-gold-eval

# =============================================================================
# Public gold-label evaluation gate for the GreenLang Factors service.
# Every PR that touches the matcher, resolution cascade, or the curated
# gold set must clear this gate before we promote a Certified edition.
#
# Python 3.11 base matches .github/workflows/factors-api-deploy.yml so
# the matcher is exercised under the same interpreter as production.
# =============================================================================

on:
  pull_request:
    paths:
      - "greenlang/factors/**"
      - "data/gold_eval/**"
      - "tests/factors/matching/**"
      - ".github/workflows/factors-gold-eval.yml"
      - "scripts/factors_gold_eval_report.py"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: factors-gold-eval-${{ github.ref }}
  cancel-in-progress: true

env:
  TOP1_FLOOR: "0.85"
  TOP5_FLOOR: "0.95"
  MAX_SKIPPED_FRACTION: "0.20"

jobs:
  gold-eval:
    name: Gold-label activity -> factor_id gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Match the factors-api-deploy.yml install profile so the matcher
          # is exercised against the same dependency tree as production.
          pip install -e ".[server,data,security,test]"

      - name: Sanity-check gold-eval files exist
        run: |
          test -f data/gold_eval/activity_to_factor.jsonl
          test -f data/gold_eval/schema.json
          echo "Gold set entry count:"
          wc -l data/gold_eval/activity_to_factor.jsonl

      - name: Run gold-eval pytest (hard gate)
        id: pytest
        run: |
          set -o pipefail
          mkdir -p results
          python -m pytest tests/factors/matching/test_gold_eval.py \
            -v -s --tb=short \
            --junitxml=results/gold_eval.junit.xml \
            | tee results/pytest.log

      - name: Generate per-slice matrix report
        if: always()
        id: matrix
        run: |
          mkdir -p results
          python scripts/factors_gold_eval_report.py \
            --format markdown \
            --out results/matrix.md
          python scripts/factors_gold_eval_report.py \
            --format json \
            --out results/matrix.json
          echo "---- matrix.md ----"
          cat results/matrix.md

      - name: Upload gold-eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factors-gold-eval-results
          path: |
            results/gold_eval.junit.xml
            results/pytest.log
            results/matrix.md
            results/matrix.json
          retention-days: 90
          if-no-files-found: warn

      - name: Comment per-slice table on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'results/matrix.md';
            if (!fs.existsSync(path)) {
              core.warning('matrix.md not found - skipping PR comment');
              return;
            }
            const body = [
              '## Factors Gold-Eval Gate',
              '',
              `Floors: top-1 ≥ ${process.env.TOP1_FLOOR}, top-5 ≥ ${process.env.TOP5_FLOOR}, skipped ≤ ${process.env.MAX_SKIPPED_FRACTION}`,
              '',
              fs.readFileSync(path, 'utf8'),
              '',
              `_Run: ${context.runNumber} · Commit: ${context.sha.slice(0,7)}_`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Enforce top-1 >= 85% gate (redundant guard)
        if: always()
        run: |
          python - <<'PY'
          import json, os, sys
          from pathlib import Path
          p = Path("results/matrix.json")
          if not p.exists():
              print("::error::matrix.json missing - gold-eval did not complete")
              sys.exit(1)
          data = json.loads(p.read_text())
          overall = data.get("overall", {})
          top1 = overall.get("top1")
          floor = float(os.environ["TOP1_FLOOR"])
          if top1 is None:
              print("::error::overall.top1 missing in matrix.json")
              sys.exit(1)
          print(f"Overall top-1 = {top1:.4f}  (floor = {floor:.4f})")
          if top1 < floor:
              print(f"::error::Overall top-1 {top1:.2%} < floor {floor:.2%} - blocking merge")
              sys.exit(1)
          print("Gold-eval gate PASSED.")
          PY
