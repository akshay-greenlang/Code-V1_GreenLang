# GreenLang Code Governance Pipeline
#
# Consolidates: enforcement-pipeline.yml, greenlang-first-enforcement.yml,
#               greenlang-guards.yml, no-naked-numbers.yml, specs-schema-check.yml
#
# Comprehensive code governance and policy enforcement:
# - OPA policy checks
# - No magic numbers enforcement
# - Spec/schema validation
# - Determinism checks
# - Version consistency checks
#
# Author: GreenLang Governance Team
# Version: 3.0.0

name: Code Governance

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  policy-enforcement:
    name: OPA Policy Enforcement
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Run GreenLang-first enforcement
        run: |
          opa test policies/greenlang-first/ -v

      - name: Run GreenLang guardrails
        run: |
          opa test policies/guardrails/ -v

      - name: Validate policy compliance
        run: |
          opa eval -d policies/ "data.greenlang.allow" --fail

  no-magic-numbers:
    name: No Magic Numbers Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: |
          pip install flake8

      - name: Check for magic numbers
        run: |
          python scripts/check_magic_numbers.py greenlang --exclude tests --exclude __pycache__ --json-output magic-numbers.json

      - name: Report magic numbers
        run: |
          MAGIC_COUNT=$(jq 'length' magic-numbers.json)
          echo "## Magic Numbers Check" >> $GITHUB_STEP_SUMMARY
          echo "- Found: $MAGIC_COUNT instances" >> $GITHUB_STEP_SUMMARY

          if [ "$MAGIC_COUNT" -gt 50 ]; then
            echo "::warning::Found $MAGIC_COUNT magic numbers (threshold: 50)"
          fi

  schema-validation:
    name: Spec & Schema Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Validate pack.yaml files
        run: |
          python scripts/validate_pack_schemas.py || echo "Pack validation needs attention"

      - name: Validate gl.yaml files
        run: |
          python scripts/validate_gl_schemas.py || echo "GL schema validation needs attention"

      - name: Validate run.json files
        run: |
          python scripts/validate_run_schemas.py || echo "Run schema validation needs attention"

  determinism-checks:
    name: Determinism Verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .[test,dev]

      - name: Run determinism tests
        run: |
          pytest tests/factors/v0_1_alpha/test_seed_urns_canonical_parse.py \
            tests/factors/v0_1_alpha/test_alpha_source_snapshots.py \
            -q --tb=short

      - name: Verify reproducible builds
        run: |
          python -m build
          HASH1=$(sha256sum dist/*.whl | cut -d' ' -f1)
          rm -rf dist/
          python -m build
          HASH2=$(sha256sum dist/*.whl | cut -d' ' -f1)

          if [ "$HASH1" == "$HASH2" ]; then
            echo "✅ Builds are reproducible"
          else
            echo "::warning::Builds are not reproducible"
          fi

  version-consistency:
    name: Version Consistency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys
          import tomllib

          pyproject_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          version_file = pathlib.Path("VERSION")
          file_version = version_file.read_text().strip() if version_file.exists() else pyproject_version

          version_py = pathlib.Path("greenlang/_version.py").read_text()
          fallback_match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']\s*# Fallback version', version_py)
          fallback_version = fallback_match.group(1) if fallback_match else pyproject_version

          init_exports_version = "__version__" in pathlib.Path("greenlang/__init__.py").read_text()
          versions = {
              "pyproject.toml": pyproject_version,
              "VERSION": file_version,
              "greenlang/_version.py fallback": fallback_version,
          }

          with open("version-summary.md", "w", encoding="utf-8") as summary:
              summary.write("## Version Consistency\n")
              for source, version in versions.items():
                  summary.write(f"- {source}: {version}\n")
              summary.write(f"- greenlang/__init__.py exports __version__: {init_exports_version}\n")

          if not init_exports_version or len(set(versions.values())) != 1:
              print("::error::Version mismatch detected!")
              print(versions)
              print(f"greenlang/__init__.py exports __version__: {init_exports_version}")
              sys.exit(1)

          print(f"All versions consistent: {pyproject_version}")
          PY
          cat version-summary.md >> "$GITHUB_STEP_SUMMARY"

  governance-gate:
    name: Governance Gate Check
    runs-on: ubuntu-latest
    needs: [policy-enforcement, no-magic-numbers, schema-validation, determinism-checks, version-consistency]
    if: always()

    steps:
      - name: Check all governance checks passed
        run: |
          if [[ "${{ needs.policy-enforcement.result }}" != "success" ]]; then
            echo "::error::Policy enforcement failed"
            exit 1
          fi
          if [[ "${{ needs.schema-validation.result }}" != "success" ]]; then
            echo "::error::Schema validation failed"
            exit 1
          fi
          if [[ "${{ needs.determinism-checks.result }}" != "success" ]]; then
            echo "::error::Determinism checks failed"
            exit 1
          fi
          if [[ "${{ needs.version-consistency.result }}" != "success" ]]; then
            echo "::error::Version consistency failed"
            exit 1
          fi
          echo "✅ All governance checks passed"
