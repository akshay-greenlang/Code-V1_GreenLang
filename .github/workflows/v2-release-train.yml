name: V2 Release Train

on:
  workflow_dispatch:
    inputs:
      train_type:
        description: "nightly | rc | stable"
        required: true
        default: "rc"
  schedule:
    - cron: "0 2 * * *"

jobs:
  v2-train-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Execute V2 release gates
        run: |
          python -m greenlang.cli.main v2 validate-contracts
          python -m greenlang.cli.main v2 runtime-checks
          python -m greenlang.cli.main v2 docs-check
          pytest -q tests/v2
          python -m greenlang.cli.main v2 gate

      - name: Upload V2 train evidence
        uses: actions/upload-artifact@v4
        with:
          name: v2-train-evidence
          path: |
            docs/v2
            tests/v2
