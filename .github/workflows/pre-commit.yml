name: Pre-commit Quality Gates

on:
  pull_request:
    branches: [master, main, develop]
  push:
    branches: [master, main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  GL_FACTORS_RELEASE_PROFILE: "alpha-v0.1"

jobs:
  alpha-pre-commit:
    name: Alpha Pre-commit Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff check active alpha files
        run: |
          ruff check \
            greenlang/factors/rights \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/source_registry.py \
            tests/factors/v0_1_alpha/test_source_rights_phase1_followups.py \
            tests/factors/v0_1_alpha/test_source_rights_service.py \
            --select E,F,W \
            --ignore E501

      - name: Compile active alpha files
        run: |
          python -m compileall -q \
            greenlang/factors/rights \
            greenlang/factors/api_v0_1_alpha_routes.py \
            greenlang/factors/source_registry.py \
            scripts/check_magic_numbers.py

      - name: Bandit alpha source-rights scan
        run: |
          bandit -q -r greenlang/factors/rights -x tests || true

      - name: Magic-number report
        run: |
          python scripts/check_magic_numbers.py greenlang/factors --exclude tests --exclude __pycache__ --json-output magic-numbers.json

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-pre-commit-artifacts
          path: magic-numbers.json
          if-no-files-found: warn
          retention-days: 7
