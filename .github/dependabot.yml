# Dependabot configuration scoped to supported release surfaces.
#
# Archive, planning, and future application folders are deliberately not listed.
# They are retained for reference until promoted by a release profile and should
# not create default-branch dependency-noise PRs.

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 8
    labels: ["dependencies", "python", "active-surface"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-root:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/config"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "UTC"
    open-pull-requests-limit: 4
    labels: ["dependencies", "python", "config"]
    commit-message:
      prefix: "chore(deps-config)"
      include: "scope"
    groups:
      python-config:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 4
    labels: ["dependencies", "frontend", "active-surface"]
    commit-message:
      prefix: "chore(frontend-deps)"
      include: "scope"
    groups:
      frontend-root:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/greenlang/factors/sdk/ts"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:20"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels: ["dependencies", "factors", "typescript-sdk"]
    commit-message:
      prefix: "chore(factors-ts-deps)"
      include: "scope"
    groups:
      factors-ts-sdk:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker", "active-surface"]
    commit-message:
      prefix: "build(docker)"
      include: "scope"
    groups:
      docker-base-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 4
    labels: ["dependencies", "github-actions", "ci"]
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
